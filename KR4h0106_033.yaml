body:
  text: 文編卷三十三明唐順之編十二諸侯年表史記太史公讀春秋歷譜諜至周厲王未嘗不廢書而歎也曰嗚呼師摯見之矣紂為象箸而箕子唏周道缺詩人本之衽席關睢作仁義陵遲鹿鳴刺焉及至厲王以惡聞其過公卿懼誅而禍作厲王遂奔子彘亂自京師始而共和行政焉是後或力政強乘弱興師不請天子然挾王室之義以討伐為會盟主政由五伯諸侯恣行淫侈不軌賊臣篡子滋起矣齊晉秦楚其在成周微甚封或百里或五十里晉阻三河齊負東海楚介江淮秦因雍州之固四國迭興更為伯主文武所褒大封皆威而服焉是以孔子明王道干七十餘君莫能用故西觀周室論史記舊聞興於魯而次春秋上記隱下至哀之獲麟約其辭文去其煩重以制義法王道備人事浹七十子之徒口受其傳指為有所刺譏褒諱挹損之文辭不可以書見也魯君子左邱明懼弟子人人異端各安其意失其真故因孔子史記具論其語成左氏春秋鐸椒為楚威王傳為王不能盡觀春秋采取成敗卒四十章為鐸氏微趙孝成王時其相虞卿上采春秋下觀近勢亦著八篇為虞氏春秋吕不韋者秦莊襄王相亦上觀尚古刪拾春秋集六國時事以為八覽六論十二紀為吕氏春秋及荀卿孟子公孫固韓非之徒各往往捃托春秋之文以著書不可勝紀漢相張蒼歷譜五德上大夫董仲舒推春秋義頗著文焉太史公曰儒者斷其義馳説者騁其辭不務綜其終始人取其年月數家隆於神運譜牒獨記世諡其辭略欲一觀諸要難於是譜十二諸侯自共和訖孔子表見春秋國語學者所譏盛衰大指著于篇為成學治古文者要刪焉六國表史記太史公讀秦記至犬戎敗幽王周東徙洛邑秦襄公始封為諸侯作西畤用事上帝僣端見矣禮曰天子祭天地諸侯祭其域內名山大川今秦雜戎翟之俗先暴戾後仁義位在藩臣而臚於郊祀君子懼焉及文公踰隴攘夷狄尊陳寶營岐雍之間而穆修政東竟至河則與齊桓晉文中國侯伯侔矣是後陪臣執政大夫世祿六卿擅晉權征伐會盟威重於諸侯及田常殺簡公而相齊國諸侯晏然弗討海內爭於戰功矣三國終之卒分晉田和亦滅齊而有之六國之盛自此始務在強兵并敵謀詐用而從衡短長之説起矯稱蜂出誓盟不信雖置質剖符猶不能約束也秦始小國僻逺諸夏賔之比於戎翟至獻公之後常雄諸侯論秦之德義不如魯衛之暴戾者量秦之兵不如三晉之強也然卒并天下非必險固便形藝利也蓋若天所助焉或曰東方物所始生西方物之成熟夫作事者必於東南收功實者常於西北禹興於西羌湯起於亳周之王也以豐鎬伐殷秦之帝用雍州興漢之興自蜀漢秦既得意燒天下詩書諸侯史記尤甚為有所刺譏也詩書所以復見者多藏人家而史記獨藏周室以故滅惜哉惜哉獨有秦記又不載日月其文略不具然戰國之權變亦有可頗采者何必上古秦取天下多暴然世異變成功大傳曰法後王何也以其近已而俗變相類議卑而易行也學者牽於所聞見秦在帝位日淺不察其終始因舉而笑之不敢道此與以耳食無異悲夫余於是因秦記踵春秋之後起周元王表六國時事訖二世凡二百七十年著所聞興壞之端後有君子以覽觀焉秦楚月表史記太史公讀秦楚之際曰初作難發於陳涉虐戾滅秦自項氏撥亂誅暴平定海內卒踐帝祚成於漢家五年之間號令三嬗自生民以來未始有受命若斯之亟也昔虞夏之興積善纍功數十年德洽百姓攝行政事考之於天然後在位湯武之王乃由契后稷修仁行義十餘世不期而會孟津八百諸侯猶以為未可其後乃放弒秦起襄公章於文繆獻孝之後稍以蠶食六國百有餘載至始皇乃能并冠帶之倫以德若彼用力如此蓋一統若斯之難也秦既稱帝患兵革不休以有諸侯也於是無尺土之封墮壞名城銷鋒鏑阻豪傑維萬世之安然王迹之興起於閭巷合從討伐軼於三代鄉秦之禁適足以資賢者為驅除難耳故憤發其所為天下雄安在無土不王此乃傳之所謂大聖乎豈非天哉非大聖孰能當此受命而帝者乎漢興以來諸侯年表史記太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義褒有德也太公於齊兼五侯地尊勤勞也武王成康所封數百而同姓五十五地上不過百里下三十里以輔衛王室管蔡康叔曹鄭或過或損厲幽之後王室缺侯伯強國興焉天子微弗能正非德不純形勢弱也漢興序二等髙祖末年非劉氏而王者若無功上所不置而侯者天下共誅之高祖子弟同姓為王者九國唯獨長沙異姓而功臣侯者百有餘人自雁門太原以東至遼陽為燕代國常山以南太行左轉渡河濟阿甄以東薄海為齊趙國自陳以西南至九疑東帶江淮穀泗薄會稽為梁楚吳淮南長沙國皆外接於胡越而內地北距山以東盡諸侯地大者或五六郡連城數十置百官宫觀僣於天子漢獨有三河東郡潁川南陽自江陵以西至蜀北自雲中至隴西與內史凡十五郡而公主列侯頗食邑其中何者天下初定骨肉同姓少故廣強庶孽以鎮撫四海用承衛天子也漢定百年之間親屬益疏諸侯或驕奢怵邪臣計謀為淫亂大者叛逆小者不軌于法以危其命殞身亡國天子觀于上古然後加惠使諸侯得推恩分子弟國邑故齊分為七趙分為六梁分為五淮南分為三及天子支庶子為王王子支庶為侯百有餘焉吳楚時前後諸侯或以適削地是以燕代無北邉郡吳淮南長沙無南邉郡齊趙梁楚支郡名山陂海咸納於漢諸侯稍微大國不過十餘城小侯不過數十里上足以奉貢職下足以供養祭祀以蕃輔京師而漢郡八九十形錯諸侯間犬牙相臨秉其厄塞地利強本幹弱枝葉之勢也尊卑明而萬事各得其所矣臣遷謹記高祖以來至太初諸侯譜其下益損之時令後世得覽形勢雖強要之以仁義為本髙祖功臣年表史記古者人臣功有五品以德立宗廟定社稷曰勳以言曰勞用力曰功明其等曰伐積日曰閲封爵之誓曰使黃河如帶泰山如厲國以永寧爰及苗裔始未嘗不欲固其根本而枝葉稍陵夷衰微也余讀高祖侯功臣察其首封所以失之者曰異哉所聞書曰協和萬國遷於夏啇或數千歲蓋周封八百幽厲之後見於春秋尚書有唐虞之侯伯歷三代千有餘載自全以蕃衛天子豈非篤于仁義奉上法哉漢興功臣受封者百有餘人天下初定故大城名都散亡戶口可得而數者十二三是以大侯不過萬家小者五六百戶後數世民咸歸鄉里戶益息蕭曹絳灌之屬或至四萬小侯自倍富厚如之子孫驕溢忘其先淫嬖至太初百年之間見侯五餘皆坐法隕命亡國耗矣罔亦少密焉然皆身無兢兢於當世之禁云居今之世志古之道所以自鏡也未必盡同帝王者各殊禮而異務要以成功為統紀豈可混乎觀所以得尊寵及所以廢辱亦當世得失之林也何必舊聞于是謹其終始表見其文頗有所不盡夲末著其明疑者闕之後有君子欲推而列之得以覽焉諸侯王表漢書昔周監於二代三聖制法立爵五等封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地詩載其制曰介人惟藩大師惟垣大邦惟屏大宗惟翰懷德惟寧宗子惟城毋俾城壞毋獨斯畏所以親親賢賢褒表功德關諸盛衰深根固夲為不可拔者也故盛則周召相其治致刑錯衰則五伯扶其弱與共守自幽平之後日以陵夷至呼􅀈嶇河洛之間分為二周有逃責之臺被竊鈇之言然天下謂之共主強大弗之敢傾歷載八百餘年數極德盡既於王赧降為庶人用天年終號位已絶於天下尚猶枝葉相持莫得居其虛位海內無主三十餘年秦據藝勝之地騁狙詐之兵蠶食山東一切取勝因矜其所習自任私知姍笑三代蕩滅古法竊自號為皇帝而子弟為匹夫內亡骨肉本根之輔外亡尺土藩翼之衛陳吳奮其白梃劉項隨而斃之故曰周過其歷秦不及期國勢然也漢興之初海內新定同姓寡少懲戒亡秦孤立之敗於是剖裂疆土二等之爵功臣侯者百有餘邑尊王子弟大啓九國自雁門以東盡遼陽為燕代常山以南大行左轉度河濟漸於海為齊趙穀泗以往奄有龜蒙為梁楚東帶江湖薄會稽為荆吳北界淮瀕略廬衡為淮南波漢之陽亘九嶷為長沙諸侯比境周匝三垂外接胡越天子自有三河東郡潁川南陽自江陵以西至巴蜀北自雲中至隴西與京師內史凡十五郡公主列侯頗邑其中而藩國大者夸州兼郡連城數十宫室百官同制京師可謂矯枉過其正矣雖然髙祖創業日不暇給孝惠享國又淺高后女主攝位而海內晏如亡狂狡之憂卒折諸呂之難成太宗之業者亦賴之於諸侯也然諸侯原夲以大末流濫以致溢小者淫荒越法大者睽孤橫逆以害身喪國故文帝采賈生之議分齊趙景帝用鼂錯之計削吳楚武帝施主父之册下推恩之令使諸侯王得分戶邑以封子弟不行黜陟而藩國自析自此以來齊分為七趙分為六梁分為五淮南分為三皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邉矣景遭七國之難抑損諸侯減黜其官武有衡山淮南之謀作左官之律設附益之法諸侯惟得衣食稅租不與政事至於哀平之際皆繼體苖裔親屬疏逺生於帷牆之中不為士民所尊藝與富室亡異而本朝短世國統三絶是故王莽知漢中外殫微本末俱弱亡所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下詐謀既成遂據南靣之尊分遣五威之吏馳傳天下班行符命漢諸侯王厥角首奉上璽韍惟恐在後或乃稱美頌德以求容媚豈不哀哉是以究其終始強弱之變明監戒焉異姓諸侯王表漢書昔詩書述虞夏之際舜禹受禪積德纍功洽於百姓攝位行政考之於天經數十年然後在位殷周之王乃繇禹稷修仁行義歷十餘世至於湯武然後放殺秦起襄公章文繆獻孝昭嚴稍蠶食六國百有餘載至始皇乃并天下以德若彼用力如此其囏難也秦既稱帝患周之敗以為起於處士橫議諸侯力爭四夷交侵以弱見奪於是削去五等墮城銷刃箝語燒書內鋤雄俊外攘胡越用一威權為萬世安然十餘年間猛敵橫發乎不虞適戍強於五伯閭閻逼於戎狄嚮應慘於謗議奮臂威於甲兵鄉秦之禁適所以資豪傑而速自斃也是以漢亡尺土之階繇一劍之任五載而成帝業書傳所記未嘗有焉何則古世相革皆承聖王之烈今漢獨收孤秦之弊鐫金石者難為功摧枯朽者易為力其勢然也故據漢受命譜十八王月而列之天下一統乃以年數訖於孝文異姓盡矣高惠高后孝文功臣表漢書自古帝王之興曷嘗不建輔弼之臣所與共成天功者乎漢興自秦二世元年之秋楚陳之歲初以沛公總帥雄俊三年然後西滅秦立漢王之號五年東克項羽即皇帝位八載而天下乃平始論功而定封訖十二年侯者百四十有三人時大城名都民人散亡戶口可得而數裁什二三是以大侯不過萬家少者五六百戶封爵之誓曰使黃河如帶泰山若厲國以永存爰及苗裔於是申以丹書之信重以白馬之盟又作十八侯之位次高后二年復詔丞相陳平盡差列侯之功録第下竟藏諸宗廟副在有司始未嘗不欲固根本而枝葉稍落也故逮文景四五世間流民既歸戶口亦息列侯大者至三四萬戶小國自倍富厚如之子孫驕逸忘其先祖之艱難多陷法禁隕命亡國或云子孫訖於孝武後元之年靡有孑遺耗矣罔亦少密焉故孝宣皇帝愍而録之乃開廟藏覽舊籍詔令有司求其子孫咸出庸保之中並受復除或加以金帛用章中興之德降及孝成復加恤問稍益衰微不絶如線善乎杜業之納説也曰昔唐以萬國致時雍之政虞夏以之多羣后饗恭已之治湯法三聖殷氏太平周封八百重譯來賀是以內恕之君樂繼絶世隆名之主安立亡國至於不及下車德念深矣成王察牧野之克顧羣后之勤知其恩結於民心功光於王府也故追述先父之志録遺老之䇿髙其位大其宇愛敬飭盡命賜備厚大孝之隆於是為至至其沒也世主歎其功無民而不思所息之樹且猶不伐况其廟乎是以燕齊之祀與周並傳子繼弟及歷載不墮豈無刑辟繇祖之竭力故支庶賴焉迹漢功臣亦皆割符世爵受山河之誓存以著其號亡以顯其魂賞亦不細矣百餘年間而襲封者盡或絶失姓或乏無主朽骨孤於墓苖裔流於道生為愍𨽻死為轉尸以往况今甚可悲傷聖朝憐憫詔求其後四方欣欣靡不歸心出入數年而不省察恐議者不思大義設言虛亡則厚德掩息遴柬布章非所以視化勸後也三人為衆雖難盡繼宜從尤功於是成帝復紹蕭何哀平之世增修曹參周勃之屬得其宜矣以綴續前記究其本末并序位次盡於孝文以昭元功之侯籍云文編卷三十三

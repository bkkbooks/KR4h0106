body:
  text: 文編卷二十三明唐順之編徐無鬼莊子有暖姝者有濡需者有卷婁者所謂暖姝者學一先生之言則暖暖姝姝而私自説也自以為足矣而未知未始有物也是以謂暖姝者也濡需者豕蝨是也擇疏鬛自以廣宫大囿奎蹄曲隈乳間股腳自以為安室利處不知屠者之一旦鼓臂布草操煙火而已與豕俱焦也此以域進此以域退此其所謂濡需者也卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悅之故三徙成都至鄧之虛而十有萬家堯聞舜之賢舉之童土之地曰冀得其來之澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也是以神人惡衆至衆至則不比不比則不利也故無所甚親無所甚踈抱德煬和以順天下此謂真人於蟻棄知於魚得計於羊棄意以目視目以耳聽耳以心復心若然者其平也繩其變也循古之真人以天待之不以人入天古之真人得之也生失之也死得之也死失之也生藥也其實堇也桔梗也雞雍也豕零也是時為帝者也何可勝言句踐也以甲楯三千棲於會稽唯種也能知亡之所以存唯種也不知其身之所以愁故曰鴟目有所適鶴脛有所節解之也悲故曰風之過河也有損焉日之過河也有損焉請只風與日相與守河而河以為未始其攖也恃源而往者也故水之守土也審影之守人也審物之守物也審故目之於明也殆耳之於聰也殆心之於殉也殆凡能其於府也殆殆之成也不給改禍之長也兹萃其反也緣功其果也待久而人以為已寶不亦悲乎故有亡國戮民無已不知問是也故足之於地也踐雖踐恃其所不蹍而後善博也人之知也少雖少特其所不知而後知天之所謂也知大一知大隂知大目知大均知大方知大信知大定至矣大一通之大隂解之大目視之大均緣之大方體之大信稽之大定持之盡有天循有照冥有樞始有彼則其解之也似不解之者其知之也似不知之也不知而後知之其問之也不可以有崖而不可以無崖頡滑有實古今不代而不可以虧則可不謂有大揚榷乎闔不亦問是已奚惑然為以不惑解惑復於不惑是尚大不惑王命論班彪昔在帝堯之禪曰咨爾舜天之厯數在爾躬舜亦以命禹暨子稷契咸佐唐虞光濟四海奕世載德至於湯武而有天下雖其遭遇異時禪代不同至於應天順民其揆一也是故劉氏承堯之祚氏族之世著乎春秋唐據火德而漢紹之始起沛澤則神母夜號以章赤帝之符由是言之帝王之祚必有明聖顯懿之德豐功厚利積纍之業然後精誠通於神明流澤加於生民故能為鬼神所福饗天下所歸往未見運世無本功德不紀而得崛起在此位者也世俗見髙祖興於布衣不達其故以為適遭暴亂得奮其劍遊説之士至比天下於逐鹿幸捷而得之不知神器有命不可以智力求也悲夫此世所以多亂臣賊子者也若然者豈徒暗於天道哉又不覩之於人事矣夫餓饉流𨽻飢寒道路思有裋褐之襲儋石之畜所願不過一金然終於轉死溝壑何則貧窮亦有命也况乎天子之貴四海之富神明之祚可得而妄處哉故雖遭罹厄會竊其權柄勇如信布疆如梁籍成如王莽然卒潤鑊伏質烹醢分裂又况么麼尚不及數子而欲暗姦天位者乎是故駑蹇之乘不騁千里之塗燕雀之儔不奮六翮之用楶梲之材不荷棟梁之任斗筲之子不秉帝王之重易曰鼎折足覆公餗不勝其任也當秦之末豪傑共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤卒富貴不祥不如以兵屬人事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡而劉氏之將興也是時陵為漢將而母獲於楚有漢使來陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劒而死以固勉陵其後果定於漢陵為宰相封侯夫以匹婦之明猶能推事理之致探禍福之機而全宗祀於無窮垂䇿書於春秋而况大丈夫之事乎是故窮達有命吉凶由人嬰母知廢陵母知興審此四者帝王之分決矣蓋在髙祖其興也有五一曰帝堯之苗裔二曰體貌多竒異三曰神武有徵應四曰寬明而仁恕五曰知人善任使加之以信誠好謀達於聽受見善如不及用人如由已從諫如順流趣時如嚮赴當食吐哺納子房之䇿拔足揮洗揖酈生之説寤戍卒之言斷懷土之情高四皓之名割肌膚之愛舉韓信於行陳收陳平於亡命英雄陳力羣䇿畢舉此髙祖之大略所以成帝業也若乃靈瑞符應又可略聞矣初劉媪任髙祖而夢與神遇震電晦𡨕有龍蛇之怪及其長而多靈有異於衆是以王武感物而折劵呂公覩形而進女秦皇東遊以厭其氣吕后望雲而知所處始受命則白蛇分西入關則五星聚故淮隂留侯謂之天授非人力也歷古今之得失驗行事之成敗稽帝王之世運考五者之所謂取舍不厭斯位符瑞不同斯度而茍昧於權衡越次妄據外不量力內不知命則必喪保家之主失天下之壽遇折足之凶伏鈇鉞之誅英雄誠知覺寤畏若禍戒超然逺覽淵然深識收陵嬰之明分絶信布之覬覦距逐鹿之瞽説審神器之有授母貪不可幾為二母之所笑則福祚流於子孫天祿永終矣法象論徐幹夫法象立所以為君子法象者莫先乎正容貌慎威儀是故先王之制禮也為冕服采章以旌之為珮玉鳴璜以聲之欲其尊也欲其莊也焉可以懈慢也容貌者人之儀表也容貌正故性情治性情治故仁義存仁義存故盛德著故可以為法象斯謂之君子矣君子者無尺土之封而民尊之無刑罰之威而民畏之無羽籥之樂而民樂之無爵祿之賞而民懷之其所以致之者一也故孔子曰君子威而不猛泰而不驕詩云敬慎威儀維民之則若夫惰其威儀玩其膽視忽其辭令而望民之則我者未之有也莫之則者必慢之者至矣小人見慢也而致怨乎人患已之卑而不思其所以焉哀哉故書曰惟聖罔念作狂惟狂克念作聖人性之所簡也存乎幽微人情之所忽也存乎孤獨夫幽微者顯之原也孤獨者見之端也胡可簡也胡可忽也是故君子敬孤獨而慎幽微雖在隱蔽鬼神不得見其隙耳詩云肅肅兔罝施於中林處獨之謂也又有顛沛而不可亂者則成王季路其人也昔成王將崩體被冕服然後發顧命之辭季路遭亂正冠結纓而後死白創之難夫以彌留之困白創之難猶不忘敬况於遊宴乎故詩曰就其深矣方之舟之就其淺矣泳之遊之言必濟也君子者無戲謔之言言必有防無戲謔之行行必有檢言必有防行必有檢故雖妻妾不得而黷也雖朋友不得而狎也是以不愠怒而教行於閨門不諌論而風聲紀乎鄉黨傳稱大人正已而物正者蓋此之謂也以匹夫之居猶然况得志而行於天下乎唐堯之帝允恭克讓而光被四表成湯不敢怠遑而奄有九域文王祗畏而造彼區夏易曰觀盥而不薦有孚顒若言下觀而化也禍敗之所由也則有媟嫚以為階可無慎乎昔宋閔碎首於碁局陳靈被矢於戲言閻邴造逆於相詬子公生弒於嘗黿是故君子居身也謙在敵也讓臨下也莊事上也敬四者備而怨咎不作福祿從之詩云靖共爾位正直是與神之聽之式穀以女君子之交人也歡而不媟和而不同好而不佞詐學而不虛行易親而難媚多恕而寡非故其絶交其誤畔書曰慎始而敬終以不困夫禮也者人之急也可終身思而不可須臾忘也須臾離則惂慢之行臻焉須臾忘則惂慢之心生焉况無禮而可以終始乎夫禮也者敬之經也敬也者禮之情也無敬無以行禮無禮無以節敬道不偏廢相須而成是能盡敬以從禮者謂之成人過則生亂亂則災及其身昔晉惠公以慢瑞無嗣文公以肅命興國郤犫以傲享缺以敬妻受服子圉以大明招亂薳罷以既醉保祿良霄以鶉奔喪家子展以草蟲昌族君子感凶懷之如彼見吉德之如此故立以磬折坐必抱鼓周旋中規折旋中矩視不離於袺襘之間言不越乎表著之位聲氣可聽精神可愛俯仰可宗揖讓可貴作事有方動靜有常師禮不荒故為萬夫之望也胠篋莊子將為胠篋探囊發匱之盜而為守備則必攝緘縢固扄鐍此世俗之所謂知也然而巨盜至則負匱揭篋擔囊而趨唯恐緘􅀈扃鐍之不固也然則鄉之所謂知者不乃為大盜積者也故嘗試論之世俗所謂知者有不為大盜積者乎所謂聖者有不為大盜守者乎何以知其然耶昔者齊國鄰邑相望雞狗之音相聞罔罟之所布耒耨之所刺方二千餘里闔四境之內所以立宗廟社稷治邑屋州閭鄉曲者曷嘗不法聖人哉然而田成子一旦殺齊君而盜其國所盜者豈獨其國邪并與其聖知之法而盜之故田成子有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二世有齊國則是不乃竊齊國并與其聖知之法以守其盜賊之身乎嘗試論之世俗之所謂至知者有不為大盜積者乎所謂至聖者有不為大盜守者乎何以知其然邪昔者龍逢斬比干剖萇𢎞胣子胥靡故四子之賢而身不免乎戮故跖之徒問於跖曰盜亦有道乎跖曰何適而無有道邪夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者天下未之有也由是觀之善人不得聖人之道不立跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多故曰脣竭則齒寒魯酒薄而邯鄲圍聖人生而大盜起掊擊聖人縱舍盜賊而天下始治矣夫川竭而谷虛丘夷而淵實聖人巳死則大盜不起天下平而無故矣聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之斗斛以量之則并與斗斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以矯之則并與仁義而竊之何以知其然耶彼竊鉤者誅竊國者為諸侯諸侯之門而仁義存焉則是非竊仁義聖知耶故逐於大盜揭諸侯竊仁義并斗斛權衡符璽之利者雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰魚不可脫於淵國之利器不可以示人彼聖人者天下之利器也非所以明天下也故絶聖棄知大盜乃止擲玉毁珠小盜不起焚符破璽而民朴鄙掊斗折衡而民不爭殫殘天下之聖法而民始可與論議擢亂六律鑠絶竽瑟塞瞽曠之耳而天下始人含其聰矣滅文章散五采膠離朱之目而天下始人含其明矣毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙削曽史之行鉗楊墨之口攘棄仁義而天下之德始玄同矣彼人含其明則天下不鑠矣人含其聰則天下不纍矣人含其知則天下不惑矣人含其德則天下不僻矣彼曽史楊墨師曠工倕離朱者皆外立其德而以爚亂天下者也法之所無用也子獨不知至德之世乎昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏羲氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相往來若此之時則至治已今遂至使民延頸舉踵曰某所有賢者贏糧而趣之則內棄其親而外去其主之事足迹接乎諸侯之境車軌結乎千里之外則是上好知之過也上誠好知而無道則天下大亂矣何以知其然邪夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌網罟罾笱之知多則魚亂於水矣削格羅落罝罘之知多則獸亂於澤矣知詐漸毒頡滑堅白解垢同異之變多則俗惑於辨矣故天下每每大亂罪在於好知故天下皆知求其所不知而莫知求其所巳知者皆知非其所不善而莫知非其所已善者是以大亂故上悖日月之明下爍山川之精中墮四時之施惴耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也自三代以下者是已舍夫種種之機而悅夫役役之佞釋夫恬淡無為而悅夫啍啍之意啍啍巳亂天下矣五蠧韓非子上古之世人民少而禽獸衆人民不勝禽獸蟲蛇有聖人作搆木為巢以避羣害而民悅之使王天下號曰有巢氏民食果蓏蚌蛤腥臊惡臭而傷害腹胃民多疾病有聖人作鑽燧取火以化腥臊而民悅之使王天下號之曰燧人氏中古之世天下大水而鯀禹決瀆近古之世桀紂暴亂而湯武征伐今有搆木鑽燧於夏后氏之世者必為鯀禹笑矣有決瀆於殷周之世者必為湯武笑矣然則今有美堯舜湯武禹之道於當今之世者必為新聖笑矣是以聖人不期修古不法常行論世之事因為之備宋人有耕田者田中有株兔走觸株折頸而死因釋其耒而守株冀復得兔兔不可復得而身為宋國笑今欲以先王之政治當世之民皆守株之類也古者丈夫不耕草木之實足食也婦人不織禽獸之皮足衣也不事力而養足人民少而財有餘故民不爭是以厚賞不行重罰不用而民自治今人有五子不為多子又有五子大父未死而有二十五孫是以人民衆而貨財寡事力勞而供養薄故民爭雖倍賞纍罰而不免於亂堯之王天下也有茅茨不剪采椽不斫糲粢之食藜藿之羮冬日麑裘夏日葛衣雖監門之服養不虧於此矣禹之王天下也身執耒臿以為民先股無胈脛不生毛雖臣僕之勞不苦於此矣以是言之夫古之讓天子者是去監門之養而離臣僕之勞也故傳天下而不足多也今之縣令一日身死子孫纍世潔駕故人重之是以人之於讓也輕辭古之天子難去今之縣令者薄厚之實異也夫山居而谷汲者膢臘而相遺以水澤居苦水者買庸而決竇故飢歲之春幼弟不餉穰歲之秋疏客必食非疏骨肉愛過客也多少之實異也是以古人易財非仁也財多也今之爭奪非鄙也財寡也輕辭天子非髙也勢薄也爭土槖非下也權重也故聖人議多少薄厚為之政故罰薄不為慈誅嚴不為戾稱俗而行也故事因於世而備適於事古者文王處豐鎬之間地方百里行仁義而懷西戎遂王天下徐偃王處漢東地方五百里行仁義割地而朝者三十有六國荆文王恐其害已也舉兵伐徐遂滅之故文王行仁義而王天下偃王行仁義而喪其國是仁義用於古不用於今也故曰世異則事異當舜之時有苗不服禹將伐之舜曰不可上德不厚而行武非道也乃修教三年執干戚舞有苖乃服共工之戰鐡銛矩者及乎敵鎧甲不堅者傷乎體是干戚用於古不用於今也故曰事異則備變上古競於道德中世逐於智謀當今爭於氣力齊將攻魯魯使子貢説之齊人曰子言非不辨也吾所欲者地也非斯言所謂也遂舉兵伐魯去門十里以為界故偃王仁義而徐亡子貢辨智而魯削以是言之夫仁義辨智非所以持國也去偃王之仁息子貢之智循徐魯之力使敵萬乘則齊荆之欲不得行於二國矣有度韓非子國無常強無常弱奉法者強則國強奉法者弱則國弱荆莊王并國二十六開地三千里莊王之氓社稷也而荆以亡齊桓公并國三十啓地三千里桓公之氓社稷也而齊以亡燕襄王以河為境以薊為國襲涿方城殘齊平中山有燕者重無燕者輕襄王之氓社稷也而燕以亡魏安釐王攻趙救燕取地河東魏之地加兵於齊私平陸之都攻韓拔管勝於淇下睢陽之事荆軍老而走蔡召陵之事荆軍破兵四布於天下威行於冠帶之國安釐王死而魏以亡故有荆莊齊桓則齊荆可以霸有燕襄魏安釐則燕魏可以強今皆亡國者其羣臣官吏皆務所以亂而不務所以治也其國亂弱矣又皆釋國法而私其外則是負薪而救火也亂弱甚矣故當今之時能去私曲就公法者民安而國治能去私行行公法者兵強而敵弱故審得失有法度之制者加以羣臣之上則主不可欺以詐偽審得失有權衡之稱者以聽逺事則主不可欺以天下之輕重今若以譽進能則臣離上而下比周若以黨舉官則民務交而不求用於法故官之失能者其國亂以譽為賞以毁為罰也則好賞惡罰之人釋公行行私術比周以相為也忘主外交以進其與則其下所以為上者薄矣交衆與多外內朋黨雖有大過其蔽多矣故忠臣危死於非罪姦邪之臣安利於無功忠臣之所以危死而不以其罪則良臣伏矣姦邪之臣安利不以功則姦臣進矣此亡之本也若是則羣臣廢法而行私重輕公法矣數至能人之門不一至主之廷百慮私家之便不一圖主之國屬數雖多非所以尊君也百官雖具非所以任國也然則主有人主之名而實託於羣臣之家也故臣曰亡國之廷無人焉廷無人者非朝廷之衰也家務相益不務厚國大臣務相尊而不務尊君小臣奉祿養交不以官為事此其所以然者由主之不上斷於法而信下為之也故明主使法擇人不自舉也使法量功不自度也能者不可弊敗者不可飾譽者不能進非者弗能退則君臣之間明辨而易治故主讐法則可也賢者之為人臣北面委質無有二心朝廷不敢辭賤則軍旅不敢辭難順上之為從主之法虛心以待令而無是非也故有口不以私言有目不以私視而上盡制之為臣人者譬之若手上以修頭下以修足清暖寒熱不得不救鏌鋣傅體不敢不搏無私賢哲之臣無私事能之士故民不越鄉而交無百里之戚貴賤不相踰愚智提衡而立治之至也今夫輕爵祿易去亡以擇其主臣不謂廉詐説逆法倍主強諌臣不謂忠行惠施利收下為名臣不謂仁離俗隱居而以非上臣不謂義外使諸侯內耗其國伺其危嶮之陂以恐其主曰交非我不親怨非我不解而主乃信之以國聽之卑主之名以顯其身毁國之厚以利其家臣不謂智此數物者險世之説也而先王之法所簡也先王之法曰臣毋或作威毋或作利從王之指無或作惡從王之路古者世治之民奉公法廢私術專意一行具以待任夫為之人主而身察百官則日不足力不給且上用目則下飾觀上用耳則下飾聲上用慮則下繁辭先王以三者為不足故舍已能而因法數審賞罰先王之所守要故法省而不侵獨制四海之內聰智不得用其詐險躁不得關其佞姦邪無所依逺在千里外不敢易其辭勢在郎中不敢蔽善飾非朝廷羣下直湊單微不敢相踰越故治不足而日有餘上之任勢使然也夫人臣之侵其主也如地形焉即漸以往使人主失端東西易面而不自知故先王立司南以端朝夕故明主使其羣臣不遊意於法之外不為惠於法之內動無非法法所以凌過遊外私也嚴刑所以遂令懲下也威不貸錯制不共門威制共則衆邪彰矣法不信則君行危矣刑不斷則邪不勝矣故曰巧匠目意中繩然必先以規矩為度上智捷舉中事必以先王之法為比故繩直而枉木斫準夷而髙科削權衡縣而重益輕斗石設而多益少故以法治國舉措而已矣法不阿貴繩不撓曲法之所加智者弗能辭勇者弗敢爭刑過不避大臣賞善不遺匹夫故矯上之失詰下之邪治亂決繆絀羡齊非一民之軌莫如法屬官威民退淫殆止詐偽莫如刑刑重則不敢以貴易賤法審則上尊而不侵上尊而不侵則主強而守要故先王貴之而傳之人主釋法用私則上下不别矣刻意莊子刻意尚行離世異俗髙論怨誹為亢而已矣此山谷之士非世之人枯稿赴淵者之所好也語仁義忠信恭儉推讓為修而巳矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主強國之人致功并兼者之所好也就藪澤處間曠釣魚間處無為而已矣此江海之士避世之人間暇者之所好也吹詬呼吸吐故納新熊經鳥伸為壽而已矣此道引之士養形之人彭祖壽考者之所好也若夫不刻意而高無仁義而修無功名而治無江海而間不道引而壽無不忘也無不有也淡然無極而衆美從之此天地之道聖人之德也故曰夫恬惔寂漠虛無無為此天地之平而道德之質也故曰聖人休休焉則平易矣平易則恬惔矣平易恬惔則憂患不能入邪氣不能襲故其德全而神不虧故曰聖人之生也天行其死也物化靜而與隂同德動而與陽同波不為福先不為禍始感而後應迫而後動不得巳而後起去知與故循天之理故無天災無物纍無人非無鬼責其生若浮其死若休不思慮不豫謀光矣而不耀信矣而不期其寢不夢其覺無憂其神純粹其魂不罷虛無恬惔乃合天德故曰悲樂者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也一而不變靜之至也無所於忤虛之至也不與物交淡之至也無所於逆粹之至也故曰形勞而不休則弊精用而不已則勞勞則竭水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也故曰純粹而不雜靜一而不變淡而無為動而以天行此養神之道也夫有干越之劍者柙而藏之不敢用也寶之至也精神四達並流無所不極上際於天下蟠於地化育萬物不可為象其名為同帝純素之道唯神是守守而勿失與神為一一之精通合于天倫野語有之曰衆人重利廉士重名賢士尚志聖人貴精故素也者謂其無所與雜也純也者謂其不虧其神也能體純素謂之真人繕性莊子繕性於俗學以求復其初滑欲於俗思以求致其明謂之蔽蒙之民古之治道者以恬養知生而無以知為也謂之以知養恬知與恬交相養而和理出其性夫德和也道理也德無不容仁也道無不理義也義明而物親忠也中純實而反乎情樂也信行容體而順乎文禮也禮樂偏行則天下亂矣彼正而蒙已德德則不冒冒則物必失其性也古之人在混芒之中與一世而得淡漠焉當是時也隂陽和靜鬼神不擾四時得節萬物不傷羣主不夭人雖有知無所用之此之謂至一當是時也莫之為而常自然逮德下衰及燧人伏羲始為天下是故順而不一德又下衰及神農黃帝始為天下是故安而不順德又下衰及唐虞始為天下興治化之流淳散朴離道以善險德以行然後去性而從於心心與心識知而不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無以反其性情而復其初由是觀之世喪道矣道喪世矣世與道交相喪也道之人何由興乎世世亦何由興乎道哉道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣隱故不自隱古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也當時命而大行乎天下則反一無迹不當時命而大窮乎天下則深根寧極而待此存身之道也古之存身者不以辨飾知不以知窮天下不以知窮德危然處其所而反其性已又何為哉道固不小行德固不小識小識傷德小行傷道故曰正已而已矣樂全之謂得志古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也寄之其來不可圉其去不可止故不為軒冕肆志不為窮約趨俗其樂彼與此同故無憂而已矣今寄去則不樂由是觀之雖樂未嘗不荒也故曰喪已於物失性於俗者謂之倒置之民人間世莊子葉公子髙將使於齊問於仲尼曰王使諸梁也甚重齊之待使者蓋將甚敬而不急匹夫猶未可動也而况諸侯乎吾甚栗之子嘗語諸梁也曰凡事若小若大寡不道以歡成事若不成則必有人道之患事若成則必有隂陽之患若成若不成而後無患者唯有德者能之吾食也執粗而不臧㸑無欲清之人今吾朝受命而夕飲氷我其內熱與吾未至乎事之情而既有隂陽之患矣事若不成必有人道之患是兩也為人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間是之謂大戒是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也為人臣子者固有所不得已行事之情而忘其身何暇至於恱生而惡死夫子其行可矣丘請復以所聞凡交近則必相靡以信逺則必忠之以言言必或傳之夫傳兩喜兩怒之言天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類妄妄則其信之也莫莫則傳言者殃故法言曰傳其常情無傳其溢言則幾乎全且以巧鬬力者始乎陽常卒乎隂泰至則多竒巧以禮飲酒者始乎治常卒乎亂泰至則多竒樂凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨言者風波也行者實喪也夫風波易以動實喪易以危故忿設無由巧言偏辭獸死不擇音氣息茀然於是並生心厲尅核太至則必有不肖之心應之不知其然也茍為不知其然也孰知其所終故法言曰無遷令無勸成過度益也遷令勸成殆事美成在久惡成不及改可不慎與且夫乘物以遊心託不得已以養中至矣何作為報也莫若為致命此其難者文編卷二十三

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0106_WYG_039-1a, image: WYG1378/WYG1378-0102a.png}
body:
  text: 文編卷三十九明唐順之編偃松屏贊蘇軾豫為中山守始食北嶽松膏為天下冠其木理堅密瘠而不瘁信植物之英烈也謫居羅浮山下地暖多松而不識霜雪如高才勝人生綺紈家與孤臣孽子有間矣士踐憂患安知非福幼子過從南來畫寒松偃蓋為護首小屛為之贊曰燕南趙北大茂之麓天僵雪峯地裂冰谷凛然孤清不能無生生此偉竒北方之精蒼皮玉骨磽磽齾齾方春不知沍寒秀發孺子介剛從我炎荒霜中之英以洗我瘴三馬圖贊蘇軾元祐初上方閉玉門關謝遣諸將太師文彥博宰相吕大防范純仁建遣諸生游師雄行邊勑武備師雄至熙河蕃官包順請以所部熟户除邊患師雄許之遂擒猾羌大首領果莊青伊結以獻百官皆賀遣使告永裕陵時西域貢馬首高八尺龍顱而鳳膺虎脊而豹章出東華門入天駟監振鬛長鳴萬馬皆瘖父老縱觀以為未始見也上方恭默思道八駿在廷未嘗一顧其後圉人起居不以時馬有斃者上亦不問明年羌溫錫沁有良馬不敢進請於邊吏願以餽太師潞國公詔許之蔣之竒為熙河帥西蕃有貢駿馬汗血者有司以非入貢嵗月留其使與馬於邊之竒為請乞不以時入事下禮部軾時為宗伯判狀云朝廷方却走馬以糞正復汗血亦何所用事遂寢于時兵革不用海內小康馬則不遇矣而人少安軾嘗私請於承議郎李公麟畫當時三駿馬之狀而使果莊青伊結校之藏於家紹聖四年三月十四日軾在惠州謫居無事閲舊書畫追思一時之事而歎三馬之神駿乃為之贊曰吁果莊世悍驕奔二師走嫖姚今在廷服虎貂效天驥立內朝八尺龍神超遙若將西燕西瑶帝念民乃下招籋歸雲逝房妖王元之畫像贅蘇軾傳曰不有君子其能國乎豫嘗三復斯言未嘗不流涕太息也如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身狥義招之不來麾之不去正色而立于朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖纍千百緩急豈可望哉故翰林王公元之以雄文直道獨立當世足以追配此六君子者方是時朝廷清明無大姦慝然公猶不容於中耿然如秋霜夏日不可狎玩至於三黜以死有如不幸而處於衆邪之間安危之際則公之所為必將驚世絶俗使斗筲穿窬之流心破膽裂豈特如此而已乎始豫過蘇州虎邱寺見公之畫像想其遺風餘烈願為執鞭而不可得其後為徐州而公之曾孫汾為兖州以公墓碑示余乃追為之贊以附其家傳云維昔聖賢患莫已知公遇太宗允也其時帝欲用公公不少貶三黜窮山之死靡憾咸平以來獨為名臣一時之屈萬世之信紛紛鄙夫亦拜公像何以占之有泚其顙公能泚之不能巳之茫茫九原愛莫起之文與可飛白贊蘇軾嗚呼哀哉與可豈其多好好竒也歟抑其不試故藝也始豫見其詩與文又得見其行草篆𨽻也以為止此矣既沒一年而復見其飛白美哉多乎其盡萬物之態也霏霏乎其若輕雲之蔽月翻翻乎其若長風之卷斾也猗猗乎其若逰絲之縈柳絮裊裊乎其若流水之舞荇帶也離離乎其逺而相屬縮縮乎其近而不隘也其工至於如此而余乃今知之則余之知與可者固無幾而其所不知者蓋不可勝計也嗚呼哀哉韓幹畫馬贊蘇軾韓幹之馬四其一在陸驤首奮鬛若有所望頓足而長鳴其一欲涉凥高首下擇所由濟局蹐而未成其二在水前者反顧若以鼻語後者不應欲飲而留行以為廄馬也則前無羈絡後無箠策以為野馬也則隅目聳耳豐臆細尾皆中度程蕭然如賢大夫貴公子相與解帶脫帽臨水而濯纓遂欲高舉遠引友麋鹿而終天年則不可得矣蓋優哉游哉聊以卒嵗而無營師子屛風贊蘇軾潤州甘露寺有唐李衛公所留陸探微畫師子板余自錢塘移守膠西過而觀焉使工人摹之置公堂中而贊之曰圓其目仰其鼻奮髯吐舌威見齒舞其足前其耳左顧右躑喜見尾雖猛而和蓋其戲嚴嚴高堂護燕几啼呼顛沛走百鬼嗟乎妙哉古陸子管幼安畫贊蘇轍余自龍川以歸居潁已十有三年杜門幽居無以自適稍稍取舊書閲之將求古人而與之友蓋於三國得一焉曰管幼安蓋幼安少而遭亂渡海居遼東三十七年而歸歸於田廬不應朝命年八十有四而沒功業不加於人而余獨何取焉取其明於知時而審於處已云爾蓋東漢之衰士大夫以風節相尚其立志行義賢於西漢然時方大亂其出而應世鮮有能自全者潁川荀文若以智策輔曹公方其擒吕布斃袁紹皆談笑而辦其才與張子房比然至九錫之議卒不能免其身彭城張子布忠亮剛簡事孫氏兄弟成江東之業然終以直不見容力爭公孫淵事君臣之義幾絶平原華子魚以德量重於曹氏父子致位三公然曹公之殺伏后子魚將命至破壁出后而害之汝南許文休以人物臧否聞於世晚入蜀依劉璋先主將克成都文休逾城出降雖卒以為司徒而蜀人鄙之此四人者皆一時賢人也然直己者終害其身而枉己者終喪其德處亂而能全非幼安而誰與哉舊史言幼安雖老不病著白帽布襦袴布裙宅後數十步有流水夏暑能策杖臨水盥手足行園囿嵗時祀其先人絮帽布單衣薦饋跪拜成禮余欲使畫工以意髣佛畫之昔李公麟喜畫有顧陸遺思今公麟死久矣恨莫能成吾意者姑為之贊曰幼安之賢無以過人余獨何以謂賢賢其明於知時審於處已以能自全幼安之老歸自海東一畝之宫閉不求通白帽布裙舞雩而風四時蒸嘗饋奠必躬八十有四蟬蛻而終少非漢人老非魏人何以命之天之逸民王定國真贊蘇軾溫然而澤者道人之腴也凛然而清者詩人之癯也雍容委蛇者貴介之公子而短小精悍者游俠之徒也人何足以知之此皆其膚也若人者泰不驕困不撓而老不枯也秦少游真贊蘇軾以君為將仕也其服野其行方以君為將隱也其言文其神昌置而不求君不即即而求之君不藏以為將仕將隱者皆不知君者也蓋將挈所有而乘所遇以遊於世而卒反於其鄉者乎參寥子真贊蘇軾東坡居士曰維參寥子身寒而道富辨於文而訥於口外尫柔而中健武與人無競而好刺譏朋友之過枯形灰心而喜為感時玩物不能忘情之語此豫所謂參寥子有不可曉者五也文與可畫墨竹屏風贊蘇軾與可之文其德之糟粕與可之詩其文之毫末詩不能盡溢而為書變而為畫皆詩之餘其詩與文好者益寡有好其德如好其畫者乎悲夫石室先生畫竹贊并序蘇軾與可文翁之後也蜀人猶以石室名其家而與可自謂笑笑先生蓋可謂與道皆逝不留於物者也顧嘗好畫竹客有贊之者曰先生閒居獨笑不巳問安所笑笑我非爾物之相物我爾一也先生又笑笑所笑者笑笑之餘以竹發妙竹亦得風天然而笑諱辨韓愈愈與李賀書勸賀舉進士賀舉進士有名與賀爭名者毁之曰賀父名晉肅賀不舉進士為是勸之舉者為非聽者不察也和而唱之同然一辭皇甫湜曰若不明白子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨邱與蓲之類是也今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉肅子不得舉進士若父名仁子不得為人乎夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曾參之父名晳曾子不諱昔周之時有騏期漢之時有杜度此其子宜何如諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱吕后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也惟宦官宫妾乃不敢言諭及機以為觸犯士君子言語行事宜何所法守也今考之於經質之於律稽之以國家之典賀舉進士為可邪為不可邪凡事父母得如曾參可以無譏矣作人得如周公孔子亦可以止矣今世之士不務行曾參周公孔子之行而諱親之名則務勝於曾參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曾參乃比於宦官宫妾則是宦官宫妾之孝於其親賢於周公孔子曾參者耶桐葉封弟辨柳宗元古之傳者有言成王以桐葉與小弱弟戲曰以封汝周公入賀王曰戲也周公曰天子不可戲乃封小弱弟於唐吾意不然王之弟當封耶周公宜以時言於王不待其戲而賀以成之也不當封耶周公乃成其不中之戲以地以人與小弱者為之主其得為聖乎且周公以王之言不可茍焉而巳必從而成之耶設有不幸王以桐葉戲婦寺亦將舉而從之乎凡王者之德在行之何若設未得其當雖十易之不為病要於其當不可使易也而况以其戲乎若戲而必行之是周公教王遂過也吾意周公輔成王宜以道從容優樂要歸之大中而巳必不逢其失而為之辭又不當束縛之馳驟之使若牛馬然急則敗矣且家人父子尚不能以此自克况號為君臣者耶是直小丈夫缺缺者之事非周公所宜用故不可信或曰封唐叔史佚成之文編卷三十九

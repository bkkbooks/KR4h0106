body:
  text: 文編卷四十四明唐順之編民政一蘇轍臣聞王道之至於民也其亦深矣賢人君子自潔於上而民不免為小人朝廷之間揖讓如禮而民不免為盜賊禮行於上而淫僻邪放之風起於下而不能止此猶未免為王道之未成也王道之本始於民之自喜而成於民之相愛而王者之所以求之於民者其粗始於力田而其精極於孝悌亷恥之際力田者民之最勞而孝悌亷恥者匹夫匹婦之所不恱強所最勞而使之有自喜之心勸所不恱而使之有相愛之意故夫王道之成而及其至於民其亦深矣古者天下之災水旱相仍而上下不相保此其禍起於民之不自喜於力田天下之亂盜賊放恣兵革不息而民不樂業此其禍起於民之不相愛而棄其孝悌亷恥之節夫自喜則雖有大勞而其事不遷相愛則雖有強狠之心而顧其親戚之樂以不忍自棄於不義此二者王道之大權也方今天下之人狃於工商之利而不喜於農惟其最愚下之人自知其無能然後安於田畝而不去山林飢餓之民皆有盜跖趦趄之心而閨門之內父子交忿而不知反朝廷之上雖有賢人而其教不逮於下是故士大夫之間莫不以為王道之逺而難成也然臣竊觀三代之遺文至於詩而以為王道之成有所易而不難者夫人之不喜乎此是未得為此之味也故聖人之為詩道其耕耨播種之勤而述其歲終倉廩豐實婦子喜樂之際以感動其意故曰畟畟良耜俶載南畝播厥百穀實函斯活或來瞻女載筐及筥其餉伊黍其笠伊糾其鎛斯趙以薅荼蓼當此時也民既勞矣故為之言其室家來饁而慰勞之者以勉卒其事而其終章曰荼蓼朽止黍稷茂止穫之秷秷積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有救其角以似以續續古之人當此之時歲功既畢民之勞者得以與其婦子皆樂於此休息間暇飲酒食肉以自快於一歲則夫勤者有以自忘其勤盡力者有以輕用其力而狼戾無親之人有所慕恱而自改其操此非獨於詩云爾導之使獲其利而教之使知其樂亦如是也且民之性固安於所樂而恱於所利此臣所以為王道之無難者也蓋臣聞之誘民之勢逺莫如近而近莫如其所與競今行於朝廷之中而田野之民無遷善之心此豈非其逺而難至者哉明擇郡縣之吏謹法律之禁刑者布市而頑民不悛夫鄉黨之民其視郡縣之吏自以為非其比肩之人徒能畏其用法而袒背受笞於其前不為之愧此其勢可以及民之明罪而不可以及其隱慝此豈非其近而無所與競者邪惟其里巷親戚之間幼之所與同戲而壯之所與共事此其所與競者也臣愚以謂古者郡縣有三老嗇夫今可使推擇民之孝悌無過力田不惰為民之素所服者為之無使治事而使譏誚教誨其民之怠惰而無良者而歲時伏臘郡縣頗置禮焉以風天下使慕恱其事使民皆有愧恥勉強不服之心今不從民之所與競而教之而從其所素畏夫其所素畏者彼不自以為伍而何敢求望其萬一故教天下自所與競者始而王道可以漸至於下矣民政四蘇轍臣聞管子治齊始變周法使兵民異處制國為二十一鄉其工商之鄉六而士鄉十五制鄙以為五屬立五大夫使各治一屬之政國中之士為兵鄙野之民為農農不知戰而士不知稼各治其事而食其力兵以衛農農以資兵發兵征行暴露戰鬬而農夫不知其勤深耕疾耨霑體塗足而兵卒不知其勞當是之時桓公南征伐楚濟汝踰方城望汶山北伐山戎刜零支斬孤竹西攘白狄踰太行渡辟耳之溪九合諸侯築夷儀城楚邱徜徉四方國無罷弊之民而天下諸侯往來接應之不暇及秦孝公欲并海內商鞅為之倡謀使秦人莫不執兵以事戰伐而不得反顧而為農陰誘六國之民使專力以耕關中之田而無戰攻守禦之役二者更相為用而天下卒以不抗何者我能纍纍出兵不息而彼不能應我能外戰而內不乏食而彼必不戰而後食可足此二者管仲商鞅之深謀也自管仲死其遺謀舊䇿後世無復能用而獨其分兵與民之法遂至於今不廢何者其事誠有以便天下也今夫使農夫竭力以闢天下之地醵其所得以衣食天下之武士而免其死亡戰鬬之患此人之情誰不可者然當今天下之事與管仲商鞅之時則已大異矣古者霸王在上倉廪豐實百姓富足地利已盡而民未乏困當此之時謂之人有餘今天下之田疾耕不能遍而蓬蒿藜莠實盡其利人不得以為食而禽獸之所蕃息當是之時謂之地有餘古之聖人人有餘則務在於使人是以天下之人雖其甚蕃而舉無廢功地有餘則務在於闢地是以天下之地雖其甚寬而舉無遺力今也海內之田病於有餘而上之人務在於使人不已過哉臣觀京師之兵不下數十百萬沿邉大郡不下數萬人天下郡縣千人為輩而江淮漕運之卒不可勝計此亦已侈於使人矣且夫人不足而使人之制不為少減是謂逆天而違人昔齊桓之世人力可謂有餘矣而十五鄉之士不過三萬車不過八百乘何者懼不能久也方今天下之地所當厚兵之處不過京師與西邉北邉之郡耳昔者太祖太宗既平天下四方逺國或數千里以為逺人險詖未可以盡知其情也故使關中之士往而屯焉以鎮服其亂心及天下既安四海一家而因循久逺遂莫之變夫天下之兵莫如各居其鄉安其水土而習其險易而特病其不知戰故今世之患患在不教鄉兵而專任屯戍之士為抗賊之備且天下治平非沿邉之郡則山林匹夫之盜及其未集而誅之可以無事於大兵茍其有大盜則其為變故亦非戍兵數百千人之所能制若其要塞之地不可無備之處乃當厚其土兵以代之耳聞之古者良將之用兵不求其多而求其樂戰今之為兵之人夫豈皆樂乎為兵哉或者飢饉困躓不能以自存而或者年少無賴既入而不能以自脫蓋其間常有思歸者矣故臣欲罷其思歸之士以減屯戍之兵雖使去者大半臣以為處者猶可以足於事也蓋古者有餘則使之以寬而不足則使之以約茍必待其有餘而後能辦天下之事則無為貴智矣民政五蘇轍臣聞近代以來天下之變備矣世之君子隨其破敗而為之立法補苴缺漏疏剔棼穢其為法亦已盡矣而後世之弊常不為之少息其法既立而旋亡其民暫享其利而不能久因循維持至於今世承百王之弊而獨受其責其病最為繁多而古人已行之遺䇿又莫不盡廢而不舉是以為國百有餘年而不至於治平者由此之故也蓋天下之多虞其始自井田之亡田制一敗而民事大壞紛紛而不可止其始也兼并之民衆而貧民失職貧者無立錐之地而富者連阡陌以勢相役收大半之稅耕者窮餓而不耕者得食以為不便故從而為之法曰限民名田貴者無過若干而貧者足以自養此董生之法也天下之人兼并而有餘則思以為驕奢驕奢之風行於天下則富者至有破其資畜而貧者處於不若以爭為盜而不知厭民皆有為盜之心則為之上者甚危而難安故為之法曰立制而明等使多者不得過而少者無所慕也以平風俗此賈生之法也民之為性豐年則食之而無餘飢年則轉死於溝壑而莫之救富商大賈乘其不足而貴賣之以重其災因其有餘而賤取之以待其弊豫奪之柄歸於豪民而上不知收粒米狼戾而不為斂藜藿不繼而不為發故為之法曰賤而官為糴之以無傷農貴而官為發之以無傷末小飢則發小熟之斂中飢則發中熟之斂大飢則發大熟之斂此李悝之法也古者三代之兵出而為兵入而為農出兵臨敵則國有資糧之儲而兵罷役休則無復養兵之費及至後世海內多故而征伐不息以為害農故特設兵以辦天下之武事其始若不傷農者而要其終衣食之奉農亦必受其困故為之法曰不戰則耕以自養而耕之間暇則習為擊刺以待冦至此趙充國之法也蓋古之遺制其可以施於今者甚多而臣不敢復以為説而此四者皆天下之所共知而不行者也夫知之而不行此其故何歟臣聞事固有可以無術而行者有時異事變無術而不可行者均民以名田齊衆以立制是無術而可以直行者也平糴以救災屯田以寬農是無術而不可行者也古者賢君在上用度足而財不竭損其有餘以備民之所不足而不害於歲計今者歲入不足以為出國之經費猶有所不給而何暇及於未然之備古者將嚴而兵易使其兵安於劬勞故雖使為農而不敢亂今者天下之兵可使執勞者皆不知戰而可與戰者皆驕而不可使衣食豐溢而筋力疲憊且其平居自處甚倨而安肯為農夫之事乎故屯田平糴之利舉世以為不可復者由此之故也盍亦思其術矣臣嘗聞之賈人之治産也將欲有為而無以為資者不以其所以謀朝夕之利者為之也蓋取諸其不急之處而日蓄之徐徐而為之故其業不傷而事成夫天子之道食租衣稅其餘之取於民者亦非其正矣茶鹽酒鐵之類此近世之所設耳夫古之時未嘗有此四物者之用也而其為國亦無所乏絶臣愚以為可於其中擇取一焉而置之用度之外歲以為平糴之資且其既已置之用度之餘則不復有所顧惜而發之也輕發之也輕而後民獲其利其與今之所謂常平者亦已大異矣抑嘗聞之嘗已牧馬者不可使之畜豚彘馬彘之相去未能幾也而猶且不可使今世之兵以為兵募之而欲強之以為農此其不從固無足怪者今欲以兵屯田蓋亦告之以將屯田而募焉人固有無田以為農而願耕者從其願而使之則雖勞而無怨茍屯田之兵既多而可用則夫不耕而食者可因其死亡而勿復補以待其自衰矣嗟夫古之人其制天下之患其亦已略盡矣而其守法者常至於怠惰而不舉是以世之弊常若近起於今者而不求古之遺法而依之以為治可不大悲矣哉民政六蘇轍臣聞三代之時無兵役之憂降及近世有養兵之困而無興役之患至於今而養兵興役之事皆不得其當而可為之深憂蓋古者兵出於農而役出於民有農則不憂無兵而有民則不憂無役五口之家常有一人之兵而二十歲之男子歲有三日之役故其兵強而費不增役起而人素具雖有大兵大役而不憂事之不集至於兵罷役休而無日夜不息之費其後周衰井田破壞陵夷至於末世天下無復天子之田皆民之所自有天下之民不食天子之田是故獨賦其稅而不任之以死傷戰鬬之患天子有養兵之憂而天下無攻守劬勞之民以為大憂故調其財以為養兵之用而天下之役凡其所以轉輸漕運營建興築之事又皆出於民當此之時民之所以供上之令者三曰租曰調曰庸租者地之所當出調者兵之所當費庸者歲之所當役也故使之納粟於官以為田之租人入布帛以為兵之調歲役其力不役則出其力之所直以為役之庸此三者農夫皆兼為之而遊惰末作之民亦不免於庸調運重漕逺天子不知其費而一出於民民歲役二旬而不役者當帛六十尺民亦不至於大苦故隋唐之間有養兵之困而無興役之患此其為法雖不若三代之兵不待天子之養然天下之役猶有可賴者皆民為之也及其後世又不能守乃始變法而為兩稅以至於今大下非有田者不可得而使而有田者之役亦不過奔走之用而不與天子之大事天下有大興築有大漕運則常患無以為使故廣募冗兵以供力役之急不知擊刺戰陳之法而坐食天子之俸由是國有武備之兵而又有力役之兵此二者其所以奉養之具皆出於農也而四海之遊民無尺寸之庸調為農者常使陰出古者遊民之所入而天子亦常兼任養兵興役之大患故夫兵役之弊當今之世可謂極矣臣愚以為天子平日無事而養兵不息此其事出於不得已惟其干戈旗鼓之攻而後可使任其責至於力役之際挽車船築宫室造城郭此非有死亡陷敗之危天下之民誠所當任而不辭不至以纍兵革之人以重費天子之廪食然當今之所謂可役者不過曰農也而農已甚困蓋常使盡出天下之費矣而工商技巧之民與夫遊間無職之徒常遍天下優遊終日而無所役屬蓋周官之法民之無職事者出夫家之征今可使盡為近世之法皆出庸調之賦庸以養力役之兵而調以助農夫養武備之士而力役之兵可因其老疾死亡遂勿復補而使遊民之丁代任其役如期而止以除其庸之所當入而其不役者則亦收其庸不使一日而闕蓋聖人之於天下不惟重乎茍廉而無所求唯其能緩天下之所不給而節其太幸則雖有取而不害於為義今者雖能使遊民無勞苦嗟歎之聲而常使農夫獨任其困天下之人皆知為農之不便則相率而事於末末衆而農衰則天子之所獨任者愈少而不足於用故臣欲收遊民之庸調使天下無僥幸茍免之人而且以紓農夫之困茍天下之遊民自知不免於庸調之勞其勢不耕則無以供億其上此又可驅而歸之於南畝要之千歲之後必將使農夫衆多而工商之類漸以衰息如此而後使天下舉皆從租庸調之制而去夫所謂兩稅者而兵役之憂可以稍緩矣民政七蘇轍臣聞古者天下皆天子之人田畝之利衣食之用凡所以養生之具皆賴於天子權出於一而利不分於強族民有奉上之憂而無役屬附麗之困是以民德其上而舉天下皆可使奉天子之役使至於末世天子之地轉而歸於豪民而天下之遊民飢寒朝夕之柄天子不恤而以遺天下之富賈夫天子者豈與小民爭此尺寸之利也哉而其勢則有所不可何者民之有田者非皆躬耕之也而無田者為之耕無田者非有以屬於天子也而有田者拘之天子無田以豫之而欲役其力也實難有田者授之以田視之以奴僕而可使無憾故夫今之農者非天子之農而富人之農也至於天下之遊民販夫販婦工商技巧之族此雖無事乎田然日食其力而無以為朝夕之用則此亦將待人而生者也而天子不恤其闕乃使富民持其贏餘貸其所急以為之父母故雖遊民天子亦不可得而使而富者獨擅其利日役其力而不償其力之所直由此觀之則夫天下之民舉皆非天子之人而天子徒以位使之非皆得其歡心也夫天下之人獨有其田者乃使有以附屬於天子此其為衆豈足以當其下之仰給之民哉此亦足以見天子之所屬者已甚寡矣臣愚以為當今之勢宜收天下之田而歸之於上以業無田之農夫恤小民之所急而奪豪民假貸之利以收遊手之用故因其所便而為之計以為莫如收公田而貸民急夫陳蔡荆楚之地地廣而人少土皆公田而患無以耕之而吳越巴蜀之間拳肩側足以爭尋常尺寸之地安土重遷戀戀而不能去此非官為之畫䇿因其凶荒飢饉之歲乘其有願徙之心而遂徙之於不耕之公田則終不能以自去今欲待其已去而收其田畝籍其室廬田為公田室為公室以授無田之民使天下雖富庶之邦亦常有天子之田而又因其籍沒積而勿復鬻募天下之丁男使分耕其中而無使富民端坐而欲收公田之遺利使天下之農夫稍可以免僕𨽻之辱而得上麗於天子而其新徙之民耕牛室屋飲食器皿之類有所不備又皆得以貸於國可以無失其所夫所謂貸者雖其為名近於商賈市井之事然其為意不可以不察也天下之民無田以為農而又無財以為工商禁而勿貸則其勢不免轉死於溝壑而使富民為貸則有相君臣之心用不仁之法而收大半之息其不然者亦不免於脫衣避屋以為質民受其困而上不享其利徒使富民執豫奪之權以豪役鄉里故其勢莫如官貸以賙民之急周官之法使民之貸者與其有司辨其貴賤而以國服為息今可使郡縣盡貸而任之以其土著之民以防其逋逃竄伏之姦而一夫之貸無過若干春貸以斂繒帛夏貸以收秋實薄收其息而優之使之償之無難而又時免其息之所當入以收其心使民得脫於奴𨽻之中而獲自屬於天子如此則天下之遊民可得而使而富民之貸可以不禁而自息然臣以為收公田者其利逺非可以歲月之間而待其成也要之數十百年則天下之農夫可使大半皆天子之農若夫所謂貸民急者則可以朝行而夕獲其利此最當今之急務也民政八蘇轍臣聞古者建都立邑相其邱陵原隰而利其水泉之道通其所無而導其所有使民日取而不盡安居於中而無慕於外利各安其土樂其業無來去遷徙之心膏腴之鄉民不加多而貧瘠之處民不加少天下之戶平均若一皆足以供其郡縣之役使而無所乏困蓋今天下所謂通都大邑千里之城萬戶之郭其陰陽向背與其山林原隰之勢陂池泉水之利皆秦漢以來所謂創置摹畫使足以衣食其民而無乏絶者也臣嘗讀周詩公劉之一篇其言自戎遷豳之際登高望逺以求其可居之地與其可用之物莫不詳悉而曲盡其詩曰篤公劉逝彼百泉瞻彼溥原乃陟南岡乃觀於京篤公劉既溥既長既景乃岡相其陰陽觀其流泉篤公劉於豳斯館涉渭為亂取礪取煆夫古之君子居於其邦其欲知民之所利與器用之所出蓋如此其詳也及觀史記貨殖列傳郡國之所有東方之桑麻魚鹽南方之竹木魚稻與西方之五穀畜牧北方之棗栗裘馬則凡一方之所有皆可以備養生送死之具導之有方而取之有法則其民豐樂饒足老死而無憾及行天下覽其山林藪澤之所生與其民之所有往往與古不類夫自大江以北漢水之側三代之時列國數十楚人都於荆州其在戰國最為強大外抗羣蠻內禦泰晉常以其兵橫於天下計其所都安肯用瘠鹵墝埆之地而當今自楚之北至於唐鄧汝潁陳蔡許洛之間平田萬里農夫逃散不生五穀荆棘布野而地至肥壤泉源陂澤之迹迤邐猶在其民不知水耕之利而長吏又不以為意一遇水旱民乏菜茹往者因其死喪流亡廢縣罷鎮者蓋往往是矣臣聞善為政者不用甲兵不斥疆畍興利除害教民稼穡收斂倍稱而獲兼地之福今者舉千里之地廢之為墟以養禽獸而不甚顧惜此與私割地以豫人何異嘗聞之於野人自五代以來天下喪亂驅民為兵而唐鄧蔡汝之間故陂舊隄遂以堙廢而不治至今百有餘年其間猶未甚逺也蓋修敗補缺或亦旬月之故耳而獨患為吏者莫以為事若夫許州非有洪河大江之衝而每年盛夏衆水決溢無以救禦是以民常苦飢而不樂其俗夫許諸侯之故邦魏武之所都而唐節度之所治使歲輒被水而五穀不熟則其當時軍旅之費宗廟朝廷之用將何以供之此豈非近世之弊因循不治以至此哉然此乃特臣之所見而天下之廣又安能備知蓋嘗以為方今之患生於太怯而成於牽俗太怯則見利而不敢為牽俗則自顧而愛其身夫是以天下之事舉皆不成而何獨在此臣欲破其牽俗之風而壯其太怯之氣意凡天下貧窶破散之郡縣使皆擇善事能幹之人而往為之長因其去也而天子親諭以此使得稍久於其任而察其人民多田野闢者書以為課何者此非難辦之事是以不待非常之才而後能濟惟其弛放怠惰是以至此今誠少嚴其事使為吏者知上之屬意於此十歲之後臣以為此必為富壤之區而方今天下重任之處亦可漸減而取諸此矣民政九蘇轍臣聞天下有二病好戰則財竭而民貧畏戰則多辱而無威欲民之無貧則無疾夫無威欲君之無辱則無望乎財之不竭此二患者天下未嘗兼有也古之人君各從其所安而處其偏是以不獲全享其利而亦未嘗兼受其病者昔胸奴之於漢可以見矣文景之世天下治安民至老死不知征役之勞府庫盈溢其賦於民者三十而取一可謂至盛矣然而胸奴傲慢侵侮至甚不遜輸金繒納錦繡天子之至辱也而文景不以為意以求全其民至於武帝不忍數世之忿盡天下之鋭而攻之闢地千里斬馘百萬胸奴之民死者大半洗除先帝之宿恥而夸大中國之氣得志滿意無以加矣而內自疲弊中民之家大抵皆破無復千金之戶此二者皆有所就其成功是以有所忍而不顧而智者之論已謂非中國之長算矣今者中國之弊在於畏戰畏戰固多辱矣而民又不免於貧無就其利而偏被其害重賦厚斂以為二邉之賂國辱而民困蓋今世之病已極矣賢人君子竭其智慮以求安其民而常為敵兵之所擾天子欲使其澤下布四海而海內常為夷狄之所困此其弊蓋有原矣二邉之賂不絶是以天下之賦斂雖知其甚重而不可輕天下之賦斂甚重而不可輕是以天下之民雖知其甚困而不可得而安也故臣於民政之終而特備論其要云蓋方今天下之議莫不以為二邉之賂不可去也獨其勇者則曰寧戰而無賂戰未必敗而賂必至於乏困臣竊以為此古之漢武帝唐太宗堅忍而不顧者足以行之然亦有所犯天下之至危何者吾民之不戰久矣用不戰之民而待必戰之敵竊恐世俗之難之也夫古者霸王之臣因敗而成功轉禍而為福若反覆手之間耳桓公見脅於曹沫欲背其盟管仲因而信之以自結於諸侯桓公襲蔡本以誅少姬之罪管仲因而伐楚責包茅之不入而諸侯大服臣竊韙之方今二邊之賂雖有所不得已而然者然其勢偶有似夫戰國之際以謀相傾而陰相潰者是故臣欲因而成之以潛破二冦之國古語有之曰將欲取之必固豫之昔者晉之取虞越之取吳冒頓之取東胡石勒之取王浚此四者皆其豫之之力也夫鄰國之患唯其相忌而相伺以不敢相易是以其慮詳密而難圖今夫中國之不競亦已久矣彼其相視以為無能為者非一日也然猶未肯釋然而無疑夫惟釋然而無疑而後其國可取今吾猶有所齟齬於其間彼以吾為猶有不服之心是以君臣相視而未敢懈蓋古之英雄能忍一朝之恥而全百世之利臣以為當今之計禮之當加恭待之當加厚使者之往無求以言勝之而其使之來者亦無求以言犯之凡皆務以無逆其心而陰惰其志使之深樂於吾之賄賂而意不在我而吾亦自治於內搜兵揀馬擇其精鋭而損其數以外見至弱之形而內收至強之實作內政以寓軍令凡皆務以自損吾強大之勢而見吾衰弱之狀使之安然無所顧忌而益以怠傲不過數年彼日以無備而吾日以充實彼猶將以吾為不足與也而有無厭之求彼怠而吾奮彼驕而吾怒及此而與之戰此所謂敗中之勝而弱中之強者也嗟夫方今之事其勢亦有二而已矣能奮一朝之勞而盡力以攻之則其後可以大安而其始也不免有歲月之勤能忍一朝之辱而自損以驕之則其後可以驟勝而其始也不免有歲月之恥此二䇿者皆足以謀人之國敗人之兵而有勝矣而臣竊謂今世之所安者必其豫之而驕之者也嗟夫智能攻之則以洗天下之大慚不能攻之則驕之而圖其後未有不能攻之又不能驕之而拱手以望其成功者方今每歲委百萬之資以豫人而不能使人無疑其有不服之心罄竭四海而其終不能以成事特幸其一時之安而欲得其間隙之際以治天下天下安可得而治哉民政十蘇轍臣聞禦戎有二道屯兵以待其來出兵以乘其弊方今二邉固嘗已屯重兵矣而天下之議以為中國之兵無由而出而臣以為不然何者斂天下之財以奉敵兵彼求之無厭則吾之應之將有所不稱其意大抵不過數十年之間用兵之釁不發於彼之不悅則發於吾之不忍此亦其勢之不可逃者也方其無事之時中國既不得不畜兵於邉而及其有間又必將出兵而乘其弊此二者不可不素為之所也今每歲發郡縣之兵以戍邉此其未戰之謀也而臣未知其所以為戰之術臣聞古者三代之制未有戍邉之役六國之際燕趙最被邉患而當其時西備秦東備齊南備楚內備韓魏千里之國而其四境莫不皆有所備則其所以備胡者安得戍卒而用之計亦不過其沿邉之民自為卒伍以制其侵略而已戍邉之謀始於秦漢內無敵國之虞而郡縣之兵材官蹶張皆出於民之為役其法月為更卒已復為正一歲屯戍以次相氶而迭相更代邉鄙之民不可使常為兵是以不得不驅中原之民而納之塞下以捍冦賊故其戍邉之兵歲初而來歲終而去寒暑不相安險易不相習勇怯不相程志氣不相企上無顧於墳墓而下無愛於妻子平居憂愁無聊無樂土之心而緩急茍免無死戰之意不可盡得其用古之謀臣鼂錯陸贄之徒蓋嘗以為言矣而况乎今世之兵皆天子之所廪食以終其身在秦則廪於秦在趙則廪於趙不可一日而闕非如漢之戍卒尚有休罷更代之期也然猶守此區區既往之陳迹豈不惑哉且舉中原之士而屯之於邉雖無死傷戰鬬之患而其心常自以為出征行役苦寒暴露為國勞苦凡國家之所以美衣豐食以養我者止為此等事也故士卒百萬端坐而食不知行陳之勞不見鋒刃之危而皆已自負以為有勞於國其勢不可有所復使此其弊在於使之不得其道耳今夫陰伺二虜之怠而出兵以逐利於塞外此誠今世之至計也而臣竊恐緩急之際士卒皆已自負而不可用且夫人之情嘗已用其力則其心自滿而不復求報其上士無求報之心則不可以與之犯大難而涉大勞惟其飽食而無所試優遊無為以觀夫人之成功而不得自效者則其氣剛鋭而其心不倦古之善用兵者惟能及其心之未倦而用其鋭氣是以其兵無敵於天下臣愚以為方今之計內郡之兵當常在內而不以戍邉戍邉之兵當常戍邉而不待內郡之戍卒募內郡之兵其樂徙邉者而稍厚之不足則募民之樂為邉兵者以足之使二邉有一定不遷之兵而頗損內郡之衆計其內外之數相通如舊而止平居無事以此備邉而一旦欲有所攻奪掩襲則獨發內郡之卒使二者各思致其勇力以報其上鋭而用之惰而置之屯兵歷年而士無所怨其勞出兵千里而士無所憾其逺兵入則出者得以休息而無乘塞之苦兵出則守者間暇而無行役之困交相為用如循環之無端而不可竭此其與今世之法竭天下以養兵守亦使此戰亦使此未戰而士卒皆怠者其亦少異矣文編卷四十四

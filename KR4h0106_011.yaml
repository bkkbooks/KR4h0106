body:
  text: 文編卷十一明唐順之編蘇代遺燕王書國䇿齊伐宋宋急蘇代乃遺燕昭王書曰夫列在萬乘而寄質于齊名卑而權輕奉齊助之伐宋民勞而實費破宋殘楚淮北肥大齊讐強而國弱也此三者皆國之大敗也而足下行之將欲以除害取信于齊也而齊未加信于足下而忌燕也愈甚矣然則足下之事齊也失所為矣夫民勞而實費又亡尺寸之功破宋肥讐而世負其禍矣足下以宋加淮北強萬乘之國也而齊并之是益一齊也北夷方土百里加之以魯衛此所謂強萬乘之國也而齊并之是益二齊也夫一齊之強而燕猶不能支也今乃以三齊臨燕其禍必大矣雖然臣聞智者之舉事也轉禍而為福因敗而成功者也齊人紫敗素也而賈十倍越王勾踐棲于會稽而後殘吳霸天下此皆轉禍而為福因敗而為功者也今王若欲轉禍而為福因敗而為功乎則莫如遙霸齊而厚尊之使之盟于周室盡焚天下之秦符約曰夫上計破秦其次長賔客秦秦挾賔客以待破秦王必患之秦五世以結諸侯今為齊下秦王之志茍得窮齊不憚以一國都為功然而王何不使布衣之人以窮齊之説説秦謂秦王曰燕趙破宋肥齊尊齊而為之下者燕趙非利之也弗利而勢為之者何也以不信秦王也今王何不使可以信者接收燕趙令涇陽君若高陵君先於燕趙秦有變因以為質則燕趙信秦矣秦為西帝趙為中帝燕為北帝立為三帝而令諸侯韓魏不聽則秦伐之齊不聽則燕趙伐之天下孰敢不聽天下服聽因驅韓魏以攻齊曰必反宋地而歸楚之淮北夫反宋地而歸楚之淮北燕趙之所同利也並立三帝燕趙之所同願也夫實得所利名得所願則燕趙之棄齊也猶釋敝屣今王之不收燕趙則齊霸必成矣諸侯戴齊而王獨弗從也是國伐也諸侯戴齊而王從之是名卑也王不收燕趙名卑而國危王收燕趙名尊而國寧夫去尊寧而就卑危智者不為也秦王聞若説也必如刺心然則王何不務使智士以若此言説秦伐齊必矣夫取秦上交也伐齊正利也尊上交務正利聖王之事也燕昭王善其書曰先人嘗有德蘇氏子之之亂而蘇氏去燕燕欲報讐仇於齊非蘇氏莫可乃召蘇氏復善待之與謀伐齊竟破齊閔王出走蘇代約燕昭王書國䇿秦召燕王燕王欲往蘇代約燕王曰楚得枳而國亡齊得宋而國亡齊楚不得以有枳宋事秦者何也是則有功者秦之深讐也秦取天下非行義也暴也秦之行暴正告天下告楚曰蜀地之甲輕舟浮于汶乘夏水而下江五日而至郢漢中之甲輕舟出于巴乘夏水下漢四日而至五渚寡人積甲宛東下隨智者不及謀勇者不及怒寡人如射隼矣王乃待天下之攻函谷不亦逺乎楚王為是之故十七年事秦秦正告韓曰我起乎少曲一日而斷太行我起乎宜陽而觸平陽二日而莫不盡繇我離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女戟韓氏太原卷下軹道道南陽封冀兼包兩周乘夏水浮輕舟強弩在前銛戟在後決滎口魏亡大梁決白馬之口魏亡濟陽決宿胥之口魏亡虛頓丘陸攻則擊河內水攻則滅大梁魏以為然故事秦秦欲攻安邑恐齊據之則以宋委于齊曰宋王亡道為木人以象寡人射其面寡人地絶兵遠不能攻也王茍能破宋有之寡人如自得之已得安邑塞女戟因以破宋為齊罪秦欲攻韓恐天下救之則以齊委于天下曰齊人四與寡人約四欺寡人必率天下以攻寡人者三有齊無秦無齊有秦必伐之必亡之已得宜陽少曲致藺離石因以破齊為天下罪秦欲攻魏重楚則以南陽委於楚曰寡人固與韓且絶矣殘均陵塞黽隘茍利于楚寡人如自有之魏棄與國而合於秦因以塞黽隘為楚罪兵困于林中重燕趙以膠東委于燕以濟西委于趙已得講於魏質公子延因犀首攻趙兵傷于離石遇敗于馬陵而重魏則以葉蔡委于魏已得講于趙則劫魏魏不為割困則使太后穰侯為和贏則兼欺舅與母適燕者曰以膠東適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞鄳厄適齊者曰以宋必令其言如循環用兵如刺蜚母不能知舅不能約龍賈之戰岸門之戰封陵之戰高商之戰趙莊之戰秦之所殺三晉之民數百萬今其生者皆死秦之孤也西河之外上雒之地三川晉國之禍三晉之半秦禍如此其大而燕趙之秦者皆以爭事秦説其主此臣之所大患燕昭王不行蘇代復重于燕燕反約從親如蘇秦時或從或否而天下由此宗蘇氏之從約代厲皆以夀死名顯諸侯枚乘奏吳王書漢書臣聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十户之聚以王諸侯湯武之土不過百里上不絶三光之明下不傷百姓之心者有王術也故父子之道天性也忠臣不避重誅以直諌則事亡遺策功流萬世臣乘願披腹心而效愚忠惟大王少加意念惻怛之心於臣乘言夫以一縷之任繫千鈞之重上縣無極之高下垂不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之繫方絶又重鎮之繫絶於天不可復結隊入深淵難以復出其出不出間不容髮能聽忠臣之言百舉必脫必若所欲為危於絫卵難于上天變所欲為易於反掌安于泰山今欲極天命之壽敝亡窮之樂究萬乘之藝不出反掌之易以居泰山之安而欲乘絫卵之危走上天之難此愚臣之所大惑也人性有畏其景而惡其迹者却背而走迹逾多景愈疾不知就隂而止景滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之滄一人炊之百人揚之亡益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪而救火也養由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣然其所止乃百步之內耳比於臣乘未知操弓持矢也福生有基禍生有胎納其基絶其胎禍自何來泰山之霤穿石單極之綆斷幹水非石之鑽索非木之鋸漸靡便之然也夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失夫十圍之木始生如蘖足可搔而絶手可擢而拔據其未生先其未形也磨礱底厲不見其損有時而盡種樹畜養不見其益有時而大積德纍行不知其善有時而用棄義背理不知其惡有時而亡臣願大王熟計而身行之此百世不易之道也鄒陽諫吳王書漢書臣聞秦倚曲臺之宫懸衡天下畫地而人不犯兵加胡越至其晚節末路張耳陳勝連從兵之據以叩函谷咸陽遂危何則列郡不相親萬室不相救也今胡數涉北河之外上覆飛鳥下不見伏鬭城不休救兵不至死者相隨輦車相屬轉粟流輸千里不絶何則強趙責于河間六齊望于惠后城陽顧於盧博三淮南之心思墳墓大王不憂臣恐救兵之不專胡馬遂進窺于邯鄲越水長沙還舟青陽雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國敵亦益進越亦益深此臣之所為大王患也臣聞蛟龍襄首奮翼則浮雲出遊霧雨咸集聖王底節修德則遊談之士歸義思名今臣盡智畢議易精極慮則無國不可姦飾固陋之心則何王之門不可曳長裾乎然臣所以厯數王之朝背淮千里而自致者非惡臣國而樂吳民也竊高下風之行尤説大王之義故願大王之亡忽察聽其至臣聞鷙鳥纍百不如一鶚夫全趙之時武力鼎士袨服叢臺之下者一旦成市而不能止幽王之湛患淮南連山東之俠死士盈朝不能還厲王之西也然則計議不得雖諸賁不能安其位亦明矣故願大王審畫而已始孝文皇帝據關入立寒心銷志不明求衣自立天子之後使東牟朱虛東褒儀父之後深割嬰兒王之壤子王梁代益以淮陽卒仆濟北囚弟于雍者豈非象新垣平等哉今天子新據先帝之遺業左規山東右制關中變權易藝大臣難知大王弗察臣恐周鼎復起于漢新垣過計于朝則我吳遺嗣不可期於世矣高皇帝燒棧道灌章邯兵不留行收敝民之倦東馳函谷西楚大破水攻則章邯以亡其城陸擊則荆王以失其地此皆國家之不幾者也願大王熟察之鄒陽獄中上梁王書漢書臣聞忠無不報信不見疑臣常以為然徒虛語耳昔荆軻慕燕丹之義白虹貫日太子畏之衛先生為秦畫長平之事太白食昴昭王疑之夫精變天地而信不諭兩主豈不哀哉今臣盡忠竭誠畢義願知左右不明卒從吏訊為世所疑是使荆軻衛先生復起而燕秦不寤也願大臣熟察之昔玉人獻寶楚王誅之李斯竭忠胡亥極刑是以箕子佯狂接輿避世恐遭此患也願大王察玉人李斯之意而後楚王胡亥之聽毋使臣為箕子接輿所笑臣聞此干剖心子胥鴟夷臣始不信乃今知之願大王熟察少加憐焉語曰有白頭如新傾蓋如故何則知與不知也故樊於期逃秦之燕藉荆軻首以奉丹事王奢去齊之魏臨城自剄以郤齊而存魏夫王奢樊於期非新於齊秦而故於燕魏也所以去二國死兩君者行合於志慕義亡窮也是以蘇秦不信於天下為燕尾生白圭戰亡六城為魏取中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劒而怒食以駃騠白圭顯于中山人惡之魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉故女亡美惡入宫見妒士亡賢不肖入朝見嫉昔司馬喜臏腳于宋卒相中山范雎拉脅折齒于魏卒為應侯此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免于嫉妒之人也是以申徒狄蹈雍之河徐衍負石入海不容于世義不茍取比周於朝以移主上之心故百里奚乞于道路繆公委之以政寧戚飯牛車下桓公任之以國此二人者豈素宦于朝借譽于左右然後二主用之哉感于心合于行堅如膠漆昆弟不能離豈惑於衆口哉故偏聽生姦獨任成亂昔魯聽季孫之説逐孔子宋任子冉之計囚墨翟夫以孔墨之辨不能自免于讒諛而二國以危何則衆口鑠金積毁銷骨也秦用戎人由余而霸中國齊用越人子臧而強威宣此二國豈拘于俗牽于世係奇偏之辭哉公聽並觀垂明當世故意合則秦越為兄弟由余子臧是矣不合則骨肉為讐敵朱象管蔡是矣今人主誠能用齊秦之明後魯宋之聽則五霸不足侔而三王易為也是以聖王覺寤捐子之之心而不悅田常之賢封比干之後修孕婦之墓故功業覆於天下何則欲善亡厭也夫晉文親其讐強霸諸侯齊桓用其仇而一匡天下何則慈仁殷勤誠嘉於心不可以虛辭借也至夫秦用商鞅之法東弱韓魏立強天下卒車裂之越用大夫種之謀禽徑吳而霸中國遂誅其身是以叔孫敖三去相而不悔於陵仲子辭三公為人灌園今人主誠能去驕傲之心懷可報之意披心腹見情素墮肝膽施厚德終與之窮達亡愛於士則桀之犬可使吠堯跖之客可使刺由何况因萬乘之權假聖王之資乎然則荆軻湛七族要離燔妻子豈足為大王道哉臣聞明月之珠夜光之璧以暗投人於道衆莫不按劍相眄者何則無因而至前也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也故無因而至前雖出隋珠和璧祗結怨而不見德有人先遊則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨懷龍逢比干之意而素亡根柢之容雖竭精神欲開忠于當世之君則人主必襲按劍相眄之迹矣是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽乎卑辭之語不奪乎衆多之口故秦皇帝任中庶子蒙嘉之言以信荆軻而匕首竊發周文王獵涇渭載吕尚歸以王天下秦信左右而亡周用烏集而王何則以其能越拘攣之語馳域外之議獨觀乎昭曠之道也今人主沈諂諛之辭牽帷牆之制使不羈之士與牛驥同皂此鮑焦所以憤于世也臣聞盛飾入朝者不以私汚義底厲名號者不以利傷行故里名勝母曾子不入邑號朝歌墨子回車今欲使天下廖廓之士籠於威重之權脅於位勢之貴回面污行以事諂諛之人而求親近于左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉文編卷十一

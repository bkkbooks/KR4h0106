body:
  text: 文編卷四十六明唐順之編與髙司諫書歐陽修修頓首載拜白司諫足下某年十七時家隨州見天聖二年進士及第榜始識足下姓名是時豫年少未與人接又居遠方但聞今宋舍人兄弟與葉道卿鄭天休數人者以文學大有名號稱得人而足下厠其間獨無卓卓可道説者豫固疑足下不知何如人也其後更十一年豫再至京師足下巳為御史裏行然猶未暇一識足下之面但時時於豫友尹師魯問足下之賢否而師魯説足下正直有學問君子人也豫猶疑之夫正直者不可屈曲有學問者必能辨是非以不可屈之節有能辨是非之明又為言事之官而俯仰默默無異衆人是果賢者耶此不得使豫之不疑也自足下為諫官來始得相識侃然正色論前世事歷歷可聽褒貶是非無一謬説噫持此辨以示人孰不愛之雖豫亦疑足下真君子也是豫自聞足下之名及相識凡十有四年而三疑之今者推其實迹而較之然後決知足下非君子也前日范希文貶官後與足下相見於安道家足下詆誚希文為人豫始聞之疑是戲言及見師魯亦説足下深非希文所為然後其疑遂決希文平生剛正好學通古今其立朝有本末天下所共知今又以言事觸宰相得罪足下既不能為辨其非辜又畏有識者之責已遂隨而詆之以為當黜是可怪也夫人之性剛果懦軟稟之於天不可勉強雖聖人亦不以不能責人之必能今足下家有老母身惜官位懼飢寒而顧利祿不敢一忤宰相以近刑禍此乃庸人之常情不過作一不才諫官爾雖朝廷君子亦將閔足下之不能而不責以必能也今乃不然反昻然自得了無愧畏便毁其賢以為當黜庶乎飾已不言之過夫力所不敢為乃愚者之不逮以智文其過此君子之賊也且希文果不賢邪自三四年來從大理寺丞至前行員外郎作待制日日備顧問今班行中無與比者是天子驟用不賢之人夫使天子待不賢以為賢是聰明有所未盡足下身為司諫乃耳目之官當其驟用時何不一為天子辨其不賢反默默無一語待其自敗然後隨而非之若果賢耶則今日天子與宰相以忤意逐賢人足下不得不言是則足下以希文為賢亦不免責以為不賢亦不免責大抵罪在默默爾昔漢殺蕭望之與王章計其當時之議必不肯明言殺賢者也必以石顯王鳳為忠臣望之與章為不賢而被罪也今足下視石顯王鳳果忠耶望之與章果不賢邪當時亦有諫臣必不肯自言畏禍而不諫亦必曰當誅而不足諫也今足下視之果當誅邪是直可欺當時之人而不可欺後世也今足下又欲欺今人而不懼後世之不可欺邪况今之人未可欺也伏以今皇帝即位以來進用諫臣容納言論如曹修古劉越雖歿猶被褒稱今希文與孔道輔皆自諫諍擢用足下幸生此時遇納諫之聖主如此猶不敢一言何也前日又聞御史臺榜朝堂戒百官不得越職言事是可言者惟諫臣爾若足下又遂不言是天下無得言者也足下在其位而不言便當去之無妨他人之堪其任者也昨日安道貶官師魯待罪足下猶能以面目見士大夫出入朝中稱諫官是足下不復知人間有羞恥事爾所可惜者聖朝有事諫官不言而使他人言之書在史册他日為朝廷羞者足下也春秋之法責賢者備今某區區猶望足下之能一言者不忍便絶足下而不以賢者責也若猶以謂希文不賢而當逐則豫今所言如此乃是朋邪之人爾願足下直擕此書於朝使正豫罪而誅之使天下皆釋然知希文之當逐亦諫臣之一效也前日足下在安道家召豫往論希文之事時坐有他客不能盡所懷故輒布區區伏惟幸察不宣修再拜上杜中丞論舉官書歐陽修具官修謹齋沐拜書中丞執事修前伏見舉南京留守推官石介為主簿近者聞介以上書論赦被罷而臺中因舉他吏代介者主簿於臺職最卑介一賤士也用不用當否未足害政然可惜者中丞之舉動也介為人剛果有氣節力學善辨是非真好義之士也始執事舉其材議者咸曰知人之明今聞其罷皆謂赦乃天子已行之令非疏賤當有説以此罪介曰當罷修獨以為不然然不知介果指何事而言也傳者皆云介之所論謂朱梁劉漢不當求其後裔爾若止此一事則介不為過也然又不知執事以介為是為非也若隨以為非是大不可也且主簿於臺中非言事之官然大抵居臺中者必以正直剛明不畏避為稱職今介足未履臺門之閾而已因言事見罷真可謂正直剛明不畏避矣度介之才不止為主簿直可任御史也是執事有知人之明而介不負執事之知矣修嘗聞長老説趙中令相太祖皇帝也嘗為某事擇官中令列二臣姓名以進太祖不肯用他日又問復以進又不用他日又問復以進太祖大怒裂其奏擲殿階上中令色不動插笏帶間徐拾碎紙袖歸中書他日又問則補綴之復以進太祖大悟終用二臣者彼之敢爾者蓋先審知其人之可用然後果而不可易也今執事之舉介也亦先審知其可舉邪是偶舉之也若知而舉則不可遽止若偶舉之猶宜一請介之所言辨其是非而後已若介雖忤上而言是也當助以辨若其言非也猶宜曰所舉者為主簿爾非言事也待為主簿不任職則可罷請以此辭焉可也且中丞為天子司直之臣上雖好之其人不肖則當彈而去之上雖惡之其人賢則當舉而申之非謂隨時好惡而髙下者也今備官之臣百十邪者正者其糾舉一信於臺臣而執事始舉介曰能朝廷信而將用之及以為不能則亦曰不能是執事自信猶不果若遂言他事何敢望天子之取信於執事哉况今斥介而他舉必亦擇賢而舉也夫賢者固好辨若舉而入臺又有言則又斥而他舉乎如此則必得愚暗懦默者而後止也伏惟執事如欲舉愚者則豈敢復云若將舉賢也願無易介而他取也今世之官兼御史者例不與臺事故敢布狂言竊獻門下伏惟幸察焉上范司諫書歐陽修月日具官謹齋沐拜書司諫學士執事前月中得進奏吏報云自陳州召至闕拜司諫即欲為一書以賀多事匆卒未能也司諫七品官爾於執事得之不為喜而獨區區欲一賀者誠以諫官者天下之得失一時之公議繫焉今世之官自九卿百執事外至一郡縣吏非無貴官大職可以行其道也然縣越其封郡逾其境雖賢守長不得行以其有守也吏部之官不得理兵部鴻臚之卿不得理光祿以其有司也若天下之失得生民之利害社稷之大計惟所見聞而不繫職司者獨宰相可行之諫官可言之爾故士學古懷道者仕於時不得為宰相必為諫官諫官雖卑與宰相等天子曰不可宰相曰可天子曰然宰相曰不然坐乎廟堂之上與天子相可否者宰相也天子曰是諫官曰非天子曰必行諫官曰必不可行立殿陛之前與天子爭是非者諫官也宰相尊行其道諫官卑行其言言行道亦行也九卿百司郡縣之吏守一職者任一職之責宰相諫官繫天下之事亦任天下之責然宰相九卿而下失職者受責於有司諫官之失職也取譏於君子有司之法行乎一時君子之譏著之簡册而昭明埀之百世而不泯甚可懼也夫七品之官任天下之責懼百世之譏豈不重邪非材且賢者不能為也近執事始被召於陳州洛之士大夫相與語曰我識范君知其材也其來不為御史必為諫官及命下果然則又相與語曰我識范君知其賢也他日聞有立天子陛下直辭正色面爭庭論者非他人必范君也拜命以來翹首企足佇乎有聞而卒未也竊惑之豈洛之士大夫能料於前而不能料於後也將執事有待而為也昔韓退之作諍臣論以譏陽城不能極諫卒以諫顯人皆謂城之不諫蓋有待而然退之不識其意而妄譏修獨以謂不然當退之作論時城為諫議大夫已五年後又二年始庭論陸贄及沮裴延齡作相欲裂其麻才兩事爾當德宗時可謂多事矣授受失宜叛將強臣羅列天下又多猜忌進任小人於此之時豈無一事可言而須七年耶當時之事豈無急於沮延齡論陸贄兩事也謂宜朝拜官而夕奏疏也幸而城為諫官七年適遇延齡陸贄事一諫而罷以塞其責向使止五年六年而遂遷司業是終無一言而去也何所取哉今之居官者率三嵗而一遷或一二嵗甚者半嵗而遷也此又非更可以待乎七年也今天子躬親庶政化理清明雖為無事然自千里詔執事而拜是官者豈不欲聞正議而樂讜言乎然今未聞有所言説使天下知朝廷有正士而彰吾君有納諫之明也夫布衣韋帶之士窮居草茅坐誦書史常恨不見用及用也又曰彼非我職不敢言或曰我位猶卑不得言得言矣又曰我有待是終無一人言也可不惜哉伏惟執事思天子所以見用之意懼君子百世之譏一陳昌言以塞重望且解洛之士大夫之惑則幸甚幸甚上田正言第一書王安石正言執事某五月還家八月抵官每欲介西北之郵布一書道區區之懷輒以事廢揚東南之吭也舟輿至自汴者日十百數因得問汴事與執事息耗甚詳其間薦紳道執事介然立朝無所跛倚甚盛甚盛顧猶有疑執事者雖某亦然某之學也執事誨之進也執事奬之執事知某不為淺矣有疑焉不以聞何以償執事之知哉初執事坐殿廡下對方正策指斥天下利害奮不諱忌且曰願陛下行之無使天下謂制科為進取一塗耳方此時窺執事意豈若今所謂舉方正者獵取名位而已哉蓋曰行其志云爾今聯諫官朝夕耳目天子行事即一切是非無不可言者欲行其志宜莫若此時國之疵民之病亦多矣執事亦抵職之日久矣向之所謂疵者今或痤然若不可治矣向之所謂病者今或痼然若不可起矣曽未聞執事建一言寤主上也何向者指斥之切而今之疏也豈向之利於言而今之言不利耶豈不免若今之所謂舉方正者獵取名位而已耶人之疑執事者以此為執事解者或造辟而言詭辭而出疏賤之人奚遽知其微哉是不然矣傳所謂造辟而言者乃其言則不可得而聞也其言之效則天下斯見之矣今國之疵民之病有滋而無損焉烏所謂言之效耶復有為執事解者曰蓋造辟而言之矣如不用何是又不然臣之事君三諫不從則去之禮也執事對策時常用是著於篇今言之而不從亦當不翅三矣雖惓惓之義未能自去孟子不云乎有言責者不得其言則去盍亦辭其言責邪執事不能自免於疑也必矣雖堅強之辨不能為執事解也乃如某之愚則願執事不矜寵利不憚誅責一為天下昌言以寤主上起民之病治國之疵蹇蹇一心如對策時則人之疑不解自判矣惟執事念之如其不然願賜教答不宣上田正言第二書王安石某聞公卿大夫才名與寵兼盛於世必有大功以宜之否則君子撝之執事姿略頴然出常士之表應進士中甲科舉方正為第一將朝車通舉刺史事又陳善策得璽書召名與寵不巳兼盛於世邪所未較著者功爾本朝太祖武靖天下真宗文持之今上接祖宗之成兵不釋翳者蓋數十年近世無有也所當設張之具猶若闕然重以羌酋梗邊主上方覽衆策以濟之天下舉首戴目屬心執事者難以一二計為執事議者曰朝廷藉不吾以宜且自贊以植顯效酬天下屬巳之意矧上惓惓然命之乎此固策大功之會也抑聞之嶢嶢者易缺皎皎者易汙執事才名與寵可謂易汙易缺者必若策大功適足宜之而已可無茂邪恭惟旦暮輔佐天子秉國事修所當設張之具復邊人於安稱主上所以命之之意使天下舉首戴目者盈其願而退則後世之書可勝傳哉董仲舒有是才名顧不獲此寵公孫季有此寵不成此功有此寵而成此功者宜在執事不宜在他草鄙之人不逹大誼辱奬訓之厚敢不盡愚上蔡學士書曽鞏慶厯四年五月日南豐曽鞏謹再拜上書諫院學士執事朝廷自更兩府諫官來言事者皆為天下賀得人而已賀之誠當也顧不賀則不可乎鞏常靜思天下之事矣以天子而行聖人之道不古聖賢然者否也然而古今難之者豈無異焉邪人以不已利也則怨庸人以已不及也則忌怨且忌則造飾以行其間人主不寤其然則賢者必疏而殆矣故聖賢之道往往而不行也東漢之末是已今主上至聖雖有庸人邪人將不入其間然今日兩府諫官之所陳上已盡白而信邪抑未然邪其已盡白而信也尚懼其造之未深臨事而差也其未盡白而信也則當屢進而陳之待其盡白而信造之深臨事而不差而後已也成此美者其不在於諫官乎古之制善矣夫天子之所尊而聽者宰相也然接之有時不得數且久矣惟諫官隨宰相入奏事已奏宰相退歸中書蓋常然矣至於諫官出入言動相綴接蚤暮相親未聞其當退也如此則事之失得蚤思之不待暮而以言可也暮思之不待越宿而以言可也不諭則極辨之可也屢進而陳之宜莫若此之詳且實也雖有邪人庸人不得而間焉故曰成此美者其不在於諫官乎今諫官之見也有間矣其不能朝夕上下議亦明矣禁中之與居女婦而已爾捨是則寺人而已爾庸人邪人而已爾其於冥冥之間議論之際豈不易行其間哉如此則鞏見今日兩府諫官之危而未見國家天下之安也度執事亦巳念之矣茍念之則在使諫官侍臣復其職而已安有不得其職而在其位者歟噫自漢降戾後世士之盛未有若唐也自唐太宗降戾後世士之盛亦未有若今也唐太宗有士之盛而能成治功今有士之盛能行其道則前數百年之弊無不除也否則後數百年之患將又興也可不為深念乎鞏生於逺厄於無衣食以事親今又將集於鄉學當聖賢之時不得抵京師而一言故敢布於執事并書所作通論雜文一編以獻伏惟執事莊士也不拒人之言者也願賜觀覽以其意少施焉鞏之友王安石者文甚古行稱其文雖已得科名然居今知安石者尚少也彼誠自重不願知於人然如此人古今不常有如今時所急雖無常人千萬不害也顧如安石此不可失也執事倘進之於朝廷其有補於天下亦書其所為文一編進左右庶知鞏之非妄也上歐蔡書曾鞏鞏少讀唐書及正觀政要見魏鄭公王圭之徒在太宗左右事之大小無不議論諫諍當時邪人庸人相參者少雖有如封倫李義府輩太宗又能識而疏之故其言無不信聽卒能成正觀太平刑置不以居成康上未嘗不反復欣慕繼以嗟唶以謂三代君臣不知曽有如此周旋議論否雖臯陶禹稷與唐舜上下謀謨載於書者亦未有若此委曲備具頗意三代唐舜去時逺其時雖有謀議如正觀間或尚過之而其史不盡存故於今無所聞見是不可知所不敢臆定繇漢以降至於陳隋復繇髙宗以降至於五代其史甚完其君無如此謀議決也故其治皆出正觀下理勢然爾竊自恨不幸不生於其時親見其事歌頌推説以飽足其心又恨不得升降進退於其間與之往復議也自長以來則好問當世事所見聞士大夫不少人人惟一以茍且畏愼隂拱默處為故未嘗有一人見當世事僅計謀有未可立效者其誰肯奮然迎為之慮而已當之邪則又謂所欣慕者已矣類千百年間不可復及昨者天子赫然獨見於萬世之表既更兩府復引二公為諫官見所條下及四方人所傳道知二公在上左右為上論治亂得失羣臣忠邪小大無所隱不為錙銖計惜以避怨忌毁罵讒搆之患竊又奮起以謂從古以來有言責者自任其事未知有如此周詳悃至議論未知有如此之多者否雖鄭公王圭又能過是耶今雖事不合亦足暴之萬世而使邪者懼懦者有所樹矣况合乎否未可必也不知所謂數百千年已矣不可復有者今幸遇而見之其心歡喜震動不可比説日夜庶幾雖有邪人庸人如封李者上必斥而逺之惟二公之聽致今日之治居正觀之上令鞏小者得歌頌推説以飽足其心大者得出於其間吐片言半辭以託名於千萬世是所望於古者不負且令後世聞今之盛疑唐舜三代不及逺甚與今之疑唐太宗時無異雖然亦未嘗不憂一日有於冥冥之中議論之際而行謗者使二公之道未盡用故前以書獻二公先舉是為言已而果然二公相次出兩府亦更改而怨忌毁罵讒搆之患一日俱發翕翕萬狀至於乘女子之隙造非常之謗而欲加之天下之大賢不顧四方人議論不畏天地鬼神之臨已公然欺誣駭天下之耳目令人感憤痛切廢食與寢不知所為噫二公之不幸實疾首蹙額之民之不幸也雖然君子之於道也既得諸已汲汲焉而務施之於外汲汲焉務施之於外在我者也務施之外而有可有不可在彼者也在我者姑肆力焉至於其極而後已也在彼者則不可必得吾志焉然君子不以必得之難而廢其肆力者故孔子之所説而聘者七十國而孟子亦區區於梁齊滕邾之間為孔子者聘六十九國尚未巳而孟子亦之梁之齊二大國不可則猶俯而與邾滕之君謀其去齊也遲遲而後出晝其言曰王庶幾改之則必召豫如用豫則豈惟齊民安天下之民舉安觀其心若是豈以一不合而止哉誠不若是亦無以為孔孟今二公固一不合者也其心豈不曰天子庶幾召我而用之如孟子之所云乎肆力焉於其所在我者而任其所在彼者不以必得之難而已莫大斯時矣况今天子仁恕聰明求治之心未嘗怠天下一歸四方諸侯承號令奔走之不暇二公之言如朝得於上則夕被於四海夕得於上則不越宿而被於四海豈與聘七十國遊梁齊邾滕之區區艱難比邪姑有待而已矣非獨鞏之望乃天下之望而二公所宜自任者也豈不謂然乎感憤之不已謹成憶昨詩一篇雅説三篇粗道其意後二篇並他事因亦寫寄此皆人所厭聞不宜為二公道然欲啓告覺悟天下之可告者使明知二公志次亦使邪者庸者見之知世有斷然自守者不從已於邪則又庶幾於天子視聽有所開益使二公之道行則天下之嗷嗷者舉被其賜是亦為天下計不獨於二公發也則二公之道何如哉嘗竊思更貢舉法責之纍日於學使學者不待乎按天下之籍而盛須土著以待舉行悖者不能藉以進此歷代之思慮所未及善乎莫與為善也故詩中善學尤具伏惟賜省察焉上文丞相書蘇洵昭文相公執事天下之事制之在始始不可制制之在末是以君子慎始而無後憂救之於其末而其始不為無謀失諸其始而邀諸其終而天下無遺事是故古者之制其始也有百年之前而為之者也蓋周公營乎東周數百年而待乎平王之東遷也然及其收天下之士而責其賢不肖之分則未嘗於其始焉而制其極蓋嘗舉之於諸侯考之於太學引之於射宫而試之於弓矢如此其備矣然而管叔蔡叔文王之子而武王周公之弟也生而與之居處習知其性之所好惡與夫居之於大學而習之於射宫者宜愈詳矣然其不肖之實卒不見於此時及其出為諸侯監國臨大事而不克自定然後敗露以見其不肖之才且夫張弓而射之一不失容此不肖者或能焉而聖人豈以為此足以盡人之才蓋將為此名以收天下之士而後觀其臨事而黜其不肖故曰始不可制制之在末於此有人求金於沙斂而揚之惟其揚之也精是以責金於揚而斂則無擇焉不然金與沙礫皆不録而已矣故欲求盡天下之賢俊莫若略其始欲求責實於天下之官莫若精其終今者天下之官自相府而至於一縣之丞尉其為數實不可勝計然而大數已定餘吏溢於官籍大臣建議減任子削進士以求便天下竊觀古者之制略於始而精於終使賢者易進而不肖者易犯夫易犯故易退易進故賢者衆衆賢進而不肖者易退夫何患官冗今也艱之於其始竊恐夫賢者之難進與夫不肖者之無以異也方今進退天下士大夫之權內則御史外則轉運而士大夫之間潔然而無過可任以為吏者其實無幾且相公何不以意推之往年吳中復在犍為一月而發二吏中復去職而吏之以罪免者曠嵗無有也雖然此特洵之所見耳天下之大則又可知矣國家法令甚嚴洵從蜀來見凡吏商者皆不征非追胥調發皆得役天子之夫是以知天下之吏犯法者甚衆從其犯而黜之十年之後將分職之不給此其權在御史轉運而御史轉運之權實在相公顧甚易為也今四方之士會於京師口語籍籍莫不為此然皆莫肯一言於其上誠以為近於私我也洵西蜀之人方不見用於當世幸又不復以科舉為意是以肆言於其間而可以無嫌伏惟相公慨然有憂天下之心征伐四國以安天子毅然立朝以威制天下名著功遂文武並濟此其享功業之重而居富貴之極於其平生之所望無復慊然者惟其獲天下之多士而與之皆樂乎此可以復動其志故遂以此告其左右惟相公亮之上富丞相書蘇洵相公閣下往年天子震怒出逐宰相選用舊臣堪付屬以天下者使在相府與天下更始而閣下之位實在第三方是之時天下咸喜相慶以為閣下惟不為宰相也故默默在此方今困而復起起而復為宰相而又適值乎此時也不為而何為且吾君之意待之如此其厚也不為而何以副吾望故咸曰後有下令而異於他日者必吾富公也朝夕而待之跂首而望之望望然而不獲見也戚戚然而疑嗚呼其弗獲聞也必其逺也進而及於京師亦無聞焉不敢以疑猶曰天下之人如此其衆也數十年之間如此而不變也皆曰賢人焉或曰彼其中則有説也而天下之人則未始見也然而不能無憂蓋古之君子愛其人也則憂其無成且嘗聞之古之君子相是君也與是人也皆立於朝則使吾皆知其為人皆善者也而後無憂且一人之身而欲擅天下之事雖見信於當世而同列之人一言而疑之則事不可以成今夫政出於他人而不懼事不出於巳而不忌是二者惟善人為能然猶欲得其心焉若夫衆人政出於他人而懼其害已事不出於已而忌其成功是以有不平之心生夫或居於吾前或立於吾後而皆有不平之心焉則身危故君子之出處於其間也不使之不平於我也周公立於明堂以聽天下而召公惑何者天下固惑乎大者也召公猶未能信乎吾之此心也周公定天下誅管蔡告召公以其志以安其身以及於成王故凡安其身者以安乎周也召公之於周公管蔡之於周公是二者亦皆有不平之心焉以為周之天下周公將遂取之也周公誅其不平而不可告語者告其可以告語者而和其不平之心然則非其必不可以告語者則君子未始不欲和其心天下之人從士而至於卿大夫宰相集處其上將有所為何慮而不成不能忍其區區之小忿以成其不平之釁則害其大事是以君子忍其小忿以容其小過而杜其不平之心然後當大事而聽命焉且吾之小忿不足以易吾之大事也故寧小容焉使無蒂芥於其間古之君子與賢者並居而同樂故其責之也詳不幸而與不肖者偶不圖其大而治其細則濶逺於事情而無益於當世故天下無事而後可與爭此不然則否昔者諸呂用事陳平憂懼計無所出陸賈入見説之使交歡周勃平用其策卒得絳侯北軍之助以滅諸呂夫絳侯木強之人也非陳平致之而誰也故賢者致其不賢者非夫不賢者之能致賢者也曩者陛下即位之初寇萊公為相惟其側有小人不能誅又不能與之無忿故終以斥去及范文正公在相府又欲以歲月盡治天下事失於急與不忍小忿故羣小人亦急逐去之一去遂不復用以沒其身伏惟閣下以不世出之才立於天子之下百官之上此其深謀逺慮必有所處而天下之人猶未獲見洵西蜀人也竊有志於今世願一見於堂上伏惟閣下深思之無忽應制舉上兩制書蘇軾軾聞古者有貴賤之際有聖賢之分二者相勝而不可以相參其勢然也治其貴賤之際則不知聖賢之為髙行其聖賢之分則不知貴賤之為差昔者子思孟軻之徒不見諸侯而耕於野比閭小吏一呼於其門則攝衣而從之至於齊魯千乘之君操幣執贄因門人以願交於下風則閉門而不納此非茍以為異而已將以明乎聖賢之分而不參於貴賤之際故其攝衣而從之也君子不以為畏而其閉門而拒之也君子不以為傲何則其分定也士之賢不肖固有之矣子思孟軻不可以人人而求之然而貴賤之際聖賢之分二者要不可以不知也世道衰喪不能深明於斯二者而錯行之施之不得其處故其道兩亡今夫軾朝生於草茆塵土之中而久與於州縣之小吏其官爵勢力不足較于世亦明矣而諸公之貴至與人主揖讓周旋而無間大車駟馬至於門者逡巡而不敢入軾也非有公事而輒至於庭求以賔客之禮見於下執事固巳獲罪於貴賤之際矣雖然當世之君子不以其愚陋而使與於制舉之末朝廷之上不以其疏賤而使奏其猖狂之論軾亦自忘其不肖而以為是兩漢之主所孜孜而求之親降色辭而問之政者也其才雖不足以庶幾於聖賢之間而學其道治其言則所守者其分也是故踽踽然而來仰不知明公之尊而俯不知其身之賤不由紹介不待辭讓而直言當世之故無所委曲者以為貴賤之際非所以施於此也軾聞治事不若治人治人不若治法治法不若治時時者國之所以存亡天下之所最重也周之衰也時人莫不苟偷而不立周雖欲其立而不可得也故周亡秦之衰也時人莫不貪利而不仁秦雖欲其仁而不可得也故秦亡西漢之衰也時人莫不柔懦而謹畏故君臣相蒙而至於危東漢之衰也時人莫不矯激而奮厲故賢不肖不相容以至於亂夫時者豈其所自為邪王公大人實為之軾將論其時之病而以為其權在諸公諸公之所好天下莫不好諸公之所惡天下莫不惡故軾敢以今之所患二者告於下執事其一曰用法太密而不求情其二曰好名太髙而不適實此二者時之大患也何謂用法太密而不求情昔者天下未平而法不立則人行其私意仁者遂其仁勇者致其勇君子小人莫不以其意從事而不困於繩墨之間故易以有功而亦易以亂及其治也天下莫不趨於法不敢用其私意而惟法之知故雖賢者所為要以如法而止不敢於法律之外有所措意夫人勝法則法為虛器法勝人則人為備位人與法並行而不相勝則天下安今自一命以上至於宰相皆以奉法循令為稱其職拱手而任法曰吾豈得自由哉法既大行故人為備位其成也其敗也其治也其亂也天下皆曰非我也法也法之弊豈不亦甚矣哉昔者漢髙之時留侯為太子少傅位於叔孫之後而周昌亦自御史大夫為諸侯相天下有緩急則功臣左遷而不怨此亦知其君臣之歡不以法而相持也今天下所以任法者何也任法生於自疑自疑生於多私惟天下之無私則能於法律之外有以效其智何則其自信明也夫唐永泰之間姦臣執政政以賄成德宗發憤而用常袞袞一切用法四方奏請莫有獲者然天下否塞賢愚不分君子不以為能也崔祐甫為相不至期年而除吏八百多其親舊或者以為譏祐甫曰不然非親與舊則安得而知之顧其所用如何爾君子以為善用法今天下泛泛焉莫有深思逺慮者皆任法之過也何謂好名太髙而不適實昔者聖人之為天下使人各致其能以相濟也不一則不專不專則不能自堯舜之時而伯夷后夔稷契之倫皆不過名一藝辦一職以盡其能至於子孫世守其業而不遷夔不敢自與於知禮而契不敢自任於播種至於三代之際亦各輸其才而安其習以不相犯躐凡書傳所載者自非聖人皆止於名一藝辦一職故其藝未嘗不精而其職未嘗不舉後世之所希望而不可及者由此故也下而至於漢其君子各務其所長以相左右故史之所記武宣之際自公孫魏邴以下皆不過以一能稱於當世夫人各有才才各有小大大者安其大而無忽於小小者樂其小而無慕於大是以各適其用而不喪其所長及至後世上失其道而天下之士皆有侈心恥以一藝自名而欲盡天下之能事是故喪其所長而至於無用今之士大夫其實病此也仕者莫不談王道述禮樂皆欲復三代追堯舜終於不可行而世務因以不舉學者莫不論天人推性命終於不可究而世教因以不明自許太髙而措意太廣太髙則無用太廣則無功是故賢人君子布於天下而事不立聽其言則侈大而可樂責其效則汗漫而無當此皆好名之過深惟古之聖賢建功立業興利捍患至於百工小民之事皆有可觀不若今世之因循鹵莽其故出於此二者歟伏惟明公才略之宏偉度量之寬厚學術之廣博聲名之煒煌冠於一時而振於百世百世之所望而正者意有所向則天下奔走而趨之則其愍時憂世之心或有取於斯言也軾將有深於此者而未敢言焉不宣軾再拜上昭文富丞相書蘇轍轍西蜀之人行年二十有二幸得天子一命之爵飢寒窮困之憂不至於心其身又無力役勞苦之患其所任職不過簿書米鹽之間而且未獲從事以得自盡方其間居不勝思慮之多不忍自棄以為天子寬惠與天下無所忌諱而轍不與其強壯間暇之時蚤有所發明以自致其志而復何事恭惟天子設制策之科將以待天下豪俊魁礨之人是以轍不自量而自與於此蓋天下之事上自三王以來以至於今世其所論述亦已略備矣而猶有所不釋於心夫古之帝王豈必多才而自為之為之有要而居之有道是故以漢髙皇帝之恢廓慢易而足以吞項氏之強漢文皇帝之寬厚長者而足以服天下之姦詐何者任人而人為之用也是以不勞而功成至於武帝材力有餘聰明睿智過於髙文然而施之天下時有所折而不遂何者不委之人而自為用也由此觀之則夫天子之責亦在任人而已竊惟當今天下之人其所謂有才而可大用者非明公而誰推之公卿之間而最為有功列之士民之上而最為有德播之寥逺之域而最為有勇是三者亦非明公而誰而明公實為宰相則夫吾君之所以為君之事蓋巳畢矣古之聖人髙拱無為而望夫百世之後以為明主賢君者蓋亦如是而可也然而天下之未治則果誰耶下而求之郡縣之吏則曰非我能上而求之朝廷百官則曰非我責明公之立於此也其又將何辭嗟夫蓋亦嘗有以秦越人之事説明公者歟昔者秦越人以醫聞天下天下之人皆以越人為命越人不在則有病而死者莫不自以為吾病之非真病而死之非真死也他日有病者焉遇越人而屬之曰吾捐身以豫子子自為子之才治之而無為我治之也越人曰嗟夫難哉夫子之病雖不至於死而難以愈急治之則傷子之四肢而緩治之則勞苦而不肯去吾非不能去也而畏是二者夫傷子之四肢而後可以除子之病則天下以我為不工而病之不去則天下以我為非醫此二者所以交戰於吾心而不釋也既而見其人其人曰夫子則知醫之醫而未知非醫之醫歟今夫非醫之醫者有所冒行而不顧是以能應變於無窮今子守法密微而用意於萬全者則是子猶知醫之醫而已天下之事急之則喪緩之則得而過緩則無及孔子曰道之難行也我知之矣知者過之不肖者不及也夫天下患於不知而又有知而過之者則是道之果難行也昔者世之賢人患夫世之愛其爵祿而不忍以其身嘗試於艱難也故其上之人奮不顧身以搏天下之公利而忘其私在下者亦不敢自愛叫號紛呶以攻訐其上之短是二者可謂賢於天下之士矣而猶未免為不知何者不知自安其身之為安天下之人自重其發之為重君子之勢而輕用之於尋常之事則是猶匹夫之亮耳伏自明公執政於今五年天下不聞慷慨激烈之名而日聞敦厚之聲意者明公其知之矣而猶有越人之病也轍讀三國志嘗見曹公與袁紹相持久而不決以問賈詡詡曰公明勝紹勇勝紹用人勝紹決機勝紹紹兵百倍於公公畫地而與之相守半年而紹不得戰則公之勝形巳可見矣而久不決意者顧萬全之過耳夫事有不同而其意相似今天下之所以仰首而望明公者豈亦此之故歟明公其略思其説當有以解天下之望者不宣轍再拜上文侍中論𣙜鹽書蘇軾留守侍中執事當今天下勳德俱髙為主上所倚信華實兼隆為士民所責望受恩三世宜與社稷同憂皆無如明公者今雖在外事有關於安危而非職之所憂者猶當盡力爭之而况其事關本職而憂及生民者乎竊意明公必已言之而人不知若猶未也則願效其愚頃者三司使章惇建言乞𣙜河北京東鹽朝廷遣使按視召周革入覲巳有成議矣惇之言曰河北與陜西皆為邊防而河北獨不𣙜鹽此祖宗一時之誤恩也軾以為陜西之鹽與京東河北不同解池廣袤不過數十里既不可捐以豫民而官亦易以籠取青鹽至自北中有可禁止之道然猶法存而實不行城門之外公食青鹽今東北循海皆鹽也其欲籠而取之正與淮南兩浙無異軾在餘杭時見兩浙之民以犯鹽得罪者一歲至萬七千人而莫能止姦民以兵仗護送吏士不敢近者常以數百人為輩特不為他盜故上下通知而不以聞耳東北之人悍於淮浙遠甚平居椎剽之姦常甲於他路一旦𣙜鹽則其禍未易以一二數也由此觀之祖宗以來獨不榷河北鹽者正事之適宜耳何名為誤哉且𣙜鹽雖有故事然要以為非王政也陜西淮浙既未能罷又欲使京東河北隨之此猶患風痺人曰吾左臂既病矣右臂何為獨完則以酒色伐之可乎今議者曰吾之法與淮浙不同淮浙之民所以不免於私販而竈戶所以不免於私賣者以官之買價賤而賣價貴耳今吾賤買而賤賣借如每斤官以三錢得之則以四錢出之鹽商私買於竈户利其賤耳賤不能減三錢竈户均為得三錢也寧以豫官乎將以豫私商而犯法乎此必不犯之道也此無異於兒童之見東海皆鹽也茍民力之所及未有捨而不煎煎而不賣者也而近歲官錢常若窘迫遇其急時百用橫生以有限之錢買無窮之鹽竈户有朝夕薪米之憂而官錢在期月之後則其利必歸於私販無疑也食之於鹽非若飢之於五穀也五穀之乏至於節口并日而况鹽乎故私販法重而官鹽貴則民之貧而懦者或不食鹽往在浙中見山谷之人有數月食無鹽者今將𣙜之東北之俗必不如往日之嗜鹹也而望官課之不虧疏矣且淮浙官鹽本輕而利重雖有積滯官未病也今以三錢為本一錢為利自祿吏購賞修築敖庾之外所獲無幾矣一有積滯不行官之所喪可勝計哉失民而得財明者不為况民財兩失者乎且禍莫大於作始作俑之漸至於用人今兩路未有鹽禁也故變之難遣使會議經年而未果自古作事欲速而不取衆議未有如今日者也然猶遲久如此以明作始之難也今既巳榷之矣則他日國用不足添價貴賣有司以為熟事行半紙文書而決矣且明公能必其不添乎非獨明公不能也今之執政能自必乎茍不可必則兩路之禍自今日始夫東北之蠶衣被天下蠶不可無鹽而議者輕欲奪之是病天下也明公可不深哀而速救之歟或者以為朝廷既有成議矣雖爭之必不從竊以為不然乃者手實造簿方赫然行法之際軾嘗論其不可以告今太原韓公公時在政府莫之行也而手實卒罷民賴以少安凡今執政所欲必行者青苗助役市易保甲而巳其他猶可以庶幾萬一或者又以為明公將老矣若猶有所爭則其請老也難此又軾之所不識也使明公之言幸而聽屈已少留以全兩路之民何所不可不幸而不聽是議不中意其於退也尤易矣願少留意軾一郡守也猶以為職之所當憂而冒聞於左右明公其得巳乎干瀆威重俯伏待罪而已上韓樞密書蘇洵太尉執事洵著書無他長及言兵事論古今形勢至自比賈誼所獻權書雖古人巳往成敗之迹茍深曉其義施之於今無所不可昨因請見求進末議太尉許諾謹撰其説言語朴直非有驚世絶俗之談甚高難行之論太尉取其大綱而無責其纖悉蓋古者非用兵決勝之為難而養兵不用之可畏今夫水激之山放之海決之為溝塍壅之為沼沚是天下之人能之委江河注淮泗滙為洪波瀦為大湖萬世而不溢者自禹之後未之見也夫兵者聚天下不義之徒授之以不仁之器而教之以殺人之事夫惟天下之未安盜賊之未殄然後有以施其不義之心用其不仁之器而試其殺人之事當是之時勇者無餘力智者無餘謀巧者無餘技故其不義之心變而為忠不仁之器加之於不仁而殺人之事施之於當殺及夫天下既平盜賊既殄不義之徒聚而不散勇者有餘力則思以為亂智者有餘謀則思以為姦巧者有餘技則思以為詐於是天下之患雜然出矣蓋虎豹終日而不殺則跳踉大叫以發其怒蝮蝎終日而不螫則噬齧草木以致其毒其理固然無足怪者昔者劉項奮臂於草莽之間秦楚無賴子弟千百為輩爭起而應者不可勝數轉鬭五六年天下厭兵項籍死而高祖亦已老矣方是時分王諸將改定律令與天下休息而韓信黥布之徒相繼而起者七國高祖死於介胄之間而莫能止也連延及於呂氏之禍訖孝文而後定是何起之易而收之難也劉項之勢初若決河順流而下誠有可喜及其崩潰四出放乎數百里之間拱手而莫能救也嗚呼不有聖人何以善其後太祖太宗躬擐甲胄跋涉險阻以斬刈四方之篷蒿用兵數十年謀臣猛將滿天下一旦卷甲而休之傳四世而天下無變此何術也荆楚九江之地不分於諸將而韓信黥布之徒無以啓其心也雖然天下無變而兵久不用則其不義之心蓄而無所發飽食優遊求逞於良民觀其平居無事出怨言以邀其上一日有事是非人得千金不可使也往年詔天下繕完城池西川之事洵實親見凡郡縣之富民舉而籍其名得錢數百萬以為酒食饋餉之費杵聲未絶城輒隨壞如此者數年而後定卒事官吏相賀卒徒相矜若戰勝凱旋而待賞者比來京師遊阡陌間其曹往往偶語無所忌諱聞之土人方春時尤不忍聞蓋時五六月矣會京師憂大水鋤耰畚築列於兩河之壖縣官日費千萬傳呼勞問之聲不絶者數十里猶且睊睊狼顧莫肯效用且夫內之如京師之所聞外之如西川之所親見天下之勢今何如也御將者天子之事也御兵者將之職也天子者養尊而處優樹恩而收名與天下為喜樂者也故其道不可以御兵人臣執法而不求情盡心而不求名出死力以捍社稷使天下之心繫於一人而已不與焉故御兵者人臣之事不可以纍天子也今之所患大臣好名而懼謗好名則多樹私恩懼謗則執法不堅是以天下之兵豪縱至此而莫之制也頃者狄公在樞府號為寬厚愛人狎昵士卒得其歡心而太尉適承其後彼狄公者知御外之術而不知治內之道此邊將材也古者兵在外愛將軍而忘天子在內愛天子而忘將軍愛將軍所以戰愛天子所以守狄公以其御外之心而施諸其內太尉不反其道而何以為治或者以為兵久驕不治一旦繩以法恐因以生亂昔者郭子儀去河南李光弼實代之將至之日張用濟斬於轅門三軍股栗夫以臨淮之悍而代汾陽之長者三軍之士竦然如赤子之脫慈母之懷而立乎嚴師之側何亂之敢生且夫天子者天下之父母也將相者天下之師也師雖嚴赤子不敢以怨其父母將相雖厲天下不敢以咎其君其勢然也天子者可以生人可以殺人故天下望其生及其殺之也天下曰是天子殺之故天子不可以多殺人臣奉天子之法雖多殺天下無所歸怨此先王所以威懷天下之術也伏惟太尉思天下所以長久之道而無幸一時之名盡至公之心而無恤三軍之多言夫天子推深仁以結其心太尉厲威武以振其惰彼其思天子之深仁則畏而不至於怨思太尉之威武則愛而不至於驕君臣之體順而畏愛之道立非太尉吾誰望耶文編卷四十六

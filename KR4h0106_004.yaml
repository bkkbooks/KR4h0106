body:
  text: 文編卷四明唐順之編管仲論受鄭子華左傳秋盟干寧母謀鄭故也管仲言於齊侯曰臣聞之招擕以禮懷逺以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物鄭伯使太子華聽命於會言於齊侯曰泄氏孔氏子人氏三族實違君命君若去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之毋乃不可乎子父不姦之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也會而列姦何以示後嗣夫諸侯之會其德刑禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為太子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭季文子論出莒僕左傳莒紀公生太子僕又生季他愛季他而出僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必達公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之昔髙陽氏有才子八人蒼舒隤敳搗戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教於四方父義母慈兄友弟恭子孝內平外成昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譛庸回服讒搜慝以誣盛德天下之民謂之窮奇顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚狠傲明德以亂天常天下之民謂之檮杌此三族也世濟其凶增其惡名以至於堯堯不能去縉雲氏有不才子貪於飲食冒於貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮舜臣堯賓于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違教也曰納于百揆百揆時序無廢事也曰賓于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎司馬子魚論用人于社左傳宋公使邾文公用鄫子于次雎之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄德今一會而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸晉伯宗論伐狄左傳潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三俊才不如待後之人伯宗曰必伐之狄有五罪俊才雖多何補焉不祀一也嗜酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其俊才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而申固其命若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之六月癸卯晉荀林父敗赤狄於曲梁辛亥滅潞酆舒奔衛衛人歸諸晉晉人殺之師曠論衛人出君左傳師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之二使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有二宗士有朋友庶人工商皂𨽻牧圉皆有親昵以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟以補察其政史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗商旅于市百工獻藝故夏書曰遒人以木鐸徇於路官師相規工執藝事以諫正月孟春於是乎有之諫失常也天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣晉司馬侯論三殆左傳許男如楚楚子止之遂止鄭伯復田江南許男與焉使椒舉如晉求諸侯二君待之椒舉致命曰寡君使舉曰日君有惠賜盟于宋曰晉楚之從交相見也以嵗之不易寡人願結歡於二三君使舉請間君若茍無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修德以待其歸若歸於德吾猶將事之況諸侯乎若適淫虐楚將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以亨神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇若何虞難齊有仲孫之難而獲桓公至今賴之晉有里丕之難而獲文公是以為盟主衛邢無難敵亦喪之故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉椒舉遂請昏晉侯許之薳啓疆論辱晉左傳晉韓宣子如楚送女叔向為介鄭子皮子大叔勞諸索氏大叔謂叔向曰楚王汰侈巳甚子其戒之叔向曰汰侈巳甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王度之以二國雖汰侈若我何及楚楚子朝其大夫曰晉吾仇敵也茍得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽以羊舌肹為司宫足以辱晉吾亦得志矣可乎大夫莫對薳啓疆曰可茍有其備何故不可恥匹夫不可以無備況恥國乎是以聖王務行禮不求恥人朝聘有圭享眺有璋小有述職大有巡功設機而不倚爵盈而不飲宴有好貨飱有陪鼎入有郊勞出有贈賄禮之至也國家之敗失之道也則禍亂興城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢自鄢以來晉不失備而加之以禮重之以睦是以楚弗能報而求親焉既獲姻親又欲恥之以召寇讐備之若何誰其重此若有其人恥之可也若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至求昏而薦女君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何韓起之下趙成中行吳魏舒范鞅知盈羊舌肹之下祁午張躍籍談女齊梁丙張骼輔躒苗賁皇皆諸侯之選也韓襄為公族大夫韓須受命而使矣箕襄邢帶叔禽叔椒子羽皆大家也韓賦七邑皆成縣也羊舌四族皆強家也晉人若喪韓起楊肹五卿八大夫輔韓須楊石因其十家九縣長轂九百其餘四十縣遺守四千奮其武怒以報其大恥伯華謀之中行伯魏舒帥之其蔑不濟矣君將以親易怨實亡禮以速寇而未有其備使羣臣往遺之禽以逞君心何不可之有王曰不穀之過也大夫無辱厚為韓子禮王欲敖叔向以其所不知而不能亦厚其禮申無宇論城陳蔡不羮左傳楚子城陳蔡不羮使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而置子元焉使昭公不立齊桓公城穀而置管仲焉至於今賴之臣聞五大不在邊五細不在庭親不在外羇不在內今棄疾在外鄭丹在內君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子遊齊渠丘實殺無知衛蒲戚實出獻公若由是觀之則害於國末大必折尾大不掉君所知也伍舉論章華之臺國語靈王為章華之臺與伍舉升焉曰臺美夫對曰臣聞國君服寵以為美安民以為樂聽德以為聰致逺以為明不聞其以土木之崇髙彤鏤為美而以金石匏竹之昌大囂庶為樂不聞其以觀大視侈淫色以為明而以察清濁為聰也先君莊王為匏居之臺髙不過望國氛大不過容宴豆木不妨守備用不煩官府民不廢時務官不易朝常問誰宴焉則宋公鄭伯問誰相禮則華元駟騑問誰贊事則陳侯蔡侯許男頓子其大夫侍之先君是以除亂克敵而無惡於諸侯今君為此臺也國民罷焉財用盡焉年穀敗焉百官煩焉舉國留之數年乃成願得諸侯與始升焉諸侯皆距無有至者而後使大宰啓疆請於魯侯懼之以蜀之役而僅得以來使富都那豎贊焉而使長鬛之士相焉臣不知其美也夫美也者上下外內小大逺邇皆無害焉故曰美若於目觀則美縮於財用則匱是聚民利以自封而瘠民也胡美之為夫君國者將民之與處民實瘠矣君安得肥且夫私欲𢎞侈則德義鮮少德義不行則邇者騷離而逺者距違天子之貴也唯其以公侯為官正而以伯子男為師旅其有美名也唯其施令德於逺近而小大安之也若斂民利以成其私欲使民蒿焉忘其安樂而有逺心其為惡也甚矣安用目觀故先王之為臺榭也榭不過講軍實臺不過望氛祥故榭度於大卒之居臺度於臨觀之髙其所不奪穡地其為不匱財用其事不煩官業其日不廢時務瘠磽之地於是乎為之城守之木於是乎用之官寮之暇於是乎臨之四時之隙於是乎成之故周詩曰經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏夫為臺榭將以教民利也不知其以匱之也若君謂此臺美而為之正楚其殆矣晏子論梁丘據左傳齊侯至自田晏子侍于遄臺子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平鬷假無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是魯君論酒味色能亡國國䇿梁王魏罃觴諸侯於范臺酒酣請魯君舉觴魯君興避席擇言曰昔者帝女令儀狄作酒而美進之禹禹飲而甘之遂疏儀狄絶旨酒曰後世必有以酒亡其國者齊桓公夜半不嗛易牙乃煎熬燔炙和調五味而進之桓公食之而飽至旦不覺曰後世必有以味亡其國者晉文公得南之威三日不聽朝遂推南之威而逺之曰後世必有以色亡其國者楚王登強臺而望崩山左江而右湖以臨倣徨其樂忘死遂盟強臺而弗登曰後世必有以髙臺陂池亡其國者今主君之尊儀狄之酒也主君之味易牙之調也左白台而右閭須南威之美也前夾林而後蘭臺強臺之樂也有一於此足以亡其國今主君兼此四者可無戒與梁王稱善相屬莊辛論幸臣亡國國䇿莊辛謂楚襄王曰君王左州侯右夏侯輦從鄢陵君與夀陵君專淫佚侈靡不顧國政郢都必危矣襄王曰先生老悖乎將以為楚國妖祥乎莊辛曰臣誠見其必然者也非敢以為國妖祥也君王卒幸四子者不衰楚國必亡矣臣請避於趙淹留以觀之莊辛去之趙留五月秦果舉鄢郢巫上蔡陳之地襄王流掩於成陽於是使人發騶徴莊辛于趙莊辛曰諾莊辛至襄王曰寡人不能用先生之言今事至於此為之奈何莊辛對曰臣聞鄙語曰見兔而顧犬未為晚也亡羊而補牢未為遲也臣聞昔湯武以百里昌桀紂以天下亡今楚國雖小絶長續短猶以數千里豈特百里哉王獨不見夫蜻蛉乎六足四翼飛翔乎天地之間俯啄蚉虻而食之仰承甘露而飲之自以為無患與人無爭也不知夫五尺童子方將調飴膠絲加巳乎四仞之上而下為螻蟻食也夫蜻蛉其小者也黃雀因是以俯噣白粒仰棲茂樹鼓翅奮翼自以為無患與人無爭也不知夫公子王孫左挾彈右攝丸將加已乎十仞之上以其類為招晝遊乎茂樹夕調乎酸醎倐忽之間墜於公子之手夫黃雀其小者也黃鵠因是以遊乎江海淹乎大沼俯噣鱔鯉仰囓菱衡奮其六翮而凌清風飄搖乎髙翔自以為無患與人無爭也不知夫射者方將修其碆盧治其矰繳將加巳乎百仞之上被㔋磻引微繳折清風而抎矣故晝遊乎江河夕調乎鼎鼐夫黃鵠其小者也蔡靈侯之事因是以南遊乎髙陂北陵乎巫山飲茹溪之流食湘波之魚左抱幼妾右擁嬖女與之馳騁乎髙蔡之中而不以國家為事不知夫子發方受命乎靈王繫已以朱絲而見之也蔡靈侯之事其小者也君王之事因是以左州侯右夏侯輦從鄢陵君與夀陵君飯封祿之粟而載方府之金與之馳騁乎雲夢之中而不以天下國家為事而不知夫穰侯方受命乎秦王填黽塞之內而投巳乎黽塞之外襄王聞之顔色變怍身體戰栗於是乃以執圭而授之為陽陵君與淮北之地賈山至言漢書臣聞為人臣者盡忠竭愚以直諫主不避死亡之誅者臣山是也臣不敢以久逺諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士修身於內成名於外而使後世不絶息至秦則不然貴為天子富有天下賦斂重數百姓任罷赭衣半道羣盜滿山使天下之士戴目而視傾耳而聽一夫大呼天下嚮應者陳勝是也秦非徒如此也起咸陽而西至雍離宫三百鐘鼓帷帳不移而具又為阿房之殿殿髙數十仞東西五里南北千步從軍羅騎四馬騖馳旌旗不撓為宫室之麗至於此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚江湖之上瀕海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松為馳道之麗至於此使其後世曾不得邪徑而託足焉死葬乎驪山吏徒數十萬人曠日十年下徹三泉合采金石冶銅錮其內漆塗其外被以珠玉飾以翡翠中成觀遊上成山林為葬薶之侈至於此使其後世曾不得蓬顆蔽冢而託葬焉秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義故天殃巳加矣臣昧死以聞願陛下少留意而詳擇其中臣聞忠臣之事君也言切直則不用而身危不切直則不可以明道故切直之言明主所欲急聞忠臣之所以蒙死而竭知也地之磽者雖有善種不能生焉江皋河瀕雖有惡種無不猥大昔者夏商之季世雖關龍逢箕子比干之賢身死亡而道不用文王之時豪傑之士皆得竭其智芻蕘採薪之人皆得盡其力此周之所以興也故地之美者善養禾君之仁者善養士雷霆之所擊亡不摧折者萬鈞之所壓亡不糜滅者今人主之威非特雷霆也藝重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡又乃況於縱欲恣行暴虐惡聞其過乎震之以威壓之以重則雖有堯舜之智孟賁之勇豈有不摧折者哉如此則人主不得聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦針諫瞽誦詩諫公卿比諫士傳言諫過庶人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也天子之尊四海之內其義莫不為臣然而養三老于太學親執醬而餽執爵而酳祝䭇在前祝鯁在後公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諫故以天子之尊尊養三老視孝也立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善亡饜也商人庶人誹謗巳而改之從善亡不聽也昔者秦政力并萬國富有天下破六國以為郡縣築長城以為關塞秦地之固大小之藝輕重之權其與一家之富一夫之強胡可勝計也然而兵破於陳涉地奪於劉氏者何也秦王貪狠暴虐殘賊天下窮困萬民以適其欲也昔者周蓋千八百國以九州之民養千八百國之君用民之力不過嵗三日什一而藉君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷不能勝其役財盡不能勝其求一君之身耳所以自養者馳騁弋獵之娛天下弗能供也勞罷者不得休息飢寒者不得衣食亡罪而死者亡所告訴人與之為怨家與之為讐故天下壞也秦皇帝身在之時天下已壞矣而弗自知也秦皇帝東巡狩至會稽琅邪刻石著其功自以為過堯舜統縣石鑄鐘虡篩土築阿房之宫自以為萬世有天下也古者聖王作諡三四十世耳雖堯舜禹湯文武絫世廣德以為子孫基業無過二三十世者也秦皇帝曰死而以諡法是父子名號有時相襲也以一至萬則世世不相復也故死而號曰始皇帝其次曰二世皇帝者欲以一至萬也秦皇帝計其功德度其後嗣世世無窮然身死才數月耳天下四面而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡進諫之士縱恣行誅退誹謗之人殺直諫之士是以道諛偷合茍容比其德則賢於堯舜課其功則賢于湯武天下巳潰而莫之告也詩曰匪言不能胡此畏忌聽言則對譛言則退此之謂也又曰濟濟多士文王以寧天下未嘗亡士也然而文王獨言以寧者何也文王好仁則仁興得士而敬之則士用用之有禮義故不致其愛敬則不能盡其心不能盡其心則不能盡其力不能盡其力則不能成其功故古之賢君於其臣也尊其爵祿而親之疾則臨視之亡數死則往弔哭之臨其小斂大斂巳棺塗而後為之服錫衰麻絰而三臨其喪未斂不飲酒食肉未葬不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣服法服端容貌顔色然後見之故臣下莫敢不竭力盡死以報其上功德立於後世而令聞不忘也今陛下念思祖考述追厥功圖所以昭光洪業休德使天下舉賢良方正之士天下皆欣欣焉曰將興堯舜之道三王之功矣天下之士莫不精白以承休德今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳驅射獵一日再三出臣恐朝廷之解弛百官之墮於事也諸侯聞之又必怠於政矣陛下即位親自勉以厚天下損食膳不聽樂減外徭衛卒止嵗貢省廄馬以賦縣傳去諸苑以賦農夫出帛十萬餘匹以振貧民禮髙年九十者一子不事八十者二算不事賜天下男子爵大臣皆至公卿發御府金賜大臣宗族無不被澤者赦罪人憐其亡髮賜之巾憐其衣赭書其背父子兄弟相見也而賜之衣平獄緩刑天下莫不説喜是以元年膏雨降五穀登此天之所以相陛下也刑輕於它時而犯法者寡衣食多於前年而盜賊少此天下之所以順陛下也臣聞山東吏布詔令民雖老羸癃疾扶杖而往聽之願少須臾毋死思見德化之成也今功業方就名聞方昭四方鄉風今從豪俊之臣方正之士直與之日日獵射擊兔伐狐以傷大業絶天下之望臣竊悼之詩曰靡不有初鮮克有終臣不勝大願願少衰射獵以夏嵗二月定明堂造大學修先王之道風行俗成萬世之基定然後唯陛下所幸耳古者大臣不媟故君子不常見其齊嚴之色肅敬之容大臣不得與宴遊方正修潔之士不得從射獵使皆務其方以髙其節則羣臣莫敢不正身修行盡心以稱大禮如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壞而榮日滅矣夫士修之於家而壞之於天子之廷臣竊愍之陛下與衆臣宴遊與大臣方正朝廷論議夫遊不失樂朝不失禮議不失計軌事之大者也鼂錯論貴粟漢書聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者以畜積多而備先具也今海內為一土地人民之衆不遜湯禹加以亡天災數年之水旱而畜積未及者何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出也遊食之民未盡歸農也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖有髙城深池嚴法重刑猶不能禁也夫寒之於衣不待輕暖飢之於食不待甘旨飢寒至身不顧亷恥人情一日不再食則飢終嵗不制衣則寒夫腹飢不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦斂廣畜積以實倉廩備水旱故民可得而有也民者在上所以牧之趨利如水走下四方亡擇也夫珠玉金銀飢不可食寒不可衣然而衆貴之者以上用之故也其為物輕微易藏在於把握可以周海內而亡飢寒之患此令臣輕背其主而民易去其鄉盜賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不為姦邪所利一日弗得而飢寒至故明君貴五穀而賤金玉今農夫五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急政暴虐賦斂不時朝令而暮改當其有者半賈而賣亡者取倍稱之息於是有賣田宅鬻子孫以償債者矣而商賈大者積貯倍息小者坐列販賣操其竒贏日遊都市乘上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必粱肉亡農夫之苦有阡陌之得因其富厚交通王侯力過吏藝以利相傾千里遊敖冠蓋相望乘堅策肥履絲曳縞此商人所以兼并農人農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫巳貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖忤而欲國富法立不可得也方今之務莫若使民務農而巳矣欲民務農在于貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所泄夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘補不足令出而民利者也順於民心所補者三一曰主用足二曰民賦少三曰勸農功今令民有車騎馬一匹者復卒三人車騎者天下武備也故為復卒神農之教曰有石城十仞湯池百步帶甲百萬而亡粟弗能守也以是觀之粟者王者大用政之本務令民入粟受爵至五大夫以上乃復一人耳此其與騎馬之功相去逺矣爵者上之所擅出於口而亡窮粟者民之所種生於地而不乏夫得髙爵與免罪人之所甚欲也使天下人入粟於邊以受爵免罪不過三嵗塞下之粟必多矣董仲舒論限民名田漢書古者稅民不過什一其求易共使民不過三日其力易足民財內足以養老盡孝外足以事上共稅下足以畜妻子極愛故民説從上至秦則不然用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地又顓川澤之利管山林之饒荒淫越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困又加月為更卒巳復為正一嵗屯戍一嵗力役三十倍於古田租口賦鹽鐵之利二十倍於古或耕豪民之田見稅什五故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加民愁無聊亡逃山林轉為盜賊赭衣半道斷獄嵗以千萬數漢因循而未改古井田法雖難卒行宜少近古限民名田以贍不足塞并兼之路鹽鐵皆歸於民去奴婢除専殺之威薄賦斂省繇役以寬民力然後可善治也張敞論霍氏漢書臣聞公子季友有功於魯大犬趙衰有功於晉大夫田完有功於齊皆疇其官邑延及子孫終後田氏篡齊趙氏分晉季氏顓魯故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十嵗海內之命斷于掌握方其隆時感動天地侵迫隂陽月朓日蝕晝冥宵光地大震裂火生地中天文失度妖祥變怪不可勝記皆隂類盛長臣下顓制之所生也朝臣宜有明言曰陛下褒寵故大將軍以報功德足矣間者輔臣顓政貴戚太盛君臣之分不明請罷霍氏三侯皆就第及衛將軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聽羣臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非䇿之得者也今兩侯以出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守逺郡其路亡由夫心之精微口不能言也言之微眇書不能文也故伊尹五就桀五就湯蕭相國薦淮隂纍嵗乃得通況乎千里之外因書文論事指哉惟陛下省察貢禹論節儉漢書古者宫室有制宫女不過九人秣馬不過八匹牆塗而不雕木摩而不刻車輿器物皆不文畫苑囿不過數十里與民共之任賢使能什一而稅亡他賦斂繇戍之役使民嵗不過三日千里之內自給千里之外各置貢職而巳故天下家給人足頌聲並作至髙祖孝文孝景皇帝循古節儉宫女不過十餘廄馬百餘匹孝文皇帝衣綈履革器亡雕文金銀之飾後世爭為奢侈轉轉益甚臣下亦相放效衣服履褲刀劍亂於主上主上時臨朝入廟衆人不能别異甚非其宜然非自知奢僣也猶魯昭公曰吾何僣矣今大夫僣諸侯諸侯僣天子天子過天道其日久矣承衰救亂矯復古化在於陛下臣愚以為盡如太古難宜少放古以自節焉論語曰君子樂節禮樂方今宫室巳定亡可奈何矣其餘盡可減損故時齊三服官輸物不過十笥方今齊三服官作工各數千人一嵗費數巨萬蜀廣漢主金銀器嵗各用五百萬三工官官費五千萬東西織室亦然廄馬食粟將萬匹臣禹嘗從之東宫見賜杯案盡文畫金銀飾非當所以賜食臣下也東宫之費亦不可勝計天下之民所為大飢餓死者是也今民大飢而死死又不葬為犬豬食人至相食而廄馬食粟苦其大肥氣盛怒至乃日步作之王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宫及棄天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鱉牛馬虎豹生禽凡百九十物盡瘞藏之又皆以後宫女置於園陵大失禮逆天心又未必稱武帝意也昭帝宴駕光復行之至孝宣皇帝時陛下惡有所言羣臣亦隨故事甚可痛也故使天下承化取女皆大過度諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以內多怨女外多曠夫及衆庶葬埋皆虛地上以實地下其過自上生皆在大臣循故事之罪也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二子産多少有命審察後宫擇其賢者留二十人餘悉歸之及諸陵園女亡子者宜悉遣獨杜陵宫人數百誠可哀憐也廄馬可亡過數十匹獨舍長安城南苑地以為田獵之囿自城西南至山西至鄠皆復其田以與貧民方今天下飢饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而巳也故詩曰天難諶斯不易惟王上帝臨女毋二爾心當仁不讓獨可以聖心參諸天地揆之往古不可與臣下議也若其阿意順旨隨君上下臣禹不勝拳拳不敢不盡愚心郭舜論通康居漢書本胸奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國內相輸遺交通如故亦相候伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與胸奴俱稱臣義不可距而康居驕黠訖不肻拜使者都護吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啖都護吏故為亡所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也胸奴百蠻大國今事漢甚備聞康居不拜且使單于有自下之意宜歸其侍子絶勿復使以章漢家不通亡禮之國敦煌酒泉二郡及南道八國給使者往來人馬驢槖駝食皆苦之空罷耗所過送迎驕黠絶逺之國非至計巳谷永論神怪漢書臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥􅂒興輕舉登遐倒景覽觀縣圃浮遊蓬萊耕耘五德朝種暮穫與山石亡極黃冶變化堅冰淖溺化色五倉之術者皆姦人惑衆挾左道懷詐偽以欺罔世主聽其言洋洋滿耳若將可遇求之蕩蕩如繫風捕影終不可得是以明王距而不聽聖人絶而不語昔周史萇𢎞欲以鬼神之術輔尊靈王會朝諸侯而周室愈微諸侯愈叛楚懷王隆祭祀事鬼神欲以獲福助却秦師而兵銼地削身辱國危秦始皇初并天下甘心於神仙之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以仙人黃冶祭祀事鬼使物入海求神采藥貴幸賞賜纍千金大尤尊盛至妻公主爵位重絫震動海內元鼎元封之際燕齊之間方士瞋目扼􅒆言有神仙祭祀致福之術者以萬數其後平等皆以術窮詐得誅夷伏辜至初元中有天淵玉女巨鹿神人轑陽侯師張宗之姦紛紛復起夫周秦之末三五之隆已嘗専意散財厚爵祿竦精神舉天下以求之矣曠日經年靡有毫釐之驗足以揆今經曰享多儀儀不及物惟曰不享論語説曰子不語怪神唯陛下距絶此類毋令姦人有以窺朝者文編卷四

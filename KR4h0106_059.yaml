body:
  text: 文編卷五十九明唐順之編南海神廟碑韓愈海於天地間為物最巨自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河伯之上號為祝融天寶中天子以為古爵莫貴於公侯故海嶽之祝犧幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虛王儀而不用非致崇極之意也由是冊尊南海神為廣利王祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黃木之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方事無所不統地大以遠故常選用重人既貴而富且不習海事又當祀時海常多大風將往皆憂戚既進觀顧怖悸故常以疾為解而委事於其副其來已久故明宫齊廬上雨旁風無所蓋障牲酒瘠酸取具臨時水陸之品狼籍籩豆薦祼興俯不中儀式吏滋不供神不顧享盲風怪雨發作無節人䝉其害元和十二年始詔用前尚書右丞國子祭酒魯國孔公為廣州刺史兼御史大夫以殿南服公正直方嚴中心樂易祗慎所職治人以明事神以誠內外單盡不為表襮至州之明年將夏祝冊自京師至吏以時告公乃齊祓視冊誓羣有司曰冊有皇帝名乃上所自署其文曰嗣天子某謹遣官某敬祭其恭且嚴如是敢有不承明日吾將宿廟下以供晨事明日吏以風雨白不聽於是州府文武吏士凡百數交謁更諌皆揖而退公遂升舟風雨少弛櫂夫奏功雲隂解駮日光穿漏波伏不興省牲之夕載暘載隂將事之夜天地開除月星明穊五鼓既作牽牛正中公乃盛服執笏以入即事文武賔屬俯首聽位各執其職牲肥酒香樽爵靜潔降登有數神具醉飽海之百靈祕怪慌惚畢出蜿蜿蛇蛇來享飲食闔廟旋艫祥飈送帆旗纛旄麾飛揚暗靄鐃鼓嘲轟髙管噭噪武夫奮櫂工師唱和穹龜長魚踊躍後先乾端坤倪軒豁呈露祀之之嵗風灾熄滅人厭魚蟹五穀胥熟明年祀歸又廣廟宫而大之治其庭壇改作東西兩序齊庖之房百用具修明年其時公又固往不懈益䖍嵗仍大和耋艾歌詠始公之至盡除他名之稅罷衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與以節公藏私蓄上下與足於是免屬州負逋之緡錢念有四萬米三萬二千斛賦金之州耗金一嵗八百困不能償皆以丐之加西南守長之俸誅其尤無良不聽令者由是皆自重慎法人士之落南不能歸者與流徙之胄百念八族用其才良而廩其無告者其女子可嫁與之錢財令無失時刑德並流方地數千里不識盜賊山行海宿不擇處所事神治人其可謂備至耳矣咸願刻廟石以著厥美而繫以詩乃作詩曰南海隂墟祝融之宅即祀于旁帝命南伯吏惰不躬正自今公明用享錫右我家邦惟明天子惟慎厥使我公在官神人致喜海嶺之陬既足既濡胡不均𢎞俾執事樞公行勿遲公無遽歸匪我私公神人具依處州孔子廟碑韓愈自天子至郡邑守長通得祀而遍天下者唯社稷與孔子為然而社祭土稷祭穀句龍與棄乃其佐享非其專主又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北面跪祭進退誠敬禮如親弟子者句龍棄以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀句龍棄孔子皆不得位而得常祀然其祀事皆不如孔子之盛所謂生人以來未有如孔子者其賢過於堯舜逺矣此其效歟郡邑皆有孔子廟或不能修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁至官能以為先既新作孔子廟又令工改為顔子至子夏十人像其餘六十子及後大儒公羊髙左丘明孟軻荀况伏生毛公韓生董生髙堂生揚雄鄭𤣥等數十人皆圖之壁選博士弟子必皆其人又為置講堂教之行禮肄習其中置本錢廩米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮耆老歎嗟其子弟皆興於學鄴侯尚文其於古記無不貫逹故其為政知所先後可歌也已乃作詩曰惟此廟學鄴侯所作厥初庫下神不以宇生師所處亦窘寒暑乃新斯宫神降其獻講讀有常不誡用勸揭揭元哲有師之尊羣聖嚴嚴大法以存像圖孔肖咸在斯堂以瞻以儀俾不或忘後之君子無廢成美琢詞碑石以贊攸始道州文宣王廟碑柳宗元謹按某年月日儒師河東薛公伯髙由尚書刑部郎中為道州明年二月丁亥公用牲幣祭于先聖文宣王之廟夜漏未盡三刻公𤣥冕以入就位于庭惕焉深惟夫子之祀爰自京師太學遍于州邑遐闊僻陋咸用斯時致奠展誠宿燎設懸樽爼旗章粲穆布列周天之下嗚呼夫子之道閎肆尊顯二帝三王其無以侔大也然其堂庭庳陋椽棟毁墜曽不及浮圖外說克壯厥居水潦仍至嵗加蕩沃公蹙然不寧若罔獲承既祭而出登墉以望爰得美地豐衍端夷水環以流有頖宫之制是日樹表列位由禮考宜然後節用以制貨財乘時以僦功役逾年而克有成廟舍峻整階序廓大講肄之位師儒之室立廪以周食圃畦以育蔬權其子母贏且不竭由是邑里之秀民感道懷和更來門下咸願服儒衣冠由公訓程公攝衣登席親釋經㫖丕諭本統父慶其子長勵其幼化用興行人無靜訟公又曰夫子稱門弟子顔回為庶幾其後從於陳蔡亦各有號言出一時非盡其徒也于後失厥所謂妄異科第坐祀十人以為哲豈夫子志哉余按月令則曰釋奠于先聖先師國之故也乃立夫子像配以顔氏籩豆既嘉笙鏞既成九年八月丁未公祭于新廟退考疑義合以燕饗萬民翼翼觀禮識古於是春秋師晉陵蔣堅易師沙門凝𧦬助教某學生某等來告願刻金石明夫子之道及公之勤惟夫子極於化初𡨕于道先羣儒咸稱六籍具存茍贊其道若譽天地之大褒日月之明非愚則惑不可犯也惟公探夫子之志考有國之制先施彛典革正道本俾是荒服移為闕里在周則魯侯申能修頖宫詩有其歌在漢蜀守文翁能首儒學史有其贊今公法古之大同于魯化人之艱侔于蜀盍銘茲德以告于史氏而刋之茲碑銘曰荆楚之陽厥服惟荒民鮮由仁帝降其良振振薛公惟德之造赤旗金節來蒞于道師儒咸㑹嘉有攸告吉日丁亥獻于頖宫庭燎伊煌有煥其容公升于位心莫不恭爰念聖祀遍于海邦服冕陳器州邑攸同感欣以欷思報聖功卜遷于嘉惟吉之逢畇畇其原既夷且大渙渙其流實環于外作廟有嚴昭祀顯配潔兹器用觀禮斯㑹布筵依位作廪伊秩以豐其儀以壯其室新宫既成崇報孔明于古有經公粹厥誠邦民之良辨服是纓公躬講論䖍默以聽公降酬酢進退齊平柔肌洽體莫不充盈歸歡于心父子弟兄欽惟聖王厥道無涯世有頌辭益疚其多公斯考禮民感休嘉從于魯風祗以詠歌公錫于天眉夀來加公賚于王休命是荷師于辟雍大邦以和侑酳申申王道式訛諸儒作詩思繼頖水丕揚厥聲以告太史柳州文宣王新修廟碑柳宗元仲尼之道與王化遠邇惟柳州古為南夷椎髻卉裳攻劫鬬暴雖唐虞之仁不能柔秦漢之勇不能威至于有國始循法度置吏奉貢咸若采衛冠帶憲令進用文事學者道堯舜孔子如取諸左右執經書引仁義旋辟唯諾中州之士時或病焉然後知唐之德大以遐孔氏之道尊而明元和十年八月州之廟屋壞幾毁神位刺史柳宗元始至大懼不任以墜教基丁未奠薦法齊時事禮不克施乃合初亞終獻三官衣布洎于贏財取土木金石徴工僦功完舊益新十月乙丑王宫正室成乃安神棲乃正法庭祗㑹羣吏卜日之吉䖍告于王靈曰昔者夫子嘗欲居九夷其時門人猶有惑聖言今夫子代千有餘載其教始行至于是邦人去其陋而本於儒孝父忠君言及禮義又况巍然炳然臨而炙之乎惟夫子以神道設教我今罔敢知欽若茲教以寧其神追思告誨如在于前茍神之在曷敢不䖍居而無陋罔二昔言申陳嚴祀永永是尊麗牲有碑刻在廟門箕子碑柳宗元凡大人之道有三一曰正䝉難二曰法授聖三曰化及民殷有仁人曰箕子實具茲道以立于世故孔子述六經之㫖尤殷勤焉當紂之時大道悖亂天威之動不能戒聖人之言無所用進死以併命誠仁矣無益吾祀故不為委身以存祀誠仁矣與亡吾國故不忍且是二道有行之者矣是用保其明哲與之俯仰晦是謨範辱於囚奴昏而無邪隤而不息故在易曰箕子之明夷正䝉難也及天命既改生人以正乃出大法用為聖師周人得以序彛倫而立大典故在書曰以箕子歸作洪範法授聖也及封朝鮮推道訓俗惟德無陋惟人無逺用廣殷祀俾夷為華化及民也率是大道藂於厥躬天地變化我得其正其大人歟於呼當其周時未至殷祀未殄比干已死微子已去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先生隱忍而為此其有志於斯乎唐某年作廟汲郡嵗時致祀嘉先生獨列於易象作是頌云䝉難以正授聖以謨宗祀用繁夷民其蘇憲憲大人顯晦不渝聖人之仁道合隆汙明哲在躬不陋為奴冲讓居禮不盈稱孤髙而無危卑不可踰非死非去有懷故都時詘而伸卒為世模易象是列文王為徒大明宣昭崇祀式孚古闕頌辭繼在後儒衢州徐偃王廟碑韓愈徐與秦俱出柏翳為嬴姓國於夏殷周世咸有大功秦處西偏專用武勝遭世衰無明天子遂虎吞諸國為雄諸國既皆入秦為臣屬秦無所取利上下相賊害卒僨其國而沈其宗徐處得地中文德為治及偃王誕當國益除去刑爭末事凡所以君國子民待四方一出於仁義當此之時周天子穆王無道意不在天下好道士說得八龍騎之西遊同王母宴于瑶池之上歌謳忘歸四方諸侯之爭辨者無所質正咸賔祭於徐贄玉帛死生之物于徐之庭者三十六國得朱弓赤矢之瑞穆王聞之恐遂稱受命命造父御長驅而歸與楚連謀伐徐徐不忍鬬其民北走彭城武原山下百姓隨而從之萬有餘家偃王死民號其山為徐山鑿石為室以祠偃王偃王雖走死失國民戴其嗣為君如初駒王章禹祖孫相望自秦至今名公巨人繼跡史書徐氏十望其九皆本於偃王而秦後迄茲無聞家天於柏翳之緒非偏有厚薄施仁與暴之報自然異也衢州故㑹稽太末也民多姓徐氏支縣龍丘有偃王遺廟或曰偃王之逃戰不之彭城之越城之隅棄玉几研于㑹稽之水或曰徐子章禹既執於吳徐之公族子弟散之徐揚二州間即其居立先王廟云開元初徐姓二人相屬為刺史帥其部之同姓改作廟屋載事于碑後九十年當元和九年而徐氏放復為刺史放字逹夫前碑所謂今户部侍郎其大父也春行視農至于龍丘有事于廟思惟本原曰故制桷朴下窄不足以揭䖍妥靈而又梁桷赤白陊剝不治圖像之威䵝昧就滅藩拔級夷庭木秃缺祈氓日慢祥慶弗下州之羣支不獲䕃庥余惟遺紹而尸其土不即不圖以有資聚罰其可辭乃命因故為新衆工齊事惟月若日工告訖功大祠于廟宗卿咸序應是嵗州無怪風劇雨民不天厲穀果完實民皆曰耿耿祉哉其不可誣乃相與請辭京師歸而鑱之于石辭曰秦傑以顛徐由遜綿秦鬼久饑徐有廟存婉婉偃王惟道之耽以國易仁為笑于頑自初擅命其實幾姓厯短詈長有不償亡課其利害孰與王當姑蔑之墟太末之里誰思王恩立廟以祀王之聞孫世世多有唯臨茲邦廟土實守堅嶠之後逹夫廓之王歿萬年如始祔時王孫多孝世奉王廟逹夫之來先慎詔教盡惠廟民不主於神維是逹夫知孝之元太末之里姑蔑之城廟事時修仁義振聲宜寵其人以及後生嗟嗟維王雖古誰亢王死于仁彼以暴喪文追作誅刻示茫茫黃陵廟碑韓愈湘旁有廟曰黃陵自前古立以祠堯之二女舜之二妃者庭有石碑斷裂分散在地其文剝缺考圖記言漢荆州牧劉表景升之立題曰湘夫人碑今驗其文乃晉太康九年又其額曰虞帝二妃之碑非景升立者秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭𤣥之徒亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸之解以為湘君者自其水神而謂湘夫人乃二妃也從舜南征三苗不及道死沅湘之間山海經曰洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小水為其夫人因以二女為天帝之女以余考之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英帝子各以其盛者推言之也禮有小君君母明其正自得稱君也書曰舜陟方乃死傳謂舜升道南方以死或又曰舜死葬蒼梧二妃從之不及溺死沅湘之間今謂竹書紀年帝王之沒皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德協天也書紀舜之沒云陟者與竹書周書同文也其下言方乃死者所以釋陟為死也地之勢東南下如言舜南巡而死宜言下方不得言陟方也以此謂舜死葬蒼梧於時二妃從之不及而溺者皆不可信二妃既曰以謀語舜脫舜之厄成舜之聖堯死而舜有天下為天子二妃之力宜常為神食民之祭今之渡湖江者莫敢不進禮廟下元和十四年春余以言事得罪為潮州刺史其地於漢南海之揭陽厲毒所聚懼不得脫死過廟而禱之其冬移袁州刺史明年九月拜國子祭酒使以私錢十萬抵嶽州願易廟之圯桷腐瓦於刺史王堪長慶元年刺史張愈自京師往與愈故善謂曰丐我一碑石載二妃廟事且令後世知有子名愈曰諾既至州報曰碑謹具遂篆其事俾刻之湘源二妃廟碑韓愈元和九年八月二十日湘源二妃廟灾司功掾守令彭城劉知剛主簿安邑衛之武告于州刺史御史中丞清河崔公能祗栗厥戒㑹羣吏洎衆工發開元詔書懼廢守祀搜考贏羡均節委積咸執牘聿至于祠下稽度既備傭役惟時斬木于上游陶埴于水涯乃桴乃載工逸事遂作貌顯嚴粲然而威十有一月庚辰陳奠薦辭立石于廟門之宇下惟父子夫婦人道之大大哉二神咸極其㑹為子而父堯為婦而夫舜齊聖並明弼成授受內若嚚瞽上承輝光克艱以乂德罔不至帝既野死神亦不返食于茲川古有常典驅祓戾孽恢宣淑靈敢或失職以奸天刑有翼其躬有苾其馨沉牲爰告即石是銘銘曰淵懿承聖舜妻堯女德形媯汭神位湘滸揆茲有初克碩厥宇唐命秩祀茲邑攸主毛牷既疈椒馨爰糈􅏷于萬年期保伊祜潛火煽孽炖于融風神用播遷時罔克龔邑令羣吏告于君公亷用積餘以就爾功桴木負埴載流于江既夷以成崇宇峻墉潔嚴清閒左右率從神樂來歸徒御雍雍神既安止邦人載喜奉其吉玉以對嘉祉南風湑湑湘水如舞將子無歡神聽鐘鼓豐其交報邦邑是與刻此樂歌以極終古平淮西碑一首并序韓愈天以唐克肖其德聖子神孫繼繼承承於千萬年敬戒不怠全付所覆四海九州罔有內外悉主悉臣髙祖太宗既除既治髙宗中睿休養生息至于𤣥宗受報收功極熾而豐物衆地大孽牙其間肅宗代宗德祖順考以勤以容大慝適去稂莠不薅相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受羣臣朝乃考圖數貢曰嗚呼天既全付豫有家今傳次在豫豫不能事事其何以見于郊廟羣臣震懾奔走率職明年平夏又明年平蜀又明年平江東又明年平澤潞遂定易定致魏博貝衛澶相無不從志皇帝曰不可究武豫其少息九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄城以動東都放兵四劫皇帝厯問于朝一二臣外皆曰蔡帥之不廷授于今五十年傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆决唱聲萬口和附并為一談牢不可破皇帝曰惟天惟祖宗所以付任豫者庶其在此豫何敢不力况一二臣同不為無助曰光顔汝為陳許帥維是河東魏博郃陽三軍之在行者汝皆將之曰重𦙍汝故有河陽懷今益以汝維是朔方義成陜益鳳翔延慶七軍之在行者汝皆將之曰𢎞汝以卒萬二千屬而子公武往討之曰文通汝守夀維是宣武淮南宣歙浙西四軍之行于夀者汝皆將之曰道古汝其觀察鄂嶽曰訴汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝豫同汝遂相豫以賞罰用命不用命曰𢎞汝其以節都統諸軍曰守謙汝出入左右汝惟近臣其往撫師曰度汝其往衣服飲食豫士無寒無饑以既厥事遂生蔡人賜汝節斧通天御帶衛卒三百凡茲廷臣汝擇自從惟其賢能無憚大吏庚申豫其臨門送汝曰御史豫閔士大夫戰甚苦自今以往非郊廟祠祀其無用樂顔𦙍武合攻其北大戰十六得柵城縣二十三降人卒四萬道古攻其東南八戰降萬三千再入申破其外城文通戰其東十餘遇降萬二千訴入其西得賊將輒釋不殺用其策戰比有功十二年八月丞相度至師都統𢎞責戰益急顔𦙍武合戰益用命元濟盡并其衆洄曲以備十月壬申訴用所得賊將自文城因天大雪疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒辛巳丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願歸為農者十九悉縱之斬元濟京師冊功𢎞加侍中訴為左僕射帥山南東道顔𦙍皆加司空公武以散騎常侍帥鄜坊丹延道古進大夫文通加散騎常侍丞相度朝京師道封晉國公進階金紫光祿大夫以舊官相而以其副總為工部尚書領蔡任既還奏羣臣請紀聖功被之金石皇帝以命臣愈再拜稽首而獻文曰唐承天命遂臣萬邦孰居近土襲盜以狂往在𤣥宗崇極而圯河北悍驕河南附起四聖不宥屢興師征有不能尅益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百隸怠官事亡其舊帝時繼位顧瞻咨嗟惟汝文武孰恤豫家既斬吳蜀旋取山東魏將首義六州降從淮蔡不順自以為强提兵呌歡欲事故常始命討之遂連奸鄰隂遣刺客來賊相臣方戰未利內驚京師羣公上言莫若惠來帝為不聞與神為謀乃相同德以訖天誅乃敇顔𦙍訴武古通咸統於𢎞各奏汝功三方分攻五萬其師大軍北乘厥數倍之常兵時曲軍士蠢蠢既剪陵雲蔡卒大窘勝之邵陵郾城來降自夏入秋復屯相望兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者額額蔡城其壃千里既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告饑船粟往哺蔡人告寒賜以繒布始時蔡人禁不往來今相從戲里門夜開始時蔡人進戰退戮今旰而起左飱右粥為之擇人以收餘憊選吏賜牛教而不稅蔡人有言始迷不知今乃大覺羞前之為蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾强不支汝弱奚恃其告而長而父而兄奔走偕來同我太平淮蔡為亂天子伐之既伐而饑天子活之始議伐蔡卿士莫隨既伐四年小大並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四方畢來遂開明堂坐以治之柳州羅池廟碑韓愈羅池廟者故刺史柳侯廟也柳侯為州不鄙夷其民動以禮法三年民各自矜奮茲土雖遠京師吾等亦天氓今天幸惠仁侯若不化服我則非人於是老少相教語莫違侯令凡有所為於其鄉閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期民勸趨之無有後先必以其時於是民業有經公無負租流逋四歸樂生興事宅有新屋步有新船池園潔修豬牛鴨雞肥大蕃息子嚴父詔婦順夫指嫁娶葬送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡沒為隸我侯之至按國之故以傭除本悉奪歸之大修孔子廟城郭巷道皆治使端正樹以名木柳民既皆悅喜嘗與其部將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而寄於此與若等好也明年吾將死死而為神後三年為廟祀我及期而死三年孟秋辛卯侯降于州之後堂歐陽翼等見而拜之其夕夢翼而告曰館我於羅池其月景辰廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死明年春魏忠歐陽翼使謝寧來京師請書其事于石余謂柳侯生能澤其民死能驚動禍福之以食其土可謂靈也已作迎享送神詩遺柳民俾歌以祀焉而并刻之柳侯河東人諱宗元字子厚賢而有文章嘗位於朝光顯矣已而擯不用其辭曰荔子丹兮蕉黃雜肴蔬兮進侯堂侯之船兮兩旗度中流兮風泊之待侯不來兮不知我悲侯乘駒兮入廟慰我民兮不嚬以笑鵝之山兮柳之水桂樹團團兮白石齒齒侯朝出游兮暮來歸春與猿吟兮秋鶴與飛北方之人兮為侯是非千秋萬嵗兮侯我無違福我兮夀我驅厲鬼兮山之左下無苦濕兮髙無乾粳􅀈充羡兮蛇蛟結蟠我民報事兮無怠其始自今兮欽于世世表忠觀碑蘇軾熙寧十年十月戊子資政殿大學士右諫議大夫知杭州軍州事臣抃言故吳越國王錢氏墳廟及其父祖妃夫人子孫之墳在錢塘者二十有六在臨安者十有一皆蕪廢不治父老過之有流涕者謹按故武肅王鏐始以鄉兵破走黃巢名聞江淮復以八都兵討劉漢宏并越州以奉董昌而自居於杭及昌以越叛則誅昌而并越盡有浙東西之地傳其子文穆王元瓘至其孫忠顯王仁佐遂破李景兵取福州而仁佐之弟忠懿王俶又大出兵攻景以迎周世宗之師其後卒以國入覲三世四王與五代相終始天下大亂豪傑蜂起方是時以數州之地盜名字者不可勝數既覆其族延及于無辜之民罔有孑遺而吳越地方千里帶甲十萬鑄山煮海象犀珠玉之富甲於天下然終不失臣節貢獻相望於道是以其民至於老死不識兵革四時嬉遊歌鼓之聲相聞至于今不廢其有德於斯民甚厚皇宋受命四方僭亂以次削平而蜀江南負其嶮逺兵至城下力屈勢窮然後束手而河東劉氏百戰守死以抗王師積骸為城釃血為池竭天下之力僅乃克之獨吳越不待告命封府庫籍郡縣請吏于朝視去其國如去傳舍其有功於朝廷甚大昔竇融以河西歸漢光武詔右扶風修理其父祖墳塋祠以太牢今錢氏功德殆過於融而未及百年墳廟不治行道傷嗟甚非所以勸奬忠臣慰答民心之義也臣願以龍山廢佛祠曰妙因院者為觀使錢氏之孫為道士曰自然者居之凡墳廟之在錢塘者以付自然其在臨安者以付其縣之淨土寺僧曰道微嵗各度其徒一人使世掌之籍其地之所入以時修其祠宇封殖其草木有不治者縣令丞察之甚者易其人庶幾永終不墜以稱朝廷待錢氏之意臣抃昧死以聞制曰可其妙因院改賜名曰表忠觀銘曰天目之山苕水出焉龍飛鳳舞萃于臨安篤生異人絶類離羣奮挺大呼從者如雲仰天誓江月星晦䝉强弩射潮江海為東殺宏誅昌奄有吳越金劵玉冊虎符龍節大城其居包落山川左江右湖控引島蠻嵗時歸休以燕父老曄如神人玉帶毬馬四十一年寅畏小心厥篚相望大貝南金五朝昏亂罔堪託國三王相承以待有德既獲所歸弗謀弗咨先王之志我維行之天胙忠孝世有爵邑允文允武子孫干億帝謂守臣治其祠墳毋俾樵牧愧其後昆龍山之陽巋焉新宫匪私于錢唯以勸忠非忠無君非孝無親凡百有位視此刻文潮州韓文公廟碑蘇軾匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為矣故申吕自嶽降而傅說為列星古今所傳不可誣也孟子曰吾善養吾浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起厯唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正蓋三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥豈非參天地關盛衰浩然而獨存者乎蓋嘗論天人之辨以謂人無所不至惟天不容僞智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能訓鱷魚之暴而不能弭皇甫鏄李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上蓋公之所能者天也所不能者人也始潮人未知學公命進士趙德為之師自是潮之士皆篤於文行延及齊民至于今號稱易治信乎孔子之言君子學道則愛人而小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既悅服則出令曰願新公廟者聽民歡趨之卜地於州城之南七里朞年而廟成或曰公去國萬里而謫于潮不能一嵗而歸沒而有知其不眷戀于潮審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事于石因作詩以遺之使歌以祀公其詞曰公昔騎龍白雲鄉手抉雲漢分天章天孫為織雲錦裳飄然乘風來帝旁下與濁世掃粃糠西遊咸池略扶桑草木衣被昭回光追逐李杜參翺翔汗流籍湜走且僵滅沒倒景不可望作書詆佛譏君王要觀南海窺衡湘厯舜九疑弔英皇祝融先驅海若藏約束鮫鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於燦荔丹與蕉黃公不少留我涕滂翩然被髮下大荒袁氏先廟碑韓愈袁公滋既成廟明嵗二月自荆南以旗節朝京師留六日得壬子春分率宗親子屬用少牢于三室既事退言曰嗚呼逺哉維世傳德襲訓集余乃今有濟今祭既不薦金石音聲使工歌詩載烈象容其奚以飭稚昧於長久唯敬繫羊豕幸有石如具著先人名跡因為詩繫之語下於義其可雖然余不敢必屬篤古而逹於詞者遂以命愈愈謝非其人不獲命則謹條袁氏本所以出與其世系里居起周厯漢魏晉拓拔魏周隋入國家以來髙曽祖考所以劬躬燾後委祉于公公之所以逢將承應者有槩有詳而綴以詩其語曰周樹舜後陳陳公子有為大夫食國之地袁鄉者其子孫世守不失因自别為袁氏春秋世陳常壓於楚與中國相加尤疏袁氏猶班班見可譜常居陽夏陽夏至晉屬陳郡故號陳郡袁氏博士固申儒遏黃唱業於前至司徒安懷德於身袁氏遂大顯連世有人終漢連魏晉分仕南北始居華隂為拓拔魏鴻臚鴻臚諱恭生周梁州刺史新縣孝侯諱頴孝侯生隋左衛大將軍諱溫去官居華隂武德九年以大耋薨始葬華州左衛生南州刺史諱士政南州生當陽令諱倫於公為曾祖當陽生朝散大夫石州司馬諱知𤣥司馬生贈工部尚書咸寧令諱曄是為皇考袁氏舊族而當陽以通經為儒位止縣令石州用春秋持身治事為州司馬以終咸寧備學而貫以一文武隨用謀行功從出入有立不爵于朝比三世宜逹而窒歸成後人數當于公公惟曽大父大父皇考比三世存不大夫食歿祭在子孫唯將相能致備物世彌逺禮則益不及在慎德行業治圖功載名以待上可無細大無敢不敬畏無早夜無敢不思成于家進于外以立于朝自侍御史厯工部員外郎祠部郎中諫議大夫尚書右丞華州刺史金吾大將軍由卑而巨莫不官稱遂為宰相以贊辨章仍持節將蜀滑襄荆略苞河山秩登祿富以有廟祀具如其志又垂顯刻以教無忘可謂大孝詩曰袁自陳分初尚蹇連越秦造漢博士發論司徒任德忍不錮人收功厥後五公重尊晉氏于南來處華下鴻臚孝侯用適操捨南州勤治取最不懈當陽耽經唯義之畏石州烈烈學專春秋懿哉咸寧不名一休趨難避成與時泛浮是生孝子天子之宰出把將符羣州承楷數以立廟祿以備器由曽及考同堂異置柏版松楹其筵肆肆維袁之廟孝孫之為順勢即宜以諏以龜以平其巇屋牆持持孝孫來享來拜廟庭陟堂進室親登籩鉶肩臑胉骼其樽𤣥清降登受胙于慶爾成維曾維祖維考之施于汝孝嗣以報以祗凡我有今非本曷思刻詩牲繫維以告之清邊郡王楊燕竒碑韓愈公諱燕竒字燕竒𢎞農華隂人也大父知古祁州司倉烈考文誨天寶中實為平盧衙前兵馬使位至特進檢校太子賔客封𢎞農郡開國伯世掌諸蕃互市恩信著明夷人慕之祿山之亂公年幾二十進言於其父曰大人守官宜不得去王室在難某其行矣其父為之請於戎帥率諸將校之子弟各一人間道趨闕變服詭行日倍百里天子嘉之特拜左金吾衛大將軍員外置賜勳上柱國寶應二年春詔從僕射田公平劉展又從下河北大厯八年帥師納戎帥勉于滑州九年從朝于京師建中二年城汴州功勞居多三年從攻李希烈先登貞元二年從司徒劉公復汴州十二年與諸將執以城叛者歸之于京師事平授御史大夫食實封百户賜繒綵有加十四年年六十一五月某日終于家自始命左金吾大將軍凡十五遷為御史大夫職為節度押衙右廂兵馬使兼馬軍先鋒兵馬使階為特進勳為上柱國爵為清邊郡王食虛邑自三百户至三千户真食五百户終焉公結髮從軍四十餘年敵攻無堅城守必完臨危蹈難歔欷感發乘機應㑹捷出神怪不畏義死不榮幸生故其事君無疑行其事上無間言初僕射田公其母隔于冀州公獨請往迎之經營賊城出入死地卒致其母田公德之約為父子故公始姓田氏田公終而後復其族焉嗣子通王屬良禎以其年十月庚寅葬公于開封縣魯陵岡隴西郡夫人李氏祔焉夫人清夷郡太守祐之孫漁陽郡長史獻之女柔嘉淑明先公而殂有男四人女三人後夫人河南郡夫人雍氏某官之孫某官之女有男一人女二人咸有至性純行夫人同仁均養親族不知異焉君子於是知楊公之德又行於家也銘曰烈烈大夫逢時之虞感泣辭親從難于秦維茲爰始遂勤其事四十餘年或禆或專攻牢保危爵位已隮既明且慎終老無隳魯陵之岡蔡河在側蒸蒸孝子思顯勳績斫石于此式垂後嗣曹成王碑韓愈王姓李氏諱臯字子蘭諡曰成其先王明以太宗子國曹絶復封傳五王至成王成王嗣封在𤣥宗世蓋於時年十七八紹爵三年而河南北兵作天下震擾王奉母太妃逃禍民伍得間走蜀從天子天子念之自都水使者拜左領軍衛將軍轉二國子祕書王生十年而失先王哭泣哀悲弔客不忍聞喪除痛刮磨豪習委已於學稍長重知人情急世之要耻一不通侍太妃從天子于蜀既孝既忠持官持身內外斬斬由是朝廷滋欲試之於民上元元年除溫州長史行刺史事江東新刳於兵郡旱饑民交走死無弔王及州不解衣下令掊鎖擴門悉棄倉實與民活數十萬人奏報升秩少府與平袁賊仍徙祕書兼州别駕部告無事遷真于衡法成令修治出張施聲生勢長觀察使噎媢不能出氣誣以過犯御史助之貶潮州刺史楊炎起道州相德宗還王于衡以直前謾王之遭誣在理念太妃老將驚而戚出則囚服就辨入則擁笏垂魚坦坦施施即貶于潮以遷入賀及是然後跪謝告實初觀察使虐使將國良往戍界良以武岡叛戍衆萬人斂兵荆黔洪桂伐之二年尤張於是以王帥湖南將五萬士以討良為事王至則屛兵投良以書中其忌諱良羞畏乞降狐鼠進退王即假為使者從一騎踔五百里抵良壁鞭其門大呼我曹王來受良降良今安在良不得已錯愕迎拜盡降其軍太妃薨王棄部隨喪之河南葬及荆被詔責還㑹梁崇義反王遂不敢辭以還升秩散騎常侍明年李希烈反遷御史大夫授節帥江西以討希烈命至王出止外舍禁無以家事關我裒兵大選江州羣能著職王親教之搏力勾卒嬴越之法曹誅五畀艦步二萬人以與賊遌嘬鋒蔡山踣之剜蘄之黃梅大鞣長平鏺廣濟掀蘄春撇蘄水掇黃岡策漢陽行跐汊川還大膊蘄水界中披安三縣拔其州斬僞刺史標光之北山􅞌隨光化梏其州十抽一推救兵州東北屬鄉還開軍受降大小之戰三十有二取五州十九縣民老幼婦女不驚市賈不變田之果穀下無一跡加銀青光祿大夫工部尚書改户部再換節臨荆及襄真食三百王之在兵天子西巡于梁希烈北取汴鄭東略宋圍陳兩取汝薄東都王坐南方北向落其角距賊死咋不能入寸尺亡將卒十萬盡輸其南州王始政於溫終政於襄恆平物估賤斂貴出民用有經一吏軌民使令家聽户視奸宄無所宿府中不聞急步疾呼治民用兵各有條次世傳為法任馬彛將慎將鍔將潛偕盡其力能薨贈右僕射元和初以子道古在朝更贈太子太師道古進士司門郎剌利隨唐睦徴為少宗正兼御史中丞以節督黔中朝京師改命觀察鄂嶽蘄沔安黃提其師以伐蔡且行泣曰先王討蔡實取沔蘄安黃其惠未忘今余亦受命有事于蔡而四州適在吾封庶其有集先王薨於今二十五年吾昆弟在而墓碑不刻無文其實有待子無用辭乃序而詩之辭曰太支十三曹於弟季或亡或微曹始就事曹之祖王畏塞絶遷零王黎公不聞僅存子父易封三王守名延延百載以有成王成王之作一自其躬文被明章武薦畯功蘇枯弱强齦其奸猖以報于宗以昭于王王亦有子處王之所唯舊之視蹶蹶陛陛實取實似刻詩其碑為示無止饒娥碑柳宗元饒娥饒人饒姓娥名世漁鄱水娥為室女淵懿靖專雖小家未嘗出游治絺葛供女事循整鄉閭敬式娥父醉漁風卒起不能舟遂以溺死求尸不得娥聞父死走哭水上三日不食耳鼻流血氣盡伏死明日尸出黿魚鼉蛟浮死萬數塞川下流鄱旁小民悲感怨號以為神竒縣人鄉人㑹錢具儀葬娥鄱水西橫道上追思不足相與作石以詔後世其辭曰生德無類氣靈而伏嗟茲孝娥惟行之周淵懿含貞好靖不游纎葛絺紵克供以修蒸蒸在家其父世漁飲酒不節死乎風濤匐匍來哭號天以呼顔目耳鼻膏血交流三日頓踣氣竭形枯父尸既出孝質已殂龜鱉黿鼉有蛟洎魚充流溢岸旁出仰浮見怪形異適與我謀鄱民哀號或以頌歌齊女色憂傷槐罷誅趙姬完父操棹爰謳肉刑不施漢美淳于烈烈孝娥水死上虞娥之至德實與為儔恆人有言惟教是圖懿茲德女家世不儒竒行特出神道莫酬窮哀罔泄終古以留鄉人好禮爰立茲丘建銘當道過者下車龍安海禪師碑柳宗元佛之生也逺中國僅二萬里其沒也距今茲僅二千歲故傳道益微而言禪最病拘則泥乎物誕則離乎真真離而誕益勝故今之空愚失惑縱傲自我者皆誣禪以亂其教冒于嚚昏放于淫荒其異是者長沙之南曰龍安師師之言曰由迦葉至師子二十三世而離離而為逹摩由逹摩至忍五世而益離離而為秀為能南北相訾反戾鬬狠其道遂隱嗚呼吾將合焉且世之傳書者皆馬鳴龍樹道也二師之道其書具存徴其書合於志可以不慁於是北學於惠隱南求於馬素咸黜其異以蹈乎中乖離而愈同空洞而益實作安禪通明論推一而適萬則事無非真混萬而歸一則真無非事推而未嘗推故無適混而未嘗混故無歸塊然趣定至于旬時是之謂施用茫然同俗極乎流動是之謂真常居長沙在定十四日人即其處而成室宇遂為寶應寺去于湘之西人又從之負大木礱密石以益其居又為龍安寺焉尚書裴公某李公某侍郎吕公某楊公某御史中丞房公某咸尊師之道執弟子禮凡年八十一為僧五十三朞元和三年二月九日而沒其弟子𤣥覺洎懷直浩初等狀其師之行謁余為碑曰師周姓如海名也世為士父曰擇交同州録事參軍叔曰擇從尚書禮部侍郎師始為釋其父違之志使仕至成都主簿不樂也天寶之亂復其初心嘗居京師西明寺又居岣嶁山終龍安寺葬其原銘曰浮圖之修其奧為禪殊區異世誰得其傳遁隱乖離浮游散遷莫徴旁行徒聽浮言空有互鬬南北相殘誰其㑹之楚有龍安龍安之德惟覺是則苞并絶異表正失惑貌昧形靜功流無極動言有為彌寂而默祠廟之嚴我居不飾貴賤之來我道無得逝耶匪追至耶誰抑惟世之幾惟道之微既陳而明乃去而歸象物徒設真源無依後學誰師嗚呼茲碑塗山銘并序柳宗元惟夏后氏建大功定大位立大政勤勞萬邦和寧四極威懷之道儀刑後王當乎洪流方割災被下土自壺口而導百川大功建焉虞帝耄期順承天厯自南河而受四海大位定焉萬國既同宣省風教自塗山而㑹諸侯大政立焉功莫崇乎禦大灾乃賜𤣥圭以承帝命位莫尊乎執大象乃輯五瑞以建皇極政莫先乎齊大統乃朝玉帛以混經制是所以承唐虞之後垂子孫之丕業立商周之前樹帝王之洪範者也嗚呼天地之道尚德而右功帝王之政崇德而賞功故堯舜至德而位不及嗣湯武大功而祚延于世有夏德配于二聖而唐虞讓功焉功冠于三代而商周讓德焉宜乎立極垂統貽于後裔當位作聖著為世準則塗山者功之所由定德之所由濟政之所由立有天下者宜取於此追惟大號既發華蓋既狩方嶽列位奔走來同山川守神莫敢遑寧羽旄四合衣裳咸㑹䖍恭就列俯僂聽命然後示之以禮樂和氣周洽申之以德刑天威震耀制立謨訓宜在長久厥後啓征有扈而夏德始衰羿距太康而帝業不守皇祖之訓不由人亡政墜卒就陵替向使繼代守文之君又能紹其功德修其政統平宫室惡衣服拜昌言平均賦入制定朝㑹則諸侯常至而天命不去矣茲山之㑹安得獨光于後歟是以周穆遐追遺法復㑹于是山聲垂天下亦紹前軌用此道也故余為之銘庶後代朝諸侯制天下者仰則於此其辭曰惟禹體道功厚德茂㑹朝侯衛統一憲度省方宣教化制殊類咸㑹壇位承奉儀矩禮具樂備德容既孚乃舉明刑以弼聖謨則戮防風遺骨專車克明克威疇敢以渝宣昭黎憲耆定混區傳祚後𦙍丕承帝圖塗山巖巖界彼東國唯禹之德配天無極即山刋碑貽後訓則沛國漢原廟銘柳宗元昔在帝堯光有四海元首萬邦時則舜禹稷卨佐命垂統股肱天下聖德未衰而內禪元臣繼天而受命四姓承休迭有中邦五神環運炎德復起周道削滅秦德暴戾皇天疇庸審厥保承乃命唐帝之後振而興之又俾元臣之後翊而登之所以紹復丕績不墜厥祀故曲逆起為策士輔成帝圖吐謀洞靈奮竒如神舜之胄也汝隂脫帝密網摧敵暴氣扶乘天休運行嘉謀禹之苗也酇侯保綏三秦控引漢中宏器廓度以大帝業卨之裔也淮隂整齊天兵導揚靈威覆趙夷魏拔齊殄楚平陽破三秦虜魏王絳侯定楚地固劉氏皆稷之裔也克復堯緒昭哉甚明天意若曰建大德者必唐帝之胄故漢氏興焉翼炎運者必唐臣之孫故羣雄登焉是以髙帝誕膺聖祚以垂德厚探昊穹之奧㫖載幽明之休祐殺白帝于大澤以承其靈建赤旗于沛邑以昭其神假手于嬴以混諸侯憑力于項以離關東奉纘堯之元命而四代之後咸獻其用德乘木之大統而秦楚之盛不保其位既建皇極設都咸陽撫征四方訓齊天下乃樂沛宫以追造邦之本乃歌大風以昭武成之德乃奠舊都以壯王業之基生為湯沐之邑沒為思樂之地且曰萬嵗之下魂遊于此惟茲原廟沛宫之舊也祭蚩尤於是庭而赤精降導靈命於是邦而羣雄至登布衣於萬乘而子孫得以績其緒化環堵為四海而黎元得以安其業基岱嶽之髙源洪河之長蓄靈擁休此焉發跡蓋以道備于是而後行之天下制成于是而後廣之宇內天下備其道而神復其本宇內成其制而心懷于舊宜其正名以表功用成其始俾生靈盡其敬焉陳本以宅神用成其終俾生靈盡其慕焉故髙帝定位建茲閟宫惠皇嗣服爰立清廟綿越千祀至今血食此所以成終而成始也且夫以斷蛇之威安知不運其密用佐嵗功以流澤歟以約法之仁安知不流其神眷相舊邦之遺黎歟以紹唐之餘慶隆天之遺烈安知不奮其神化大祐於下土歟然則展敬乞靈烏可已也銘于舊邑以迪天命其辭曰蕩蕩明德時惟放勛揖讓而退祚于後昆羣蛇輔龍以翊天門登翼炎運唐臣之孫秦羅既離鹿駭束夏長蛇封豕蹈躍中野天復堯緒鍾祐于劉赫矣漢祖播茲皇猷揚旗沛庭約從諸侯豪暴震疊威聲布流總制虎臣委成良疇勦殄霸楚遂荒神州區宇懷濡黔黎輯柔表正萬國炎靈用休定宅咸陽以都上游留觀本邦在鎬如周穆穆惠王宗湮克承崇崇沛宫清廟是憑原念大業肇經茲地乃專元命亦舉嚴祀建旗釁鼓遂據天位魂遊故都永介丕祉煥列唐典嚴恭罔墜勒此休銘以昭本始武岡銘并序柳宗元元和七年四月黔巫東鄙蠻獠雜擾盜弄庫兵賊脅守帥南鈎牂牁外誘西原置魁立帥殺牲盟誓洞窟林麓嘯呼成羣皇帝下銅獸符發庸蜀荆漢南越東甌之師四面討問畏罪憑阻逃遁不即誅時惟潭部戎帥御史中丞柳公綽練立將校提卒五百屯于武岡不震不騫如山如林告天子威命明白信順亂人大恐視公之師如百萬視公之令如風雷怨號呻吟喜有攸訴投刃頃伏願完父子卒為忠信奉職輸賦進比華人無敢不龔母弟生壻繼來于潭咸致天廷皇帝休嘉式新厥命凶渠同惡革面向化如醉之醒如狂之寧公為藥石俾復其性詔書顯異進臨江漢益兵三倍為時碩臣殿于大邦文儒申申有此武功於是夷人始復聞公之去相與髙蹈涕呼若寒去裘昔公不夸首級為已能力專務教誨俾邦斯平我老洎幼由公之仁小不為虺蜮大不為鯨鯢恩重事特不邇而逺莫可追已願銘武岡首以慰我思以昭我類以示我子孫彌億萬年俾我奉國如令之誠鄰之我懷如公之勤其辭曰黔山之巑巫水之磻魚駭而離獸犯而殘户恐合竄彼攘仍亂王師來誅期死以緩公明不疑公信不欺援師定命俾邦克正皇仁天施我反其性我塗四闔公示之門我愚抵死公示之恩既骨而完既亡而存奉公之訓貽我子孫我始蝥賊由公而仁我始寇仇由公而親山畋澤􅘋輸賦于都陶穴刋木室我姻族烹牲是祀公受介福揲蓍以占公宜百祿皇懋公功陟于大邦逺哉去我誰嗣其良有穴之丹有犀之顛匪曰余固公不可賂祝鄰之德恆遵公則朂余之世永謹邦制南夷作詩刻示來裔徐州蓮華漏銘蘇軾故龍圖閣直學士禮部侍郎燕公肅以創物之智聞於天下作蓮華漏世服其精凡公所臨必為之今州郡往往而在雖有巧者莫敢損益而徐州獨用瞽人衛朴所造廢法而任意有壺而無箭自以無目而廢天下之視使守者伺其漏則决之而更注人莫不笑之國子博士傅君禓公之外曾孫得其法為詳其通守是邦也實始改作而請銘於軾銘曰人之所信者手足耳目也目識多寡手知重輕然人未有以手量而目計者必付之於度量與權衡豈不自信而信物蓋以為無意無我然後得萬物之情故天地之寒暑日月之晦明昆侖旁薄於三十八萬七千里之外而不能逃於三尺之箭五斗之瓶雖疾雷霾風雨雪晝晦而遲速有度不加虧贏使凡為吏者如缶之受水不過其量如水之浮箭不失其平如箭之升降也視時之上下降不為辱升不為榮則民將靡然而心服而寄我以死生矣三槐堂銘蘇軾天可必乎賢者不必貴仁者不必夀天不可必乎仁者必有後二者將安取衷哉吾聞之申包胥曰人衆者勝天天定亦能勝人世之論天者皆不待其定而求之故以天為茫茫善者以怠惡者以肆盜跖之夀孔顔之厄此皆天之未定者也松柏生於山林其始也困於蓬蒿厄於牛羊而其終也貫四時閲千歲而不改者其天定也善惡之報至於子孫而其定也久矣吾以所見所聞所傳聞考之而其可必也審矣國之將興必有世德之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福故兵部侍郎晉國王公顯於漢周之際厯事太祖太宗文武忠孝天下望以為相而公卒以直道不容於時蓋聞嘗手植三槐於庭曰吾子孫必有為三公者已而其子魏國文正公相真宗皇帝於景德祥符之間朝廷清明天下無事之時享其福祿榮名者十有八年今夫寓物於人明日而取之有得有否而晉公修德於身責報於天取必於數十年之後如持左契交手相付吾是以知天之果可必也吾不及見魏公而見其子懿敏公以直諫事仁宗皇帝出入侍從將帥三十餘年位不滿其德天將復興王氏也歟何其子孫之多賢也世有以晉公比李栖筠者其雄才直氣不相上下而栖筠之子吉甫其孫德裕功名富貴略與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福蓋未艾也懿敏公之子鞏與吾遊好德而文以世其家吾是以録之銘曰嗚呼休哉魏公之業與槐俱萌封植之勤必世乃成既相真宗四方砥平歸視其家槐隂滿庭吾儕小人朝不及夕相時射利皇恤厥德庶幾僥幸不種而獲不有君子其何能國王城之東晉公所廬欎欎三槐惟德之符嗚呼休哉九成臺銘蘇軾韶陽太守狄咸新作九成臺玉局散吏蘇軾為之銘曰自秦并天下滅禮樂韶之不作蓋千三百二十有三年其器存其人亡則韶既已隱矣而况於人器兩亡而不傳雖然韶則亡矣而有不亡者存蓋嘗與日月寒暑晦明風雨並行於天地之間世無南郭子綦則耳末嘗聞地籟也而况得聞於天使耳聞天籟則凡有形有聲者皆吾羽旄干戚管磬匏絃嘗試與子登夫韶石之上舜峯之下望蒼梧之眇莽九疑之聫綿覽觀江山之吐吞草木之俯仰鳥獸之鳴號衆竅之呼吸往來唱和法有度數而筠節自成者非韶之大全乎上方立極以安天下人和而氣應氣應而樂作則夫所謂簫韶九成來鳳鳥而舞百獸者既已燦然畢陳於前矣擇勝亭銘蘇軾維古潁城因潁為隍倚舟于門美哉洋洋如淮之甘如漢之蒼如洛之溫如浚之凉可侑我客可流我觴我欲即之為館為堂近水而構夏潦所襄逺水而築邈焉相望乃作斯亭筵楹欒梁鑿枘交設合散靡常赤油仰承青幄四張我所欲往十夫可將與水升降除地布牀可使杜簣洗觶而揚可使莊周觀魚而忘可使逸少祓禊而祥可使太白泳月而狂既薺我荼亦醪我漿既濯我纓亦浣我裳豈獨臨水無適不臧春朝花郊秋夕月場無脛而趨無翼而翔敝以改為其費易償榜曰擇勝名實允當維古聖人不留一方虛白為室無可為鄉神馬凥輿孰為輪箱流行坎止雖獨不傷居之無盜中靡所藏去之無戀如所宿桑豈如世人生短慮長尺宅不治寸田是荒錫瓦銅雀石門阿房俯變仰滅與生俱亡我銘斯亭以砭世盲鼎硯銘蘇軾鼎無耳槃有趾鑑幽無見几不倚暘蟲隕羿喪厥喙羽淵之化帝祝尾不周僨裂東南圯黝然而深維水委誰乎為此昔未始戲銘其臀加幻詭文與可琴銘蘇軾攫之幽然如水赴谷釋之蕭然如葉脫木按之噫然應指而長言者似君置之枵然遺形而不言者似僕文編卷五十九

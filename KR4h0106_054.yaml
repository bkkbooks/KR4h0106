body:
  text: 文編卷五十四明唐順之編送王秀才序韓愈吾嘗以為孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以所能授弟子源逺而末益分蓋子夏之學其後有田子方子方之後流而為莊周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有姓名字曰馯臂子弓子弓受易於商瞿孟軻師子思子思之學蓋出曾子自孔子沒羣弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉太原王塤示豫所為文好舉孟子之所道者與之言信悅孟子而屢贊其文辭夫沿河而下茍不止雖有遲疾必至於海如不得其道也雖疾不止終莫幸而至焉故學者必慎其所道道於楊墨老莊佛之學而欲之聖人之道猶航斷港絶潢以望至於海也故求觀聖人之道必自孟子始今塤之所由既幾於知道如又得其船與楫知沿而不止嗚呼其可量也哉送孟東野序韓愈大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而后言其歌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推敓其必有不得其平者乎其於人也亦然人聲之精者為言文辭之於言又其精也尤擇其善鳴者而假之鳴其在唐虞咎陶禹其善鳴者也而假以鳴夔弗能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非眘到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也就其善者其聲清以浮其節數以急其辭淫以哀其志弛以肆其為言也亂雜而無章將天醜其德莫之顧邪何為乎不鳴其善鳴者也唐之有天下陳子昻蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出魏晉不懈而及於古其它浸淫乎漢氏矣從吾遊者李翺張籍其尤也三子者之鳴信善矣抑不知天將和其聲而使鳴國家之盛邪抑將窮餓其身思愁其心腸而使自鳴其不幸邪三子者之命則懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之送李願歸盤谷序韓愈太行之陽有盤谷盤谷之間泉甘而土肥草木藂茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋友人李願居之願之言曰人之稱大丈夫者我知之矣利澤施于人名聲昭于時坐于廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑才俊滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妬寵而負恃爭妍而取憐大丈夫之遇知於天子用力於當世者之所為也吾非惡此而逃之是有命焉不可幸而致也窮居而野處升髙而望逺坐茂樹以終日濯清泉以自潔採於山美可茹釣于水鮮可食起居無時惟適之安與其有譽於前孰若無毁於其後與其有樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處穢汙而不羞觸刑辟而誅戮徼幸於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宫盤之土可以稼盤之泉可濯可沿盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無央虎豹逺迹兮蛟龍遁藏鬼神守護兮呵禁不祥飲且食兮夀而康無不足兮奚所望膏吾車兮秣吾馬從子于盤兮終吾生以徜徉送楊少尹序韓愈昔疏廣受二子以年老一朝辭位而去于時公卿設供張祖道都門外車數百兩道路觀者多歎息泣下共言其賢漢史既傳其事而後世工畫者又圖其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉世常説古今人不相及今楊與二疏其意豈異也豫忝在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾匹道邉觀者亦有歎息知其為賢與否而太史氏又能張大其事為傳繼二疏蹤迹不落莫否見今世無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以為其都少尹不絶其祿又為歌詩以勸之京師之長於詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也中世士大夫以官為家罷則無所於歸楊侯始冠舉於其鄉歌鹿鳴而來也今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也鄉人莫不加敬誡子孫以楊侯不去其鄉為法古之所謂鄉先生沒而可祭於社者其在斯人歟其在斯人歟送齊皥下第序韓愈古之所謂公無私者其取捨進退無擇於親疏逺邇惟其宜可焉其下之視上也亦惟視其舉黜之當否不以親疏逺邇疑乎其上之人故上之人行志擇誼坦乎其無憂於下也下之人克己慎行確乎其無惑於上也是故為君不勞而為臣甚易見一善焉可得詳而舉也見一不善焉可得明而去也及道之衰上下交疑於是乎舉讐舉子之事載之傳中而稱美之而謂之忠見一善焉若親與邇不敢舉也見一不善焉若疏與逺不敢去也衆之所同好焉矯而黜之乃公也衆之所同惡焉激而舉之乃忠也於是乎有違心之行有怫志之言有內愧之名若然者俗所謂良有司也膚受之訴不行於君巧言之誣不起於人矣嗚呼今之君天下者不亦勞乎為有司者不亦難乎為人嚮道者不亦勤乎是故端居而念焉非君人者之過也則曰有司焉非有司之過也則曰今舉天下人焉則非今舉天下人之過也蓋其漸有因其本有根生於私其親成於私其身以已之不直而謂人皆然其植之也固久其除之也實難非百年必世不可得而化也非知命不惑不可得而改也已矣乎其終能復古乎若髙陽齊生者其起豫者乎齊生之兄為時名相出藩于南朝之碩臣皆其舊交齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司其枉我哉我將利吾器而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也若齊生者既至矣而曰我未也不以閔於有司其不亦鮮乎哉吾用是知齊生後日誠良有司也能復古者也公無私者也知命不惑者也送髙間上人序韓愈茍可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸秋之於奕伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾者也往時張旭善草書不治他伎喜怒窘窮憂悲愈佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之觀於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰鬭天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世今間之於草書有旭之心哉不得其心而逐其迹未見其能旭也為旭有道利害必明無遺錙銖情炎於中利欲鬭進有得有喪勃然不釋然後一決於書而後旭可幾也今間師浮屠氏一死生解外膠是其為心必泊然無所起其於世必淡然無所嗜泊與淡相遭頺墮委靡潰敗不可收拾則其於書得無象之然乎然吾聞浮屠人善幻多技能間如通其術則吾不能知矣送文暢序韓愈人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如有墨名而儒行者問其名則非校其行則是可以與之遊乎揚子雲稱在門牆則麾之在邊裔則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於搢紳先生以求咏歌其所志貞元十九年春將行東南栁君宗元為之請解其裝得所得敘詩纍百餘篇非至篤好其何能致多如是邪惜其無以聖人之道告之者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之説當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物事為之盛其心有慕焉拘其法而未能入故樂聞其説而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之説而瀆告之也民之初生固若蟲魚鳥獸然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫正乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於册中國之人世守之今浮屠者孰為而孰傳之耶夫鳥俯而啄仰而四顧夫獸深居而簡出懼物之為己害也猶且不免焉弱之肉強之食今吾與文暢安居而暇食優遊以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不為者惑也悅乎故不能即乎新者弱也知而不以告人者不仁也告而不以實者不信也余既重栁請又嘉浮屠能喜文辭於是乎言送廖道士序韓愈五嶽於中州衡山最逺南方之山巍然髙而大者以百數獨衡為宗最逺而獨為宗其神必靈衡之南八九百里地益髙山益峻水清而益駛其最髙而橫絶南北者嶺郴之為州在嶺之上測其髙下得三之二焉中州清淑之氣於是焉窮氣之所窮盛而不過必蜿蟺扶輿磅礴而鬱積衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積其水土之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之美千尋之名材不能獨當也意必有魁竒忠信材德之民生其間而吾又未見也其無乃迷惑溺沒於老佛之學而不出耶廖師郴民而學於衡山氣專而容寂多藝而善遊豈吾所謂魁竒而迷溺者耶廖師善知人若不在其身必在其所與遊訪之而不吾告何也於其别申以問之送水陸運使韓侍御歸所治序韓愈六年冬振武軍吏走驛馬詣闕告飢公卿廷議以轉運使不得其人宜選才幹之士往換之吾族子重華適當其任至則出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其傍便近地以償所負釋其粟之在吏者四十萬斛不徵吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授方法故連二嵗大熟吏得盡償其所亡失四十萬斛者而私其贏餘得以蘇息軍不復飢君曰此未足為天子言請益募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲州界極於中受降城出入河山之際六百餘里屯堡相望寇來不能為暴人得肆耕其中少可以罷漕挽之費朝廷從其議秋果倍收嵗省度支錢千三百萬八年詔拜殿中侍御史錫服朱銀其冬來朝奏曰得益開田四千頃則盡可以給塞下五城矣田五千頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以制敵庶幾所謂兵農兼事務一而兩得者也大臣方持其議吾以為邊軍皆不知耕作開口望哺有司常僦人以車船自它郡往輸乘沙逆河逺者數千里人畜死蹄踵交道費不可勝計中國坐耗而邊吏恆苦食不繼今君所請田皆故秦漢時郡縣地其課績又已驗白若從其言其利未可遽以一二數也今天子方舉羣䇿以收太平之功寧使士有不盡用之歎懷竒見而不得施設也君又何憂而中臺士大夫亦同言侍御韓君前領三縣紀綱二州奏課常為天下第一行其計於邊其功烈又赫赫如此使盡用其䇿西北邊故所沒地可指期而有也聞其歸皆相勉為詩以推大之而屬余為序送鄭尚書權序韓愈嶺之南其州七十其二十二𨽻嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府始至四府必使其佐啓問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎郊及既至大府帥先入據館帥守屏若將趨入拜庭之為者大府與之為讓至一再乃敢改服以賔主見適位執爵皆興拜不許乃止虔若小侯之事大國有大事咨而後行𨽻府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島帆風一日踔數千里漫瀾不見蹤迹控御失所依險阻結黨讐機毒矢以待將吏撞搪呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸故常薄其征入簡節而疏目時有所遺漏不究切之長養以兒子至紛不可治乃草剃而禽獮之盡根株痛斷乃止其海外雜國若耽浮羅流求毛人夷亶之州林邑扶南真臘于陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邊盡治不相寇盜賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳瑁竒物溢於中國不可勝用故選帥常重於它鎮非有文武威風知大體可畏信者則不幸往往有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫往踐其任鄭公嘗以節鎮襄陽又帥滄景德棣歷河南尹華州刺史皆有功德可稱道入朝為金吾將軍散騎常侍工部侍郎尚書家屬百人無數畝之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不悅將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以來字者所以祝公成政而來歸疾也送鄭十校理序韓愈祕書御府也天子猶以為外且逺不得朝夕視始更聚書集賢殿别置校讐官曰學士曰校理常以寵丞相為大學士其它學士皆達官也校理則用天子之名能文學者茍在選不計其秩次惟所用之由是集賢之書盛積盡祕書所有不能處其半書日益多官日益重四年鄭生涵始以長安尉選為校理人皆曰是宰相子能恭儉守教訓好古義施於文辭者如是而在選公卿大夫家之子弟其勸耳矣愈為博士也始事相公於祭酒分教東都生也事相公於東太學今為郎於都官也又事相公於居守三為屬吏經時五年觀道德於前後聽教誨於左右可謂親薰而炙之矣其髙大逺密者不敢隱度論也其勤已而務博施以已之有欲人之能不知古君子何如耳今生始進士獲重語於天下而慊慊若不足真能守其家法矣其在門者可進賀也求告來寧朝夕侍側東都士大夫不得見其面於其行日分司吏與留守之從事竊載酒肴席定鼎門外盛賔客以餞之既醉各為詩五韻且屬愈為序送幽州李端公序韓愈元年今相國李公為吏部員外郎愈嘗與偕朝道語幽州司徒公之賢曰某前年被詔告禮幽州入其地迓勞之使里至每進益恭及郊司徒公紅帓首鞾袴握刀左右雜佩弓韔服矢插房俯立迎道左某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命卒不得辭上堂即客階坐必東向愈曰國家失太平於今六十年夫十甲十二子相配數窮六十其將復平平必自幽州始亂之所出也今天子大聖司徒公勤於禮庶幾帥先河南北之將來覲奉職如開元時乎李公曰然今李公既朝夕左右必數數為上言元年之言殆合矣端公嵗時來夀其親東都東都之大夫士莫不拜于門其為公佐甚忠意欲司徒公功名流千萬嵗請以愈言為使歸之獻送楊支使序韓愈愈在京師時嘗聞當今藩翰之賔客惟宣州為多賢與之遊者二人隴西李博清河崔羣羣與博之為人吾知之道不行於主人與之處者非其類雖有享之以季氏之富不一日留也以羣博論之凡在宣州之幕下者雖不盡與之遊皆可信而得其為人矣愈未嘗至宣州而樂頌其主人之賢者以其取人信之也今中丞之在朝愈日侍言於門下其來而鎮兹土也有問湖南之賔客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賔客於幕下於是知前之信之也不失矣及儀之之來也聞其言而見其行則向之所謂羣與博者吾何先後焉儀之智足以造謀材足以立事忠足以勤上惠足以存下而又侈之以詩書六藝之學先聖賢之德音以成其文以附其質宜乎從事於是府而流聲實於天朝也夫樂道人之善以勤其歸者乃吾之心也謂我為邑長於斯而媚夫人云者不知言者也工乎詩者歌以繫之送許郢州序韓愈愈嘗以書自通於于公纍數百言其大要言先達之士得人而託之則道德彰而名問流後進之士得人而託之則事業顯而爵位通下有矜乎能上有矜乎位雖恆相求而不相遇于公不以其言為不可復書曰足下之言是也于公身居方伯之尊蓄不世之材而能與卑鄙庸陋相應答如影響是非忠乎君而樂乎善以國家之務為己任者乎愈雖不敢私其大恩抑不可不謂之知已恆矜而誦之情已至而事不從小人之所不為也故於使君之行道刺史之事以為于公贈凡天下之事成於自同而敗於自異為刺史者恆私於其民不以實應乎府為觀察使者恆急於其賦不以情信乎州繇是刺史不安其官觀察使不得其政財已竭而斂不休人已窮而賦愈急其不去為盜也亦幸矣誠使刺史不私於其民觀察使不急於其賦刺史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也斂不可以獨急如是而政不均令不行者未之有也其前之言者于公既已信而行之矣今之言者其有不信乎縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能信之愈於使君非燕遊一朝之好也故其贈行不以頌而以規贈崔復州序韓愈有地數百里趨走之吏自長史司馬以下數十人其祿足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼丈夫官至刺史亦榮矣雖然幽逺之小民其足迹未嘗至城邑茍有不得其所能自直於鄉里之吏者鮮矣况能自辨於縣吏乎能自辨於縣吏者鮮矣况能自辨於刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民産無恆水旱癘疫之不期民之豐約懸於州縣令不以言連帥不以信民就窮而斂愈急吾見刺史之難為也崔君為復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其難為者將在於此乎愈嘗辱于公之知而舊遊于崔君慶復人之將蒙其休澤也於是乎言送溫處士赴河陽軍序韓愈伯樂一過冀北之野而馬羣遂空夫冀北馬多天下伯樂雖善知馬安能空其羣耶解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之羣無留良焉茍無良雖謂無馬不為虛語矣東都固士大夫之冀北也恃才能深藏而不市者洛之北涯曰石生其南涯曰溫生大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以溫生為才於是以石生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉拔其尤暮取一人焉拔其尤自居守河南尹以及百司之執事與吾輩二縣之大夫政有所不通事有所可疑奚所咨而處焉士大夫之去位而巷處者誰與嬉遊小子後生於何考德而問業焉搢紳之東西行過是都者無所禮於其廬若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也夫南面而聽天下其所託重而恃力者惟相與將耳相為天子得人於朝廷將為天子得文武士于幕下求內外無治不可得也愈縻於兹不能自引去資二生以待老今皆為有力者奪之其何能無介然於懷耶生既至拜公於軍門其為吾以前所稱為天下賀以後所稱為吾致私怨於盡取也留守相公首為四韻詩歌其事愈因推其意而序之送石處士序韓愈河陽軍節度御史大夫烏公為節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙瀍穀之間冬一裘夏一葛食朝夕飯一盂蔬一盤人與之錢則辭請與出遊未嘗以事辭勸之仕不應坐一室左右圗書與之語道理辨古今事當否論人髙下事後當成敗若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也大夫曰先生有以自老無求於人其肻為某來耶從事曰大夫文武忠孝求士為國不私於家方今寇聚於恆師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出先生仁且勇若以義請而強委重焉其何説之辭於是撰書詞具馬幣卜日以授使者求先生之廬而請焉先生不告於妻子不謀於朋友冠帶出見客拜受書禮於門內宵則沐浴戒行李載書册問道所由告行於常所來往晨則畢至張上東門外酒三行且起有執爵而言者曰大夫真能以義取人先生真能以道自任決去就為先生别又酌而祝曰凡去就出處何常惟義之歸遂以為先生夀又酌而祝曰使大夫恆無變其初無務富其家而飢其師無甘受佞人而外敬正士無味於諂言惟先生是聽以能有成功保天子之寵命又祝曰使先生無圗利於大夫而私便其身圖先生起拜祝辭曰敢不敬蚤夜以求從祝規於是東都之人士咸知大夫與先生果能相與以有成也遂各為歌詩六韻退愈為之序云送殷員外序韓愈唐受天命為天子凡四方萬國不問海內外無小大咸臣順於朝時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方內就法度十二年詔曰四方萬國惟回鶻於唐最親奉職尤謹丞相其選宗室四品一人持節往賜君長告之朕意又選學有經法通知時事者一人與之為二由是殷侯侑自大常博士遷尚書虞部員外郎兼侍御史朱衣象笏承命以行朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離别可憐之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉丞相以子應詔真誠知人士不通經果不足用於是相屬為詩以道其行云送湖南李正字序韓愈貞元中愈從太傅隴西公平汴州李生之尊府以侍御史管汴之鹽鐵日為酒殺羊享賔客李生則尚與其弟學讀書習文辭以舉進士為業愈於太傅府年最少故得交李生父子間公薨軍亂軍司馬從事皆死侍御亦被讒為民日南其後五年愈又貶陽山令今愈以都官郎守東都省侍御自衡州刺史為親王長史亦留此掌其府事李生自湖南從事請告來覲於時太傅府之士惟愈與河南司録周君獨存其外則李氏父子相與為四人離十三年幸而集處得燕而舉一觴相屬此天也非人力也侍御與周君於今為先輩成德李生溫然為君子有詩八百篇傳詠於時惟愈也業不益進行不加修顧惟未死耳往拜侍御謁周君抵李生退未嘗不發愧也往時侍御有無盡費於朋友及今則又不忍其三族之寒飢聚而館之疏逺畢至祿不足以養李生雖欲不從事於外其勢不可得已也重李生之還者皆為詩愈最故故又為序云送竇從事序韓愈踰甌閩而南皆百越之地於天文其次星紀其星牽牛連山隔其陰巨海敵其陽是維島居卉服之民風氣之殊著自古昔唐之有天下號令之所加無異於逺近民俗既遷風氣亦隨雪霜時降癘疫不興瀕海之饒固加於初是以人之之南海者若東西州焉皇帝臨天下二十有二年詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文辭進於其行也其族人殿中侍御史牟合東都交遊之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得人壯從事之答於知我不憚行之逺也又樂侍御貽周之愛其族叔父能合文辭以寵榮之作送竇從事少府平序贈張童子序韓愈天下之以明二經舉於禮部者嵗至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是數焉州若府總其屬之所升又考試之如縣加察詳焉定其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之鄉貢有司者總州府之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部嵗不及二百人謂之出身能在是選者厥惟艱哉二經章句僅數十萬言其傳注在外皆誦之又約知其大説繇是舉者或逺至十餘年然後與乎三千之數而升於禮部矣又或逺至十餘年然後與乎二百之數而進於吏部矣斑白之老半焉昏塞不能及者皆不在是限有終身不得與焉者張童子生九年自州縣逹禮部一舉而進立於二百之列又二年益通二經有司復上其事繇是拜衛兵曹之命人皆謂童子耳目明達神氣以靈余亦偉童子之獨出于等夷也童子請於其官之長隨父而寧母嵗八月自京師道陜南至虢東及洛師北過大河之陽九月始來及鄭自朝之聞人以及伍都之伯長羣吏皆厚其餼賂或作歌詩以嘉童子童子亦榮矣雖然愈將進童子於道使人謂童子求益者非欲速成者夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉成人之禮非盡於童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者可也愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子送王秀才序韓愈吾少時讀醉鄉記私怪隱居者無所纍於世而猶有是言豈誠旨於味耶及讀阮籍陶潛詩乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也若顔氏子操瓢與簞曾參歌聲若出金石彼得聖人而師之汲汲每若不可及其於外也固不暇尚何麴蘖之託而昏冥之逃耶吾又以悲醉鄉之徒不遇也建中初天子嗣位有意貞觀開元之丕績在廷之臣爭言事當此時醉鄉之後世又以直廢吾既悲醉鄉之文辭而又嘉良臣之烈思識其子孫今子之來見我也無所挾吾猶將張之况文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信於世也於其行姑與之飲酒送牛堪序韓愈以明經舉者誦數十萬言又約通大義徵辭引類旁出入他經者又誦數十萬言其為業也勤矣登第於有司者去民畝而就吏祿由是進而纍為卿相者常常有之其為獲也亦大矣然吾未嘗聞有登第於有司而進謝於其門者豈有司之待之也抑以公不以情舉者之望於有司也亦將然乎其進而謝於其門也則為私乎抑無乃人事之未思或者不能舉其禮乎若牛堪者思慮足以及之材質足以行之而又不聞其往者其將有以哉違衆而求識立竒而取名非堪心之所存也由是而觀之若堪之用心其至於大官也不為幸矣堪太學生也余博士也博士師屬也於其登第而歸將榮於其鄉也能無説乎送陳秀才彤序韓愈讀書以為學纘言以為文非以誇多而鬭靡也蓋學所以為道文所以為理耳茍行事得其宜出言適其要雖不吾面吾將信其富於文學也潁川陳彤始吾見之楊湖南門下頎然其長薰然其和吾目其貌耳其言因以得其為人及其久也果若不可及夫湖南之於人不輕以事接爭名者之於藝不可以虛屈吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也如是而又問焉以質其學䇿焉以考其文則何信之有故吾不徵於陳而陳亦不出於我此豈非古人所謂可為智者道難與俗人言者類耶凡吾從事於斯也久未見舉進士有如陳生而不如志者於其行姑以是贈之送孟秀才序韓愈今年秋見孟氏子琯於郴年甚少禮甚度手其文一編甚巨退披其編以讀之盡其書無有不能吾固心存而目識之矣其十月吾道於衡潭以之荆纍纍見孟氏子焉其所與偕盡善人長者吾益以竒之今將去是而隨舉於京師雖不有請猶將強而授之以就其志况其請之煩耶京師之進士以千數其人靡所不有吾常折肱焉其要在詳擇而固交之善雖不吾與吾將強而附不善雖不吾惡吾將強而拒茍如是其於髙爵猶階而升堂又况其細者耶送何堅序韓愈何於韓同姓為近堅以進士舉於吾為同業其在太學也吾為博士堅為生生博士為同道其識堅也十年為故人同姓而近也同業也同道也故人也於其不得願而歸其可以無言耶堅道州人道之守陽公城賢也道於湖南為屬州湖南楊公憑又賢也堅為民堅又賢也湖南得道為屬道得堅為民堅歸唱其州之父老子弟服陽公之令道亦唱其縣與其比州服楊公之令吾聞鳥有鳳者恆出於有道之國當漢時黃霸為潁川是鳥實集而鳴焉若史可信堅歸吾將賀其見鳳而聞其鳴也已送薛存義之任序柳宗元河東薛存義將行栁子載肉于俎崇酒于觴追而送之江之滸飲食之且告曰凡吏于土者若知其職乎蓋民之役非以役民而已也凡民之食于土者出其十一傭乎吏使司平於我也今受其直怠其事者天下皆然豈唯怠之又從而盜之向使傭一夫於家受若直怠若事又盜若貨器則必甚怒而黜罰之矣以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何有達于理者得不恐而畏乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱無懷詐暴憎其為不虛取直也的矣其知恐而畏也審矣吾賤且辱不得與考績幽明之説於其往也故賞以酒肉而重之以辭送李判官往桂州序柳宗元士之習為吏者恆病於少文故給而不肆飾於華者恆病於無斷故放而不制今李生學於詩有年矣吟詠風賦頗聞乎人至於是州惟州之牧咨焉以贊戎事而糾羣吏甚直且武豈所謂吏而華者耶以府喪罷去擇而之乎有禮之邦推是道也以往然而不際於禮則吾不知也送董邵南序韓愈燕趙古稱多感慨悲歌之士董生舉進士連不得志於有司懷抱利器鬱鬱適兹土吾知其必有合也董生勉乎哉夫以子之不遇時茍慕義強仁者皆愛惜焉矧燕趙之士出乎其性者哉然吾嘗聞風俗與化移易吾惡知其今不異於古所云耶聊以吾子之行卜之也董生勉乎哉吾因子有所感矣為我弔望諸君之墓而觀於其市復有昔時屠狗者乎為我謝曰明天子在上可以出而仕矣送徐從事北遊序柳宗元讀詩禮春秋莫能言説其容貌充充然而聲名不聞傳於世豈天下廣大多儒而使然歟將晦其説諱其讀不使世得聞傳其名歟抑處於逺仕於逺不與通都大邑豪傑角其伎而至於是歟不然無顯者為之倡以振動其聲歟今之世不能多儒可以蓋生者觀生亦非晦諱其説讀者然則餘二者為之決矣生北遊必至通都大邑通都大邑必有顯者由是其果聞傳於世歟茍聞傳必得位得位而以詩禮春秋之道施於事及於物思不負孔子之筆舌能如是然後可以為儒儒可以説讀為哉送徐無黨南歸序歐陽修草木鳥獸之為物衆人之為人其為生雖異而為死則同一歸於腐壞澌盡泯滅而已而衆人之中有聖賢者固亦生且死於其間而獨異於草木鳥獸衆人者雖死而不朽逾逺而彌存也其所以為聖賢者修之於身施之於事見之於言是三者所以能不朽而存也修於身者無所不獲施於事者有得有不得焉其見於言者則又有能有不能也施於事矣不見於言可也自詩書史記所傳其人豈必皆能言之士哉修於身矣而不施於事不見於言亦可也孔子弟子有能政事者矣有能言語者矣若顔回者在陋巷曲肱飢卧而已其羣居則默然終日如愚人然自當時羣弟子皆推尊之以為不敢望而及而後世更百千嵗亦未有能及之者其不朽而存者固不待施於事况於言乎豫讀班固藝文志唐四庫書目見其所列自三代秦漢以來著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉豫竊悲其人文章麗矣言語工矣無異草木榮華之飄風鳥獸好音之過耳也方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸於泯滅夫言之不可恃也蓋如此今之學者莫不慕古聖賢之不朽而勤一世以盡心於文字間者皆可悲也東陽徐生少從豫學為文章稍稍見稱於人既去而與羣士試於禮部得髙第由是知名其文辭日進如水涌而山出豫欲摧其盛氣而勉其思也故於其歸告以是言然豫固亦喜為文辭者亦因以自警焉送楊置序歐陽修豫嘗有幽憂之疾退而間居不能治也既而學琴於友人孫道滋受宫聲數引久而樂之不知疾之在其體也夫琴之為技小矣及其至也大者為宫細者為羽操絃驟作忽然變之急者悽然以促緩者舒然以和如崩崖裂石髙山出泉而風雨夜至也如怨夫寡婦之歎息雌雄雍雍之相鳴也其憂深思逺則舜與文王孔子之遺音也悲愁感憤則伯竒孤子屈原忠臣之所歎也喜怒哀樂動人必深而純古淡泊與夫堯舜三代之言語孔子之文章易之憂患詩之怨刺無以異其能聽之以耳應之以手取其和者道其堙鬱寫其憂思則感人之際亦有至者焉豫友楊君好學有文纍以進士舉不得志及從廕調為尉於劍浦區區在東南數千里外是其心固有不平者且少又多疾而南方少醫藥風俗飲食異宜以多疾之體有不平之心居異宜之俗其能鬱鬱以久乎然欲平其心以養其疾於琴亦將有得焉故豫作琴説以贈其行且邀道滋酌酒進琴以為别送楊子聰戶曹序歐陽修士之仕於州郡者必視其地大小髙下之望以為輕重河南大府也參軍雖卑以望而髙下之固與他州郡異矣然地大望髙居者皆將相名臣達官居又不久率一二嵗而甚者半嵗而易故河南吏民間坐而偶語道某相某將某官者常名斥而一二嵗數之至於郎中御史方鎮牧守使人貴客由河南出者入不候於疆去不餞于郊途逢而不避市坐者不起豈素慢哉蓋其見之習也彼視公卿大臣要官其易如此矧所謂參軍者邪其不羣嘲而隨侮之幸也參軍每上府望門而趍吏摩以肩過不揖反就焉持刺執版求通姓名雖心負其所有欲進自達不可得其勢鬱鬱卑且賤反甚於它州郡故為之者未嘗樂也然其間能自以頭角頎然而出者鮮矣其才能之美非有異乎衆莫能也戶曹參軍楊子聰居府中常衣青衫騎破虎韉出入府門下人固輩視而槩易之居一嵗相國彭城公薦之集賢學士謝公又薦之士之有文而賢者盡交之其能出其頭角矣若去而之他州郡不特頎然而出矣遂將傑然以獨立也子聰南人樂其土風今秩滿調於吏部必吏於南也吾見南之州郡有傑然而獨出者必楊子聰也送王聖紀赴扶風主簿序歐陽修前年五月大霖雨殺麥河溢東畿浸下田已而不雨至于八月菽粟死髙田三司有言前時溢博州民冒河為言得免租者蓋萬計今嵗秋當租懼民幸水旱因緣得妄免以虧兵食慎勑有司謹之朝廷因舉田令約束州縣吏吏無逺近皆望風惡民言水旱一以農田勑限甚者笞而絶之畿之民訴其縣不聽則訴於開封又不聽則相與聚立宣德門外訴於宰相於是遣吏四出視諸縣視者還而或言災或言否然言否者十七八最後視者還言民實災而吏徒畏約束以茍自免爾天子聞之惻然盡蠲畿民之租余嘗竊歎曰民生幸而為畿民緩急近而易知也雨降于天河溢于地與赤日之出是三者物之易見也前二三嵗旱蝗相連朝廷嵗嵗隨其災之厚薄蠲其賦之多少至兵食不足則嵗糴或入粟以爵而充之是在上者之愛人而仁人之心易惻也以易知之近言易見之事告易惻之仁然吏一壅之幾不得達况四海之大幾萬里而逺事之難知不若霖潦赤日之易見者何數使上有惻之之心不得達于下下有思告之苦不得通於上者吏居其間而壅之爾可勝歎哉扶風為縣限關之西距京師在千里外民之不幸而事有隱微者何限其能生死曲直之者令與主簿尉三人而已民之志得不壅而聞于州州不壅而聞于上縣不壅而民志通者令與主簿尉達之而已王君聖紀主簿於其縣聖紀好學有文佐是縣也始試其為政焉故以夫素所歎者告之送祕書丞宋君歸太學序歐陽修陋巷之士甘藜藿而修仁義毁譽不干其守飢寒不纍其心此衆人以為難而君子以為易生于髙門世襲軒冕而躬布衣韋帶之行其驕榮佚欲之樂生長于其間而不溺其習日見于其外而不動乎其中此雖君子猶或難之學行足以立身而進不止材能足以髙人而志愈下此雖聖人亦以為難也書曰不自滿假又曰汝惟不矜不伐以舜禹之明猶以是為相戒懼况其下者哉此誠可謂難也已廣平宋君宣獻公之子公以文章為當世宗師顯于朝廷登于輔弼清德著于一時令名垂于後世君少自立不以門地驕于人既長學問好古為文章天下賢士大夫皆稱慕其為人而君慊然常若不足于己者守官太學甘寂寞以自處日與寒士往來而從先生國子講論道德以求其益夫生而不溺其習此蓋出其天性其見焉而不動于中者由性之明學之而後至也學而不止髙而愈下豫自其幼見其長行而不倦久而愈篤可知其將無所不至焉也孟子所謂孰能禦之者歟豫陋巷之士也遭時奮身竊位于朝守其貧賤之節其臨利害禍福之際常恐其奪也以豫行君子之所易者猶若是知君行聖賢之所難者為難能也歲之三月來自京師拜其舅氏豫得延之南齋聽其論議而慕其為人雖與之終身久處而不厭也留之數日而去於其去也不能忘言遂為之序送田畫秀才寧親萬州序歐陽修五代之初天下分為十三四及建隆之際或滅或微其在者猶七國而蜀與江南地最大以周世宗之雄三至淮上不能舉李氏而蜀亦恃險為阻秦隴山南皆被侵奪而荆人縮手歸峽不敢西窺以爭故地及太祖受天命用兵不過萬人舉兩國如一郡縣吏何其偉歟當此時文初之祖從諸將西平成都及南攻金陵功最多於時語名將者稱田氏田氏攻書史官祿世于家至今而不絶及天下已定將率無所用其武士君子爭以文儒進故文初將家子反衣白衣從鄉進士舉於有司彼此一時亦各遭其藝而然也文初辭業通敏為人敦潔可喜歲之仲春自荆南西拜其親於萬州維舟夷陵豫與之登髙以逺望遂遊東山窺緑蘿溪坐磐石文初愛之數日乃去夷陵者其地志云北有夷山以為名或曰巴峽之險至此地始平夷蓋今文初所見尚未為山川之勝者由此而上泝江湍入三峽險怪竒絶乃可愛也當王師伐蜀時兵出兩道一自鳳州以入一自歸州以取忠萬以西今之所經皆王師嚮所用武處覽其山川可以慨然而賦矣送周屯田序曾鞏士大夫登朝廷年七十上書去其位天子官其一子而聽之亦可謂榮矣然而有若不釋然者余為之言曰古之士大夫倦而歸者安車几杖膳羞被服百物之珍好自若天子養以燕享飲食鄉射之禮自比子弟袒韝鞠􅎽以薦其物咨其辭説不於庠序則於朝廷時節之賜與縉紳之禮於其家者不以朝則以夕上之聽其休焉不敢勤以事下之自老為無為而尊榮也今一日辭事還其廬徒御散矣賔客去矣百物之順其欲者不足人之羣嬉屬好之交不與約居而獨遊散棄乎山墟林莽陋巷窮閭之間如此其於長者薄也亦曷能使其不歉然於心耶雖然不及乎尊事可以委蛇其身而益間不享乎珍好可以窒煩除薄而益安不離乎深山長谷豈不足以易其庠序之位不居其榮豈有患乎其辱哉然則古之所以殷勤奉老者皆世之任事者所自為於士之倦而歸者顧為煩且勞也今之置古事者顧有司為少耳士之老於其家者獨得其自肆也然則何為動其意耶豫為之言者尚書屯田員外郎周君中復周君與先人俱天聖二年進士與豫舊且好也既為之辨其不釋然者又欲其有以處而樂也讀豫言者可無異周君而病今之失矣送江任序曾鞏均之為吏或中州之人用於荒邊側境山區海聚之間蠻夷異域之處或燕荆越蜀海外萬里之人用於中州以至四遐之鄉相易而往其山行水涉沙莽之馳往往為風霜氷雪瘴霧之毒之所侵加蛇龍虺蜴虎豹之羣之所抵觸衝波急洑隤崖落石之所覆壓其進也莫不籯糧褁藥選舟易馬力兵曹伍而後動戒朝奔夜變更寒暑而後至至則宫廬器械被服飲食之具土風氣候之宜與夫人民謡俗語言習尚之務其變難遵而其情難得也則多愁居惕處歎息而思歸及其久也所習已安所蔽已解則歲月有期可引而去矣故不得專一精思修治具以宣布天子及下之仁而為後世可守之法也或九州之人各用於其土不在西封在東境士不必勤舟車輿馬不必力而已傳其邑都坐其堂奧道途所次升降之倦凌冒之虞無有接於其形動於其慮至則耳目口鼻百體之所養如不出乎其家父兄六親故舊之人朝夕相見如不出乎其里山川之形土田市井風謡俗習辭説之變利害得失善惡之條貫非其童子之所聞則其少長之所遊覽非其自得則其鄉之先生老者之所告也所居已安所有事之宜皆已習熟如此故能專慮致勞營職事以宣上恩而修百姓之急其施為先後不待旁咨久察而與奪損益之幾已斷於胸中矣豈類夫孤客逺寓之憂而以茍且決事哉臨川江君任為洪之豐城此兩縣者牛羊之牧相交樹木果蔬五穀之壟相入也所謂九州之人各用於其土者孰近於此既已得其所處之樂而厭聞飫聽其民人之事而江君又有聰明敏慧之才廉潔之行以行其政吾知其不去圗書議論之適賔客之好而所為有餘矣蓋縣之治則民自得於大山深谷之中而州以無為於上吾將見江西之幕府無南嚮而慮者矣於其行遂書以送之送蔡元振序曾鞏古之州從事皆自辟士士亦擇所從故賔主相得也如不得其志去之可也今之州從事皆命於朝非惟守不得擇士士亦不得擇所從賔主豈盡相得哉如不得其志未可以輒去也故守之治從事無為可也守之不治從事舉其政亦勢然也議者不原其勢以為州之政當一出於守從事舉其政則為立異為侵官噫從事可否其州事職也不惟其同守之同則舍己之是而求與之同可乎不可也州為不治矣守不自任其責巳亦莫之任也可乎不可也則舉其政其孰為立異耶其孰為侵官耶議者未之思也雖然迹其所以然豈士之所喜然哉故曰亦勢然也今四方之從事惟其守之同者多矣幸而材從事視其政之缺不過室於歎途於議而已脫然莫以為已事反是焉則激激亦奚以為也求能自任其責者少矣為從事乃爾為公卿大夫士於朝不爾者其幾耶臨川蔡君從事於汀始試其為政也汀誠為州治也蔡君可拱而坐也誠未治也人皆觀君也無激也無同也惟其義而已矣蔡君之任也其異日官於朝一於是而已矣亦蔡君之任也可不茂歟其行也來求吾文故序而送之贈黎安二生序曾鞏趙郡蘇軾余之同年友也自蜀以書至京師遺余稱蜀之士曰黎生安生者既而黎生攜其文數十萬言安生攜其文亦數千言辱以顧豫讀其文誠閎壯雋偉善反復馳騁窮盡事理而其才力之放縱若不可極者也二生固可謂魁竒特起之士而蘇君固可謂善知人者也頃之黎生補江陵府司法參軍將行請余言以為贈余曰余之知生既得之於心矣乃將以言相求於外耶黎生曰豫與安生之學於斯文里之人皆笑以為迂濶今求子之言蓋將解惑於里人余聞之自顧而笑夫世之迂濶孰有甚於余乎知信乎古而不知合乎世知志乎道而不知同乎俗此余所以困於今而不自知也世之迂濶孰有甚於余乎今生之迂特以文不近俗迂之小者耳患為笑於里之人若余之迂大矣使生持吾言而歸且重得罪庸詎止於笑乎然則若余之於生將何言哉謂豫之迂為善則其患若此謂為不善則有以合乎世必違乎古有以同乎俗必離乎道矣生其無急於解里人之惑則於是焉必能擇而取之遂書以贈二生并示蘇君以為何如也送趙宏序曾鞏荆民與蠻合為冦潭旁數州被其害天子宰相以潭重鎮守臣不勝任為改用人又不勝復改之守至上書乞益兵詔與撫兵三百殿直天水趙君希道實護以往希道雅與余接間過余道潭之事豫曰潭山川甲兵如何食幾何賊衆寡強弱如何豫不能知能知書書之載若潭事多矣或合數道之兵以數萬絶山谷而進其勢非不衆且健也然而卒殲焉者多矣或單車獨行然而以克者相踵焉顧其義信何如耳致吾義信雖單車獨行冦可以為無事龔遂張綱祝良之類是也義信不足以致之雖合數道之兵以數萬卒殱焉適重寇耳况致平耶楊旻裴行立之類是也則兵不能致平致平者在太守身耳明也前之守者果能此天子宰相烏用易之必易之為前之守者不能此也今往者復曰乞益兵何其與書之云者異耶豫憂潭民之重困也寇之益張也往時潭吏與旁近郡靳力勝賊者暴骸者戮降者有之今之往者將特不為是而已耶抑猶不免乎為是也天子宰相任之之意其然耶潭守近侍臣使撫覘潭者郎吏御史博士相望為我諗其賢者曰今之言古書往往曰迂然書之事乃已試者也事已試而施諸治與時人之自用孰為得失耶愚言倘可以平潭之患今雖細然大中咸通之間南方之憂嘗劇矣夫豈階於大哉為近臣郎吏御史博士者獨得而不思也希道固喜事者因其行遂次第其語以送之送孫正之序王安石時然而然衆人也已然而然君子也已然而然非私已也聖人之道在焉爾夫君子有窮苦顛跌不肻一失詘已以從時者不以時勝道也故其得志於君則變時而之道若反手然彼其術素修而志素定也時乎楊墨巳不然者孟軻氏而已時乎釋老已不然者韓愈氏而巳如孟韓者可謂術素修而志素定也不以時勝道也惜也不得志於君使真儒之效不白於當世然其於衆人也卓矣嗚呼豫觀今之世圎冠峩如大裙襜如坐而堯言起而舜趨不以孟韓之心為心者果異衆人乎豫官於楊得友曰孫正之正之行古之道又善為古文豫知其能以孟韓之心為心而不已者也夫越人之望燕為絶域也北轅而首之茍不已無不至孟韓之道去吾黨豈若越人之望燕哉以正之之不巳而不至焉豫未之信也一日得志於吾君而真儒之效不白於當世豫亦未之信也正之之兄官於溫奉其親以行將從之先為言以處豫豫欲默安得而默也文編卷五十四

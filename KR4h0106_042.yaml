body:
  text: 文編卷四十二明唐順之編專任使蘇軾夫吏之與民猶工人之與器易器而操之其始莫不齟齬而不相得是故雖有長才異能之士朝夕而去則不如庸人之久且便也自漢至今言吏治者皆推孝文之時以為任人不可以倉卒而責其成功又其三歲一遷吏不為長逺之計則其所施設一切出於茍簡此天下之士爭以為言而臣知其未可以卒行也夫天下之吏惟其病多而未有以處也是以擾擾在此如使五六年或七八年而後遷則將有十年不得調者矣朝廷方將減任子清冗官則其行之當有所待而臣以為當今之弊有甚不可者夫京兆府天下之所觀望而化王政之所由始也四方之衝兩河之交舟車商賈之所聚金珠錦繡之所積故其民不知有耕稼織絍之勞富貴之所移貨利之所眩故其民不知有恭儉亷退之風以書數為終身之能以府史賤吏為鄉黨之榮故其民不知有儒學講習之賢夫是以獄訟繁滋而奸不可止為治者益以茍且而不暇及於教化四方觀之使風俗日以薄惡今夫為京兆者戴星而出見燭而入案牘笞箠交乎其前拱手而待命者足相躡乎其庭持詞而求訴者肩相摩乎其門憧憧焉不知其為誰一訊而去得罪者非知其得罪之由而無罪者亦不知其無罪之實如此則刑之不服赦之不悛獄訟之繁未有已也夫大司農者天下之所以贏虛外計之所從受命也其財賦之出入簿書之交錯縱橫變化足以為奸而不可推究上之人不能盡知而付之吏吏分職乎其中者以數十百人其耳目足以及吾之所不及是以能者不過粗舉其大綱而不能者惟吏之聽賄賂交乎其門四方之有求者聚乎其家天下之大弊無過此二者臣竊以為今省府之重其擇人宜精其任人宜久凡今之弊皆不精不久之故何則天下之賢者不可以多得而賢者之中求其治繁者又不可以人人而能也幸而有一人焉又不久而去夫世之君子茍有志于天下而欲為長逺之計者則其效不可以朝夕見其始若迂闊而其終必將有所可觀今朞月不報政則朝廷以為是無能為者不待其成而去之而其翕然見稱于人者又以為有功而擢為兩府然則是為省府者能與不能皆不得久也夫以省府之繁終歲不得休息朝廷既以汲汲而去之而其人亦莫不汲汲而求去夫胥吏者皆老於其局長子孫於其中以汲汲求去之人而御長子孫之吏此其相視如客主之勢宜其奸弊不可得而去也省府之位不為卑矣茍有能者而老于此不為不用也古之用人者知其久勞於位則時有以賜豫勸奬之以厲其心不聞其驟遷以奪其成效今天下之吏縱未能一槩久而不遷至于省府亦不可以倉卒而去吏知其久居而不去也則其欺詐固已少衰矣而其人亦得深思熟慮周旋於其間不過十年將必有卓然可觀者也無沮善蘇軾昔者先王之為天下必使天下欣欣然常有無窮之心力行不倦而無自棄之意夫惟自棄之人則其為惡也甚毒而不可解是以聖人畏之設為髙位重祿以待能者使天下皆得踴躍自奮扳援而來惟其才之不逮力之不足是以終不能至於其間而非聖人塞其門絶其塗也夫然故一介之賤吏閭閻之匹夫莫不奔走於善至於老死而不知休息此聖人以術驅之也天下茍有甚惡而不可忍也聖人既已絶之則屏之逺方終身不齒此非獨不仁也以為既已絶之彼將一旦肆其忿毒以殘害吾民是故絶之則不用用之則不絶既已絶之又復用之則是驅之於不善而又假之以其具也無所望而為善無所愛惜而不為惡者天下一人而已矣以無所望之人而責其為善以無所愛惜之人而求其不為惡又付之以人民則天下知其不可也世之賢者何常之有或出於賈豎賤人甚者至於盜賊往往而是而儒生貴族世之所望為君子者或至放肆不軌小民之所不若聖人知其然是故不逆定於其始進之時而徐觀其所試之效使天下無必得之由亦無必不可得之道天下知其不可以必得也然後勉强於功名而不敢僥幸知其不至於必不可得也然後有以自慰其心久而不懈嗟夫聖人之所以鼓舞天下之人日化而不自知者此其為術歟後之為政者則不然與人以必得而絶之以必不可得此其意以為進賢而退不肖然天下之弊莫甚於此今夫制䇿之及等進士之高第皆以一日之習而决取終身之富貴此雖一時之文辭而未知其臨事之能否則其用之不已太遽乎天下有用人而絶之者三州縣之吏茍非有大過而不可復用則其它犯法皆可使竭力為善以自贖而今世之法一陷於罪戾則終身不遷使之不自聊賴而疾視其民肆意妄行而無所顧惜此其初未必小人也不幸而陷於其中途窮而無所入則遂以自棄府史賤吏為國者知其不可闕也是故歲久則補以外官以其所從來之卑也而限其所至則其中雖有出羣之才終亦不得齒於士大夫之列今夫出身而仕者將以求貴也貴不可得矣則將惟富之求此其勢如是則雖至於鞭笞戮辱而不足以禁其貪故夫此二者茍不可以遂棄則宜有以少假之也入資而仕者皆得補郡縣之吏彼知其終不得遷亦將逞其一時之欲無所不至夫此誠不可以遷也則是用之之過而已臣故曰絶之則不用用之則不絶此三者之謂也決壅蔽蘇軾所貴乎朝廷清明而天下治平者何也天下不訴而無寃不謁而得其所欲此堯舜之盛也其次不能無訴訴而必見察不能無謁謁而必見省使逺方之賤吏不知朝廷之高而一介之小民不識官府之難而後天下治今夫一人之身有一心兩手而已疾痛苛癢動於百體之中雖其甚微不足以為患而手隨至夫手之至豈其一一而聽之心哉心之所以素愛其身者深而手之所以素聽於心者熟是故不待使令而率然以自至聖人之治天下亦如此而已百官之衆四海之廣使其關節脉理相通為一叩之而必聞觸之而必應夫是以天下可使為一身天子之貴士民之賤可使相愛憂患可使同緩急可使救今也不然天下有不幸而訴其寃如訴之於天有不得已而謁其所欲如謁之於鬼神公卿大臣不能究其詳悉而付之於胥吏故凡賄賂先至者朝請而夕得徒手而來者終年而不獲至於故常之事人之所當得而無疑者莫不務為留滯以待請屬舉天下一毫之事非金錢無以行之㫺者漢唐之弊患法不明而用之不密使吏得以空虛無據之法而繩天下故小人以無法為奸今也法令明具而用之至密舉天下惟法之知所欲排者有小不如法而可指以為瑕所欲與者雖有所乖戾而可借法以為解故小人以法為奸今夫天下所為多事者豈事之誠多耶吏欲有所鬻而未得則新故相仍紛然而不決此王化之所以壅遏而不行也昔桓文之霸百官承職不待教令而辦四方之賔至不求有司王猛之治秦事至纎悉莫不盡舉而人不以為煩蓋史之所記麻思還冀州請於猛猛曰速裝行矣至暮而符下及出關郡縣皆已被符其令行禁止而無留事者至于纎悉莫不皆然苻堅以氐人之種至於霸王兵强國富垂及升平者猛之所為固宜其然也今天下治安大吏奉法不敢顧私而府史之屬招權鬻法長吏心知而不問以為當然此其弊有二而已事繁而官不勤故權在胥吏欲去其弊也莫如省事而勵精省事莫如任人勵精莫如自上率之今之所謂至繁天下之事關於其中訴者之多而謁者之衆莫如中書與三司天下之事分于百官而中書聽其治要郡縣錢弊制于轉運使而三司受其㑹計此宜若不至于繁多然中書不待奏課以定其黜陟而關與其事則是不任有司也三司之吏推析贏虛至於毫毛以繩郡縣則是不任轉運使也故曰省事莫如任人古之聖王愛日以求治辨色而視朝茍少安焉而至于日出則終日為之不給以少而言之一日而廢一事一月則可知也一歲則事之積者不可勝數矣欲事之無繁則必勞於始而逸於終晨興而晏罷天子未退則宰相不敢歸安于私第宰相日昃而不退則百官莫不震悚盡力於王事而不敢宴游如此則纎悉隱微莫不舉矣天子求治之勤過于先王而議者不稱王季之宴朝而稱舜之無為不論文王之日昃而論始皇之量書此何以率天下之怠耶臣故曰勵精莫如自上率之則壅蔽決矣抑僥幸蘇軾夫所貴乎人君者豫奪自我而不牽於衆人之論也天下之學者莫不欲仕仕者莫不欲貴如從其欲則舉天下皆貴而後可惟其不可從也是故仕不可以輕得而貴不可以易致此非有所吝也爵祿出乎我者也我以為可豫而豫之我以為可奪而奪之彼雖有言者不可畏也天下有可畏者賦斂不可以不均刑罰不可以不平守令不可以不擇此誠足以致天下之安危而可畏者也我欲慎爵賞愛名器而囂囂者以為不可畏是烏足惜哉國家自近歲以來吏多而闕少率一官而三人共之居者一人去者一人而伺之者又一人是一官而有二人者無事而食也且其蒞官之日淺而閒居之日長以其蒞官之所得而為閒居仰給之資是以貪吏常多而不可禁此用人之大弊也古之用人其取之至寬而用之至狹取之至寬故賢者不隔用之至狹故不肖者無所容記曰司馬辨論官才論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之然則取之者未必用也今之進士自二人以下者皆試官夫試之者豈一定之謂哉固將有所廢置焉耳國家取人有制䇿有進士有明經有詞科有任子有府史雜流凡此者雖衆無害也其終身進退之決在乎召見改官之日此尤不可以不愛惜慎重者也今之議者不過曰多其資考而責之以舉官之數且彼有勉强而已資考既足而舉官之數亦以及格則將執文墨以取必於我雖千百為輩莫敢不盡與臣竊以為今之患正在於任法太過是以為一定之制使天下可以歲月必得甚可惜也方今之便莫若使吏六考以上皆得以名聞于吏部吏部以其資考之逺近舉官之衆寡而次第其名然後使一二大臣雜治之參之以其才器之優劣而定其等歲終而奏之以詔天子廢置度天下之吏每歲以物故罪免者幾人而增損其數以所奏之等補之及數而止使其豫奪亦雜出于賢不肖之間而無有一定之制則天下之吏不敢有必得之心將自奮厲磨淬以求聞于時而嚮之所謂用人之大弊者亦不勞而自去然而議者必曰法不一定而以才之優劣為差則是好惡之私有以唘之也臣以為不然夫法者本以存其大綱而其出入變化固將付之於人昔者唐有天下舉進士者羣至於有司之門唐之制惟有司之信也是故有司得以搜羅天下之賢士而習知其為人至於一日之試則固已不取矣唐之得人於斯為盛今以名聞於吏部者每歲不過數十百人使一二大臣得以訪問參考其才雖有失者蓋已寡矣如必曰任法而不任人天下之人必不可信則夫一定之制臣未知其果不可以為奸也均戶口蘇軾夫中國之地足以食中國之民有餘也而民常病於不足何哉地無變遷而民有聚散聚則爭於不足之中而散則棄於有餘之外是故天下常有遺利而民用不足昔者三代之制度地以居民民各以其夫家之衆寡而受田于官一夫而百畝民不可以多得尺寸之地而地亦不可以多得一介之民故其民均而地有餘當周之時四海之內地方千里者九而京師居其一有田百同而為九百萬夫之地山林陵麓川澤溝瀆城郭宫室塗三分去一為六百萬夫之地又以上中下田三等而通之以再易為率則王幾之內足以食三百萬之衆以九州言之則是二千七百萬夫之地也而計之以下農夫一夫之地而食五人則是萬有三千五百萬人可以仰給於其中當成康刑措之後其民極盛之時九州之籍不過十三萬四千有餘夫地以十倍而民居其一故穀常有餘而地力不耗何者均之有術也自井田廢而天下之民轉徙無常惟其所樂則聚以成市側肩躡足以爭尋常挈妻負子以分升合雖有豐年而民無餘蓄一遇水旱則弱者轉於溝壑而强者聚為盜賊地非不足而民非加多也蓋亦不得均民之術而已夫民之不均其弊有二上之人賤農而貴末忽故而重新則民不均夫民之為農者莫不重遷其墳墓廬舍桑麻果蔬牛羊耒耜皆為子孫百年之計惟其百工伎藝無事樹藝游手游食之民然後可以懷輕資而極其所往是故上之人賤農而貴末則農民捨其耒耜而游於四方擇其所私而居之其弊一也凡人之情怠於久安而謹於新集水旱之後盜賊之餘則必省刑罰薄稅斂輕力役以懷逋逃之民而其久安而無變者則不肯無故而加恤是故上之人忽故而重新則其民稍稍引去聚於其所重之地以至於衆多而不能容其弊二也臣欲去其二弊而開其二利以均斯民昔者聖人之興作也必因人之情故易為功必因時之勢故易為力今欲無故而遷徙安居之民分多而益寡則怨謗之門盜賊之端必起於此未享其利而先被其害臣愚以為民之情莫不懷土而重去惟士大夫出身而仕者狃於遷徙之樂而忘其鄉昔漢之制吏二千石皆徙諸陵麓今之計可使天下之吏仕至某者皆徙荆襄唐鄧許洛陳蔡之間今士大夫無不樂居於此者顧恐獨往而不能濟彼見其儕類等夷之人莫不在焉則其去惟恐後耳此其所謂因人之情夫天下不能歲歲而豐也則必有饑饉流亡之所民方其困急時父子且不能相顧又安知去鄉之為戚哉當此之時募其樂徙者而使所之廪之費不甚厚而民樂行此其所謂因時之勢然此二者皆授其田貸其耕耘之具而緩其租然後可以固其意夫如是天下之民其庶乎有息肩之漸也較賦役蘇軾自兩稅之興因地之廣狹瘠腴而制賦因賦之多少而制役其初蓋甚均也責之厚賦則其財足以供署之重役則其力足以堪何者其輕重厚薄一出於地而不可易也戶無常賦視地以為賦人無常役視賦以為役是故貧者鬻田則賦輕而富者加地則役重此所以度民力之所勝亦所以破兼并之門而塞僥幸之源也及其後世歲月既久則小民稍稍為奸度官吏耳目之所不及則雖有法禁公行而不忌今天下一戶之賦官知其為賦之多少而不知其為地之幾何也如此則增損出入惟其意之所為官吏雖明法禁雖嚴而其勢無由以止絶故其為奸常起於貿易之際夫鬻田者必窮迫之人而所從鬻者必富厚有餘之家富者恃其有餘而邀之貧者迫於饑寒而欲其速售是故多取其地而少入其賦有田者方其窮困之中茍可以緩一時之急則不暇計其它日之利害故富者地日以益而賦不加多貧者地日以削而賦不加少又其奸民欲計免其賦役者割數畝之地加之以數倍之賦而收其少半之直或者亦貪其直之微而取焉是以數十年來天下之賦大抵淆亂有兼并之族而賦甚輕有貧弱之家而不免於重役以至於破敗流移而不知其所往其賦存而其人亡者天下皆是也夫天下不可以有僥幸也天下有一人焉僥幸而免則亦必有一人焉不幸而受其弊今天下僥幸者如此之衆則其不幸而受弊者從可知矣三代之賦以什一為輕今之法本不至於什一而取然天下嗷嗷然以賦斂為病者豈其歲久而奸生偏重而不均以至於此歟雖然天下皆知其為患而不能去何者勢不可也今欲按行其地之廣狹療腴而更制其賦之多寡則奸吏因緣為賄賂之門其廣狹瘠腴亦將一切出於其意之喜怒而其患益深是故士大夫畏之而不敢議且臣以為此最易見者顧弗之察耳夫易田者必有契契必有所直之數其所直之數必得其廣狹瘠腴之實而官必據其所直之數而取其易田之稅是故欲知其地之廣狹瘠腴可以其稅推也久逺者不可復知矣其數十年之間皆足以推較求之故府猶可得而見茍其稅多者則知其直多其直多者則知其田多且美也如此而其賦少其役輕夫人亡而賦存者可以有均矣鬻田者皆以其直之多少而給其賦重為之禁而使不敢以不實之直而書之契則夫自今以往者貿易之際為奸者其少息矣要以知凡地之所直與凡賦之所宜多少而以稅參之如此則一持籌之吏坐於帳中足以周知四境之虛實不過數月而民得以少蘇不然十數年之後將不勝其弊重者日以輕輕者日以重而未知其所終也省費用蘇軾夫天下未嘗無財也昔周之興文王武王之國不過百里當其受命四方之君長交至於其廷軍旅四出以征伐不義之諸侯而未嘗患無財方此之時關市無征而山澤不禁取於民者不過什一而財有餘及其衰也內食千里之租外收千八百國之貢而不足於用由此觀之夫財豈有多少哉人君之於天下俯已以就人則易為功仰人以援已則難為力是故廣取以給用不如節用以廉取之為易也臣請得以小民之家而推之夫民方其窮困時所望不過十金之資計其衣食之費妻子之奉出入於十金之中寬然而有餘及其一日稍稍蓄聚衣食既足則心意之欲日以漸廣所入益衆而所欲益以不給不知罪其用之不節而以為求之未至也是以富而愈貪求愈多而財愈不供此其為惑未可以知其所終也今天下汲汲乎以財之不足為病者何以異此國家創業之初四方割據中國之地至狹也然歲歲出師以誅討僣亂之國南取荆楚西平巴蜀而東下并潞其費用之衆百倍於今天下之士未嘗思其始而惴惴焉患今世之不足則亦甚惑矣夫為國有三計有萬世之計有一時之計有不終月之計古者三年耕必有一年之蓄以三十年之通則可以九年無饑也歲之所入足用而有餘是以九年之蓄常間而無用卒有水旱之變盜賊之憂則官可以自辦而民不知如此者天不能使之災地不能使之貧四夷盜賊不能使之困此萬世之計也而其不能者一歲之入才足以為一歲之出天下之産僅足以供天下之用其平居雖不至於虐取其民而有急則不免於厚賦故其國可靜而不可動可逸而不可勞此亦一時之計也至於最下而無謀者量出以為入用之不給則取之益多天下晏然無大患難而盡用衰世茍且之法不知有急則將何以加之此所謂不終月之計也今天下之利莫不盡取山陵林麓莫不有禁關有征市有租鹽鐵有𣙜酒有課茶有算則凡衰世茍且之法莫不盡用矣譬之於人其少壯之時豐健勇武然後可以望其無疾以至於壽考今未五六十而衰老之候具見而無遺若八九十者將何以待其後耶然天下之人方且窮思竭慮以廣求利之門以為費用不可復省臣有以知其不然也天下之費固有去之甚易而無損存之甚難而無益者矣臣不能盡知請舉其所聞而其餘可以類求焉夫無益之費名重而實輕以不急之實而被之以莫大之名是以疑而不敢去三歲而郊郊而赦赦而賞此縣官有不得已者天下吏士數日而待賜此誠不可以卒去至于大吏所謂股肱耳目與縣官同其憂樂者此豈亦不得已而有所畏耶天子有七廟今又飾老佛之宫而為之祠固已過矣又使大臣以使領之歲給以巨萬計此何為者也天下之吏為不少矣將患未得其人茍得其人則凡民之利莫不備舉而其患莫不盡去今河水為患不使濱河州郡之吏親視其災而責之以救災之術顧為都水監夫四方之水患豈其一人坐籌於京師而盡其利害天下有轉運使足矣今江淮之間又有發運祿賜之厚徒兵之衆其為費豈勝計哉蓋嘗聞之里有畜馬者患牧人欺之而盜其芻菽也又使一人焉為之廄長廄長立而馬益癯今為政不求其本而治其末天下無益之費不為不多矣臣以為凡若此者日求而去之自毫釐以往莫不有益惟無輕其毫釐而積之則天下庶乎少息也勸親睦蘇軾夫民相與親睦者王道之始也昔三代之制畫為井田使其比閭族黨各相親愛有急相賙有喜相慶死喪相恤疾病相養是故其民安居無事則往來歡欣而獄訟不生有寇而戰則同心并力而緩急不離自秦漢以來法令峻急使民離其親愛歡欣之心而為鄰里告訐之俗富人子壯則出居貧人子壯則出贅一國之俗而家各有法一家之法而人各有心紛紛乎散亂而不相屬是以禮讓之風息而爭鬬之獄繁天下無事則務為欺詐相傾以自成天下有變則流徙渙散相棄以自存嗟夫秦漢以下天下何其多故而難治也此無他民不愛其身故輕犯法輕犯法則王政不行欲民之愛其身則莫若使其父子親兄弟和而妻子相好夫民仰以事父母旁以睦兄弟而俯以恤妻子則其所賴於生者重而不忍以其身輕犯法三代之政莫尚於此矣今欲教民和親則其道必始於宗族臣欲復古之小宗以收天下不相親屬之心古者有大宗小宗故禮曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼高祖者五世則遷者也古者諸侯之子弟異姓之卿大夫始有家者不敢禰其父而自使其嫡子後之則為大宗族人宗之雖百世而宗子死則為之服齊衰九月故曰宗其繼别子之所自出者百世不遷者也别子之庶子又不得禰别子而自使其嫡子為後則為小宗小宗五世之外則無服其繼禰者親兄弟為之服其繼祖者從兄弟為之服其繼曽祖者再從兄弟為之服其繼高祖者三從兄弟為之服其服大功九月而高祖以外親盡則易宗故曰宗其繼高祖者五世則遷者也小宗四有繼高祖者有繼曽祖者有繼祖者有繼禰者與大宗為五此所謂五宗也古者立宗之道嫡子既為宗則其庶子之嫡子又各為其庶子之宗其法止於四而其實無窮自秦以來天下無世卿大宗之法不可以復立而其可以收合天下之親者有小宗之法存而莫之行此甚可惜也今夫天下所以不重族者有族而無宗也有族而無宗則族不可合族不可合則雖欲親之而無由也族人而不相親則忘其祖矣今世之公卿大臣賢人君子之後所以不能世其家如古之久逺者其族散而忘其祖也故莫若復小宗使族人相率而尊其宗子宗子死則為之加服犯之則以其服坐貧賤不敢輕而富貴不敢以加之冠昏必告喪必赴此非有所難行也今夫良民之家士大夫之族亦未必無孝悌相親之心而族無宗子莫為之糾率其勢不得相親是以世之人有親未盡而不相往來冠昏不相告死不相赴而無知之民遂至于父子異居而兄弟相訟然則王道何從而興乎嗚呼世人之患在於不務逺見古之聖人合族之法近於迂闊而行之朞月則望其有益故夫小宗之法非行之難而在乎久而不怠也天下之民欲其忠厚和柔而易治其必自小宗始矣敦教化蘇軾夫聖人之於天下所恃以為牢固不拔者在乎天下之民可與為善而不可與為惡也昔者三代之民見危而授命見利而不忘義此非必有爵賞勸乎其前而刑罰驅乎其後也其心安於為善而忸怩於不義是故有所不為夫民知其所不為則天下不可以敵甲兵不可以威利祿不可以誘可殺可辱可饑可寒而不可與叛此三代之所以享國長久而不拔也及至秦漢之世其民見利而忘義見危而不能授命法禁所不及則巧僞變詐無所不為疾視其長上而幸其災因之以水旱加之以盜賊則天下蕩然無復天子之民矣世之儒者嘗有言曰三代之時其所以教民之具甚詳且密也學校之制射饗之節冠昏喪祭之禮粲然莫不有法及至後世教化之道衰而盡廢其具是以若此無恥也然世之儒者蓋亦嘗試以此等教天下之民矣而卒以無效使民好文而益偷飾詐而相高則有之矣此亦儒者之過也臣愚以為若此者皆好古而無術知有教化而不知名實之所存者也實者所以信其名而名者所以求其實也有名而無實則其名不行有實而無名則其實不長凡今儒者之所論皆其名也昔武王既克商散財發粟使天下知其不貪禮下賢俊使天下知其不驕封先聖之後使天下知其仁誅飛廉惡來使天下知其義如此則其教化天下之實固已立矣天下聳然皆有忠信廉恥之心然後文之以禮樂教之以學校觀之以射饗而謹之以冠昏喪祭民是以目擊而心諭安行而自得也及至秦漢之世專用法吏以督責其民至于今千有餘年而民日以貪冒嗜利而無恥儒者乃始以三代之禮所謂名者而繩之彼見其登降揖讓盤辟俯仰之容則掩口而竊笑聞鐘鼓管磬希夷嘽緩之音則驚顧而不樂如此而欲望其遷善逺罪不已難乎臣愚以為宜先其實而後其名擇其近於人情者而先之今夫民不知信則不可與久居於安民不知義則不可與同處於危平居則欺其吏而有急則叛其君此教化之實不至天下之所以無變者幸也欲民之知信則莫若務實其言欲民之知義則莫若務去其貪往者西河用兵而家人子弟皆籍以為軍其始也官告以權時之宜非久役者如是當復爾業少焉皆刺其額無一人得免自寶元以來諸道以兵興為辭而增賦者至今皆不為除去夫如是將何止民之詐欺哉夫所貴乎縣官之尊者為其恃於四海之富而不事於錐刀之末也其與民也優其取利也緩古之聖人不得而取則時有所置以明其不貪何者小民不知其說而惟貪之知今雞鳴而起百工雜作匹夫入市操挾尺寸吏且隨而稅之扼吭拊背以收絲毫之利古之設官者求以裕民今之設官者求以勝民賦斂有常限而以先期為賢出納有常數而以羡息為能天地之間茍可以取者莫不有禁求利太廣而用法太密故民日趨於貪臣愚以為難行之言當有所必行而可取之利當有所不取以教民信而示之義若曰國用不足而未可以行則臣恐其失之多於得也蓄材用蘇軾夫今之所患兵弱而不振者豈士卒寡少而不足使歟器械鈍弊而不足用歟抑為城郭不足守歟廪食不足給歟此數者皆非也然所以弱而不振則是無材用也夫國之有材譬如山澤之有猛獸江河之有蛟龍伏乎其中而威乎其外悚然有所不可狎者至于􅀈蚖之所蟠牂豚之所伏雖千仞之山百尋之溪而人易之何則其見于外者不可欺也天下之大不可謂無人朝廷之尊百官之富不可謂無才然以區區之外患舉數州之衆以臨中國抗天子之威犯天下之怨而其氣未嘗少衰其詞未嘗少挫則是其心無所畏也主憂則臣辱主辱則臣死今朝廷之士不能無憂而大臣恬然未有拒絶之議非不欲絶也而未有以待之則是空朝廷無所恃也㳂邉之民西顧而戰栗牧馬之士不敢彎弓而嚮北吏士未戰而先期於敗則是民輕其上也外之蠻夷無所畏內之朝廷無所恃而民又自輕其上此猶足以為有人乎天下未嘗無才患所以求才之道不至古之聖人以無益之名而致天下之實以可見之實而較天下之虛名二者相為用而不可廢是故其始也天下莫不紛然奔走從事於其間而要之以其終不肖者無以欺其上此無他先名而後實也不先其名而唯實之求則來者寡來者寡則不可以有所擇以一旦之急而用不擇之人則是不先名之過也天子之所嚮天下之所奔也今夫孫吳之書其讀之者未必能戰也多言之士喜論兵者未必能用也進之以武舉試之以騎射天下之奇才未必至也然將以求天下之實則非此三者不可以致以為未必然而棄之則是其必然者恐不可得而見也往者西師之興也其先也惟不以虛名多致天下之才而擇之以待一旦之用故其兵興之際四顧惶惑而不知所措於是設武舉購方略收勇悍之士而開猖狂之言不愛高爵重賞以求强兵之術當此之時大下囂然莫不自以為知兵也來者日多而其言益以無據至於臨事終不可用執事之臣亦遂厭之而知其無益故兵休之日舉從而廢之今之論者以為武舉方略之類適足以開僥幸之門而天下之實才終不可以求得此二者皆過也夫既已用天下之虛名而不較之以實至其弊也又舉而廢其名使天下之士不復以兵術進亦已過矣天下之實才不可以求之於言語又不可以較之於武力獨見之於戰耳戰不可得而試也是故見之於治兵子玉治兵於蒍終日而畢鞭七人貫三人耳蒍賈觀之以為剛而無禮知其必敗孫武始見試以婦人而猶足以取信於闔閭使知其可用故凡欲觀將帥之才否莫如治兵之不可欺也今夫新募之兵驕而難令勇悍而不知戰此真足以觀天下之才也武舉方略之類以來之新兵以試之觀其顔色和易則足以見其氣約束堅明則足以見其威坐作進退各得其所則足以見其能凡此者皆不可强也故曰先之以無益之虛名而較之以可見之實才然後可得而用也定軍制蘇軾自三代之衰井田廢兵農異處兵不得休而為民民不得息肩而無事於兵者千有餘年而未有如今日之極者也三代之制不可復追矣至於漢唐猶有可得而言者夫兵無事而食則不可使聚聚則不可使無事而食此二者相勝而不可並行其勢然也今夫有百頃之閒田則足以牧馬千駟而不知其費聚千駟之馬而輸百頃之芻則其費百倍此易曉也昔漢之制有踐更之卒而無營田之兵雖皆出於農夫而方其為兵也不知農夫之事是故郡縣無常屯之兵而京師亦不過有南北軍期門羽林而已邉境有事諸侯有變皆以虎符調發郡國之兵至于事已而兵休則渙然各復其故是以其兵雖不知農而天下不至于弊者未嘗聚也唐有天下置有十六衛府兵天下之府八百餘所而屯于關中者至有五百然皆無事則力耕而積穀不唯以自贍養而又有以廣縣官之儲是以其兵雖聚于京師而天下亦不至於弊者未嘗無事而食也今天下之兵不耕而聚于京畿三輔者以數十萬計皆仰給於縣官有漢唐之患而無漢唐之利擇其偏而兼用之是以無受其弊而莫之分也天下之財近自淮甸而逺至乎吳蜀凡舟車所至人力所及莫不盡取以歸于京師晏然無事而賦斂之厚至于不可復加而三司之用猶苦其不給其弊皆起於不耕之兵聚于內而食四方之貢賦非特如此而已又有循環往來屯戍于郡縣者昔建國之初所在分裂擁兵而不服太祖太宗躬擐甲胄力戰而取之既降其君而籍其疆土矣然其故基餘孽猶有存者上之人見天下之難合而恐其復發也於是出禁兵以戍之大自藩府而小至於縣鎮往往皆有京師之兵由此觀之則是天下之地一尺一寸皆天子自為守也而可以長久而不變乎費莫大於養兵養兵之費莫大於征行今出禁兵而戍郡縣逺者或數千里其月廪歲給之外又日供其芻糧三歲而一遷往者紛紛來者纍纍雖不過數百為輩而要其歸無以異於數十萬之兵三歲而一出征也農夫之力安得不竭餽運之卒安得不疲且今天下未嘗有戰鬬之事武夫悍卒非有勞伐可以邀其上之人然皆不得為休息閒居無用之兵者其意以為為天子出戍也是故美衣豐食開府庫輦金帛若有所負一逆其意則欲羣起而噪呼此何為者也天下一家且數十百年矣民之戴君至于海隅無以異於畿甸亦不必舉疑四方之兵而專信禁兵也曩者蜀之有妖賊與近歲貝州之亂未必非禁兵致之臣愚以為郡縣之土兵可以漸訓而陰奪其權則禁兵可以漸省而無用天下武健豈有常所哉山川之所習風氣之所咻四方之民一也昔者戰國常用之矣蜀人之怯懦吳人之短小皆常以抗衡于上國又安得禁兵而用之今之土兵所以鈍弊劣弱而不振者彼見郡縣皆有禁兵而待之異等是以自棄于賤𨽻役夫之間而將吏亦莫之訓也茍禁兵可以漸省而以其資糧益優郡縣之土兵則彼固以歡欣踴躍出于意外戴上之恩而願效其力又何遽不如禁兵耶夫土兵日以多禁兵日以少天子扈從捍城之外無所復用如此則內無屯聚仰給之費而外無遷徙供億之勞費之省者又已過半矣練軍實蘇軾三代之兵不待擇而精其故何也兵出於農有常數而無常人國有事要以一家而備一正卒如斯而已矣是故老者得以養疾病者得以為閒民而設於官者莫不皆其壯子弟故其無事而田獵則未嘗發老弱之民兵行而餽糧則未嘗食無用之卒使之足輕險隘手易器械聰明足以察旗鼓之節强鋭足以犯死傷之地千乘之衆而人人足以自捍故殺人少而成功多費用省而兵卒强蓋春秋之時諸侯相并天下百戰其經傳所見謂之敗績者如城濮鄢陵之役皆不過犯其偏師而獵其游卒斂兵而退未有僵尸百萬流血於江河如後世之戰者何也民各推其家之壯者以為兵則其勢不可得而多殺也及至後世兵民既分兵不得復而為民於是始有老弱之卒夫既已募民而為兵其妻子屋廬既已託於營伍之中而其姓名既已書於官府之籍行不得為商居不得為農而仰給于官至于衰老而無歸則其道誠不可以棄去是故無用之卒雖薄其資糧而皆廪之終身凡民之生自二十以上至於衰老四十餘年之間勇鋭强力之氣足以犯堅冒創者不過二十餘年今廩之終身則是一卒凡二十年無用而食于官也自此而推之養兵十萬則是五萬人可去也屯兵十年則是五年為無益之費也民者天下之本而財者民之所以生也有兵而不可使戰是謂棄財不可使戰而驅之戰是謂棄民臣觀秦漢之後天下何其殘敗之多耶其弊皆起於分民而為兵兵不得休使老弱不堪之卒拱手而就戮故有以百萬之衆而見屠於數千之兵者其良將善用不過以為餌委之啖賊嗟夫三代之衰民之無罪而死者其不可勝數矣今天下募兵至多往者陜西之役舉籍平民以為兵加以明道寶元之間天下旱蝗以及近歲青齊之饑與河朔之水災民急而為兵者日以益衆舉籍而按之近歲以來募兵之多無如今日者然皆老弱不教不能當古之十五而衣食之費百倍於古此甚非所以長久而不變者也凡民之為兵者其類多非良民方其少壯之時博奕飲酒不安於家而後能捐其身至其少衰而氣沮蓋亦有悔而不可復者矣臣以謂五十已上願復為民者宜聽自今以往民之願為兵者皆三十以下則收限以十年而除其籍民三十而為兵十年而復歸其精力思慮猶可以養生送死為終身之計使其應募之日心知其不出十年而為十年之計則除其籍而不怨以無用之兵終身坐食之費而為重募則應者必衆如此縣官長無老弱之兵而民之不任戰者不至於無罪而死彼皆知其不過十年而復為平民則自愛其身而重犯法不至於呌呼無賴以自棄於凶人今夫天下之患在於民不知兵故兵常驕悍於民常怯賊盜攻之而不能禦戎狄掠之而不能抗今使民得更代而為兵兵得復還而為民則天下之知兵者衆而盜賊戎狄將有所忌然猶有言者將以為十年而代故者已去而新者未教則緩急有所不濟夫所謂十年而代者豈其舉軍而並去之有始至者有既久者有將去者有當代者新故雜居而教之則緩急可以無憂矣教戰守蘇軾當今生民之患果安在哉在於知安而不知危能逸而不能勞此其患不見於今而將見於他日今不為之計其後將有所不可救者昔者先王知兵之不可去也是故天下雖平不敢忘戰秋冬之隙致民田獵以講武教之以進退坐作之方使其耳目習於鐘鼓旌旗之間而不亂使其心志安於斬刈殺伐之際而不懾是以雖有盜賊之變而民不至於驚潰及至後世用迂儒之議以去兵為王者之盛節天下既定則卷甲而藏之數十年之後甲兵頓弊而民日以安於佚樂卒有盜賊之警則相與恐懼訛言不戰而走開元天寶之際天下豈不大治惟其民安於太平之樂豢於游戲酒食之間其剛心勇氣消耗鈍眊痿蹶而不復振是以區區之祿山一出而乘之四方之民獸奔鳥竄乞為囚虜之不暇天下分裂而唐室因以微矣蓋嘗試論之天下之勢譬如一身王公貴人所以養其身者豈不至哉而常苦於多疾至於農夫小民終歲勤苦而未嘗告病此其故何也夫風雨霜露寒暑之變此疾之所由生也農夫小民盛夏力作而窮冬暴露其筋骸之所衝犯肌膚之所浸漬輕霜露而狎風雨是故寒暑不能為之毒今王公貴人處於重屋之下出則乘輿風則襲裘雨則御蓋凡所以慮患之具莫不備至畏之太甚而養之太過小不如意則寒暑入之矣是故善養身者使之能逸而能勞步趨動作使其四體狃於寒暑之變然後可以剛健强力涉險而不傷夫民亦然今者治平之日久天下之人驕惰脆弱如婦人孺子不出於閨門論戰鬬之事則縮頸而股栗聞盜賊之名則掩耳而不願聽而士大夫亦未嘗言兵以為生事擾民漸不可長此不亦畏之太甚而養之太過歟且夫天下固有意外之患也愚者見四方之無事則以為變故無自而有此亦不然矣今國家所以奉西北之夷者歲以百萬計奉之者有限而求之者無厭此其勢必至於戰戰者必然之勢也不先於我則先於彼不出於西則出於北所不可知者有遲速逺近而要以不能免也天下茍不免於用兵而用之不以漸使民於安樂無事之中一旦出身而蹈死地則其為患必有所不測臣欲使士大夫尊尚武勇講習兵法庶人之在官者教以行陳之節役民之司盜者授以擊刺之術每歲終則聚於郡府如古都試之法有勝負有賞罰而行之既久則以軍法從事然議者必以為無故而動民又撓以軍法則民將不安而臣以為此所以安民也天下果未能去兵則其一旦將以不教之民而驅之戰夫無故而動民雖有小怨然孰與夫一旦之危哉今天下屯聚之兵驕豪而多怨陵壓百姓而邀其上者何故此其心以為天下之知戰者惟我而已如使平民皆習於兵彼知有所敵則固以破其奸謀而折其驕氣利害之際豈不亦甚明歟倡勇敢蘇軾臣聞戰以勇為主以氣為決天子無皆勇之將而將軍無皆勇之士是故致勇有術致勇莫先乎倡倡莫善乎私此二者兵之微權英雄豪傑之士所以陰用而不言於人而人亦莫之識也臣請得以備言之夫倡者何也氣之先也有人人之勇怯有三軍之勇怯人人而較之則勇怯之相去若莛與楹至於三軍之勇怯則一也出於反覆之間而差於毫釐之際故其權在將與君人固有暴猛獸而不操兵出入於白刃之中而色不變者有見虺蜴而却走聞鐘鼓之聲而戰栗者是勇怯之不齊至於如此然閭閻之小民爭鬬戲笑卒然之間而或至於殺人當其發也其心翻然其色勃然若不可以已者雖天下之勇夫無以過之及其退而思其身顧其妻子未始不惻然悔也此非必勇者也氣之所乘則奪其性而忘其故故古之善用兵者用其翻然勃然於未悔之間而其不善者沮其翻然勃然之心而開其自悔之意則是不戰而先自敗也故曰致勇有術致勇莫先乎倡均是人也皆食其食皆任其事天下有急而有一人焉奮而爭先而致其死則翻然者衆矣弓矢相及劒楯相交勝負之勢未有所決而三軍之士屬目於一夫之先登則勃然者相繼矣天下之大可以名劫也三軍之衆可以氣使也諺曰一人善射百夫決拾茍有以發之及其翻然勃然之間而用其鋒是之謂倡倡莫善乎私天下之人怯者居其百勇者居其一是勇者難得也捐其妻子棄其身以蹈白刃是勇者難能也以難得之人行難能之事此必有難報之恩者矣天子必有所私之將將軍必有所私之士視其勇者而陰厚之人之有異材者雖未有功而其心莫不自異自異而上不異之則緩急不可以望其為倡故凡緩急而肯為倡者必其上之所異也昔漢武帝欲觀兵于四裔以逞其無厭之求不愛通侯之賞以招勇士風告天下以求奮擊之人然卒無有應者於是嚴刑峻法致之死地而聽其以深入贖罪使勉强不得已之人馳驟於死亡之地是故其將降其兵破敗而天下幾至於不測何者先無所異之人而望其為倡不已難乎私者天下之所惡也然而為已而私之則私不可用為其賢於人而私之則非私無以濟蓋有無功而可賞有罪而可赦者凡所以愧其心而責其為倡也天下之禍莫大於上作而下不應上作而下不應則上亦將窮而自止方西戎之叛也天子非不欲赫然誅之而將帥之臣謹守封略外視內顧莫有一人先奮而致命而士卒亦循循焉莫肯盡力不得已而出爭先而歸故西戎得以肆其猖狂而吾無以應則其勢不得不重賂而求和其患起於天子無同憂患之臣而將軍無腹心之士西師之休十有餘年矣用法益密而進人益難賢者不見異勇者不見私天下務為奉法循令要以如式而止臣不知其緩急將誰為之倡哉厲法禁蘇軾昔者聖人制為刑賞知天下之樂乎賞而畏乎刑也是故施其所樂者自下而上民有一介之善不終朝而賞隨之是以上之為善者足以知其無有不賞也施其所畏者自上而下公卿大臣有毫髮之罪不終朝而罰隨之是以下之為不善者亦足以知其無有不罰也詩曰剛亦不吐柔亦不茹夫天下所謂權豪貴顯而難令者此乃聖人之所借以狥天下也舜誅四凶而天下服何也此四族者天下之大族也夫惟聖人為能擊天下之大族以服小民之心故其刑罰至于措而不用周之衰也商鞅韓非峻刑酷法以督責天下然所以為得者用法始於貴戚大臣而後及于踈賤者故能以其國霸由此觀之商鞅韓非之刑非舜之刑而所以用刑者舜之術也後之庸人不深原其本未而猥以舜之用刑之術與商鞅韓非同類而棄之法禁之不行奸宄之不止由此其故也今夫州縣之吏受賂以鬻獄其罪至于除名而其官不足以贖則至于嬰木索受笞箠此亦天下之至辱也而士大夫或冒行之何者其心有所不服也今夫大吏之為不善非特簿書米鹽出入之間也其位愈尊則其害愈大其權愈重則其下愈不敢言幸而有不畏强禦之士出力而排之又幸而不為上下之所抑以遂成其罪則其官之所減者至于罰金蓋無幾矣夫過惡暴著于天下而罰不傷其毫毛鹵莽於公卿之間而纎悉於州縣之小吏用法如此宜其天下之不心服也用法而不服其心雖刀鋸斧鉞猶將有所不避而况木索笞箠哉方今法令至繁觀其所以防奸之具一舉足且入其中而大吏犯之不至于可畏其故何也天下之議者曰古者之制刑不上大夫大臣不可以法加也嗟夫刑不上大夫者豈曰大夫以上有罪而不刑歟古之人君責其公卿大臣至重而待其士庶人至輕也責之至重故其所以約束之者愈寬待之至輕故其所以隄防之者甚密夫所貴乎大臣者惟其不待約束而後免於罪戾也是故約束愈寬而大臣益以畏法何者其心以為人君之不我疑而不忍欺也茍幸其不疑而輕犯法則固以不容於誅矣故夫大夫以上有罪不從於訊鞠論報如士庶人之法斯以為刑不上大夫而已矣天下之吏自一命以上其蒞官臨民茍有罪皆書於其所謂歷者而至于館閣之臣出為郡縣者則遂罷去此真聖人之意欲有以重責之也奈何其與士庶人較罪之輕重而又以其爵減耶夫律有罪而得以首免者所以開盜賊小人自新之塗而今之卿大夫有罪亦得以首免是以盜賊小人待之歟天下惟無罪也是以罰不可得而加知其有罪而特免其罰則何以令天下今夫大臣有不法或者既以舉之而詔曰勿推此何為者也聖人為天下豈容有此曖昧而不決故曰厲法禁自大臣始則小臣不犯矣去奸民蘇軾自昔天下之亂必生於治平之日休養生息而奸民得容於其間蓄而不發以待天下之釁至於時有所激勢有所乘則潰裂四出不終朝而毒流於天下聖人知其然是以嚴法禁督官吏以司察天下之奸民而去之夫大亂之本必起於小奸惟其小而不足畏是故其發也常至於亂天下今夫世人之所憂以為可畏者必曰豪俠大盜此不知變者之說也天下無小奸則豪俠大盜無以為資且其治平無事之時雖欲為大盜將安所容其身而其殘忍貪暴之心無所發泄則亦時出為盜賊聚為博奕羣飲於市肆而呌號於郊野小者呼雞逐狗大者椎牛發冢無所不至捐父母棄妻子而相與嬉游凡此者舉非小盜也天下有釁鋤耰棘矜相率而剽奪者皆嚮之小盜也昔三代之聖主果斷而不疑誅除擊去無有遺類所以擁護良民而使安其居及至後世刑法日以深嚴而去奸之法乃不及於三代何者待其敗露自入於刑而後去也夫為惡而不入於刑者固已衆矣有終身為不義而其罪不可指名以附於法者有巧為規避持吏短長而不可詰者又有因緣幸㑹而免者如必待其自入於刑則其所去者蓋無幾耳昔周之制民有罪惡未麗於法而害於州里者桎梏而坐諸嘉石重罪役之朞以次輕之其下罪三月役使州里任之然後宥而舍之其化之不從威之不格患苦其鄉之民而未入於五刑者謂之罷民凡罷民不使冠帶而加明刑任之以事而不齒於鄉黨由是觀之則周之盛時日夜整齊其人民而鋤去其不善譬如獵人終日馳驅踐蹂於草茅之中搜求伏兔而搏之不待其自投於網羅而後取也夫然故小惡不容於鄉大惡不容於國禮樂之所以易化而法禁之所以易行者由此之故也今天下久安天子以仁恕為心而士大夫一切以寬厚為稱上意而懦夫庸人又有僥幸務出罪人外以邀雪寃之賞而內以待陰德之報臣是以知天下頗有不誅之奸將為子孫憂宜明勑天下之吏使以歲時紏察凶民而徙其尤無良者不必待其自入於刑而間則命使出按郡縣有子不孝有弟不悌好訟而數犯法者皆誅無赦誅一鄉之奸則一鄉之人恱誅一國之奸則一國之人恱要在誅寡而悅衆則雖堯舜亦如此而已矣天下有三患而蠻夷之憂不與焉有內大臣之變有外諸侯之叛有匹夫羣起之禍此三者其勢常相持內大臣有權則外諸侯不叛外諸侯强則匹夫羣起之禍不作今者內無權臣外無强諸侯而萬世之後其可憂者奸民也臣故曰去奸民以為安民之終云文編卷四十二

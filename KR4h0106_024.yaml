body:
  text: 文編巻二十四明唐順之編天運莊子天其運乎地其處乎日月其爭於所乎孰主張是孰維綱是孰居無事推而行是意者其有機緘而不得已邪意者其運轉而不能自止邪雲者為雨乎雨者為雲乎孰隆施是孰居無事淫樂而勸是風起北方一西一東有上彷徨孰嘘吸是孰居無事而披拂是敢問何故巫咸祒曰來吾語女天有六極五常帝王順之則治逆之則凶九洛之事治成徳備監照下土天下戴之此謂上皇北門成問於黄帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩黙黙乃不自得帝曰女殆其然哉吾奏之以人徵之以天行之以禮義建之以太清然後調理四時太和萬物四時迭起萬物循生一盛一衰文武倫經一清一濁隂陽調和流光其聲蟄蟲始作吾驚之以雷霆其卒無尾其始無首一死一生一僨一起所常無窮而一不可待女故懼也吾又奏之以隂陽之和燭之以日月之明其聲能短能長能柔能剛變化齊一不主故常在谷滿谷在阬滿阬塗郤守神以物為量其聲揮綽其名髙明是故鬼神守其幽日月星辰行其紀吾止之於有窮流之於無止子欲慮之而不能知也望之而不能見也逐之而不能及也儻然立於四虚之道倚於槁梧而吟目知窮乎所欲見力屈乎所欲逐吾既不及已夫形充空虚乃至委蛇女委蛇故怠吾又奏之以無怠之聲調之以自然之命故若混逐樷生林樂而無形布揮而不曵幽昏而無聲動於無方居於窈𡨕或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲世疑之稽於聖人聖也者達於情而遂於命也天機不張而五官皆備此之謂天樂無言而心説故有焱氏為之頌曰聽之不聞其聲視之不見其形充滿天地苞褁六極女欲聽之而無接焉而故惑也樂也者始於懼懼故祟吾又次之以怠怠故遁卒之於惑惑故愚愚故道道可載而與之俱也齊物論莊子南郭子綦隠几而坐仰天而嘘嗒焉似䘮其耦顔成子游立侍乎前曰何居乎形固可使如槁木而心固可使如死灰乎今之隠几者非昔之隠几者也子綦曰偃不亦善乎而問之也今者吾䘮我汝知之乎女聞人籟而未聞地籟女聞地籟而未聞天籟夫子游曰敢問其方子綦曰夫大塊噫氣其名為風是唯無作作則萬竅怒號而獨不聞之翏翏乎山林之畏佳大木百圍之竅穴似鼻似口似耳似枅似圈似臼似洼者似汚者激者謞者叱者吸者呌者譹者宎者咬者前者唱于而隨者唱喁冷風則小和飄風則大和厲風濟則衆竅為虚而獨不見之調調之刁刁乎子游曰地籟則衆竅是已人籟則比竹是已敢問天籟子綦曰夫吹萬不同而使其自巳也咸其自取怒者其誰邪大知閑閑小知間間大言炎炎小言詹詹其寐也䰟交其覺也形開與接為搆日以心鬬縵者窖者宻者小恐惴惴大恐縵縵其發若機栝其司是非之謂也其留如詛盟其守勝之謂也其殺如秋冬以言其日消也其溺之所為之不可使復之也其厭也如緘以言其老洫也近死之心莫使復陽也喜怒哀樂慮歎變熱姚佚啟態樂出虚蒸成菌日夜相代乎前而莫知其所萌已乎已乎旦暮得此其所由以生乎非彼無我非我無所取是亦近矣而不知其所為使若有真宰而特不得其朕可行已信而不見其形有情而無形百骸九竅六藏賅而存焉吾誰與為親汝皆說之乎其有私焉如是皆有為臣妾乎其臣妾不足以相治乎其逓相為君臣乎其有真君存焉如求得其情與不得無益損乎其真一受其成形不亡以待盡與物相刃相靡其行盡如馳而莫之能止不亦悲乎終身役役而不見其成功薾然疲役而不知其所歸可不哀邪人謂之不死奚益其形化其心與之然可不謂大哀乎人之生也固若是芒乎其我獨芒而人亦有不芒者乎夫隨其成心而師之誰獨且無師乎奚必知代而心自取者有之愚者與有焉未成乎心而有是非是今日適越而昔至也是以無有為有無有為有雖有神禹且不能知吾獨且奈何哉夫言非吹也言者有言其所言者特未定也果有言邪其未嘗有言邪其以為異於鷇音亦有辨乎其無辨乎道惡乎隐而有真偽言惡乎隠而有是非道惡乎徃而不存言惡乎存而不可道隠於小成言隠於榮華故有儒墨之是非以是其所非而非其所是欲是其所非而非其所是則莫若以明物無非彼物無非是自彼則不見自知則知之故曰彼出於是是亦因彼彼是方生之說也雖然方生方死方死方生方可方不可方不可方可因是因非因非因是是以聖人不由而照之於天亦因是也是亦彼也彼亦是也彼亦一是非此亦一是非果且有彼是乎哉果且無彼是乎哉彼是莫得其偶謂之道樞樞始得其環中以應無窮是亦一無窮非亦一無窮也故曰莫若以明以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也可乎可不可乎不可道行之而成物謂之而然惡乎然然於然惡乎不然不然於不然物固有所然物固有所可無物不然無物不可故為是舉莛與楹厲與西施恢恑憰怪道通為一其分也成也其成也毁也凡物無成與毁復通為一唯達者知通為一為是不用而寓諸庸庸也者用也用也者通也通也者得也適得而幾矣因是已已而不知其然謂之道勞神明為一而不知其同也謂之朝三何謂朝三曰狙公賦芧曰朝三而莫四衆狙皆怒曰然則朝四而莫三衆狙皆悦名實未虧而喜怒為用亦因是也是以聖人和之以是非而休乎天鈞是之謂兩行古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣不可以加矣其次以為有物矣而未始有封也其次以為有封焉而未始有是非也是非之彰也道之所以虧也道之所以虧愛之所以成果且有成與虧乎哉果且無成與虧乎哉有成與虧故昭氏之鼔琴也無成與虧故昭氏之不鼓琴也昭文之鼔琴也師曠之枝䇿也惠子之據梧也三子之知幾乎皆其盛者也故載之末年唯其好之也以異於彼其好之也欲以明之彼非所明而明之故以堅白之昧終而其子又以文之綸終終身無成若是而可謂成乎雖我亦成也若是而不可謂成乎物與我無成也是故滑疑之耀聖人之所圖也為是不用而寓諸庸此之謂以明今且有言於此不知其與是類乎其與是不類乎類與不類相與為類則與彼無以異矣雖然請嘗言之有始也者有未始有始也者有未始有夫未始有始也者有有也者有無也者有未始有無也者有未始有夫未始有無也者俄而有無矣而未知有無之果孰有孰無也今我則已有謂矣而未知吾所謂之其果有謂乎其果無謂乎天下莫大於秋毫之未而太山為小莫壽乎殤子而彭祖為夭天地與我並生而萬物與我為一既已為一矣且得有言乎既已謂之一矣且得無言乎一與言為二二與一為三自此以徃巧厯不能得而况其凡乎故自無適有以至於三而况自有適有乎無適焉因是已夫道未始有封言未始有常為是而有畛也請言其畛有左有右有倫有義有分有辨有競有爭此之謂八徳六合之外聖人存而不論六合之内聖人論而不議春秋經世先王之志聖人議而不辨故分也者有不分也辨也者有不辨也曰何也聖人懐之衆人辨之以相示也故曰辨也者有不見也夫大道不稱大辨不言大仁不仁大廉不嗛大勇不忮道昭而不道言辨而不及仁常而不成廉清而不信勇忮而不成五者园而幾向方矣故知止其所不知至矣孰知不言之辨不道之道若有能知此之謂天府注焉而不滿酌焉而不竭而不知其所由來此之謂葆光故昔者堯問於舜曰我欲伐宗膾胥敖南面而不釋然其故何也舜曰夫三子者猶存乎蓬艾之間若不釋然何哉昔者十日並出萬物皆照而况徳之進乎日者乎齧缺問乎王倪曰子知物之所同是乎曰吾惡乎知之子知子之所不知邪曰吾惡乎知之然則物無知邪曰吾惡乎知之雖然嘗試言之庸詎知吾所謂知之非不知邪庸詎知吾所謂不知之非知邪且吾嘗試問乎女民溼寢則腰疾偏死鰌然乎哉木處則惴慄恂懼猨猴然乎哉三者孰知正處民食芻豢麋鹿食薦蝍蛆甘帶鴟鴉耆鼠四者孰知正味猨猵狙以為雌麋與鹿交鰌與魚遊毛嬙麗姬人之所羙也魚見之深入鳥見之髙飛麋鹿見之決驟四者孰知天下之正色哉自我觀之仁義之端是非之塗樊然殽亂吾惡能知其辨齧缺曰子不知利害則至人固不知利害乎王倪曰至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚若然者乗雲氣騎日月而遊乎四海之外死生無變於巳而况利害之端乎瞿鵲子問乎長梧子曰吾聞諸夫子聖人不從事於務不就利不違害不喜求不緣道無謂有謂有謂無謂而遊乎塵垢之外夫子以為孟浪之言而我以為妙道之行也吾子以為奚若長梧子曰是黄帝之所聽熒也而丘也何足以知之且女亦大早計見卵而求時夜見彈而求鶚炙予嘗為女妄言之女以妄聽之奚旁日月挾宇宙為其脗合置其滑涽以𨽻相尊衆人役役聖人愚芚參萬嵗而一成純萬物盡然而以是相藴予惡乎知說生之非惑邪予惡乎知惡死之非弱䘮而不知歸者邪麗之姬艾封人之子也晉國之始得之也涕泣沾襟及其至於王所與王同筐牀食芻豢而後悔其泣也予惡乎知夫死者不悔其始之蘄生乎夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也而愚者自以為覺竊竊然知之君乎牧乎固哉丘也與女皆夢也予謂女夢亦夢也是其言也其名為弔詭萬世之後而一遇大聖知其解者是旦暮遇之也既使我與若辨矣若勝我我不若勝若果是也我果非也邪我勝若若不吾勝我果是也而果非也邪其或是也其或非也邪其俱是也其俱非也邪我與若不能相知也則人固受其黮闇吾誰使正之使同乎若者正之既與若同矣惡能正之使同乎我者正之既同乎我矣惡能正之使異乎我與若者正之既異乎我與若矣惡能正之使同乎我與若者正之既同乎我與若矣惡能正之然則我與若與人俱不能相知也而待彼也邪何謂和之以天倪曰是不是然不然是若果是也則是之異乎不是也亦無辨然若果然也則然之異乎不然也亦無辨化聲之相待若其不相待和之以天倪因之以曼衍所以窮年也忘年忘義振於無竟故寓諸無竟罔兩問景曰曩子行今子止曩子坐今子起何其無特操與景曰吾有待而然者邪吾所待又有待而然者邪吾待蛇蚹蜩翼邪惡識所以然惡識所以不然昔者莊周夢為胡蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此之謂物化天道莊子天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服明於天通於聖六通四辟於帝王之徳者其自為也昩然無不靜者矣聖人之静也非曰静也善故靜也萬物無足以鐃心者故静也水靜則明燭鬚眉平中准大匠取法焉水靜猶明而况精神聖人之心静乎天地之鑒也萬物之鏡也夫虚静恬淡寂漠無為者天地之平而道法之至故帝王聖人休焉休則虚虚則實實則倫矣虚則静静則動動則得矣靜則無為無為也則任事者責矣無為則俞俞俞俞者憂患不能處年壽長矣夫虚靜恬淡寂漠無為者萬物之本也明此以南鄉堯之為君也明此以北面舜之為臣也以此處上帝王天子之徳也以此處下𤣥聖素王之道也以此退居而間游江海山林之士服以此進為而撫世則功大名顯而天下一也静而聖動而王無為也而尊樸素而天下莫能與之爭美夫明白於天地之徳者此之謂大本大宗與天和者也所以均調天下與人和者也與人和者謂之人樂與天和者謂之天樂莊子曰吾師乎吾師乎騖萬物而不為戾澤及萬世而不為仁長於上古而不為壽覆載天地刻彫衆形而不為巧此之謂天樂故曰知天樂者其生也天行其死也物化靜而與隂同徳動而與陽同波故知天樂者無天怨無人非無物累無鬼責故曰其動也天其静也地一心定而王天下其鬼不祟其䰟不疲一心定而萬物服言以虚靜推於天地通於萬物此之謂天樂天樂者聖人之心以畜天下也夫帝王之徳以天地為宗以道徳為主以無為為常無為也則用天下而有餘有為也則為天下用而不足故古之人貴乎無為也上無為也下亦無為也是下與上同徳下與上同徳則不臣下有為也上亦有為也是上與下同道上與下同道則不主上必無為而用天下下必有為為天下用此不易之道也故古之王天下者知雖落天地不自慮也辨雖彫萬物不自說也能雖窮海内不自為也天不産而萬物化地不長而萬物育帝王無為而天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之徳配天地此乘天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣三軍五兵之運徳之末也賞罰利害五刑之辟教之末也禮法度數形名比詳治之末也鐘鼔之音羽旄之容樂之末也哭泣衰絰隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也末學者古人有之而非所以先也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌區有狀盛衰之殺變化之流也夫天地至神而有尊卑先後之序而况人道乎宗廟尚親朝廷尚尊鄉黨尚齒行事尚賢大道之序也語道而非其序者非其道也語道而非其道者安取道是故古之明大道者先明天而道徳次之道徳已明而仁義次之仁義已明而分守次之分守已明而形名次之形名已明而因任次之因任已明而原省次之原省已明而是非次之是非已明而賞罰次之賞罰已明而愚知處宜貴賤履位仁賢不肖襲情必分其能必由其名以此事上以此畜下以此治物以此修身知謀不用必歸其天此之謂太平治之至也故書曰有形有名形名者古人有之而非所以先也古之語大道者五變而形名可舉九變而賞罰可言也驟而語形名不知其本也驟而語賞罰不知其始也倒道而言迕道而説者人之所治也安能治人驟而語形名賞罰此有知治之具非知治之道可用於天下不足以用天下此之謂辨士一曲之人也禮法數度刑名比詳古人有之此下之所以事上非上之所以畜下也庚桑楚莊子老聃之役有庚桑楚者偏得老聃之道以北居畏壘之山其臣之畫然知者去之其妾之挈然仁者逺之擁腫之與居鞅掌之為使居三年畏壘大穰畏壘之民相與言曰庚桑子之始來吾洒然異之今吾日計之而不足歳計之而有餘庶幾其聖人乎子胡不相與尸而祝之社而稷之乎庚桑子聞之南面而不釋然弟子異之庚桑子曰弟子何異於予夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉天道已行矣吾聞至人尸居環堵之室而百姓猖狂不知所徃今以畏壘之細民而竊竊然欲爼豆予於賢人之間我其杓之人耶吾是以不釋於老聃之言弟子曰不然夫尋常之溝巨魚無所還其體而鯢鰌為之制歩仞之丘陵巨獸無所隠其軀而㜸狐為之祥且夫尊賢授能先善與利自古堯舜以然而况畏壘之民乎夫子亦聽矣庚桑子曰小子來夫函車之獸介而離山則不免於罔罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭髙魚鼈不厭深夫全其形生之人藏其身也不厭深𦕈而已矣且夫二子者又何足以稱揚哉是其於辨也將妄鑿垣墻而殖蓬蒿也簡髪而櫛數米而炊竊竊乎又何足以濟世哉舉賢則民相軋任知則民相盗之數物者不足以厚民民之於利甚勤子有殺父臣有殺君正晝為盗日中穴阫吾語汝大亂之本必生於堯舜之間其末存乎千世之後千世之後其必有人與人相食者也南榮趎蹵然正坐曰若趎之年者已長矣將惡乎託業以及此言邪庚桑子曰全汝形無使汝思慮營營若此三年則可以及此言也南榮趎曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得形之與形亦辟矣而物或間之耶欲相求而不能相得今謂趎曰全汝形抱汝生勿使汝思慮營營趎勉聞道達耳矣庚桑子曰辭盡矣曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其徳非不同也有能與不能者其才固有巨小也今吾才小不足以化子子胡不南見老子南榮趎贏粮七日七夜至老子之所老子曰子自楚之所來乎南榮趎曰唯老子曰子何與人偕來之衆也南榮趎懼然顧其後老子曰子不知吾所謂乎南榮趎俯而慙仰而歎曰今者吾忘吾答因失吾問老子曰何謂也南榮趎曰不知乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我已我安逃此而可此三言者趎之所患也願因楚而問之老子曰向吾見若眉睫之間吾因以得汝矣今汝又言而信之若規規然若䘮父母掲竿而求諸海也汝亡人哉惘惘乎汝欲反汝情性而無由入可憐哉南榮趎請入就舍召其所好去其所惡十日自愁復見老子老子曰汝自洒濯孰哉鬱鬱乎然而其中津津乎猶有惡也夫外韄者不可繁而捉將内揵内􅀈者不可繆而捉將外揵外内􅀈者道徳不能持而况放道而行者乎南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也若趎之聞大道譬猶飲藥以加病也趎願聞衛生之經而已矣老子曰衛生之經能抱一乎能勿失乎能無卜筮而知吉㐫乎能止乎能巳乎能舎諸人而求諸已乎能翛然乎能侗然乎能兒子乎兒子終日嘷而嗌不嗄和之至也終日握而手不掜共其徳也終日視而目不瞚偏不在外也行不知所之居不知所為與物委蛇而同其波是衛生之經已南榮趎曰然則是至人之徳已乎曰非也是乃所謂氷解凍釋者夫至人者相與交食乎地而交樂乎天不以人物利害相攖不相與為怪不相與為謀不相與為事翛然而徃侗然而來是謂衛生之經已曰然則是至乎曰未也吾固告汝曰能兒子乎兒子動不知所為行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來禍福無有惡有人災也宇泰定者發乎天光發乎天光者人見其人人有修者乃今有恒有恒者人舍之天助之人之所舍謂之天民天之所助謂之天子學者學其所不能學也行者行其所不能行也辨者辨其所不能辨也知止乎其所不能知至矣若有不即是者天鈞敗之備物以將形藏不虞以生心敬中以達彼若是而萬惡至者皆天也而非人也不足以滑成不可内於靈臺靈臺者有持而不知其所持而不可持者也不見其誠巳而發毎發而不當業入而不舍毎更為失為不善乎顯明之中者人得而誅之為不善乎幽間之中者鬼得而誅之明乎人明乎鬼者然後能獨行劵内者行乎無名劵外者志乎期費行乎無名者唯庸有光志乎期費者唯賈人也人見其跂猶之魁然與物窮者物入焉與物且者其身之不能容焉能容人不能容人者無親無親者盡人兵莫􅉃於志鏌鎁為下宼莫大於隂陽無所逃於天地之間非隂陽賊之心則使之也道通其分也其成也毁也所惡乎分者其分也以備所以惡乎備者其有以備故出而不反見其鬼出而得是謂得死滅而有實鬼之一也以有形者象無形者而定矣出無本入無竅有實而無乎處有長而無乎本剽有所出而無竅者有實有實而無乎處者宇也有長而無本剽者宙也有乎生有乎死有乎出有乎入入出而無見其形是謂天門天門者無有也萬物出乎無有有不能以有為有必出乎無有而無有一無有聖人藏乎是古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣弗可以加矣其次以為有物矣將以生為䘮也以死為反也是以分已其次曰始無有既而有生生俄而死以無有為首以生為體以死為尻孰知有無死生之一守者吾與之為友是三者雖異公族也昭景也著戴也甲氏也著封也非一也有生黬也披然曰移是嘗言移是非所言也雖然不可知者也臘者之有膍胲可散而不可散也觀室者周於寢廟又適其偃焉為是舉移是請嘗言移是是以生為本以知為師因以乘是非果有名實因以已為質使人以為已節因以死償節若然者以用為知以不用為愚以徹為名以窮為辱移是今之人也是蜩與鷽鳩同於同也蹍市人之足則辭以放驁兄則以嫗大親則已矣故曰至禮有不人至義不物至知不謀至仁無親至信辟金徹志之勃解心之謬去徳之累達道之塞貴富顯嚴名利六者勃志也容動色理氣意六者謬心也惡欲喜怒哀樂六者累徳也去就取與知能六者塞道也此四六者不盪胷中則正正則靜靜則明明則虚虚則無為而無不為也道者徳之欽也生者徳之光也性者生之質也性之動謂之為為之偽謂之失知者接也知者謨也知者之所不知猶睨也動以不得已之謂徳動無非我之謂治名相反而實相順也羿工乎中微而拙乎使人無已譽聖人工乎天而拙乎人夫工乎天而俍乎人者唯全人能之唯虫能虫唯虫能天全人惡天惡人之天而况吾天乎人乎一雀適羿羿必得之威也以天下為之籠則雀無所逃是故湯以胞人籠伊尹秦穆公以五羊之皮籠百里奚是故非以其所好籠之而可得者無有也介者移畫外非譽也胥靡登髙而不懼遺死生也夫復謵不餽而忘人忘人因以為天人矣故敬之而不喜侮之而不怒者唯同乎天和者為然出怒不怒則怒出於不怒矣出為無為則為出於無為矣欲靜則平氣欲神則順心有為也欲當則縁於不得已不得已之類聖人之道大宗師莊子知天之所為知人之所為者至矣知天之所為者天而生也知人之所為者以其知之所知以養其知之所不知終其天年而不中道天者是知之盛也雖然有患夫知有所待而後當其所待者特未定也庸詎知吾所謂天之非人乎所謂人之非天乎且有真人而後有真知何謂真人古之真人不逆寡不雄成不謩士若然者過而弗悔當而不自得也若然者登髙不慄入水不濡入火不熱是知之能登假於道也若此古之真人其寢不夢其覺無憂其食不甘其息深深真人之息以踵衆人之息以喉屈服者其嗌言若哇其嗜欲深者其天機淺古之真人不知説生不知惡死其出不訢其入不距翛然而徃翛然而來而已矣不忘其所始不求其所終受而喜之忘而復之是之謂不以心捐道不以人助天是之謂真人若然者其心忘其容寂其顙頯凄然似秋煖然似春喜怒通四時與物有宜而莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不為愛人故樂通物非聖人也有親非仁也天時非賢也利害不通非君子也行名失已非士也亡身不真非役人也若狐不偕務光伯夷叔齊箕子胥餘紀它申徒狄是役人之役適人之適而不自適其適者也古之真人其狀義而不朋若不足而不承與乎其觚而不堅也張乎其虚而不華也邴邴乎其似喜乎崔乎其不得已乎滀乎進我色也與乎止我徳也厲乎其似世乎謷乎其未可制也連乎其似好閉也悗乎忘其言也以刑為體以禮為翼以知為時以徳為循以刑為體者綽乎其殺也以禮為翼者所以行於世也以知為時者不得已於事也以徳為循者言其與有足者至於丘也而人真以為勤行者也故其好之也一其弗好之也一其一也一其不一也一其一與天為徒其不一與人為徒天與人不相勝也是之謂真人死生命也其有夜旦之常天也人之有所不得與皆物之情也彼特以天為父而身猶愛之而况其卓乎人特以有君為愈乎已而身猶死之而况其眞乎泉涸魚相與處於陸相呴以濕相以沫不如相忘於江湖與其譽堯而非桀也不如兩忘而化其道夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昩者不知也藏小大有宜猶有所遯若夫藏天下於天下而不得所遯是恒物之大情也特犯人之形而猶喜之若人之形者萬化而未始有極也其為樂可勝計邪故聖人將遊於物之所不得遯而皆存善夭善老善始善終人猶效之又况萬物之所係而一化之所待乎夫道有情有性無為無形可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不為髙在六極之下而不為深先天地生而不為久長於上古而不為老狶韋氏得之以挈天地伏戲得之以襲氣母維斗得之終古不忒日月得之終古不息堪坯得之以襲崑崙馮夷得之以遊大川肩吾得之以處大山黄帝得之以登雲天顓頊得之以處𤣥宫禺强得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五伯傅説得之以相武丁奄有天下乗東維騎箕尾而比於列星楊權韓非子凡聴之道以其所出反以為之入故審名以定位明分以辨類聽言之道溶若甚醉彼自離之吾因以知之是非輻凑上不與構喜之則多事惡之則生怨故去喜去惡虚心以為道舍固閉内扄從室視庭以賞者賞以刑者刑若地若天孰踈孰親能象天地凡治之極下不能得周合刑名民乃守職去此更求是謂大惑猾民愈衆奸邪滿側故曰毋富人而貸焉毋貴人而逼焉毋專信一人而失其都國焉腓大於股難以趣走主失其神虎隨其後彼求我予假仇人斧假之不可彼將用之以伐我黄帝有言曰上下一日百戰下匿其私用試其上上操度量以割其下故度量之立主之寳也上失扶寸丁得尋常内索出圉必身自執其度量厚者虧之薄者靡之虧靡有量毋使民比周同欺其上虧之若月靡之若熱簡令謹誅必盡其罰毋弛而弓一棲兩雄一棲兩雄其鬬㘖㘖豺狼在牢其羊不繁為人君者數披其木毋使木枝扶踈木枝扶踈將塞公閭私門將實公庭將虚主將壅圉數披其木無使木枝外拒木枝外拒將逼主處數披其木毋使枝大本小枝大本小將不勝春風不勝春風枝將害心止之之道數披其木毋使枝茂木枝數披黨與乃離掘其根本本乃不神填其洶淵毋使水清探其懷奪之威主上用之若電若雷文編卷二十四

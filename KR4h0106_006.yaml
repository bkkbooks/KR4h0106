body:
  text: 文編卷六明唐順之編魏絳請和戎左傳無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄亡親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則擕二勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華毋乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠尨圉而用寒浞寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為已相浞行媚于內而施賂于外愚弄其民而虞羿于田樹之詐慝以取其國家外內咸服羿猶不悛將歸自田家衆殺而亨之以食其子其子不忍食諸死于窮門靡奔有鬲氏浞因羿室生澆及豷恃其讒慝詐偽而不德于民使澆用師滅斟灌及斟尋氏處澆于過處豷于戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼滅豷于戈有窮由是遂亡失人故也昔周辛甲之為大史也命百官官針王闕於虞人之針曰芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處德用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞針如是可不懲乎於是晉侯好田故魏絳及之公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒于后羿而用德度逺至邇安五也君其圖之公説使魏絳盟諸戎修民事田以時聲子請復椒舉左傳初楚伍參與蔡太師子朝友其子伍舉與聲子相善也伍舉娶于王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戍將平晉楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之子木曰夫獨亡族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僣而刑不濫賞僣則愳及淫人刑濫則愳及善人若不幸而過寧僣亡濫與其失善寧其利淫亡善人則國從之詩曰人之云亡邦國殄瘁亡善人之謂也故夏書曰與其殺不辜寧失不經愳失善也商頌有之曰不僣不濫不敢怠皇命于下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮亡敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譛雍子君與大夫不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇于靡角之谷晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳於晉教吳叛楚教之乘車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苗以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師􅑒子反死之鄭叛吳興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒鳴逆之文編卷六

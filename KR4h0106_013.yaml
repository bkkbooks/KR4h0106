body:
  text: 文編卷十三明唐順之編凖詔言事上書歐陽修月日臣修謹昧死再拜上書于皇帝陛下臣近準詔書許臣上書言事臣學識愚淺不能廣引深逺以明治亂之原謹採當今急務條為三弊五事以應詔書所求伏惟陛下裁擇臣聞自古王者之治天下雖有憂勤之心而不知致治之要則心愈勞而事愈乖雖有納諫之明而無力行之果斷則言愈多而聽愈惑故為人君者以細務而責人專大事而獨斷此致治之要術也納一言而可用雖衆說不得以沮之此力行之果斷也知此二者天下無難治矣伏見國家自大兵一動中外騷然陛下思社稷之安危念兵民之疲弊四五年來聖心憂勞可謂至矣然而兵日益老賊日益彊併九州之力討一西戎小者尚無一人敢前今又北戎大者違盟而動其將何以禦之從來所患者西夏今西夏叛矣所惡者盜賊今盜賊起矣所憂者水旱今水旱作矣所賴者民力今民力困矣所須者財用今財用乏矣陛下之心日憂於一日天下之勢嵗危於一嵗此臣所謂用心雖勞不知求致治之要者也近年朝廷開發言路獻計之士不下數千然而事緒轉多枝梧不暇從前所採衆議紛紜至於臨事誰䇿可用此臣所謂聽言雖多不如力行之果斷者也伏思聖心所甚憂而當今所尚闕者不過曰無兵也無將也無財用也無禦戎之䇿也無可任之臣也此五者陛下憂其未有而臣謂今皆有之然陛下未得而用者未思其術也國家創業之初四方割據中國地狹兵民不多然尚能南取荆楚收僞唐定閩嶺西平兩蜀東下并潞北窺幽燕當時所用兵財將吏其數幾何惟善用之故不覺其少何况今日承百年祖宗之業盡有天下之富彊人衆物盛十倍國初故臣敢言有兵有將有財用有禦戎之䇿有可任之臣然陛下皆不得而用者其故何哉由朝廷有三大弊故也何謂三弊一曰不慎號令二曰不明賞罰三曰不責功實此三弊因循於上則萬事弛慢廢壞於下臣聞號令者天子之威也賞罰者天子之權也若號令不信賞罰不當則天下不服故又須責臣下以功實然後號令不虛出而賞罰不濫行是慎號令明賞罰責功實此三者帝王之竒術也自古人君英雄如漢武帝聰明如唐太宗皆知用此三術而自執威權之柄故所求無不得所欲皆如意漢武好用兵則誅滅四夷立功萬里以快其心欲求將則有衛霍之材以供其指使欲得賢士則有公孫董汲之徒以稱其意唐太宗好用兵則誅突厥服遼東威振夷狄以逞其志欲求將則有李靖李績之徒入其駕馭欲得賢士則有房杜之徒在其左右此二帝者可謂所求無不得所欲皆如意無他術也惟能自執威權之柄耳伏惟陛下以聖明之姿超出二帝又盡有漢唐之天下然而欲禦邊則常患無兵欲破賊則常患無將欲贍軍則常患無財用欲威服四夷則常患無䇿欲任使賢材則常患無人是所求皆不得所欲皆不如意也其故無他由不用威權之術也自古帝王或為强臣所制或為小人所惑則威權不得出於已今朝無强臣之患旁無小人偏任之溺內外臣庶尊陛下如天愛陛下如父傾耳延首願陛下之有為然何所憚而不為乎若一日赫然執威柄以臨之則可使萬事皆辦何患五者之無奈何為三弊之因循一事之不集臣請言三弊夫言多變則不信令頻改則難從今出令之初不加詳審行之未久尋又更張以不信之言行難從之令故每有處置之事州縣知朝廷未是一定之命則官吏或相謂曰且未要行不久必須更改或曰備禮行下略與應破指揮旦夕之間果然又變至於將吏更易道路疲於送迎符牒縱橫上下莫能遵守中外臣庶或聞而歎息或聞而竊笑歎息者有憂天下之心竊笑者有輕朝廷之意號令如此欲威天下其可得乎此不慎號令之弊也用人之術不過賞罰然賞及無功則恩不足勸罰失有罪則威無所懼雖有人不可用矣太祖時王全斌破蜀而歸功不細矣犯法一貶十年不問是時方討江南故黜全斌與諸將立法太祖神武英斷所以能平定天下者其賞罰之法皆如此也昨關西用兵四五年矣大將以無功罷者依舊居官軍中見無功者不妨得好官則諸將誰肯立功矣禆將畏懦逗留者皆當斬罪或暫貶而尋遷或不貶而依舊軍中見有罪者不誅則諸將誰肯用命矣所謂賞不足勸威無所懼賞罰如此而欲用人其可得乎此不明賞罰之弊也自兵動以來處置之事不少然多有名而無實臣請略言其一二則其他可知數年以來㸃兵不絶諸路之民半為兵矣其間老弱病患短小怯懦者不可勝數是有㸃兵之虛名而無得兵之實數也新集之兵所在教習追呼上下民不安居主教者非將領之材所教者無旗鼓之節往來州縣愁歎嗷嗷既多是老病小怯之人又無訓齊精練之法此有教兵之虛名而無訓兵之實藝也諸路州軍分造器械工作之際已勞民力輦運般送又苦道塗然而鐵刃不剛筋膠不固長短大小多不中度造作之所但務充數而速了不計所用之不堪經歷官司又無檢責此有器械之虛名而無器械之實用也以草草之法教老怯之兵執鈍折不堪之器械百戰百敗理在不疑臨事而悟何可及乎故事無大小悉皆鹵莽則不責功實之弊也臣故曰三弊因循於上則萬事弛慢廢壞於下萬事不可盡言臣請言大者五事其一曰兵臣聞攻人以謀不以力用兵鬭智不鬭多前代用兵之人多者常敗少者常勝漢王尋等以百萬之兵遇光武九千人而敗是多者敗而少者勝也苻堅以百萬之兵遇東晉二三萬人而敗是多者敗而少者勝也曹操以三十萬青州兵大敗於呂布退而歸許復以二萬人破袁紹十四五萬是用兵多則敗少則勝之明驗也况於夷狄尤難以力爭只可以計取李靖破突厥於定襄只用三千人其後破頡利於隂山亦不過一萬蓋兵不在多能以計取爾故善用兵者以少為多不善用者雖多而愈少也為今計者添兵則耗國减兵則破賊今沿邉之兵不下七八十萬可謂多矣然訓練不精又有老弱虛數則十人不當一人是七八十萬之兵不當七八萬人之用加之軍無統制分散支離分多為寡兵法所忌此所謂不善用兵者雖多而愈少故常戰而常敗也臣願陛下赫然奮威勑勵諸將精加訓練去其老弱七八十萬中可得五十萬數古人用兵以一當百今既未能但得以一當十則五十萬精兵可當五百萬兵之用此所謂善用兵者以少而為多古人所以少而常勝者以此也今不思實效但務添多耗國耗民積以年嵗賊雖不至天下已困矣此一事也其二曰將臣又聞古語曰將相無種故或出於奴僕或出於軍卒或出於盜賊惟能不次而用之乃為名將耳國家求將之意雖勞選將之路太狹今詔近臣舉將而限以資品則英豪之士在下位者不可得矣試將材者限以弓馬一夫之勇則智略萬人之敵皆遺之矣山林竒傑之士召而至者以其貧賤而薄之不過與一主簿借職使其怏怏而去則古之屠釣飯牛之傑皆激怒而失之矣至於無人可用則寧用龍鍾跛躄庸懦暗劣之徒皆授之兵柄天下三尺童子皆為朝廷危之前日澶淵之卒幾為國家生事此可見也議者不知取將之無術但云當今之無將臣願陛下革去舊弊奮然精求有賢豪之士不須限以下位有智略之人不必試以弓馬有山林之傑不可薄其貧賤惟陛下能以非常之禮待人人臣亦將以非常之效報國此二事也其三曰財用臣又聞善治病者必醫其受病之處善救弊者必尋其起弊之源今天下財用困乏其弊安在起於用兵而費大故也漢武好窮兵用盡纍世之財當時勒兵單于臺不過十八萬尚能困其國力况未若今日七八十萬連四五年而不罷所以罄天地之所生竭萬民之膏血而用不足也今雖有智者物不能增而計無所出矣惟有减冗卒之虛費練精兵而速戰功成兵罷自然足矣今兵有可减之理無人敢當其事賊有速擊之便無將敢奮其勇後時敗事徒耗國而耗民此三事也其四曰禦戎之䇿臣又聞兵法曰上兵伐謀其次伐交契丹與朝廷通好僅四十年不敢妄動今一旦發其狂謀者其意何在蓋見中國頻為元昊所敗故敢啓其貪心伺隙而動爾今若勑勵諸將選兵秣馬疾入西界但能痛敗昊賊一陳則吾軍威大振而敵計沮矣此所謂上兵伐謀者也今論事者皆知契丹與西賊通謀欲併二國之力窺我河北陜西今若我能先擊敗其一國則敵勢减半不能獨舉此兵法所謂伐交者也元昊地狹賊兵不多向來攻我傳聞契丹常有助兵今若虜中自有㸃集之謀而元昊驟然被擊必求助於契丹契丹分兵助昊則可牽其南寇之力若不助昊則二國有隙自相疑二此亦伐交之䇿也假令二國剋期分路來寇我能先期大舉則元昊蒼皇自救不暇豈能與契丹相為表裏是破其素定之約乖其剋日之期此兵法所謂親而離之也亦伐交之䇿也元昊叛逆以來幸而屢勝常有輕視諸將之心今又見朝廷北憂契丹方經營於河朔必謂我師不能西出今乘其驕怠正是疾驅急擊之時此兵法所謂出其不意者此取勝之上䇿也前年西將有請出攻者當時賊氣力方盛我兵未練朝廷尚許其出師况今元昊有可攻之勢此不可失之時彼方幸吾憂河北而不虞我能西征出其不意此可攻之勢也自四路分帥今已半年訓練恩信兵已可用故近日屢奏小捷是我師漸振賊氣漸衄此可攻之勢也茍失此時而使二虜先來則吾無䇿矣臣願陛下詔執事之臣熟議而行之此四事也其五曰可任之臣臣又聞仲尼曰十室之邑必有忠信况今文武列職遍於天下其間豈無材智之臣而陛下總治萬幾之大既不暇盡識其人故不能躬自進賢而退不肖執政大臣動拘舊例又不敢進賢而退不肖審官吏部三班之職但掌文簿差除而已又不敢越次進賢而退不肖是上自天子下至有司無一人得進賢而退不肖者所以賢愚混雜僥幸相容三載一遷更無旌别平居無事惟患太多而差遣不行一旦臨事要人常患乏人使用自古任官之法無如今日之繆也今議者或謂舉主轉官為進賢犯罪黜責為退不肖此不知其弊之深也大凡善惡之人各以類聚故守亷慎者各舉清幹之人有贓汙者各舉貪濁之人好徇私者各舉請求之人性庸暗者各舉不材之人朝廷不問是非但見舉主數足便與改官則清幹者進矣貪濁者亦進矣請求者亦進矣不材者亦進矣混淆如此便可為進賢之法乎方今黜責官吏豈有澄清糾舉之術哉惟犯贓之人因民論訴者乃能黜之耳夫能舞弄文法而求財賂者亦强黠之吏政事必由已出故雖誅剝豪民尚或不及貧弱至於不材之人不能主事衆胥群吏共為奸欺則民無貧富一時受弊以此而言則贓吏與不材之人為害等耳今贓吏因自敗者乃加黜責十不去其一二至於不材之人上下共知而不問寬緩容姦其弊如此便可為退不肖之法乎賢不肖既無别則宜乎設官雖多而無人可用也臣願陛下明賞罰責功實則財皆列於陛下之前矣臣故曰五者皆有然陛下不得而用者為有弊也三弊五事臣既已詳言之矣惟陛下擇之天下之務不過此也方今天文變於上地理逆於下人心怨於內四夷攻於外事勢如此矣非是陛下遲疑寬緩之時惟願為社稷生民留意臣修昧死再拜上仁宗皇帝書蘇洵嘉祐三年十二月一日眉州布衣臣蘇洵謹頓首再拜冒萬死上書皇帝闕下臣前月五日蒙本州録到中書劄子連牒臣以兩制議上翰林學士歐陽修奏臣所著權書衡論幾䇿二十二篇乞賜甄録陛下過聽召臣試䇿論舍人院仍令本州發遣臣赴闕臣本田野匹夫名姓不登於州閭今一旦卒然被召實不知其所以自通於朝廷承命悸恐不知所為以陛下躬至聖之資又有群公卿之賢與天下士大夫之衆如臣等輩固宜不少有臣無臣不加損益臣不幸有負薪之疾不能奔走道路以副陛下搜揚之心憂惶負罪無所容處臣本凡才無路自進當少年時亦嘗欲僥幸於陛下之科舉有司以為不肖輒以擯落蓋退而處者十有餘年矣今雖欲勉彊扶病戮力亦自知其疏拙終不能合有司之意恐重得罪以辱明詔且陛下所為千里而召臣者其意以臣為能有所發明以庶幾有補於聖政之萬一而臣之所以自結髮讀書至於今兹犬馬之齒幾已五十而猶未敢廢者其意亦欲效尺寸於當時以快平生之志耳今雖未能奔伏闕下以纍有司而猶不忍默默卒無一言而已也天下之事其深逺切至者臣自惟疏賤未敢遽言而其近而易行淺而未見者謹條為十通以塞明詔其一曰臣聞利之所在天下趨之是故千金之子欲有所為則百家之市無寧居者古之聖人執其大利之權以奔走天下意有所嚮則天下爭先為之今陛下有奔走天下之權而不能用何則古者賞一人而天下勸今陛下增秩拜官動以千計其人皆以為己所自致而不知戮力以報上之恩至於臨事誰當效用此由陛下輕用其爵祿使天下之士積日持久而得之譬如傭力之人計工而受直雖與之千萬豈知德其主哉是以雖有能者亦無所施以為謹守繩墨足以自致髙位官吏繁多溢於局外使陛下皇皇汲汲求以處之而不暇擇其賢不肖以病陛下之民而耗竭大司農之錢穀此議者所欲去而未得也臣竊思之蓋今制馭天下之吏自州縣令録幕職而改京官者皆未得其術是以若此紛紛也今雖多其舉官而逺其考重其舉官之罪此適足以隔賢者而容不肖且天下無事雖庸人皆足以無過一旦改官無所不為彼其舉者曰此亷吏此能吏朝廷不知其所以為亷與能也幸而未有敗事則長為亷與能矣雖重其罪未見有益上下相蒙請託公行涖官六七考求舉主五六人此誰不能者臣愚以為舉人者當使明著其迹曰某人亷吏也嘗有某事以知其亷某人能吏也嘗有某事以知其能雖不必有非常之功而皆有可紀之狀其特曰亷能而已者不聽如此則夫庸人雖無罪而不足稱者不得入其間老於州縣不足甚惜而天下之吏必皆務為可稱之功與民興利除害惟恐不出諸已此古之聖人所以驅天下之人而使爭為善也有功而賞有罪而罰其實一也今降官罷任者必奏曰某人有某罪其罪當然然後朝廷舉而行之今若不著其所犯之由而特曰此不才貪吏也則於朝廷安肯以空言而加之罪今又何獨至於改官而聽其空言哉是不思之甚也或者以為如此則天下之吏務為可稱用意過當生事以為己功漸不可長臣以為不然蓋聖人必觀天下之勢而為之法方天下初定民厭勞役則聖人務為因循之政與之休息及其久安而無變則必有不振之禍是以聖人破其茍且之心而作其怠惰之氣漢之元成惟不知此以至於亂今天下少惰矣宜有以激發其心使踴躍於功名以變其俗况乎冗官紛紜如此不知所以節之而又何疑於此乎且陛下與天下之士相期於功名而毋茍得此待之至深也若其宏才大略不樂於小官而無聞焉者使兩制得以非常舉之此天下亦不過幾人而已吏之有過而不得遷者亦使得以功贖如此亦以示陛下之有所推恩而不惟艱之也其二曰臣聞古者之制爵祿必皆孝悌忠信修潔博習聞於鄉黨而達於朝廷以得之及其後世不然曲藝小數皆可以進然其得之也猶有以取之其弊不若今之甚也今之用人最無謂者其所謂任子乎因其父兄之資以得大官而又任其子弟子將復任其孫孫又任其子是不學而得者常無窮也夫得之也易則其失之也不甚惜以不學之人而居不甚惜之官其視民如草芥也固宜朝廷自近年始有意於裁節然皆知損之而未得其所損此所謂制其末而不窮其原見其粗而未識其精僥幸之風少衰而猶在也夫聖人之舉事不惟曰利而已必將有以大服天下之心今欲有所去也必使天下知其所以去之之說故雖盡去而無疑何者恃其說明也夫所謂任子者亦猶曰信其父兄而用其子弟云爾彼其父兄固學而得之也學者任人不學者任於人此易曉也今之制茍幸而其官至於可任者舉使任之不問其始之何從而得之也且彼任於人不暇又安能任人此猶借資之人而欲從之丐貸不已難乎臣愚以為父兄之所任而得官者雖至正郎宜皆不聽任子弟惟其能自修飾而越録躐次以至於清顯者乃聽如此則天下之冗官必大衰少而公卿之後皆奮志為學不待父兄之資其任而得官者知後不得復任其子弟亦當勉彊不肯終老自棄於庸人此其為益豈特一二而已其三曰臣聞自設官以來皆有考績之法周室既亡其法廢絶自京房建考課之議其後終不能行夫有官必有課有課必有賞罰有官而無課是無官也有課而無賞罰是無課也無官無課而欲求天下之大治臣不識也然更歷千載而終莫之行行之則益以紛亂而終不可考其故何也天下之吏不可以勝考今欲人人而課之必使入於九等之中此宜其顛倒錯繆而不若無之為便也臣觀自昔行考課者皆不得其術蓋天下之官皆有所屬之長有功有罪其長皆得以舉刺如必人人而課之於朝廷則其長為將安用惟其大吏無所屬而莫為之長也則課之所宜加何者其位尊故課一人而其下皆可整齊其數少故可以盡其能否而不謬今天下所以不大治者守令丞尉賢不肖混淆而莫之辨也夫守令丞尉賢不肖之不辨其咎在職司之不明職司之不明其咎在無所屬而莫為之長陛下以無所屬之官而寄之以一路其賢不肖當使誰察之古之考績者皆從司㑹而至於天子古之司㑹即今之尚書尚書既廢唯御史可以總察中外之官臣愚以為可使朝臣議定職司考課之法而於御史臺前立考課之司中丞舉其大綱而屬官之中選彊明者一人以專治其事以舉刺多者為上以舉刺少者為中以無舉刺者為下因其罷歸而奏其治要使朝廷有以為之賞罰其非常之功不可掩之罪又當特有以償之使職司知有所懲勸則其下令守丞尉不容復有所依違而其所課者又不過數十人足以求得其實此所謂用力少而成功多法無便於此者矣今天下號為太平其實逺方之民窮困已甚其咎皆在職司臣不敢盡言陛下試加採訪乃知臣言之不妄其四曰臣聞古者諸侯臣妾其境內而卿大夫之家亦各有臣陪臣之事其君如其君之事天子此無他其一境之內所以生殺豫奪富貴貧賤者皆自我制之此固有以臣妾之也其後諸侯雖廢而自漢至唐猶有相君之勢何者其署置辟舉之權猶足以臣之也是故太守刺史坐於堂上州縣之吏拜於堂下雖奔走頓伏其誰曰不然自太祖受命收天下之尊歸之京師一命以上皆上所自署而大司農衣食之自宰相至於州縣吏雖貴賤相去甚逺而其實皆所與比肩而事主耳是以百餘年間天下不知有權臣之威而太守刺史猶用漢唐之制使州縣之吏事之如事君之禮皆受天子之爵皆食天子之祿不知其何以臣之也小吏之於大官不憂其有所不從惟恐其從之過耳今天下以貴相髙以賤相諂奈何使州縣之吏趨走於太守之庭不啻若僕妾唯唯不給故大吏常恣行不忌其下而小吏不能正以至於曲隨諂事助以為虐其能中立而不撓者固已難矣此不足怪其勢固使然也夫州縣之吏位卑而祿薄法於民最近而易以為姦朝廷所恃以制之者特以厲其亷隅全其節槩而養其氣使知有所耻也且必有異材焉後將以為公卿而安可薄哉其尤不可者今以縣令從州縣之禮夫縣令官雖卑其所負一縣之責與京朝官知縣等耳其吏胥人民習知其官長之拜伏於太守之庭如是之不威也故輕之輕之故易為姦此縣令之所以為難也臣愚以為州縣之吏事太守可恭遜卑抑不敢抗而已不至於通名贊拜趨走其下風所以全士大夫之節且以警大吏之不法者其五曰臣聞為天下者必有所不可窺是以天下有急不求其素所不用之人使天下不能幸其倉卒而取其祿位惟聖人為能然何則其素所用者緩急足以使也臨事而取者亦不足用矣傳曰寬則寵名譽之人急則用介胄之士今者所用非所養所養非所用國家用兵之時購方略設武舉使天下屠沽健武皆能徒手攫取陛下之官而兵休之日雖有超世之才而惜斗升之祿臣恐天下有以窺朝廷也今之任為將帥卒有急難而可使者誰也陛下之老將曩之所謂戰勝而善守者今亡矣臣愚以為可復武舉而為之新制以革其舊弊且昔之所謂武舉者蓋疏矣其以弓馬得者不過挽强引重市井之粗材而以䇿試中者亦皆紀録章句區區無用之學又其取人太多天下之知兵者不宜如此之衆而待之又甚輕其下第者不免於𨽻役故其所得皆貪汙無行之徒豪傑之士耻不忍就宜因貢士之嵗使兩制各舉其所聞有司試其可者而陛下親䇿之權略之外便為弓馬可以出入險阻勇而有謀者不過取一二人待以不次之位試以守邊之任文有制科武有武舉陛下欲得將相於此乎取之十人之中豈無一二斯亦足以濟矣其六曰臣聞法不足以制天下以法而制天下法之所不及天下斯欺之矣且法必有所不及也先王知其有所不及是故存其大略而濟之以至誠使天下之所以不吾欺者未必皆吾法之所能禁亦其中有所不忍而已人君御其大臣不可以用法如其左右大臣而必待法而後能御也則其疏逺小吏當復何以哉以天下之大而無可信之人則國不足以為國矣臣觀今兩制以上非無賢俊之士然皆奉法供職無過而已莫肯於繩墨之外為陛下深思逺慮有所建明何者陛下待之於繩墨之內也臣請得舉其一二以言之夫兩府與兩制宜使日夜交於門以講論當世之務且以習知其為人臨事授任以不失其才今法不可以相往來意將以杜其言謁之私也君臣之道不同人臣惟自防人君惟無防之是以歡欣相接而無間以兩府兩制為可信耶當無所請屬以為不可信耶彼何患無所致其私意安在其相往來耶今兩制知舉不免用封彌謄録既奏而下御史親往涖之凛凛如鞫大獄使不知誰人之辭又何其甚也臣愚以為如此之類一切徹去彼稍有知宜不忍負若其猶有所欺也則亦天下之不才無耻者矣陛下赫然震威誅一二人可以使天下姦吏重足而立想聞朝廷之風亦必有倜儻非常之才為陛下用也其七曰臣聞為天下者可以名器授人而不可以名器許人人之不可以一日而知也久矣國家以科舉取人四方之來者如市一旦使有司第之此固非真知其才之髙下大小也特以為姑收之而已將試之為政而觀其悠久則必有大異不然者今進士三人之中釋褐之日天下望為卿相不及十年未有不為兩制者且彼以其一日之長而擅終身之富貴舉而歸之如有所負如此則雖天下之美材亦或怠而不修其率意恣行者人亦望風畏之不敢按此何為者也且又有甚不便者先王制其天下尊尊相髙貴貴相承使天下仰視朝廷之尊如泰山喬嶽非扳援所能及茍非有大功與出群之才則不可以輕得其髙位是故天下知有所忌而不敢覬覦今五尺童子斐然皆有意於公卿得之則不知愧不得則怨何則彼習知其一旦之可以僥幸而無難也如此則匹夫輕朝廷臣愚以為三人之中茍優與一官足以報其一日之長館閣臺省非舉不入彼果不才者也其安以入為彼果才者也其何患無所舉此非獨以愛惜名器將以重朝廷耳其八曰臣聞古者敵國相觀不觀其於山川之險士馬之衆相觀於人而已髙山大江必有猛獸怪物時見其威故人不敢褻夫不必戰勝而後服也使之常者所忌而不敢發使吾常有所恃而無所怯耳今以中國之大使夷狄視之不畏甚者敢有煩言以瀆亂吾聽此其心不有所窺其亦安能如此之無畏也敵國有事相待以將無事相觀以使今之所謂使者亦輕矣曰此人也為此官也則以為此使也今嵗以某來嵗當以某又來嵗當以某如縣令署役必均而已矣人之才固有所短而不可彊其專對捷給勇敢又非可以學致也今必使彊之彼有倉皇失次為夷狄笑而已古者大夫出疆有可以安國家利社稷則專之今法令太密使小吏執簡記其旁一搖足輒隨而書之雖有竒才辨士亦安所效用彼夷狄觀之以為樽俎談燕之間尚不能辦軍旅之際固宜其無人也如此將何以破其姦謀而折其驕氣哉臣愚以為奉使宜有常人惟其可者而不必均彼其不能者陛下責之以文學政事不必彊之於言語之間以敗吾事而亦稍寬其法使得有所施且今世之患以奉使為艱危故必均而後可陛下平世使人而皆得以辭免後有緩急使之出入死地將皆逃耶此臣又非獨為出使而言也其九曰臣聞刑之有赦其來逺矣周制八議有可赦之人而無可赦之時自三代之衰始聞有肆赦之令然皆因天下有非常之事凶荒流離之後盜賊垢汙之餘於是有以沛然洗濯於天下而猶不若今之因郊而赦使天下之凶民可以逆知而僥幸也平時小民畏法不敢趦趄當郊之嵗盜賊公行罪人滿獄為天下者將何利於此而又糜散帑廪以賞無用冗雜之兵一經大禮費以萬億賦斂之不輕民之不聊生皆此之故也以陛下節用愛民非不欲去此矣顧以為所從來久逺恐一旦去之天下必以為少恩而凶豪無賴之兵或因以為辭而生亂此其所以重改也蓋事有不可改而遂不改者其憂必深改之則其禍必速惟其不失推恩而有以救天下之弊者臣愚以為先郊之嵗可因事為辭特發大號如郊之赦與軍士之賜且告之曰吾於天下非有惜乎推恩也惟是凶殘之民知吾當赦輒以犯法以賊害吾良民今而後赦不於郊之嵗以為常制天下之人喜乎非郊之嵗而得郊之賞也何暇慮其後其後四五年而行之七八年而行之又從而盡去之天下晏然不知而日以逺矣且此出於五代之後兵荒之間所以姑息天下而安反側耳後之人相承而不能去以至於今法令明具四方無虞何畏而不改今不為之計使姦人猾吏養為盜賊而後取租賦以啖驕兵乘之以饑饉鮮不及亂矣當此之時欲為之計其猶有及乎其十曰臣聞古者所以採庶人之議為其疏賤而無嫌也不知爵祿之可愛故其言公不知君威之可畏故其言直今臣幸而未立於陛下之朝無所愛惜顧念於其心者是以天下之事陛下之諸臣所不敢盡言者臣請得以僣言之陛下擢用俊賢思致太平今幾年矣事垂立而輒廢功未成而旋去陛下知其所由乎陛下知其所由則今之在位者皆足以有立若猶未也雖得賢臣千萬天下終不可為何者小人之根未去也陛下遇士大夫有禮凡在位者不敢用䙝狎戲嫚以求親媚於陛下而讒言邪謀之所由至於朝廷者天下之人皆以為陛下不疏逺宦官之過陛下特以為耳目玩弄之臣而不知其隂賊險詐為害最大天下之小人無由至於陛下之前故皆通於宦官珠玉錦繡所以為賂者絡繹於道以間關齟齬賢人之謀陛下縱不聽用而大臣常有所顧忌以不得盡其心臣故曰小人之根未去也竊聞之道路陛下將有意去而疏之也若如所言則天下之福然臣方以為憂而未敢賀也古之小人有為君子之所抑而反激為天下之禍者臣每痛傷之蓋東漢之衰宦官用事陽球為司𨽻校尉發憤誅王甫等數人磔其尸於道中常侍曹節過而見之遂奏誅陽球而宦官之用事過於王甫之未誅其後竇武何進又欲去之而反以遇害故漢之衰至於掃地而不可救夫君子之去小人惟能盡去乃無後患惟陛下思宗廟社稷之重與天下之可畏既去之又去之既疏之又疏之刀鋸之餘必無忠良縱有區區之小節不過幃闥掃灑之勤無益於事惟能務絶其權使朝廷清明而忠言嘉謨易以入則天下無事矣惟陛下無使為臣之所料而後世以臣為知言不勝大願曩臣所著二十二篇略言當世之要陛下雖以此召臣然臣觀朝廷之意特以其文采詞致稍有可嘉而未必其言之可用也天下無事臣每每狂言以迂闊為世笑然臣以為必將有時而不迂闊也賈誼之䇿不用於孝文之時而使主父偃之徒得其餘論而施之於孝武之世夫施之於孝武之世固不如用之於孝文之時之易也臣雖不及古人惟陛下不以一布衣之言而忽之不勝越次憂國之心效其所見且非陛下召臣臣言無以至於朝廷今老矣恐後無由復言故云云之多至於此也惟陛下寬之臣洵誠惶誠懼頓首頓首謹書上神宗皇帝書蘇軾熙寧四年二月日具位臣蘇軾謹冒萬死再拜上書皇帝陛下臣近者不度愚賤輒上封章言買燈事自知瀆犯天威罪在不赦席藁私室以待斧鉞之誅而側聽逾旬威命不至問之府司則買燈之事尋已停罷乃知陛下不惟赦之又能聽之驚喜過望以至感泣何者改過不吝從善如流此堯舜禹湯之所勉彊而力行秦漢以來之所絶無而僅有顧此買燈毫髮之失豈能上纍日月之明而陛下翻然改命曾不移刻則所謂智出天下而聽於至愚威加四海而屈於匹夫臣今知陛下可與為堯舜可與為湯武可與富民而措刑可與彊兵而伏戎虜矣有君如此其忍負之惟當披露腹心捐棄肝腦盡力所至不知其他乃者臣亦知天下之事有大於買燈者矣而獨區區以此為先者蓋未信而諫聖人不與交淺言深君子所戒是以試論其小者而其大者固將有待而後言今陛下果赦而不誅則是既已許之矣許而不言臣則有罪是以願終言之臣之所欲言者三願陛下結人心厚風俗存紀綱而已人莫不有所恃人臣恃陛下之命故能役使小民恃陛下之法故能勝伏彊暴至於人主所恃者誰歟書曰豫臨兆民凛乎若朽索之馭六馬言天下莫危於人主也聚則為君臣散則為仇讎聚散之間不容毫釐故天下歸往謂之王人各有心謂之獨夫由此觀之人主之所恃者人心而已人心之於人主也如木之有根如燈之有膏如魚之有水如農夫之有田如商賈之有財木無根則槁燈無膏則滅魚無水則死農夫無田則饑商賈無財則貧人主失人心則亡此必然之理也不可逭之災也其為可畏從古以然茍非樂禍好狂輕易失志詎敢肆其胸臆輕犯人心乎昔子産焚載書以弭衆言賂伯石以安巨室以為衆怒難犯專欲難成而孔子亦曰信而後勞其民未信則以為厲已也惟商鞅變法不顧人言雖能驟致富彊亦以召怨天下使其民知利而不知義見刑而不見德雖得天下旋踵而亡至於其身亦卒不免負罪出走而諸侯不納車裂以狥而秦人莫哀君臣之間豈願如此宋襄公雖行仁義失衆而亡田常雖不義得衆而彊是以君子未論行事之是非先觀衆心之向背謝安之用諸桓未必是而衆之所樂則國以乂安庾亮之召蘇峻未必非而勢有不可則反為危辱自古及今未有和易同衆而不安剛果自用而不危者也今陛下亦知人心之不悅矣中外之人無賢不肖皆言祖宗以來治財用者不過三司使副判官經今百年未嘗闕事今者無故又創一司號曰制置三司條例使六七少年日夜講求於內使者四十餘輩分行營幹於外造端宏大民實驚疑創法新竒吏皆惶惑賢者則求其說而不可得未免於憂小人則以意而度於朝廷遂以為謗謂陛下以萬乘之主而言利謂執政以天子之宰而治財商賈不行物價騰涌近自淮甸逺及川蜀喧傳萬口論說百端或言京師正店議置監官夔路深山當行酒禁拘收僧尼常住减剋兵吏廪祿如此等類不可勝言而甚者至以為欲復肉刑斯言一出民且狼顧陛下與二三大臣亦聞其語矣然而莫之顧者徒曰我無其事又無其意何恤於人言夫人言雖未必皆然而疑似則有以致謗人必貪財也而後人疑其盜人必好色也而後人疑其淫何者未置此司則無此謗豈去嵗之人皆忠厚而今嵗之士皆虛浮孔子曰工欲善其事必先利其器又曰必也正名乎今陛下操其器而諱其事有其名而辭其意雖家置一喙以自解市列千金以購人人必不信謗亦不止夫制置三司條例司求利之名也六七少年與使者四十餘輩求利之器也驅鷹犬而赴林藪語人曰我非獵也不如放鷹犬而獸自馴操網罟而入江湖語人曰我非漁也不如捐網罟而人自信故臣以為消讒慝而召和氣復人心而安國本則莫若罷制置三司條例司夫陛下之所以創此司者不過以興利除害也使罷之而利不興害不除則勿罷罷之而天下悅人心安興利除害無所不可則何苦而不罷陛下欲去積弊而立法必使宰相熟議而後行事若不由中書則是亂世之法聖君賢相夫豈其然必若立法不免由中書熟議不免使宰相此司之設無乃冗長而無名智者所圖貴於無迹漢之文景紀無可書之事唐之房杜傳無可載之功而天下之言治者與文景言賢者與房杜蓋事已立而迹不見功已成而人不知故曰善用兵者無赫赫之功豈惟用兵事莫不然今所圖者萬分未獲其一也而迹之布於天下已若泥中之鬬獸亦可謂拙謀矣陛下誠欲富國擇三司官屬與漕運使副而陛下與二三大臣孜孜講求磨以嵗月則積弊自去而人不知但恐立志不堅中道而廢孟子有言其進鋭者其退速若有始有卒自可徐徐十年之後何事不立孔子曰欲速則不逹見小利則大事不成使孔子而非聖人則此言亦不可用書曰謀及卿士至於庶人翕然大同乃底元吉若逆多而從少則靜吉而作凶今上自宰相大臣既已辭免不為則外之議論斷亦可知宰相人臣也且不欲以此自汚而陛下獨安受其名而不辭非臣愚之所識也君臣宵旰幾一年矣而富國之效茫如捕風徒聞內帑出數百萬緡祠部度五千餘人耳以此為術其誰不能且遣使縱橫本非令典漢武遣繡衣直指桓帝遣八使皆以守宰狼籍盜賊公行出於無術行此下䇿宋文帝元嘉之政比於文景當時責成郡縣未嘗遣使至孝武以為郡縣遲緩始命臺使督之以至蕭齊此弊不革故景陵王子良上疏極言其事以為此等朝辭禁門情態即異暮宿州縣威福便行驅迫郵傳折辱守宰公私煩擾民不聊生唐開元中宇文融奏置勸農判官使裴寬等二十九人並攝御史分行天下招擕戶口檢責漏田時張說楊瑒皇甫璟楊相如皆以為不便而相繼罷黜雖得户八千餘萬皆州縣希㫖以主為客以少為多及使百官集議都省而公卿以下懼融威勢不敢異辭陛下試取其傳而讀之觀其所行為是為否近者均稅寬恤冠蓋相望朝廷亦旋覺其非而天下至今以為謗曾未數嵗是非較然臣恐後之視今猶今之視昔且其所遣尤不適宜事少而員多人輕而權重夫人輕而權重則人多不服或致侮慢以興爭事少而員多則無以為功必須生事以塞責陛下雖嚴賜約束不許邀功然人臣事君之常情不從其令而從其意今朝廷之意好動而惡靜好同而惡異指趣所在誰敢不從臣恐陛下赤子自此無寧嵗矣至於所行之事行路皆知其難何者汴水濁流自生民以來不以種稻秦人之歌曰涇水一石其泥數斗且溉且糞長我禾黍何嘗曰長我粳稻耶今欲陂而清之萬頃之稻必用千頃之陂一嵗一淤三嵗而滿矣陛下遽信其說即使相視地形萬一官吏茍且順從真謂陛下有意興作上縻帑廪下奪農時隄防一開水失故道雖食議者之肉何補於民天下久平民物滋息四方遺利蓋略盡矣今欲鑿空訪尋水利所謂即鹿無虞豈惟徒勞必大煩擾凡所擘畫利害不問何人小則隨事酬勞大則量才録用若官私格沮並重行黜降不以赦原若材力不辦興修便許申奏替換賞可謂重罰可謂輕然並終不言諸色人妄有申陳或官私誤興功役當得何罪如此則妄庸輕剽浮浪姦人自此爭言水利矣成功則有賞敗事則無誅官司雖知其疏豈可便行抑退所在追集老少相視可否吏卒所過雞犬一空若非灼然難行必須且為興役何則格沮之罪重而誤興之過輕人多愛身勢必如此且古陂廢堰多為側近冒耕嵗月既深已同永業茍欲興復必盡追收人心或搖甚非善政又有好訟之黨多怨之人妄言某處可作陂渠規壞所怨田産或指人舊業以為官陂冒佃之訟必倍今日臣不知朝廷本無一事何苦而行此哉自古役人必用鄉戶猶食之必用五穀衣之必用桑麻濟川之必用舟楫行地之必用牛馬雖其間或有以他物充代然終非天下所可常行今者徒聞江浙之間數郡雇役而欲措之天下是猶見燕晉之棗栗岷蜀之蹲鴟而欲以廢五穀豈不難哉又欲官賣所在坊場以充衙前雇直雖有長役更無酬勞長役所得既微自此必漸衰散則州郡事體憔悴可知士大夫捐親戚棄墳墓以從官於四方者宣力之餘亦欲取樂此人之至情也若凋弊太甚厨傳蕭然則似危邦之陋風恐非太平之盛觀陛下誠慮及此必不肯為且今法令莫嚴於御軍軍法莫嚴於逃竄禁軍三犯廂軍五犯大率處死然逃軍常半天下不知雇人為役與廂軍何異若有逃者何以罪之其勢必輕於逃軍則其逃必甚於今日為其官長不亦難乎近者雖使鄉户頗得雇人然至於所雇逃亡鄉户猶任其責今遂欲於兩稅之外别立一科謂之庸錢以備官雇則雇人之責官所自任矣自唐楊炎廢租庸調以為兩稅取大厯十四年應於賦斂之數以定兩稅之額則是租調與庸兩稅既兼之矣今兩稅如故奈何復欲取庸聖人立法必慮後世豈可於常稅之外生出科名哉萬一不幸後世有多欲之君輔之以聚斂之臣庸錢不除差役仍舊使天下怨毒推所從來則必有任其咎者矣又欲使坊郭等第之民與鄉戶均役品官形勢之家與齊民並事其說曰周禮田不耕者出屋粟宅不毛者有里布而漢世宰相之子不免戍邊此其所以藉口也古者官養民今者民養官給之以田而不耕勸之以農而不力於是乎有里布屋粟夫家之征而民無以為生去為商賈事勢當耳何名役之且一嵗之戍不過三日三日之雇其直三百今世三大戶之役自公卿以降無得免者其費豈特三百而已矣大抵事若可行不必皆有事故若民所不恱俗所不安縱有經典明文無補於怨若行此二者必怨無疑女戶單丁蓋天民之窮者也古之王者首務恤此而今陛下首欲役之此等茍非戶將絶而未亡則是家有丁而尚幼若假之數嵗則必成丁而就役老死而沒官富有四海忍不加恤孟子曰始作俑者其無後乎春秋書作丘甲用田賦皆重其始為民患也青苗放錢自昔有禁今陛下始立成法每嵗常行雖云不許抑配而數世之後暴君汚吏陛下能保之歟異日天下恨之國史記之曰青苗錢自陛下始豈不惜哉且東南買絹本用見錢陜西糧草不許折兊朝廷既有著令職司又每舉行然而買絹未嘗不折鹽糧草未嘗不折鈔乃知青苗不許抑配之說亦是空文只如治平之初揀刺義勇當時詔㫖慰諭明言永不戍邊著在簡書有如盟約於今幾日議論已搖或以代還東軍或欲抵換弓手約束難恃豈不明哉縱使此令决行果不抑配計其間情願人戶必皆孤貧不濟之人家若自有贏餘何至與官交易此等鞭撻已急則繼之以逃亡逃亡之餘則均之鄰保勢有必至理有固然且夫常平之為法也可謂至矣所守者約而所及者廣借使萬家之邑已有千斛而穀貴之際千斛在市物價自平一市之價既平一邦之食自足無操瓢乞丐之弊無里正催驅之勞今若變為青苗家貸一斛則千戶之外孰救其飢且常平官錢常患其少若盡數收糴則無借貸若留充借貸則所糴幾何乃知常平青苗其勢不能兩立壞彼成此所喪愈多虧官害民雖悔何逮臣竊計陛下欲考其實則必然問人人知陛下方欲力行必謂此法有利無害以臣愚見恐未可憑何以明之臣頃在陜西見刺義勇提舉諸縣臣嘗親行愁怨之民哭聲震野當時奉使還者皆言民盡樂為希合取容自古如此不然則山東之盜二世何緣不覺南詔之敗明皇何緣不知今雖未至於斯亦望陛下審聽而已昔漢武之世財力匱竭用賈人桑𢎞羊之說買賤賣貴謂之均輸於時商賈不行盜賊滋熾幾至於亂孝昭既立學者爭排其說霍光順民所欲從而豫之天下歸心遂以無事不意今者此論復興立法之初其說尚淺徒言徙貴就賤用近易逺然而廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣然既已許之變易變易既行而不與商賈爭利者未之聞也夫商賈之事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏簿書廪祿為費已厚非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前商賈之利何緣而得朝廷不知慮此乃捐五百萬緡以與之此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多今有人為其主牧牛羊不告其主而以一牛易五羊一牛之失則隱而不言五羊之獲則指為勞績陛下以為壞常平而言青苗之功虧商稅而取均輸之利何以異此陛下天機洞照聖略如神此事至明豈有不曉必謂巳行之事不欲中變恐天下以為執德不一用人不終是以遲留嵗月庶幾萬一臣竊以為過矣古之英主無出漢髙酈生謀撓楚權欲復六國髙祖曰善趣刻印及聞留侯之言吐哺而罵曰趣銷印夫稱善未幾繼之以罵刻印銷印有同兒戲何嘗纍髙祖之知人適足以明聖人之無我陛下以為可而行之知其不可而罷之至聖至明無以加此議者必謂民可與樂成難與慮始故陛下堅執不顧期於必行此乃戰國貪功之人行險僥幸之說陛下若信而用之則是狥髙論而逆至情持空名而邀實禍未及樂成而怨已起矣臣之所謂願結人心者此之謂也士之進言者為不少矣亦嘗有以國家之所以存亡厯數之所以長短告陛下者乎夫國家之所以存亡者在道德之淺深而不在乎彊與弱厯數之所以長短者在風俗之厚薄而不在乎富與貧道德誠深風俗誠厚雖貧且弱不害於長而存道德誠淺風俗誠薄雖彊且富不救於短而亡人主知此則知所輕重矣是以古之賢君不以弱而亡道德不以貧而傷風俗而智者觀人之國亦必以此察之齊至彊也周公知其後必有篡弒之臣衛至弱也季子知其後亡吳破楚入郢而陳大夫逄滑知楚之必復晉武既平吳何曾知其將亂隋文既平陳房喬知其不久元帝斬郅支朝呼韓功多於武宣矣偷安而王氏之釁生宣宗收燕趙復河隍力彊於憲武矣銷兵而龎勛之亂起臣願陛下務崇道德而厚風俗不願陛下急於有功而貪富彊使陛下富如隋彊如秦西取靈武北取燕薊謂之有功可也而國之長短則不在此夫國之長短如人之壽夭人之壽夭在元氣國之長短在風俗世有尫羸而壽考亦有盛壯而暴亡若元氣猶存則尫羸而無害及其已耗則盛壯而愈危是以善養生者慎起居節飲食導引關節吐故納新不得已而用藥則擇其品之上性之良可以久服而無害者則五臟和平而壽命長不善養生者薄節慎之功遲吐納之效厭上藥而用下品伐真氣而助彊陽根本已危僵仆無日天下之勢與此無殊故臣願陛下愛惜風俗如護元氣古之聖人非不知深刻之法可以齊衆勇悍之夫可以集事忠厚近於迂闊老成初若遲鈍然終不肯以彼而易此者知其所得小而所喪大也曹參賢相也曰慎無擾獄市黃霸循吏也曰治道去泰甚或譏謝安以清談廢事安笑曰秦用法吏二世而亡劉晏為度支專用果鋭少年務在急速集事好利之黨相師成風德宗初即位擢崔祐甫為相祐甫以道德寬大推廣上意故建中之政其聲翕然天下想望庶幾貞觀及盧杞為相諷上以刑名整齊天下馴至澆薄以及播遷我仁祖之御天下也持法至寬用人有叙專務掩覆過失未嘗輕改舊章然考其成功則曰未至以言乎用兵則十出而九敗以言其府庫則僅足而無餘徒以德澤在人風俗知義是以升遐之日天下如喪考妣社稷長逺終必賴之則仁祖可謂知本矣今議者不察徒見其末年吏多因循事不振舉乃欲矯之以苛察齊之以智能招來新進勇鋭之人以圖一切速成之效未享其利澆風已成且天時不齊人誰無過國君含垢至察無徒若陛下多方包容則人材取次可用必欲廣置耳目務求瑕疵則人不自安各圖茍免恐非朝廷之福亦豈陛下所願哉漢文欲用虎圈嗇夫釋之以為利口傷俗今若以口舌捷給而取士以應對遲鈍而退人以虛誕無實為能文以矯激不仕為有德則先王之澤遂將散微自古用人必須歷試雖有卓異之器必有巳成之功一則使其更變而知難事不輕作一則待其功髙而望重人自無辭昔先主以黃忠為後將軍而諸葛亮憂其不可以為忠之名望素非關張之倫若班爵遽同則必不恱其後關侯果以為言以黃忠豪勇之姿以先主君臣之契尚復慮此而况其他世嘗謂漢文不用賈生以為深恨臣嘗推䆒其旨竊謂不然賈生固天下之竒才所言亦一時之良䇿然請為屬國欲係單于則是處士之大言少年之鋭氣昔髙祖以三十萬衆困於平城當時將相羣臣豈無賈生之比三表五餌人知其踈而欲以困中行說尤不可信矣兵凶器也而易言之正如趙括之輕秦李信之易楚若文帝亟用其說則天下殆將不安使賈生嘗歷艱難亦必自悔其說用之晚嵗其術必精不幸喪亡非意所及不然文帝豈棄才之主絳灌豈蔽賢之士至於朝錯尤號刻薄文帝之世止於太子家令而景帝既立以為御史大夫申屠賢相發憤而死紛更政令天下騷然及至七國發難而錯之術亦窮矣文景優劣於此可見大抵名器爵祿人所奔趨必使積勞而後遷以明持久而難得則人各安其分不敢躁求今若多開驟進之門使有意外之得公卿侍從跬步可圖其得者既不肯以僥幸自名則不得者必皆以沉淪為恨使天下常調舉生妄心耻不若人何所不至欲望風俗之厚豈可得哉選人之改京官常須十年以上洊更險阻計析毫釐其間一事聱牙常至終身淪棄今乃以一人之薦舉而豫之猶恐未稱章服隨至使積勞久次而得者何以厭服哉夫常調之人非守則令員多闕少久已患之不可復開多門以待巧進若巧者侵奪已甚則拙者迫怵無聊利害相形不得不察故近嵗朴拙之人愈少而巧進之士益多惟陛下重之惜之哀之救之如近日三司獻言使天下郡選一人催驅三司文字許之先次指射以酬其勞則其數年之後審官吏部又有三百餘人得先占闕常調待次不其愈難此外勾當發運均輸按行農田水利已振監司之體各懷進用之心轉對者望以稱㫖而驟遷奏課者求為優等而速化相勝以力相髙以言而名實亂矣惟陛下以簡易為法以清淨為心使奸無所緣而民德歸厚臣之所願厚風俗者此之謂也古者建國使內外相制輕重相權如周如唐則外重而內輕如秦如魏則外輕而內重內重之失必有奸臣指鹿之患外重之弊必有大國問鼎之憂聖人方盛而慮衰當先立法以救弊國家租賦籍於計省重兵聚於京師以古揆今則似內重恭惟祖宗所以深計而預圖固非小臣所能億度而周知然觀其委任臺諫之一端則是聖人過防之至計歷觀秦漢以及五代諫諍而死蓋數百人而自建隆以來未嘗罪一言者縱有薄責旋即超升許以風聞而無官長風采所繫不問尊卑言及乘輿則天子改容事關廊廟則宰相待罪故仁宗之世議者譏宰相但奉行臺諫風㫖而已聖人深意流俗豈知擢用臺諫固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者豈徒然哉將以折奸臣之萌而救內重之弊也夫奸臣之始以臺諫折之而有餘及其既成以干戈取之而不足今法令嚴密朝廷清明所謂奸臣萬無此理然養猫所以去鼠不可以無鼠而養不捕之猫畜狗所以防奸不可以無奸而畜不吠之狗陛下得不上念祖宗設此官之意下為子孫立萬世之防朝廷綱紀孰大於此臣自幼小所記及聞長者之談皆謂臺諫所言常隨天下公議公議所與臺諫亦與之公議所擊臺諫亦擊之及至英廟之初始建稱親之議本非人主大過亦無禮典明文徒以衆心未安公議不允當時臺諫以死爭之今者物論沸騰怨讟交至公議所在亦可知矣而相顧不發中外失望夫彈劾積威之後雖庸人亦可以奮揚風采消委之餘雖豪傑有所不能振起臣恐自兹以往習慣成風盡為執政私人以致人主孤立紀綱一廢何事不生孔子曰鄙夫可與事君也歟哉其未得之也患不得之既得之患失之茍患失之無所不至矣臣始讀此書疑其太過以為鄙夫之患失不過備位而茍容及觀李斯憂蒙恬之奪其權則立二世以亡秦盧杞憂懷光之數其惡則誤德宗以再亂其心本生於患失而其禍乃至於喪邦孔子之言良不為過是以知為國者平居必常有忘軀犯顔之士則臨難庶幾有徇義守死之臣茍平居尚不能一言則臨難何以責其死節人臣茍皆如此天下亦曰殆哉君子和而不同小人同而不和和如和羮同如濟水故孫寶有言周公大聖召公大賢猶不相恱著於經典兩不相損晉之王導可謂元臣每與客言舉坐稱善而王述不恱以為人非堯舜安得每事盡善導亦斂袵謝之若使言無不同意無不合更唱迭和何者非賢萬一有小人居其間則人主何緣知覺臣之所謂願存紀綱者此之謂也臣非敢歷詆新政茍為異論如近日減皇族恩例刋定任子條式修完器械閲習鼓旗皆陛下神算之至明乾剛之必斷物議既允臣敢有辭然至於所獻之三言則非臣之私見中外所病其誰不知昔禹戒舜曰無若丹朱傲惟慢遊是好舜豈有是哉周公戒成王曰無若商王受之迷亂酗於酒德哉成王豈有是哉周昌以漢髙為桀紂劉毅以晉武為桓靈當時人君曾莫之罪而書之史冊以為美談使臣所獻三言皆朝廷未嘗有此則天下之幸臣與有焉若有萬一似之則陛下安可不察然而臣之為計可謂愚矣以螻蟻之命試雷霆之威積其狂愚豈可屢赦大則身首異處破壞家門小則削籍投荒流離道路雖然陛下必不為此何也臣天賦至愚篤於自信向者與議學校貢舉首違大臣本意已期竄逐敢意自全而陛下獨然其言曲賜召對從容久之至謂臣曰方今政令得失安在雖朕過失指陳可也臣即對曰陛下生知之性天縱文武不患不明不患不勤不患不斷但患求治太速進人太鋭聽言太廣又俾具述所以然之狀陛下頷之曰卿所獻三言朕當熟思之臣之狂愚非獨今日陛下容之久矣豈有容之於始而不赦之於終恃此而言所以不懼臣之所懼者譏刺既衆怨仇實多必將詆臣以深文中臣以危法使陛下雖欲赦臣而不得豈不殆哉死亡不辭但恐天下以臣為戒無復言者是以思之經月夜以繼日書成復毁至於再三感陛下聽其一言懷不能已卒進其說惟陛下憐其愚忠而卒赦之不勝俯伏待罪憂恐之至臣軾誠惶誠恐頓首頓首謹書上皇帝書蘇軾元豐元年十月日尚書祠部員外郎直史館權知徐州軍州事臣蘇軾謹昧萬死再拜上書皇帝陛下臣以庸材備員冊府出守兩郡皆東方要地私竊以為守法令治文書赴期㑹不足以報塞萬一輒伏思念東方之要務陛下之所宜知者得其一二草具以聞而陛下擇焉臣前任密州建言自古河北與中原離合常係社稷存亡而京東之地所以灌輸河北瓶竭則罍耻唇亡則齒寒而其民喜為盜賊為患最甚因為陛下盡所以待盜賊之䇿及移守徐州覽觀山川之形勢察其風俗之所上而考之於載籍然後又知徐州為南北之襟要而京東諸郡安危所寄也昔項羽入關既燒咸陽而東歸則都彭城夫以羽之雄略捨咸陽而取彭城則彭城之險固形便足以得志於諸侯者可知矣臣觀其地三面被山獨其西平川數百里西走梁宋使楚人開關而延敵材官騶發突騎雲縱真若屋上建瓴水也地宜粟麥一熟而飽數嵗其城三面阻水樓堞之下以汴泗為池獨其南可通車馬而戲馬臺在焉其髙十仞廣袤百步若用武之世屯千人其上聚櫑木炮石凡戰守之具以與城相表裏而積三年糧於城中雖用十萬人不易取也其民皆長大膽力絶人喜為剽掠小不適意則有飛揚跋扈之心非止為盜而已漢髙祖沛人也項羽宿遷人也劉裕彭城人也朱全忠碭山人也皆在今徐州數百里間耳其人以此自負凶桀之氣積以成俗魏太武以三十萬人攻彭城不能下而王智興以卒伍庸材恣睢於徐朝廷亦不能討豈非以其地形便利人卒勇悍故耶州之東北七十餘里即利國監自古為鐵官商賈所聚其民富樂凡三十六冶冶戶皆大家藏鏹巨萬常為盜賊所窺而兵衛寡弱有同兒戲臣中夜以思即為寒心使劇賊致死者十餘人白晝入市則守者皆棄而走耳地既産精鐵而民皆善鍛散冶户之財以嘯召無賴則烏合之衆數千人之仗可以一夕具也順流南下辰發已至而徐有不守之憂矣不幸而賊有過人之才如呂布劉備之徒得徐而逞其志則京東之安危未可知也近者河北轉運司奏乞禁止利國監鐵不許入河北朝廷從之昔楚人亡弓不能忘楚孔子猶小之况天下一家東北二冶皆為國興利而奪彼與此不已隘乎自鐵不北行冶戶皆有失業之憂詣臣而訴者數矣臣欲因此以征冶戶為利國監之捍屏今三十六冶冶各百餘人採礦伐炭多飢寒亡命强力鷙忍之民也臣欲使冶戶每冶各擇有材力而忠謹者保任十人籍其名於官授以郤刃刀槊教之擊刺每月兩衙集於知監之庭而閲試之藏其刃於官以待大盜不得役使犯者以違制論冶戶為盜所擬久矣民皆知之使冶出十人以自衛民所樂也而官又為除近日之禁使鐵得北行則冶戶皆恱而聽命奸猾破膽而不敢謀矣徐城雖嶮固而樓櫓敝惡又城大而兵少緩急不可守今戰兵千人耳臣欲乞移南京新招騎射兩指揮於徐此故徐人也嘗屯於徐營壘材石既具矣而遷於南京異時轉運使分東西路畏餽餉之勞而移之西耳今兩路為一其去來無所損益而足以為徐之重城下數里頗産精石無窮而奉化廂軍見闕數百人臣願募石工以足之聽不差出使此數百人者常採石以甃城數年之後舉為金湯之固要使利國監不可窺則徐無事徐無事則京東無虞矣沂州山谷重阻為逋逃淵藪盜賊每入徐州界中陛下若採臣言不以臣為不肖願復三年守徐且得兼領沂州兵甲巡檢公事必有以自效京東惡盜多出逃軍逃軍為盜民則望風畏之何也技精而法重也技精則難敵法重則致死其勢然也自陛下置將官修軍政士皆精鋭而不免於逃者臣嘗考其所由蓋自近嵗以來部送罪人配軍者皆不使役人而使禁軍軍士當部送者受牒即行往返常不下十日道路之費非取息錢不能辦百姓畏法不敢貸貸亦不可復得惟所部將校乃敢出息錢與之歸而刻其糧賜以上下相持軍政不修博奕飲酒無所不至窮苦無聊則逃去為盜臣自至徐即取不係省錢百餘千别儲之當部送者量逺近裁取以三月刻納不取其息將吏有敢貸息錢者痛以法治之然後嚴軍政禁酒博比朞年士皆飽暖練熟技藝等第為諸郡之冠陛下遣勑使按閲所具見也臣願下其法諸郡推此行之則軍政修而逃者寡亦去盜之一端也臣聞之漢相王嘉曰孝文帝時二千石長吏安官樂職上下相望莫有茍且之意其後稍稍變易公卿以下轉相促急司𨽻部刺史發揚隂私吏或居官數月而退二千石益輕賤吏民慢易之知其易危小失意則起離畔之心前山陽亡徒蘇令從橫吏士臨難莫肯仗節死義者以守相威權素奪故也國家有急取辦於二千石尊重難危乃能使下以王嘉之言而考之於今郡守之威權可謂素奪矣上有監司伺其過失下有吏民持其長短未及按問而差替之命已下矣欲督捕盜賊法外求一錢以使人且不可得盜賊凶人情重而法輕者守臣輒配流之則使所在法司覆按其狀劾以失入惴惴如此何以得吏士死力而破奸人之黨乎由此觀之盜賊所以滋熾者以陛下守臣權太輕故也臣願陛下稍重其權責以大綱濶略其小過凡京東多盜之郡自青鄆以降如徐沂齊曹之類皆慎擇守臣聽法外處置强盜頗賜緡錢使得以布設耳目畜養爪牙然緡錢多賜則難常少又不足於用臣以為每郡可嵗别給一二百千使以釀酒凡使人緝捕盜賊得以酒豫之敢以為他用者坐贓論賞格之外嵗得酒數百斛亦足以使人矣此又治盜之一術也然此皆其小者其大者非臣之所當言欲默而不發則又私自念遭值陛下英聖特達如此若有所不盡非忠臣之義故昧死復言之昔者以詩賦取士今陛下以經術用人名雖不同然皆以文詞進耳考其所得多吳楚閩蜀之人至於京東西河北河東陜西五路蓋自古豪傑之場其人沈鷙勇悍可任以事然欲使治聲律讀經義以與吳楚閩蜀之人爭得失於毫釐之間則彼有不仕而已故其得人常少夫惟忠孝禮義之士雖不得志不失為君子若德不足而才有餘者困於無門則無所不至矣故臣願陛下特為五路之士别開仕進之門漢法郡縣秀民推擇為吏考行察廉以次遷補或至二千石入為公卿古者不專以文詞取人故得士為多黃霸起於卒史薛宣奮於書佐朱邑選於嗇夫邴吉出於獄吏其餘名臣循吏由此而進者不可勝數唐自中葉以後方鎮皆選列校以掌牙兵是時四方豪傑不能以科舉自逹者皆爭為之往往積功以取旄鉞雖老奸巨盜或出其中而名卿賢將如髙仙芝封常清李光弼來瑱李抱玉段秀實之流所得亦已多矣王者之用人如江河江河所趨百川赴焉蛟龍生之及其去而之他則魚鱉無所還其體而鯢鰍為之制今世胥史牙校皆奴僕庸人者無他以陛下不用也今將用胥史牙校而胥史行文書治刑獄錢穀其勢不可廢鞭撻鞭撻一行則豪傑不出於其間故凡士之刑者不可用用者不可刑故臣願陛下採唐之舊使五路監司郡守共選土人以補牙職皆取人材心力有足過人而不能從事於科舉者祿之以今之庸錢而課之鎮稅場務督捕盜賊之類自公罪杖以下聽贖依將校法使長吏得薦其才者第其功閥書其嵗月使得出仕比任子而不以流外限其所至朝廷察其尤異者擢用數人則豪傑英偉之士漸出於此塗而奸猾之黨可得而籠取也其條目委曲臣未敢盡言惟陛下留神省察昔晉武平吳之後詔天下罷軍役州郡悉去武備惟山濤論其不可帝見之曰天下名言也而不能用及永寧之後盜賊蜂起郡國皆以無備不能制其言乃驗今臣於無事之時屢以盜賊為言其私憂過計亦已甚矣陛下縱能容之必為議者所笑使天下無事而臣獲笑可也不然事至而圖之則已晚矣干犯天威罪在不赦臣軾誠惶誠恐頓首頓首謹言上神宗皇帝書蘇轍熙寧二年三月日具位臣蘇轍謹冒萬死再拜上書皇帝陛下臣官至踈賤朝廷之事非所得言然竊自惟雖其勢不當進言至於報國之義猶有可得言者昔仁宗親䇿直言之士臣以不識忌諱得罪於有司仁宗哀其狂愚力排羣議使臣得不遂棄於世臣之感激思有以報為日久矣今者陛下以聖德臨御天下將大有為以濟斯世而臣材力駑下無以自效竊聽之道路得其一二思致之左右茍懲創前事不復以聞則其思報之誠沒世而不能自達是以輒發於狂言而不知止臣聞善為國者必有先後之次自其所當先者為之則其後必舉自其所當後者為之則先後並廢書曰欲升髙必自下欲陟遐必自邇世未有不自下而能髙不自近而能逺者然世之人常鄙其下而厭其近務先從事於髙逺不知其不可得也詩曰無田甫田維莠驕驕無思逺人勞心忉忉以為田甫田而力不給則田茀而不治不若不田也思逺人而德不足則心勞而無獲不若不思也欲田甫田則必自其小者始小者之有餘而甫田可啓矣欲來逺人則必自其近者始近者之既服而逺人自至矣茍由其道其勢可以自得茍不由其道雖彊求而不獲也臣愚不肖蓋嘗試妄論今世先後之宜而竊觀陛下設施之萬一以為所當先者失在於不為而所當後者失在於太早然臣非敢以為信然也特其所見有近於是者是以因其近似而為陛下深言之伏惟陛下即位以來躬親庶政聰明睿知博達宏辨文足以經治武足以制斷重之以勤勞加之以恭儉凡古之帝王曠世而不能有一焉者陛下一旦兼而有之矣夫以天縱之姿濟之以求治之心施之於事宜無為而不成無欲而不遂今也為國歷年於兹而治不加進天下之弊日益於前世天下之人未知所以適治之路災變橫生川原震裂江河湧沸人民流離災火繼作歷月移時而其變不止此臣所以日夜思念而不曉疑其先後之次有所未得者也夫今世之患莫急於無財而已財者為國之命而萬事之本國之所以存亡事之所以成敗常必由之昔趙充國論備邊之計以為湟中穀斛八錢糴三百萬斛羌人不敢動矣諸葛亮用兵如神而以糧道不繼屢出無功由是觀之茍無其財雖有聖賢不能自致於跬步茍有其財雖庸人可以一日而千里陛下頃以西夏不臣赫然發憤建用兵之䇿招來橫山之民將奪其險阻破壞其國而後已方是之時夏人殘虐失衆橫山之民厭苦思漢而又乘其洊饑茍加之以兵此非計之失者也然而㳂邊無數月之糧關中無終嵗之儲而所興之役有莫大之費陛下方且泰然不以為憂以為萬舉而有萬全之功既而邊臣失律先事輕發亦既入踐其國係虜其民矣然而陛下得其地而不敢收獲其人而不敢臣雖有成功而不能繼也其終卒致於廢黜謀臣而講和好夫陛下謀之於朞年之前而罷之於既發之後豈以為是失當而悔之哉誠無財以善其後爾且夫財之不足是為國之先務也至於鞭笞四夷臣服異類是極治之餘功而太平之粉飾也然今且先之此臣所以知其先後之次有所未得者也今者陛下懲前事之失出祕府之財徙內郡之租賦督轉漕之吏使備㳂邊三嵗之畜臣以此疑陛下之有意乎財矣然猶以為未也何者祕府之財不可多取而內郡之民不可重困可以紓目前之患而未可以為長久之計此臣所以求效其區區而不能自已也蓋善為國者不然知財之最急而萬物賴焉故常使財勝其事而事不勝財然後財不可盡而事無不濟財者車馬也事者其所載物也載物者常使馬輕其車車輕其物馬有餘力車有餘量然後可以涉塗泥而車不僨登坂險而馬不躓今也四方之財莫不盡取民力屈矣而上用不足平居惴惴僅能以自完而事變之生復不可料譬如弊車羸馬而引丘山之載幸而無虞猶恐不能勝不幸而有隂雨之變陵谷之險其患必有不可知者故臣深思極慮以為方今之計莫如豐財然臣所謂豐財者非求財而益之也去事之所以害財者而已矣夫使事之害財者未去雖求財而益之財愈不足使事之害財者盡去雖不求豐財然而求財之不豐亦不得也故臣謹為陛下言事之害財者三一曰冗吏二曰冗兵三曰冗費冗吏之說曰請原古之所以置吏之意有是民也而後有是官有是官也而後有是吏量民而置官量官而求吏其本凡以為民而已是以古者即其官以取人郡縣之職缺而取之於民府寺之屬缺而取之於郡縣出以為守令入以為卿相出入相受中外相貫一人去之一人補之其勢不容有冗食之吏近世以來取人不由其官士之來者無窮而官有限極於是兼守判知之法生而官法始壞浸淫分散不復其舊是以吏多於上而士多於下上下相窒譬如决水於不流之澤前者未盡來者已至填咽充滿一陷於其中而不能出故布衣之士多方以求官已仕之吏多方以求進下慕其上後慕其前不愧詐僞不耻爭奪禮義消忘風俗敗壞勢之窮極遂至於此夫人情紓則樂易樂易則有所不為窘則悶亂悶亂則無所不至今使衆人相與皆出於隘足履相躡肩肘相逮傍徨而不得進又將禁其奔走而爭先者茍將禁之則莫如止來者而闢其隘今也驅市人而納之不勝其多也設險於中塗而艱難之是以法愈設而爭愈甚惟陛下以時救之下哀痛之書明告天下以吏多之故與之更立三法其一使進士諸科增年而後舉其額不增纍舉多者無推恩其說曰凡今之所以至於不可勝數者以其取之之多也古之人其擇吏也甚精人知吏之不可以妄求故不敢輕為士為士者皆其修潔之人也今世之取人誦文書習程課未有不可為吏者也其求之不難而得之甚樂是以羣起而趨之凡今農工商賈之家未有不捨其舊而為士者也為士者日多然而天下益以不治舉今世所謂居家不事生産仰不養父母俯不恤妻子浮游四方侵擾州縣造作誹謗者農工商賈不與也祖宗之世士之多少其比於今不能一二也然其削平僣亂創制立法功業卓然見於後世今世之士不敢望其萬一也士之多不及於今世而功則過之無足怪者取之至少則人不敢輕為士其所取者皆州郡之選人也故為是法使人知上意之所向十年之後無實之士將不黜而自減且夫設科以待天下之士蓋將使其才者得之不才者不可得也吾則取之而彼則不能得猶曰雖不能得而纍舉多者必取無棄則是以官狥人也且纍舉之士類非少年矣耳目昏塞筋力疲倦而後得之數日而計之知其不能有所及也則其為政無所賴矣今有人畜牛羊而求牧既取其壯者又取其老者取其壯者曰吾取其力也取其老者曰吾憐其老也如憐其老而已則曷為以纍牛羊哉茍誠以為有遺才焉則今所謂遺逸之書有以收之矣其二使官至於任子者任其子之為後者世世祿仕於朝襲簮紱而守祭祀可以無憾矣然而為是法也則必始於二府法行於賤而屈於貴天下將不服天下不服而求法之行不可得也蓋矯失以救患者必有所過而後濟臣非不知二府之不可以齒庶官也其三使百司各損其職掌而多其出職之嵗月其說曰百司臣不得而盡詳也請言其尤甚者莫如三司三司之吏世以為多而不可損何也國計重而簿書衆也臣以為不然主大計者必執簡以御繁以簡自處而以繁寄人以簡自處則心不可亂心不可亂則利至而必知害至而必察以繁寄人則事有所分事有所分則毫末不遺而情僞必見今則不然舉四海之大而一毫之用必㑹於三司故三司者案牘之委也案牘既積則吏不得不多案牘積而吏多則欺之者衆雖有大利害不能察也夫天下之財下自郡縣而至於轉運轉相鈎不可獨信而必三司之可任則三司未有不責成於吏者豈三司之吏則重於轉運使歟故臣以為天下之財其詳可分於轉運使而使三司嵗攬其綱目既使之得優游以治財貨之源又可頗損其吏以絶亂法之弊茍三司猶可損也而百司可見矣然此三法者皆世之謂拂世戾俗召怨而速謗者也今且將行之臣非敢犯衆人之怒而行此危事也以為有可行之道焉何者自臺省六品諸司五品一郊而任一人自兩制以上一嵗而任一人此祖宗百年之法相承而不變者也而仁宗之世則損之三載而考績無罪者遷其官自唐以來亦未始有變者也而英宗之世則增之此二者夫豈便於世俗哉然而莫敢怨者以為吏多而欲損者天下之公議其不欲者天下之私計也以私計而怨公議其為怨也不直矣是以善為國者循理而不恤怨非不恤怨知其無能為也且今此三法者固未嘗行也然而天下亦不免於怨何者士之出身為吏者損其生業棄其田里以盡力於王事而今也以吏多之故故積勞者久而不得遷去官者久而不得調又多為條約以沮格之減罷其舉官破壞其次第使之窮窘無聊求進而不遂此其為怨豈減於布衣之士哉均之二怨皆將不免然使新進之士日益多國力匱竭而不能支十年之後其患必有不可勝言者故臣願陛下親斷而力行之茍日增之吏漸於衰少則臣又將有以治其舊吏使諸道職司每嵗終任其所部郡守監郡各任其屬曰自今以前未有以私罪至某贓罪正入巳至若干者二者皆自上鈞其輕重而裁之巳而以他事發則與之同罪雖去官與赦不降也夫以私罪至某贓罪正入巳至若干其為惡也著矣而上不察則上之不明亦可知矣故雖與之同罪而不過今世之法任人者任其終身茍有其罪終身鈞坐之夫任人之終身任其未然之不可知者也任人之嵗終而無過任其已然之可知者也臣請得以較之任其未然之不可知雖聖人有所不能任其已然之可知雖衆人能之今也任之以聖人之所不能既不敢辭矣而况任之以衆人之所能顧不可哉且按察之吏則亦不患其不知也患其知而未必皆按曰是無損於我而徒以為怨云爾今使其罪及之其勢將無所不問陛下誠能擇奉公疾惡之臣而使行之陛下勵精而察之去民之患如除腹心之疾則其以私罪至某贓罪正入已至若干者非復過誤適陷於深文者也茍遂放歸終身不齒使姦吏有所懲則冗吏之弊可去矣冗兵之說曰臣聞國朝創業之初四方割據中國地狹兵革至少其後蕩滅諸國拓地既廣兵亦隨衆雍熙之間天下之兵僅三十萬方此之時屯戌征討百役並作而兵力不屈未嘗有兵少之患也自咸平景德以來契丹內侵繼遷叛逆每有警急將帥不問得失輒請益兵於是召募日增而兵額之多遂倍前世其後寶元慶厯之間元昊竊發復使諸道㸃民為兵而㳂邉所屯至七八十萬自是天下遂以百萬為額雖復近嵗無事而關中之兵至於二十八萬舉雍熙天下之衆適以備方今關中一隅之用兵多之甚於此見矣然臣聞方今宿遷之兵分𨽻堡障戰兵統於將帥者其實無幾每一見賊賊兵常多我兵常少衆寡不敵每戰輒敗往者將帥失利未有不以此自解者也夫祖宗之兵至少而常若有餘今世之兵至多而常患於不足此二者不可不察也兵法有之曰興師十萬出征千里百姓之費公家之奉日費千金內外騷動怠於道路者七十萬家而愛爵祿百金不能知敵之情者不仁之至也故三軍之事莫親於間賞莫重於間間者三軍之司命也臣竊惟祖宗用兵至於以少為多而今世用兵至於以多為少得失之原皆出於此何以言之臣聞太祖用李漢超馬仁瑀韓令坤賀惟忠何繼筠等五人使備契丹用郭進武守琪李謙溥李繼勳等四人使備河東用趙贊姚內斌董遵誨王彥升馮繼業等五人使備西羌皆厚之以關市之征饒之以金帛之賜其家屬之在京師者仰給於縣官貿易之在道路者不問其商稅故此十四人者皆富厚有餘其視棄財如棄糞土賙人之急如恐不及是以死力之士貪其金錢捐軀命冒患難深入敵國刺其隂計而效之至於飲食動靜無不畢見每有入冦輒先知之故其所備者寡而兵力不分敵之至者舉皆無得而有喪是以當此之時備邉之兵多者不過萬人少者五六千人以天下之大而三十萬兵足為之用今則不然一錢以上皆籍於三司有敢擅用謂之自盜而所謂公使錢多者不過數千緡百須在焉而監司又伺其出入而繩之以法至於用間則曰官給茶綵夫百餅之茶數束之綵其不足以易人之死也明矣是以今之為間者皆不足恃聽傳聞之言採疑似之事其行不過於出境而所問不過於熟戶得有籍口以欺其將帥則止矣非有能知敵之至情者也敵之至情既不可得而知故常多屯兵以備不意之患以百萬之衆而常患於不足由此故也陛下何不權其輕重而計其利害夫關市之征比於茶綵則多而三十萬人之奉比於百萬則約衆人知目前之害而不知嵗月之病平居不忍棄關市之征以與人至於百萬則恬而不知怪昔太祖起於布衣百戰以定天下軍旅之事其思之也詳其計之也熟矣故臣願陛下復修其成法擇任將帥而厚之以財使多養間諜之士以為耳目耳目既眀雖有强敵而不敢輒近則雖雍熙之兵可以足用於今世陛下誠重難之臣請陳其可減之實何者今世之彊兵莫如㳂邊之土人而今世之惰兵莫如內郡之禁旅其名愈髙其廪愈厚其廪愈厚其材愈薄往者西邊用兵禁旅不堪其役死者不可勝計羌人每出聞多禁軍輒舉手相賀聞多土兵輒相戒不敢輕犯以實較之土兵一人其材力足以當禁軍三人禁軍一人其廪給足以贍土兵三人使禁軍萬人在邊其用不能當三千人而常耗三萬人之畜邊郡之儲比於內郡其價不啻數倍以此權之則土兵可益而禁軍可損雖三尺童子知其無疑也陛下誠聽臣之謀臣請使禁軍之在內郡者勿復以戍邊因其老死與亡而勿復補使足以為內郡之備而止去之以漸而行之以十年而冗兵之弊可去矣冗費之說曰世之冗費不可勝計也請言其大與臣之所知者而陛下以類推之臣聞事有所必至恩有所必窮事至而後謀則害於事恩窮而後遷則傷於恩昔者太祖太宗敦睦九族以先天下方此之時宗室之衆無幾也是以合族於京師久而不别世歷五聖而太平百年矣宗室之盛未有過於此時者也祿廪之費多於百官而子孫之衆宫室不能受無親疏之差無貴賤之等自生齒以上皆養於縣官長而爵之嫁娶喪葬無不仰給於上日引月長未有知其所止者此亦事之所必至而恩之所必窮者也然而未聞所以謀而遷之古者天子七廟三昭三穆與太祖而七以人子之愛其親推而上之至於其祖由祖而上至於百世冝無所不愛則宜無所不廟茍推其無窮之心則百世之祖皆廟而後為稱也聖人知其不可故為之制七廟之外非有功德則迭毁春秋之祭不與莫貴於天子莫尊於天子之祖而廟不加於七何者恩之所不能及也何獨至於宗室而不然臣聞三代之間公族有以親未絶而列於庶人者兩漢之法帝之子為王王之庶子猶有為侯者自侯以降則庶子無復爵土蓋有去而為民者有自為民而復仕於朝者至唐亦然故臣以為凡今宗室宜以親疏貴賤為差以次出之使得從仕比於異姓擇其可用而試之以漸凡其祿秩之數遷叙之等黜陟之制任子之令與異姓均臨之以按察持之以寮吏威之以刑禁以時察之使其不才者不至於害民其賢者有以自效而其不任為吏者則出之於近郡官為廬舍而廪給之使得占田治生與士庶比今聚而養之厚之以不訾之祿尊之以莫貴之爵使其賢者老死鬱鬱而無所施不賢者居處隘陋戚戚而無以為樂甚非計之得也昔唐武德之初封從昆弟子自勝衣以上皆爵郡王太宗即位疑其不便以問大臣封德彛曰爵命崇則力役多以天下為私奉非至公之法也於是疏屬王者降為公夫自王而為公非人情之所樂也而猶且行之今使之爵祿如故而獲治民雖有內外之異宜無有怨者然臣觀朝廷之議未嘗敢言及此何者以宗室之親而布之於四方懼其啓姦人之心而生意外之變也臣竊以為不然古之帝王好疑而多防雖父子兄弟不得尺寸之柄幽囚禁錮齒於匹夫者莫如秦魏然秦魏皆數世而亡其所以亡者劉氏項氏與司馬氏而非其宗室也故為國者茍失其道雖胡越之人皆得謀之茍無其釁雖宗室誰敢覬者惟陛下蕩然與之無疑使得以次居外如漢唐之故此亦冗費之一端也臣聞漢唐以來重兵分於四方雖有末大之憂而饋運之勞不至於太甚祖宗受命懲其大患而略其細故斂重兵而聚之京師根本既强天下承命而服然而轉漕之費遂倍於古凡今東南之米每嵗遡汴而上以石計者至五六百萬山林之木盡於舟楫州郡之卒弊於道路月廩嵗給之奉不可勝計往返數千里飢寒困迫每每侵盜雜以他物米之至京師者皆非完物矣由此觀之今世之法直以其力致之而不計其患非法之良者也臣願更為之法舉今每嵗所運之數而四分之其二即用舊法官出船與兵而漕之凡皆如舊其一募六道之富人使以其船及人漕之而所過免其商稅能以若干至京師而無所欺盜敗失者以今二司軍大將之賞與之方今濱江之民以其船為官運者不求官直蓋取官之所入而不覆較者得其贏以自潤而富民之欲仕者往往求為軍大將以此推之宜有應募者其一官自置場而買之京師京師之兵當得米而不願者計其直以錢償之夫物有常數取之於南則不足於北捨之於東則有餘於西此數之必然而不可逃者也今官欲買之其始不免於貴貴甚則東南之民傾而赴之赴之者衆則將反於賤致賤必以貴致貴必以賤此亦必然之數也故臣願為此二者與舊法皆立試其利害而較其可否必將有可用者然後舉而從之此又去冗費之一端也臣聞富國有道無所不恤者富之端也不足恤者貧之源也從其可恤而收之無所不收則其所存者廣矣從其無足恤而棄之無所不棄則其所亡者多矣然而世人之議者則不然以為天下之富而顧區區之用此有司之職而非帝王之事也此說之行於天下數百年於兹矣故天下之費其可已者常多於舊臣不敢逺引前世請言近嵗之事自嘉祐以來聖人迭興而天下之吏京秩以上再遷其官天下郡守職司再補其親戚自治平京師之大水與去嵗河朔之大震百役並作國有至急之費而郊祀之賞不費於百官自橫山用兵供億之未定與京西流民勞徠之未息官私乏困日不暇給而宗室之喪不候嵗月而葬臣以此觀之知朝廷有無足恤之義臣誠知事之既往無可為者然茍自今從其可恤而救之則無益之費猶可漸減此又去冗費之一端也臣不勝拳拳私憂過計為是三冗之說以獻伏惟陛下思深謀逺聽斷詳盡於天下之事無所不矚臣之所陳何足言者然臣愚以為茍三冗未去要之十年之後天下將益衰耗難以復治陛下何不講求其原而定其方略擇任賢俊而授之以成法使皆久於其官而後責其成績方今天下之官泛泛乎皆有欲去不久之心侍從之臣逾年而不得代則皇皇而不樂今雖不能使之盡久然至於諸道之職司三司之官吏㳂邊之將佐此皆與天子共成事者也天下之事將責成之而不久其任開其源者不見其流發其謀者不見其成功此事之所以不得成也陛下誠擇人而用之使與二府皆久於其官人知不得茍免而思長久之計君臣同心上下協力磨之以嵗月如此而三冗之弊乃可去也然而為此猶有所患何者今世之士大夫惡同而好異疾成而喜敗事茍不出於已小有齟齬不合則羣起而排之借如今使按察之官任其屬吏嵗終而無過此其勢必將無所不按得罪者必將多於其舊然則天下之口紛然非之矣不幸而有一不當衆將群指以罪法一不當不能動不幸而至於再三雖上之人亦將不免於惑衆人非之於下而朝廷疑之於上攻之者衆而持之者不堅則法從此敗矣蓋世有耕田而以其耕殺人者或者因以耕田為可廢夫殺人之可誅與耕田之不可廢此二事也安得以彼而害此哉故夫按人而不以其實者罪之可也而法之是非則不在此茍陛下誠以為可行必先能破天下之浮議使良法不廢於中道如此而後三冗之弊可去也三冗既去天下之財得以日生而無害百姓充足府庫盈溢陛下所為而無不成所欲而無不如意舉天下之衆惟所用之以攻則取以守則固雖有西戎北敵不臣之國宥之則為漢文帝不宥則為唐太宗伸縮進退無不在我今陛下不事其本而先舉其末此臣所以大惑也臣不勝憤悶越次言事雷霆之譴無所逃避臣轍誠惶誠恐稽首頓首謹書文編卷十三

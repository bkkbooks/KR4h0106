body:
  text: 文編卷二十七明唐順之編易蘇洵聖人之道得禮而信得易而尊信之而不可廢尊之而不敢廢故聖人之道所以不廢者禮為之明而易為之幽也生民之初無貴賤無尊卑無長幼不耕而不饑不蠶而不寒故其民逸民之苦勞而樂逸也若水之走下而聖人者獨為之君臣而使天下貴役賤為之父子而使天下尊役卑為之兄弟而使天下長役幼蠶而後衣耕而後食率天下而勞之一聖人之力固非足以勝天下之民之衆而其所以能奪其樂而易之以其所苦而天下之民亦遂肯棄逸而即勞欣然戴之以為君師而遵蹈其法制者禮則使然也聖人之始作禮也其說曰天下無貴賤無尊卑無長幼是人之相殺無已也不耕而食鳥獸之肉不蠶而衣鳥獸之皮是鳥獸與人相食無已也有貴賤有尊卑有長幼則人不相殺食吾之所耕而衣吾之所蠶則鳥獸與人不相食人之好生也甚於逸而惡死也甚於勞聖人奪其逸死而與之勞生此雖三尺豎子知所趨避矣故其道之所以信於天下而不可廢者禮為之明也雖然明則易逹易逹則䙝䙝則易廢聖人懼其道之廢而天下復於亂也然後作易觀天地之象以為爻通隂陽之變以為卦考鬼神之情以為辭探之茫茫索之冥冥童而習之白首而不得其原故天下視聖人如神之幽如天之髙尊其人而其教亦隨而尊故其道之所以尊於天下而不敢廢者易為之幽也凡人之所以見信者以其中無所不可測者也人之所以獲尊者以其中有所不可窺者也是以禮無所不可測而易有所不可窺故天下之人信聖人之道而尊之不然則易者豈聖人務為新竒祕怪以誇後世耶聖人不因天下之至神則無所施其教卜筮者天下之至神也而卜者聽乎天而人不預焉者也筮者决之天而營之人者也龜漫而無理者也灼荆而鑽之方功義弓惟其所為而人何預焉聖人曰是純乎天技耳技何所施吾教於是取筮夫筮之所以或為隂或為陽者必自分而為二始掛一吾知其為一而掛之也揲之以四吾知其為四而揲之也歸竒於扐吾知其為一為二為三為四而歸之也人也分而為二吾不知其為幾而分之也天也聖人曰是天人參焉道也道之所施吾教矣於是因而作易以神天下之耳目而其道遂尊而不廢此聖人用其機權以持天下之心而濟其道於無窮也書蘇洵風俗之變聖人為之也聖人因風俗之變而用其權聖人之權用於當世而風俗之變益甚以至於不可復反幸而又有聖人焉承其後而維之則天下可以復治不幸其後無聖人其變窮而無所復入則已矣昔者吾嘗欲觀古之變而不可得也於詩見商與周焉而不詳及今觀書然後見堯舜之時與三代之相變如此之亟也自堯而至於商其變也皆得聖人而承之故無憂至於周而天下之變窮矣忠之變而入於質質之變而入於文其勢便也及夫文之變而又欲反之於忠也是猶欲移江河而行之山也人之喜文而惡質與忠也猶水之不肯避下而就髙也彼其始未嘗文焉故忠質而不辭今吾日食之以太牢而欲使之復茹其菽哉嗚呼其後無聖人其變窮而無所復入則已矣周之後而無王焉固也其始之制其風俗也固不容為其後者計也而又適不值乎聖人固也後之無王者也當堯之時舉天下而授之舜舜得堯之天下而又授之禹方堯之未授天下於舜也天下未嘗聞有如此之事也度其當時之民莫不以為大怪也然而舜與禹也受而居之安然若天下固其所有而其祖宗既已為之纍數十世者未嘗與其民道其所以當得天下之故也乂未嘗悅之以利而開之以丹朱商均之不肖也其意以為天下之民以我為當在此位也則亦不俟乎援天以神之譽已以固之也湯之伐桀也囂囂然數其罪而以告人如曰彼有罪我伐之宜也既又懼天下之民不已悅也則又囂囂然以言柔之曰萬方有罪在豫一人豫一人有罪無以爾萬方如曰我如是而為爾之君爾可以許我焉耳吁亦既薄矣至於武王而又自言其先祖父偕有顯功既已受命而死其大業不克終今我奉承其志舉兵而東伐而東國之士女束帛以迎我紂之兵倒戈以納我吁又甚矣如曰吾家之當為天子久矣如此乎民之欲我速入商也伊尹之在商也如周公之在周也伊尹攝位三年而無一言以自解周公為之紛紛乎急欲自疏其非篡也夫固由風俗之變而後用其權權用而風俗成吾安坐而鎮之夫孰知風俗之變而不復反也書蘇軾愚讀史記商君列傳觀其改法易令變更秦國之風俗誅秦民之議令者以數千人黥太子之師殺太子之傅而後法令大行蓋未嘗不壯其勇而有决也曰嗟夫世俗之人不可以慮始而可樂成也使天下之人各陳其所知而守其所學以議天子之事則事將有格而不得成者然及觀三代之書至其將有以矯拂世俗之際則其所以告諭天下者常丁寧激切亹亹而不倦務使天下盡知其君之心而又從而折其不服之意使天下皆信以為如此而後從事其言回曲宛轉譬如平人自相議論而詰其是非愚讀而疑之以為近於濡滯迂逺而無决然其使天下樂從而無黽勉不得已之意其事既發而無紛紜異同之論此則王者之意也故常以為當堯舜之時其君臣相得之心歡然樂而無間相與吁俞嗟嘆唯諾於朝廷之中不啻若朋友之親雖其有所相是非論辨以求曲直之際當亦無足怪者及至湯武征伐之際周旋反覆自述其用兵之意以明曉天下此又其勢然也惟其天下既安君民之勢闊逺而不同天下有所欲為而其匹夫匹婦私有異論於天下以齟齬其上之畫策令之而莫肯聽當此之時刑驅而勢脅之天下夫誰敢不聽從而上之人優遊而徐譬之使之信之而後從此非王者之心誰能處而待之而不倦歟蓋盤庚之遷天下皆咨嗟而不恱盤庚為之稱其先王盛德明聖而猶五遷以至於今今不承於古恐天之斷棄汝命不救汝死既又恐其不從也則又曰汝罔暨余同心我先后將降爾罪暨乃祖先父亦將告我髙后曰作大戮於朕孫蓋其所以開其不悟之心而諭之以其所以當然者如此其詳也若夫商君則不然以為要使汝獲其利而何恤乎吾之所為故無所求於衆人之論而亦無以告諭天下然其事亦終於有成是以後世之論以為三代之治柔懦不决然此乃王霸之所以為異也夫三代之君惟不忍鄙其民而欺之故天下有故而其議及於百姓以觀其意之所嚮及其不可聽也則乂反覆而諭之以窮極其說而服其不然之心是以其民親而愛之嗚呼此王霸之所為不同也哉詩蘇洵人之嗜欲好之有甚於生而憤憾怨怒有不顧其死於是禮之權又窮禮之法曰好色不可為也為人臣為人子為人弟不可以有怨於其君父兄也使天下之人皆不好色皆不怨其君父兄夫豈不善使人之情皆泊然而無思和易而優柔以從事於此則天下固亦大治而人之情又不能皆然好色之心驅諸其中是非不平之氣攻諸其外炎炎而生不顧利害趨死而後已噫禮之權止於死生天下之事不至乎可以博生者則人不敢觸死以違吾法今也人之好色與人之是非不平之心勃然而發於中以為可以博生也而先以死自處其身則死生之機固已去矣死生之機去則禮為無權區區舉無權之禮以彊人之所不能則亂益甚而禮益敗今吾告人曰必無好色必無怨而君父兄彼將遂從吾言而忘其中心所自有之情耶將不能也彼既已不能純用吾法將遂大棄而不顧吾法既已大棄而不顧則人之好色與怨其君父兄之心將遂蕩然無所隔限而易內竊妻之變與弒其君父兄之禍必反公行於天下聖人憂焉曰禁人之好色而至於淫禁人之怨其君父兄而至於叛患生於責人太詳好色之不絶而怨之不禁則彼將反不至於亂故聖人之道嚴於禮而通於詩禮曰必無好色必無怨而君父兄詩曰好色而無至於淫怨而君父兄而無至於叛嚴以待天下之賢人通以全天下之中人吾觀國風婉變柔媚而卒守以正好色而不至於淫者也小雅悲傷詬讟而君臣之情卒不忍去怨而不至於叛者也故天下觀之曰聖人固許我以好色而不尤我之怨吾君父兄也許我以好色不淫可也不尤我之怨吾君父兄則彼雖以虐遇我我明譏而明怨之使天下明知之則吾之怨亦得當焉不叛可也夫背聖人之法而自棄於淫叛之地者非斷不能也斷之始生於不勝人不自勝其忿然後忍棄其身故詩之教不使人之情至於不勝也夫橋之所以為安於舟者以有橋而言也水潦大至橋必解而舟不至於必敗故舟者所以濟橋之所不及也吁禮之權窮於易達而有易焉窮於後世之不信而有樂焉窮於强人而有詩焉吁聖人之慮事也蓋詳春秋論上歐陽修事有不幸出於久逺而傳乎二說則奚從曰從其一之可信者然則安知可信者而從之曰從其人而信之可也衆人之說如彼君子之說如此則捨衆人而從君子君子博學而多聞矣然其傳不能無失也君子之說如彼聖人之說如此則捨君子而從聖人此舉世之人皆知其然而學春秋者獨異乎是孔子聖人也萬世取信一人而已若公羊髙穀梁赤左氏三子者博學而多聞矣其傳不能無失者也孔子之於經三子之於傳有所不同則學者寧捨經而從傳不信孔子而信三子甚哉其惑也經於魯隱公之事書曰公及邾儀父盟於蔑其卒也書曰公薨孔子始終謂之公三子者曰非公也是攝也學者不從孔子謂之公而從三子謂之攝其於晉靈公之事孔子書曰趙盾弒其君夷臯三子者曰非趙盾也是趙穿也學者不從孔子信為趙盾而從三子信為趙穿其於許悼公之事孔子書曰許世子止弒其君買三子者曰非弒之也買病死而止不嘗藥耳學者不從孔子信為弒君而從三子信為不嘗藥其捨經而從傳者何哉經簡而直傳新而竒簡直無悅耳之言新竒多可喜之論是以學者樂聞而易惑也豫非敢曰不惑然信於孔子而篤者也經之所書豫所信也經所不言子不知也難者曰子之言有激而云爾夫三子者皆學乎聖人而傳所以述經也經文隱而意深三子者從而發之故經有不言傳得而詳爾非為二說也豫曰經所不書三子者何從而知其然也曰推其前後而知之且其有所傳而得也國君必即位而隱不書即位此傳得知其攝也弒君者不復見經而盾復見經此傳得知弒君非盾也君弒賊不討則不書葬而許悼公書葬此傳得知世子止之非實弒也經文隱矣傳曲而暢之學者以謂三子之說聖人之深意也是以從之耳非謂捨孔子而信三子也豫曰然則妄意聖人而惑學者三子之過而已使學者必信乎三子豫不能奪也使其惟是之求則豫不得不為之辨春秋論下歐陽修弒逆大惡也其為罪也莫贖其於人也不容其在法也無赦法施於人雖小必慎况舉大法而加大惡乎既輒加之又輒赦之則自侮其法而人不畏春秋用法不如是之輕易也三子說春秋書趙盾以不討賊故加之大惡既而以盾非實弒則又復見於經以明盾之無罪是輒加之而輒赦之爾以盾為無弒心乎其可輕以大惡加之以盾不討賊情可責而宜加之乎則其後頑然未嘗討賊既不改過以自贖何為遽赦使同無罪之人其於進退皆不可此非春秋意也趙穿弒君大惡也盾不討賊不能為君復讎而失刑於下二者輕重不較可知就使盾為可責然穿焉得免也今免首罪為善人使無辜者受大惡此决知其不然也春秋之法使為惡者不得幸免疑似者有所辨明所謂是非之公也據三子之說初靈公欲殺盾盾走而免穿盾族也遂弒而盾不討其迹涉於與弒矣此疑似難明之事聖人尤當求情責實以明白之使盾果有弒心乎則自然罪在盾矣不得曰為法受惡而稱其賢也使果無弒心乎則當為之辨明必先正穿之惡使罪有所歸然後責盾縱賊則穿之大惡不可幸而免盾之疑似之迹獲辨而不討之責亦不得辭如此則是非善惡明矣今為惡者獲免而疑似之人陷於大惡此决知其不然也若曰盾不討賊有幸弒之心與自弒同故寧捨穿而罪盾此乃逆詐用情之吏矯激之為爾非孔子忠恕春秋以王道治人之法也孔子患舊史是非錯亂而善惡不明所以修春秋就令舊史如此其肯從而不正之乎其肯從而稱美又教人以越境逃惡乎此可知其繆傳也問者曰然則夷臯孰弒之曰孔子所書是矣趙盾弒其君也今有一人焉父病躬進藥而不嘗又有一人焉父病而不躬進藥之二父皆死又有一人焉操刃而殺其父使吏治之是三人者其罪同乎曰雖庸吏猶知其不可同也躬藥而不知嘗者有愛父之孝心而不習於禮是可哀也無罪之人爾不躬藥者誠不孝矣雖無愛親之心然未有殺父之意使善治獄者猶當與操刃殊科况以躬藥之孝反與操刃同其罪乎此庸吏之不為也然則許世子止實不嘗藥則孔子决不書曰弒君孔子書為弒君則止决非不嘗藥難者曰聖人借止以垂教爾對曰不然夫所謂借止以垂教者不過欲人之知嘗藥耳聖人一言明以告人則萬世法也何必加孝子以大惡之名而嘗藥之事卒不見於文使後世但知止為弒君而莫知藥之當嘗也教未可垂而已陷人於大惡矣聖人垂教不如是之迂也果曰責止不如是之苛也難者曰然則盾曷為復見於經許悼公曷為書葬曰弒君之臣不見經此自三子說爾果聖人法乎悼公之葬且安知其不討賊而書葬也自止以弒見經後四年吳敗許師又十有八年當定公之四年許男始見於經而不名許之書於經者略矣止之事迹不可得而知也難者曰三子之說非其臆出也其得於所傳如此然則所傳者皆不可信乎曰傳聞何可盡信公羊穀梁以尹氏卒為正卿左氏以君氏卒為隱母一以為男子一以為婦人得於所傳者蓋如是是可盡信乎春秋蘇洵賞罰者天下之公也是非者一人之私也位之所在則聖人以其權為天下之公而天下以懲以勸道之所在則聖人以其權為一人之私而天下以榮以辱周之衰也位不在夫子而道在焉夫子以其權是非天下可也而春秋賞人之功赦人之罪去人之族絶人之國貶人之爵諸侯而或書其名大夫而或書其字不惟其法惟其意不徒曰此是此非而賞罰加焉則夫子固曰我可以賞罰人矣賞罰人者天子諸侯之事也夫子病天下之諸侯大夫僭天子諸侯之事而作春秋而已則為之其何以責天下位公也道私也私不勝公則道不勝位位之權得以賞罰而道之權不過於是非道在我矣而不得為有位者之事則天下皆曰位之不可僭也如此不然天下其誰不曰道在我則是道者位之賊也曰夫子豈誠賞罰之耶徒曰賞罰之耳庸何傷曰我非君也非吏也執塗之人而告之曰某為善某為惡可也繼之曰某為善吾賞之某為惡吾誅之則人有不笑我者乎夫子之賞罰何以異此然則何足以為夫子何足以為春秋曰夫子之作春秋也非曰孔氏之書也又非曰我作之也賞罰之權不以自與也曰此魯之書也魯之作也有善而賞之曰魯賞之也有惡而罰之曰魯罰之也何以知之曰夫子繫易謂之繫辭言孝謂之孝經皆自名之則夫子私之也而春秋者魯之所以名史而夫子託焉則夫子公之也公之以魯史之名則賞罰之權固在魯矣春秋之賞罰自魯而及於天下天子之權也魯之賞罰不出境而以天子之權與之何也曰天子之權在周夫子不得已而以與魯也武王之崩也天子之位當在成王而成王幼周公以為天下不可以無賞罰故不得已而攝天子之位以賞罰天下以存周室周之東遷也天子之權當在平王而平王昏亂故夫子亦曰天下不可以無賞罰而魯周公之國也居魯之地者宜如周公不得已而假天子之權以賞罰天下以尊周室故以天子之權與之也然則假天子之權宜如何曰如齊桓晉文可也夫子欲魯如齊桓晉文而不遂以天子之權與齊晉者何也齊桓晉文陽為尊周而實欲富彊其國故夫子與其事而不與其心周公心存王室雖其子孫不能繼而夫子思周公而許其假天子之權以賞罰天下其意曰有周公之心然後可以行桓文之事此其所以不與齊晉而與魯也夫子亦知魯君之才不足以行周公之事矣顧其心以為今之天下無周公故至此是故以天子之權與其子孫所以見思周公之意也吾觀春秋之法皆周公之法而又詳內而略外此其意欲魯法周公之所為且先自治而後治人也明矣夫子歎禮樂征伐自諸侯出而田常弒其君則沭浴而請討然則天子之權夫子固明以與魯也子貢之徒不達夫子之意續經而書孔丘卒夫子既告老矣大夫告老而卒不書而夫子獨書夫子作春秋以公天下而豈私一孔丘哉嗚呼夫子以為魯國之書而子貢之徒以為孔氏之書也歟遷固之史有是非而無賞罰彼亦史臣之體宜爾也後之效夫子作春秋者吾惑焉春秋有天子之權天下有君則春秋不當作天下無君則天子之權吾不知其誰與天下之人烏有如周公之後之可與者與之而不得其人則亂不與人而自與則僭不與人不自與而無所與則散嗚呼後之春秋僭耶亂耶散耶禮蘇洵夫人之情安於其所常為無故而變其俗則其勢必不從聖人之始作禮也不因其勢之可以危亡困辱之者以厭服其心而徒欲使之輕去其舊而樂就吾法不能也故無故而使之事君無故而使之事父無故而使之事兄彼其初非如今之人知君父兄之不事則不可也而遂翻然以從我者吾以恥厭服其心也彼為吾君彼為吾父彼為吾兄聖人曰彼為吾君父兄何以異於我於是坐其君與其父以及其兄而以立於其旁且俯首屈膝於其前以為禮而謂之拜率天下之人而使之拜其君父兄夫無故而使之拜其君無故而使之拜其父無故而使之拜其兄則天下之人將復嗤笑以為迂怪而不從而君父兄又不可以不得其臣子弟之拜而徒為其君父兄於是聖人者又有術焉以厭服其心而使之肯拜其君父兄然則聖人者果何術也恥之而已古之聖人將欲以禮治天下之民故先自治其身使天下皆信其言曰此人也其言如是是必不可不如是也故聖人曰天下有不拜其君父兄者吾不與之齒而使天下之人亦曰彼將不與我齒也於是相率以拜其君父兄以求齒於聖人雖然彼聖人者必欲天下之拜其君父兄何也其微權也彼為吾君彼為吾父彼為吾兄聖人之拜不用於世吾與之皆坐於此皆立於此比肩而行於此無以異也吾一旦而怒奮手舉挺而搏逐之可也何則彼其心常以為吾儕也不見其異於吾也聖人知人之安於逸而苦於勞故使貴者逸而賤者勞且又知坐之為逸而立且拜者之為勞也故舉其君父兄坐之於上而使之立且拜於下明日彼將有怒作於心者徐而自思之必曰此吾嚮之所坐而拜之且立於其下者也聖人固使之逸而使我勞是賤於彼也奮手舉挺以搏逐之吾心不安焉刻木而為人朝夕而拜之他日析之以為薪而猶且忌之彼其始木焉已拜之猶且不敢以為薪故聖人以其微權而使天下尊其君父兄而權者又不可以告人故先之以恥嗚呼其事如此然後君父兄得以安其尊而至於今今之匹夫匹婦莫不知拜其君父兄乃曰拜起坐立禮之末也不知聖人其始之教民拜起坐立如此之勞也此聖人之所慮而作易以神其教也禮蘇軾昔者商周之際何其為禮之易也其在宗廟朝廷之中籩豆簠簋牛羊酒醴之薦交於堂上而天子諸侯大夫卿士周旋揖讓獻酬百拜樂作於下禮行於上雍容和穆終日而不亂夫古之人何其知禮而行之不勞也當此之時天下之人惟其習慣而無疑衣服器皿冠冕佩玉皆其所常用也是以其人入於其間耳目聰明而手足無所忤其身安於禮之曲折而其心不亂以能深思禮樂之意睟然見於面而盎然發於其躬夫是以能使天下觀其行事而忘其暴戾鄙野之氣至於後世風俗變易更數千年以至於今今天下之事巳大異矣然天下之人尚皆記録三代禮樂之名詳其節目而習其俯仰冠古之冠服古之服而御古之器皿傴僂拳曲勞苦於宗廟朝廷之中區區而莫得其紀交錯紛亂而不中節此無足怪也其所用者非其素所習也甚矣夫後世之好古也昔者上古之世蓋嘗有巢居穴處汙尊抔飲燔黍捭豚蕢桴土鼓而以為是足以養生送死者矣及其後世聖人以為不足是故易之以宫室新之以籩豆鼎爼之器而盡去太古之法惟其祭祀以交於鬼神乃始薦其血毛豚解而腥之體解而爓之以為是不忘本而非以為後世之禮不足用也是以退而體其犬豕牛羊實其簠簋籩豆鉶羮以極今世之美未聞其牽於上古之說巽愞而不决也且又有所大不安者宗廟之祭聖人所以追求先祖之神靈庶幾得而享之以安恤孝子之志者也是以思其平生起居飲食之際而設其器用薦其酒食皆從其生以冀其來而安之而後世宗廟之祭皆用三代之器則是先祖終莫得而安也蓋三代之時席地而食是以其器用各因其所便而為之髙下大小之制今世之禮坐於牀而食於牀上是以其器不得不有所變雖正使三代之聖人生於今而用之亦將以為便安故夫三代之視上古猶今之視三代也三代之器不可復用矣而其制禮之意尚可依倣以為法也宗廟之祭薦之以血毛重之以體薦有以存古之遺風矣而其餘者可以易三代之器而用今世之所便以從鬼神之所安惟其春秋社稷釋奠釋菜凡所以享古之鬼神者則皆從其器蓋周人之祭蠟與田祖也吹葦籥擊土鼓此亦各從其所安耳樂蘇洵禮之始作也難而易行既行也易而難久天下未知君之為君父之為父兄之為兄而聖人為之君父兄天下未有異其君父兄而聖人為之拜起坐立天下未肯靡然以從我拜起坐立而聖人身先之以恥嗚呼其亦難矣天下惡夫死也久矣聖人招之曰來吾生爾既而其法果可以生天下之人天下之人視其嚮也如此之危而今也如此之安則宜何從故當其時雖難而易行既行也天下之人視君父兄如頭足之不待别白而後識視拜起坐立如寢食之不待告語而後從事雖然百人從之一人不從則其勢不得遽至乎死天下之人不知其初之無禮而死而見其今之無禮而不至乎死也則曰聖人欺我故當其時雖易而難久嗚呼聖人之所恃以勝天下之勞逸者獨有死生之說耳死生之說不信於天下則勞逸之說將出而勝之勞逸之說勝則聖人之權去矣酒有鴆肉有堇然後人不敢飲食藥可以生死然後人不敢以苦口為諱去其鴆徹其堇則酒肉之權固勝於藥聖人之始作禮也其亦逆知其勢之將必如此也曰告人以誠而後人信之幸今之時吾之所以告人者其理誠然而其事亦然故人以為信吾知其理而天下之人知其事事有不必然者則吾之理不足以折天下之口此吾告語之所不及也告語之所不及必有以隂驅而濳率之於是觀之天地之間得其至神之機而竊之以為樂雨吾見其所以濕萬物也日吾見其所以燥萬物也風吾見其所以動萬物也隱隱谹谹而謂之雷者彼何用也隂凝而不散物蹙而不遂雨之所不能濕日之所不能燥風之所不能動雷一震焉而凝者散蹙者遂曰雨曰日者曰風者以形用曰雷者以神用莫神乎聲故聖人因聲以為樂為之君臣父子兄弟者禮也禮之所不及而樂及焉正聲入乎耳而人皆有事君事父事兄之心則禮者固吾心之所有也而聖人之說又何從而不信乎史中蘇洵遷固史雖以事辭勝然亦兼道與法而有之故時得仲尼遺意焉吾今擇其書有不可以文曉而可以意達者四悉顯白之其一曰隱而彰其二曰直而寬其三曰簡而明其四曰微而切遷之傳亷頗也議救閼與之失不載焉見之趙奢傳傳酈食其也謀撓楚權之謬不載焉見之留侯傳固之傳周勃也汗出洽背之耻不載焉見之王陵傳傳董仲舒也議和親之疏不載焉見之胸奴傳夫頗食其勃仲舒皆功十而過一者也茍列一以疵十後之庸人必曰智如亷頗辨如酈食其忠如周勃賢如董仲舒而十功不能贖一過則將苦其難而不怠矣是故本傳晦之而他傳發之則其與善也不亦隱而彰乎遷論蘇秦稱其智過人不使獨䝉惡聲論北宫伯子多其愛人長者固贊張湯與其推賢揚善贊酷吏人有所褒不獨暴其惡夫秦伯子湯酷吏皆過十而功一者也茍舉十以廢一後之凶人必曰蘇秦北宫伯子張湯酷吏雖有善不録矣吾復何望哉是窒其自新之路而堅其肆惡之志者也故於傳詳之於論於贊復明之則其懲惡也不亦直而寬乎遷表十二諸侯首魯訖吳實十三國而越不與焉夫以十二名篇而載國十三何也不數吳也皆諸侯耳獨不數吳何也重周禮也不數而載之何也周裔而霸盟上國也春秋書哀七年公㑹吳于鄫書十二年公㑹吳于槖臯書十三年公㑹晉侯及吳子于黃池此其所以雖不數而猶獲載也若越區區於南夷豺狼狐狸之與居不與中國㑹盟以觀華風而用夷俗之名以赴故君子即其自稱以罪之春秋書定五年於越入吳書十四年於越敗吳于檇李書哀十三年於越入吳此春秋所以蠻戎畜之也茍遷舉而措之諸侯之末則西戎獫狁亦或庶乎其間是以絶而棄之將使後之人君觀之曰不知中國禮樂雖勾踐之賢猶不免乎絶與棄則其尊王也不亦簡而明乎固之表八而王侯六書其人也必曰某土某王若侯某或功臣外戚則加其姓而首目之曰號諡姓名此異姓列侯之例也諸侯王其目止號諡豈以其尊故不曰名之耶不曰名之而實名之豈以不名則不著耶此同姓諸侯王之例也王子侯其目為二上則曰號諡名名之而曰名之殺一等矣此同姓列侯之例也及其下則曰號諡姓名夫以同姓列侯而加之異姓之例何哉察其故蓋元始之間王莽僞褒宗室而封之者也非天子親親而封之者也宗室天子不能封而使王莽封之故從異姓例亦示天子不能有其同姓也將使後之人君觀之曰權之歸於臣雖同姓不能有名器誠不可以假人矣則其防僭也不亦微而切乎噫隱而彰則後人樂得為善之利直而寬則後人知有悔過之漸簡而明則人君知中國禮義之為貴微而切則人君知强臣專制之為患用力寡而成功博其能為春秋繼而使後之史無及焉者以是夫本論歐陽修佛法為中國患千餘嵗世之卓然不惑而有力者莫不欲去之已嘗去矣而復大集攻之暫破而愈堅撲之未滅而愈熾遂至於無可奈何是果不可去邪蓋亦未知其方也夫醫者之於疾也必推其病之所自來而治其受病之處病之中人乘乎氣虛而入焉則善醫者不攻其疾而務飬其氣氣實則病去此自然之效也故救天下之患者亦必推其患之所自來而治其受患之處佛居極西去中國最逺而有佛固已久矣堯舜三代之際王政修明禮義之教充於天下雖有佛無由而入及三代衰王政闕禮義廢後二百餘年而佛至乎中國由是言之佛所以為吾患者乘其闕廢之時而來此其受患之本也補其闕修其廢使王政明而禮義充則雖有佛無所施於吾民矣此亦自然之勢也昔堯舜三代之為政設為井田之法籍天下之人計其口而皆授之田凡人之力能勝耕者莫不有田而耕之斂以什一差其征賦以督其不勤使天下之人力皆盡於南畝而不暇乎其他然又懼其勞且怠而入於邪僻也於是為制牲牢酒醴以養其體弦匏爼豆以悅其耳目於其不耕休力之時而教之以禮故因其田獵而為搜狩之禮因其嫁娶而為婚姻之禮因其死葬而為喪祭之禮因其飲食羣聚而為鄉射之禮非徒以防其亂又因而教之使知尊卑長幼凡人之大倫也故凡養生送死之道皆因其欲而為之制飾之物采而文焉所以悅之使其易趣也順其性情而節焉所以防之使其不過也然猶懼其未也乂為立學以講明之故上自天子之郊下至鄉黨莫不有學擇民之聰明者而習焉使相告語而誘勸其愚惰嗚呼何其備也蓋其慮民之意甚精治民之具甚備防民之術甚周誘民之道甚篤行之以勤而被於物者洽浸之以漸而入於人者深故民之生也不用力乎南畝則從事於禮樂之際不在其家則在乎庠序之間耳聞目見無非仁義樂而趣之不知其倦終身不見異物又奚暇夫外慕哉故曰雖有佛無由而入及周之衰秦并天下盡去三代之法而王道中絶後之有天下者不能勉强其為治之具不備防民之漸不周佛於此時乘間而出千有餘嵗之間佛之來者日益衆吾之所為者日益壞井田最先廢而兼并游惰之姦起其後所謂搜狩婚姻喪祭鄉射之禮凡所以教民之具相次而盡廢然後民之姦者有暇而為他其良者泯然不見禮義之及已夫姦民有餘力則思為邪僻良民不見禮義則莫知所趣佛於此時乘其隙方鼓其雄誕之說而牽之則民不得不從而歸矣又况王公大人往往倡而驅之曰佛是真可歸依者然則吾民何疑而不歸焉幸而有一不惑者方艴然而怒曰佛何為者吾將操戈而逐之又曰吾將有說以排之夫千嵗之患遍於天下豈一人一日之可為民之沉酣入於骨髓非口舌之可勝然則將奈何曰莫若修其本以勝之昔戰國之時楊墨交亂孟子患之而專言仁義故仁義之說勝則楊墨之學廢漢之時百家並興董生患之而退修孔氏故孔氏之道明而百家息此所謂修其本以勝之之效也今八尺之夫被甲荷㦸勇蓋三軍然而見佛則拜聞佛之說則有畏慕之誠者何也彼誠壯佼其中心茫然無所守而然也一介之士眇然柔懦進趨畏怯然而聞有道佛者則義形於色非徒不為之屈又欲驅而絶之者何也彼無他焉學問明而禮義熟中心有所守以勝之也然則禮義者勝佛之本也今一介之士知禮義者尚能不為之屈使天下皆知禮義則勝之矣此自然之勢也太古王安石太古之人不與禽獸朋也幾何聖人惡之也制作焉以别之下而戾於後世多裳衣壯宫室隆耳目之觀以囂天下君臣父子兄弟夫婦皆不得其所當然仁義不足澤其性禮樂不足錮其情刑政不足綱其惡蕩然復與禽獸朋矣聖人不作昧者不識所以化之之術顧引而歸之太古太古之道果可行之萬世聖人惡用制作於其間必制作於其間於太古之不可行也顧欲引而歸之是去禽獸而之禽獸奚補於化哉吾以為識治亂者當言所以化之術曰歸之太古非愚則誣文編卷二十七

body:
  text: 文編卷二十明唐順之編議學狀歐陽修右臣等伏見近日言事之臣為陛下言建學取士之法者衆矣或欲立三舍以養生徒或欲復五經而置博士或欲但舉舊制而修廢墜或欲特創新學而立科條其言雖殊其意則一陛下慎重其事下其議於羣臣而議者遂欲創新學立三舍因以辨士之能否而命之以官其始也則教以經藝文辭其終也則取以材識德行聽其言則甚備考於事則難行夫建學校以養賢論材德而取士此皆有國之本務而帝王之極致也而臣等謂之難行者何哉蓋以古今之體不同而施設之方皆異也古之建學取士之制非如今之法也蓋古之所謂為政與設教者遲速異宜也夫立時日以趨事考其功過而督以賞罰者為政之法也故政可速成若夫設教則以勸善興化尚賢勵俗為事其被於人者漸則入於人也深收其效者遲則推其功也逺故常緩而不迫古者家有孰黨有庠遂有序國有學自天子諸侯之子下至國之俊選莫不入學自成童而學至年四十而仕其習乎禮樂之容講乎仁義之訓敦乎孝悌之行以養父兄事長上信朋友而臨財廉處衆讓其修於身行於家達於鄰里聞於鄉黨然後詢於衆庶又定於長老之可信者而薦之始謂之秀士久之又取其甚秀者為選士久之又取其甚秀者為俊士久之又取其甚秀者為進士然後辨其論隨其材而官之夫生七八十嵗而死者人之常壽也古乃以四十而仕蓋用其半生為學考行又廣察以鄰里鄉黨而後其人可知然則積德纍善如此勤而久求賢審官如此慎而有次第然後矯偽干利之士不容於其間而風俗不陷於偷薄也古之建學取士其施設之方如此也方今之制以貢舉取人往者四嵗一詔貢舉而議者患於太遲更趣之為間嵗而應舉之士來學於京師者類皆去其鄉里逺其父母妻子而為旦暮干祿之計非如古人自成童至于四十就學於其庠序而鄰里鄉黨得以衆察徐考其行實也蓋古之養士本於舒遲而今之取人患於急迫此施設不同之大槩也臣請詳言方今之弊既以文學取士又欲以德行官人且速取之歟則真偽之情未辨是朝廷本欲以學勸人修德行反以利誘人為矯偽此其不可一也若遲取之歟待其衆察徐考而漸進則文辭之士先已中於甲科而德行之人尚未登於內舍此其不可二也且今入學之人皆四方之遊士齎其一身而來烏合羣處非如古人在家在學自少至長親戚朋友鄰里鄉黨衆察徐考其行實也不過取於同舍一時之毁譽而決於學官數人之品藻爾然則同學之人蹈利爭進愛憎之論必分朋黨昔東漢之俗尚名節而黨人之禍及天下其始起於處士之橫議而相訾也此其不可三也夫人之材行若不因臨事而見則守常循理無異衆人茍欲異衆則必為迂僻竒怪以取德行之名而髙談虛論以求材識之譽前日慶厯之學其弊是也此其不可四也今若外方專以文學貢士而京師獨以德行取人則實行素履著於鄉曲而守道丘園之士皆反見遺此其不可五也近者朝廷患四方之士寓京師者多而不知其士行遂嚴其法使各歸於鄉里今又反使來聚於京師云欲考其德行若不用四方之士止取京師之士則又示人以不廣此其不可六也夫儒者所謂能通古今者在知其意達其理而酌時之宜爾大抵古者教學之意緩而不迫所以勸善興化養賢勵俗在於遲久而不求近效急功也臣謂宜於今而可行者立為三舍可也復五經博士可也特創新學雖不若即舊而修廢然未有甚害創之亦可也教學之意在乎敦本而修其實事給以糇糧多陳經籍選士之良者以通經有道之士為之師而舉察其有過無行者黜去之則在學之人皆善士也然後取以貢舉之法待其居官為吏已接於人事可以考其賢善優劣而時取其尤出類者旌異之則士知修身力行非為一時之利而可伸於終身則矯偽之行不作而偷薄之風歸厚矣此所謂實事之可行於今者也臣等伏見論學者四人其説各異而朝廷又下臣等俾之詳定是欲盡衆人之見而採其長者爾故臣等致陳其所有以助衆議之一非敢好為異論也伏望聖慈特賜裁擇諫買浙燈狀蘇軾熙寧四年正月日殿中丞直史館判官告院權開封府推官蘇軾狀奏右臣嚮蒙召對便殿親奉德音以為凡在館閣當為朕深思治亂指陳得失無有所隱者自是以來臣每見同列未嘗不為道陛下此語非獨以稱頌盛德亦欲朝廷之間如臣等輩皆知陛下不以疏賤間廢其言共獻所聞以輔成太平之功業然竊謂空言率人不如有實而人自勸欲知陛下能受其言之實莫如以臣試之故臣願以身先天下試其小者上以補助聖明之萬一下以為賢者卜其可否雖以此獲罪萬死無悔臣伏見中使傳宣下府市司買浙燈四千餘盞有司具實直以聞陛下又令減價收買見已盡數拘收禁止私買以須上令臣始聞之驚愕不信咨嗟纍日何者竊謂陛下惜此舉動也臣雖至愚亦知陛下遊心經術動法堯舜窮天下之嗜欲不足以易其樂盡天下之玩好不足以解其憂而豈以燈為悅者哉此不過以奉二宫之歡而極天下之養耳然大孝在乎養志百姓不可户曉皆謂陛下以耳目不急之玩而奪其口體必用之資賣燈之民例非豪民舉債出息畜之彌年衣食之計望此旬日陛下為民父母唯可添價貴買豈可減價賤酬此事至小體則甚大凡陛下所以減價者非欲以與此小民爭此豪末豈以其無用而厚費也如知其無用何必更索惡其厚費則如勿買且內庭故事每遇放燈不過令內東門雜物務臨時收買數目既少又無拘收督迫之嚴費用不多民亦無憾故臣願追還前命凡悉如舊京城百姓不慣侵擾恩德已厚怨讟易生可不慎歟可不畏歟近日小人妄造非語士人有展年科場之説商賈有京城𣙜酒之議吏憂減俸兵憂減廪雖此數事朝廷所決無而此紛紛亦有以見陛下勤恤之德未信於下而有司聚斂之意或形于民方當責已自求以消讒慝之口而臺官又勸陛下以嚴刑悍吏捕而戮之虧損聖德莫大於此而又重以買燈之事使得因緣以為口實臣實惜之方今百冗未除物力凋弊陛下縱出內帑財物不用大司農錢而內帑所儲孰非民力與其平時耗於不急之用曷若留貯以待乏絶之供故臣願陛下將來放燈與凡遊觀苑囿宴好賜豫之類皆飭有司務從儉約頃者詔旨裁減皇族恩例此實陛下至明至斷所以深計逺慮割愛為民然竊揆其間不能無少望於陛下惟當痛自刻損以身先之使知人主且猶若此而況於吾徒哉非惟省費亦且弭怨昔唐太宗遣使往涼州諷李大亮獻其名鷹大亮不可太宗深嘉之詔曰有臣若此朕復何憂明皇遣使江南採鵁鶄汴州刺史倪若水論之為反其使又令益州織半臂背子琵琶捍撥鏤牙合子等蘇許公不奉詔李德裕在浙西詔造銀盝子粧具二十事織綾二千匹德裕上疏極論亦為罷之使陛下內之臺諫有如此數人者則買燈之事必須力言外之有司有如此數人者則買燈之事必不奉詔陛下聰明睿聖追迹堯舜而羣臣不以唐太宗明皇事陛下竊嘗深咎之臣忝備府寮親見其事若又不言臣罪大矣陛下若赦之不誅則臣又有非職之言大於此者忍不為陛下盡之若不赦亦臣之分也論髙麗進奉狀蘇軾元祐四年十一月三日龍圖閣學士朝奉郎知杭州蘇軾狀奏臣伏見熙寧以來髙麗人屢入朝貢至元豐之末十六七年間館待賜豫之費不可勝數兩浙淮南京東三路築城造船建立亭館調發農工侵漁商賈所在騷然公私告病朝廷無絲毫之益而夷人獲不資之利使者所至圖畫山川購買書籍議者以為所得賜豫大半歸之契丹雖虛實不可明而契丹之強足以禍福髙麗若不隂相計構則髙麗豈敢公然入朝中國有識之士以為深憂自二聖嗣位髙麗數年不至淮浙京東吏民有息肩之喜唯福建一路多以海商為業其間凶險之人猶敢交通引惹以希厚利臣稍聞其事方欲覺察行遣今月三日準秀州差人押到泉州百姓徐戩擅於海舶內載到髙麗僧統義天手下侍者僧壽介繼常潁流院子金保裴善等五人及賫到本國禮賔省牒云奉本國王旨令壽介等賫義天祭文來祭奠杭州僧源闍梨臣已指揮本州送承天寺安下選差職員二人兵級十人常切照管不許出入接客及選有行止經論僧伴話量行供給不令失所外已具事由畫一奏稟朝旨去訖又據髙麗僧壽介有狀稱臨發日奉國母指揮令賫金塔二所祝延皇帝太皇太后聖壽臣竊觀其意蓋為二聖嗣位數年不敢輕來入貢頓失厚利欲復遣使又未測聖意故以祭奠源闍梨為名因獻金塔欲以嘗試朝廷測知所以待之之意輕重厚薄不然者豈有欲獻金塔為壽而不遣使奉表止因祭奠亡僧遂致國母之意蓋疑中國不受故為此茍簡之禮以試朝廷若朝廷待之稍重則貪心復啓朝貢紛然必為無窮之患待其已至然後拒之則又傷恩恭惟聖明灼見情狀廟堂之議固有以處之臣忝備侍從出使一路懷有所見不敢不盡以備採擇奏為法外刺配罪人待罪狀蘇軾元祐四年八月日龍圖閣學士朝奉郎知杭州蘇軾狀奏右臣自入境以來訪聞兩浙諸郡近年民間例織輕疏糊藥紬絹以備送納和買夏稅官吏欲行揀擇而姦猾人户及攬納人遞相扇和不納好絹致使官吏無由揀擇期限既迫不免受納嵗嵗如此習以成風故京師官吏軍人但請兩浙衣賜皆不堪好上京綱運嵗有估剝日以滋多去年估剝至九十餘貫元納專典枷鎖鞭撻典賣竭産有不能償姑息之弊一至於此臣自到郡欲漸革此弊即指揮受納官吏稍行揀擇至七月二十七日有百姓二百餘人於受納場前大呌數聲官吏軍民並皆辟易遂相率入州衙詣臣喧訴臣以理喻遣方稍引去臣知此數百人必非齊同發意當有凶姦之人為首料率密行葺探當日據受納官仁和縣丞陳皓狀申有人户顔巽男顔章顔益納和買絹五匹並是輕疏糊藥丈尺短少以此揀退其逐人却將專典拑撮及與攬納人等數百人對監官髙聲呌喊奔走前去臣即時差人捉到顔章顔益二人枷送右司理院禁勘只至明日人户一時送納好絹更無一人敢行喧閙續據右司理院勘到顔章顔益招為本家有和買紬絹共三十七匹章等為見遞年例只是將輕疏糊藥紬絹納官今年本州為綱運估剝數多以此指揮要納好絹章等既請和買官錢每匹一貫不合將低價收買昌化縣輕疏糊藥短絹納官其顔章又不合與兄顔益商量若或揀退即須拑撮專揀扇搖衆户呌喊投州嚇脅官吏令只依遞年受納不堪紬絹尋將買到輕疏糊藥短絹五匹付揀子家人翁誠納官尋被翁誠覆本官揀退章等既見衆户亦有似此輕疏短絹多被揀退尋拑撮翁誠呌屈顔益在後用手推翁誠令顔章拑去投州即便走出三門前呌屈二聲跳出欄干將兩手擡起喚衆户扇搖呌喊稱一時投州去來衆户約二百餘人因此亦一時呌喊相隨投州衙喧訴臣尋體訪得顔章顔益係第一等豪户顔巽之子巽先充書手因受贓虛消稅賦刺配本州牢城尋即用幸計構胥吏醫人託患放停又為詐將産業重疊當出官鹽刺配滁州牢城依前託患放停歸鄉父子姦凶衆所畏惡下獄之日閭里稱快謹按顔益顔章以匹夫之微令行於衆舉手一呼數百人從之欲以衆多之勢脅制官吏必欲今後常納惡絹不容臣等少革前弊情理巨蠧實難含忍本州既已依法決訖臣獨判云顔章顔益家傳凶狡氣蓋鄉閭故能奮臂一呼從者數百欲以搖動長吏脅制監官蠧害之深難從常法已刺配本州牢城去訖仍以散行曉示鄉村城郭人户今後更不得織造輕疏糊藥紬絹以備納官庶幾明年全革此弊伏望朝廷詳酌備録臣此狀下本路轉運司遍行約束曉示所貴今後京師及本路官吏軍人皆得堪好衣賜及元納專副不至破家陪填所有臣法外刺配顔章顔益二人亦乞重行朝典謹録奏聞伏候敕旨論河北京東盜賊狀蘇軾熙寧七年十一月日太常博士直史館權知密州軍州事蘇軾狀奏臣伏見河北京東比年以來蝗旱相仍盜賊漸熾今又不雨自秋至冬方數千里麥不入土竊料明年春夏之際寇攘為患甚於今日是以輒陳狂瞽庶補萬一謹按山東自上世以來為腹心根本之地其與中原離合常係社稷安危昔秦并天下首收三晉則其餘強敵相繼滅亡漢髙祖殺陳餘走田橫則項氏不支光武亦自漁陽上谷發突騎席卷以并天下魏武帝破殺袁氏父子收冀州然後四方莫敢敵宋武帝以英雄絶人之資用武厯年而不能并中原者以不得河北也隋文帝以庸夫穿窬之智竊位數年而一海內者以得河北也故杜牧之論以為山東之地王者得之以為王霸者得之以為霸猾賊得之以為亂天下自唐天寶以後姦臣僭峙於山東更十一世竭天下之力終不能取以至於亡近世賀德倫挈魏博降後唐而梁亡周髙祖自鄴都入京師而漢亡由此觀之天下存亡之權在河北無疑也陛下即位以來北方之民流移相屬天災譴告亦甚於四方五六年間未有以塞大異者至於京東雖號無事亦當常使其民安逸富強緩急足以灌輸河北瓶竭則罍恥脣亡則齒寒而近年以來公私匱乏民不堪命今流離飢饉議者不過欲散賣常平之粟勸誘蓄積之家盜賊縱橫議者不過欲增開告賞之門申嚴緝捕之法皆未見其益也常平之粟纍經振發所存無幾矣而飢寒之民所在皆是人得升合官費丘山蓄積之家例皆困乏貧者未蒙其利富者先被其災昔季康子患盜問於孔子對曰茍子之不欲雖賞之不竊乃知上不盡利則民有以為生茍有以為生亦何苦而為盜其間凶殘之黨樂禍不悛則須敕法以峻刑誅一以警百今中民以下舉皆闕食冒法而為盜則死畏法而不盜則飢飢寒之與棄市均是死亡而賖死之與忍飢禍有遲速相率為盜正理之常雖日殺百人勢必不止茍非陛下至明至聖至仁至慈較得喪之孰多權禍福之孰重特於財利少有所捐衣食之門一開骨髓之恩皆遍然後信賞必罰以威克恩不以僥幸廢刑不以災傷撓法如此而人心不革盜賊不衰者未之有也謹條其事畫一如左一臣所領密州自今嵗秋旱種麥不得直至十月十三日方得數寸雨雪而地冷難種雖種不生比常年十分中只種得二三竊聞河北京東例皆如此尋常檢放災傷依條須是檢行根苖以定所放分數今來二麥元不曽種即無根苗可檢官吏守法無緣直放若夏稅一例不放則人户必至逃移尋常逃移猶有逐熟去處今數千里無麥去將安往但恐良民舉為盜矣且天上無雨地下無麥有眼者共見有耳者共聞決非欺罔朝廷豈可坐觀不放欲乞河北京東逐路選差臣僚一員體量放稅更不檢視若未欲如此施行即乞將夏稅斛斗取今日以前五年酌中一年實直令三等已上人户取便納見錢或正色其四等以下且行倚閣緣今來麥田空間若春雨調勻却可以廣種秋稼候至秋熟並將秋色折納夏稅若是已種苖麥委有災傷仍與依條檢放其闕麥去處官吏諸軍請受且支白米或支見錢所貴小民不致大段失所一河北京東自來官不𣙜鹽小民仰以為生近日臣僚上章輒欲禁𣙜賴朝廷體察不行其言兩路吏民無不相慶然臣勘會近年鹽稅日增元本兩路祖額三十三萬二千餘貫至熙寧六年增至四十九萬九千餘貫七年亦至四十三萬五千餘貫顯見刑法日峻告捕日繁是致小民愈難興販朝廷本為此兩路根本之地而煮海之利天以養活小民是以不忍盡取其利濟惠鰥寡隂銷盜賊舊時孤貧無業惟務販鹽所以五六年前盜賊稀少是時告捕之賞未嘗破省錢惟是犯人催納役人量出今鹽課浩大告訐如麻貧民販鹽不過一兩貫錢本偷稅則賞重納稅則利輕欲為農夫又值凶嵗若不為盜惟有忍飢所以五六年來課利日增盜賊日衆臣勘會密州鹽稅去年一年比祖額增二萬貫却支捉賊賞錢一萬一千餘貫其餘未獲賊人尚多以此較之利害得失斷可見矣欲乞特敕兩路應販鹽小客截自三百斤以下並與權免收稅乃官給印本空頭關子與竈户及長引大客令上厯破使逐旋書填月日姓名斤兩與小客限十日更不行用如敢借名為人影帶分減鹽貨許諸人陳告重立賞罰候將來秋熟日仍舊并元降敕榜明言出自聖意令所在雕印散榜鄉村人非木石寧不感動一飲一食皆誦聖恩以至舊來貧賤之民近日飢寒之黨不待驅率一歸於鹽奔走爭先何暇為盜人情不逺必不肯捨安穩衣食之門而趨冒法危亡之地也議者必謂今用度不足若行此法則鹽稅大虧必致闕事臣以為不然凡小客本少力微不過行得三兩程若三兩程外須藉大商興販決非三百斤以下小客所能行運無緣大段走失且平時大商所苦以鹽遲而無人買小民之病以僻逺而難得鹽今小商不出稅錢則所在爭來分買大商既不積滯則輪流販賣收稅必多而鄉村僻逺無不食鹽所賣亦廣損益相補必無大虧之理縱使虧失不過却只得祖額元錢當時官司有何闕用茍朝廷捐十萬貫錢買此兩路之人不為盜賊所獲多矣今使朝廷為此兩路飢饉特出一二十萬貫見錢散與人户人得一貫只及二十萬人而一貫見錢亦未能濟其性命若特放三百斤以下鹽稅半年則兩路之民人人受賜貧民有衣食之路富民無盜賊之憂其利豈可勝言哉若使小民無以為生舉為盜賊則朝廷之憂恐非十萬貫錢所能了辦又況所支捉賊賞錢未必少於所失鹽課臣所謂較得喪之孰多權禍福之孰重者為此也一勘會諸處盜賊大半是按問減等災傷免死之人走還舊處挾恨報讐為害最甚盜賊自知不死既輕犯法而人户亦憂其復來不敢告捕是致盜賊公行切詳按問自言皆是詞窮理屈勢必不免本無改過自新之意有何可愍獨使從輕同黨之中獨不免死其災傷敕雖不下與行下同而盜賊小民無不知者但不傷變主免死無疑且不傷變主情理未必輕於偶傷變主之人或多聚徒衆或廣置兵仗或摽異服飾或質劫變主或驅掠平人或賂遺貧民令作耳目或書寫道店恐動官私如此之類雖偶不傷人情理至重非止闕食之人茍營餱糧而已欲乞令後盜賊贓證未明但已經考掠方始承認者並不為按問減等其災傷地方委自長吏相度情理輕重內情理重者依法施行所貴凶民稍有畏忌而良民敢於捕告臣所謂衣食之門一開骨髓之恩皆遍然後信賞必罰以威克恩不以僥幸廢刑不以災傷撓法者為此也右謹具如前自古立法制刑皆以盜賊為急盜竊不已必為強劫強劫不已必至戰攻或為豪傑之資而致勝廣之漸而況京東之貧富係河北之休戚河北之治亂係天下之安危識者共知非臣私説願陛下深察此事至重所捐小利至輕斷自聖心決行此策臣聞天聖中蔡齊知密州是時東方飢饉齊乞放行鹽禁先帝從之一方之人不覺飢旱臣愚且賤雖不敢望於蔡齊而陛下聖明度越堯舜豈不能行此小事有愧先朝所以越職獻言不敢自外伏望聖慈察其區區之意赦其狂僭之誅臣無任悚栗待罪之至代李琮論京東盜賊狀蘇軾右臣伏見自來河北京東常苦盜賊而京東尤甚不獨穿窬胠篋椎埋發塜之姦至有飛揚跋扈割據僭擬之志近者李逢徒黨青徐妖賊皆在京東凶愚之民殆已成俗自昔大盜之發必有釁端今朝廷清明四方無虞而此等常有不軌之意者殆土地風氣習俗使然不可不察也漢髙帝沛人項羽宿遷人劉裕彭城人黃巢宛朐人朱全忠碭山人其餘厯代豪傑出於京東者不可勝數故凶愚之人常以此藉口而其材力心膽實亦過人加以近年改更貢舉條制掃除腐爛專取學術其秀民善士既以改業而其朴魯強捍難化之流抱其無用之書各懷不逞之意朝廷雖敕有司别立字號以收三路舉人而此等自以世傳朴學無由復踐場屋老死田里不入彀中私出怨言幸災伺隙臣每慮及此即為寒心揚雄自言御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵而班固亦論劇孟郭解之流皆有絶異之姿而惜其不入於道德茍放縱於末流是知人之善惡本無常性若御得其道則向之姦猾盡是忠良故許子將謂曹操曰子治朝之能臣亂世之姦雄使韓彭不遇漢髙亦與盜賊何異臣竊嘗為朝廷計以謂窮其黨而去之不如因其材而用之何者其黨不可勝去而其材自有可用昔漢武嘗遣繡衣直指督捕盜賊所在以軍興從事斬二千石以下可謂急矣而盜賊不為少衰者其黨固不可盡也若朝廷因其材而用之則盜賊自消而豪傑之士可得而使請以唐事明之自天寶以後河北諸鎮相繼僭亂雖憲宗英武亦不能平觀其主帥皆卒伍庸材而能於六七十年間與朝廷相抗者徒以好亂樂禍之人背公死黨之士相與出力而輔之也至穆宗之初劉總入朝而河北始平總知河北之亂權在此輩於是盡籍軍中宿將名豪如朱克融之流薦於朝冀厚與爵位使北方之人羡慕向進革其亂心而宰相崔植杜元穎皆庸人無逺慮以為河北既平天下無事克融輩久留京師終不録用飢寒無告怨忿思亂會張洪靖赴鎮遂遣還幽州而克融等作亂復失河朔今陛下鑑唐室既往之咎當收京東河北豪傑之心臣伏見近日沂州百姓程棐告獲妖賊郭進等竊聞棐之弟嶽乃是李逄之黨配在桂州豪俠武健又過於棐京東州郡如棐嶽者不可勝數此等棄而不用即作賊收而用之即捉賊其理甚明臣願陛下精選青鄆兩帥京東東西職司及徐沂兖單濰密淄齊曹濮知州諭以此意使隂求部內豪猾之士或有武力或多權謀或通知術數而曉兵或家富於財而好施如此之類皆召而勸奬使以告捕自效籍其姓名以聞於朝所獲盜賊量輕重酬賞若獲真盜大姦隨即録用若只是尋常劫賊即纍其人數酬以一官使此輩歆艷其利以為進身之資但能拔擢數人則一路自然競勸貢舉之外别設此科則向之遺材皆為我用縱有姦雄嘯聚亦自無徒但每州搜羅得一二十人即耳目遍地盜賊無容足之處矣厯觀自古竒偉之士如周處戴淵之流皆出於羣盜改惡修善不害為賢而况以捉賊出身有何不可若朝廷隨材試用異日拓邉境立功名未必不由此塗出也非陛下神聖英武不能決行此策臣雖非職事而受恩至深有所見聞不敢瘖然論修河第一狀歐陽修右臣竊見朝廷近因臣寮建議欲塞商胡開橫壠回大河於故道已下三司候今秋興役見令京東計度物料次臣伏以國家興大役動大衆必先順天時量人力謀於其始而審然後必行計其所利者多乃能無悔伏見比年以來興役勤衆勞民費財不精謀慮於厥初輕信利害之偏説舉事之始既已倉惶羣議一搖尋復悔罷臣不敢逺引它事上煩聖聰只如往年河決商胡是時執政之臣不慎計慮遽謀修塞科配一千八百萬稍芟搔動六路一百有餘州官吏催驅急若星火民庶愁苦盈於道塗或物已輸官或人方在路未及興役遽已罷修虛費民財為國斂怨舉事輕脫為害若斯雖既往之失難追而可鑒之蹤未逺今者又聞復有修河之役聚三十萬人之衆開一千餘里之長河計其所用物力數倍往年當此天災嵗旱之時民困國貧之際不量人力不順天時臣知其有大不可者五蓋自去秋以及今春半天下苦旱而京東尤甚河北次之國家常務安靜振恤之猶恐飢民起而為盜何况於此兩路聚大衆興大役此其必不可者一也河北自恩州用兵之後繼以凶年人户流亡十失八九數年以來人稍歸復然死亡之餘所存無幾瘡痍未斂物力未完今又遭此旱嵗京東自去冬無雨雪麥不生苖已及暮春粟未布種不惟目下乏食兼亦向去無望而欲於此兩路興三十萬人之役若别路差夫則逺處難為赴役就河便近則此兩路力所不任此其必不可者二也臣伏見往年河決滑州曽議修塞當時公私事力未如今日貧虛然猶收聚物料誘率民財數年之間方能興役況今國用方乏民力方疲且合商胡塞大決之洪流此自是一大役也鑿橫壠開久廢之故道此又一大役也自橫壠至海一千餘里掃岸久已廢壞頓須修緝此又一大役也往年公私有力之時興一大役尚須數年今併三大役倉卒興為於災旱貧虛之際此其必不可者三也就令商胡可塞故道可回猶宜重察天時人力之難為何況商胡未必可塞故道未必可回者哉臣聞鯀障洪水九年無功禹得洪範五行之書知水趨下之性乃因水之流疏決就下而水患乃息然則以大禹之神功不能障塞其流但能因而疏決爾今欲逆水之性障而塞之奪洪河之正流幹以人力而回注此大禹之所不能此其必不可者四也橫隴湮塞已二十年商胡決流又亦數嵗故道已塞而難鑿安流已久而難回昨聞朝廷曽遣故樞密直學士張奎計度功料極大近者再行檢計減得功料全少功料少則所開淺狹淺狹則水勢難回此其必不可者五也臣伏見國家纍嵗災譴甚多其於京東變異尤大地貴安靜動而有聲巨嵎山摧海水搖蕩如此不止僅乎十年天地警戒必不虛發臣謂變異所起之方尤宜加意防懼今乃欲於凶旱之年聚三十萬之大衆於變異最大之方臣恐地動山搖災禍自此而始方今京東赤地千里飢饉之民正苦天災又聞河役將動往往伐桑拆屋無復生計流亡盜賊之患不可不虞欲望聖慈特降德音速罷其事當此凶嵗務安人心徐詔有司審詳利害縱令河道可復乞候豐年餘力漸次興為臣實庸愚本無逺見得於外論不敢不言論修河第二狀歐陽修臣伏見學士院集兩省臺諫官議修河事未有一定之論蓋由賈昌朝欲復故道李仲昌請開六塔互執一説莫知孰是以臣愚見皆謂不然言故道者未詳利害之原述六塔者近乎欺罔之謬何以言之今謂故道可復者但見河北水患而欲還之京東然不思天禧以來河水屢決之因所以未知故道有不可復之勢此臣故謂未詳利害之原也若言六塔之利者則不攻而自破矣且開六塔既云減得大河水勢然今恩冀之患何緣尚告危急此則減水之利虛妄可知開六塔者又云可以全回大河使復橫壠故道見今六塔只是分減之水下流無歸已為濵德博之患若全回大河以入六塔則其害如何此臣故謂近乎欺罔之謬也臣聞河本泥沙無不淤之理淤澱之勢常先下流下流淤髙水行不快乃自上流低下處決此其常勢也然避髙就下水之本性故河流已棄之道自是難復臣不敢逺引書史廣述河源只以今所欲復之故道言天禧以來屢決之因初天禧中河出京東水行於今所謂故道者水既淤澀乃於滑州天臺潰決尋而修塞水復故道未幾又於滑州南鐡狗廟決其後數年又議修塞水令復故道已而又於王楚潰決所決差小與故道分流然而故道之水終以壅淤故又於橫壠大決是則決河非不能力塞故道非不能力復不久終必決於上流者由故道淤髙水不能行故也及橫壠既決水流就下所以十餘年間河未為患至慶厯三四年橫壠之水又自下流先淤是時臣為河北轉運使海口已淤一百四十餘里其後遊金赤三河相次又淤下流既梗乃又於上流商胡口決然則京東橫壠兩河故道皆是下流淤塞河水已棄之髙地京東故道屢復屢決理不可復其驗甚明則六塔所開故道之不可復不待言而易知臣聞議者計度京東故道功料止云銅城已上地髙不知大抵東去皆髙而銅城已上乃特髙耳其東北銅城已上則似低比商胡已上則實髙也若云銅城已東地勢斗下則當日水流宜決銅城已上何緣而頓淤橫壠之口亦何緣而大決也然則兩河故道既皆不可為則河北水患何為而可去臣聞智者之於事有不能必則較其利害之輕重擇其害少者而為之猶勝害多而利少何况有害而無利此三者可較而擇也臣見往年商胡初決之時議欲修塞計用一千八百萬稍芟科配六路一百有餘州軍今欲塞者乃往年之商胡必須用往年之物數至於開鑿故道張奎元計功料極大後來李參等減得全少猶用三十萬人然欲以五十步之狹容大河之水此可笑也又欲增一夫所開三尺之方倍為六尺且濶厚三尺而長六尺已是一倍之功在於人力已為勞苦若云六尺之方以開方法算之乃八倍之功此豈人力之所勝是則前功浩大而難興後功雖小而不實大抵塞商胡開故道凡二大役皆困國而勞人所舉如此而欲開難復屢決已驗之故道使其虛費而商胡不可塞故道不可復此所謂有害而無利者也就使幸而暫塞暫復以紓目前之患而終於上流必決如龍門橫壠之比重以困國勞人此所謂利少而害多也若六塔者於大河有減水之名而無減水之實今下流所散為患已多若全回大河以注之則濱德博河北所仰之州不勝其患而又故道淤澀上流必有他決之虞此直有害而無利耳是智者之不為也今若因水所在增治堤防疏其下流浚以入海則可無決溢散漫之虞今河所厯數州之地誠為患矣堤防嵗用之夫誠為勞矣與其虛費天下之財虛舉大衆之役而不能成功終不免為數州之患勞嵗用之夫則此所謂害少者乃智者之所擇也大抵今河之勢負三決之虞復故道上流必決開六塔上流亦決今河下流若不浚使入海則上流亦決臣請選知水利之臣就其下流求其入海之路而浚之不然下流梗澀則終虞上決為患無涯臣非知水者但以今事目可驗者而較之耳言狂計愚不足以備聖君博訪之求此大事也伏乞下臣之議廣謀於衆而裁擇之論修河第三狀歐陽修右臣伏見朝廷定議開修六塔河口回水入橫壠故道此大事也中外之臣皆知不便而未有肯為國家極言其利害者何哉蓋其説有三一曰畏大臣二曰畏小人三曰無竒策今執政之臣用心於河事亦勞矣初欲試十萬人之役以開故道既又捨故道而修六塔未及興役遽又罷之已而終為言利者所勝今又復修然則其勢難於復止也夫以執政大臣鋭意主其事而又有不可復止之勢固非一人口舌可回此所以雖知不便而罕肯言也李仲昌小人利口偽言衆所共惡今執政之臣既用其議必主其人且自古未有無患之河今河浸恩冀目下之患雖小然其患已形回入六塔將來之害必大而其害未至夫以利口小人為大臣所主欲與之爭未形之害勢必難奪就使能奪其議則言者猶須獨任恩冀為患之責使仲昌得以為辭大臣得以歸罪此所以雖知不便而罕敢言也今執政之臣用心太過不思自古無不患之河直欲使河不為患若得河不為患雖竭人力猶當為之况聞仲昌利口詭辨謂費物少而用功不多不得不信為竒策於是決意用之今言者謂故道既不可復六塔又不可修詰其如何則又無竒策以取勝此所以雖知不便而罕肯言也衆人所不敢言而臣今獨敢言者臣謂大臣非有私仲昌之心也直欲興利除害爾若果知其為患愈大則豈有不回者哉至於顧小人之後患則非臣之所慮也且事欲知利害權重輕有不得已則擇其害少而患輕者為之此非明智之士不能也况治水本無竒策相地勢謹隄防順水性之所趨爾雖大禹不過此也夫所謂竒策者不大利則大害若循常之計雖無大利亦不至大害此明智之士善擇利者之所為也今言修六塔者竒策也然終不可成而為害愈大言順水治隄者常談也然無大利亦無大害不知為國計者欲何所擇哉若謂利害不可必但聚大衆興大役勞民困國以試竒策而僥幸於有成者臣謂雖執政之臣亦未必肯為也臣前已具言河利害甚詳而未蒙採聽今復略陳其大要惟陛下詔計議之臣擇之臣謂河水未始不為患今順已決之流治隄防於恩冀者其患一而遲塞商胡復故道者其患二而速開六塔以回今河者其患三而為害無涯自河決橫壠以來大名金堤掃嵗嵗增治及商胡再決而金堤益大加功獨恩冀之間自商胡決後議者貪建塞河之策未嘗留意於堤防是以今河水勢浸溢今若專意併力於恩冀之間謹治堤防則河患可禦不至大害所謂其患一者十數年間今河下流淤塞則上流必有決處此一患而遲者也今欲塞商胡口使水歸故道治堤修掃功料浩大勞人費物困弊公私此患一也幸而商胡可塞故道復歸髙淤難行不過一二年間上流必決此二患而速者也今六塔河口雖云已有上下約然全塞大河正流為功不小又開六塔河道治二千餘里堤防移一縣兩鎮計其功費又大於塞商胡數倍其為困弊公私不可勝計此一患也幸而可塞水入六塔而東橫流散溢濱德博與齊州之界咸被其害此五州者素號富饒河北一路財用所仰今引水注之不惟五州之民破壞田産河北一路坐見貧虛此二患也三五年間五州凋弊河流注溢久又淤髙流行梗澀則上流必決此三患也所謂為害而無涯者也今為國誤計者本欲除一患而反就三患此臣所不諭也至如六塔不能容大河橫壠故道本以髙淤難行而商胡決今復驅而注之必橫流而散溢自澶至海二千餘里堤掃不可卒修修之雖成又不能捍水如此等事甚多士無愚智皆所共知不待臣言而後悉也臣前未奉使契丹時已嘗具言故道六塔皆不可為惟治堤順水為得計及奉使往來河北詢於知水者其説皆然雖恩冀之人今被水患者亦知六塔不便皆願且治恩冀堤防為是下情如此誰為上通臣既知其詳豈敢自默伏乞聖慈特諭宰臣使更審利害速罷六塔之役差替李仲昌等不用選一二精幹之臣與河北轉運使副及恩冀州官吏相度堤防併力修治則今河之水必不至為大患且河水天災非人力可回惟當順導防捍之而已不必求竒䇿立難必之功以為小人僥冀恩賞之資也况功必不成後悔無及者乎臣言狂計愚惟陛下裁擇乞開杭州西湖狀蘇軾元祐五年四月二十九日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣聞天下所在陂湖河渠之利廢興成毁皆若有數惟聖人在上則興利除害易成而難廢昔西漢之末翟方進為丞相始決壞汝南鴻隙陂父老怨之歌曰壞陂誰翟子威飯我豆羮芋魁反乎覆陂當復誰言者兩黃鵠蓋民心之所欲而托之天以為有神下告我也孫皓時吳郡上言臨平久廢復開事關興運雖天道難知而民心所欲天必從之杭州之有西湖如人之有眉目蓋不可廢也唐長慶中白居易為刺史方是時湖溉田千餘頃及錢氏有國置撩湖兵士千人日夜開浚自國初以來稍廢不治水涸草生漸成葑田熙寧中臣通判本州則湖之葑合蓋十二三耳至今才十六七年之間遂堙塞其半父老皆言十年以來水淺葑橫如雲翳空倐忽便滿更二十年無西湖矣使杭州而無西湖如人去其眉目豈復為人乎臣愚無知竊謂西湖有不可廢者五天禧中故相王欽若始奏曰西湖為放生池禁捕魚鳥為人主祈福自是以來每嵗四月八日郡人數萬會于湖上所活羽毛鱗介以百萬數皆西北向稽首仰祝千萬嵗壽若一旦堙塞使蛟龍魚鱉同為涸轍之鮒臣子坐觀亦何心哉此西湖之不可廢者一也杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足於水井邑日富百萬生聚待此而後食今湖狹水淺六井漸壞若二十年之後盡為葑田則舉城之人復飲鹹苦其勢必自耗散此西湖之不可廢者二也白居易作西湖石函記云放水溉田每減一寸可溉十五頃每一伏時可溉五十頃若蓄泄及時則瀕河千頃可無凶嵗今雖不及千頃而下湖數十里間茭菱穀米所獲不資此西湖之不可廢者三也西湖深濶則運河可以取足於湖水若湖水不足則必取足於江潮潮之所過泥沙渾濁一石五斗不出三嵗輒調兵夫十餘萬工開浚而河行市井中蓋十餘里吏卒搔擾泥水狼籍為居民莫大之患此西湖之不可廢者四也天下酒稅之盛未有如杭者也嵗課二十餘萬緡而水泉之用仰給於湖若湖漸淺狹水不應溝則當勞人逺取山泉水不下二十萬工此西湖之不可廢者五也臣以侍從出膺寵寄目覩西湖有必廢之漸有五不可廢之憂豈得茍安嵗月不任其責輒已差官打量湖上葑田計二十五萬餘丈度用夫二十餘萬工近者伏蒙皇帝陛下太皇太后陛下以本路飢饉特寬轉運司上供額斛五十餘萬石出糶常平米亦數十萬石約敕諸路不取五穀力勝稅錢東南之民所活不可勝計今又特賜本路度牒三百而杭獨得百道臣謹以聖意增價召人中米減價出賣以濟飢民而增減耗折之餘尚得錢米約共一萬餘貫石臣輒以此錢米募民開湖度可得十萬工自今月二十八日興工農民父老縱觀太息以謂二聖既捐利與民活此一方而又以其餘棄興久廢無窮之利使數千人得食其力以度此凶嵗蓋有泣下者臣伏見民情如此而錢米有限所募未廣葑合之地尚存大半若來者不嗣則前功復棄深可痛惜若更得度牒百道則一舉募民除去淨盡不復遺患矣伏望皇帝陛下太皇太后陛下少賜詳覽察臣所論西湖五不可廢之狀利害較然特出聖斷别賜臣度牒五十道仍敕轉運提刑司於前來所賜諸州度牒二百道內契勘賑濟支用不盡者更撥五十道價錢與臣通成一百道使臣得盡力畢志半年之間目見西湖復唐之舊環三十里際山為岸則農民父老與羽毛鱗介同詠聖澤無有窮已臣不勝大願乞相度開石門河狀蘇軾元祐六年三月日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣謹按史記秦始皇三十六年東遊至錢塘臨浙江水波惡乃西去二十里從狹中渡始皇帝以天下之力徇其意意之所欲出赭山橋海無難而獨畏浙江水波惡不敢徑渡以此知錢塘江天下之嶮無出其右者臣昔通守此郡今又忝郡寄二十年間親見覆溺無數自溫台明波往來者皆由西興徑渡不涉浮山之嶮時有覆舟然尚希少自衢睦處婺宣歙饒信及福建路八州往來者皆出入龍山沿泝此江江水灘淺必乘潮而行潮自海門東來勢若雷霆而浮山峙於江中與魚浦諸山相望犬牙錯入以亂潮水洄洑激射其怒自倍沙磧轉移狀如鬼神往往於淵潭中湧出陵阜十數里旦夕之間又復失去雖舟師沒人不能前知其深淺以故公私坐視覆溺無如之何老弱呌號求救於湍沙之間聲未及終已為潮水卷去行路為之流涕而已縱有勇悍敢往之人又多是盜賊利其財物或因而擠之能自全者百無一二性命之外公私亡失不知一嵗凡幾千萬而衢睦等州人衆地狹所産五穀不足於食嵗常漕蘇秀米至桐廬散入諸郡錢塘億萬生齒待上江薪炭而活以浮山之嶮覆溺留礙之故此數州薪米常貴又衢婺睦歙等州及杭之富陽新城二邑公私所食鹽取足於杭秀諸場以浮山之嶮覆溺留礙之故官給腳錢甚厚其所亡失與依託風水以侵盜者不可勝數此最其大者其餘公私利害未可以一二遽數臣伏見宣德郎前權知信州軍州事侯臨因葬所生母於杭州之南蕩往來江濱相視地形訪聞父老參之舟人反復講求具得其實建議自浙江上流地名石門並山而東或因斥鹵棄地鑿為運河引浙江及溪谷諸水凡二十二里有竒以達于江又並江為岸度潮水所向則用石所不向則用竹大凡八里有竒以達于龍山之大慈浦自大慈浦北折抵小嶺下鑿嶺六十五丈以達于嶺東之古河因古河稍加浚治東南行四里有竒以達于今龍山之運河以避浮山之嶮度用錢十五萬貫用捍江兵及諸郡廂軍三千人二年而成臣與前轉運使葉溫叟轉運判官張璹躬往按視皆如臨言凡福建兩浙士民聞臣與臨欲奏開此河萬口同聲以為莫大無窮之利臣縱欲不言已為衆論所迫勢不得默已臣聞之父老章獻皇后臨朝日以江水有皇天蕩之嶮內出錢數十萬貫築長蘆起僧舍以拯溺者又見先帝以長淮之嶮賜錢十萬貫米十萬石人夫九萬二千人以開龜山河今浮山之嶮非特長蘆龜山之比而二聖仁慈視民如傷必將捐十五萬緡以平此積嶮也謹昧死上臨所陳開石門河利害事狀一本及臣所差觀察推官董華用臨之説約度功料及合用錢物料狀一本并地圖一面伏乞降付三省看詳或召臨赴省面加質問仍乞下本路監司或更特差官同共相視若臣與臨言不妄乞自朝廷擘畫支賜錢物施行臣觀古今之事非知之難言之亦易難在成之而已臨之才幹衆所共知臣謂此河非臨不成伏望聖慈特賜訪問左右近臣必有知臨者乞專差臨監督此役不惟救活無窮之性命完惜不資之財物又使數州薪米流通田野市井詠歌聖澤子孫不忘臣不勝大願貼黃今建此議不知者必有二難其一不過謂浙江浮山之嶮經厯古今賢哲多矣若可平治必不至今日知此乃巷議臆度不足取信只如龜山新河易長淮為安流近日呂梁之嶮竊聞亦已平治豈可謂古人偶未經意便謂今人不可復作其一不過謂並江作岸為潮水所衝齧必不能經久今浙江石岸亦有成規自古本用木岸轉運使張夏始易以石自龍山以東江水溢深石岸立於漲沙之上又潮頭為西陵石磯所射正戰於岸下而四五十年隱然不動雖時有缺壞隨即修完人不告勞官無所費今自大慈浦以西江水皆露出石腳而潮頭自龍山轉向西南則岸之易成而難壞非張夏所建東堤之比也申三省起請開湖六條狀蘇軾元祐五年五月初五日龍圖閣學士左朝奉郎知杭州蘇軾狀申軾於熙寧中通判杭州訪問民間疾苦父老皆云苦運河淤塞逺則五年近則三年率常一開浚不獨勞役兵民而運河自州前至北郭穿闤闠中蓋十四五里每將興工市肆洶動公私騷然自胥吏壕柵兵級等皆能恐喝人户或方當於某處置土某處過泥水則居者皆有失業之憂既得重賂又轉而之它及土役既畢則房廊邸店作踐狼籍園圃隙地例成丘阜積雨蕩濯復入河中居民患厭未易悉數若三五年失開則公私壅滯以尺寸水行數百斛舟人牛力盡跬步千里雖監司使命有數日不能出郭者其餘艱阻固不待言問其所以頻開屢塞之由皆云龍山浙江兩門日納潮水沙泥渾濁一汛一淤積日稍久便及四五尺其勢當然不足怪也軾又問言潮水淤塞非獨近嵗若自唐以來如此則城中皆為丘阜無復平田今驗所在堆疊泥沙不過三五十年所積耳其故何也父老皆言錢氏有國時郡城之東有小堰門既云小堰則容有大者昔人以大小二堰隔截江水不放入城則城中諸河專用西湖水水既清激無由淤塞而餘杭門外地名半道洪者亦有堰名為清河意亦愛惜湖水不令走下自天禧中故相王欽若知杭州始壞此堰以快目下舟楫往來今七十餘年矣以意度之必自此後湖水不足於用而取足於江潮又况今者西湖日就堙塞昔之水面半為葑田霖潦之際無所瀦畜流溢害田而旱乾之月湖自減涸不能復及運河謹按唐長慶中刺史白居易浚治西湖作石函記其略曰自錢塘至鹽官界應溉夾河田者皆放湖入河自河入田每減一寸可溉十五頃每一伏時可溉五十頃若堤防如法蓄泄及時則瀕湖千頃無凶年矣由此觀之西湖之水尚能自運河入田以溉千頃則運河足用可知也軾於是時雖知此利害而講求其方未得要便今者蒙恩出典此州自去年七月到任首見運河乾淺使客出入艱苦萬狀穀米薪芻亦緣此暴貴尋剗刷捍江兵士及諸色廂軍得千餘人自十月興工至今年四月終開浚茆山鹽橋二河各十餘里皆有水八尺以上見今公私舟船通利父老皆言自三十年已來開河未有若此深快者也然潮水日至淤填如舊則三五年間前功復棄軾方講問其策而臨濮縣主簿監在城商稅蘇堅建議曰江潮灌注城中諸河嵗月已久若遽用錢氏故事以堰門却之令自城外轉過不惟事體稍大而湖面葑合積水不多雖引入城未可全恃宜參酌古今且用中策今城中運河有二其一曰茆山河南抵龍山浙江閘口而北出天宗門其一曰鹽橋河南至州前碧波亭下東合茆山河而北出餘杭門餘杭天宗二門東西相望不及三百步二河合於門外以北抵長河堰下今宜於鈐轄司前創置一閘每遇潮上則暫閉此閘令龍山浙江潮水徑從茅山河出天宗門候一兩時辰潮平水清然後開閘則鹽橋一河過闤闠中者永無潮水淤塞開淘搔擾之患而茅山河縱復淤填乃在人户稀少村落相半之中雖不免開淘而泥土有可堆積不為人患潮水自茅山河行十餘里至梅家橋下始與鹽橋河相通潮已行逺泥沙澄墜雖入鹽橋河亦不淤填茅山河既日受潮水無緣涸竭而鹽橋河底低茆山河底四尺則鹽橋河亦無涸竭之理然猶當過慮以備乏水今西湖水貫城以入于清湖河者大小凡五道皆自清湖河而下以北出餘杭門不復與城中運河相灌輸此最可惜宜於湧金門內小河中置一小堰使暗門湧金門二道所引湖水皆入法慧寺東溝中南行九十一丈則鑿為新溝二十六丈以東達于承天寺東之溝又南行九十丈復鑿為新溝一百有七丈以東入于貓兒橋河口自貓兒橋河口入新水門以入于鹽橋河則咫尺之近矣此河下流則江潮清水之所入上流則西湖活水之所注永無乏絶之憂矣而湖水所過皆闤闠曲折之間頗作石匱貯水使民得汲用浣濯且以備火災其利甚博此所謂參酌古今而用中策也軾尋以堅之言使通直郎知仁和縣事黃僎相度可否及率僚吏躬親驗視一一皆如堅言可成無疑也謹以四月二十日興工開導及作堰閘且以餘力修完六井皆不過數月可以成就而本州父老農民覩此利便相率詣軾陳狀凡一百一十五人皆言西湖之利上自運河下及民田億萬生聚飲食所資非止為遊觀之美而近年以來堙塞幾半水面日減茭葑日滋更二十年無西湖矣勸軾因此盡力開之軾既深愧其言而患兵工寡少費用之資無所從出父老皆言竊聞朝廷近賜度牒一百道每道一百七十貫為錢一萬七千貫本州既髙估米價召人入中減價出糶以濟飢民消折之餘尚有錢米約共一萬貫石若支用此亦足以集事矣適會錢塘縣尉許敦仁建言西湖可開狀其略曰議者欲開西湖久矣自太守鄭公戩以來茍有志於民者莫不以此為急然皆用工滅裂又無以善其後蓋西湖水淺茭葑壯猛雖盡力開撩而三二年間人工不繼則隨手葑合與不開同竊見吳人種菱每嵗之春芟除潦漉寸草不遺然後下種若將葑田變為菱蕩永無茭草堙塞之患今乞用上件錢米雇人開湖候開成湖面即給與人户量出課利作菱蕩租佃獲利既厚嵗嵗加功若稍不除治微生茭葑即許人剗賃但使人户常憂剗奪自然盡力永無後患今有錢米一萬貫石度所雇得十萬每工約開葑一丈亦可添得十萬丈水面不為小補軾尋以敦仁之策參考衆議皆謂允當已一面牒本州依敦仁劈畫支上件錢米雇人仍差捍江船務樓店務兵士共五百人般載葑草於四月二十八日興工去訖今來有合行起請事件謹具畫一如左一今來所創置鈐轄司前一閘雖每遇潮上閉得一兩時辰而公私舟船欲出入閘者自須先期出入必不肯端坐以待閉閘兼更有茅山一河自可通行以此實無阻滯之患而能隔截江潮徑自茅山河出天宗門至鹽橋一河永無堙塞開淘搔擾之患為利不小恐來者不知本末以阻滯為言輕有變改積以嵗月舊患復作今來起請新置鈐轄司前一閘遇潮上閉訖方得開龍山浙江閘候潮平水清方得却開鈐轄司前閘一鹽橋運河岸上有治平四年提刑元積中所立石刻為人户屋舍侵占牽路已行除拆外具載濶狹丈尺今方二十餘年而兩岸人户復侵占牽路蓋屋數千間却於屋外别作牽路以致河道日就淺窄準法據理並合拆除本州方行相度而人户相率經州乞據逐人家後丈尺各作木岸以護河堤仍據所侵占地量出賃錢官為椿管凖備修補木岸乞免拆除屋舍本州已依狀施行去訖今來起請應占牽路人户所出賃錢並送通判廳收管凖備修補河岸不得别將支用如違並科違制一自來西湖水面不許人租佃惟茭葑之地方許請賃種植今來既將葑田開成水面須至給與人户請佃種菱深意嵗久人户日漸侵占舊來水面種植官司無由覺察已指揮本州候開湖了日於今來新開界止立小石塔三五所相望為界亦須至立條約束今來起請應石塔以內水面不得請射及侵占種植如違許人告每丈支賞錢伍貫文省以犯人家財充一湖上種菱人户自來臠割葑地如田塍狀以為疆界緣此即漸葑合不可不禁今來起請應種菱人户只得標插竹木為四至不得以臠葑為界如違亦許人剗賃一本州公使庫自來收西湖菱草蕩課利錢四百五十四貫充公使今來既開草葑盡變為菱蕩給與人户租佃即今後課利亦必稍增若撥入公使庫未為穩便今來起請欲乞應西湖上新舊菱蕩課利並委自本州量立課額今後永不得增添如人户不切除治致少有草葑即許人剗賃其剗賃人特與權免三年課利所有新舊菱蕩課利錢盡送錢塘縣尉司收管謂之開湖司公使庫更不得支用以備逐年雇人開葑撩淺如敢别將支用並科違制一錢塘縣尉廨宇在西湖上今來起請今後差錢塘縣尉銜位內帶管勾開湖司公事常切點檢才有茭葑即依法施行或支開湖司錢物雇人開撩替日委後政點檢交割如有茭葑不切除治即申所屬點檢申吏部理為遺闕以上六條並刻石置知州及錢塘縣尉廳常切點檢右謹件如前勘會西湖葑田共二十五萬餘丈合用人夫二十餘萬工前件錢米約可雇十萬工只開得一半軾已具狀奏聞乞别賜度牒五十道通成一百道充開湖費用外所有逐一子細利害不敢一一紊煩天聽伏乞僕射相公門下侍郎中書侍郎尚書左丞尚書右丞特賜詳覽前件所陳利害及起請六事逐一敷奏立為本州條貫早賜降下依稟施行兼畫成地圖一面隨狀納上謹具狀申三省謹狀論罷修奉先寺等狀歐陽修右臣近曽上言為京師土木興作處多乞行減罷尋凖敕差臣與三司同共相度減定續具奏聞次今又聞聖旨下三司重修慶基殿及奉先寺屋宇臣伏見近年政令乖錯紀綱隳頺上下因循未能整緝惟務崇修祠廟廣興土木百役俱作無一日暫停方今民力困貧國用窘急小人不識大計不思愛君但欲廣耗國財務為己利恣侵欺於官物圖酬奬之功勞託名祖宗張大事體况諸處神御殿當蓋造之初務極崇奉棟宇堅壯莫不精嚴雖數百年未必損動近年以來不住修換昨開先殿只因兩柱損遂換一十三柱前後差官檢計朝廷並不取信只慿最後之言遂至廣張物料蓋緣廣張得物料即多圖酹奬恩澤竊以崇奉祖宗禮貴清淨今乃頻有遷徙輕黷威靈要其所歸止為小人圖利臣見自古人君好興土木者自春秋史記厯代以來並皆書為過失以示萬世今小人圖一旦之利黷祖宗之威靈置人主於有過之地誰忍為之臣實痛惜臣因凖敕減定於三司略見大槩開先殿初因兩條柱損今所用材植物料共一萬七千五百有零睦親宅神御殿所用物料又八十四萬七千又有醴泉福勝等處物料不可悉數此外軍營庫務合行修造者又有百餘處使厚地不生他物惟産木材亦不能供此廣費自古王者尊祖事神各有典禮不必廣興土木然後為能臣竊見纍年火災自玉清昭應洞真上清鴻慶壽寧祥源會靈七宫開寶興國兩寺塔殿並皆焚燒蕩盡是以見天意厭土木之華侈為陛下惜國力民財譴戒丁寧前後非一陛下與其廣興土木以事神不若畏懼天戒而修省其已興作者既不可及其未修者宜速寢停况睦親神御殿於禮不宜作其事甚明别無禮典講求乞更不下太常便行寢罷其慶基殿如的有損漏只令三司差官整補不得望為勞績其奉先寺乞勒寺家自修今垂拱殿是陛下常坐之處近聞為無梁木且止未修諸皇親自火燒居宅後至今寄寓宅所陛下尊為天子無梁木修一殿富有四海而皇族無屋可居蓋為將良材美木俯徇小人並於不急處枉費遂致合行修造處却至乏材伏願陛下進思纍次大火常發於土木最盛處凡國家極力興修者火必盡焚且天厭土木而焚之又欲興崇土木以奉之此所以福應未臻而災譴屢降也伏乞上思天戒下察人言人言雖狂而實忠天戒甚明而不逺伏惟陛下聖德恭儉不樂遊畋凡所興修皆非嗜好但以難違小人一時之請自取青史萬世之譏實為陛下惜之伏望聖慈廣賜裁擇文編卷二十

body:
  text: 文編卷五十八明唐順之編唐故江南西道觀察使中大夫洪州刺史兼御史中丞上柱國賜紫金魚袋贈左散騎常侍太原王公神道碑銘韓愈王氏皆王者之後在太原者為姬姓春秋時王子成父敗狄有功因賜氏厥後世居太原至東漢隱士烈博士徵不就居祁縣因號所居鄉為君子公其君子鄉人也魏晉涉隋世有名人國朝大王父𤣥暕歷御史屬三院止尚書郎生景肅守三郡終傅凉王生政襄鄧等州防禦使鄂州採訪使贈吏部尚書公尚書之第某子公諱仲舒字宏中少孤奉母夫人家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交貞元初射策拜左拾遺與陽城合遏裴延齡不得為相德宗初怏怏無奈久而嘉之其後入閣德宗顧列謂宰相曰第幾人必王某也果然月餘特改右補闕遷禮部考功吏部三員外郎在禮部奏議詳雅省中伏其能在考功吏部提約明故吏無以欺同列有恃恩自得者衆皆媚承公嫉其為人不直視由此貶連州司户移夔州司馬又移荆南因佐其節度事為參謀得五品服放跡在外積四年元和初收拾俊賢徵拜吏部員外郎未幾為職方郎中知制誥友人得罪斥逐後其家親知過門縮頸不敢視公獨省問為計度論議直其寃由是出為峽州刺史轉廬州未至丁母夫人憂服除又為婺州時疫旱甚人死亡且盡公至多方救活天遂雨疫定比數年里閭完復制使出巡人填道迎顯公德事具聞就加金紫轉蘇州變其屋居以絶火延隄松江路害絶阻滯秋夏賦調自為書與人以期吏無及門而集政成為天下守之最天子曰王某之文可思最宜為誥有古風豈可久以吏事役之復拜中書舍人既至京師儕流無在者視同列皆邈然少年益自悲而謂人曰豈可復治筆硯于其間哉上若未棄臣宜用所長在外久周知俗之利病俾治之當不自愧宰相以聞遂得觀察江南西道奏罷𣙜酤錢九千萬軍息之無已掌吏壞産猶不釋囚之公至脫械不問人遭水旱賦窘公曰我且減燕樂絶它用錢可足乎遂以代之罷軍之息錢禁浮屠誑誘壞其舍以葺公宇三年法大成錢餘於庫粟餘於廪人享於田廬謳謡於道途天子復思且徵以代虛吏部左丞位以待之長慶三年十一月十七日薨於洪州年六十二上哀慟輟朝贈左散騎常侍某日歸葬於某處某既以公之德刻而藏之墓矣子初又請詩以揭之詞曰生人之治本乎斯文有事其末而忘其源切近昧陋道由是堙有志其本而泥古陳當用而迂乖戾不伸較是二者其過也均有美王公志儒之本達士之經秩秩而積涵涵而停韡為華英不矜不盈孰播其馨孰發其明介然而居士友以傾敷文帝階擢列侍從以忠逺名有直有諷辨遏堅懇巨邪不用秀出班行乃動帝目帝省竭心恩顧日渥翔於郎署騫于禁密發帝之令簡古而蔚不比于權以直友寃敲捍挫揠竟遭斥奔久淹于外歷守大藩所至極思必悉利病萎枯以膏燠暍以醒坦之敞之必絶其徑浚之澄之使安其泳帝思其文復命掌誥公濳謂人此職宜少豈無凋郡庸以自效上籍其實俾統于洪逋之攸除奸訛革風祛蔽于目釋負于躬方乎所部禁絶浮屠風雨順易粳稻盈疇人得其所乃恬乃謳化成有代思以息勞虛位而俟奄忽滔滔維德維績志于斯石日逺彌高唐故相權公墓碑韓逾上之元和六年其相曰權公諱德輿字載之其本出自殷帝武丁武丁之子降封於權權江漢間國也周衰入楚為權氏楚滅徙秦而居天水略陽苻秦之王中國其臣有安丘公翼者有大臣之言後六世至平凉公文誕為唐上庸太守荆州大都督長史焯有聲烈平凉曾孫諱倕贈尚書禮部郎中以藝學與蘇源明相善卒官羽林軍録事參軍於公為王父郎中生贈太子太保諱臯以忠孝致大名去官纍以官徵不起追諡貞孝是實生公公在相位三年其後以吏部尚書授節鎮山南年六十以薨贈尚書左僕射諡文公公生三歲知變四聲四歲能為詩七歲而貞孝公卒來弔哭者見其顔色聲容皆相謂權氏世有其人及長好學孝敬祥順貞元八年以前江西府監察御史徵拜博士朝士以得人相慶改左補闕章奏不絶譏排奸幸與陽城為助轉起居舍人遂知制誥凡撰命詞九年以類集為五十卷天下稱其能十八年以中書舍人典貢士拜尚書禮部侍郎薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意奏廣歲所取進士明經在得人不以員拘轉户兵吏三曹侍郎太子賔客復為兵部遷太常卿天下愈推為巨人長德時天子以為宰相宜參用道德人因拜禮部尚書同中書門下平章事公既謝辭不許其所設張舉措必本於寬大以幾教化多所助與維匡調娛不失其正中於和節不為聲章因善與賢不矜主已以吏部尚書留守東都東方諸帥有利病不能自請者公常與疏陳不以露布復拜太常轉刑部尚書考定新舊令式為三十編舉可長用其在山南河南勤于選付治以和簡人以寧便以疾求還十三年某月甲子道薨于洋之白草奏至天子痌傷為之不御朝郎官致贈鍚官居野處上下弔哭皆曰善人死矣其年某月日葬河南北山在貞孝東五里公由陪屬升列年除歲遷以至公宰人皆喜聞若已與無有忌嫉者于頔坐子殺人失位自囚親戚莫敢過門省顧朝莫敢言者公將留守東都為上言曰頔之罪既貰不竟宜因賜寬詔上曰然公為吾行諭之頔以不憂死前後考第進士及庭所策試士踵相躡為宰相達官與公相先後其餘布處臺閣外府凡百餘人自始學至疾未病未常一日去書不觀公既以能為文辭擅聲於朝多銘卿大夫功德然其為家不視簿書未嘗問有亡費不偫餘公娶清河崔氏女其父造嘗相德宗號為名臣既葬其子監察御史璩纍然服喪來有請乃作銘文曰權在商周世無不存滅楚徙秦嬴劉之間甘泉始侯以及安丘詆訶浮屠皇極之扶貞孝之生鳳鳥不至爵位豈多半塗以稅夀考豈多四十而逝惟其不有以惠厥後是生相君為朝德首行世祖之文世師之流連六官出入屏毗無黨無讐舉世莫疵人所憚為公勇為之其所競馳公絶不窺孰克知之德將在斯刻詩墓碑以永厥垂唐故河東節度觀察使滎陽鄭公神道碑韓愈河東節度使贈尚書右僕射鄭公葬在滎陽索上元和八年六月庚子太史尚書比部郎中護軍韓愈刻其墓碑曰司馬氏遷江南有鄭豁者仕慕容垂國為其太子少保其孫簡當拓拔魏為滎陽太守後簡者號其族為南祖南祖之鄭入唐有為利之景谷令者曰嘉範于公為曾祖是生撫俗為泗之徐城令徐城生公之父曰洪卒官凉之户曹參軍公諱儋少依母家隴西李氏舉止異凡兒其舅吏部侍郎季卿謂其必能再立鄭氏稍長能自課學明左氏春秋以進士選為太原參軍事對直言策拜京兆高陵尉考府之進士能第上下以實不奸樊僕射澤以襄陽兵戰淮西公以參謀留府能任後事戶曹殯于凉凉地入西戎自景谷徐城三世皆未還滎陽葬公解官舉五喪為三墓葬索東徐城墓無表公能幼長哀感心求不置以得舊人指告其處其後為大理丞太常博士遷起居郎尚書司封吏部二郎中能官舉其名德宗晚節儲將於其軍以公為河東軍司馬能以無心處嫌間卒用有就貞元十六年將說死即詔授司馬節節度河東軍除其官為工部尚書太原尹兼御史大夫北都留守公之為司馬用寬廉平正得吏士心及升大帥持是道不變部將有因貴人求要職者公不用用老而有功無勢而逺者削四鄰之交賄省姱嬉之大燕校講民事施罷不俟日用能以十月成政氓征就寬軍給以饒十七年疾廢朝夕八月庚戌薨享年六十一天子為之不能臨朝者三日贈尚書右僕射即以其年十月辛卯葬索上疾比薨醫問交道比葬弔贈賜使者相及凡河東軍之士與太原之氓吏及旁九郡百邑之鰥寡外編氓之統於府者聞公之薨皆哭曰吾其如何公與賓客朋遊飲酒必極醉投壺博奕窮日夜若樂而不厭者平居簾閣據几終日不知有人别自號白雲翁名人魁士鮮不與善好樂後進及門接引皆有恩意始娶范陽盧氏女生仁本仁約仁載皆有文行二季舉進士皆早死仁本為後子獨存不樂舉選年三十餘始佐河陽軍後娶趙郡李氏生三女二夫人凡三男五女長女嫁遼東李繁繁亦名臣子有才學遺命二夫人各别為墓不合葬系曰士常患勢卑不能推功德及人常患貧無以奉所欲得若鄭公者勤一生以得其位而曾不得須臾有焉雖然觀其所既立其可知已嗚呼哀哉唐故中散大夫少府監胡良公墓神道碑韓愈少府監胡公者諱珦字潤博年七十九以官卒明年八月十四日葬京兆奉先夫人天水趙氏祔焉其子逞乃巡遇述遷造與公壻廣文博士吳郡張籍以公之族出行治歷官夀年為書使人自京師南走八千里至閩南兩越之界上請為公銘刻之墓碑於潮州刺史韓愈曰胡姓本出安定後徙清河於今為宗城屬貝州大父諱秀武后時以文材徵為麟臺正字父宰臣用進士卒官平陽冀氏令贈潭州大都督公早孤能自勸學立節槩非其身力不以衣食凡一試進士二即吏部選皆以文章占上第樂為儉勤自刻削不干人以矯時弊及為富平尉一府稱其斷决建中四年侍郎趙贊為度支使薦公為監察御史主餽給渭橋以東軍洗手奉職不以一錢假人賊平有司考核羣吏多坐貶死獨公以清苦能檢飭無漏失遷河南倉曹魏公賈耽以節鎮鄭滑以公佐觀察事檢校尚書工部貟外郎以剛直齟齬不阿忤權貴除獻陵令居陵下七年市置田宅務種樹為業以自給教授子弟貞元十一年吏部大遷以公考選人藝學以勞遷奉先令以治辦遷尚書膳部郎中改坊州刺史州經亂無孔子廟公至則命築宫造祭器率博士生講讀以時如法以祠人吏聚觀歎息遷舒州刺史州歲大熟麥一莖數穗閭里歌舞之考功以聞遷尚書駕部郎中數以事犯尚書李巽巽時主鹽鐵事富驕恃勢以語丞相由是退公為鳳翔少尹巽死遷少大理改少詹事元和十二年朝廷以公年老能自祗力事職不懈可喜拜少府監兼知內中尚明年以病卒公始以進士孤身旅長安致官九卿為大家七子皆有學守女嫁名人年幾八十堅悍不衰事可傳載可謂成德銘曰朅朅胡公既果以方挾藝射科每發如望人求於人我巳為之自始訖終不降色辭因官立事隨有可載發跡餽軍遭讒府介去居陵下為吏為隱坊舒之政于兹有靳守官駕部名升已屈躋于少府甚宜秩物不配其有君子恥之少府古卿公優止之刻文碑石以顯公行維公後人無怠嗣慶唐銀青光祿大夫守左散騎常侍致仕上柱國襄陽郡王平陽路公神道碑韓愈惟路氏逺有代序自隋尚書兵部侍郎諱衮四代而至冀公冀公諱嗣恭以小邑蕭關令發聞開元受賜更名書于太史治行靈州終功南邦享有丕祉紹開厥家官至兵部尚書封冀國公薨贈尚書右僕射司空公諱應字從衆冀公之嫡子用大臣子謹飭擢至侍御史著作郎選刺䖍州割餘雩都作縣安逺以利人屬鑿敗灘石以平贛梗陶甓而城罷人屢築詔嗣冀封又加尚書屯田郎中進服色遂臨于溫築隄嶽城橫陽界中二邑得上田除水害拜尚書兵部郎中兼御史中丞淮南軍司馬改刺廬州又甓其城人不歲苫入為尚書職方郎中兼御史中丞佐鹽鐵使使江東有功用半歲歷常州遷至宣歙池觀察使進封襄陽郡王至則出倉米下其估半以廩餓人蜀闢誅行軍千五百人於蜀李錡將反以聞置鄉兵萬二千人錡反命將期以卒救湖常坐牢江東心錡以無助敗縛作響山亭營軍于左右權丞相善之鑱其說響山石居宣五年以疾去位校其倉得石者五十萬餘府得錢十者八十萬公之為州逢水旱喜賤出與人歲熟以其得收常有贏利故在所人不病飢而官府畜積元和六年天子憫公疾不可煩以職即其處拜左散騎常侍以其祿居其歲九月望薨于東都正平里第年六十七明年葬京兆萬年少陵原夫人滎陽鄭氏祔既其子臨漢縣男貫與其弟賞貞謀曰宜有刻也告於叔父御史大夫鄜坊丹延觀察使恕因其族弟進士羣以來請銘遂以其事銘曰冀公之封維艱就功襄陽繼大啓慶自躬于䖍洎溫厥緒既作以及職方遂都邦伯朝夕人事下完上實師于其鄉鄰寇逼屈營居響山牆屋修施褒功刻表丞相之辭受代而家叙疏及邇疾不能延食祿卒齒凡代大家維難其保既顯既願戒于終咎伊我襄陽克慎以有延界後承莫不率守有墓于原維樹在經以告無期博士是銘贈太尉許國公神道碑銘韓愈韓姬姓以國氏其先有自潁川徙陽夏者其地於今為陳之太康太康之韓其稱蓋久然自公始大著公諱宏公之父曰海為人魁偉沈塞以武勇游仕許汴之間寡言自可不與人交衆推以為巨人長者官至游擊將軍贈太師娶鄉邑劉氏女生公是為齊國太夫人夫人之兄曰司徒𤣥佐有功建中貞元之間為宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習騎射事親孝謹侃侃自將不縱為子弟華靡遨放事出入敬恭軍中皆目之嘗一抵京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯勇指付必堪其事司徒歎竒之士卒屬心諸老將皆自以為不及司徒卒去為宋南城將比六七歲汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉為士卒所慕賴者付之今見在人莫如韓甥且其功最大而材又俊即柄授之而請命於天子天子以為然遂自大理評事拜工部尚書代逸淮為宣武軍節度使悉有其舅司徒之兵與地當此時陳許帥曲環死而吳少誠反自將圍許求援於逸淮啖之以陳歸汴使數輩在館公悉驅出斬之選卒三千人㑹諸軍擊少誠許下少誠失勢以走河南無事公曰自吾舅殁五亂於汴者吾苗薅而髮櫛之幾盡然不一揃刈不足令震駴命劉鍔以其卒三百人待命于門數之以數與於亂自以為功并斬之以徇血流波道自是訖公之朝京師草有一年莫敢有歡呶呌號于城郭者李師古作言起事屯兵于曹以嚇滑帥且告假道公使謂曰汝能越吾界而為盜邪有以相待無為空言滑師告急公使謂曰吾在此公無恐或告曰翦棘夷道兵且至矣請備之公曰兵來不除道也不為應師古詐窮變索遷延旋軍少誠以牛皮鞋材遺師古師古以鹽資少誠濳過公界覺皆留輸之庫曰此於法不得以私相餽田𢎞正之開魏博李師道使來告曰我代與田氏約相保援今𢎞正非其族又首變兩河事亦公之所惡我將與成德合軍討之敢告公謂其使曰我不知利害知奉詔行事耳若兵北過河我即東兵以取曹師道懼不敢動𢎞正以濟誅吳元濟也命公都統諸軍曰無自行以遏北寇公請使子公武以兵萬三千人㑹討蔡下歸財與糧以濟諸軍卒擒蔡奸於是以公為侍中而以公武為鄜坊丹延節度使師道之誅公以兵東下進圍考城克之遂進定曹曹寇乞降鄆部既平公曰吾無事於此其朝京師天子曰大臣不可以暑行其秋之待公曰君為仁臣為忠可矣遂行既至獻馬三千匹絹五十萬匹它錦紈綺纈又三萬金銀器千而汴之庫廄錢以貫數者尚餘百萬絹亦合百餘萬匹馬七千糧三百萬斛兵械多至不可數初公有汴承五亂之後掠賞之餘且斂且給恆無宿儲至是公私充塞至於露積不垣冊拜司徒兼中書令進見上殿拜跪給扶贊元經體不治細微天子敬之元和十五年今天子即位公為冡宰又除河中節度使在鎮三年以疾乞歸復拜司徒中書令病不能朝以長慶二年十二月三日薨于永崇里第年五十八天子為之罷朝三日贈太尉賜布粟其葬物有司官給之京兆尹監護明年七月某日葬于萬年縣少陵原京城東南三十里楚國夫人翟氏祔子男二人長曰肅元某官次曰公武某官肅元早死公之將薨公武暴病先卒公哀傷之月餘遂薨無子以公武子孫紹宗為主後汴之南則蔡北則鄆二寇患公居間為已不利卑身佞辭求與公好薦女請昏使日月至既不可得則飛謀釣謗以間染我公先事候情壞其機牙奸不得發王誅以成最功定次孰與高下公子公武與公一時俱授弓鉞處藩為將疆土相望公武以母憂去鎮公母弟充自金吾代將渭北公以司徒中書令治蒲于時弟充自鄭滑節度平宣武之亂以司空居汴自唐以來莫與為比公之為治嚴不為煩止除害本不多教條與人必信吏得其職賦入無所漏失人安樂之在所以富公與人有畛域不為戲狎人得一笑語重於金帛之賜其罪殺人不發聲色問法何如不自為輕重故無敢犯者其銘曰在貞元世汴兵五猘將得其人衆乃一愒其人為誰韓姓許公磔其梟狼養以雨風桑穀奮張厥壤大豐貞元元孫命正我宇公為臣宗處得地所河流雨壖盜連為羣雄唱雌和首尾一身公居其間為帝督奸察其嚬呻與其睨眴左顧失視右顧而跽蔡先鄆鉏三年而墟槁乾四呼終莫敢濡常山幽都孰陪孰扶天施不留其討不逋許公與焉其賚何如悠悠四方既廣既長無有外事朝廷之治許公來朝車馬干戈相乎將乎威儀之多將則是已相則三公釋師十萬歸居廟堂上之宅憂公讓太宰養安蒲坂萬邦絶等有弟有子提兵守藩一時三侯人莫敢扳生莫與榮殁莫與令刻文此碑以鴻厥慶太尉文正王公神道碑銘歐陽修至和二年七月乙未樞密直學士右諫議大夫王素奏事殿中巳而泣且言曰臣之先臣旦相真宗皇帝十有八年今臣素又得待罪侍從之臣惟是先臣之訓其遺業餘烈臣實無似不能顯大而墓碑至今無辭以刻惟陛下哀憐不忘先帝之臣以假寵於王氏而朂其子孫天子曰嗚呼惟汝父旦事我文考真宗叶德一心克終厥位有始有卒其可謂全德元老矣汝素以是刻於碑素拜稽首出明日有詔史館修撰歐陽修曰王旦墓碑未立汝可以銘臣修謹按故推誠保順同德守正翊戴功臣開府儀同三司守太尉充玉清昭應宫使上柱國太原郡開國公贈太師尚書令兼中書令追封魏國公諡曰文正王公諱旦字子明大名莘人也皇曾祖諱言滑州黎陽令追封許國公皇祖諱徹左拾遺追封魯國公皇考諱祜尚書兵部侍郎追封晉國公皆纍贈太師尚書令兼中書令曾祖妣姚氏魯國夫人祖妣田氏秦國夫人妣田氏徐國夫人邊氏秦國夫人公之皇考以文章自顯漢周之際逮事太祖太宗為名臣嘗諭杜重威使無反漢拒盧多遜害趙普之謀以百口明符彥卿無罪故世多稱王氏有陰德公之皇考亦自植三槐于庭曰吾之後世必有為三公者此其所以志也公少好學有文太平興國五年進士及第為大理評事知臨江縣監潭州銀場再遷著作佐郎與編文苑英華遷殿中丞通判鄭濠二州王禹稱薦其材任轉運使驛召至京師辭不受獻其所為文章得試直史館遷右正言知制誥知淳化三年禮部貢舉遷虞部員外郎同判吏部流內銓知考課院右諫議大夫趙昌言參知政事公以壻避嫌求解職太宗嘉之改禮部郎中集賢殿修撰昌言罷復知制誥仍兼修撰判院事召賜金紫久之遷兵部郎中居職真宗即位拜中書舍人數日召為翰林學士知審官院通進銀臺封駮事公為人嚴重能任大事避逺權勢不可干以私由是真宗益知其賢錢若水名能知人常稱公曰真宰相器也若水為樞密副使罷召對苑中問誰可大用者若水言公可真宗曰吾固已知之矣咸平三年又知禮部貢舉居數日拜給事中知樞密院事明年以工部侍郎參知政事再遷刑部侍郎景德元年契丹犯邊真宗幸澶州雍王元份留守東京得暴疾命公馳自行在代元份留守二年遷尚書左丞三年拜工部尚書同中書門下平章事集賢殿大學士監修國史是時契丹初請盟趙德明亦納誓約願守河西故地二邊兵罷不用真宗遂欲以無事治天下公以謂宋興三世祖宗之法具在故其為相務行故事慎所改作進退能否賞罰必當真宗久而益信之所言無不聽雖他宰相大臣有所請必曰王某以謂如何事無大小非公所言不决公在相位十餘年外無侵擾之虞兵革不用海內富實羣工百司各得其職故天下至今稱為賢宰相公於用人不以名譽必求其實茍賢且材矣必久其官而衆以為宜某職然後遷其所薦引人未嘗知寇凖為樞密使當罷使人私公求為使相公大驚曰將相之任豈可求邪且吾不受私請凖深恨之已而制出除準武勝軍節度使同中書門下平章事準入見泣涕曰非陛下知臣何以至此真宗具道公所以薦準者準始愧歎以為不可及故參知政事李穆子行簡有賢行以將作監丞居于家真宗召見慰勞之遷太子中允初遣使者召之不知其所止真宗命至中書問王某然後人知行簡公所薦也公自知制誥至為相薦士尤多其後公薨史官修真宗實録得內出奏章乃知朝廷之士多公所薦者公與人寡言笑其語雖簡而能以理屈人默然終日莫能窺其際及奏事上前羣臣異同公徐一言以定今上為皇太子太子諭德見公稱太子學書有法公曰諭德之職止於是邪趙德明言民饑求糧百萬斛大臣皆曰德明新納誓而敢違請以詔書責之真宗以問公公請勑有司具粟百萬於京師詔德明來取真宗大喜德明得詔書慚且拜曰朝廷有人大中祥符中天下大蝗真宗使人於野得死蝗以示大臣明日他宰相有袖死蝗以進者曰蝗實死矣請示于朝率百官賀公獨以為不可後數日方奏事飛蝗蔽天真宗顧公曰使百官方賀而蝗如此豈不為天下笑邪宦者劉承規以忠謹得幸病且死求為節度使真宗以語公曰承規得此以瞑目公執以為不可曰它日將有求為樞密使者奈何至今內臣官不過留後公任事久人有謗公於上者公輒引咎未嘗自辨至人有過失雖人主盛怒可辨者辨之必得而後巳榮王宫火延前殿有言非天災請置獄劾火事當坐死者百餘人公獨請見曰始失火時陛下以罪已詔天下而臣等皆上章待罪今反歸咎於人何以示信且火雖有迹寧知非天譴邪由是當坐者皆免日者上書言宫禁事坐誅籍其家得朝士所與往還占問吉凶之說真宗怒欲付御史問狀公曰此人之常情且語不及朝廷不足罪真宗怒不解公因自取嘗所占問之書進曰臣少賤時不免為此必以為罪願并臣付獄真宗曰此事巳發何可免公曰臣為宰相執國法豈可自為之幸於不發而以罪人真宗意解公至中書悉焚所得書既而真宗悔復馳取之公曰臣已焚之矣由是獲免者衆公纍官至太保以病求罷入見滋福殿真宗曰朕方以大事託卿而卿病如此因命皇太子拜公公言皇太子盛德必任陛下事因薦可為大臣者十餘人其後不至宰相者李及凌策二人而已然亦皆為名臣公屢以疾請真宗不得已拜公太尉兼侍中五日一朝視事遇軍國大事不以時入參决公益惶恐因卧不起以疾懇辭冊拜太尉玉清昭應宫使自公病使者存問日常三四真宗手自和藥賜之疾亟遽幸其第賜以白金五千兩辭不受以天僖元年九月癸酉薨於家享年六十有一真宗臨哭輟視朝三日發哀于苑中其子弟門人故吏皆被恩澤即以其年十一月庚申葬公于開封府開封縣新里鄉大邊村公娶趙氏封榮國夫人後公五年卒子男三人長曰司封郎中雍次曰贊善大夫冲次曰素女四人長適太子太𫝊韓億次適兵部員外郎直集賢院蘇耆次適右正言范令孫次適龍圖閣直學士兵部郎中吕公弼公事寡嫂謹與其弟旭相友悌尤篤任以家事一無所問而務以儉約率勵子弟使在富貴不知為驕侈兄子睦欲舉進士公曰吾常以太盛為懼其可與寒士爭進至其薨也子素猶未官遺表不求恩澤有文集二十卷乾興元年詔配享真宗廟庭臣修曰景德祥符之際盛矣觀公之所以相而先帝之所以用公者可謂至哉是以君明臣賢德顯名尊生而俱享其榮殁而長配於廟可謂有始有卒如明詔所褒昔者蒸民江漢推大臣下之事所以見任賢使能之功雖曰山甫穆公之詩實歌宣王之德也臣謹考國史實録至於搢紳故老之傳得公終始之節而録其可紀者輒聲為銘詩昭示後世以彰先帝之明以稱聖恩褒顯王氏流澤子孫與宋無極之意銘曰烈烈魏公相我真宗真廟翼翼魏公配食公相真宗不言以躬時有大事事有大疑匪卜匪筮公為蓍龜公在相位終日如默問其內外包裹兵革問其卿士百工以職問其庶民耕織衣食相有賞罰功當罪明相所黜升惟否惟能執其權衡萬物之平孰不事君胡能必信孰不為相其誰有終公薨于位太尉之崇天子孝思來薦清廟侑我聖考惟時元老天子念功報公之隆春秋從享萬祀無窮作為詩歌以諗廟工太子太師致仕贈司空兼侍中文惠陳公神道碑銘并序歐陽修潁川公既葬於新鄭其子尚書主客郎中述古等七人具公之行事及太常之狀祁伯之銘以來告曰唯陳氏世有顯人我先正文惠公歷事太宗真宗而相今天子其出處始終之大節可考不誣如此故敢請以墓隧之碑豫為考其世次得其所以基于初盛于中有于終而大施于其後者曰信哉陳氏載德晦顯以時其畜厚來逺故能發大而流長自公五世以上為博州人皇高祖翔當五代時為王建掌書記建欲帝蜀以逆順禍福譬之不聽棄官于閬州之西水遂為西水人皇曾祖齊國公諱詡皇祖楚國公諱昭汶皇考秦國公諱省華皆開府儀同三司太師尚書令兼中書令自翔已下三世不顯于蜀至秦公始事聖朝為左諫議大夫其配曰燕國太夫人馮氏公其次子也諱堯佐字希元舉進士及第纍遷太常丞知開封府録事參軍用理獄有能績遷府推官以言事切直貶通判潮州自潮還獻詩數百篇而大臣亦薦其文學得直史館知夀廬二州提㸃府界諸縣公事丁秦公憂服除判三司都察院兩浙轉運使徙京西河東河北三路紏察在京刑獄天禧三年編次御試進士坐誤差其第貶監鄂州茶場未至丁燕國太夫人憂明年河決滑州天子念非公不可塞乃起公知滑州乾興元年作永定陵徙公京西轉運使以辦其事入為三司户部副使徙副度支拜知制誥兼史館修撰同知天聖二年貢舉知通進銀臺司遷龍圗閣直學士知河南府徙并州知審官院開封府拜翰林學士兼龍圖閣學士七年拜樞密副使其年八月參知政事居三歲間凡三請罷明道二年罷知永興軍行過鄭州為狂人所誣御史中丞范諷辨公無罪徙知廬州又徙同州復徙永興又徙鄭州纍官至户部侍郎景祐四年四月召拜同中書門下平章事公為人剛毅篤實好古博學居官無大小所至必聞潮州惡溪鱷魚食人不可近公命捕得鳴鼓於市以文告而戮之鱷患屏息潮人歎曰昔韓公諭鱷而聽今公戮鱷而懼所為雖異其能使異物醜類革化而利人一也吾潮間三百年而得二公幸矣在潮修孔子廟韓公祠率其州民之秀者就于學知夀州遭歲大饑公自出米為糜以食餓者吏民以公故皆爭出米共活數萬人公曰吾豈以是為私惠邪蓋以令率人不若身先而使其從之樂也錢塘江堤以竹籠石而潮嚙之不數歲輒壞而復理公歎曰堤以捍患而反病民乃議易以薪土而害公政者言於朝以為非便是時丁晉公參知政事主言者以黜公公爭不已乃徙公京西而籠石為堤數歲功不就民力大困卒用公議堤乃成河東地寒而民貧奏除石炭稅減官冶鐵課歲數十萬以便民曰轉運征利之官也利有本末下有餘則上足吾豈為俗吏哉太行山當河東河北兩路之界公以謂晉自前世為險國常先叛而後服者恃此也其在河東鑿澤州路後徙河北鑿懷州路而太行之險通行者德公以為利公曰吾豈為今日利哉河決壞滑州水力悍甚每歸下湍激并人以沒不見縱跡者不可勝數公躬自暴露晝夜督促創為木龍以巨木駢齒浮水上下殺其暴堤乃成又為長堤以護其外滑人得復其居相戒曰不可使後人忘我陳公因號其堤為陳公堤開封府治京師公以謂治煩之術任威以擊彊盡察以防奸譬於激水而欲其澄也故公為政一以誠信每歲正月夜放燈則悉籍惡少年禁錮之公召少年諭曰尹以惡人待汝汝安得為善吾以善人待汝汝其為惡邪因盡縱之凡五夜無一人犯法者太常博士陳詁知祥符縣縣吏惡其明察欲中以事而詁公廉事不可得乃欲以竒動京師自録事巳下空一縣皆逃去京師果喧言詁政苛暴是時章獻明肅太后猶聽政怒詁欲加以罪公為樞密副使力爭之以謂罪詁則奸人得計而沮能吏詁由是獲免公十典大州六為轉運副使常以方嚴肅下使人知畏而重犯法至其過失則多保佑之故未嘗按黜一下吏公貶潮州其所言事蓋人臣所難言者其平生奏疏尤多悉焚其藁其他文章有文集三十卷又有野廬編潮陽編愚丘集多慕韓愈為文與修真宗實録又修國史故事知制誥者常先試其文辭天子以公文學天下所知不復命試自國朝以來不試而知制誥者惟楊億及公二人而巳公居官不妄進取為太常丞者十三年不遷為起居郎者七年不遷自議錢塘堤為丁晉公所詘後晉公益用事專威福故人子弟以公久于外多勉以進取公曰惟久然後見吾守如是十五年今天子即位晉公事敗投海外公乃見召用公初作相以唐劉蕡所對策進曰天下治亂自朝廷始朝廷賞罰自近始凡蕡之所究言者皆當今之弊此臣所欲言而陛下之所宜行且臣等之職也天子嘉納之公在相位不久其年冬雷地震星象數變公言王隨位在臣上而病不任事程琳等位皆在下乃引漢故事以災異自責求罷章凡四上明年三月拜淮康軍節度使撿校太傅同中書門下平章事判鄭州康定元年五月以太子太師致仕詔大朝會立宰相班遂居于鄭其起居飲食康寧如少者後四年年八十有二以疾卒于家公居家以儉約為法雖巳貴常使其子弟親執賤事曰孔子固多能鄙事作為善針以戒子孫臨卒口占數十言自志其墓公前娶曰杞國夫人宋氏後娶曰沂國夫人王氏子男十人長曰述古次曰比部員外郎求古主客員外郎學古虞部員外郎道古大理評事館閣校勘博古殿中丞修古祕書省正字履古光祿寺丞游古大理寺丞襲古太常寺太視象古秦公三子長曰堯叟為樞密使同中書門下平章事季曰堯咨為武信軍節度使皆舉進士第一人及第三子巳貴秦公尚無恙每賔客至其家公及伯季侍立左右坐客䠞蹜不安求去秦公笑曰此學子輩耳故天下皆以秦公教子為法而以陳氏世家為榮公之孫四十人曾孫二人合伯季之後若子若孫若曾孫六十有八人女若孫曾五十有四人而仕於朝者多以材稱於時嗚呼可謂盛矣銘曰陳氏高節在汚全潔閟德潜光有俟而發其發惟時自公啓之英英伯季踵武偕來相車崇崇武節之雄高幢巨轂四世六公惟世有封秦楚若齊尚書中書儀同太師祖考在前曾孫盈後公居于中伯季左右惟勤其始以享其終惟能其約以有其豐休庸顯問播美家邦有逺其貽有大其繼刻詩垂聲以質來裔資政殿學士户部侍郎文正范公神道碑并序修歐陽皇祐四年五月甲子資政殿學士尚書户部侍郎汝南文正公薨於徐州以其年十有一月壬申葬于河南尹樊里之萬安山下公諱仲淹字希文五代之際世家蘇州事吳越太宗皇帝時吳越獻其地公之皇考從錢俶朝京師後為武寧軍掌書記以卒公生二歲而孤母夫人貧無依再適長山朱氏既長知其世家感泣去之南都入學舍掃一室晝夜講誦其起居飲食人所不堪而公自刻益苦居五年大通六經之㫖為文章論說必本於仁義祥符八年舉進士禮部選第一遂中乙科為廣德軍司理參軍始歸迎其母以養及公既貴天子贈公曾祖蘇州糧料判官諱夢齡為太保祖祕書監諱贊時為太傅考諱墉為太師妣謝氏為吳國夫人公少有大節於富貴貧賤毁譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害為趨捨其所有為必盡其方曰為之自我者當如是其成與否有不在我者雖聖賢不能必吾豈茍哉天聖中晏丞相薦公文學以大理寺丞為祕閣校理以言事忤章獻太后㫖通判河中府久之上記其忠召拜右司諫當太后臨朝聽政時以至日大㑹前殿上將率百官為夀有司巳具公上疏言天子無北面且開後世弱人主以彊母后之漸其事遂巳又上書請還政天子不報及太后崩言事者希㫖多求太后時事欲深治之公獨以謂太后受託先帝保佑聖躬始終十年未見過失宜掩其小故以全大德初太后有遺命立楊太妃代為太后公諫曰太后母號也自古無代立者由是罷其冊命是歲大旱蝗奉使安撫東南使還㑹郭皇后廢率諌官御史伏閣爭不能得貶知睦州又徙蘇州歲餘即拜禮部員外郎天章閣待制召還益論時政闕失而大臣權幸多忌惡之居數月以公知開封府開封素號難治公治有聲事日益簡暇則益取古今治亂安危為上開說又為百官圗以獻曰任人各以其材而百職修堯舜之治不過此也因指其遷進遲速次序曰如此而可以為公可以為私亦不可以不察由是吕丞相怒至交論上前公求對辨語切坐落職知饒州明年吕公亦罷公徙潤州又徙越州而趙元昊反河西上復召相吕公乃以公為陜西經略安撫副使遷龍圖閣直學士是時新失大將延州危公請自守鄜延扞賊乃知延州元昊遣人遺書以求和公以謂無事請和難信且書有僭號不可以聞乃自為書告以逆順成敗之說甚辨坐擅復書奪一官知耀州未逾月徙知慶州既而四路置帥以公為環慶路經略安撫招討使兵馬都部署纍遷諫議大夫樞密直學士公為將務持重不急近功小利於延州築青澗城墾營田復承平永平廢寨熟羌歸業者數萬户於慶州城大順以據要害又城細腰胡蘆於是明珠滅臧等大族皆去賊為中國用自邊制久隳至兵與將常不相識公始分延州兵為六將訓練齊整諸路皆用以為法公之所在賊不敢犯人或疑公見敵應變為如何至其城大順也一旦引兵出諸將不知所向軍至柔逺始號令告其地處使往築城至於版築之用大小畢具而軍中初不知賊以騎三萬來爭公戒諸將戰而賊走追勿過河巳而賊果走追者不渡而河外果有伏賊失計乃引去於是諸將皆服公為不可及公待將吏必使畏法而愛巳所得賜賚皆以上意分賜諸將使自為謝諸蕃質子縱其出入無一人逃者蕃酋來見召之卧內屏人徹衛與語不疑公居三歲士勇邊實恩信大洽乃決策謀取橫山復靈武而元昊數遣使稱臣請和上亦召公歸矣初西人籍為鄉兵者十數萬既而黥以為軍惟公所部但刺其臂公去兵罷獨得復為民其於兩路既得熟羌為用使以守邊因徙屯兵就食內地而紓西人饋挽之勞其所設施去而人德之與守其法不敢變者至今尤多自公坐吕公貶羣士大夫各持二公曲直吕公患之凡直公者皆指為黨或坐竄逐及吕公復相公亦再起被用於是二公歡然相約戮力平賊天下之士皆以此多二公然朋黨之論遂起而不能止上既賢公可大用故卒置羣議而用之慶厯三年春召為樞密副使五讓不許乃就道既至數月以為參知政事每進見必以太平責之公歎曰上之用我者至矣然事有先後而革弊於久安非朝夕可也既而上再賜手詔趣使條天下事又開天章閣召見賜坐授以紙筆使疏于前公惶恐避席始退而條列時所宜先者十數事上之其詔天下興學取士先德行不專文辭革磨勘例遷以别能否減任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥幸之人皆不便因相與騰口而嫉公者亦幸外有言喜為之佐佑㑹邊奏有警公即請行乃以公為河東陜西宣撫使至則上書願復守邊即拜資政殿學士知邠州兼陜西四路安撫使其知政事才一歲而罷有司悉奏罷公前所施行而復其故言者遂以危事中之賴上察其忠不聽是時夏人已稱臣公因以疾請鄧州守鄧三歲求知杭州又徙青州公益病又求知潁州肩舁至徐遂不起享年六十有四方公之病上賜藥存問既薨輟朝一日以其遺表無所請使就問其家所欲贈以兵部尚書所以哀恤之甚厚公為人外和內剛樂善泛愛喪其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其為政所至民多立祀畫像其行巳臨事自縉紳處士里閭田野之人下及婦孺莫不知其名字而樂道其事者甚衆及其世次官爵志于墓譜于家藏于有司者皆不論著著其繫天下國家之大者亦公之志也歟銘曰范於吳越世實陪臣俶納山川及其士民范始來北中間幾息公奮自躬與時偕逢事有罪功言有違從豈公必能天子用公其艱其勞一其初終夏童跳邉乘吏怠安帝命公往問彼驕頑有不聽順鋤其穴根公居三年怯勇隳完兒憐獸擾卒俾來臣夏人在廷其事方議帝趣公來以就豫治公拜稽首兹惟艱哉初匪其難在其終之羣言營營卒壞于成匪惡其成惟公是傾不傾不危天子之明存有顯榮殁有贈諡藏其子孫寵及後世惟百有位可勸無怠鎮安軍節度使同中書門下平章事贈太師中書令程公神道碑銘并序歐陽修惟文簡公既葬之二年其子嗣隆泣而言於朝曰先臣幸得備位將相官階品階第一爵勳階第二請得立碑如令於是天子曰噫惟爾父琳有勞于我國家余其可忘乃大書曰旌勞之碑遣中貴人即賜其家曰以此名爾碑又詔史臣修曰汝為之銘臣修與文簡公故往來知其人又嘗志其墓又嘗述其世德于冀公太師之碑得其世次官封功行最詳乃不敢辭惟公字天球姓程氏曾祖諱新贈太師曾祖妣吳國夫人齊氏祖諱贊明贈太師中書令祖妣秦國夫人吳氏考諱元白袁州宜春令贈太師中書令兼尚書令冀國公妣晉國夫人楚氏公舉大中祥符四年服勤詞學高第試祕書省校書郎泰寧軍節度推官改著作佐郎知并州夀陽縣祕書丞監左藏庫天禧中詔選文學履行召試直集賢院今天子即位遷太常博士三司户部判官㑹修真宗實録而起居注闕命公追修大中祥符八年已後書成遂修起居注遷祠部員外郎提舉諸司庫務以本官知制誥同判吏部流內銓契丹嘗遣使賀上即位命公迓之使者妄有所言公折以理遂屈服其後又遣使賀天聖五年乾元節天子思公前嘗折其使乃以公為館伴使使者果言契丹見中國使者坐殿上位次高而中國見契丹使者位下當遷議者以為小故可許雖天子亦將許之公爭以謂契丹所以與中國好者守先帝約也一切宜用故事若許其小將啓其大天子是之乃止歲中遷右諌議大夫權御史中丞丞相張文節公少所稱許而最知公方除中丞文節當執筆喜曰不辱吾筆矣明年拜樞密直學士知益州公性方重寡言笑凡所處畫常先慮謹備所以條目巨細甚悉至臨事簡嚴僚吏莫能窺其際嘗夜張燈㑹五門大集州民而城中火起吏如公教不以白而隨即救止終宴民去始稍知火監軍得告者言軍謀變懼而入白公笑曰豈有是哉監軍惶惑不敢去公曰軍中動靜吾自知之茍有謀者不能隱也已而卒無事其它多類此蜀妖人自名李冰神子署官屬吏卒以恐蜀人公捕斬之而謗者言公妄殺人蜀且亂天子遣使馳視之使者還言蜀人便公政方安樂而誅妖人所以止亂由是天子益知公賢召為給事中知開封府前為府者苦其治劇或不滿歲罷不然被諍譏或以事去獨公居數歲久而治益精明盜訟稀少獄屢空詔書數下褒美遷工部侍郎龍圗閣學士守御史中丞久之天子思其治召為翰林學士復知開封府明年為三司使不恱茍利不貪近功時議者患民稅多目吏得為奸欲除其名而合為一公以謂合而沒其名一時之便後有興利之臣必復增之是重困民也議者莫能奪其於出入尤謹禁中時有所取未嘗肻豫宦官怒言陛下雖有欲物在程某何可得公曰臣所以為陛下惜爾天子以為然纍遷吏部侍郎景祐四年以本官參知政事公益自信不疑宰相有所欲私輒衆折之其語至今士大夫能道也初范仲淹以言事忤大臣貶饒州已而上悔悟欲復用之稍徙知潤州而惡仲淹者遽誣以事語入上怒亟命置之嶺南自仲淹貶而朋黨之論起朝士牽連出語及仲淹者皆指為黨人公獨為上開說上意解而後已是時元昊叛河西朝廷多故公在政事補益尤多而小人僥幸皆不便遂以事中之坐貶為光祿卿知潁州已而徙知青州又徙大名府居一歲中遷户部吏部二侍郎尚書左丞資政殿學士北京建遂以為留守宦者皇甫繼明方用事主治行宫務廣制度以市恩公為裁抑之與繼明章交上天子遣一御史往視之還直公天子為罷繼明獨委公以建都事公自知政事以論議不私見嫉被貶斥已稍復見用遂與繼明爭曲直由是益不妄合於世雖不復大用而契丹方遣使數有所求兵誅元昊未克西北宿重兵公於是時天子常委以河北陜西之重留守北京凡四年遷工部尚書資政殿大學士河北安撫使慶厯六年拜武昌軍節度使陜西安撫使知永興軍府事明年加宣徽北院使鄜延路經略使馬步軍都部署判延州仍兼陜西安撫使皇祐元年加同中書門下平章事留守北京其於二方威惠信著尤知敵人情僞山川險易行師制敵之要其在延州夏人數百驅畜産至界上請降言契丹兵至衙頭矣國且亂願自歸公曰契丹兵至元昊帳下當舉國取之豈容有來降者乎聞夏人方捕叛族此其是乎不然誘我也拒而不受巳而夏人果以兵數萬臨界上公戒諸堡塞無得數出兵夏人以為有備引去自此不復窺邊公於河北最久民愛之為立生祠明年改武勝軍節度使猶在北京又改鎮安軍節度使在鎮四年猶上書鎮安一郡爾不足以自效願復守邊書未報得疾以至和三年閏三月七日己丑薨于陳州之正寢享年六十有九天子輟視朝二日贈中書令諡曰文簡明年祫享太廟推恩加贈公太師尚書令公纍階至開府儀同三司勳上柱國廣平郡爵公封户七千四百而實封二阡一伯賜號推誠保德守正翊戴功臣娶陳氏封衛國夫人子男四人曰嗣隆太常博士嗣弼殿中丞嗣恭太常博士嗣先大理寺丞女五人皆適良族謹按程氏之先出自重黎至休父為周司馬國於程其後子孫遂以為氏自秦漢以來世有其人程氏必顯而各以其所居著姓後世因之至唐尤盛號稱中山程氏者皆祖魏安鄉侯昱公中山博野人也世有積德至公始大顯聞臣修以謂古者功德之臣進受國寵退而銘於器物非獨私其後世所以不忘君命示國有人而詩人又播其事聲於詠歌以揚無窮今去古逺為制不同而猶有幽堂之石隧道之碑得以紀德昭烈而又幸蒙天子書而名之其所以照臨程氏恩厚寵榮出古逺甚而臣又得刻銘其下銘臣職也懼不能稱銘曰程以國氏世逺支分因居著姓各以其人公世中山在昔有聞克大自公厥聲以振乃秉國鈞乃授將鉞出入其勤險夷一節帝曰噫歟余有勞臣何以旌之有爛其文惟此勞臣實余同德憂國在心匪勞以力二方有事諸將無功俾我舊老不遑居中閒息近藩庶休厥躬有請未報奄云其終殁而後已兹可謂忠惟帝之褒其言甚簡銘以述之萬世丕顯觀文殿大學士行兵部尚書西京留守贈司空兼侍中晏公神道碑銘并序歐陽修至和元年六月觀文殿大學士行兵部尚書西京留守臨淄公以疾歸于京師八月疾少間入見天子曰噫豫舊學之臣也乃留侍講邇英閣詔五日一朝前殿明年正月疾作不能朝敕太醫朝夕往視有司除道將幸其家公歎曰吾無狀乃以疾病憂吾君即馳奏曰臣疾少間行愈矣乃止其月丁亥以公薨聞天子震悼亟臨其喪以不即視公為恨贈公司空兼侍中諡曰元獻有司請輟視朝一日詔特輟二日以其年三月癸酉葬公于許州陽翟縣麥秀鄉之北原既葬賜其墓隧之碑首曰舊學之碑既又勑史臣修考次公事具書于碑下臣修伏讀國史見真宗皇帝時天下無事天子方推讓功德祠祀天地山川講禮樂以文頌聲而儒學文章雋賢偉異之人出公世家江西之臨川年始十四一日起田里進見天子時方親閲天下貢士㑹廷中者千餘人與夫宮臣衛官擁列圜視公不動聲氣操筆為文辭立成以獻天子嘉賞賜同進士出身遂登館閣掌書命以文章為天下所宗逮陛下養德東宫先帝選用臣屬即以公遺陛下由王官宫臣卒登宰相凡所以輔道聖德憂勤國家有舊有勞自始至卒五十餘年公既薨而先帝之名臣與陛下東宫之舊人皆無在者宜其褒寵優異比公甘盤臣修幸得執筆史官奉明詔謹昧死上臨淄公事曰公諱殊字同叔姓晏氏其世次晦顯徙遷不常自其高祖諱墉唐咸通中舉進士卒官江西始著籍于高安其後三世不顯曽祖諱延昌又徙其籍于臨川祖諱郜追封英國公考諱固追封秦國公自曾祖巳下皆用公貴纍贈開府儀同三司太師中書令兼尚書令曾祖妣張氏陳國太夫人祖妣傅氏許國太夫人妣吳氏唐國太夫人公生七歲知學問為文章鄉里號為神童故丞相張文節公安撫江西得公以聞真宗召見既賜出身後二日又召試詩賦論公徐啓曰臣嘗私習此賦不敢隱真宗益嗟異之因試以他題以為祕書省正字置之祕閣使得悉讀祕書命故僕射陳文僖公視其學明年獻其所為文召試中書遷太常寺奉禮郎封祀太山推恩遷光祿寺丞數月充集賢校理明年遷著作佐郎丁父憂去官已而真宗思之即其家起復命淮南發運使具舟送之京師從祀太清宫賜緋衣銀魚同判太常禮院又丁母憂求去官服喪不許今天子始封升王公以選為府記室參軍再遷左正言直史館今天子為皇太子以户部貟外郎充太子舍人賜金紫知制誥判集賢院遷翰林學士充景靈宫判官太子左庶子兼判太常寺知禮儀院公既以道德文章佐佑東宫真宗每所咨訪多以方寸小紙細書問之由是參與機密凡所對必以其藁進示不泄其後悉閲真宗閣中遺書得公所進藁類為八十卷藏之禁中人莫之見也初真宗遺詔章獻明肅太后權聽軍國事宰相丁謂樞密使曹利用各欲獨見奏事無敢決其議者公建言羣臣奏事太后者垂簾聽之皆毋得見議遂定乾興元年拜右諫議大夫兼侍讀學士遷給事中景靈宫副使判吏部流內銓以易侍講崇政殿遷禮部侍郎知審官院為樞密副使遷刑部侍郎上疏論張耆不可為樞密使由是忤太后㫖坐以笏擊其僕誤折其齒罷留守南京大興學校以教諸生自五代以來天下學廢興自公始召拜御史中丞改兵部侍郎兼祕書監資政殿學士翰林侍讀學士知天聖八年禮部貢舉明年為三司使復為樞密副使未拜改參知政事遷尚書左丞太后謁太廟有請服衮冕者太后以問公公以周官后服對太后崩大臣執政者皆罷公為禮部尚書知亳州徙知陳州遷刑部尚書復召為御史中丞又為三司使知樞密院事拜樞密使再加檢校太尉同中書門下平章事慶厯三年三月遂以刑部尚書居相位充集賢殿大學士兼樞密使自公復召用而趙元昊反師出陜西天下弊於兵公數建利害請罷監軍兼以陳圗授諸將使得應敵為攻守及制財用為出入之要皆有法天子悉為施行自宫禁先以率天下而財賦之職悉歸有司卒能以謀臣元昊使聽約束乃還其王號公為人剛簡遇人必以誠雖處富貴如寒士樽酒相對歡如也得一善稱之如已出當世知名之士如范仲淹孔道輔等皆出其門及為相益務進賢材當公居相府時范仲淹韓琦富弼皆進用至於臺閣多一時之賢天子既厭西兵閔天下困弊奮然有意遂欲因羣材以更治數詔大臣條天下事方施行而小人權幸皆不便明年秋㑹公以事罷而仲淹等相次亦皆去事遂已公既罷以工部尚書知潁州徙知陳州又徙許州三遷戶部尚書拜觀文殿大學士知永興軍充一路都部署安撫使徙知河南府兼西京留守纍進階至開府儀同三司勳上柱國爵臨淄公食邑萬二千户實封三千七百户公享年六十有五自少篤學至其病亟猶手不釋卷有文集二百四十卷嘗奉勑修上訓及真宗實録又集類古今文章為集選二百卷其為政敏而務以簡便其民其於家嚴子弟之見有時事寡姊孝謹未嘗為子弟求恩澤其在陳州上問宰相曰晏某居外未嘗有所請其亦有所欲邪宰相以告公公自為表問起居而巳故其薨也天子尤哀悼之賜豫加等以其子承裕為崇文院檢討孫及甥之未官者九人皆命以官公初娶李氏工部侍郎虛巳之女次孟氏屯田員外郎虛舟之女封巨鹿郡夫人次王氏太師尚書令超之女封榮國夫人子八人長曰居厚大理評事早卒次承裕尚書屯田員外郎宣禮贊善大夫崇讓著作佐郎明逺祗德皆大理評事幾道傳正皆太常寺太祝女六人長適户部侍郎同中書門下平章事富弼次適禮部侍郎三司使楊察其四尚幼孫十有二人公既樂善而稱為知人士之顯于朝者多公所薦達至擇其女之所從又得二人者如此可謂賢也巳銘曰有姜之裔齊為晏氏齊在春秋晏顯諸侯傳載桓子嬰稱于丘其後無聞不亡僅存有煒自公厥聲以振公之顯聲實相天子天子曰噫豫考真宗唯多名臣以臻盛隆汝初事我王官東宫以暨相豫始卒一躬輔我以德有勞於邦公疾在外來歸自洛天子曰留汝豫舊學凡今在庭莫如汝舊孰以畀豫唯豫聖考今既亡矣孰為豫老何以贈之司空侍中禮則有加豫思何窮有篆其文在其碑首天子之褒史臣有詔銘以述之永昭厥後贈刑部尚書余襄公神道碑銘並序歐陽修始興襄公既葬于曲江之明年其子仲荀走于亳以來告曰余氏世為閩人五代之際逃亂于韶自曾高以來晦迹嘉遁至于博士府君始有祿仕而襄公繼之以大曲江僻在嶺表自始興張文獻公有聲于唐為賢相至公復出為宋名臣蓋余氏徙韶歷四世始有顯仕而曲江寂寥三百年然後再有聞人惟公位登天臺正秩三品遂有爵土開國鄉州以繼美前哲而為韶人榮至於褒恤贈諡始終之寵盛矣蓋褒有詔恤有物贈有告而諡行考功有議有狀合而志之以閟諸幽有銘可謂備矣惟是螭首龜趺揭於墓隧以表見於後世而昭示其子孫者宜有辭而闕焉謹以為請謹按余氏韶州曲江人曾祖諱某祖諱某皆不仕父諱某太常博士纍贈太常少卿公諱靖字安道官至朝散大夫守工部尚書集賢院學士知廣州軍州事兼廣南東路兵馬鈐轄經略安撫使柱國始興郡開國公食邑二千六百户食實封二百户治平元年自廣朝京師六月癸亥以疾薨于金陵天子惻然輟視朝一日賻以粟帛贈刑部尚書諡曰襄明年七月某甲子返葬于曲江之龍歸鄉成山之原公為人質重剛徑而言語恂恂不見喜怒自少博學强記至於歷代史記雜家小說陰陽律厯外暨浮屠老子之書無所不通天聖二年舉進士為贑縣尉書判拔萃改將作監丞知新建縣再遷祕書丞刋校三史充集賢校理天章閣待制范公仲淹以言事觸宰相得罪諌官御史不敢言公疏論之坐貶監筠州酒稅稍徙泰州已而天子感悟亟復用范公而因之以被斥者皆召還惟公以便親乞知英州遷太常博士丁母憂服除遂還為集賢校理同判太常禮院景祐慶厯之間天下怠於久安吏習因循多失職及趙元昊以夏叛師出久無功縣官財屈而民重困天子赫然思振頺弊以修百度既已更用二三大臣又增置諫官四員使言天下事公其一人也即改右正言供職公感激奮勵遇事輒言無所回避奸諛權幸屏息畏之其補益多矣然亦不勝其怨嫉也慶厯四年元昊納誓請和將加封冊而契丹以兵臨境上遣使言為中國討賊且告師期請止毋與和朝廷患之欲聽重絶夏人而兵不得息不聽生事北邉議未决公獨以謂中國厭兵久矣此契丹之所幸一日使吾息兵養勇非其利也故用此以撓我爾是不可聽朝廷雖是公言猶留夏冊不遣而假公諌議大夫以報公從十餘騎馳出居庸關見敵於九十九泉從容坐帳中辨言往復數十卒屈其議取其要領而還朝廷遂發夏冊臣元昊西師既解嚴而北邊亦無事是歲以本官知制誥史館修撰而契丹卒自攻元昊明年使來告捷又以公往報坐習蕃語出知吉州怨家因之中以事左遷將作少監分司南京公怡然還鄉里闔門謝賔客絶人事凡六年天子每思之欲用者數矣大臣有不喜者第遷光祿少卿于家又以為某衛將軍夀州兵馬鈐轄辭不拜皇祐二年祀明堂覃恩遷衛尉卿明年知䖍州丁父憂去官而蠻賊儂智高陷雍州連破嶺南州縣圍廣州乃即廬中起公為祕書監知潭州即日疾馳在道改知桂州廣南西路經略安撫使公奏曰賊在東而徙臣西非臣志也天子嘉之即詔公經制廣東西賊盜乃趨廣州而智高復西走雍州自智高初起交趾請出兵助討賊詔不許公以謂智高交趾叛者宜聽出兵毋阻其善意纍疏論之不報至是公曰雍州與交趾接境今不納必忿而反助智高乃以便宜趣交趾㑹兵又募儂黃諸姓酋豪皆縻以職與之誓約使聽節制或疑其不可用公曰使不與智高合足矣及智高入雍州遂無外援既而宣撫使狄青㑹公兵敗賊於歸仁智高走入海雍州平公請復終喪不許諸將班師以智高尚在請留公廣西委以後事遷給事中諫官御史列疏言公功多而賞薄再遷尚書工部侍郎公留廣西逾年撫輯完復嶺海肅然又遣人入特磨襲取智高母及其弟一人俘于京師斬之拜集賢院學士久之徙知潭州又徙青州再遷吏部侍郎嘉祐五年交趾寇雍州殺五巡檢天子以謂恩信著於嶺外而為交趾所畏者公也驛召以為廣西體量安撫使悉發荆湖兵以從公至則移檄交趾召其臣費嘉祐詰責之嘉祐皇恐對曰種落犯邊罪當死願歸取首惡以獻即械五人送欽州斬於界上公還雍人遮道留之不得明年以尚書左丞知廣州英宗即位拜工部尚書代還道病卒享年六十有五公經制五管前後十年凡治六州所至有惠愛雖在兵間手不釋卷有文集二十卷奏議五卷三史刋誤四十卷娶林氏封魯郡夫人子男三人伯莊殿中丞早卒仲荀今為屯田員外郎叔英太常寺太祝女六人皆適士族孫四人孫女五人銘曰余遷曲江仍世不顯奮自襄公有聲甚逺始興開國襲美于前兩賢相望三百年間偉歟襄公惟邦之直始登于朝官有言責左右獻納奸諛屏息慶厯之治實多補益逢時有事奔走南北功書史官名在異域出入艱勤險夷一德小人之讒公廢千里一方有警公起于家威行信結嶺海幽遐公之在焉帝不南顧胡召其還殞于中路返柩來歸韶人負土伐石刻辭立于墓門以貽來世匪止韶人尚書度支郎中天章閣待制王公神道碑并序修歐陽公諱質字子野其先大名莘人自唐同光初公之皇曾祖魯公舉進士第一顯名當時官至右拾遺歷晉漢周而皇祖晉公益以文章有大名逮事太祖太宗官至兵部侍郎當真宗時伯父文正公居中書二十餘年天下稱為賢宰相今天子慶厯三年公與其弟素皆待制天章閣自同光至慶厯蓋百有二十餘年王氏更四世世有顯人或以文章或以功德公生纍世富貴而操履甚於寒士性篤孝悌厚於朋友樂施與以賙人而妻子常不自給視榮利淡若無意平居苦疾病退然如不自勝及臨事介然有仁者之勇君子之剛樂人之善如自己出初范仲淹以言事貶饒州方治黨人甚急公獨扶病率子弟餞于東門留連數日大臣有以讓公曰長者亦為此乎何苦自陷朋黨公徐對曰范公天下賢者顧某何敢望之然若得為黨人公之賜某厚矣聞者為公縮頸其為待制之明年出守于陜又明年小人連搆大獄坐貶廢者十餘人皆公素所賢者聞之悲憤歎息或終日不食因數劇飲大醉公既素病益以酒遂卒公初以廕補太常寺太祝監都進奏院獻其文章召試賜進士及第校勘館閣書籍遂為集賢校理通判蘇州州守黃宗旦負材自喜頗以新進少公議事則曰少年乃與丈人爭事耶公曰受命佐君事有當爭職也宗旦雖屢屈折而政常得無失稍德公助已為之加禮宗旦得盜鑄錢者百餘人以詫公公曰事發無跡何從得之曰吾以術鈎出之公愀然曰仁者之政以術鉤人置之死而又喜乎宗旦慚服悉緩出其獄始大稱公曰君子也判尚書刑部吏部南曹知蔡州始至發大奸吏一人去之繩諸豪猾以法與轉運使爭曲直事有下而不便者皆格不用既去其害政者然後崇學校一以仁恕臨下其政知寬猛必使吏畏而民愛其為他州州率大而難治必常有善政皆用此入為開封府推官巳而其兄雍為三司判官公曰省府皆要職吾豈可兄弟居之求知夀州徙廬州盜有殺其徒而并其財者獲之置于法大理駮曰法當原公以謂盜殺其徒而自首者原之所以疑壞其黨而開其自新若殺而不首既獲而亦原則公行為盜而第殺一人既得兼其財又可以贖罪不獲則肆為盜獲則引以自原如此盜不可止非法意疏三上不能爭公嘆曰吾不勝法吏矣乃上書自劾請不坐佐吏公坐貶監靈仙宫其後議者更定不首之罪卒用公言為是而公貶猶不召資政殿學士鄭戩翰林學士葉清臣訟公無罪始起知泰州遷荆湖北路轉運使當用兵西方急於財用之時獨不進羡餘其賦斂近寬平治以常法故他路不勝其弊而荆湖之人自若權知荆南府民有訟婚者訴曰貧無資故後期問其用幾何以俸錢與之使婚獲盜竊人衣者曰迫於飢寒而為之公為之哀憐取衣衣之遣去荆人比公為子産召為史館修撰遂拜天章閣待制判吏部流內銓號為稱職而於選法未嘗有所更易人或問之公曰選法具備如權衡在執者不欺其輕重耳何必屢更其法是歲天子開天章閣召大臣問天下事以手詔責范公等而議事者爭言天下利害務欲更革諸事公獨無一言問之則曰吾病未能也公於榮利既薄臨禍福不為喜懼其視世事若無一可以動其心者惟以天下善人君子亨否為巳休戚遂以此卒此其為志豈小哉豈以病而不能者哉公誠素病而任之以事所至必皆有為使其夀且不死而用其必有所為豈其不欲空言而巳者哉嗚呼公享年四十有五官至度支郎中階朝奉大夫勳上護軍爵平晉男娶周氏某縣君生子某曾祖諱某祖諱某皆贈太師尚書中書令考諱某官至兵部郎中有賢行贈户部尚書公以某年某月某日卒於陜某年某月某日葬于某所先塋之次銘曰仕不為利以行其仁處豐自薄而清厥身其仁誰思不在吏民其清孰似以遺子孫銘以昭之以告後人司馬溫公神道碑蘇軾上即位之三年朝廷清明百揆時叙民安其生風俗一變異時薄夫鄙人皆洗心易德務為忠厚人人自重恥言人過中國無事四夷稽首請命惟西羌夏人叛服不常懷毒自疑數入為寇上命諸將按兵不戰示以形勢不數月生致大首領果莊青伊結闕下夏人十數萬寇涇原至鎮戎城下五日無所得一夕遁去而西羌兀征聲延以其族萬人來降黃河始決曹村既築靈平復決小吳橫流五年朔方騷然而今歲之秋積雨彌月河不大溢及冬水入地益深有北流赴海復禹舊迹之勢凡上所欲不求而獲而其所惡不麾而去天下曉然知天意與上合庶幾復見至治之成家給人足刑措不用如咸平景德間也或以問臣軾上與太皇太后安所施設而及此臣軾對曰在易大有上九自天祐之吉無不利孔子曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利今二聖躬信順以先天下而用司馬公以致天下士應是三德矣且以臣觀之公仁人也天相之矣何以知其然也曰公以文章名於世而以忠義自結人主朝廷知之可也四方之人何自知之士大夫知之可也農商走卒何自知之中國知之可也九夷八蠻何自知之方其退居於洛眇然如顔子之在陋巷纍然如屈原之在陂澤其與民相忘也久矣而名震天下如雷霆如河漢如家至而日見之聞其名者雖愚無知如婦人孺子勇悍難化如軍伍卒徒以至於奸邪小人雖惡其害巳仇而疾之者莫不斂袵變色咨嗟太息或至於流涕也元豐之末臣自登州入朝過八州以至京師民知其與公善也所在數千人聚而號呼於馬首曰寄謝司馬丞相慎毋去朝廷厚自愛以活百姓如是者蓋千餘里不絶至京師聞士大夫言公初入朝民擁其馬至不得行衛士見公擎跽流涕者不可勝數公懼而歸洛遼人夏人遣使入朝與吾使至彼國者彼必問公起居而遼人勑其邊吏曰中國相司馬矣愼毋生事開邊隙其後公薨京師之民罷市而往弔粥衣以致奠巷哭以過車者蓋以千萬數上命户部侍郎趙瞻內侍省押班馮宗道護其喪歸葬瞻等既還皆言民哭公哀甚如哭其私親四方來㑹葬者蓋數萬人而嶺南封州父老相率致祭且作佛事以薦公者其詞尤哀炷薌於手頂以送公葬者凡百餘人而畫像以祠公者天下皆是也此豈人力也哉天相之也匹夫而能動天亦必有道矣非至誠一德其孰能使之記曰惟天下之至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育矣書曰惟尹躬暨湯咸有一德克享天心又曰德惟一動罔不吉德二三動罔不凶或以千金與人而人不喜或以一言使人而人死之者誠與不誠故也稽天之潦不能終朝而一線之溜可以達石者一與不一故也誠而一古之聖人不能加毫末於此矣而况公乎故臣論公之德至於感人心動天地巍巍如此而蔽之以二言曰誠曰一公諱光字君實其先河內人晉安平獻王孚之後王之裔孫征東大將軍陽始葬今陜州夏縣涑水鄉子孫因家焉曾祖諱政以五代衰亂不仕贈太子太保祖諱炫舉進士試祕書省校書郎終於耀州富平縣令贈太子太傅考諱池寶元慶厯間名臣終於兵部郎中天章閣待制贈太師溫國公曾祖妣薛氏祖妣皇甫氏妣聶氏皆封溫國太夫人公始以進士甲科事仁宗皇帝至天章閣待制知諫院始發大議乞立宗子為後以安宗廟宰相韓琦等因其言遂定大計事英宗皇帝為諫議大夫龍圖閣直學士論陜西刺義勇為民患及內侍任守忠奸蠧乞斬以謝天下守忠竟以譴死又論濮安懿王當準先朝封贈期親尊屬故事天下義之事神宗皇帝為翰林學士御史中丞西戎部將嵬名山欲以橫山之衆降公極論其不可納後必為邊患已而果然勸帝不受尊號遂為萬世法及王安石為相始行青苗助役農田水利謂之新法公首言其害以身爭之當時士大夫不附安石言新法不便者皆倚公為重帝以公為樞密副使公以言不行不受命乃以為端明殿學士出知永興軍遂以留司御史臺及提舉崇福宫退居於洛十有五年及上即位太皇太后攝政起公為門下侍郎遷正議大夫遂遷左僕射公首更詔書以開言路分别邪正進退其甚者十餘人旋罷保甲保馬市易及諸道新行鹽鐵茶法最後遂罷助役青苗方議取士擇守令監司以養民期於富而教之凛凛嚮至治矣而公卧病以元祐元年九月丙辰朔薨于位享年六十八太皇太后聞之慟上亦感涕不已時方祀明堂禮成不賀二聖皆臨其喪哭之哀甚輟視朝贈太師溫國公襚以一品禮服諡曰文正官其親屬十人公娶張氏禮部尚書存之女封清河郡君先公卒追封溫國夫人子三人童唐皆早亡康今為祕書省校書郎孫二人植柏皆承奉郎以元祐二年正月辛酉葬于陜之夏縣涑水南原之眺村上以御篆表其墓道曰忠清粹德之碑而其文以命臣軾臣蓋嘗為公行狀而端明殿學士范鎮取以志其墓矣故其詳不復再見而獨論其大槩議者徒見上與太皇太后進公之速用公之盡而不知神宗皇帝知公之深也自士庶人至于卿大夫相與為賓師朋友道足以相信而權不足以相休戚然猶同巳則親之異已則踈之未有聞過而喜受誨而不怒者也而况於君臣之間乎方熙寧中朝廷政事與公所言無一不相違者書數十上皆盡言不諱蓋自敵以下所不能堪而先帝安受之非特不怒而已乃欲以為左右輔弼之臣至為叙其所著書讀之於邇英閣不深知公而能如是乎二聖之知公也知之於既同而先帝之知公也知之於方異故臣以先帝為難昔齊神武皇帝寢疾告其子世宗曰侯景專制河南十四年矣諸將皆莫能敵惟慕容紹宗可以制之我故不貴留以遺汝而唐太宗亦謂高宗汝於李績無恩我今責出之汝當授以僕射乃出績為疊州都督夫齊神武唐太宗雖未足以比隆先帝而紹宗與績亦非公之流然古之人君所以為其子孫長計逺慮者類皆如此寧其身不受知人之名而使其子專享得賢之利先帝知公如此而卒不盡用安知其意不出於此乎臣既書其事乃拜手稽首而作詩曰於皇上帝子惠我民孰堪顧天惟聖與仁聖子受命如堯之初神母詔之匪亟匪徐聖神無心孰左右之民自擇相我興授之其相惟何太師溫公公來自西一馬二童萬人環之如渴赴泉孰不見公莫如我先二聖忘已惟公是式公亦無我惟民是度民曰樂哉既相司馬爾賈于途我耕于野士曰時哉既用君實我後子先時不可失公如麟鳳不鷙不搏羽毛畢朝雄狡率服為政一年疾病半之功則多矣百年之思知公于異識公于微匪公之思神考是懷天子萬年四方來同薦于清廟神考之功文編卷五十八

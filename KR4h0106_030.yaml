body:
  text: 文編卷三十明唐順之編過秦論賈誼秦并兼諸侯山東三十餘郡繕津關據險塞修甲兵而守之然陳涉以戍卒散亂之衆數百奮臂大呼不用弓㦸之兵鉏耰白挺望屋而食橫行天下秦人阻險不守關梁不闔長㦸不刺強弩不射楚師深入戰於鴻門曾無藩籬之艱於是山東大擾諸侯並起豪俊相立秦使章邯將而東征章邯因以三軍之衆要市於外以謀其上羣臣之不信可見於此矣子嬰立遂不悟藉使子嬰有庸主之才僅得中佐山東雖亂秦之地可全而有宗廟之祀未當絶也秦地被山帶河以為固四塞之國也自繆公以來至於秦王二十餘君常為諸侯雄豈世世賢哉其勢居然也且天下嘗同心并力而攻秦矣當此之世賢智竝列良將行其師賢相通其謀然困於阻險而不能進秦乃延入戰而為之開關百萬之徒逃北而遂壞豈勇力智慧不足哉形不利勢不便也秦小邑并大城守險塞而軍髙壘毋戰閉關據厄荷㦸而守之諸侯起於匹夫以利合非有素王之行也其交未親其下未附名為亡秦其實利之也彼見秦阻之難犯也必退師安土息民以待其敝收弱扶疲以令大國之君不患不得意於海內貴為天子富有天下而身為禽者其救敗非也秦王足巳不問遂過而不變二世受之因而不改暴虐以重禍子嬰孤立無親危弱無輔三主惑而終身不悟亡不亦宜乎當此時也世非無深慮知化之士也然所以不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮沒矣故使天下之士傾耳而聽重足而立拑口而不言是以三主失道忠臣不敢諫智士不敢謀天下巳亂奸不上聞豈不哀哉先王知雍蔽之傷國也故置公卿大夫士以飾法設刑而天下治其強也禁暴誅亂而天下服其弱也五伯征而諸侯從其削也內守外附而社稷存故秦之盛也繁法嚴刑而天下振及其衰也百姓怨而海內叛矣故周五序得其道而干餘歲不絶秦本末並失故不長久由此觀之安危之統相去逺矣野諺曰前事不忘後事之師也是以君子為國觀之上古驗之當世參以人事察盛衰之理審權勢之宜去就有序變化應時故曠日長久而社稷安矣秦孝公據殽函之固擁雍州之地君臣固守以窺周室有席卷天下包舉宇內囊括四海之意並吞八荒之心當是時也商君佐之內立法度務耕織修守戰之備外連衡而鬭諸侯於是秦人拱手而取西河之外孝公既沒惠文武昭襄䝉故業因遺䇿南兼漢中西舉巴蜀東割膏腴之地北收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥美之地以致天下之士合從締交相與為一當是時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明智而忠信寬厚而愛人尊賢重士約從離衡并韓魏燕趙齊楚宋衛中山之衆於是六國之士有寧越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫昭滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵嘗以十倍之地百萬之衆叩關而攻秦秦人開關延敵九國之師逡巡遁逃而不敢進秦無亡矢遺鏃之費而天下諸侯巳困矣於是從散約解爭割地而奉秦秦有餘力而制其敝追亡逐北伏尸百萬流血漂櫓因利乘便宰割天下分裂河山強國請服弱國入朝延及孝文王莊襄王享國日淺國家無事及至秦王續六世之餘烈振長策而御宇內吞二周而亡諸侯履至尊而制六合執捶柎以鞭笞天下威振四海南取百越之地以為桂林象郡百越之君俯首繫頸委命下吏乃使䝉恬北築長城而守藩籬却胸奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱黔首之民然後斬華為城因河為池據億丈之城臨不測之溪以為固良將徑弩守要害之處信臣精卒陳利兵而誰何天下巳定秦王之心自以為關中之固金城千里子孫帝王萬世之業也秦王既沒餘威振於殊俗陳涉甕牖繩樞之子氓𨽻之人而遷徙之徒才能不及中人非有仲尼墨翟之賢陶朱倚頓之富躡足行伍之間而倔起什伯之中率罷散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗天下雲集響應贏糧而景從山東豪俊遂竝起而亡秦族矣且夫天下非小弱也雍州之地殽函之固自若也陳涉之位非尊於齊楚燕趙韓魏宋衛中山之君鉏耰棘矜非錟於句㦸長鎩也適戍之衆非抗於九國之師也深謀逺慮行軍用兵之道非及鄉時之士也然而成敗異變功業相反也試使山東之國與陳涉度長潔大比權量力則不可同年而語矣然秦以區區之地致萬乘之權招八州而朝同列百有餘年矣然後以六合為家殽函為宫一夫作難而七廟隳身死人手為天下笑者何也仁義不施而攻守之勢異也秦并海內兼諸侯南面稱帝以養四海天下之士靡然鄉風若是者何也曰近古之無王者久矣周室卑微五霸既沒令不行於天下是以諸侯力政彊侵弱衆暴寡兵革不休士民罷敝今秦南面而王天下是上有天子也既元元之民冀得安其性命莫不虛心而仰上也當此之時守威定功安危之本在於此矣秦王懷貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁文書而酷刑法先詐力而後仁義以暴虐為天下始夫並兼者髙詐力安定者貴順權此言取與守不同術也秦離戰國而王天下其道不易其政不改是其所以取之守之者異也孤獨而有之故其亡可立而待借使秦王計上世之事竝殷周之迹以制御其政後雖有淫驕之主而未有傾危之患也故三王之建天下名號顯美功業長久今秦二世立天下莫不引領而觀其政夫寒者利裋褐而饑者甘糟糠天下之嗸嗸新主之資也此言勞民之易為仁也鄉使二世有庸主之行而任忠賢臣主一心而憂海內之患縞素而正先帝之過裂地分民以封功臣之後建國立君以禮天下虛囹圄而免刑戮除去收帑汚穢之罪使各返其鄉里發倉廪散財幣以振孤獨窮困之士輕賦少事以佐百姓之急約法省刑以持其後使天下之人皆得自新更節修行各慎其身塞萬民之望而以威德與天下天下集矣即四海之內皆歡然各自安樂其處惟恐有變雖有狡猾之民無離上之心則不軌之臣無以飾其智而暴亂之姦止矣二世不行此術而重之以無道壞宗廟與民更始作阿房宫繁刑嚴誅吏治刻深賞罰不當賦斂無度天下多事吏弗能紀百姓窮困而主弗收恤然後姦僞並起而上下相遁䝉罪者衆刑戮相望於道而天下苦之自君卿以下至於衆庶人懷自危之心親處窮困之實咸不安其位故易動也是以陳涉不用湯武之賢不藉公侯之尊奮臂於大澤而天下響應者其民危也故先王見始終之變知存亡之機是以牧民之道務在安之而已天下雖有逆行之臣必無響應之助矣故曰安民可與行義而危民易與為非此之謂也封建論柳宗元天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰有初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之也勢不可也勢之來其生人之初乎不初無以有封建封建非聖人意也彼其初與萬物皆生草木榛榛鹿豕狉狉人不能搏噬而且無毛羽莫克自奉自衛荀卿有言必將假物以為用者也夫假物者必爭爭而不已必就其能斷曲直者而聽命焉其智而明者所伏必衆告之以直而不改必痛之而後畏由是君長刑政生焉故近者聚而為羣羣之分其爭必大大而後有兵有德又有大者衆羣之長又就而聽命焉以安其屬於是有諸侯之列則其爭又有大者焉德又大者諸侯之列又就而聽命焉以安其封於是有方伯連帥之類則其爭又有大者焉德又大者方伯連帥之類又就而聽命焉以安其人然後天下會於一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子自天子至於里胥其德在人者死必求其嗣而奉之故封建非聖人意也勢也夫堯舜禹湯之事逺矣及有周而甚詳周有天下裂土田而瓜分之設五等邦羣后布履星羅四周於天下輪運而輻集合為朝覲會同離為守臣扞城然而降於夷王害禮傷尊下堂而迎覲者歷於宣王挾中興復古之德雄南征北伐之威卒不能定魯侯之嗣陵夷迄於幽厲王室東徙而自列為諸侯厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇𢎞者有之天下乖戾無君君之心余以為周之喪久矣徒建空名於公侯之上耳得非諸侯之盛彊末大不掉之咎歟遂判為十二合為七國威分於陪臣之邦國殄於後封之秦則周之敗端其在乎此矣秦有天下裂都會而為之郡邑廢侯衛而為之守宰据天下之雄圖都六合之上游攝制四海運於掌握之內此其所以為得也不數載而天下大壞其有由矣亟役萬人暴其威刑竭其貨賄負鋤挺謫戍之徒圜視而合從大呼而成羣時則有叛人而無叛吏人怨於下而吏畏於上天下相合殺守劫令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉狥周之制剖海內而立宗子封功臣數年之間奔命扶傷之不暇困平成病流矢陵遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡國居半時則有叛國而無叛郡秦制之得亦以明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域者失不在於州而在於兵時則有叛將而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者茍其心思遷其秩而巳何能理乎余又非之周之事迹斷可見矣列侯驕盈黷貨事戎大凡亂國多理國寡侯伯不得變其政天子不得變其君私土子人者百不有一失在於制不在於政周事然也秦之事迹亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得行其理酷刑苦役而萬人側目失在於政不在於制秦事然也漢興天子之政行於郡不行於國制其守宰不制其侯王侯王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而移之耳大逆未彰姦利浚財怙勢作威大刻于民者無如之何及夫郡邑可謂理且安矣何以言之且漢知孟舒於田叔得魏尚於馮唐聞黃霸之明審覩汲黯之簡靖拜之可也復其位可也卧而委之以輯一方可也有罪得以黜有能得以賞朝拜而不道夕斥之矣夕受而不法朝斥之矣設使漢室盡城邑而侯王之縱令其亂人戚之而巳孟舒魏尚之術莫得而施黃霸汲黯之化莫得而行明譴而導之拜受而退已違矣下令而削之締交合從之謀周於同列則相顧裂眦勃然而起幸而不起則削其半削其半民猶瘁矣曷若舉而移之以全其人乎漢事然也今國家盡制郡邑連制守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循不革而二姓陵替不聞延祚今矯而變之垂二百祀大業彌固何繫於諸侯哉或者又以為殷周聖王也而不革其制固不當復議也是大不然夫殷周之不革者是不得巳也蓋以諸侯歸殷者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝殷武王不得而易循之以為安仍之以為俗湯武之所不得已也夫不得巳非公之大者也私其力於已也私其衛於子孫也秦之所以革之者其為制公之大者也其情私也私其一已之威也私其盡臣畜於我也然而公天下之端自秦始夫天下之道理安斯得人者也使賢者居上不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聽則又有世大夫世食祿邑以盡其封略聖賢生於其時亦無以立於天下封建者為之也豈聖人之制使至於是乎吾固曰非聖人之意也勢也爭臣論韓愈或問諫議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其德而善良者幾千人大臣聞而薦之天子以為諫議大夫人皆以為華陽子不色喜居於位五年矣視其德如在野彼豈以富貴移易其心哉愈應之曰是易所謂恆其德貞而夫子凶者也惡得為有道之士乎哉在易蠱之上九云不事王侯髙尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫亦以所居之時不一而所蹈之德不同也若蠱之上九居無用之地而致匪躬之節以蹇之六二在王臣之位而髙不事之心則冒進之患生曠官之刺興志不可則而尤不終無也今陽子在位不為不久矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽焉不加喜戚於其心問其官則曰諫議也問其祿則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以為得其言乎哉得其言而不言與不得其言而不去無一可者也陽子將為祿仕乎古之人有云仕不為貧而有時乎為貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱關擊柝者可也蓋孔子嘗為委吏矣嘗為乘田矣亦不敢曠其職必曰會計當而已矣必曰牛羊遂而已矣若陽子之秩祿不為卑且貧章章明矣而如此豈可乎哉或曰否非若此也夫陽子惡訕上者惡為人臣招其君之過而以為名者故雖諫且議使人不得而知焉書曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德夫陽子之用心亦若此者愈應之曰若陽子之用心如此滋所謂惑者矣入則諫其君出不使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隱於蓬蒿之下主上嘉其行誼擢在此位官以諫為名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僭賞從諫如流之美庶巖穴之士聞而慕之束帶結髮願進於闕下而伸其辭說致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也或曰陽子之不求聞而人聞之不求用而君用之不得已而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有求于聞用也閔其時之不平人之不乂得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇暖而墨突不得黔彼二聖一賢者豈不知自安逸之為樂哉誠畏天命而悲人窮也夫天授人以聖賢才能豈使自有餘而已誠欲以補其不足者也耳目之於身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也且陽子之不賢則將役於賢以奉其上矣若果賢則固畏天命而閔人窮也惡得以自暇逸乎哉或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷於德而費於辭乎好盡言以招人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及巳陽子將不得為善人乎哉諫上蘇洵古今論諫常與諷而少直其說蓋出於仲尼吾以為諷直一也顧用之之術何如耳伍舉進隱語楚王淫益甚茅焦解衣危論秦帝立悟諷固不可盡與直亦未易少之吾故曰顧用之之術何如耳然則仲尼之說非乎曰仲尼之說純乎經者也吾之說參乎權而歸乎經者也如得其術則人君有少不為桀紂者吾百諫而百聽矣况虛已者乎不得其術則人君有少不若堯舜者吾百諫而百不聽矣况逆忠者乎然則奚術而可曰機智勇辨如古游說之士而巳夫遊說之士以機智勇辨濟其詐吾欲諫者以機智勇辨濟其忠請備論其效周衰游說熾於列國自是世有其人吾獨怪夫諫而從者百一說而從者十九諫而死者皆是說而死者未嘗聞然而抵觸忌諱說或甚於諫由是知不必乎諷諫而必乎術也說之術可為諫法者五理諭之勢禁之利誘之激怒之隱諷之之謂也觸龍以趙后愛女賢於愛子未旋踵而長安君出質甘羅以杜郵之死詰張唐而相燕之行有日趙卒以兩賢王之意語燕而立歸武臣此理而諭之也子貢以內憂教田常而齊不得伐魯武公以麋鹿脅項襄而楚不敢圖周魯連以烹醢懼垣衍而魏不果帝秦此勢而禁之也田生以萬戶侯啓張卿而劉澤封朱建以富貴餌閎孺而辟陽赦鄒陽以愛幸悅長君而梁王釋此利而誘之也蘇秦以牛後羞韓而惠王按劍太息范雎以無王恥秦而昭王長跪請教酈生以助秦凌漢而沛公輟洗聽計此激而怒之也蘇代以土偶笑田文楚人以弓繳感襄王蒯通以娶婦悟齊相此隱而諷之也五者相傾險詖之論雖然施之忠臣足以成功何則理而諭之主雖昏必悟勢而禁之主雖驕必懼利而誘之主雖怠必奮激而怒之主雖懦必立隱而諷之主雖暴必容悟則明懼則恭奮則勤立則勇容則寬致君之道盡於此矣吾觀昔之臣言必從理必濟莫若唐魏鄭公其初實學縱橫之說此所謂得其術者歟噫龍逢比干不獲稱良臣無蘇秦張儀之術也蘇秦張儀不免為游說無龍逢比干之心也是以龍逢比干吾取其心不取其術蘇秦張儀吾取其術不取其心以為諫法諫下蘇洵夫臣能諫不能使君必納諫非真能諫之臣君能納諫不能使臣必諫非真能納諫之君欲君必納乎嚮之論備矣欲臣必諫乎吾其言之夫君之大天也其尊神也其威雷霆也人之不能抗天觸神忤雷霆亦明矣聖人知其然故立賞以勸之傳曰興王賞諫臣是也猶懼其巽䎡阿諛使一日不得聞其過故制刑以威之書曰臣下不匡其刑墨是也人之情非病風喪心未有避賞而就刑者何苦而不諫哉賞與刑不設則人之情又何苦而抗天觸神忤雷霆哉自非性忠義不悅賞不畏罪誰欲以言博死者人君又安能盡得性忠義者而任之今有三人焉一人勇一人勇怯半一人怯有與之臨乎淵谷者且告之曰能跳而越此謂之勇不然為怯彼勇者恥怯必跳而越焉其勇怯半者與怯者則不能也又告之曰跳而越者與千金不然則否彼勇怯半者奔利必跳而越焉其怯者猶未能也須臾顧見猛虎暴然向逼則怯者不待告跳而越之如康莊矣然則人豈有勇怯哉要在以勢驅之耳君之難犯猶淵谷之難越也所謂性忠義不悅賞不畏罪者勇者也故無不諫焉悅賞者勇怯半者也故賞而後諫焉畏罪者怯者也故刑而後諫焉先王知勇者不可常得故以賞為千金以刑為猛虎使其前有所趨後有所避其勢不得不極言規失此三代所以興也末世不然遷其賞於不諫遷其刑於諫宜乎臣之噤口卷舌而亂亡隨之也間或賢君欲聞其過亦不過賞之而已嗚呼不有猛虎彼怯者肯越淵谷乎此無他墨刑之廢耳三代之後如霍光誅昌邑不諫之臣者不亦鮮哉今之諫賞時或有之不諫之刑缺然無矣茍增其所有有其所無則諛者直佞者忠况忠直者乎誠如是欲聞讜言而不獲吾不信也守道論柳宗元或問曰守道不如守官如何對曰是非聖人之言傳之者誤也官也者道之器也離之非也未有守官而失道守道而失官之事者是固非聖人言乃傳之者誤也夫皮冠者是虞人之物也物者道之凖也守其物由其凖而後其道存焉茍舍之是失道也凡聖人之所以為經紀為名物無非道者命之曰官官足以行吾道云爾是故立之君臣官府衣裳輿馬章綬之數會朝表著周旋行列之等是道之所存也則又示之典命書制符璽奏復之文參伍殷輔陪臺之役是道之所由也則又勸之以爵祿慶賞之美懲之以黜遠鞭朴梏拲斬殺之慘是道之所行也故自天子至於庶民咸守其經分而無有失道者和之至也失其物去其凖道從而喪矣易其小者而大者亦從而喪矣古者居其位思死其官可易而失之哉禮記曰道合則服從不可則去孟子曰有官守者不得其職則去然則失其道而居其官者古之人不與也是故在上不為抗在下不為損矢人者不為不仁函人者不為仁率其職司其局交相致以全其工也易位而處各安其分而道達於天下也且夫官所以行道也而曰守道不如守官蓋亦喪其本矣未有守官而失道守道而失官之事者也是非聖人之言傳之者誤也果矣六逆論柳宗元春秋左氏言衛州吁之事因載六逆之說曰賤妨貴少陵長逺間親新間舊小加大淫破義六者亂之本也余謂少陵長小加大淫破義是三者固誠為亂矣然其所謂賤妨貴遠間親新間舊雖為理之本可也何必曰亂夫所謂賤妨貴者蓋斥言擇嗣之道子以母貴者也若貴而愚賤而聖且賢以是而妨之其為理本大矣而可捨之以從斯言乎此其不可固也夫所謂遠間親新間舊者蓋言任用者之道也使親而舊者愚逺而新者聖且賢以是而間之其為理本亦大矣又可捨之以從斯言乎必從斯言而亂天下謂之師古訓可乎此又不可者也嗚呼是三者擇君置臣之事天下理亂之本也為書者執斯言著一定之論以遺後代上智之人固不惑於是自中人而降守以為大據而以致敗亂者固不乏焉晉厲死而悼公入乃理宋襄嗣而子魚退乃亂貴不足尚也秦用張祿而黜穰侯乃安魏相成璜而疏吳起乃危親不足與也苻氏進王猛而殺樊世乃興胡亥任趙髙而族李斯乃滅舊不足恃也顧所信何如耳然則斯言殆可以廢矣噫古之言理者罕能盡其說建一言立一辭則臲危瓦而不安謂之是可也謂之非亦可也混然而巳教於後世莫知其所以去就明者慨然將定其是非則拘儒瞽生相與羣而咻之以為狂為怪而欲世之多有知者可乎夫中人可以及化者天下為不少矣然而罕有知聖人之道則固為書者之罪也縱囚論歐陽修信義行於君子而刑戮施於小人刑入於死者乃罪大惡極此又小人之尤甚者也寧以義死不茍幸生而視死如歸此又君子之尤難者也方唐太宗之六年録大辟囚三百餘人縱使還家約其自歸以就死是以君子之難能期小人之尤者以必能也其囚及期而卒自歸無後者是君子之所難而小人之所易也此豈近於人情或曰罪大惡極誠小人矣及施恩德以臨之可使變而為君子蓋恩德入人之深而移人之速有如是者矣曰太宗之為此所以求此名也然安知夫縱之去也不意其必來以冀免所以縱之乎又安知夫被縱而去也不意其自歸而必獲免所以復來乎夫意其必來而縱之是上賊下之情也意其必免而復來是下賊上之心也吾見上下交相賊以成此名也烏有所謂施恩德與夫知信義者哉不然太宗施德於天下於茲六年矣不能使小人不為極惡大罪而一日之恩能使視死如歸而存信義此又不通之論也然則何為而可曰縱而來歸殺之無赦而又縱之而又來則可知為恩德之致爾然此必無之事也若夫縱而來歸而赦之可偶一為之爾若屢為之則殺人者皆不死是可為天下之常法乎不可為常者其聖人之法乎是以堯舜三王之治必本於人情不立異以為髙不逆情以干譽大臣上蘇軾以義正君而無害於國可謂大臣矣天下不幸而無明君使小人執其權當此之時天下之忠臣義士莫不欲奮臂而擊之夫小人者必先得於其君而自固於天下是故法不可擊擊之而不勝身死其禍止於一身擊之而勝君臣不相安天下必亡是以春秋之法不待君命而誅其側之惡人謂之叛晉趙鞅入於晉陽以叛是也世之君子將有志於天下欲扶其衰而救其危者必先計其後而為可居之功其濟不濟則命也是故功成而天下安之今小人君不誅而吾誅之則是侵君之權而不可居之功也夫既巳侵君之權而能北面就人臣之位使君不吾疑者天下未嘗有也國之有小人猶人之有癭今人之癭必生於頸而附於咽是以不可去有賤丈夫者不勝其忿而決去之夫是以去疾而得死漢之亡唐之滅由此故也自桓靈之後至於獻帝天下之權歸於內豎賢人君子進不容於朝退不容於野天下之怒可謂極矣當此之時議者以為天下之患獨在宦官宦官去則天下無事然竇武何進之徒擊之不勝止於身死袁紹擊之而勝漢遂以亡唐之衰也其迹亦大類此自輔國元振之後天子之廢立聽於宦官當此之時士大夫之論亦惟宦官之為去然而李訓鄭注元載之徒擊之不勝止於身死至於崔昌遐擊之而勝唐亦以亡方其未去是纍然者癭而已矣及其既去則潰裂四出而繼之以死何者此侵君之權而不可居之功也且為人臣而不顧其君捐其身於一决以快天下之望亦已危矣故其成則為袁為崔敗則為何竇為訓注然則忠臣義士亦奚取於此哉夫竇武何進之亡天下悲之以為不幸然亦幸而不成使其成也二子者將何以居之故曰以義正君而無害於國可謂大臣矣大臣下蘇軾天下之權在於小人君子之欲擊之也不亡其身則亡其君然則是小人者終不可去乎聞之曰迫人者其智淺迫於人者其智深非才有不同所居之勢然也古之為兵者圍師勿遏窮寇勿追誠恐其知死而致力則雖有衆無所用之故曰同舟而遇風則胡越可使相救如左右手小人之心自知其負天下之怨而君子之莫吾赦也則將日夜為計以備一旦卒然不可測之患今君子又從而疾惡之是以其謀不得不深其交不得不合交合而謀深則其致毒也忿戾而不可解故凡天下之患起於小人而成於君子之速之也小人在內君子在外君子為客小人為主主未發而客先焉則小人之詞直而君子之勢近於不順直則可以欺衆而不順則難以令其下故昔之舉事者常以中道而衆散以至於敗則其理豈不甚明哉若夫智者則不然內以自固其君子之交而厚集其勢外以陽浮而不逆於小人之意以待其間寬之使不吾疾狃之使不吾慮啖之以利以昏其智順適其意以殺其怒然後待其發而乘其隙推其墜而挽其絶故其用力也約而無後患莫為之先故君不怒而勢不逼如此者功成而天下安之今夫小人急之則合寬之則散是從古以然也見利不能不爭見患不能不避無信不能不相詐無禮不能不相瀆是故其交易間其黨易破也而君子不務寬之以待其變而急之以合其交亦巳過矣君子小人雜居而未决為君子之計者莫若深交而無為茍不能深交而無為則小人倒持其柄而乘吾隙昔漢髙之亡以天下屬平勃及髙后臨朝擅王諸吕廢黜劉氏平日縱酒無一言及用陸賈計以千金交歡絳侯卒以此誅諸吕定劉氏使此二人者而不相能則是將相相攻之不暇而何暇及於劉吕之存亡哉故其說曰將相和調則士豫附士豫附則天下雖有變而權不分嗚呼知此其足以為大臣矣夫伊尹蘇軾辦天下之大事者有天下之大節者也立天下之大節者狹天下者也夫以天下之大而不足以動其心則天下之大節有不足立而大事有不足辦者矣今夫匹夫匹婦亦知潔廉忠信之為美也使其果潔亷而忠信則其智慮未始不如王公大人之能也惟其所爭者止於簞食豆羮而簞食豆羮足以動其心則宜其智慮之不出乎此也簞食豆羮非其道不取則一鄉之人莫敢以不正犯之矣一鄉之人莫敢以不正犯之而不能辦一鄉之事者未之有也推此而上其不取者愈大則其所辦者愈遠矣讓天下與讓簞食豆羮無以異也治天下與治一鄉亦無以異也然而不能者有所蔽也天下之富是簞食豆羮之積也天下之大是一鄉之推也非千金之子不能運千金之資販夫販婦得一金而不知所措非智不若所居之卑也孟子曰伊尹耕於有莘之野非其道也非其義也雖祿之天下弗受也夫天下不能動其心是故其才全以其全才而制天下是故臨大事而不亂古之君子必有髙世之行非茍求為異而巳卿相之位千金之富有所不屑將以自廣其心使窮達利害不能為之芥蒂以全其才而欲有所為耳後之君子蓋亦嘗有其志矣得失亂其中而榮辱奪其外是以役役至於老死而不暇亦足悲矣孔子叙書至於舜禹臯陶相讓之際蓋未嘗不太息也夫以朝廷之尊而行匹夫之讓孔子安取焉取其不汲汲於富貴有以大服天下之心焉耳夫太甲之廢天下未嘗有是而伊尹始行之天下不以為驚以臣放君天下不以為僭既放而復立太甲不以為專何則其素所不屑者足以取信於天下也彼其視天下眇然不足以動其心而豈忍以廢放其君求利也哉後之君子蹈常而習故惴惴焉懼不免於天下一為希濶之行則天下羣起而誚之不知求其素而以為古今之變時有所不可者亦巳過矣夫周公蘇軾論周公者多異說何也周公居禮之變而處聖人之不幸宜乎說者之異也凡周公之所為亦不得巳而巳矣若得已而不巳則周公安得而為之成王幼不能為政周公執其權以王命賞罰天下是周公不得已者如此而巳今儒者曰周公踐天子之位稱王而朝諸侯則是豈不可以巳耶書曰周公位冢宰正百工羣叔流言又曰召公為保周公為師相成王為左右召公不說又曰周公曰王若曰則是周公未嘗踐天子之位而稱王也周公稱王則成王宜何稱將亦稱王耶將不稱耶不稱則是廢也稱王則是二王也而周公何以安之孔子曰必也正名乎儒者之患患在於名實之不正故亦有以文王為稱王者是以聖人為後世之僭君急於為王者耶天下雖亂有王者在而已自王雖聖人不能以服天下昔髙帝擊滅項籍統一四海諸侯大臣相率而帝之然且辭以不德惟陳勝吳廣乃囂囂乎急於自王而謂文王亦為之耶武王伐商師渡孟津會於牧野其所以稱先君之命命於諸侯者蓋猶曰文考而巳至於武成既以柴望告天百工奔走受命於周而後稱曰我文考文王克成厥勳由此觀之則是武王不敢一日妄尊其先君而况於文王之自王乎詩曰虞芮質厥成文王蹶厥生是亦追稱而已矣史記曰嫗乎采芑歸乎田成子夫田常之時安知其為成子而稱之故凡以文王周公為稱王者皆過也是資後世之篡君而為之藉也陳賈問於孟子曰周公使管叔監商管叔以商叛知而使之是不仁不知是不智孟子曰周公弟也管叔兄也周公之過不亦宜乎從孟子之說則是周公未免於有過也夫管蔡之叛非逆也是其智不足以深知周公而巳矣周公之誅非疾之也其勢不得不誅也故管蔡非所謂大惡也兄弟之親而非有大惡則其道不得不封管蔡之封在武王之世也武王之世未知有周公成王之事茍無周公成王之事則管蔡何從而叛周公何從而誅之故曰周公居禮之變而處聖人之不幸也周公一蘇轍伊尹既立太甲不明而放諸桐天下不以為不義武王既殁成王幼周公攝天子之位朝諸侯於明堂而召公不悅管叔蔡叔咸叛天下幾至於不可救二者其故何也太甲既立矣而不足以治天下則夫伊尹猶有以辭於後世也蓋周公之事其迹無以異於伊尹然天下之人舉皆疑而不信此無足怪也何者天下未知夫成王之不明而周公攝則是周公未有以服天下之心而彊攝焉以為之上也且夫伊尹之攝其事有不得巳而然耳太甲雖廢而伊尹未敢有所復立以召天下之亂故寧以巳攝焉而待夫太甲之自悔是以天下無疑乎其心今夫周公之際其勢未至於不得已也使成王拱手以居天下之上而周公為之佐以成王名號於天下而輔之以周公此所謂其勢之未至於不得已者矣而周公不居則夫天下之謗是周公之所自取也然愚以為不然挾天子以令天下此諸葛孔明之事耳而周公豈不足以知之蓋夫人臣惟無執天子之權人臣而執天子之權則必有忠於其心而後可以自免於難何者人臣而用天子之事此天子之所忌也以一人之身上為天子之所忌而下為左右之大臣從而媒孽其短此古之忠臣所以盡心而不免於禍而世之姦雄之士所以動其無君之心而不顧者也使成王用事於天下而周公制其豫奪之柄則愚恐成王有所不平於其心而管蔡之徒乘其隙而間之以至於亂也使成王有天子之虛名而不得制天下之政則愚恐周公有所不忍於其中赧然其有不安之心也是以寧取而攝之使成王無與乎其間以破天下讒慝之謀而絶其爭權之心是以其後雖有管蔡之憂而天下不搖使其當時列於羣臣之間方其危疑擾攘而未决也則愚恐周公之禍非居東之所能免而管蔡得志於天下成王將遂不立也嗚呼其思之遠哉朋黨論歐陽修臣聞朋黨之說自古有之惟幸人君辨其君子小人而巳大凡君子與君子以同道為朋小人與小人以同利為朋此自然之理也然臣謂小人無朋惟君子則有之其故何哉小人所好者祿利也所貪者財貨也當其同利之時暫相黨引以為朋者僞也及其見利而爭先或利盡而交疏則反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者僞也君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之僞朋用君子之真朋則天下治矣堯之時小人共工歡兜等四人為一朋君子八元八凱十六人為一朋舜佐堯退四凶小人之朋而進元凱君子之朋堯之天下大治及舜自為天子而臯䕫稷契等二十二人竝列於朝更相稱美更相推讓凡二十二人為一朋而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心周有臣三千惟一心紂之時億萬人各異心可謂不為朋矣然紂以亡國周武王之臣三千人為一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目為黨人及黃巾賊起漢室大亂後方悔悟盡解黨人而釋之然巳無救矣唐之晚年漸起朋黨之論及昭宗時盡殺朝之名士或投之黃河曰此輩清流可投濁流而唐遂亡矣夫前世之主能使人人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗之世然皆亂亡其國更相稱美推讓而不自疑莫如舜之二十二臣舜亦不疑而皆用之然而後世不誚舜為二十二人朋黨所欺而稱舜為聰明之聖者以能辨君子與小人也周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周然周用此以興者善人雖多而不厭也夫興亡治亂之迹為人君者可以鑒矣續歐陽子朋黨蘇軾歐陽子曰小人欲空人之國必進朋黨之說嗚呼國之將亡此其徴歟禍莫大於權之移人而君莫危於國之有黨有黨則必爭爭則小人者必勝而權之所歸也君安得不危哉何以言之君子以道事君人主必敬之而疏小人惟豫言而莫豫違人主必狎之而親疏者易間而親者難暌也而君子者不得志則奉身而退樂道不仕小人者不得志則徼幸復用惟怨之報此其所以必勝也蓋嘗論之君子如嘉禾也封植之甚難而去之甚易小人如惡草也不種而生去之復蕃世未有小人不除而治者也然去之為最難斥其一則援之者衆盡其類則衆之致怨也深小者復用而肆威大者得志而竊國善人為之掃地世主為之屏息譬之斷蛇不死刺虎不斃其傷人則愈多矣齊田氏魯季孫是已齊魯之執事莫匪田季之黨也歷數君不忘其誅而卒之簡公弒昭哀失國小人之黨其不可除也如此而漢黨錮之獄唐白馬之禍忠義之士斥死無餘君子之黨其易盡也如此使世主知易盡者之可戒而不可除者之可懼則有瘳矣且夫君子者世無若是之多而善人亦無若是之衆也况才智之士鋭於功名而嗜於進取者隨所用耳孔子曰仁者安仁智者利仁未必皆君子也冉有從夫子則為門人之選從季氏則為聚斂之臣唐柳宗元劉禹錫使不陷叔文之黨其髙才絶學亦足以為唐名臣矣昔欒懷子得罪於晉其黨皆出奔樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃子之勇也嗚呼宣子蚤從王鮒之言豈獨獲二子之勇且安有曲沃之變哉愚以謂治道去泰甚耳茍黜其首惡而貸其餘使才者不失富貴不才者無以致憾將為吾用之不暇又何怨之報乎人之所以為盜者衣食不足耳農夫市人焉保其不為盜而衣食既足盜豈有不能返農夫市人也哉故善除盜者開其衣食之門使復其業善除小人者誘以富貴之道使隳其黨以力取威勝者蓋未嘗不反為所噬昔曹參之治齊曰慎無擾獄市獄市姦人之所容也知此亦庶幾於善治矣姦固不可長而亦不可不容也若姦無所容君子豈久安之道哉牛李之黨遍天下而李德裕以一夫之力欲窮其類而致之必死此其所以不旋踵罹仇人之禍也姦臣復熾忠義益衰以力取威勝者果不可耶愚是以讀歐陽子之說而為君子小人之戒文編卷三十

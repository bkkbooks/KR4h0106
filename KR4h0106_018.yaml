body:
  text: 文編卷十八明唐順之編論史館日厯狀歐陽修右臣伏以史者國家之典法也自君臣善惡功過與其百事之廢置可以埀勸戒示後世者皆得直書而不隱故自前世有國者莫不以史職為重伏見國朝之史以宰相監修學士修撰又以兩府之臣撰時政記選三館之士當升擢者乃命修起居注如此不為不重矣然近年以來員具而職廢其所撰述簡略遺漏百不存一至於事關大體者皆沒而不書此實史官之罪而臣之責也然其弊在於修撰之官惟據諸司供報而不敢書所見聞故也今時政記雖是兩府臣僚修纂然聖君言動有所宣諭臣下奏議事關得失者皆不紀録惟書除目辭見之類至於起居注亦然與諸司供報公文無異修撰官只據此銓次繫以月日謂之日厯而已是以朝廷之事史官雖欲書而不得書也自古人君皆不自閲史今撰述既成必録本進呈則事有諱避史官雖欲書而又不可得也加以日厯時政記起居注例皆承前積滯相因故纂録者常務造修纍年前事而嵗月既逺遺失莫存至於事在目今可以詳於見聞者又以追修積滯不暇及之若不革其弊則前後相因史官永無舉職之時使聖朝典法遂成廢墜矣臣竊聞趙元昊自初僭叛至復稱臣始終一宗事節皆不曾書亦聞修撰官甚欲紀述以修纂後時追求莫得故也其於他事又可知焉臣今欲乞特詔修時政記起居注之臣並以德音宣諭臣下奏對之語書之其修撰官不得依前只據諸司供報編次除目辭見並須考驗事實其除某官者以某功如狄青等破儂智高文彥博等破王則之類其貶某職者坐某罪如昨來麟州守將及并州龎籍緣白草平事近日孫沔所坐之類事有文據及迹狀明白者皆備書之所以使聖朝賞罰之典可以勸善懲惡昭示後世若大臣用情朝廷賞罰不當者亦得以書為警戒此國家置史之本意也至於其他大事並許史院據所聞見書之如聞見未詳者直牒諸處㑹問及臣寮公議異同朝廷裁置處分並書之已上事節並令修撰官逐時旋據所得録為草卷標題月分於史院躬親入匱封鎖候諸司供報齊足修為日厯仍乞每至嵗終命監修宰相親至史院㸃檢修撰官紀録事迹內有不勤其事隳官失職者奏行責罰其時政記起居注日歷等除今日以前積滯者不住追修外截自今後並令次月供報如稍遲滯許修撰官自至中書樞密院催請其諸司供報拖延及史院有所㑹問諸處不畫時報應致妨修纂者其當行年分並許史院牒開封府勾追嚴斷其日厯時政記起居注並乞更不進本所貴少修史職上存聖朝典法此乃臣之職事不敢不言論禁止無名子傷毁近臣狀歐陽修右臣竊見前年宋庠等出外之時京師先有無名子詩一首傳於中外尋而庠罷政事近又風聞外有小人欲中傷三司使王堯臣者復作無名子詩一篇略聞其一兩句臣自聞此詩日夕疑駭深思事理不可不言伏以陛下視聽聰明外邊事無小大無不知者竊恐此詩流傳漸廣須達聖聰臣忝為陛下耳目之官不欲小人浮謗之言上惑天聽合先論列以杜姦讒况自兵興纍年繼以災旱民財困竭國帑空虛天下安危繫於財用虛實三司之職其任非輕近自姚仲孫罷去之後朝廷以積年蠧弊貧虛窘乏之三司付與堯臣仰其辦事乃是陛下委信責成之日堯臣多方展效之時臣備見從前任人率多顧惜祿位寧可敗事於國不肯當怨於身如堯臣者領職以來未及一月自副使以下不才者悉請換易足見其不避嫌怨不狥人情竭力救時以身當事今若下容讒間上不主張則不惟材智之臣無由展效亦恐忠義之士自兹解體臣思作詩者雖不知其姓名竊慮在朝之臣有名位與堯臣相類者嫉其任用故欲中傷只知爭進於一時不思沮國之大計伏自陛下罷去吕夷簡夏竦之後進用韓琦范仲淹以來天下欣然皆賀聖德君子既䝉進用小人自恐道消故共喧然務騰讒口欲惑君聽欲沮好人不早絶之恐終敗事况今三司蠧弊已深四方匱乏已極堯臣必須大有更張方能集事未容展效已被謗言臣近日已聞浮議紛然云堯臣更易官吏專權侵政今又造此詩語搖惑羣情若不止之則今後陛下無以使人忠臣無由事主讒言罔極自古所患若一啓其漸則扇惑羣小動搖大臣貽患朝廷何所不至伏望特降詔書戒勵臣下敢有造作言語誣搆隂私者一切禁之及有轉相傳誦則必推究其所來重行朝典所貴禁止讒巧保全善人論兩制以上罷舉轉運使副省府推判官等狀歐陽修右臣近凖御史臺牒為臣寮上言待制以上舉省府推判官轉運使副等事奉聖㫖去年勑命更不行用令臣知委者臣竊詳臣寮上言悉涉虛妄蓋因近日陛下進退大臣改更庶事小人希合欺罔天聰臣試請辨之據上言者云若令兩制以上保舉則下長奔競之路方今上自朝廷下至州縣保舉之法多矣只如臺官亦是兩制以上舉以至大理詳斷審刑詳議刑部詳覆等官三路知州知縣通判選人改京官學官入國學班行遷閣職武臣充將領選人入縣令下至天下茶鹽場務𣙜場及課利多處酒務凡要切差遣無大小盡用保舉之法皆不聞以奔競而廢之豈可獨於省府等官獨長奔競而可廢此其欺罔可知也上言者又云遂令端士並起馳騖且馳騖盡係一作自是小人豈名端士至如自來舉官之法多矣豈能盡絶小人干求况自頒新勑以來何人舊是端士頓然改節馳騖於何門而得舉乞賜推究姓名若果無之則見其欺妄可知也上言者又云不因請託人莫肯言此又厚誣之甚也今內外臣寮無大小曾受人舉者十八九豈可盡因請託而得自兩府大臣而下至外處通判以上人人各曾舉官豈可盡因請託而舉若云其它舉官不請託只此勑舉官須請託即非臣所知也今兩制之中好人不少繁難要害之地皆已委信任用豈可不如外郡通判等不堪委任舉官况兩制之臣除此勑外亦更别許舉官豈可舉他官則盡公惟此勑則頓徇私請此其欺妄可知也又云每嵗舉一百五十人致人多而爭差遣臣算一人有三人舉主方敢望差遣一百五十人須一嵗內有四百五十員兩制為舉主今兩制不及五十人使人人嵗舉三人即才各是一人舉主豈敢便爭差遣况有不曾舉人者或舉不及三人者乞賜檢㑹去年終兩制以上舉到人數便可知其恣情欺妄也近日改更政令甚多惟此一事尤易辨明故臣不避煩言而辨者伏冀陛下因此深悟小人希合而欺妄也緣自去年陛下用范仲淹富弼在兩府值纍年盜賊頓起天下官吏多不得力因此屢建舉官之議然亦不是自出意見皆先檢祖宗故事請陛下擇而行之所以元降勑文首引國書為言是也當時臣寮並不論議近因仲淹等出外與朝廷經畫邊事讒嫉之人幸其不在左右百端攻擊只此事朝廷不暇審察便與施行臣昨見富弼自至河北緣山傍海經畫勤勞河北人皆云自來未有大臣如此其經畫所得事亦不少歸至國門臨入而黜使河北官吏軍民見其盡忠而不知其罪狀小人貪務希合又不為朝廷惜事體凡事攻擊至今未巳况朝廷用人屢有進退豈有一人才出便不問是非盡改所行之事若大臣一度進退政令一度改更如此紛紜豈有定制伏望陛下重察愛憎之私辨其虛實之說凡於政令更慎改張臣檢詳元降舉官勑意亦一作本是於國書檢用祖宗所行之法今上言者却云因諫官論列致差遣不定而有更張事涉臣身不敢自辨然臣在諫署日言事無狀致今來臣寮指以為辭豈可尚冒寵榮不能自劾請從黜罰以弭人言臣伏見陛下聖德仁慈保全忠正之士進退之際各有恩意此所以能使忠臣義士忘身報國至死而不巳也其今後臣寮希附上言攻擊前兩府所行之事乞賜辨明擇其實有不便者方與改更庶全大體則天下幸甚也臣伏覩去年八月二日元降勑命節文云比於國書擇一作撮諸治要見其官人之際尤慎外臺之選又云然其進任必屬近臣又今告示賞罰之命皆三朝之攸行此是元議舉官因依乞賜詳酌臣無任激切祈天待罪之至論臺官上言按察使狀歐陽修右臣伏覩近降朝㫖約束諸路按察使備載臺官所上之言意謂按察使等所奏之人多不實或因迎送文移之間有所闕失挾其私怒枉奏平人朝廷都不深思輕信其說臣自聞降此約束日夕憂嗟竊思國家方此多事難了之時正是貴人展效之際奬之猶恐不竭力疑之誰肯盡其心昨大選諸路按察之際兩府聚㕔數日盡破常例不次用人中外翕然皆謂一時之極選凡被選之者皆亦各負才業久無人知常患無所施為一旦忽䝉擢用各思宣力爭奮所長不惟欲報朝廷豈不更希進用豈可頓為欺罔便徇私情料其心必未至此茍或如臺官所說則是兩府聚㕔數日選得不公之人其或不至如斯何必更加約束竊以任人之術自古所難常能力主張猶或有沮者何况更生疑異使其各自心闌如此用人安能集事况按察之任人所難能或大臣薦引之人或權勢僥幸之子彼按察使者下當怨怒上忤權勢而不敢避者只賴朝廷主張而已今按察者所奏則未能施行沮毁者一言則便加輕信皆由朝廷未知官吏為州縣大患而按察可以利民委任之意不堅故毁謗之言易入也所可惜者自差諸路按察今雖未有大效而老病昏昧之人望風知懼近日致仕者漸多州縣方欲澄清而朝廷自沮其事臣欲乞聖慈令兩府召臺官上言者至中書問其何路按察之人因挾私怒茍有迹狀乞下所司辨明若實無人乃是妄說其近降劄子乞賜抽還不使四方見朝廷自沮按察之權而為貪贓老繆之吏所快再論按察官吏狀歐陽修右臣自初忝諫官於第一次上殿日首曾建言方今天下凋殘公私困急全由官吏冗濫者多乞朝廷選差按察使糾舉年老病患贓汚不材四色之人以行澄汰仍具陳按察之法條目甚詳如臣之議蓋欲使使者四出而天下悚然知朝廷有賞善罰惡之意然後按文責實甚惡者黜有善者升中材之人盡使警勵凡臣所言者乃所以救民急病革數十年蠧弊之事若非遭逢聖主鋭意求治之時上下力行之不可也奈何議者憚於作事惟樂因循祗命諸路轉運使就兼其職命出之日外論皆謂諸路之中貪贓如魏兼老病如陳杲穢惡如錢延年庸常齷齪如袁抗張可久之輩盡為轉運使皆自是可黜之人必不能舉職臣亦再具論奏其議格而不行按察空名今遂寢廢生民蠧病日益可哀伏見陛下聖德日新憂心庶政近發手詔督勵宰輔然天下之事積弊已多如治亂絲未知頭緒欲事事更改則力未能周而煩擾難行欲漸漸整頓則困弊已極而未見速效臣謂如欲用功少為利溥及民速於事切則莫若精選明幹朝臣十許人分行天下盡籍官吏能否而升黜之如臣前所陳者而後可臣聞治天下者如農夫之治田不可一槩也蒿萊蕪穢久荒之地必先力加墾闢芟除待其成田然後以時耘耨冗濫之官蕪穢天下久矣必先力行澄汰待其百職粗治然後精選有司常令糾舉今特遣之使如久荒而芟闢也轉運兼按察乃以時之耘耨者耳寬猛疾徐各有所宜也漢時刺舉唐世黜陟使考課使之類嵗嵗遣出祖宗朝亦有考課院蓋按察升黜古今常法非是難行之異事也方今言事者多以高論見棄或以有害難行如臣所言只是選十餘人明幹朝臣察視官吏善惡灼然有迹易見者著之簿籍朝廷詳之黜其甚者耳臣自謂於論不為甚高行之有利無害然尚慮議者未以為然謹條陳冗官利害六事以明利博效速而可行不疑伏望聖慈特賜裁擇如有可採乞早施行一曰去冗官則民之科率十分减九臣伏見兵興以來公私困弊者不惟賦斂繁重全由官吏為姦每或科率一物則貪殘之吏先於百姓而刻剝老繆之吏恣其羣下之誅求朝廷得其一分姦吏取其十倍民之重困其害在斯今若去此四色冗官代以循良之吏事隨便宜絶去騷擾使民專供朝廷實數科率免却州縣分外誅求故臣謂於民力十分减九也比於别圖减省細碎無益者其利博矣二曰不材之人為害深於贓吏國家之法除贓吏因民告發者乃行之其他不材之人大者壞州小者壞縣皆明知而不問臣謂凡贓吏多是强黠之人所取在於豪富或不及貧弱不材之人不能馭下雖其一身不能乞取而恣其羣下共行誅剝更無貧富皆被其殃為害至深縱而不問故臣尤欲盡取老病繆懦者與贓吏一例黜之三曰內外一體若外官不澄則朝廷無由致治今朝廷雖有號令之善者降出外方若落四色冗官之手則或施設乖方不如朝廷本意反為民害或稽滯廢失全不施行而又無糾舉弃一作多作空文若外邊去却冗官盡得良吏則朝廷所下之令雖有乖錯彼亦自能回改或執奏更易終不至為大害是民之得失不獨上賴朝廷全繫官吏善惡以此而言冗官豈可不去四曰去冗官則吏員清簡差遣通流今天下官有定員而入仕之人無定數既不黜陟冒濫者多差遣不行賢愚同滯每有一闕衆人爭之爭得者無廉耻之風不得者騰怨嗟之口濫官之弊近古無之今若擇四色冗官去之則待闕之人可無怨滯五曰去冗官則中材之人可使勸懼今天下官吏豈必盡是不材蓋為朝廷本無黜陟善惡不分今若見國家責實求治逐一人人精别則中材之人皆自勉强不敢因循雖有貪殘亦須斂手六曰去冗官則不過朞月民受其賜方今朝廷雖有愛念疲民之意然上下困乏必未有餘力廣惠及民若但去冗官則民受速賜蓋臣常見外處州縣每一繆官替去一能者代之不過數日民已歌謡今若盡去冗濫之吏而以能吏代之不過朞月民即受賜此臣所謂及民速於事切者也論杜衍范仲淹等罷政事狀歐陽修臣聞士不忘身不為忠言不逆耳不為諫故臣不避羣邪切齒之禍敢干一人難犯之顔惟賴聖明幸加省察臣伏見杜衍韓琦范仲淹富弼等皆是陛下素所委任之臣一旦相繼罷黜一作而罷天下之士皆素知其可用之賢而不聞其可罷之罪臣雖供職在外事不盡知然臣竊見自古小人讒害忠賢其說不遠欲廣陷良善則不過指為朋黨欲動搖大臣則必須誣以專權其故何也夫去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難為一二求瑕惟有指以為朋則可一時盡逐至如大臣已被知遇而䝉信任則難以他事動搖惟有專權是上之所惡故須此說方可傾之臣料衍等四人各無大過而一時盡逐弼與仲淹委任尤深而忽遭離間必有以朋黨專權之說上惑聖聰臣請試辨之昔年仲淹初以忠言讜論聞於中外天下賢士爭相稱慕當時姦臣誣作朋黨猶難辨明自近日陛下擢此數人並在兩府察其臨事可以辨也蓋衍為人清慎而謹守規矩仲淹則恢廓自信而不疑琦則純正而質直弼則明敏而果鋭四人為性既各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹則力爭而寬之仲淹謂契丹必攻河東請急修邊備富弼料以九事力言契丹必不來至如尹洙亦號仲淹之黨及爭水洛城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤彰著陛下素已知者此四人者可謂天下至公之賢也平日間居則相稱美之不暇為國議事則公言廷諍而不私以此而言臣見衍等真得漢史所謂忠臣有不和之節而小人讒為朋黨可謂誣矣臣聞有國之權誠非臣下之得專也然臣竊思仲淹等自入兩府以來不見其專權之迹而但見其善避權也權者得名位則可行故好權之臣必貪位自陛下召琦與仲淹於陜西琦等讓至五六陛下亦五六召之富弼三命學士兩命樞密副使每一命皆再三懇讓讓者愈切陛下用之愈堅臣見其避讓太繁不見其好權貪位也及陛下堅不許辭方敢受命然猶未敢别有所為陛下見其皆未作事乃特開天章召而賜坐授以紙筆使其條事然衆人避讓不敢下筆弼等亦不敢獨有所述因此又煩聖慈特出手詔指定姓名專責弼等條列大事而施行弼等遲回又近一月方敢略條數事然仲淹深練世事必知凡百難猛更張故其所陳志在逺大而多若迂緩但欲漸而行之以久冀皆有效弼性雖鋭然亦不敢自出意見但多舉祖宗故事請陛下擇而行之自古君臣相得一言道合遇事便行臣方怪弼等䝉陛下如此堅意委任督責丁寧而猶遲緩自疑作事不果然小人巧譖已曰專權者豈不誣哉至如兩路宣撫聖朝常遣大臣况自中國之威近年不振故元昊叛逆一方而勞困及於天下契丹乘釁違盟而動其書辭侮慢至有貴國祖宗之言陛下憤耻雖深但以邊防無備未可與爭屈志買和莫大之辱弼等見中國纍年侵凌之患感陛下不次進用之恩故各自請行力思雪國家之前耻沿山傍海不憚勤勞欲使武備再修國威復振臣見弼等用心本欲尊陛下威權以禦四夷未見其侵權而作過也伏惟陛下睿哲聰明有知人之聖臣下能否洞見不遺故於千官百辟之中特選得此數人驟加擢用夫正士在朝羣邪所忌謀臣不用敵國之福也今此數人一旦罷去而使羣邪相賀於內四夷相賀於外此臣所為陛下惜之也伏惟陛下聖德仁慈保全忠善退去之際恩禮各優今仲淹四路之任亦不輕矣惟願陛下拒絶羣謗委任不疑使盡其所為猶有禆補方今西北二虜交爭未已正是天與陛下經營之時如弼與琦豈可置之間處伏望陛下早辨讒巧特加圖任則不勝幸甚臣自前嵗召入諫院十月之內七受聖恩而致身兩制方思君寵至深未知報效之所今羣邪爭進讒巧正士繼去朝廷乃臣忘身報國之秋豈可緘言而避罪敢竭愚瞽惟陛下擇之臣無任祈天待罪懇激屏營之至臣修昧死再拜再論水災狀歐陽修右臣伏覩近降手詔以水災為變上軫聖憂既一人形罪已之言宜百辟無遑安之意而應詔言事者猶少亦未聞有所施行豈言者不足採歟將遂無人言也豈有言不能用歟然則上有詔而下不言下有言而上不用皆空言也臣聞語曰應天以實不以文動民以行不以言臣近有實封應詔竊謂水入國門大臣奔走淹浸社稷破壞都城此天地之大變也恐非小有所為可以消弭因為陛下陳一二大計而言狂計愚不足以感動聽覽臣日夜思惟方今之弊紀綱之壞非一日政事之失非一端水災至大天譴至深亦非一事之所致災譴如此而禍患所應於後者又非一言而可測是則已往而當救之弊甚衆未來而可憂之患無涯亦非獨責二三大臣所能取濟况自古天下之治必與衆賢共之也詩曰濟濟多士文王以寧書載堯舜之朝一時同列者䕫龍稷契之徒二十餘人此特其大者爾其百工在位莫不皆賢也今欲救大弊弭大患如臣前所陳一二大計既未果為而又不思衆賢以濟庶務則天變何以塞人事何以修故臣復敢進用賢之說也臣材識愚暗不能知人然衆人所知者臣亦知之伏見龍圖閣直學士知池州包拯清節美行著自貧賤讜言正論聞于朝廷自列侍從良多補益方今天災人事非賢罔乂之時拯以小故棄之遐逺此議者之所惜也祠部員外郎直史館知襄州張瓌靜默端直外柔內剛學問通達似不能言者至其見義必為可謂仁者之勇此朝廷之臣非州郡之才也祠部員外郎崇文院檢討吕公著故相夷簡之子清靜寡欲生長富貴而淡於榮利識慮深逺文學優長皆可過人而喜自晦默此左右顧問之臣也太常博士羣牧判官王安石學問文章知名當世守道不茍自重其身論議通明兼有時才之用所謂無施不可者凡此四臣者難得之士也拯以小過棄之其三人者進退與衆人無異此皆為世所知者猶如此臣故知天下之廣賢材淪沒於無聞者不少也此四臣者名迹已著伏乞更廣詢採亟加進擢置之左右必有裨補凡臣所言者乃願陛下聽其言用其才以濟時艱爾非為其人私計也若量霑恩澤稍升差遣之類適足以為其人纍耳亦非臣薦賢報國之本心也臣伏見近年變異非止水災譴告丁寧無所不有董仲舒曰國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至斯言極矣伏惟陛下切詔大臣深圖治亂廣引賢俊與共謀議未有衆賢並進而天下不治者此亦救災弭患一端之大者臣又竊見京東京西皆有大水並當存恤而獨河北遣使安撫兩路遂不差人或云就委轉運使此則但虛為行遣爾兩路運司只見河北遣使便認朝廷之意有所重輕以謂不遣使路分非朝廷憂恤之急者兼又放稅賑救皆耗運司錢物於彼不便兼又運使未必皆得人其才未必能救災恤患又其一司自有常行職事亦豈能專意撫綏故臣以為虛作行遣爾伏乞各差一使於此兩路安撫雖未能大假有物賑濟至於興利除害臨時措置更易官吏詢求疾苦事既專一必有所得與就委運司其利百倍也又聞兩浙大旱赤地千里國家運米仰在東南今年災傷若不賑濟則來年不惟民飢國家之物亦自闕供此不可不留心也竊聞三司今嵗京師糧米已有二年備準外猶有三百五十萬餘未漕之物今年東南既旱則來年少納上供此未漕之米誠不可不惜然少輟以濟急時亦未有所闕欲下三司勘㑹若實如臣所聞則乞量輟五七十萬石給與兩浙一路令及時賑救一十三州只作借貸他時米熟不妨還官然所利甚博也此非弭災之術亦救災之一端也臣愚狂妄伏望聖慈特賜裁擇杭州召還乞郡狀蘇軾元祐六年五月十九日龍圖閣學士左朝奉郎前知杭州蘇軾狀奏右臣近奉詔書及聖㫖劄子不允臣辭免翰林學士承㫖恩命及乞郡事臣已第三次奏乞除臣揚越陳蔡一郡去訖竊慮區區之誠未能遽回天意須至盡露本心重干聖聽惶恐死罪惶恐死罪臣昔於治平中自鳳翔職官得替入朝首被英宗皇帝知遇欲驟用臣當時宰相韓琦以臣年少資淺未經試用故且與館職亦㑹臣丁父憂去官及服闋入覲便䝉神宗皇帝召對面賜奬激許臣職外言事自惟羈旅之臣未應得此豈非以英宗皇帝知臣有素故耶是時王安石新得政變易法度臣若少加附㑹進用可必自惟逺人䝉二帝非常之知不忍欺天負心欲具論安石所為不可施行狀以禆萬一然未測聖意待臣深淺因上元有㫖買燈四千碗有司無狀虧減市價臣即上書論奏先帝大喜即時施行臣以此卜知先帝聖明能受盡言上疏六千餘言極論新法不便後復因考試進士擬對御試策進上并言安石不知人不可大用先帝雖未聽從然亦嘉臣愚直初不譴問而安石大怒其黨無不切齒爭欲傾臣御史知雜謝景溫首出死力彈奏臣丁憂歸鄉日舟中曾販私鹽遂下諸路體量追捕當時梢工篙手等考掠取證但以實無其事故煆鍊不成而止臣緣此懼禍乞出連三任外補而先帝眷臣不衰時因賀謝表章即對左右稱道黨人疑臣復用而李定何正臣舒亶三人構造飛語醞釀百端必欲致臣於死先帝初亦不聽而此三人執奏不已故臣得罪下獄定等選差悍吏皇遵將帶吏卒就湖州追攝如捕寇賊臣即與妻子訣别留書與弟轍處置後事自期必死過楊子江便欲自投江中而吏卒監守不果到獄即欲不食求死而先帝遣使就獄有所約勑故獄吏不敢别加非橫臣亦覺知先帝無意殺臣故復留殘喘得至今日及竄責黃州每有表疏先帝復對左右稱道哀憐奬激意欲復用而左右固爭以為不可臣雖在逺亦具聞之古人有言聚蚊成雷積羽沉舟言寡不勝衆也以先帝知臣特達如此而臣終不免於患難者以左右疾臣者衆也及陛下即位起臣於貶所不及一年備位禁林遭遇之異古今無比臣每自惟昆蟲草木之微無以仰報天地生成之德惟有獨立不倚知無不言可以少報萬一始論衙前差雇利害與孫永傅堯俞韓維爭議因亦與司馬光異論光初不以此怒臣而臺諫諸人逆探光意遂與臣為仇臣又素疾程頤之姦未嘗假以色詞故頤之黨人無不側目自朝廷廢黜大姦數人而其餘黨猶在要近陰為之地特未發爾小臣周穜乃敢上疏乞用王安石配享以嘗試朝廷料穜草芥之微敢建此議必有陰主其事者是以上書逆折其姦鋒乞重賜行遣以破小人之謀因此黨人尤加忿疾其後又於經筵極論黃河不可回奪利害且上疏爭之遂大失執政意積此數事恐別致患禍又緣臂痛目昏所以纍章力求補外竊伏思念自忝禁近三年之間臺諫言臣者數四只因發策草麻羅織語言以為謗訕本無疑似口加誣執其間曖昧譖訴陛下察其無實而不降出者又不知其幾何矣若非二聖仁明洞照肝鬲則臣為黨人所傾首領不保豈敢望如先帝之赦臣乎自出知杭州二年粗免人言中間法外刺配顔章顔益二人蓋攻積弊事不獲已陛下亦已赦臣而言者不赦論奏不已其意豈為顔章等哉以此知黨人之意未嘗一日不在傾臣洗垢求瑕止得此事今者忽䝉聖恩召還擢用又除臣弟轍為執政此二事皆非大臣本意竊計黨人必大猜忌磨礪以須勢必如此聞命悸恐以福為災即日上章辭免乞郡行至中路果聞弟轍為臺諫所攻般出廨宇待罪又䝉陛下委曲照見情狀方獲保全臣之剛褊衆所共知黨人嫌忌甚於弟轍豈敢以衰病之餘復犯其鋒雖自知無罪可言而今之言者豈問是非曲直竊謂人主之待臣子不過公道以相知黨人之報怨嫌必為巧發而陰中臣豈敢恃二聖公道之知而傲黨人陰中之禍所以不避煩瀆自陳入仕以來進退本末欲陛下知臣危言危行獨立不回以犯衆怒者所從來逺矣又欲陛下知臣平生冒涉患難危嶮如此今餘年無幾不免有逺禍全身之意再三辭遜實非矯飾柳下惠有言直道而事人焉往而不三黜臣若貪得患失隨世俯仰改其常度則陛下亦安所用臣若守其初心始終不變則羣小側目必無安理雖䝉二聖深知亦恐終不勝衆所以反覆計慮莫若求去非不懷戀天地父母之恩而衰老之餘耻復與羣小計較短長曲直為世間高人長者所笑伏望聖慈察臣至誠特賜指揮執政檢㑹纍奏只作親嫌回避早除一郡所有今來奏狀乞留中不出以保全臣子臣不勝大願若朝廷不以臣不才猶欲驅使或除一重難邊郡臣不敢辭避報國之心死而後已惟不願在禁近使黨人猜疑别加陰中也干犯天威謹俟斧質臣不任祈天請命戰恐殞越之至論變鹽法事宜狀韓愈張平叔所奏鹽法條件右奉勑將變鹽法事貴精詳宜令臣等各陳利害可否聞奏者平叔所上變法條件臣終始詳度恐不可施行各隨本條分析利害如後一件平叔請令州府差人自糶官鹽收實估匹假省司凖舊例支用自然獲利一倍已上者臣令通計所在百姓貧多富少除城郭外有見錢糴鹽者十無二三多用雜物及米穀博易鹽商利歸於已無物不取或從賒貸升斗約以時熟填還用此取濟兩得利便今令州縣人吏坐鋪自糶利不關已罪則加身不得見錢及頭假物恐失官利必不敢糶變法之後百姓貧者無從得鹽而食矣求利未得斂怨已多自然坐失鹽利常數所云獲利一倍臣所未見一件平叔又請鄉村去州縣逺處令所由將鹽就村糶易不得令百姓闕鹽者臣以為鄉村逺處或三家五家山谷居住不可令人吏將鹽家至户到多將則糶貨不盡少將則得錢無多無或作不計其往來自充糧食不足比來商人或自負擔斗石往與百姓博易所冀平價之上利得三錢兩錢不比所由為官所使到村之後必索百姓供應所利至少為弊則多此又不可行者也一件平叔云所務至重須令廟堂宰相充使臣以為若法可行不假令宰相充使若不可行雖宰相為使無益也又宰相者所以臨察百司考其殿最若自為使縱有敗闕遣誰舉之此又不可者也一件平叔又云法行之後停減鹽司所由糧課年可收錢十萬貫臣以為變法之後弊隨事生尚恐不登常數安得更望贏利一件平叔欲令府縣糶鹽每月更加京兆尹料錢百千司録及兩縣令每月各加五十千其餘觀察及諸州刺史縣令録事參軍多至每月五十千少至五千三千者臣今計此用錢已多其餘官典及巡察手力所由等糧課仍不在此數通計所給每嵗不下十萬貫未見其利所費巳廣平叔又云停鹽司諸色所由糧課約每嵗合減得十萬貫錢今臣計其新法亦用十萬不啻減得十萬却用十萬所亡所得一無贏餘也平叔又請以糶鹽多少為刺史縣令殿最多者遷轉不拘常例如闕課利依條科責者刺史縣令職在分憂今惟以鹽利多少為之升黜不復考其治行非唐虞三載考績黜陟幽明之義也一件平叔請定鹽價每斤三十文又每二百里每斤價加收二文以充腳價量地逺近險易加至六文腳價不足官與出名為每斤三十文其實已三十六文也今鹽價京師每斤四十諸州則不登此變法之後祗校數文於百姓未有厚利也腳價用五文者官與出二文用十文者官與出四文是鹽一斤官糶得錢名為三十其實斤多得二十八少得二十六文折長補短每斤收錢不過二十六七百姓折長補短每斤用錢三十四則是公私之間每斤常失七八文也下不及百姓上不歸官家積數至多不可遽算以此言之不為有益平叔又請令所在及農隙時併召車牛般鹽送納都倉不得令有闕絶州縣和雇車牛百姓必無情願事須差配然付腳錢百姓將車載鹽所由先皆無檢齊集之後始得載鹽及至院監請受又須待其輪次不用門户皆被停留輸納之時人事又别凡是和雇無不皆然百姓寧為私家載物取錢五文不為官家載物取十文錢也不和雇則無可載鹽和雇則害及百姓此又不可也一件平叔稱停減鹽務所由收其糧課一嵗尚得十萬貫文尚或作計今又稱既有巡院請量間劇留官吏於倉場勾當要害守捉少置人數優恤糧料嚴加把捉如有漏失私糶等並準條處分者平叔所管鹽務所由人數有幾量留之外收其糧課一嵗尚得十萬貫此又不近理也比來要害守捉人數至多尚有漏失私糶之弊今又減置人數謂能私鹽斷絶此又於理不可也一件平叔云變法之後嵗計必有所餘日用還恐不足請一年以來且未責以課利後必數倍校多者此又不可方今國用常言不足若一嵗頓闕課利為害已深雖云明年校多豈可懸保此又非公私蓄積尚少之時可行者也一件平叔又云浮寄姦猾者轉富土著守業者日貧若官自糶鹽不問貴賤貧富士農工商道士僧尼并兼游惰因其所食盡輸官錢并諸道軍諸使家口親族遞相影占不曾輸稅若官自糶鹽此輩無一人遺漏者臣以此數色人等官未自糶鹽之時從來糴鹽而食不待官自糶然後食鹽糴上或有來字今按文勢恐來字上更有從字今亦補足若官不自糶鹽此色人等不糴鹽而食官自糶鹽即糴而食之則信如平叔所言矣若官自糶與不自糶皆常糴鹽而食則今官自糶亦無利也所謂知其一而不知其二見其近而不見其遠也國家𣙜鹽糶與商人商人納𣙜糶與百姓則是天下百姓無貧富貴賤皆已輸錢於官矣不必與國家交手付錢然後為輸錢於官也一件平叔云初定兩稅時絹一匹直錢三千今絹一匹直錢八百百姓貧虛或先取粟麥價及至收穫悉以還債又充官稅顆粒不殘若官中糶鹽一家五口所食鹽價不過十錢隨日而輸不勞驅遣則必無舉債逃亡之患者臣以為百姓困弊不皆為鹽價貴也今官自糶鹽與依舊令商人糶其價貴賤所校無多通計一家五口所食之鹽平叔所計一日以十錢為率一月當用錢三百是則三日食鹽一斤一月率當十斤新法實價與舊每斤不校三四錢以下通計五口之家以平叔所約之法計之賤於舊價日校一錢月校三十不滿五口之家所校更少然則改用新法百姓亦未免窮困流散也初定稅時一匹絹三千今只八百假如特變鹽法絹價亦未肯貴五口之家因變鹽法日得一錢之利豈能便免作債收穫之時不被徴索輸官稅後有贏餘也以臣所見百姓困弊日久不以事擾之自然漸校不在變鹽法也今絹一匹八百百姓尚多寒無衣者若使匹直三千則無衣者必更衆多况絹之貴賤皆不緣鹽法以此言之鹽法未要變也一件平叔云每州糶鹽不少長吏或有不親公事所由浮詞云當界無人糴鹽臣即請差清强巡官檢責所在實户據口團保給一年鹽使其四季輸納鹽價口多糶少及鹽價遲違請停觀察使見任改散慢官其刺史已下貶與上佐其餘官貶逺處者平叔本請官自糶鹽以寬百姓令其蘇息免更流亡今令責實户口團保給鹽令其隨季輸納鹽價所謂擾而困之非前意也百姓貧家食鹽至少或有淡食動經旬月若據口給鹽依時徴價辦與不辦並須納錢遲違及違條件觀察使巳下各加罪譴茍官吏畏罪必用威刑臣恐因此所在不安百姓轉致流散此又不可之大者也一件平叔請限商人鹽納官後不得輒於諸軍諸使覓職掌把錢捉店看守莊磑以求影庇請令所在官吏嚴加訪察如有違犯應有資財並令納官仍牒送府縣充所由者臣以為鹽商納𣙜為官糶鹽子父相承坐受厚利比百姓實則校優今既奪其業又禁不得求覓職事及為人把錢捉店看守莊磑不知何罪一朝窮蹙之也若必行此則富商大賈必生怨恨或收市重寶逃入反側之地以資寇盜此又不可不慮也一件平叔云行此策後兩市軍人富商大賈或行財賄邀截喧訴請令所由切加收捉如獲頭首所在决殺連狀聚衆人等各决脊杖二十檢責軍司軍户鹽如有隱漏並準府縣例科决並賞所由告人者此一件若果行之不惟大失人心兼亦驚動逺近不知糶鹽所獲幾何而害人蠧政其弊實甚乞罷登萊榷鹽狀蘇軾元豐八年十二月缺日朝奉郎前知登州軍州事蘇軾狀奏右臣竊聞議者謂近來京東𣙜鹽既獲厚利而無甚害以為可行以臣觀之蓋比之河北淮浙用刑稀少因以為便不知舊日京東販鹽小客無以為生大半去為盜賊然非臣職事所當言者故不敢以聞獨臣所領登州計入海中三百里地瘠民貧商賈不至所在鹽貨只是居民喫用今來既𣙜入官官買價賤比之竈户賣與百姓三不及一竈户失業漸以逃亡其害一也居民咫尺大海而令頓食貴鹽深山窮谷遂至食淡其害二也商賈不來鹽積不散有入無出所在官舍皆滿至於露積若行配賣即與福建江西之患無異若不配賣即一二年間舉為糞土坐棄官本官吏被責專副破家其害三也官無一毫之利而民受三害决可廢罷竊聞萊州亦是元無客旅興販事體與此同欲乞朝廷相度不用行臣所言只乞出自聖意先罷登萊兩州𣙜鹽依舊令竈户賣與百姓官收鹽稅其餘州軍更委有司詳講利害施行制置三司條例司論事狀蘇轍竊見本司近日奏遣使者八人分行天下按求農田水利與徭役利害以為方今職司無可信欲有興作當别遣使愚陋不達竊以為國家養材如治民之官碁布海內興利除害豈待他人今始有事輒特遣使使者一出人人不安能者嫌使者之侵其官不能者畏使者之議其短主客相忌情又不通利害相加事多失實使者既知朝廷方欲造事必謂功效可以立成人懷此心誰肯徒返為國生事漸不可知徒使官有送迎供饋之煩民受更張勞擾之弊得不補失將安用之朝廷必欲興事以利民轍以為職司守令足矣蓋勢有所便衆有所安今以職司治民雖其賢不肖不可知而衆所素服於勢為順稍加選擇足以有為是以古之賢君聞選用職司以責其成功未聞遣使以代職司治事者也蓋自近世政失其舊均稅寬恤每事遣使冠蓋相望而卒無絲毫之益謗者至今未息不知今日之使何以異此至於遣使條目亦所未安何者勸課農桑墾闢田野人存則舉非有成法誠使職司得人守令各舉其事罷非時無益之役去猝暴不急之賦不奪其力不傷其財使人知農之可樂則將不勸而自勵今不治其本而遂遣使將使使者何從施之議者皆謂方今農事不修故經界可興農官可置轍觀職司以下勸農之號何異於農官嘉祐以來方田之利令何異於經界行之歷年未聞有益此農田之說轍所以未諭也天下水利雖有未興然而民之勞佚不同國之貧富不等因民之力而用國之富以興水利則其富先見茍誠知生民之勞佚與國用之貧富則水利之廢興可以一言定矣而况事起無漸人不素講未知水利之所在而先遣使使者所至必將求之官吏官吏有不知者有知而不告者有實無可告者不得於官吏必求于民其勢將求於中野興事至此蓋已甚勞此水利之說轍所以未諭也徭役之事議者甚多或欲使鄉户助錢而官自雇人或欲使城郭等第之民與鄉户均役或欲使品官之家與齊民並事此三者皆見其利不見其害者也役人之不可不用鄉户猶官吏之不可不用士人也有田以為生故無逃亡之憂朴魯而少詐故無欺慢之患今乃捨此不用而用浮浪不根之人轍恐掌財者必有盜用之姦捕盜者必有竄逸之弊今國家設捕盜之吏有巡檢有縣尉然較其所獲縣尉常密巡檢常踈非巡檢則愚縣尉則智蓋弓手鄉戶之人與屯駐客軍異耳今將使雇人捕盜則與獨任巡檢不殊盜賊縱橫必自此始轍觀近嵗雖使鄉户頗得雇人然至於所雇逃亡鄉户猶任其責今遂欲於兩稅之外别立一科謂之庸錢以備官雇鄉户舊法革去無餘雇人之責官所自任且自唐楊炎廢租庸調以為兩稅取大厯十四年應於賦斂之數以定兩稅之額則是租庸調與兩稅既兼之矣今兩稅如舊奈何復欲取庸蓋天下郡縣上户常少下户常多少者徭役頻多者徭役簡是以中下之户每得休間今不問户之高低例使出錢助役上户則便下户實難顚倒失宜未見其可然議者皆謂助役之法要使農夫專力於耕轍觀三代之間務農最切而戰陳田獵皆出於農茍以徭役較之則輕重可見矣城郭人户雖號兼并然而緩急之際郡縣所賴飢饉之嵗將勸之分以助民盜賊之嵗將借其力以捍敵故財之在城郭者與在官府無異也方今雖天下無事而三路芻粟之費多取京師銀絹之餘配賣之民皆在城郭茍復充役將何以濟故不如稍加寬假使得休息此誠國家之利非民之利也品官之家復役已久議者不究其本末徒聞漢世宰相之子不免戍邊遂欲使衣冠之人與編户齊役夫一嵗之更不過三日三日之雇不過三百今世三大户之役自公卿以下無得免者以三大户之役而較之三日之更則今世既已重矣安可復加哉蓋自古太平之世國子俊造將用其材者皆復其身胥史賤吏既用其力者皆復其家聖人舊法良有深意以為責之以學而奪其力用之於公而病其私人所難兼是以不取奈何至於官户而又將役之且州縣差役之法皆以丁口為之高下今已去鄉從官則丁口登降其勢難詳將使差役之際以何為據必用丁則州縣有不能知必不用丁則官户之役比民為重今朝廷所以條約官户如租佃田宅斷買坊場廢舉貨財與衆爭利比於平民皆有常禁茍使之與民皆役則昔之所禁皆當廢罷廢罷之則其弊必甚不罷則不如為民此徭役之說轍所以未諭也轍又聞發運之職今將改為均輸常平之法今將變為青苖愚鄙之人亦所未達昔漢武外事四夷內興宫室財用匱竭力不能支用賈人桑𢎞羊之說買賤賣貴謂之均輸雖曰民不加賦而國用饒足然而法術不正吏緣為姦掊克日深民受其病孝昭既立學者爭排其說霍光順民所欲而從之天下歸心遂以無事不意今世此論復興衆口紛然皆謂具患必甚於漢何者方今聚斂之臣才智方略未見𢎞羊之比而朝廷破壞規矩解縱繩墨使得馳騁自由惟利是嗜以轍觀之其害必有不可勝言者矣今立法之初其說甚美徒言徙貴就賤用近易逺茍誠止於此則似亦可為然而假以財貨許置官吏事體既大人皆疑之以為雖不明言販賣然既許之以變易矣變易既行而不與商賈爭利者未之聞也夫商賈等事曲折難行其買也先期而與錢其賣也後期而取貨多方相濟委曲相通倍稱之息由此而得然至往往敗折亦不可期今官買是物必先設官置吏簿書祿廪為費已厚然後使民各輸其所有非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前然則商賈之利何緣可得徒使謗議沸騰商旅不行議者不知慮此至欲捐數百萬緡以為均輸之法但恐此錢一出不可復還之官今欲用忠實之人則患其拘滯不通如欲用巧智之士則患其出沒難考委任之際尤難得人此均輸之說轍所以未諭也常平條勑纖悉具存患在不行非法之弊必欲修明舊制不過以時斂之以利農以時散之以利末斂散既得物價自平貴賤之間官亦有利今乃改其成法雜以青苖逐路置官號為提舉别立賞罰以督增虧法度紛紜何至如此而况錢布於外水旱凶荒有不可知斂之則結怨於民捨之則官將何賴此青苖之說轍所以未諭也凡此數事皆議者之所詳諭明公之所深究而轍於才性朴拙學問空踈用意不同動成違忤雖欲勉勵自效其勢無由茍明公見寬諒其不逮特賜敷奏使轍得外任一官茍免罪戾而明公選賢舉能以備僚佐兩獲所欲幸孰厚焉文編卷十八

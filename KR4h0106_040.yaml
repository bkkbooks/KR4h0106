  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0106_WYG_040-1a, image: WYG1378/WYG1378-0108a.png}
body:
  text: 文編卷四十明唐順之編讀儀禮韓愈余嘗苦儀禮難讀又其行于今者蓋寡沿襲不同復之無由考于今誠無所用之然文王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度邪於是掇其大要竒辭奧旨著于篇學者可觀焉惜乎吾不及其時進退揖讓于其間嗚呼盛哉讀墨子韓愈儒譏墨以上同兼愛上賢明鬼而孔子畏大人居是邦不非其大夫春秋譏專臣不上同哉孔子泛愛親仁以博施濟衆為聖不兼愛哉孔子賢賢以四科進褒弟子疾殁世而名不稱不上賢哉孔子祭如在譏祭如不祭者曰我祭則受福不明鬼哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相悅如是哉余以為辨生於末學各務售其師之説非二師之道本然也孔子必用墨子墨子必用孔子不相用不足為孔墨讀荀子韓愈始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以為孔子之徒沒尊聖人者孟氏而已晚得揚雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟聖人之道不傳于世周之衰好事者各以其説干時君紛紛籍籍相亂六經與百家之説錯雜然老師大儒猶在火于秦黃老于漢其存而醇者孟軻氏而止耳揚雄氏而止耳及得荀氏書於是又知有荀氏者也考其辭時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之間乎孔子刪詩書筆削春秋合於道者著之離於道者黜去之故詩書春秋無疵余欲削荀氏之不合者附於聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與楊大醇而小疵讀孟嘗君傳王安石世皆稱孟嘗君能得士士以故歸之而卒賴其力以脫於虎豹之秦嗟乎孟嘗君特雞鳴狗盜之雄耳豈足以言得士不然擅齊之強得一士焉宜可以南面而制秦尚取雞鳴狗盜之力哉夫雞鳴狗盜之出其門此士之所以不至也題逸少帖蘇軾逸少為王述所困自誓去官超然於事物之外常自言吾當卒以樂死然欲一逰岷嶺勤勤如此而至死不果乃知山水逰放之樂自是人生難必之事况於市朝眷戀之徒而出山林獨往之言固已疏矣題唐氏六家書後蘇軾永禪師書骨氣深穩體兼衆妙精能之至反造疏淡如觀陶彭澤詩初若散緩不收反復不已乃識其竒趣今法帖中有云不具釋智永白者誤收在逸少部中然亦非禪師書也云謹此代申此唐末五代流俗之語耳而書亦不工歐陽率更書妍緊拔羣尤工於小楷高麗遣使購其書高祖歎曰觀其書以為魁梧竒偉人也此非知書者凡書象其為人率更貌寒敏悟絶人今觀其書徑嶮刻厲正稱其貌爾禇河南書清遠蕭散微雜隸體古之論書者兼論其平生茍非其人雖工不貴也河南固忠臣但有譖殺劉洎一事使人怏怏然余嘗考其實恐劉洎末年褊忿實有伊霍之語非譖也若不然馬周明其無此語太宗猶誅洎而不問周何哉此殆天后朝許李所誣而史官不能辨也張長史草書頽然天放略有點畫處而意態自足號稱神逸今世稱善草書有或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也今長安猶有長史真書郎官石柱記作字簡遠如晉宋間人顔魯公書雄秀獨出一變古法如杜子美詩格力天縱奄有漢魏晉宋以來風流後之作者殆難復措手柳少師書本出於顔而能自出新意一字百金非虛語也其言正心則筆正者非獨諷諫理固然也世之小人書字雖工而其神情終有睢盱側媚之態不知人情隨想而見如韓子所謂竊斧者乎抑真爾也然至使人見其書而猶憎之則其人可知矣余謫居黃州唐林夫自湖口以書遺余云吾家有此六人書子為我略評之而書其後林夫之書過我遠矣而反求於余何哉此又未可曉也書黃子思詩集後蘇軾豫嘗論書以謂鍾王之迹蕭散簡遠妙在筆畫之外至唐顔柳始集古今筆法而盡發之極書之變天下翕然以為宗師而鍾王之法益微至於詩亦然蘇李之天成曹劉之自得陶謝之超然蓋亦至矣而李太白杜子美以英瑋絶世之姿凌跨百代古今詩人盡廢然魏晉以來高風絶塵亦少衰矣李杜之後詩人繼作雖間有遠韻而才不逮意獨韋應物柳宗元發纖穠於簡古寄至味於淡泊非餘子所及也唐末司空圖﨑嶇亂兵之間而詩文高雅猶有承平之遺風其論詩曰梅止於酸鹽止於鹹飲食不可無鹽梅而其美常在鹹酸之外蓋自列其詩之有得於文字之表也二十四韻恨當時不識其妙豫三復其言而悲之閩人黃子思慶厯皇祐間號能文者豫嘗聞前輩詩每得佳句妙語反復數四乃識其所謂信乎表聖之言美在鹹酸之外可以一唱而三歎也豫既與其子幾道其孫師是遊得窺其家集而子思篤行高志為吏有異材見於墓志詳矣豫不復論評其詩如此書東臯子傳蘇軾豫飲酒終日不過五合天下之不能飲無在豫下者然喜人飲酒見客舉杯徐引則豫胸中為之浩浩焉落落焉酣適之味乃過於客間居未嘗一日無客客至未嘗不置酒天下之好飲亦無在豫上者常以謂人之至樂莫若身無病而心無憂我則無是二者矣然人之有是者接於豫前則豫安得全其樂乎故所至常蓄善藥有求者則與之而尤喜釀酒以飲客或曰子無病而多蓄藥不飲而多釀酒勞已以為人何也豫笑曰病者得藥吾為之體輕飲者困於酒吾為之酣適蓋專以自為也東臯子待詔門下省日給酒三升其弟靜問曰待詔樂乎曰待詔何所樂但美醖三升殊可戀耳今嶺南法不禁酒豫既得自釀月用米一斛得酒六斗而南雄廣惠循梅五太守間復以酒遺豫略計其所獲殆過於東臯子矣然東臯子自謂五斗先生則日給三升救口不暇安能及客乎若豫者乃日有三升五合入野人道士腹中矣東臯子與仲長子光遊好養性服食預刻死日自為墓志豫蓋友其人於千載或庶幾焉文編卷四十

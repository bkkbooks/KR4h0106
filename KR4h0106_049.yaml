body:
  text: 文編卷四十九明唐順之編答任安書司馬遷少卿足下曩者辱賜書教以慎於接物推賢進士為務意氣勤勤懇懇若望僕不相師而用流俗人之言僕非敢如是也僕雖罷駑亦嘗側聞長者遺風矣顧自以為身殘處穢動而見尤欲益反損是以抑鬱而誰與語諺曰誰為為之孰令聽之蓋鍾子期死伯牙終身不復鼓琴何則士為知已者用女為説已者容若僕大質已虧闕矣雖材懷隨和行若由夷終不可以為榮適足以發笑而自點耳書辭宜答會東從上來又迫賤事相見日淺卒卒無須臾之間得竭指意今少卿抱不測之罪涉旬月迫季冬僕又薄從上雍恐卒然不可諱是僕終已不得舒憤悶以曉左右則長逝者魂魄私恨無窮請略陳固陋闕然久不報幸勿為過僕聞之修身者智之府也愛施者仁之端也取豫者義之符也耻辱者勇之決也立名者行之極也士有此五者然後可以託於世列於君子之林矣故禍莫憯於欲利悲莫痛於傷心行莫醜於辱先而詬莫大於宫刑刑餘之人無所比數非一世也所從來逺矣昔衛霛公與雍渠同載孔子適陳商鞅因景監見趙良寒心同子參乘袁絲變色自古而耻之夫中材之人事有關於宦豎莫不傷氣況慷慨之士乎如今朝廷雖乏人奈何令刀鋸之餘薦天下豪雋哉僕賴先人緒業得待罪輦轂下二十餘年矣所以自惟上之不能納忠效信有竒䇿材力之譽自結明主次之又不能拾遺補闕招賢進能顯巖穴之士外之不能備行伍攻城野戰有斬將搴旗之功下之不能纍日積勞取尊官厚祿以為宗族交逰光寵四者無一遂茍合取容無所短長之效可見於此矣鄉者僕亦嘗厠下大夫之列陪奉外廷末議不以此時引綱維盡思慮今已虧形為掃除之𨽻在闒茸之中乃欲卬首信眉論列是非不亦輕朝廷羞當世之士邪嗟乎嗟乎如僕尚何言哉尚何言哉且事本末未易明也僕少負不羈之才長無鄉曲之譽主上幸以先人之故使得奉薄技出入周衛之中僕以為戴盆何以望天故絶賔客之知忘室家之業日夜思竭其不肖之材力務一心營職以求親媚於主上而事乃有大謬不然者夫僕與李陵俱居門下素非相善也趨舍異路未嘗銜杯酒接殷勤之歡然僕觀其為人自守竒士事親孝與士信臨財亷取豫以義分别有讓恭儉下人常思奮不顧身以徇國家之急其素所蓄積也僕以為有國士之風夫人臣出萬死不顧一生之計赴公家之難斯已竒矣今舉事一不當而全軀保妻子之臣隨而媒孽其短僕誠私心痛之且李陵提步卒不滿五千深踐戎馬之地足歷王庭垂餌虎口橫挑強胡仰億萬之師與單于連戰十餘日所殺過當虜救死扶傷不給旃裘之君長咸震怖乃悉徴左右賢王舉引弓之民一國共攻而圍之轉鬬千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍士無不起躬自流涕沫血飲泣更張空弮冒白刃北向爭死敵者陵未沒時使有來報漢公卿王侯皆奉觴上夀後數日陵敗書聞主上為之食不甘味聽朝不怡大臣憂懼不知所出僕竊不自料其卑賤見主上慘悽怛悼誠欲效其欵欵之愚以為李陵素與士大夫絶甘分少能得人之死力雖古名將不能過也身雖陷敗彼觀其意且欲得其當而報漢事已無可奈何其所摧敗功亦足以暴於天下僕懷欲陳之而未有路適會召問即以此指推言陵功欲以廣主上之意塞睚眥之辭未能盡明明主不深曉以為僕沮二師而為李陵遊説遂下於理拳拳之忠終不能自列因為誣上卒從吏議家貧財賂不足以自贖交逰莫救左右親近不為一言身非木石獨與法吏為伍深幽囹圄之中誰可告訴者此正少卿所親見僕行事豈不然邪李陵既生降隤其家聲而僕又茸以蠶室重為天下觀笑悲夫悲夫事未易一二為俗人言也僕之先人非有剖符丹書之功文史星厯近乎卜祝之間固主上所戲弄倡優所畜流俗之所輕也假令僕伏法受誅若九牛亡一毛與螻蟻何異而世又不與能死節者比特以為智窮罪極不能自免卒就死耳何也素所自樹立使然也人固有一死死或重於泰山或輕於鴻毛用之所趨異也太上不辱先其次不辱身其次不辱理色其次不辱辭令其次詘體受辱其次易服受辱其次關木索被箠楚受辱其次鬄毛髮嬰金鐵受辱其次毁肌膚斷支體受辱最下腐刑極矣傳曰刑不上大夫此言士節不可不厲也猛虎處深山百獸震恐及其在穽檻之中搖尾而求食積威約之漸也故士有畫地為牢藝不入削木為吏議不對定計於鮮也今交手足受木索暴肌膚受榜箠幽於圜牆之中當此之時見獄吏則頭搶地視徒𨽻則心惕息何者積威約之藝也及已至此言不辱者所謂強顔耳曷足貴乎且西伯伯也拘羑里李斯相也具五刑淮隂王也受械於陳彭越張敖南鄉稱孤繫獄扺罪絳侯誅諸吕權傾五伯囚於請室魏其大將也衣赭衣關三木季布為朱家鉗奴灌夫受辱居室此人皆身至王侯將相聲聞鄰國及罪至罔加不能引決自裁在塵埃之中古今一體安在其不辱也由此言之勇怯藝也強弱形也審矣曷足怪乎且人不能蚤自裁繩墨之外已稍陵夷至於鞭箠之間乃欲引節斯不亦逺乎古人所重施刑於大夫者殆為此也夫人情莫不貪生惡死念父母顧妻子至激於義理者不然乃有不得已也今僕不幸蚤失二親無兄弟之親獨身孤立少卿視僕於妻子何如哉且勇者不必守節怯夫慕義何處不勉焉僕雖怯耎欲茍活亦頗識去就之分矣何至自沈溺纍紲之辱哉且夫臧獲婢妾猶能引決况若僕之不得已乎所以隱忍茍活幽糞土之中而不辭者恨私心有所不盡鄙陋沒世而文采不表於後也古者富貴而名磨滅不可勝記唯倜儻非常之人稱焉蓋西伯拘而演周易仲尼厄而作春秋屈原放逐乃賦離騷左丘失眀厥有國語孫子臏腳兵法修列不韋遷蜀世傳吕覽韓非囚秦説難孤憤詩三百篇大抵賢聖發憤之所為作也此人皆意有所鬱結不得通其道故述往事思來者乃如左丘明無目孫子斷足終不可用退論書䇿以舒其憤思垂空文以自見僕竊不遜近自託於無能之辭網羅天下放失舊聞考之行事稽其成敗興壞之理凡百三十篇亦欲以究天人之際通古今之變成一家之言草創未就適會此禍惜其不成是以就極刑而無愠色僕誠已著此書藏之名山傳之其人通邑大都則僕償前辱之責雖萬被戮豈有悔哉然此可為智者道難為俗人言也且負下未易居下流多謗議僕以口語遇遭此禍重為鄉黨戮笑汙辱先人亦何面目復上父母之丘墓乎雖纍百世垢彌甚耳是以腸一日而九回居則忽忽若有所亡出則不知所如往每念斯耻汗未嘗不發背霑衣也身直為閨閣之臣寧得自引深藏於巖穴耶故且從俗浮沈與時俯仰以通其狂惑今少卿乃教以推賢進士無乃與僕之私指謬乎今雖欲自雕琢曼辭以自解無益於俗不信祗取辱耳要之死日然後是非乃定書不能盡意故略陳固陋寄許京兆孟容書栁宗元宗元再拜五文伏蒙賜書誨諭微悉重厚欣踊恍惚疑若夢寐捧書叩頭悸不自定伏念得罪來五年未嘗有故舊大臣肯以書見及者何則罪謗交積群疑當道誠可怪而畏也以是兀兀忘行尤負重憂殘骸餘魂百病所集痞結伏積不食自飽或時寒熱水火互至內消肌骨非獨瘴癘為也忽奉教命乃知幸為大君子所宥欲使膏盲沈沒復起為人夫何素望敢以及此宗元早嵗與負罪者親善始竒其能謂可以共立仁義裨教化過不自料勤勤勉厲唯以中正信義為志以興堯舜孔子之道利安元元為務不知愚陋不可力強其素意如此也末路厄塞臲兀事既壅隔狠忤貴近狂疏繆戾蹈不測之辜群言沸騰鬼神交怒加以素卑賤暴起領事人所不信射利求進者填門排户百不一得一旦快意更造怨讟以此大罪之外詆訶萬端旁午搆扇便為敵讎協心同攻外連強暴失職者以致其事此皆丈人所聞見不敢為他人道説懷不能已復載簡牘此人雖萬被誅戮不足塞責而豈有賞哉今其黨與幸獲寬貸各得善地無公事坐食俸祿明德至渥也尚何敢更俟除棄廢痼以希望外之澤哉年少氣鋭不識幾微不知當不但欲一心直遂果陷刑法皆自所求取得之又何怪也宗元於衆黨人中罪狀最甚神理降罰又不能即死猶對人言語求食自活迷不知耻日復一日然亦有大故自以得姓來二千五百年代為冡嗣今抱非常之罪居夷獠之鄉卑濕昏霧恐一日填委溝壑曠墜先緒以是怛然痛恨心骨沸熱煢煢孤立未有子息荒陬中少士人女子無與為婚世亦不肯與罪人親眤以是嗣續之重不絶如縷每常春秋時享孑立捧奠顧眄無後繼者凛凛然欷歔惴惕恐此事便已摧心傷骨若受鋒刃此誠丈人所共憫惜也先墓在城南無異子弟為主獨託村鄰自譴逐來消息存亡不一至鄉閭主守者固以益怠晝夜哀憤懼便毁傷松柏芻牧不禁以成大戾近世禮重拜掃今已闕者四年矣每遇寒食則北向長號以首頓地想田野道路士女遍滿皂𨽻庸丐皆得上父母丘墓馬醫夏畦之鬼無不受子孫追養者然此已息望又何以云哉城西有數頃田樹果數百株多先人手自封植今已荒穢恐便斬伐無復愛惜家有賜書三千卷尚在善和里舊宅宅今已三易主書存亡不可知皆付受所重常繫心腑然無可為者立身一敗萬事瓦裂身殘家破為世大僇復何敢更望大君子撫慰收恤尚置人數中耶是以當食不知辛鹹節適洗沐盥漱動逾嵗時一搔皮膚塵垢滿爪誠憂恐悲傷無所告訴以至此也自古賢人才士秉志遵分被謗議不能自明者僅以百數故有無兄盜嫂娶孤女云撾婦翁者然賴當世豪傑分明辨别卒光史籍管仲遇盜升為功臣匡章被不孝之名孟子禮之今已無古人之實為而有詬欲望世人之明已不可得也直不疑置金以償同舍劉寬下車歸牛鄉人此誠知疑似之不可辨非口舌所能勝也鄭詹束縛於晉終以無死鍾儀南音卒獲返國叔向囚虜自期必免范座騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寬擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗此皆瓌偉博辨竒閎之士能自解脫今以恇怯淟涊下才末伎又嬰恐懼痼病雖欲慷慨攘臂自同昔人愈疏濶矣賢者不得志於今必取貴於後古之著書者皆是也宗元近欲務此然力薄才劣無異能解雖欲秉筆覼縷神志荒耗前後遺忘終不能成章往時讀書自以不至抵滯今皆頑然無復省録每讀古人一傳數紙已後則再三伸卷復觀姓氏旋又廢失假令萬一除刑部囚籍復為士列亦不堪當世用矣伏惟興哀於無用之地垂德於不報之所但以通家宗祀為念有可動心者操之勿失不敢望歸掃塋域退托先人之廬以盡餘齒姑遂少北益輕瘴癘就婚娶求胤嗣有可付託即冥然長辭如得甘寢無復恨矣書辭繁委無以自道然即文以求其志君子固得其肺肝焉無任懇戀之至不宣宗元再拜後十九日復上書韓愈愈聞之蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎怨茍不至乎欲其死者則將大其聲疾呼而望其仁之也彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨茍不至乎欲其死者則將狂奔盡氣濡手足焦毛髮救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之強學力行有年矣愚不惟道之險夷行且不息以蹈於窮餓之水火其既危且急矣大其聲而疾呼矣閣下其亦聞而見之矣其將往而全之歟抑將安而不救與有來言於閣下者曰有觀溺於水而爇於火者有可救之道而終莫之救也閣下且以為仁人乎哉不然若愈者亦君子之所宜動心者也或謂愈子言則然矣宰相則知子矣如時不可何愈竊謂之不知言者誠其材能不足當吾賢相之舉耳若所謂時者固在上位者之為耳非天之所為也前五六年時宰相薦聞尚有自布衣抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間於已仕未仕者况在宰相吾君所尊敬者而曰不可乎古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方於此情隘辭蹙不知所裁亦惟少垂憐焉上宰相第三書韓愈三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三握其髮當是時天下之賢才皆已舉用姦邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻之在荒服之外者皆已賔貢天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徴嘉瑞麟鳳龜龍之屬皆已備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺握髮為勤而止哉惟其如是故于今頌成王之德而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賔貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑被者豈盡得宜休徴嘉瑞麟鳳龜龍之屬豈盡備至其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉其所稱説豈盡無所補哉今雖不能如周公吐哺握髮亦宜引而進之察其所以而去就之不宜默默而已也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之説焉閣下其亦察之古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之魯於魯不可則去之齊於齊不可則去之宋之鄭之秦之楚也今天下一君四海一國舍乎此則異域矣去父母之邦矣故士之行道者不得於朝則山林而已矣山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈每自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而已惴惴焉惟不得出大賢之門下是懼亦惟少垂察焉瀆冒威尊惶恐無已愈再拜應科目時與人書韓愈月日愈再拜天池之濵大江之濆曰有怪物焉蓋非常鱗凡介之品彚匹儔也其得水變化風雨上下於天不難也其不及水蓋尋常尺寸之間耳無髙山大陵曠塗絶險為之關隔也然其窮涸不能自致乎水為獱獺之笑者蓋十八九矣如有力者哀其窮而轉運之蓋一舉手一投足之勞也然是物也負其異於衆也且曰爛死於沙泥吾寧樂之若俯首帖耳搖尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其在命而且鳴號之者亦命也愈今者實有類於是是以忘其疏愚之罪而有是説焉閣下其亦憐察之與楊京兆憑書栁宗元月日宗元再拜獻書丈人座前役人胡要返命奉教誨壯厲感發鋪陳廣大上言推延賢雋之道難於今之世次及文章末以愚蒙剝喪頓悴無以守宗族復田畝為念憂憫備極不唯其親密故舊是與復有公言顯賞許其素尚而激其忠誠者用是踊躍敬懼類嚮時所被簡牘萬萬有加焉故敢悉其愚以獻左右大凡薦舉之道古人之所謂難者其難非茍一而已矣知之難言之難聽信之難夫人有有之而耻言之者有有之而樂言之者有無之而工言之者有無之而不言似有之者有之而耻言之者上也雖舜猶難知之孔子亦曰失之子羽下斯而言知而不失者妄矣有之而言之者次也德如漢光武馮衍不用才如王景略以尹緯為令史是皆終日號鳴大吒而卒莫之省無之而工言者賊也趙括得以代亷頗馬謖得以惑孔明今之若此類者不乏於世將相大臣聞其言而必能辨之者亦妄矣無之而不言者土木類也周仁以重臣為二千石許靖以人譽而致位三公近世尤好此類以為長者最得薦寵夫言朴愚無害者其於田野鄉閭為匹夫雖稱為長者可也自抱關擊柝以往則必敬其事愈上則及物者愈大何事無用之朴哉今之言曰某子長者可以為大官類非古之所謂長者也則必土木而已矣夫捧土揭木而致之巖廊之上蒙以紱冕翼以徒𨽻趨走其左右豈有補於萬民之勞苦哉聖人之道不益於世用凡以此也故曰知之難孔子曰仁者其言也訒孟子病未同而言然則彼未吾信而吾告之以士必有三間是將曰彼誠知士歟知文歟疑之而未重一間也又曰彼無乃私好歟交以利歟二間也又曰彼不足我而惎我哉兹咈吾事三間也畏是而不言故曰言之難言而有是患故曰聽信之難唯明者為能得其所以薦得其所以言得其所以聽一不至則不可冀矣然而君子不以言聽之難而不務取士士理之本也茍有司之不吾信吾知之不捨其必有信吾者矣茍知之雖無有司而士可以顯則吾一旦操用人之柄其必有施矣故公卿之大任莫若索士士不預備而熟講之卒然君有問焉宰相有咨焉有司有求焉其無所以應之則大臣之道或闕故不可憚煩今之世言士者先文章文章士之末也然立言存乎其中即末而操其本可十七八未易忽也自古文字之多莫如今今之後生為文希屈馬者可得數人希王褒劉向之徒者又可得十人至陸機潘嶽之比纍纍相望若皆為之不已則文章之大盛古未有也後代乃可知之今之俗耳庸目無所取信桀然特異者乃見此耳丈人以文律通流當世叔仲鼎列天下號為文章家今又生敬之敬之希屈馬者之一也天下方理平今之文士咸能先理理不一斷於古書老生直趨堯舜大道孔氏之志眀而出之又古之所難有也然則文章未必為士之末獨采取何如耳宗元自小學為文章中間幸聨得甲乙科第至尚書郎専百官章奏然未能究知為文之道自貶官來無事讀百家書上下馳騁乃少得知文章利病去年吳武陵來美其齒少才氣壯健可以興西漢之文章日與之言因為之出十數篇書庶幾鏗鏘陶冶時時得見古人情狀然彼古人亦人耳夫何逺哉凡人可以言古不可以言今桓談亦云親見揚子雲容貌不能動人安肯傳其書誠使博如莊周哀如屈原奧如孟軻壯如李斯峻如馬遷富如相如明如賈誼専如揚雄猶為今之人則世之髙者至少矣由此觀之古之人未必不薄於當世而榮於後世也若吳子之文非丈人無以知之獨恐世人之才髙者不肯久學無以盡訓詁風雅之道以為一世甚盛若宗元者才力闕敗不能逺騁髙厲與諸生摩九霄撫四海夸耀於後之人矣何也凡為文以神志為主自遭責逐繼以大故荒亂耗竭又常積憂恐神志少矣所讀書隨又遺忘一二年外痞氣尤甚加以衆疾動作不常眊眊然騷擾內生霾霧填擁慘沮雖有意窮文章而病奪其志矣每聞人大言則蹶氣震怖撫心按膽不能自止又永州多火災五年之間四為大火所迫徒跣走出壞牆穴牖僅免燔灼書籍散亂毁裂不知所往一遇火恐纍日茫洋不能出言又安能盡意於筆硯矻矻自苦以傷危敗之魂哉中心之悃愊鬱結具載所獻許京兆丈人書不能重煩於陳列凡人之黜棄皆望望思得效用而宗元獨以無有是念自以罪大不可解才質無所入茍焉以敘憂栗為幸敢有他志伏以先君稟孝德秉直道髙於天下仕再登朝至六品官宗元無似亦嘗再登朝至六品矣何以堪此且栁氏號為大族五六從以來無為朝士者豈愚蒙獨出數百人右哉以是自忖官已過矣寵已厚矣夫知足與知止異宗元知足矣若便止不受祿位亦所未能今復得好官猶不辭讓何也以人望人尚足自進如其不至則故無憾進取之志息矣身世孑然無可以為家雖甚崇寵之孰與為榮獨恨不幸獲託姻好而早凋落寡居十餘年嘗有一男子然無一日之命至今無以託嗣續恨痛常在心目孟子稱不孝有三無後為大今之汲汲於世者唯懼此而已矣天若不棄先君之德使有世嗣或者猶望延夀命以及大宥得歸鄉閭立家室則子道畢矣過是而猶競於寵利者天厭之天厭之丈人旦夕歸朝廷復為大僚伏惟以此為念流涕頓顙布之座右不任感激之至宗元再拜投時相書歐陽修某不佞疲軟不能強筋骨與工人田夫坐市區服畎畝為力役之勞獨好取古書文字考尋前世以來聖賢君子之所為與古之車旗服器名色等數以求國家之治賢愚之任至其炳然而精者時亦穿蠧盜取飾為文辭以自欣喜然其為道閎深肆大非愚且迂所能究及用功益精力益不足其勞反甚於市區畎畝而其所得較之誠有不及焉豈勞力而役業者成功易勤心而為道者至之難歟欲悔其所難而返就其易則復慙聖人為山一簣止焉之言不敢叛棄故退失其小人之事進不及君子之文茫然其心罔識所嚮若棄車川遊漫於中流不克攸濟回視陸者顧瞻徨徨然復思之人之有材能抱道德懷知慮而可自肆於世者雖聖與賢未嘗無不幸焉禹之偏枯郤克之跛丘明之盲有不幸其身者矣抱關擊柝栖惶奔走孟子之戰國揚雄之新室有不幸其時者矣少焉而材學焉而不回賈誼之毁仲舒之禁錮雖有其時有不幸其偶者矣今以六尺可用之軀生太平有道之世無進身毁罪之懼是其身時偶三者皆幸於古人之所有者獨不至焉豈天之所豫不兩足歟亦勉之未臻歟伏惟明公履道懷正以相天下上以承天子社稷之大計下以理公卿百職之宜賢者任之以能不賢者任之以力由士大夫下至於工商賤技皆適其分而收其長如修之愚既不足任之能亦不堪任以力徒以常有志於學也今幸以文字試於有司因自顧其身時偶三者之幸也不能默然以自羞謹以所業雜文五軸贄閽人以俟進退之命焉上韓太尉書蘇軾軾生二十有二年矣自七八嵗知讀書及壯大不能曉習時事獨好觀前世盛衰之迹與其一時風俗之變自三代以來頗能論著以為西漢之衰其大臣守尋常而不務大略東漢之末士大夫多竒節而不循正道元成之間天下無事公卿將相安其祿位顧其子孫各欲樹私恩買田宅為不可動之計低回畏避以茍嵗月而皆依放儒術六經之言而取其近似者以為口實孔子曰惡居下流而訕上惡訐以為直而劉歆谷永之徒又相與彌縫其闕而緣飾之故其衰也靡然如蛟龍釋其風雲之勢而安於豢養之樂終以不悟使其肩披股裂登於匹夫之爼豈不悲哉其後桓靈之君懲往昔之弊而欲樹人主之威權故頗用嚴刑以督責臣下忠臣義士不容於朝廷故羣起於草野相與力為險怪驚世之行使天下豪傑奔走於其門得為之執鞭而其自喜不啻若卿相之榮於是天下之士囂然皆有無用之虛名而不適於實效故其亡也如人之病狂不知堂宇宫室之為安而號呼奔走以自顛仆昔者太公治齊舉賢而尚功周公曰後世必有篡弒之臣周公治魯親親而尊尊太公曰後世浸微矣漢之事迹誠大類此豈其當時公卿士大夫之行與其風俗之剛柔各有以致之耶古之君子剛毅正直而守之以寬忠恕仁厚而發之以義故其在朝廷則士大夫皆知洗濯磨淬戮力於王事而不敢為非常可怪之行此三代王政之所由興也曽子曰上失其道民散久矣天下之人幸而有不為阿附茍容之事者則務為倜儻矯異求如東漢之君子惟恐不及可悲也已軾自幼時聞富公與太尉皆號為寬厚長者然終不可犯以非義及來京師而二公同時在兩府愚不能知其心竊於道塗望其容貌寬然如有容見惡不怒見善不喜豈古所謂大臣者歟夫循循者固不能有所為而翹翹者又非聖人之中道是以願見太尉得聞一言足矣太尉與大人最厚而又嘗辱問其姓名此尤不可以不見今已後矣不宣軾再拜上梅直講書蘇軾某官執事某每讀詩至鴟梟讀書至君奭常竊悲周公之不遇及觀史見孔子厄於陳蔡之間而絃歌之聲不絶顔淵仲由之徒相與問答夫子曰匪兕匪虎率彼曠野吾道非耶吾何為於此顔淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾為爾宰夫天下雖不能容而其徒自足以相樂如此乃今知周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其富貴而夫子之所與共貧賤者皆天下之賢才則亦足與樂乎此矣軾七八嵗時始知讀書聞今天下有歐陽公者其為人如古孟軻韓愈之徒而又有梅公者從之遊而與之上下其議論其後益壯始能讀其文詞想見其為人意其飄然脫去世俗之樂而自樂其樂也方學為對偶聲律之文求斗升之祿自度無以進見於諸公之間來京師逾年未嘗窺其門今年春天下之士羣至於禮部執事與歐陽公實親試之軾不自意獲在第二既而聞之人執事愛其文以為有孟軻之風而歐陽公亦以其能不為世俗之文也而取焉是以在此非左右為之先容非親舊為之請屬而嚮之十餘年間聞其名而不得見者一朝為知已退而思之人不可以茍富貴亦不可以徒貧賤有大賢焉而為其徒則亦足恃矣茍其僥一時之幸從車騎數十人使閭巷小民聚觀而贊歎之亦何以易此樂也傳曰不怨天不尤人蓋優哉遊哉可以卒嵗執事名滿天下而位不過五品其容色溫然而不怒其文章寬厚敦朴而無怨言此必有所樂乎斯道也軾願與聞焉上劉侍讀書蘇軾軾聞天下之所少者非才也才滿於天下而事不立天下之所少者非才也氣也何謂氣曰是不可名者也若有鬼神焉而隂相之今夫事之利害計之得失天下之能者舉知之而不能辦能辦其小而不能辦其大則氣有所不足也夫氣之所加則已大而物小於是乎受其至大而不為之驚納其至繁而不為之亂任其至難而不為之憂享其至樂而不為之蕩是氣也受之於天得之於不可知之間傑然有以蓋天下之人而出萬物之上非有君長之位殺奪施與之權而天下環嚮而歸之此必有所得者矣多才而敗者世之所謂不幸者也若無能焉而每以成者世之所謂天幸者也夫幸與不幸君子之論不施於成敗之間而施於窮達之際故凡所以成者其氣也其所以敗者其才也氣不能守其才則焉往而不敗世之所以多敗者皆知求其才而不知論其氣也若夫明公其亦有所得矣軾非敢以虛辭而曲説誠有所見焉耳夫天下有分得其分則安非其分而以一毫取於人則群起而爭之天下有無窮之利自一命以上至於公相其利可愛其塗甚夷説為科條而待天下之擇取然天下之人翹首跂足而群望之逡巡而不敢進者何也其分有所止也天下有無功而遷一級者則衆指之矣遷者不容於下遷之者不容於上而况其甚者乎明公起於徒步之中執五寸之翰書方尺之簡而列於士大夫之上橫翔捷出冠壓百吏而為之表猶以為未也而加之師友之職付之全秦之地地方千里則古之方伯連帥所不能有也東障崤澠北跨河渭南倚巴蜀西控戎夏則古之秦昭王商君白起之徒所以殣身殘民百戰而有之者也奮臂而取兩制不十餘年而天下不以為速非有汗馬之勞米鹽之能以擅富貴之美而天下不以為無功抗顔髙議自以無前而天下不以為無讓此其氣固有以大服於天下矣天下無大事也天下而有大事非其氣之過人者則誰實辦之軾逺方之鄙人逰於京師聞明公之風幸其未至於公相而猶可以誦其才氣之盛美而庶幾於知言惜其將遂西去而不得從也故請問於門下以願望見其風采不宣軾再拜上上曽丞相書蘇軾軾聞之將有求於人而其説不誠則難以望其有合矣世之竒特之士其處也莫不為異衆之行而其出也莫不為怪詭之詞比物引類以搖撼當世理不可化則欲以勢劫之將以術售其身古之君子有韓子者其為説曰王公大人不可以無貧賤之士居其下風而推其後大其聲名而久其傳雖其貴賤之濶絶而其相須之急不啻若左右手嗚呼果其用是説也則夫世之君子所為老死而不遇者無足怪矣今夫扣之者急則應之者疑其辭夸則其實必有所不副今吾以為王公大人不可以一日而無吾也彼將退而考其實則亦無乃未至於此耶昔者漢髙未嘗喜儒而不失為明君衛霍未嘗薦士而不失為賢公卿吾將以吾之説而彼將以彼之説彼是相拒而不得其歡心故貴賤之間終不可以合而道終不可以行何者其扣之急而其辭夸也鬻千金之璧者不之於肆而願觀者塞其門觀者歎息而主人無言焉非不能言知言之無加也今也不幸而坐於五達之衢又呶呶焉自以為希世之珍過者不顧執其裾而強觀之則其所鬻者可知矣王公大人其無意於天下後世者亦安以求為也茍其不然則士之過於其前而有動於其目者彼將褰裳疾行而摟取之故凡皇皇汲汲者舉非吾事也昔者嘗聞明公之風矣以大臣之子孫而取天下之髙第才足以過人而自視缺然常若不足安於小官而樂於恬淡方其在太學之中衣繒飯糗若將終身至於德發而不可掩名髙而不可抑貴為天子之少宰而其自視不加於其舊之錙銖其度量宏達至於如此此其尤不可以夸辭而急扣者也軾不佞自為學至今十有五年以為凡學之難者難於無私無私之難者難於通萬物之理故不通乎萬物之理雖欲無私不可得也已好則好之已惡則惡之以是自信則惑也是故幽居默處而觀萬物之變盡其自然之理而斷之於中其所不然者雖古之所謂賢人之説亦有所不取雖以此自信而亦以此自知其不恱於世也故其言語文章未嘗輒至於公相之門今也天子舉直諫之士而兩制過聽謬以其名聞竊以為與於此者皆有求於吾君吾相者也故亦敢獻其文凡十篇而書為之先惟所裁擇幸甚上樞密韓太尉書蘇轍太尉執事轍生好為文思之至深以為文者氣之所形然文不可以學而能氣可以養而致孟子曰我善養吾浩然之氣今觀其文章寬厚宏博充乎天地之間稱其氣之剛大太史公行天下周覽四海名山大川與燕趙間豪俊交遊故其文疏蕩頗有竒氣此二子者豈嘗執筆學為如此之文哉其氣充乎其中而溢乎其貌動乎其言而見乎其文而不自知也轍生十有九年矣其居家所與遊者不過其鄰里鄉黨之人所見不過數百里之間無髙山大野可登覽以自廣百氏之書雖無所不讀然皆古人之陳迹不足以激發其志氣恐遂汨沒故決然捨去求天下竒聞壯觀以知天地之廣大過秦漢之故都恣觀終南嵩華之髙北顧黃河之奔流慨然想見古之豪傑至京師仰觀天子宫闕之壯與倉廪府庫城池苑囿之富且大也而後知天下之巨麗見翰林歐陽公聽其議論之宏辨觀其容貌之秀偉與其門人賢士大夫遊而後知天下之文章聚乎此也太尉以才略冠天下天下之所恃以無憂四夷之所憚以不敢發入則周公召公出則方叔召虎而轍也未之見焉且夫人之學也不志其大雖多而何為轍之來也於山見終南嵩華之髙於水見黃河之大且深於人見歐陽公而猶以為未見太尉也故願得觀賢人之光耀聞一言以自壯然後可以盡天下之大觀而無憾轍年少未能通習吏事嚮之來非有取於斗升之祿偶然得之非其所樂然幸得賜歸待選使得優遊數年之間將歸益治其文且學為政太尉茍以為可教而辱教之又幸矣文編卷四十九

body:
  text: 文編巻六十三明唐順之編唐故給事中皇太子侍讀陸文通先生墓表栁宗元孔子作春秋千五百年以名為傳者五家今用其三焉秉觚牘焦思慮以為論注疏説者百千人矣攻訐狠怒以辭氣相擊排冐沒者其為書處則充棟宇出則汗牛馬或合而隱或乖而顯後之學者窮老盡氣左視右顧莫得而本則專其所學以訾其所異黨枯竹䕶朽骨以至於父子傷夷君臣詆悖者前世多有之甚矣聖人之難知也有吳郡人陸先生質以其師友天水啖助洎趙匡能知聖人之㫖故春秋之言及是而光明使庸人小童皆可積學以入聖人之道傳聖人之教是其徳豈不侈大矣哉先生字某既讀書得制作之本而獲其師友於是合古今散同異聨之以言累之以文葢講道者二十年書而志之者又十餘年其事大備為春秋集註十篇辯疑七篇㣲指二篇明章大中發露公器其道以生人為主以堯舜為的苞羅旁魄膠轕下上而不出於正其法以文武為首以周公為翼揖讓升降好惡喜怒而不過乎物既成以授世之聰眀之士使陳而眀之故其書出焉而先生為巨儒用是為天子爭臣尚書郎國子博士給事中皇太子侍讀皆得其道刺二州守人知仁永貞年侍東宫言其所學為古君臣圖以獻而道達乎上是歲嗣天子踐祚而理尊優師儒先生以疾聞臨問加禮某月日終于京師某月日𦵏于某郡某里嗚呼先生道之存也以書不及施於政道之行也以言不及覩其理門人世儒是以増慟将𦵏以先生為能文聖人之書通于後世遂相與謚曰文通先生後若干祀有學其書者過其墓哀其道之所由乃作石以表碣胡先生墓表歐陽修先生諱瑗字翼之姓胡氏其上世為陵州人後為泰州如臯人先生為人師言行而身化之使誠眀者達昏愚者勵而頑傲者革故其為法嚴而信為道久而尊師道廢久矣自景祐眀道以來學者有師惟先生暨泰山孫眀復石守道三人而先生之徒最盛其在湖州之學弟子去來常數百人各以其經轉相傳授其教學之法最備行之數年東南之士莫不以仁義禮樂為學慶歴四年天子開天章閣與大臣講天下事始慨然詔州縣皆立學於是建太學於京師而有司請下湖州取先生之法以為太學法至今為著令後十餘年先生始來居太學學者自逺而至太學不能容取旁官署以為學舍禮部貢舉歲所得士先生弟子十嘗居四五其髙弟者知名當時或取甲科居顯仕其餘散在四方隨其人賢愚皆循循雅飭其言談舉止遇之不問可知為先生弟子其學者相語稱先生不問可知為胡公也先生初以白衣見天子論樂拜秘書省校書郎辟丹州軍事推官改宻州觀察推官丁父憂去職服除為保寧軍節度推官遂居湖學召為諸王宫教授以疾免已而以太子中舍致仕遷殿中丞於家皇祐中驛召至京師議樂復以為大理評事兼太常寺主簿又以疾辭歲餘為光禄寺丞國子監直講乃居太學遷大理寺丞賜緋衣銀魚嘉祐元年遷太子中允充天章閣侍講仍居太學已而病不能朝天子數遣使者存問又以太常博士致仕東歸之日太學之諸生與朝廷賢士大夫送之東門執弟子禮路人嗟歎以為榮以四年六月六日卒于杭州享年六十有七以明年十月五日𦵏于烏程何山之原其世次官邑與其行事莆陽蔡君謨具誌于幽堂嗚呼先生之徳在乎人不待表而見於後世然非此無以慰學者之思乃掲于其墓之原六年八月三日廬陵歐陽修述連處士墓表歐陽修連處士應山人也以一布衣終于家而應山之人至今思之其長老教其子弟所以孝友恭謹禮讓而温仁必以處士為法曰為人如連公足矣其矜寡孤獨㓙荒饑饉之人皆曰自連公亡使吾無所告依而生以為恨嗚呼處士居應山非有政令恩威以親其人而能使人如此其所謂行之以躬不言而信者歟處士諱舜賔字輔之其先閩人自其祖光裕嘗為應山令後為磁郢二州推官卒而反𦵏應山遂家焉處士少舉毛詩一不中而其父正以疾廢于家處士供養左右十餘年因不復仕進父卒家故多貲悉散以賙鄉里而教其二子以學曰此吾貲也歲饑出榖萬斛以糶而市榖之價卒不能増及旁近縣之民皆賴之盗有竊其牛者官為捕之甚急盗窮以牛自歸處士為之媿謝曰煩爾送牛厚遺以遣之嘗以事之信陽遇盗於西關左右告以處士盗曰此長者不可犯也捨之而去處士有弟居雲夢往省之得疾而卒以其柩歸應山應山之人去縣數十里迎哭爭負其柩以還過縣市市人皆哭為之罷市三日曰當為連公行䘮處士生四子曰庻庠庸膺其二子教以學者後皆舉進士及第今庻為壽春令庠為宜城令處士以天聖八年十二月某日卒慶厯二年某月日𦵏于安陸蔽山之陽自卒至今二十年應山之長老識處士者與其縣人嘗賴以為生者往往尚皆在其子弟後生聞處士之風者尚未逺使更三四世至于孫曽其所傳聞有時而失則懼應山之人不復能知處士之詳也乃表其墓以告于後人八年閏正月一日廬陵歐陽修述處士征君墓表王安石淮之南有善士三人皆居於真州之揚子杜君者寓於醫無貧富貴賤請之輙往與之財非義輙謝而不受時時窮空幾不能以自存而未嘗有不足之色葢善言性命之理而其心曠然無累於物而予嘗與之語久之而不厭也徐君忠信篤實遇人至謹雖疾病召筮不正衣巾不見寓於筮日得百數十錢則止不更筮也能為詩亦好屬文有集若千巻兩人者以醫筮故多為賢士大夫所知而征君獨不聞於世征君者諱某字某事其母夫人至孝居鄉里恂恂恭謹樂振人之窮急而未嘗與人校曲直好蓄書能為詩有子五人而教其三人為進士某今為某官某今為某官某亦再貢於鄉征君與兩人者相為友至驩而莫逆也兩人者皆先征君以死而征君以某年某月某甲子終于家年七十七噫古者一鄉之善士必有以貴於一鄉一國之善士必有以貴于一國此道亡也久矣余獨私愛夫三人者而樂為好事者道之而征君之子又以請于是書以遺之使之鑱諸墓上杜君諱嬰字大和徐君諱仲堅字某石曼卿墓表歐陽修曼卿諱延年姓石氏其上世為幽州人幽州入于契丹其祖自成始以其族間走南歸天子喜其來将禄之不可乃家于宋州之宋城父諱補之官至太常博士幽燕俗勁武而曼卿少亦以氣自豪讀書不治章句獨慕古人竒節偉行非常之功視世俗屑屑無足動其意者自顧不合於時乃一混以酒然好劇飲大醉頺然自放由是益與時不合而人之從其遊者皆知愛曼卿落落可竒而不知其才之有可用也年四十八康定二年二月四日以太子中允秘閣校理卒于京師曼卿少舉進士不中真宗推恩三舉進士皆補奉職曼卿初不肯就張文節公素竒之謂曰母老乃擇禄耶曼卿矍然起就之遷殿直久之改太常寺太祝知濟州金鄉縣歎曰此亦可以為政也縣有治聲通判乾寧軍丁毋永安縣君李氏憂服除通判永静軍皆有能名充舘閣校勘累遷大理寺丞通判海州還為校理荘獻明肅太后臨朝曼卿上書請還政天子其後太后崩范諷以言見幸引嘗言太后事者遽得顯官欲引曼卿曼卿固止之乃已自契丹通中國徳眀盡有河南而臣屬遂務休兵養息天下然内外弛武三十餘年曼卿上書言十事不報已而元昊反西方用兵始思其言召見稍用其説籍河北河東陜西之民得鄉兵數十萬曼卿奉使籍兵河東還稱㫖賜緋衣銀魚天子方思盡其才而且病矣既而聞邊将有欲以鄉兵扞賊者笑曰此得吾粗也夫不教之兵勇怯相雜若怯者見敵而動則勇者亦牽而潰矣今或不暇教不若募其敢行者則人人皆勝兵也其視世事蔑若不足為及聴其施設之方雖精思深慮不能過也状貌偉然喜酒自豪若不可繩以法度退而質其平生趣舍大節無一悖于理者遇人無賢愚皆盡忻歡及間而可不天下是非善惡當其意者無幾人其為文章勁徤稱其意氣有子濟滋天子聞其喪官其一子使禄其家既卒之三十七日𦵏于太清之先塋其友歐陽修表於其墓曰嗚呼曼卿寧自混以為髙不少屈以合世可謂自重之士矣士之所負者愈大則其自顧也愈重自顧愈重則其合愈難然欲與共大事立竒功非得難合自重之士不可為也古之魁雄之人未始不負髙世之志故寧或毁身汚迹卒困於無聞或老且死而幸一遇猶克少施於世若曼卿者非徒與世難合而不克所施亦其不幸不得至乎中壽其命也夫其可哀也夫尚書屯田員外郎贈兵部員外郎錢君墓表歐陽修君諱冶字良範姓錢氏世為彭城人後徙吳興自君之七世祖寳又徙常州之武進曽祖諱某祖諱某父諱某當唐末五代錢氏起餘杭據浙東西為吳越王於是時常州或屬江南或屬吳越而武進錢氏獨不顯方以儒學廉讓行于鄉里連三世不仕宋興取江南常州歸于有司君始以州進士舉中景徳二年甲科試祕書省校書郎為揚州廣陵潮州海陽縣令遷寧國軍節度推官監黄州麻城茶塲遂知縣事遷著作佐郎知蘄州蘄水懐安軍金堂縣又遷秘書丞知泰州如臯縣再遷屯田員外郎通判宣州未行眀道二年六月十一日以疾卒于家享年五十有二君少好學能為文辭家貧其母賢嘗躬織絍以資其學問每夜讀書母為滅燭止之君陽卧母且睡輙復起讀州舉進士第一試禮部髙第遂中甲科為吏長於决獄歴六縣皆有能政潮州自五代時劉氏暴殘其民君為海陽經年民歸業者千餘户由是海陽升為大縣潮之大姓某氏火迹其來自某家吏捕訊之某家號寃不服太守刁湛曰獄非錢君不可君問大姓得火所發牀足驗之疑里仇家物因率吏入仇家取牀折足合之皆是仇人即服曰火自我出然故遺其迹某家者欲自免也某家誠寃君即日出某家獄致仇人以法舉州稱為神明其佐宣州數决大獄及旁及郡獄有疑者皆歸决於君工部侍郎凌䇿知宣州尤稱君文學曰吏事不足汚子當以文章居臺閣欲薦其文未及而䇿卒初宣州官歲市茶于涇縣命君主之䇿子不肖以惡茶數千斤入于官君立焚之以白䇿䇿益以此知君䇿卒君歎曰世無知我者矣在麻城以茶課歲増五倍遂遷著作金堂故多盗君以伍保籍民察其出入凡為盜者許其徒告以贖罪盗遂止㑹甘露降其縣明年麥禾大稔麥一莖五岐禾一莖五穗者縣人以為君政所致謂之錢公三瑞君歎曰吾知治民爾瑞豈吾致哉縣人為君立生祠如臯民不農桑以鹽為生君曰使民足以衣食鹽猶農也乃悉求鹽利害為條目民便其利而鹽最増積以石數者至四十五萬君在如臯時年五十或歎其仕不達君曰使吾政行於民是達也蔡文忠公為御史中丞數欲引君為御史㑹君卒君平生所為文章三百餘篇號曰晦書君之皇考贈殿中丞母諸葛氏封萬年縣太君徙封福昌娶蒋氏初封樂安縣君又封福清子男五人曰公餗公瑾公輔公儀公佐蒋氏有賢行自君之卒日以君所為朂其五子以學蒋氏後君二十年以卒卒時公瑾公輔皆以進士及第公瑾為新鄭尉公輔以文章知名當世為太常丞集賢校理錢氏自其祖寳徙武進其居與𦵏皆在其縣之遵教鄉敦行里慶厯三年九月庚申公餗等𦵏君于其居之東北原皇里水之北至和二年三月壬午以蒋夫人從歐陽修曰錢姓出陸終葢顓頊之苗裔始以士為周官久而以為姓自三代以來無甚顯者至唐末錢氏多居東南及鏐乘亂世起餘杭有地十三州號兼吳越而王者幾百年而武進錢氏獨以隱徳累世不顯豈以力者如彼而以徳者如此哉豈其盛衰遲速之理固有不同哉武進之錢自寳七世至君有聞又有賢子不墜益彰其埶孰止葢恃力者雖盛而必衰以徳者愈遲而終顯立石刻辭其示彌逺集賢校理丁君墓表歐陽修君諱寳臣字元珍姓丁氏常州晉陵人也景祐元年舉進士及第為峽州軍事判官淮南節度掌書記杭州觀察判官改太子中允知剡縣徙知端州遷太常丞博士坐海賊儂智髙陷城失守奪一官徙置黄州久之復得太常丞監湖州酒税又復博士知諸暨縣編校秘閣書籍遂為校理同知太常禮院君為人外和怡而内謹立望其容貌進趨知其君子人也居鄉里以文行稱少孤與其兄篤於友悌兄亡服䘮三年曰吾不幸㓜失其親兄吾父也慶厯中詔天下大興學校東南多學者而湖杭尤盛君居杭學為教授以其素所學問而自修於鄉里者教其徒久而學者多所成就其後天子患館閣職廢特置編校八員其選甚精乃自諸暨召居秘閣君治州縣聴决精眀賦役有法民畏信而便安之其始治剡也如此後治諸暨剡隣邑也其民聞其來讙曰此剡人愛而思之謂不可復得者也今吾民乃幸而得之而君亦以治剡者治之由是所至有聲及居閣下淡然不以勢利動其心未嘗走謁公卿與諸學士羣居恂恂人皆愛親之葢其召自諸暨也以材行選及在館閣久而朝廷益知其賢英宗毎論人物屢稱之國家自削除僣偽東南遂無事偃兵弛備者六十餘年矣而嶺外尤甚其山海荒濶列郡數十皆為下州朝廷命吏常以一縣視之故其守無城其戍無兵一日智髙乘不備陷邕州殺将吏有衆萬餘人順流而下潯梧封康諸小州所過如破竹吏民皆望而散走獨君猶率羸卒百餘拒戰殺六七人既敗亦走初賊未至君語其下曰幸得兵數千人伏小湘峽扼至險以擊驕兵可必勝也乃請兵於廣州凢九請不報又嘗得賊覘者一人斬之賊既平議者謂君文學宜居臺閣備侍從以承顧問而眇然以一儒者守空城提百十饑羸之卒當萬人卒至之賊可謂不幸而天子亦以謂縣官不素設備而責守吏不以空手捍賊宜原其情故一切輕其法而君以嘗請兵不得又能拒戰殺賊則又輕之故它失守者皆奪兩官而君奪一官已而知其賢復召用後十餘年御史知雜蘇宷受命之明日建言請復治君前事奪其職而黜之天子知君賢不可以一眚廢而先帝已察其罪而輕之矣又數更大赦且罪無再坐然猶以御史新用故屈君使少避而不傷之也乃用其校理歲滿所當得者即以君通判永州方待闕於晉陵以治平四年四月某甲子暴中風眩一夕卒享年五十有八累官至尚書司封員外郎階朝奉郎勲上輕車都尉曽祖諱某祖諱某皆不仕父諱某贈尚書工部侍郎母張氏仙游縣太君君娶饒氏封晉陵縣君先卒子男四人曰隅曰除曰隮皆舉進士曰恩兒才一歲女一人適著作佐郎集賢校理胡宗愈君既卒天子憫然推恩録其子隅為太廟齋郎君之平生履憂患而遭困阨處之安焉未嘗見戚戚之色其於窮達壽夭知有命固無憾於其心然知君之賢哀其志而惜其命止於斯者不能無恨也於是相與論者君之大節伐石紀辭以表見於後世庶幾以慰其思焉熈寧元年六月十四日廬陵歐陽修述尚書屯田員外郎張君墓表歐陽修君諱谷字應之世為開封尉氏人曽祖節祖遇皆不仕父炳為鄭州原武縣主簿因留家焉今為原武人也君舉進士及第為河陽河南主簿蘇州觀察推官開封府士曹叅軍遷著作佐郎知陽武縣通判眉州累遷屯田員外郎復知陽武縣以疾致仕卒于家享年五十有九君為人剛介好學問事父母孝與朋友信其為吏潔亷所至有能稱其在河南時予為西京留守推官與謝希深尹師魯同在一府其所與㳺雖他掾屬賔客多材賢少壮馳騁於一時而君居其間年尚少獨苦羸病肺唾血者已十餘年幸其疾少間輙亦從諸君飲酒諸君愛而止之君曰我豈久生者邪雖它人視君亦若不能勝朝夕者其後同府之人皆解去而希深師魯與當時少壮馳騁者䘮其十八九而君癯然唾血如故後二十年始以疾卒君雖病羸而力自為善居官為吏未嘗廢學問多為賢士大夫所知乃知夫康强者不可恃以久而羸弱者未必不能生雖其遲速長短相去幾何而強者不自勉或死而泯沒於無聞弱者能自力則必有稱於後世君其是已君嘗謂予曰吾旦暮人耳無所取於世也尚何區區於仕哉然吾嘗哀禄之及於親者薄若幸得不死而官登于朝冀竊國家褒贈之寵以榮其親然後歸病于原武之廬足矣乃益買田治室於原武以待君自河南蘓州累為名公卿所薦乃遷著作為郎官贈其父太子中允母宋氏京兆縣太君於是遂致仕歸于原武營其徳政鄉之張固村原将𦵏其親卜以皇祐五年十一月某日用事前四日君亦卒遂以某日從𦵏于原上予與君遊久記其昔所謂予者且哀君之賢而不幸又嘉君之志信而有成於其𦵏也不及銘乃表於其墓君娶祝氏封華陽縣君有子曰損試将作監主簿至和二年三月七日翰林學士尚書吏部郎中知制誥充史館修撰歐陽修撰河南府司録張君墓表歐陽修故大理寺丞河南府司録張君諱汝士字堯夫開封襄邑人也明道二年八月壬寅以疾卒于官享年三十有七卒之七日𦵏洛陽北邙山下其友人河南尹師魯誌其墓而廬陵歐陽修為之銘以其𦵏之速也不能刻石乃得金谷古塼命太原王顧以丹為隷書納于壙中嘉祐二年某月某日其子吉甫山甫改𦵏君于伊闕之教忠鄉積慶里君之始𦵏北邙也吉甫纔數歲而山甫始生余及送者相與臨宂視窆且封哭而去今年春余主試天下貢士而山甫以進士試禮部乃來告以将改𦵏其先君因出銘以示余葢君之卒距今二十有五年矣初天聖明道之間錢文僖公守河南公王家子特以文學仕至貴顯所至多招集文士而河南吏屬適皆當時賢材知名士故其幕府號為天下之盛君其一人也文僖公善待士未嘗責以吏職而河南又多名山水竹林茂樹竒花怪石其平臺清池上下荒墟草莽之間余得日從賢人長者賦詩飲酒以為樂而君為人静黙修潔常坐府治事省文書尤盡心於獄訟初以辟為其府推官既罷又辟司録河南人多賴之而守尹屢薦其材君亦工書喜為詩閒則從余遊其語言簡而有意飲酒終日不亂雖醉未嘗頺墮與之居者莫不服其徳故師魯誌之曰飭身臨事余嘗愧堯夫堯夫不余愧也始君之𦵏皆以其地不善又𦵏速禮不備君夫人崔氏有賢行能教其子而二子孝謹克自樹立卒能改𦵏君如吉卜君其可謂有後矣自君卒後文僖公得罪貶死漢東吏屬亦各引去今師魯死且十餘年王顧者死亦六七年矣其送君而臨宂者及與君同府而遊者十葢八九死矣其幸而在者不老則病且衰如予是也嗚呼盛衰生死之際未始不如是是豈足道哉惟為善者能有後而託於文字者可以無窮故於其改𦵏也書以遺其子俾碣于墓且以寫余之思焉吉甫今為大理寺丞知緱氏縣山甫始以進士賜出身云翰林學士右諫議大夫史館修撰歐陽修撰太常博士周君墓表歐陽修有篤行君子曰周君者孝於其親友於其兄弟居父母喪與其兄某弟某居于倚廬不飲酒食肉者三年其言必戚其哭必哀除䘮而癯然不能勝人事者葢久而後復自孔子在魯而魯人不能行三年之喪其弟子疑以為問則非魯而他國可知也孔子殁而其後世又可知也今世之人知事其親者多矣或居䘮而不哀者有矣生能事而死能哀或不知喪禮者有矣或知禮而以謂喪主於哀而已不必合於禮者有矣如周君者事生盡孝居䘮盡哀而以禮者也禮之失久矣喪禮尤廢也今之居喪者惟仕宦婚嫁聴樂不為此特法令之所禁爾其衰麻之數哭泣之節居處之别飲食之變皆莫知夫有禮也在上位者不以身率其下在下者無所望於其上其遂廢矣乎故吾於周君有所取也君諱堯卿字子俞道州永明縣人也天聖二年舉進士累官至太常博士歴連衡二州司理叅軍桂州司録知髙安寧化二縣通判饒州未行以慶厯五年六月朔日卒于朝集之舍享年五十有一皇祐五年某月日𦵏于道州永眀縣之紫㣲岡曽祖諱某祖諱某父諱某贈某官母唐氏封某縣太君娶某氏封某縣君君學長於毛鄭詩左氏春秋家貧不事生産喜聚書居官禄雖薄常分俸以賙宗族朋友人有慢已者皆厚為禮以愧之其為吏所居皆有能政有文集二十巻君有子七人曰諭鼎州司理叅軍曰詵湖州歸安主簿曰謐曰諷曰諲曰説曰誼皆未仕嗚呼孝非一家之行也所以移於事君而忠仁於宗族而睦交於朋友而信始於一鄉推之四海表于金石示之後世而勸考君之所施者無不可以書也豈獨俾其子孫之不隕也哉内殿崇班薛君墓表歐陽修公諱塾字宗道姓薛氏資政殿學士兵部尚書簡肅公之弟薛之世徳終始有簡肅公之誌與碑公官至内殿崇班以某年某月某日卒官于蜀州其子仲儒以其喪歸𦵏于綘州之正平先𦵏而來乞銘以誌予幸嘗紀次簡肅公之徳而又得銘公其銘曰公躬直清官以材稱惟賢是似不愧其兄既𦵏而仲孺又來請曰銘之藏誠以永吾先君于不朽然不若碣于隧以表見于世之昭昭也予惟薛氏於綘為著姓簡肅公於公為兄弟而公之世徳予既見之銘而其子又欲碣以昭顯于世可謂孝矣然予考古所謂賢人君子功臣烈士之所以銘見于後世者其言簡而著及後世衰言者自疑於不信始繁其文而猶患於不章又備其行事惟恐不為世之信也若薛氏之著于綘簡肅公之信于天下而予之銘公不愧於其兄則公之銘不待繁言而信也然其行事終始予亦不敢畧而誌諸墓矣今之碣者無以加焉則取其可以簡而著者書之以慰其子之孝思而信于綘之人云永春縣令歐君墓表歐陽修君諱慶字貽孫姓歐氏其上世為韶州曲江人後徙均州之鄖鄉又徙襄州之榖城乾徳二年分榖城之隂城鎮為乾徳縣建光化軍歐氏遂為乾徳人修嘗為其縣令問其故老鄉閭之賢者皆曰有三人焉其一人曰太傅贈太師中書令鄧文懿公其一人曰尚書屯田郎中戴國忠其一人曰歐君也三人者學問出處未嘗一日不同其忠信篤於朋友孝悌稱於宗族禮義達于鄉閭乾徳之人初未識學者見此三人皆尊禮而愛親之既而皆以進士舉于鄉里而君獨黜于有司後二十年始以同三禮出身為潭州湘潭主簿陳州司法叅軍監考城酒税遷彭州軍事推官知泉州永春縣事而鄧公已貴顯于朝君尚為州縣吏所至上官多鄧公故舊君絶口不復道前事至終其去不知君為鄧公友也君為吏廉貧宗族之孤㓜者皆養于家居鄉里有訟者多就君决曲直得一言遂不復爭人至于今傳之嗟夫三人之為道無所不同至其窮達何其異也而三人者未嘗有動於其心雖乾徳之人稱三人者亦不以貴賤為異則其幸不幸豈足為三人者道哉然而達者昭顯于一時而窮者泯沒於無述則為善者何以勸而後世之來者何以考徳於其先故表其墓以示其子孫君有子世英為鄧城縣令世勣舉進士君以天聖七年卒享年六十有四𦵏乾徳之西北廣節山之原寳文閣待制常公墓表王安石右正言寳文閣待制特贈右諫議大夫汝隂常公以熙寧十年二月己酉卒以五月壬申𦵏臨川王某誌其墓曰公學不期言也正其行而已行不期聞也信其義而已所不取也可使貪者矜焉而非彫斵以為亷所不為也可使弱者立焉而非矯抗以為勇官之而不事召之而不赴或曰必退者也終此而已矣及為今天子所禮則出而應焉於是天子悦其至虚已而問焉使莅諌職以觀其廸已也使董學政以觀其造士也公所言乎上者無傳然皆知其忠而不阿所施乎下者無助然皆見其正而不茍詩曰胡不萬年惜乎既病而歸死也自周道隱觀學者所取舍大抵時所好也違俗而適已獨行而特起嗚呼公賢逺矣傳載公久莫如以石石可磨也亦可泐也謂公且朽不可得也貴池主簿沈君墓表王安石予先君女子三人其季嫁沈子也他日有問予先君之壻而予告以沈子其知沈子之家者必曰是其父能文學他日從沈子於銅陵而遊觀其縣縣人得沈子必曰是其父能政事已而予求其父所為書於沈子沈子曰先君卒於逆旅其書悉為人取去無在者又問其政事曰吾嘗聞於祖母矣先君為池州貴池縣主簿令不能而縣大治者先君之力也嘗攝銅陵縣事縣人有兄弟爭財者先君能為辨其曲直而卒使之感寤讓財相與同居其去也兩縣人追送涕泣逺焉而後去其施設之方則吾不得其詳也沈子遂言曰先君事生嚴喪死哀自族人至於婚友無所不盡其心終身好書未嘗一日不讀而於酣樂嫚戲未嘗豫也循道守官以不諂其上而幾至於殆者數矣故其仕嘗有去志而無留心唯不得夀考富貴以卒其學問䆒其施設故其文章不多見而獨為士友所知其行義不博聞而獨為親黨所稱其政事不大傳而獨為邑人所記日月行矣不即論次懼将卒於無傳也吾願以此屬子矣予應曰然子之先君固賢而又有賢子其後世将必大不可使無考也於是為之論次曰君諱某字某再世家于杭州之錢塘而其先湖州之武康人也武康之族顯久矣至唐有既濟者為尚書禮部員外郎生傳師為尚書吏部侍郎贈吏部尚書尚書生詢為潞州刺史昭義軍節度使自昭義以上三世皆有名迹列於國史昭義生丹為舒州團練判官舒州生牢江南李氏時為饒州刺史饒州生廷蘋為濠州軍事推官濠州生承誨大宋為眀州定海縣主簿累贈光禄卿光禄生玉尚書屯田郎中知真州軍州事君真州之子天聖二年以進士起家楚州司法叅軍再調為池州貴池縣主簿年三十六疾卒於京師之逆旅夫人元氏生男子伯荘季長叔通皆為進士而季長則予先君之壻也君以某年某月某甲子𦵏真州城北之原葢其行義文學政事皆如其子之言云瀧岡阡表歐陽修嗚呼惟我皇考崇公卜吉于瀧岡之六十年其子修始克表於其阡非敢緩也葢有待也修不幸生四歲而孤太夫人守節自誓居窮自力於衣食以長以教俾至于成人太夫人告之曰汝父為吏廉而好施與喜賔客其俸禄雖薄常不使有餘曰毋以是為我累故其亡也無一瓦之覆一壠之植以庇而為生吾何恃而能自守邪吾於汝父知其一二以有待於汝也自吾為汝家婦不及事吾姑然知汝父之能養也汝孤而㓜吾不能知汝之必有立然知汝父之必将有後也吾之始歸也汝父免於母䘮方逾年歲時祭祀則必涕泣曰祭而豐不如養之薄也間御酒食則又涕泣曰昔常不足而今有餘其何及也吾始一二見之以為新免於喪適然耳既而其後常然至其終身未嘗不然吾雖不及事姑而以此知汝父之能養也汝父為吏嘗夜燭治官書屢廢而歎吾問之則曰此死獄也我求其生不得爾吾曰生可求乎曰求其生而不得則死者與我皆無恨也矧求而有得邪以其有得則知不求而死者有恨也夫常求其生猶失之死而世常求其死也回顧乳者抱汝而立于旁因指而歎曰術者謂我歲行在戍将死使其言然吾不及見兒之立也後當以我語告之其平居教他子弟常用此語吾耳熟焉故能詳也其施於外事吾不能知其居于家無所矜飾而所為如此是真發於中者邪嗚呼其心厚於仁者邪此吾知汝父之必将有後也汝其勉之夫養不必豐要於孝利雖不得溥於物要其心之厚於仁吾不能教汝此汝父之志也修泣而志之不敢忘先公少孤力學咸平三年進士及第為道州判官泗綿二州推官又為泰州判官享年五十有九𦵏沙溪之瀧岡太夫人姓鄭氏考諱徳儀世為江南名族太夫人恭儉仁愛而有禮初封福昌縣太君進封樂安安康彭城三郡太君自其家少㣲時治其家以儉約其後常不使過之曰吾兒不能茍合於世儉薄所以居患難也其後修貶夷陵太夫人言笑自若曰汝家故貧賤也吾處之有素矣汝能安之吾亦安矣自先公之亡二十年修始得禄而養又十有二年列官于朝始得贈封其親又十年修為龍圖閣直學士尚書吏部郎中留守南京太夫人以疾終于官舍享年七十有二又八年修以非才入副樞宻遂叅政事又七年而罷自登二府天子推恩褒其三世葢自嘉祐以來逢國大慶必加寵錫皇曽祖府君累贈金紫光禄大夫太師中書令曽祖妣累封楚國太夫人皇祖府君累贈金紫光禄大夫太師中書令兼尚書令祖妣累封吳國太夫人皇考崇公累贈金紫光禄大夫太師中書令兼尚書令皇妣累封越國太夫人今上初郊皇考賜爵為崇國公太夫人進號魏國於是小子修泣而言曰嗚呼為善無不報而遲速有時此理之常也惟我祖考積善成徳冝享其隆雖不克有於其躬而賜爵受封顯榮褒大實有三朝之錫命是足以表見於後世而庇賴其子孫矣乃列其世譜具列于碑既又載我皇考崇公之遺訓太夫人之所以教而有待於修者並掲于阡俾知夫小子修之徳薄能鮮遭時竊位而幸全大節不辱其先者其來有自熙寧三年歲次庚戍四月辛酉朔十有五日乙亥男推誠保徳崇仁翊戴功臣觀文殿學士特進行兵部尚書知青州軍州事兼管内勸農使充京東東路安撫使上柱國樂安郡開國公食邑四千三百户食實封一千二百户修表清河郡公房公墓碣銘韓愈公諱啓字某河南人其大王父融王父琯仍父子為宰相融相天后事逺不大傳琯相𤣥宗肅宗處艱難中與道進退薨贈太尉流聲于兹父乘仕至秘書少監贈太子詹事公胚胎前光生長食息不離典訓之内目濡耳染不學以能始為鳯翔府叅軍尚少人吏迎觀望見咸曰真房太尉家子孫也不敢弄以事轉同州澄城丞益自飾理同官憚伏衞晏使嶺南黜陟求佐得公擢摘良奸南土大喜還進昭應主簿裴胄領湖南表公為佐拜監察御史部無遺事胄遷江西又以節鎮江陵公一隨遷佐胄累功進至刑部員外郎賜五品服副胄使事為上介上聞其名徴拜虞部員外在省籍籍遷萬年令果辨憿絶貞元末王叔文用事材公之為舉以為容州經畧使拜御史中丞服佩視三品管有嶺外十三州之地林蠻洞蜒守條死要不相漁刼税節賦時公私有餘削衣貶食不立資遺以班親舊朋友為義在容九年遷領桂州封清河郡公食邑三千户中人使授命書應待失禮客主違言徵貳太僕未至貶䖍州長史而坐使者以疾卒官年五十九其子越能輯父事無失謹謹致孝既𦵏碣墓請銘銘曰房氏二相厥家以聞條葉被澤况公其孫公初為吏亦以門庇佐使于南乃始以致既辦萬年命屏容服功緒卓殊氓獠循業維不順隨失署亡資非公之怨銘以著之唐河中府法曹張君墓碣銘韓愈有女奴抱嬰兒來致其主夫人之語曰妾張圓之妻劉也妾夫常語妾云吾常獲私於夫子且曰夫子天下之名能文辭者凡所言必傳世行後今妾不幸夫逢盗死途中将以日月𦵏妾重哀其生志不就恐死遂沈泯敢以其稚子汴見先生将賜之銘是其死不為辱而名永長存所以葢覆其遺𦙍子若孫且死萬一能有知将不悼其不幸於土中矣又曰妾夫在嶺南時嘗疾病泣語曰吾志非不如古人吾才豈不如今人而至於是而死於是邪若爾吾哀必求夫子銘是爾與吾不朽也愈既哭弔辭遂叙次其族世名字事始終而銘曰君字直之祖讙父孝新皆為官汴宋間君嘗讀書為文辭有氣有吏才嘗感激欲自奮㧞樹功名以見世初舉進士再不第因去事宣武軍節度使得官至監察御史坐事貶嶺南再遷至河中府法曹叅軍攝虞鄉令有能名進攝河東令又有名遂署河東從事綘州闕刺史攝綘州事能聞朝廷元和四年秋有事適東方既還八月壬辰死于汴城西雙丘年四十有七眀年二月日𦵏河南偃師妻彭城人世有衣冠祖好順泗州刺史父泳卒蘄州别駕女四人男一人嬰兒汴也是為銘故御史周君碣柳宗元有唐貞臣汝南周氏諱某字某以諫死𦵏于某貞元十二年栁宗元立碣于其墓左在天寳年有以謟䛕至相位賢臣放退公為御史抗言以白其事得死于墀下史臣書之公之死而佞者始畏公議於虖古之不得其死者衆矣若公之死志匡王國氣震奸佞動獲其所斯盖得其死者歟公之徳之才洽於傳聞卒以不試而獨申其節猶能奮百代之上以為世軌第令生於定哀之間則孔子不曰未見剛者出於秦楚之後則漢祖不曰安得猛士而存不及興王之用沒不遭聖人之歎誠立志者之所悼也故為之銘銘曰忠為美道是履諫而死佞者止史之志石以紀為臣軌黄憲列傳後漢書黄憲字叔度汝南慎陽人也世貧賤父為牛醫頴川荀淑至慎陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閎所未及勞問逆曰子國有顔子寧識之乎閎曰見吾叔度邪是時同郡戴良才髙倨慠而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來耶對曰良不見叔度不自以為不及既覩其人則瞻之在前忽然在後固難得而測矣同郡陳蕃周舉常相謂曰時月之間不見黄生則鄙吝之萌復存乎心及蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣太守王龔在郡禮進賢達多所降致卒不能屈憲郭林宗少㳺汝南先過袁閎不宿而退進往從憲累日方還或以問林宗林宗曰奉髙之器譬諸汎濫雖清而易挹叔度汪汪若千頃波澄之不清淆之不濁不可量也憲初舉孝亷又辟公府友人勸其仕憲亦不拒之暫到京師而還竟無所就年四十八終天下號曰徴君論曰黄憲言論風㫖無所傳聞然士君子見之者靡不服深逺去玼吝将以道周性全無徳而稱乎余曽祖穆侯以為憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方若及門於孔氏其殆庶乎故嘗著論云何蕃傳韓愈太學生何蕃入太學者廿餘年矣歲舉進士學成行尊自太學諸生推頌不敢與蕃齒相與言於助教博士助教博士以状申於司業祭酒司業祭酒撰次蕃之羣行焯焯者數十餘事以之升於禮部而以聞於天子京師諸生以薦蕃名文説者不可選紀公卿大夫知蕃者比肩立莫為禮部為禮部者率蕃所不合者以是無成功蕃淮南人父母具全初入太學歲率一歸父母止之其後間一二歲乃一歸又止之不歸者五歲矣蕃純孝人也閔親之老不自克一日揖諸生歸養于和州諸生不能止乃閉蕃空舍中於是太學六館之士百餘人又以蕃之義行言於司業陽先生城請諭留蕃於是太學闕祭酒㑹陽先生出道州不果留歐陽詹生言曰蕃仁勇人也或者曰蕃居太學諸生不為非義𦵏死者之無歸哀其孤而字焉惠之大小必以力復斯其所謂仁歟蕃之力不任其體其貌不任其心吾不知其勇也歐陽詹生曰朱泚之亂太學諸生舉将從之來請起蕃蕃正色叱之六館之士不從亂兹非其勇歟惜乎蕃之居下其可以施於人者不流也譬之水其為澤不為川乎川者髙澤者卑髙者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也天将雨水氣上無擇於川澤澗谿之髙下然則澤之道其亦有施乎抑有待於彼者歟故凡貧賤之士必有待然後能有所立獨何蕃歟吾是以言之無亦使其無傳焉安重誨傳五代史安重誨應州人也其父福遷事晉為将以驍勇知名梁攻朱宣於鄆州晉兵救宣宣敗福遷戰死重誨少事明宗為人眀敏謹恪明宗鎮安國以為中門使及兵變於魏所與謀議大計皆重誨與郭彦威决之眀宗即位以為左領軍衞大将軍樞宻使兼領山南東道節度使固辭不拜改兵部尚書使如故在位六年累加侍中兼中書令重誨自為中門使己見親信而以佐命功臣處機宻之任事無大小皆所叅决其勢傾動天下雖其盡忠勞力時有補益而恃矜功寵威福自出旁無賢人君子之助其獨見之慮禍釁所生至於臣主俱傷幾滅其族斯其可哀者也重誨嘗出過御史臺門殿直馬延誤衝其前導重誨怒即臺門斬延而後奏是時隨駕㕔子軍士桑𢎞遷毆傷相州録事叅軍親從兵馬使安䖍走馬衝宰相前導𢎞遷罪死䖍决杖而已重誨已斬延乃請降勅處分明宗不得已從之由是御史諫官無敢言者宰相任圜判三司以其職事與重誨爭不能得圜怒辭疾退居於磁州朱守殷以汴州反重誨遣人矯詔馳至其家殺圜而後白誣圜與守殷通謀明宗皆不能詰也而重誨恐天下議已因取三司積欠二百餘萬請放之兾以悦人而塞責明宗不得已為下詔蠲除之其威福自出多此類也是時四方奏事皆先白重誨然後聞河南縣獻嘉禾一莖五穗重誨視之曰偽也笞其人而遣之夏州李仁福進白鷹重誨却之明日白曰陛下詔天下毋得獻鷹鷂而仁福違詔獻鷹臣已却之矣重誨出眀宗隂遣人取之以入他日按鷹於西郊戒左右無使重誨知也宿州進白兎重誨曰兎隂且狡雖白何為遂却而不白明宗為人雖寛厚然其素性果於殺人馬牧軍使田令方所牧馬瘠而多斃坐劾當死重誨諌曰使天下聞以馬故殺一軍使是謂貴畜而賤人令方因得減死明宗遣回鶻侯三馳傳至其國侯三至醴泉縣縣素僻無驛馬其令劉知章出獵不時給馬侯三遽以聞眀宗大怒械知章至京師将殺之重誨從容為言知章乃得不死其盡忠補益亦此類也重誨既以天下為己任遂欲内為社稷之計而外制諸侯之强然其輕信韓玫之譛而絶錢鏐之臣徒陷彦温於死而不能去潞王之患李嚴一出而知祥貳仁矩未至而董璋叛四方騷動師旅並興如投膏止火適足速之此所謂獨見之慮禍釁所生也錢鏐據有兩浙號兼吳越而王自梁及荘宗常異其禮以覊縻臣屬之而已明宗即位鏐遣使朝京師寓書重誨其禮慢重誨怒未有以發乃遣其嬖吏韓玫副供奉官烏昭遇復使於鏐而玫恃重誨勢數凌辱昭遇因醉使酒以馬箠擊之鏐欲奏其事昭遇以為辱國固止之及玫還返譛於重誨曰昭遇見鏐舞蹈稱臣而以朝廷事私告鏐昭遇坐死御史獄乃下制削奪鏐官爵以太師致仕於是錢氏遂絶於唐矣潞王從珂為河中節度使重誨以謂從珂非李氏子後必為國家患乃欲隂圖之從珂閲馬黄龍莊其牙内指揮使楊彦温閉城以叛從珂遣人謂彦温曰我遇汝厚何苦而反耶報曰彦温非叛也得樞宻院宣請公趣歸朝廷耳從珂走虞鄊馳騎上變眀宗疑其事不眀欲䆒其所以乃遣殿直都知范温以金帶襲衣金鞍勒馬賜彦温綘州刺史以誘致之重誨固請用兵明宗不得已乃更遣侍衞指揮使藥彦稠西京留守索自通率兵討之而戒曰為我生致彦温吾将自訊其事彦稠等攻破河中希重誨㫖斬彦温以滅口重誨率羣臣稱賀明宗大怒曰朕家事不了卿等不合致賀從珂罷鎮居清化里第重誨數諷宰相言從珂失守宜得罪馮道因白請行法明宗怒曰吾兒為奸人所中事未辨明公等出此言是不欲容吾兒人閒邪趙鳯因言春秋責帥之義所以勵為臣者明宗曰皆非公等意也道等惶恐而退居數日道等又以為請明宗顧左右而言他明日重誨乃自論列明宗曰公欲如何處置我即從公重誨曰此父子之際非臣所宜言惟陛下裁之明宗曰吾為小校時衣食不能自足此兒為我擔石灰拾馬糞以相養活今貴為天子獨不能庇之耶使其杜門私第亦何與公事重誨由是不敢復言孟知祥鎮西川董璋鎮東川二人皆有異志重誨每事裁抑務制其奸心凡兩川守将更代多用已所親信必以精兵從之漸令分戍諸州以虞緩急二人覺之以為圖已益不自安既而遣李嚴為西川監軍知祥大怒即日斬嚴又分閬州為保寧軍以李仁矩為節度使以制璋且削其地璋以兵攻殺仁矩二人遂皆反唐兵戍蜀者積三萬人其後知祥殺璋兼據兩川而唐之精兵皆陷蜀初眀宗幸汴州重誨建議欲因以代吳而明宗難之其後户部尚書李鏻得吳諜者言徐知誥欲舉吳國以稱藩願得安公一言以為信鏻即引諜者見重誨重誨大喜以為然乃以玉帶與諜者使遺知誥為信其直千緡初不以其事聞其後逾年知誥之問不至始奏貶鏻行軍司馬已而捧聖都軍使李行徳十将張儉告變言樞宻承㫖李䖍徽語其客邉彦温云重誨私募士卒繕治兵器欲自伐吳又與相者交私眀宗以問重誨重誨惶恐請䆒其事明宗初頗疑之大臣左右皆為之辨既而少解始告重誨以彦温之言因廷詰彦温具伏其詐於是君臣相顧泣下彦温行徳儉皆坐族誅重誨因求解職明宗慰之曰事已辨慎無措之胷中重誨論請不已明宗怒曰放卿去朕不患無人顧武徳使孟漢瓊至中書趣馮道等議代重誨者馮道曰諸君茍惜安公使得罷去是紓其禍也趙鳯以為大臣不可輕動遂以范延光為樞宻使而重誨居職如故董璋等反遣石敬塘討之而川路險阻糧運甚艱每費一石而致一斗自關以西民苦輸送往往亡聚山林為盗賊明宗謂重誨曰事勢如此吾當自行重誨曰此臣之責也乃請行關西之人聞重誨來皆已恐動而重誨日馳數百里逺近驚駭督趣糧運日夜不絶斃踣道路者不可勝數重誨過鳯翔節度使朱𢎞昭延之寝室使其妻子奉事左右甚謹重誨酒酣為𢎞昭言昨被讒搆幾不自全賴人主聖明得保家族因感歎泣下重誨去𢎞昭馳騎上言重誨怨望不可令至行營恐其生事而宣徽使孟漢瓊自行營使還亦言西人震駭之状因述重誨過惡重誨行至三泉被召還過鳯翔𢎞昭拒而不納重誨愳馳趨京師未至拜河中節度使重誨已罷希㫖爭求其過宦者安希倫坐與重誨交私嘗為重誨隂伺宫中動息事發棄市重誨益懼因上章告老以太子太師致仕而以李從璋為河中節度使遣藥彦稠率兵如河中虞變重誨二子崇緒崇賛宿衛京師聞制下即日奔其父重誨見之驚曰二渠安得來已而曰此非渠意為人所使耳吾以一死報國餘復何言乃械送二子於京師行至陜州下獄眀宗又遣翟光業至河中視重誨去就戒曰有異志則與從璋圖之又遣宦者使於重誨使者見重誨號泣不已重誨問其故使者曰人言公有異志朝廷遣藥彦稠率兵至矣重誨曰吾死未塞責遽勞朝廷興師以重明主之憂光業至從璋率兵圍重誨第入拜於庭重誨降而答拜從璋以檛擊其首重誨妻走抱之而呼曰令公死未晚何遽如此又擊其首夫妻皆死流血盈庭璋檢責其家貲不及數千緡而已明宗下詔以其絶錢鏐致孟知祥董璋反及議伐吳以為罪并殺其二子其餘子孫皆免重誨得罪知其必死歎曰吾固當死但恨不與國家除去潞王此其恨也嗚呼官失其職久矣予讀梁宣底見敬翔李振為崇政院使凡承上之㫖宣之宰相而奉行之宰相有非其見時而事當上决者與其被㫖而有所復請者則具記事而入因崇政使以聞得㫖則復宣而出之梁之崇政使乃唐樞宻之職葢出納之任也唐常以宦者為之至梁戒其禍始更用士人其備顧問叅謀議於中則有之未始專行事於外也至崇韜重誨為之始復唐樞宻之名然權侔於宰相矣後世因之遂分為二文事任宰相武事任樞宻樞宻之任既重而宰相自此失其職也巢谷傳蘇轍巢谷字元修父中世眉山農家也少從士大夫讀書老里校師谷㓜傳父學雖朴而博舉進士京師見舉武藝者心好之谷素多力遂棄其舊學畜弓箭習騎射久之業成而不中第聞西邊多驍勇騎射擊刺為四方冠去遊秦鳯涇原間所至友其秀傑有韓存寳者尤與之善谷教之兵書二人相與為金石交熙寧中存寳為河州将有功號熙河名将朝廷稍竒之㑹瀘州蠻乞弟擾邊諸郡不能制乃命存寳出兵討之存寳不習蠻事邀谷至軍中問焉及存寳得罪将就逮自料必死謂谷曰我涇原武夫死非所惜顧妻子不免寒饑橐中有銀數百兩非君莫使遺之者谷許諾即變姓名懐銀歩行往授其子人無知者存寳死谷逃避江淮間會赦乃出予以鄉閭故㓜而識之知其志節緩急可託者也予之在朝谷浮沈里中未嘗一見紹聖初予以罪謫居筠州自筠徙雷自雷徙循予兄子瞻亦自惠再徙昌化士大夫皆諱與予兄弟遊平生親友無復相聞者谷獨慨然自眉山誦言欲徒步訪吾兄弟聞者皆笑其狂元符二年春正月自梅州遺予書曰我萬里歩行見公不自意全今至梅矣不旬日必見死無恨矣予驚喜曰此非今世人古之人也既見握手相泣已而道平生逾月不厭時谷年七十有三矣痩瘠多病非復昔日元修也将復見子瞻於海南予愍其老且病止之曰君意則善然自此至彼數千里復當渡海非老人事也谷曰我自視未即死也公無止我留之不可閲其橐中無數千錢予方乏困亦强資遣之船行至新㑹有蠻隷竊其橐装以逃獲於新州谷從之至新遂病死予聞哭之失聲恨其不用吾言然亦竒其不用吾言而行其志也昔趙襄子厄于晉陽知伯率韓魏决水圍之城不沈者三板縣釜而爨易子而食羣臣皆懈惟髙恭不失人臣之禮及襄子用張孟談計三家之圍解行賞羣臣以恭為先談曰晉陽之難惟恭無功曷為先之襄子曰晉陽之難羣臣皆懈惟恭不失人臣之禮吾是以先之谷於朋友之義實無愧髙恭者惜其不遇襄子而前遇存寳後遇予兄弟予方雜居南夷與之起居出入葢将終焉雖知其賢尚何以發之聞谷有子䝉在涇原軍中故為作傳異日以授之谷始名榖及見之循州改名谷云圬者王承福傳韓愈圬之為技賤且勞者也有業之其色若自得者聴其言約而盡問之王其姓承福其名世為京兆長安農夫天寳之亂發人為兵持弓矢十三年有官勲棄之來歸䘮其土田手鏝衣食餘三十年舍於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必蠶績而後成者也其他所以養生之具皆待人力而後完也吾皆賴之然人不可徧為宜乎各致其能以相生也故君者理我所以生者也而百官者承君之化者也任有小大惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日捨鏝以嬉夫鏝易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易强而有功也心難强而有智也用力者使於人用心者使人亦其宜也吾特擇其易為而無愧者取焉嘻吾操鏝以入貴富之家有年矣有一至者焉又徃過之則為墟矣有再至三至者焉而徃過之則為墟矣問之其隣或曰噫刑戮也或曰身既死而其子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者邪非强心以智而不足不擇其才之稱否而冒之者邪非多行可愧知其不可而强為之者邪将貴富難守薄功而厚饗之者邪抑豐悴有時一去一來而不可常者邪吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也博妻與子皆養於我者也吾能薄而功小不有之可也又吾所謂勞力者若立吾家而力不足則心又勞也一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之葢賢者也葢所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者邪楊之道不肯㧞我一毛而利天下而夫人以有家為勞心不肯一動其心以畜其妻子其肯勞其心以為人乎哉雖然其賢於世之患不得之而患失之者以濟其生之欲貪邪而亡道以䘮其身者其亦逺矣又其言有可以警余者故余為之傳而自鑒焉毛頴傳韓愈毛頴者中山人也其先眀眎佐禹治東方土養萬物有功因封於卯地死為十二神嘗曰吾子孫神眀之後不可與物同當吐而生已而果然明眎八世孫䨲世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隱不仕云居東郭者曰㕙狡而善走與韓盧爭能盧不及盧怒與宋鵲謀而殺之醢其家秦始皇時䝉将軍恬南伐楚次中山将大獵以懼楚召左右庻長與軍尉以連山筮之得天與人文之兆筮者賀曰今日之獲不角不牙衣褐之徒缺口而長鬚八竅而趺居獨取其髦簡牘是資天下其同書秦其遂兼諸侯乎遂獵圍毛氏之族㧞其豪載頴而歸獻俘于章臺宫聚其族而加束縛焉秦皇帝使恬賜之湯沐而封諸管城號曰管城子日見親寵任事頴為人强記而便敏自結繩之代以及秦事無不纂録隂陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及至浮圖老子外國之説皆所詳悉又通於當代之務官府簿書市井貨錢注記惟上所使自秦皇帝及太子扶蘓胡亥丞相斯中車府令髙下及國人無不愛重又善隨人意正直邪曲巧拙一隨其人雖見廢棄終黙不洩惟不喜武士然見請亦時徃累拜中書令與上益狎上嘗呼為中書君上親决事以衡石自程雖宫人不得立左右獨頴與執燭者常侍上休方罷頴與綘人陳𤣥𢎞農陶泓及會稽禇先生友善相推致其出處必偕上召頴三人者不待詔輙俱徃上未嘗怪焉後因進見上将有任使拂拭之因免冠謝上見其髪秃又所摹畫不能稱上意上嘻笑曰中書君老而秃不任吾用吾嘗謂君中書君今不中書邪對曰臣所謂盡心者因不復召歸封邑終于管城其子孫甚多散處中國四方皆冒管城惟居中山者能繼父祖業太史公曰毛氏有兩族其一姬姓文王之子封於毛所謂魯衛毛𥅆者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最為蕃昌春秋之成見絶於孔子而非其罪及䝉将軍㧞中山之豪始皇封諸管城世遂有名而姬姓之毛無聞頴始以俘見卒見任使秦之滅諸侯頴與有功賞不酬勞以老見踈秦真少恩哉種樹郭槖駞傳柳宗元郭槖駞不知始何名病僂隆然伏行有類槖駞者故鄉人號之駞駞聞之曰甚善名我固當因捨其名亦自謂槖駞云其鄉曰豐樂鄉在長安西駞業種樹凡長安富豪人為觀㳺及賣果者皆爭迎取養視駞所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺伺傚慕莫能如也有問之對曰槖駞非能使木壽且孳也能順木之天以致其性焉爾凡植木之性其本欲舒其培欲平其土欲故其築欲宻既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩茂之也不抑耗其實而已非有能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及茍有能反是者則又愛之太恩憂之太勤旦視而暮撫己去而復顧甚者爪其膚以驗其生枯揺其本以觀其踈宻而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讐之故不我若也吾又何能為哉問者曰以子之道移之官理可乎駞曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繰而緖蚤織而縷字而㓜孩遂而雞豚鳴鼔而聚之擊木而召之吾小人輟飱饔以勞吏者且不得暇又何以蕃吾生而安吾性耶故病且怠若是則與吾業者其亦有類乎問者嘻曰不亦善夫吾問養樹得養人術傳其事以為官戒也梓人傳柳宗元裴封叔之第在光徳里有梓人欵其門願傭隟宇而處焉所職尋引規矩繩墨家不居礱斵之器問其能曰吾善度材視棟宇之制髙深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一宇故食於官府吾受禄三倍作於私家吾収其直大半焉他日入其室其床闕足而不能理曰将求它工余甚笑之謂其無能而貪禄嗜貨者其後京兆尹将飾官署余徃過焉委羣材㑹衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自㫁者其不勝任者怒而退之亦莫敢愠焉畫宫於堵盈尺而曲盡其制計其毫釐而搆大厦無進退焉既成書於上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而歎曰彼将捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒隷為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連率郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺邇細大可手據其圖而䆒焉猶梓人畫宫於堵而績于成也能者進而由之使無所徳不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為公以簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事听听於府庭而遺其大者逺者焉所謂不通是道者也猶梓人而不知繩墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者儻或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪耶亦在任之而已余曰不然夫繩墨誠陳規矩誠設髙者不可抑而下也狹者不可張而廣也由我則固不由我則圮彼将樂去固而就圮也則巻其術黙其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也䘮其制量屈而不能守也棟橈屋壊則曰非我罪也可乎哉可乎哉余謂梓人之道類於相故書而藏之梓人葢古之審曲面勢者今謂之都料匠云余所遇者楊氏潜其名六一居士傳歐陽修六一居士初謫滁山自號醉翁既老而衰且病将退休於潁水之上則又更號六一居士客有問曰六一何謂也居士曰吾家藏書一萬巻集録三代以來金石遺文一千巻有琴一張有棋一局而常置酒一壺客曰是為五一爾奈何居士曰以吾一翁老於此五物之間是豈不為六一乎客笑曰子欲逃名者乎而屢易其號此荘生所誚畏影而走乎日中者也余将見子疾走大喘渇死而名不得逃也居士曰吾固知名之不可逃然亦知夫不必逃也吾為此名聊以志吾之樂爾客曰其樂如何居士曰吾之樂可勝道哉方其得意於五物也太山在前而不見疾雷破柱而不驚雖響九奏於洞庭之野閲大戰於涿鹿之原未足喻其樂且適也然常患不得極吾樂於其間者世事之為吾累者衆也其大者有二焉軒裳珪組勞吾形于外憂患思慮勞吾心於内使吾形不病而已悴心未老而先衰尚何暇於五物哉雖然吾自乞其身於朝者三年矣一日天子惻然哀之賜其骸骨使得與此五物偕返於田廬庻幾償其夙願焉此吾之所以志也客復笑曰子知軒裳珪組之累其形而不知五物之累其心乎居士曰不然累於彼者已勞矣又多憂累於此者既佚矣幸無患吾其何擇哉於是與客俱起握手大笑曰置之區區不足較也已而歎曰夫士少而仕老而休葢有不待七十者矣吾素慕之宜去一也吾嘗用於時矣而訖無稱焉宜去二也壮猶如此今既老且病矣乃以難强之筋骸貪過分之榮禄是将違其素志而自食其言宜去三也吾負三宜去雖無五物其去宜矣復何道哉熙寧三年九月七日六一居士自傳許氏世譜王安石伯夷神農之後也佐堯舜有大功賜姓曰姜其後見經者四國曰申詩所謂申伯者是也曰呂書所謂呂侯者是也曰齊曰許春秋所書齊侯許男是也周衰許男嘗從大侯征伐㑹盟竟於春秋及後世無復國而子孫以其封姓然世傳有許由者堯以天下讓由由不受逃之箕山箕山上葢有許由冡焉其事不見於經學者疑之或曰由亡求於世者耳一與之天下葢不受也故好事者以云而由與伯夷其生後先所祖同不同莫能知也漢興許氏侯者六人栢至侯盎宋子侯瘛嚴侯猜此三侯者其始以将封而史不書其州里平恩侯廣漢博望侯舜樂成侯延夀此三侯者同産昆弟也以外戚起於宣元之世昌邑人也盎孫昌嘗為丞相延夀及廣漢弟子嘉嘗為大司馬至王莽敗許氏始皆失其封云後漢㑹稽有許荆者循吏也許慎者以經術顯許峻者為易林傳於世許楊者治鴻隙陂有徳於汝南汝南之民報祭焉許靖者避地交州後入蜀先主以為太傅與從弟劭俱善論人物劭兄䖍亦知名世稱平輿淵有二龍焉慎峻楊靖皆汝南人也許禇者家於譙以忠力事魏封侯牟鄉許慈者家南陽入蜀父子為博士司馬晉時有許攻者東陽人也徳行髙察孝廉不起老於家其子曰生亦有至性焉初許氏爵邑於周子孫播散四方有紀者猶不乏焉至昌邑始大著間興於汝南其後祖髙陽者為最盛然髙陽之族不見其所始有據者仕魏歴校尉郡守生允為鎮北将軍允三子皆仕司馬晉竒司𨽻校尉猛幽州刺史竒子遐侍中猛子式平原太守自允至式皆知名允後五世詢司馬晉嘗召官之不起詢孫珪為旌陽太守於齊珪生勇慧齊太子家令勇慧生懋篤學以孝聞卒於梁為中庻子懋生亨為陳衞尉卿嘗領史官次齊梁時事有子善心為之卒業是時有許紹者善心族父也通守夷陵治有恩流户自歸數十萬卒有勞於唐爵安陸郡公圉師欽寂欽明其後也圉師紹少子寛博有器幹别自封平恩侯與敬宗俱為龍朔中宰相欽寂謂紹曽大父也萬歲中帥師當契丹為所敗執以如安東使説守者降至安東曰敵今且破滅公勉守無忘忠也契丹即殺之是歲弟欽眀亦遇殺欽明為凉州都督案行卒與突厥遇亦執使降至靈州顧為庾言告守者所以破賊兄弟将兵一旦同以身狥邊鄙賢者榮之敬宗者善心子也始以公開郡於髙陽與其孫令伯以文稱當世天寳之亂敬宗有孫曰逺與張巡以睢陽抗賊自以不及巡推巡為将而親為之下久之食已盡煑茶紙以食猶堅守賊所以不得南向以睢陽弊其鋒也卒與俱死者皆天下豪傑義士云唐亡逺孫儒不義朱梁自雍州入于江南終身不出焉儒生稠沈毅有信仕江南李氏叅徳化軍事稠生䂓好道家言不以事自慁嘗羇旅宣歙間聞旁舍呻呼就之曰我某郡人也察君長者且死願以骸骨屬君因指槖中黄金十斤曰以是交長者規許諾敬負其骨千里并黄金置死者家家大驚愧之因請獻金如亡兒言以為許君夀規不顧竟去於是聞者滋以規為長者卒𦵏池州後以子顧贈大理評事生遂逖迴三子遂善事毋里母勵其子輙曰汝獨不慚許伯通乎祥符中天子有事於泰山加恩羣臣逖當遷讓其兄遂天子以遂試将作監主簿遂子俞字堯言名能文章大臣屢薦之有與不合者官以故不遂嘗知興國軍大冶縣縣人至今稱之俞兩子均垍為進士逖字景山嘗上書江南李氏李氏歎竒之以為崇文館校書郎歲終拜監察御史後復上書太宗論邉事宰相趙普竒其意以為與已合知興元府起鄼侯廢堰以利民治澧荆揚三州為盗者逃而去其事兄如事父使妻事其長姒如事母故人無後為嫁其女如已子有子五人恂黄州録事叅軍恢尚書虞部員外郎怡今為太子中舍簽書淮南節度判官㕔公事元今為江淮荆湖兩浙制置發運使平泰州海陵主簿五人者咸孝友如其先人故士大夫論孝友者歸許氏元以國子博士發運判官七年遂為其使待制天章閣自天子大臣莫不以為材其勞烈方在史氏記余故不論而著其家行云迴字光逺其事母如伯通之孝事其兄如景山之為弟也慷慨有大意少嘗仕李氏後不復仕與其兄俱𦵏顔村有子㑹為進士方壮時亦慨然好議天下事今為太廟齋郎臨川王某曰余譜許氏自據以下其緒傳始顯焉然自許男見於周其後數封而有紀之子孫多焉考是論之夫伯夷之所以佐其君治民余讀書未嘗不喟然歎思之也傳曰盛徳者必百世祀若伯夷者葢庻幾焉彼其後世忠孝之良亦使之遭時沐浴舜禹之間以盡其材而與夫夔皋熊虎之徒俱出而馳焉其孰能概之耶文編巻六十三

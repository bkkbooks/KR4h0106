body:
  text: 文編卷十五明唐順之編移滄州過闕上殿劄子曾鞏臣聞基厚者藝崇力大者任重故功德之殊埀光錫祚舄奕繁衍久而彌昌者蓋天人之理必至之符然生民以來能濟登兹者未有如大宋之隆也夫禹之績大矣而其孫太康乃墜厥緒湯之烈盛矣而其孫太甲既立不明周自后稷十有五世至於文王而大統未集武王成王始收太平之功而康王之子昭王難於南狩昭王之子穆王殆於荒服暨於幽厲陵夷盡矣及秦以絫世之智并天下然二世而亡漢定其亂而諸呂七國之禍相尋以起建武中興然沖質以後世故多矣魏之患天下為三晉宋之患天下為南北隋文始一海內然傳子而失唐之治在於正觀開元之際而女禍世出天寶以還綱紀微矣至於五代蓋五十有六年而更八姓十有四君其廢興之故甚矣宋興太祖皇帝為民去大殘致更生兵不再試而粵蜀吳楚五國之君生致闕下九州來同復禹之迹內輯師旅而齊以節制外卑藩服而約以繩墨所以安百姓禦四夷綱理萬事之具雖創始經營而彌綸巳悉莫貴於為天子莫富於有天下而舍子傳弟為萬世策造邦受命之勤為帝太祖功未有高焉者也太宗皇帝遹求厥寧既定晉疆錢俶自歸作則埀憲克紹克類保世靖民丕丕之烈為帝太宗德未有高焉者也真宗皇帝繼統遵業以涵煦生養蕃息齊民以并容遍覆擾服中外蓋自天寶之末宇內板蕩及真人出天下平而西北之國猶間入窺邊至於景德二百五十餘年契丹始講和好德明亦受約束而天下銷鋒灌燧亡雞鳴犬吠之警以迄于今故於是時遂封泰山禪社首薦告功德以明示萬世不祧之廟所以為帝者宗仁宗皇帝寬仁慈恕虛心納諫慎注措謹規矩早朝晏退亡一日之懈在位日久明於羣臣之賢不肖忠邪選用政事之臣委任責成然公聽並觀以周知其情偽其用舍之際一稽于衆故任事者亦皆警愳否輒罷免世以謂得馭臣之體春秋未高授立有德傳付惟允故傳天下之日不陳一兵不宿一士以戒非常而上下晏然殆古所未有其愷悌之行足以附衆者非家施而人悅之也積之以誠心民皆有父之尊有母之親故棄羣臣之日天下聞之路祭巷哭人人感動歔欷其得人之深未有知其所繇然者故皇祖之廟為宋仁宗英宗皇帝聰明睿智言動以禮上帝眷相大命所集而稱疾遜避至於絫月自踐東朝淵默恭慎亡所言議施為而天下傳頌稱説德號彰聞及正南面勤勞庶政每延見三事省決萬幾必咨詢舊章考求古義聞者惕然皆知其志在有為雖早遺天下成功盛烈未及宣究而明識大略足以克配前人之休故皇考之廟為宋英宗陛下神聖文武可謂有不世出之姿仁孝恭儉可謂有君人之大德憫自晚周秦漢以來世主不能獨見於衆人之表其政治所出大扺踵襲卑近因於世俗而已於是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在已可謂有出於數千載之大志變易因循號令必信使海內觀聽莫不奮起羣下遵職以後為羞可謂有能行之效今斟酌損益革敝興壞制作法度之事日以大備非因陋就寡拘牽常見之世所能及也繼一祖四宗之緒推而大之可謂至矣蓋前世或不能附其民者刑與賦役之政暴也宋興以來所用者鞭朴之刑然猶詳審反覆至于緩故縱之誅重誤入之辟蓋未嘗用一暴刑也田或二十而稅一然嵗時省察數議寬減之宜下蠲除之令蓋未嘗加一暴賦也民或老死不知力政然猶憂憐惻怛常謹復除之科急擅興之禁蓋未嘗興一暴役也所以附民者如此前世或失其操柄者天下之藝或在於外戚或在於近習或在於大臣宋興以來戚里宦臣曰將曰相未嘗得以擅事也所以謹其操柄者如此而况輯師旅於內天下不得私尺兵一卒之用卑藩服於外天下不得專尺土一民之力其自處之藝如此至於畏天事神仁民愛物之際未嘗有須臾懈也其憂勞者又如此蓋不能附其民而至於失其操柄又怠且忽此前世之所以危且亂也民附於下操柄謹於上處藝甚便而加之以憂勞此今之所以治且安也故人主之尊意諭色授而六服震動言傳號渙而萬里奔走山岩窟穴之氓不待期會而時輸嵗送以供其職者惟恐在後航浮索引之國非有發召而籯齎槖負以致其贄者惟恐不及西北之戎投弓縱馬相與袨服而戲豫東南之夷正冠束衽相與挾册而吟誦至於六府順敘百嘉鬯遂凡在天地之內含氣之屬皆裕如也蓋逺莫懿於三代近莫盛於漢唐然或四三年或一二世而天下之變不可勝道也豈有若今五世六聖百有二十餘年自通邑大都至於荒陬海聚亡變容動色之慮萌於其心亡援枹擊柝之戒接於其耳目臣故曰生民以來未有如大宋之隆也竊觀於詩其在風雅陳太王王季文王致王迹之所由與武王之所以繼伐而成王之興則美有假樂鳬鷖戒有公劉泂酌其所言者蓋農夫女工築室治田師旅祭祀飲尸受福委曲之常務至於罝之武夫行修於隱牛羊之牧人愛及微物亡不稱紀所以論功德者由小以及大其詳如此後嗣所以昭先人之功當世之臣子所以歸美其上非徒薦告鬼神覺悟黎庶而已也書稱勸之以九歌俾勿壞蓋歌其善者所以起其嚮慕興起之意防其怠廢難久之情養之於聽而成之於心其於勸帝者之功美昭法戒於將來聖人之所以列之於經埀為世教也今大宋祖宗興造功業猶太王王季文王陛下承之以德猶武王成王而羣臣之於考次論撰列之簡册被之金石以通神明昭法式者闕而不圖此學士大夫之過也蓋周之德盛於文武而雅頌之作皆在成王之世今以時考之則祖宗神靈固有待於陛下臣誠不自揆輒冒言其大體至於尋類取稱本隱以之顯使莫不究悉則今文學之臣充於列位惟陛下之所使至若周之積仁纍善至成王周公為最盛之時而泂酌言皇天親有德嚮有道所以為成王之戒蓋履極盛之藝而動之以戒愳者明之至智之盡也如此者非周獨然唐虞至治之極也其君臣相飭曰兢兢業業一日二日萬幾則處至治之極而保之以秖慎唐虞之所同也今陛下履祖宗之基廣太平之祚而世世治安三代所不及則宋興以來全盛之時實在今日陛下仰探皇天所以親有德嚮有道之意而奉之以寅畏俯念一日二日萬幾之不可以不察而處之以兢兢使休光美實日新嵗益閎逺崇侈循之亡窮至千萬世永有法則此陛下之素所蓄積臣愚區區愛君之心誠不自揆欲以庶幾詩人之義也惟陛下之所擇論美人張氏恩寵宜加裁損劄子歐陽修臣近風聞禁中因皇女降生於左藏庫取綾羅八千匹染院工匠當此大雪苦寒之際敲氷取水染練供應頗甚艱辛臣伏思陛下恭儉勤勞愛民憂國以此勞人枉費之事必不肯為然外議相傳皆云見今染練未絶臣又見近日內降美人張氏親戚恩澤太頻臣忝為諫官每聞小有虧損聖德之事須合力言難避天譴臣竊見自古帝王所寵嬪御若能謙儉柔善不求恩澤則可長保君恩或恣意驕奢多求恩澤則皆速致禍敗臣不敢逺引古事只以今宫禁近事言之陛下近年所寵尚氏楊氏余氏苖氏之類當其被寵之時驕奢自恣不早裁損及至滿盈今皆何在况聞張氏本良家子昨自修媛退為美人中外皆聞以謂與楊尚等不同故能保寵最久今一旦宫中取索頓多恩澤日廣漸為奢侈之事以招外人之言臣不知陛下欲愛惜保全張氏或欲縱恣而敗之若欲保全則須常令謙儉不至驕盈臣料八千匹綾羅豈是張氏一人獨用不過支散與衆人而已乃是枉費財物盡為衆人至於中外譏議則陛下自受以此而言廣散何益昨正月一日曹氏封縣君至初五日又封郡君四五日間兩度封拜又聞别有內降應是疏逺親戚盡求恩澤父母因子而貴可矣然名分亦不可太過其他疏逺皆可減罷臣謂張氏未入宫之前疏逺親戚各皆何在今日富貴何必廣為間人自招謗議以絫聖德若陛下只為張氏計亦宜如此况此事不獨為張氏大凡後宫恩澤太多宫中用度奢侈皆是虧損聖德之事繫於國體臣合力言伏望聖慈防微杜漸早為裁損取進止奏內中車子爭道亂行劄子蘇軾元祐七年十一月十三日南郊鹵簿使龍圖閣學士左朝奉郎守兵部尚書兼侍讀蘇軾劄子奏臣謹按漢成帝郊祠甘泉泰畤汾隂后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其略曰想西王母欣然而上壽兮屏玉女而却虙妃言婦女不當與齋祀之間也臣今備位夏官職在鹵簿準故事郊祀既成乘輿還齊宫改服通天冠絳紗袍教坊鈞容作樂還內然後后妃之屬中道迎謁巳非典禮而况方當祀事未畢而中宫掖庭得在勾陳豹尾之間竊見二聖崇奉大祀嚴恭寅畏度越古今四方來觀莫不悅服今車駕方宿齋太廟而內中車子不避仗衛爭道亂行臣愚竊恐於觀望有損不敢不奏乞賜約束仍乞取問隨行合干勾當人施行取進止論任人之體不可疑劄子歐陽修臣近見淮南按察使邵飾奏為體量知潤州席平為政不治及不教閲兵士等朝廷以飾為未足信又下提刑司再行體量臣竊以轉運提刑俱領按察然朝廷寄任重者為轉運其次乃提刑爾今寄任重者言事反不信又質於其次者而決疑臣不知邵飾果是才與不才可信與不可信如不才不可信則一路數十州事豈宜委之若果才而可信又何疑焉又不知為提刑者其才與飾優劣如何若才過於飾尚可取信萬一不才於飾見事相背却言席平為才邵飾合有罔上之罪矣若反以罪飾臣料朝廷必不肯行若舍飾與席平俱不問則善惡不辨是非不分况席平曽作臺官立朝亡狀只令制勘亦不能了尋為御史中丞以不才奏罷朝廷兩府而下誰不識乎其才與不才人人盡知何必更令提刑體量然後為定今外議皆言執政大臣託以審慎為名其實不肻主事而當怨須待言事者再三陳述使被黜者知大臣迫於言者不得已而行只圖怨不歸已茍誠如此豈有念民疾苦澄清官吏之意哉若亡此意是好疑不決則尤是朝廷任人之失自去年以為轉運使不察官吏特出詔書加以使名責其按察今按察使依稟詔書舉其本職又却疑而不聽今後朝廷命令誰肻信之凡任人之道要在不疑寧可艱於擇人不可輕任而不信若無賢不肖一例疑之則人各心闌誰肻辦事今邵飾言一不才顯者所貴朝廷肻行然後部下振竦官吏畏服今反為朝廷不信却委别人則飾之使威誰肻信服飾亦慙見其下今後見事不若不為不獨邵飾一人臣竊聞諸處多有按察官吏皆為朝廷不行人各嗟慙以謂任以事權反加沮惑朝廷之意不可諭也伏望聖慈特勑其邵飾所奏特與施行又令今後按察使奏人如不才老病灼然不疑者不必更委别官示以不信所貴不失任人之道而令臣下盡心取進止論乞令百官議事劄子歐陽修臣伏見祖宗時猶用漢唐之法凡有軍國大事及大刑獄皆集百官參議蓋聖人慎於臨事不敢專任獨見欲採天下公論擇其所長以助不逮之意也方今朝廷議事之體與祖宗之意相背每有大事祕不使人知之惟小事可以自決者却送兩制定議兩制知非急務故忽略拖延動經年嵗其中時有一兩事體大者亦與小事一例忽之至於大事祕而不宣此尤不便當處事之始雖侍從之列皆不與聞已行之後事須彰布縱有乖誤却欲論列則追之不及况外庭百官疏逺者雖欲有言陛下豈得而用哉所以兵興數年西北二方纍有事宜處置多繆者皆由大臣自亡謀慮而杜塞衆見也臣今欲乞凡有軍國大事度外廷須知而不可祕密者如契丹去年有請合從與不合從西戎今嵗求和當許與不當許凡如此事之類皆下百官廷議隨其所見同異各令署狀而陛下擇其長者而行之不惟慎重大事廣採衆見兼又於庶官寒賤疏逺人中時因議論可見其高材敏識者國家得以用之若百官都亡所長則自用廟堂之議至於小事並乞只令兩府自定其錢穀合要見本末則召三司官吏至兩府討尋供析而使大臣自擇至於禮法亦可召禮官法官詢問如此則事之大小各得其體如允臣所請且乞將西戎請和一事先集百官廷議取進止論按察官吏劄子歐陽修臣伏見天下官吏貟數極多朝廷無由遍知其賢愚善惡審官三班吏部等處又只主差除月日人之能否都不可知諸路轉運使等除有贓吏自敗者臨時舉行外亦别無按察官吏之術致使年老病患者或懦弱不材者或貪殘害物者此等之人布在州縣並無黜陟因循積弊冗濫者多使天下州縣不治者十有八九今兵戎未息賦役方煩百姓嗷嗷瘡痍未復救其疾苦擇吏為先臣今欲乞特立按察之法於內外朝官中自三丞以上至郎官中選強幹廉明者為諸路按察使自來雖差安撫使緣管他事不專按察今請令進奏院各録一州官吏姓名為空行簿以授之使至州縣遍見官吏其公廉才幹明著實狀及老病不才顯有不治之迹者皆以朱書於姓名之下其中材之人别亡竒效亦不至曠敗者則以墨書之又有雖是常材能専長於一事亦以朱書别之使還具奏則朝廷可以坐見天下官吏賢愚善惡不遺一人然後别議黜陟之法如此足以澄清天下年嵗之間可望至治只勞朝廷精選二十許人充使别亡難行之事取進止論學士不可令中書差除劄子歐陽修臣近見翰林學士蘇紳葉清臣等相繼解職風聞侍從之臣內有姦憸小人頗急經營爭先進用至有喧忿之語傳聞中外者既虧廉讓之風又損朝廷之體臣伏思翰林之職重於唐世乃是天子親信朝夕謀議內助之臣當時號為內相故其進用尤極精選只用材識不限資品往往自州縣官而拜者國朝近歲於此一職頗非其人既見其材識愚下不足以備訪問人主因之薄其待遇迹漸疏外同於冗官遂容小人得以濫進臣思其弊蓋由不合令中書依資差除且學士之職本要內助天子講論外朝闕失今若却令中書除人致於內則是恩出中書之人雖在天子左右與無同也伏乞自今後翰林學士不必足員用人不限資品但擇有才望正人堪充者出自上意擢用以杜小人爭進之端而天子左右更無姦邪之人庶清侍臣之列取進止論館職劄子王安石臣伏見今館職一除乃至十人此本所以儲公卿之材也然陛下試求以為講官則必不知其誰可試求以為諌官則必不知其誰可試求以為監司則必不知其誰可此患在於不親考試以實故也孟子曰國人皆曰賢然後察之見賢焉然後用之今所除館職將一二大臣以為賢而巳非國人皆曰賢國人皆曰賢尚未可信用必躬察見其可賢而後用况於一二大臣以為賢而已何可遽信而用也臣願陛下察舉衆人所謂材良而行美可以為公卿者召令三館祇候雖已帶館職亦可令兼祇候事有當論議者召至中書或召至禁中令具條奏利害及所當施設之方及察其才可以備任使者有四方之事則令往相贊襄左右又或令各陳其所言是非利害其所言是非利害雖不盡中義理可施用然其於相視問察能詳盡而不為蔽欺者即皆可以備任使之材也其有經術者又令講説如此至於數四則材否略見然後罷其否者而召其材者更親訪問以事訪問以事非一事而後可以知其人之實也必至於期年所訪一二十事則其人之賢不肖審矣然後隨其材之所宜任使其尤材良行美可與謀者雖常令備訪問可也此與用一二大臣薦舉不考試以實而加以職固萬萬不侔然此説在他時或難行今陛下有堯舜之明洞見天下之理臣度亡實之人不能蔽也則推行此事甚易既因考試可以出材實又因訪問可以知事情所謂敷納以言明試以功用人惟已闢四門明四目達四聰者蓋如此而已以今在位乏人上下壅隔之時恐行此不宜在衆事之後也然巧言令色孔壬之人能伺人主意所在而為傾邪者此堯舜之所畏而孔子之所欲逺也如此人當知而逺之使不得親近然如此人亦有數陛下博訪於忠臣良士知其人如此則逺而弗見誤而見之以陛下之仁聖以道揆之以人參之亦必知其如此知其如此則宜有所懲如此則巧言令色孔壬之徒消而正論不蔽於上今欲廣聞見而使巧言令色孔壬之徒得志乃所以自蔽畏巧言令色孔壬之徒為害而一切疏逺羣臣亦所以自蔽蓋人主之患在不窮理不窮理則不足以知言不知言則不足以知人不知人則不能官人不能官人則治道何從而興乎陛下堯舜之主也其所明見秦漢以來欲治之主未有能倣佛者固非羣臣所能窺望然自堯舜文武皆好問以窮理擇人而官之以自助其意以為王者之職在於論道而不在於任事在於擇人而官之而不在於自用願陛下以堯舜文武為法則聖人之功必見於天下至於有司叢脞之務恐不足以棄日力勞聖慮也以方今所急為在如此敢不盡愚臣愚才薄然蒙拔擢使豫聞天下之事聖旨宣諭富弼等欲於講筵召對輔臣討論時事顧如臣者材薄不足以望陛下之清光然陛下及此言也實天下幸甚自備位政府每得進見所論皆有司叢脞之事至於大體粗有所及則迫於日晷已復旋退而方今之事非博論詳説令所改更施設本末先後小大詳略之方巳熟於聖心然後以次奉行則治道終無由興起然則如臣者非蒙陛下賜之從容則所懷何能自竭蓋自古大有為之君未有不始於憂勤而終於逸樂今陛下仁聖之質秦漢以來人主未有企及者也於天下事又非不憂勤然所操或非其要所施或未得其方則恐未能終於逸樂亡為而治也則於博論詳説豈宜緩然陛下欲賜之從容使兩府並進則論議者衆而不一有所懷者或不得自竭謂宜使中書密院迭進則人各得盡其所懷而陛下聽覽亦不至於煩陛下即以臣言為可乞明喻大臣使各舉所知無限人數皆實封以聞然後陛下推擇召置以為三館祇候其不足取者旋即罷去則所置雖多亦亡所害也臣伏見某人云云皆衆人所謂材良行美宜蒙陛下訪問任使者凡此九人臣或熟聞而未識或熟識而未敢任或敢任其可以為公卿臣雖未識然衆人之所謂賢臣不敢蔽也臣雖敢任其可以為公卿然陛下不親見其可賢亦難遽信而用若陛下以臣前所論奏為合於義理即乞悉置此九人者以為三館祇候親考試其材行若不可用旋即罷去若其可用然後留備訪問任使如此則所置雖多未有濫得官職者然此但臣一人所聞所知恐執政大臣各有所聞所知陛下若令各舉所聞所知而如此考試庶幾人材亡所遺逸經曰舉逸民天下之民歸心焉善人君子者天下之民心所願舉欲其延問視其所在而從之者也陛下自即位以來以在事之人或乏才能故所拔用者多士之有小材而無行義者此等人得志則風俗壞風俗壞則朝夕左右者皆懷利以事陛下而不足以質朝廷之是非使於四方者皆懷利以事陛下而不可以知天下之利害其弊巳效見於前矣恐不宜不察也欲救此弊惟日親近忠良而巳伏惟陛下仁聖已深察此理臣愚猶欲及此者忠臣惓惓之義也論臺諫官唐介等宜早牽復劄子歐陽修臣材識庸暗碌碌於衆人中蒙陛下不次拔擢置在樞府其於報效自宜如何而自居職以來已逾半歲凡事關大體必須衆議之協同其餘日逐進呈皆是有司之常務至於謀猷啓沃蔑爾亡聞上辜聖恩下愧清議人雖未責臣豈自安所以夙夜思惟願竭愚慮茍有可採冀禆萬一臣近見諌官唐介臺官范師道等因言陳旭事得罪或與小郡或竄逺方陛下自臨御以來擢用諍臣開廣言路雖言者時有中否而聖慈每賜優容一旦臺諫聨翩被逐四出命下之日中外驚疑臣雖不知臺諫所言是非但見唐介范師道皆久在言職其人立朝各有本末前後補益甚多豈於此時頓然改節故為欺罔上昧聖聰在於人情不宜有此臣竊以謂自古人臣之進諫於其君者有難有易各因其時而巳若剛暴猜忌之君不欲自聞其過而樂聞臣下之過人主好察多疑於上大臣側足畏罪於下於此之時諫人主者難而言大臣者易若寬仁恭儉之主動遵禮法自聞其失則從諫如流聞臣下之過則務為優容以保全之而為大臣者外秉國權內有左右之助言事者未及見聽而怨仇巳結於其身故於此時諫人主者易言大臣者難此不可不察也自古人主之聽言也亦有難有易在知其術而已夫忠邪並進於前而公論與私言交入於耳此所以聽之難也若知其人之忠邪辨其言之公私則聽之易也凡言拙而直逆耳違意初聞若可惡者此忠臣之言也言婉而順希旨合意初聞若可喜者邪臣之言也至於言事之官各舉其職或當朝正色顯言於廷或連章列署共論其事言一出則萬口爭傳衆目共視雖欲為私其勢不可故凡明言於外不畏人知者皆公言也若非其言職又不敢顯言或密奏乞留中或面言乞出自聖斷不欲人知言有主名者蓋其言涉傾邪懼遭彈劾故凡隂有奏而畏人知者皆挾私之説也自古人主能以此術知臣下之情則聽言易也伏惟陛下仁聖寬慈躬履勤儉樂聞諫諍容納直言其於大臣尤所優禮常欲保全終始思與臣下愛惜名節尤慎重於進退故臣謂方今言事者規切人主則易欲言大臣則難臣自立朝耳目所記景祐中范仲淹言宰相吕夷簡貶知饒州皇祐中唐介言宰相文彥博貶春州别駕至和初吳中復呂景初馬遵言宰相梁適並罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言富弼貶知蔡州今又唐介等五人言陳旭得罪自范仲淹貶饒州後至今凡二十年間居臺諫者多矣未聞有規諫人主而得罪者臣故謂方今諫人主則易言大臣則難陛下若推此以察介等所言則可知其用心矣昨所罷黜臺諫五人惟吕誨入臺未久其它四人出處本末迹狀甚明可以歷數也唐介前因言文彥博逺竄廣西煙瘴之地賴陛下仁恕哀憐移置湖南得存性命范師道趙抃並因言忤劉沆罷臺職守外郡連延數年然後一有來字復今三人者又以言樞臣罷黜然則介不以前蹈必死之地為愳師道與抃不以中滯進用數年為戒遇事必言得罪不悔蓋所謂進退一節終始不變之士也至如王陶者本出孤寒只因韓絳薦舉始得臺官及絳為中丞陶不敢內顧私恩與之爭議絳終得罪夫牽顧私恩人之常情爾斷恩以義非知義之士不能也以此言之陶可謂徇公滅私之臣矣此四人者出處本末之迹如此可以知其為人也就使言雖不中亦其情必亡他議者或謂言事之臣好相朋黨動搖大臣以作威藝臣竊以謂不然至於去歲韓絳言富弼之時介與師道不與絳為黨乃與諸臺諫共論絳為非然則非相朋黨非欲動搖大臣可明矣臣固謂未可以此疑言事之臣也况介等比者雖為謫官幸蒙陛下寬恩各得為郡未至失所其可惜者斥逐諫臣非朝廷美事阻塞言路不為國家之利而介等盡忠守節未蒙憐察也欲望聖慈特賜召還介等置之朝廷以勸守節敢言之士則天下幸甚今取進止論賈昌朝除樞密使劄子歐陽修臣伏見近降制書除賈昌朝為樞密使旬日以來中外人情莫不疑懼縉紳公議漸以沸騰蓋緣昌朝稟性回邪執心傾險頗知經術能文飾姦言好為隂謀以陷害良士小人朋附者衆皆樂為其用前在相位絫害善人所以聞其再來望風恐畏陛下聰明仁聖勤儉憂勞每於用人尤所審慎然而自古毁譽之言未嘗不並進於朝而聽察之際人主之所難也臣以謂能知聽察之要則不失之矣何謂其要在先察毁譽之人若所譽者君子所毁者小人則不害其進用矣若君子非之小人譽之則可知其人不可用矣今有毅然立於朝危言讜論不阿人主不附權臣其直節忠誠為中外素所稱信者君子也如此等人皆以昌朝為非矣宦官宫女左右使令之人往往小人也如此等人皆以昌朝為是矣陛下察此則昌朝為人可知矣今陛下之用昌朝與執政大臣謀而用之乎與立朝忠正之士謀而用之乎與左右近習之臣謀而用之乎或不謀於臣下斷自聖心而用之乎昨聞昌朝隂結宦豎搆造事端謀動大臣以圖進用若陛下與執政大臣謀之則大臣藝在嫌疑必難啓口若立朝忠正之士則亡不以為非矣其稱譽昌朝以為可用者不過宦官左右之人爾陛下用昌朝為天下而用之乎為左右之人而用之乎臣伏思陛下必不為左右之人而用之也然左右之人謂之近習朝夕出入進見亡時其所讒諛能使人主不覺其漸昌朝善結宦官人人喜為稱譽朝一人進一言暮一人進一説亡不稱昌朝之善者陛下視聽漸熟遂簡在於聖心及將用之時則不必與謀也蓋稱薦已漸久巳熟於聖聰矣是則陛下雖斷自聖心不謀臣下而用之亦左右之人積漸稱譽之力也陛下常患近嵗以來大臣體輕連為言事者彈擊蓋由用非其人不叶物議而然也今昌朝身為大臣見事不能公論乃結交中貴因內降以起獄以此規圖進用竊聞臺諫方欲論列其過惡而忽有此命是以中外疑愳物論喧騰也今昌朝未來議論已如此則使其在位必不免言事者上煩聖聽若不爾則昌朝得遂其志傾害善人壞亂朝政必為國家生事臣愚伏望聖慈抑左右陰薦之言採縉紳公正之論早罷昌朝還其舊鎮則天下幸甚臣官為學士職號論思見聖心求治甚勞而一旦用人偶失而外廷物議如此既有見聞合思裨補取進止論狄青劄子歐陽修臣聞人臣之能盡忠者不敢避難言之事人主之善馭下者常欲聞難言之言然後下亡隱情上亡壅聽姦宄不作禍亂不生自古固有伏藏之禍未發之機天下之人皆未知而有一人能獨言之人主又能聽而用之則銷患於未萌轉禍而為福者有矣若夫天下之人共知而獨人主之不知者此莫大之患也今臣之所言者乃天下之人皆知而惟陛下未知也今士大夫亡貴賤相與語于親戚朋友下至庶民亡愚智相與語於閭巷道路而獨不以告陛下也其故何哉蓋其事伏而未發言者難於指陳也臣竊見樞密使狄青出自行伍號為武勇自用兵陜右巳著名聲及捕賊廣西又薄立勞效自其初掌機密進列大臣當時言事者巳為不便今三四年間雖未見其顯過然而不幸有得軍情之名推其所因蓋由軍士本是小人面有黥文樂其同類見其進用自言我輩之內出得此人既以為榮遂相悅慕加之青之事業實過於人比其輩流又粗有見識是以軍士心共服其材能國家從前難得將帥經略招討常用文臣或不知軍情或不間訓練自青為將領既能自以勇力服人又知訓練之方頗以恩信撫士以臣愚見如青所為尚未得古之名將一二但今之士卒不慣見如此等事便謂須是我同類中人乃能知我軍情而以恩信撫我青之恩信亦豈能遍及於人但小人易為扇誘所謂一犬吠形百犬吠聲遂皆翕然喜共稱説且武臣掌機密而得軍情不唯於國家不便亦於其身未必不為害然則青之流言軍士所喜亦其不得巳而藝使之然也臣謂青不得巳而為人所喜亦將不得已而為人所禍者矣為青計者宜自退避事權以止浮議而青本武人不知進退近日以來訛言益甚或言其身應圖讖或言其宅有火光道路傳説以為常談矣而惟陛下猶未聞也且唐之朱泚本非反者倉卒之際為軍士所迫爾大扺小人不能成事而能為患者多矣泚雖自取族滅然為德宗之患亦豈小哉夫小人陷於大惡未必皆其本心所為直由漸積以至蹉跌而時君不能制患於未萌爾故臣敢昧死而言人之所難言者惟願陛下早聞而省察之耳如臣愚見則青一常才未有顯過但為浮議所喧藝不能容耳若如外人衆論則謂青之用心有不可知者此臣之所不能決也但武臣掌機密而為軍士所喜自於事體不便不計青之用心如何也伏望聖慈深思逺慮戒前世禍亂之迹制於未萌密訪大臣早決宸斷罷青機務與一外藩以此觀青去就之際心迹如何徐察流言可以臨事制變且二府均勞逸而出入亦是常事若青之忠孝出處如一事權既去流議漸消則其誠節可明可以永保終始夫言未萌之患者常難於必信若俟患之已萌則又言亡及矣臣官為學士職號論思聞外議喧沸而事繫安危臣言狂計愚不敢自默取進止論張子奭恩賞太頻劄子歐陽修臣風聞知汝州范祥為相度陜西青白鹽敕差張子奭權知汝州子奭自選入二年內遷至貟外郎朝廷之意雖曰賞勞而天下物議皆云僥幸蓋以子奭宣勞絶少止兩次而遷官恩賜已數重自古賞功不過一次賞之不巳故難弭人言初自選人改京官曰賞勞未及二嵗改祕書丞又曰賞勞賜以章服又曰賞勞祕書丞不久又轉官又曰賞勞合得太常博士超遷貟外郎又曰賞勞後行祠部為名曹又曰賞勞作京官合作知縣而作僉判又曰賞勞一任未滿合更有一任知縣又超通判差遣又曰賞勞此所以外人之議不允也况范祥暫出勾當只合交割以次官貟或轉運司自差人權今朝廷差人已是失體又於子奭為此僥幸今朝臣待闕在京者甚衆豈亡一人堪權知州者朝廷每用一人必當使天下人服今每一差遣則物議沸騰纍日不息昔五代桑維翰為晉相一夕除節度使十五人為將而人皆服其精今中書差一權知州而不能免人譏議者蓋事亡大小當與不當而巳其張子奭伏乞追寢權差之命仍乞今後外處差出知州只委本路轉運使差官權至於賞罰之柄貴在至公今莫大之罪不過一刑而止豈有勞者終身行賞而不已亦乞今後有勞效之人量其大小一賞而止若其别著能效則拔擢自可不次人亦自然亡言伏以朝廷用人惟患守例而不能不次選任但不涉於僥幸實有材藝之人誰敢有言子奭作使西鄙不謂亡勞但恩典已優於賞巳足可惜令天下指為僥幸之人而掩其前效况又上虧朝政不可不思取進止代滕甫辨謗乞郡劄子蘇軾臣聞人情不問賢愚莫不畏天而嚴父然而疾痛則呼父窮窘則號天蓋情發於中言亡所擇豈以號呼之故謂亡嚴畏之心今臣之所患不止於疾痛而所憂有甚於窮窘若不號呼於君父更將趨赴於何人伏望聖慈少加憐察中謝臣本亡學術亦亡材能惟有忠義之心生而自許昔季孫有言見有禮於其君者事之如孝子之養父母也見亡禮於其君者誅之如鷹鸇之逐鳥雀也臣雖不肖允蹈斯言但信道直前謂人如巳既蒙深知於聖主肻復借交於衆人任其蠢愚稍成仇怨一自離去左右十有二年浸潤之言何所不有至謂臣陰黨反者故縱罪人若依斯言死未塞責竊伏思宣帝漢之英主也以臣言而誅楊惲太宗唐之興王也以單詞而殺劉洎自古忠臣烈士遭時得君而不免於禍者何可勝數而臣獨蒙皇帝陛下始終照察愛惜保全則陛下聖度已過於宣帝太宗而臣之遭逢亦古人所未有日月在上更何憂虞但念世之憎臣者多而臣之賦命至薄積毁銷骨巧言鑠金市虎成於三人投杼起於屢至倘因疑似復致人言至時雖欲自明陛下亦難屢赦是以及今亡事之日少陳危苦之詞晉王導乃王敦之弟也而不害其為元臣崔造源休之甥也而不廢其為宰相臣與反者義同路人獨於寬大之朝為臣終身之纍亦可悲矣凡今遊宦之士稍與貴近之人有葭莩之親半面之舊則所至便蒙異待人亦不敢交攻况臣受知於陛下中興之初效力於衆人未遇之日而乃毁訾不忌踐踏亡嚴臣何足言有辱天眷此臣所以涕泣而自傷者也今臣既安善地又忝清班非敢别有僥求更思録用但患難之後積憂傷心風波之間怖畏成疾敢望陛下憫餘生之亡幾究前日之異恩或乞移臣淮浙間一小郡稍近墳墓漸謀歸休異日復得以枯朽之餘仰瞻天日之表然後退伏田野自稱老臣追敘始終之遭逢以詫鄉鄰之父老區區志願永畢於斯伏願陛下憐其志察其愚而赦其罪臣亡任感恩知罪激切屏營之至文編卷十五

body:
  text: 文編卷五十五明唐順之編襄州穀城縣夫子廟記歐陽修釋奠釋菜祭之略者也古者士之見師以菜為贄故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋菜無樂則其又略也故其禮亡焉而今釋奠幸存然亦無樂又不遍舉於四時獨春秋行事而已記曰釋奠必有合有國故則否謂凡有國各自祭其先聖先師若唐虞之夔伯夷周之周公魯之孔子其國之無焉者則必合於鄰國而祭之然自孔子沒後之學者莫不宗焉故天下皆尊以為先聖而後世無以易學校廢久矣學者莫知所師又取孔子門人之髙弟曰顔回者而配焉以為先師隋唐之際天下州縣皆立學置學官生員而釋奠之禮遂以著令其後州縣學廢而釋奠之禮吏以其著令故得不廢學廢矣無所從祭則皆廟而祭之荀卿子曰仲尼聖人之不得勢者也然使其得勢則為堯舜矣不幸無時而沒特以學者之故享弟子春秋之禮而後之人不推所謂釋奠者徒見官為立祠而州縣莫不祭之則以為夫子之尊由此為盛甚者乃謂生雖不得位而沒有所享以為夫子榮謂有德之報雖堯舜莫若何其謬論者歟祭之禮以迎尸酌鬯為盛釋奠薦饌直奠而已故曰祭之略者其事有樂舞授器之禮今又廢則於其略者又不備焉然古之所謂吉凶鄉射賔燕之禮民得而見焉者今皆廢失而州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮器焉其牲酒器幣之數升降俯仰之節吏又多不能習至其臨事舉多不中而色不莊使民無所瞻仰見者怠焉因以為古禮不足復用可勝歎哉大宋之興於今八十年天下無事方修禮樂崇儒術以文太平之功以謂王爵未足以尊夫子又加至聖之號以褒崇之講正其禮下於州縣而吏或不能諭上意凡有司簿書之所不責者謂之不急非師古好學者莫肯盡心焉穀城令狄君栗為其邑未逾時修文宣王廟易於縣之左大其正位為學舍於其旁藏九經書率其邑之子弟興於學然後考制度為俎豆籩篚樽爵簠簋凡若干以與其邑人行事穀城縣政久廢狄君居之期月稱治又能載國典修禮興學急其有司所不責者諰諰然惟恐不及可謂有志之士矣吉州學記歐陽修慶厯三年秋天子開天章閣召政事之臣八人問治天下其要有幾施於今者宜何先使坐而書以對八人者皆震恐失位俯伏頓首言此非愚臣所能及惟陛下所欲為則天下幸甚於是詔書屢下勸農桑責吏課舉賢才其明年三月遂詔天下皆立學置學官之員然後海隅徼塞四方萬里之外莫不皆有學嗚呼盛矣學校王政之本也古者致治之盛衰視其學之興廢記曰國有學遂有序黨有庠家有孰此三代極盛之時大備之制也宋興蓋八十有四年而天下之學始克大立豈非盛美之事須其久而後至於大備歟是以詔下之日臣民喜幸而奔走就事者以後為羞其年十月吉州之學成州舊有夫子廟在城之西北今知州事李侯寬之至也謀與州人遷而大之以為學舍事方上請而詔已下學遂以成李侯治吉敏而有方其作學也吉之士率其私錢一百五十萬以助用人之力積二萬二千工而人不以為勞其良材堅甓之用凡二十二萬三千五百而人不以為多學有堂筵齋講有藏書之閣有賔客之位有遊息之亭嚴嚴翼翼壯偉閎耀而人不以為侈既成而來學者常三百餘人豫世家于吉而濫官于朝進不能贊揚天子之盛美退不得與諸生揖讓乎其中然豫聞教學之法本於人性磨揉遷革使趨於善其勉於人者勤其入於人者漸善教者以不倦之意須遲久之功至於禮讓興行而風俗純美然後為學之成今州縣之吏不得久其職而躬親於教化也故李侯之績及於學之立而不及待其成惟後之人母廢慢天子之詔而怠以中止幸豫他日因得歸榮故鄉而謁於學門將見吉之士皆道德明秀而可為公卿問於其俗而婚喪飲食皆中禮節入於其里而長幼相孝慈於其家行於其郊而少者扶其羸老壯者代其負荷於道路然後樂學之道成而得時從先生耆老席于衆賔之後聽鄉樂之歌飲獻酹之酒以詩頌天子太平之功而周覽學舍思詠李侯之遺愛不亦美哉故於其始成也刻辭于石而立諸其廡以俟南安軍學記蘇軾古之為國者四井田也肉刑也封建也學校也今亡矣獨學校僅存耳古之為學者四其大則取士論政其小則弦誦也今亡矣直誦而已舜之言曰庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之格之言改也論語曰有恥且格承之言薦也春秋傳曰奉承齊犧庶頑讒説不率是教者舜皆有以待之夫化惡莫若進善故擇其可進者以射侯之禮舉之其不率教甚者則撻之小則書以記之非疾之也欲與之並生而同憂樂也此士之有罪而尚未可棄者故使樂工採其謳謡諷議之言而揚之以觀其心其改過者則薦之且用之其不悛者則威之屏之僰之寄之之類是也此舜之學政也射之中否何與於善惡而曰侯以明之何也由射所以致衆而論士也衆一而後論定孔子射於矍相之圃蓋觀者如堵使弟子揚觶而序黜者三則僅有存者由此觀之以射致衆衆集而後論士蓋所從來逺矣詩曰在泮獻囚又曰在泮獻馘禮曰受成於學鄭人遊于鄉校以議執政或謂子産毁鄉校何如子産曰不可善者吾行之不善者吾改之是吾師也孔子聞之謂子産仁人古之取士論政者必於學有學而不取士不論政猶無學也學莫盛於東漢士數萬人噓枯吹生自三公九卿皆折節下之三府辟召常出其口其取士論政可謂近古然卒為黨錮之禍何也曰此王政也王者不作而士自以私意行之於下其禍敗固宜朝廷自慶厯熙寧紹聖以來三致意於學矣雖荒服郡縣必有學况南安江西之南境儒術之士與閩蜀等而太守朝奉郎曹侯登以治郡顯聞所至必建學故南安之學甲於江西侯仁人也而勇於義其建是學也以身任其責不擇劇易期於必成士以此感奮不勸而力費於官者為錢九萬三千而助者不資為屋百二十間禮殿講堂視夫邦君之居凡學之用莫不嚴具又以其餘增置廩給食數百人始於紹聖二年之冬而成於四年之春學成而侯去今為潮州軾自海南還過南安見聞其事為詳士既德侯不巳乃具列本末贏糧而從軾者三百餘里願紀其實夫學王者事也故首以舜之學政告之然舜逺矣不可以庶幾有賢太守猶可以為鄭子産也學者勉之無愧於古人而已建中靖國元年三月四日眉山蘇軾書仁宗御飛白記歐陽修治平四年夏五月余將赴亳假道于汝隂因得閲書於子履之室而雲章爛然輝映日月為之正冠肅容再拜而後敢仰視蓋仁宗皇帝之御飛白也曰此寶文閣之所藏也胡為於子之室乎子履曰曩者天子宴羣臣於羣玉而賜以飛白余幸得與賜焉豫窮於世久矣少不悅於時人流離竄斥十有餘年而得不老死江湖之上者蓋以遭時清明天子嚮學樂育天下之材而不遺一介之賤使得與羣賢並遊於儒學之館而天下無事嵗時豐登民物安樂天子優遊清間不邇聲色方與羣臣從容於翰墨之娛而余於斯時竊獲此賜非惟一介之臣之榮遇亦朝廷一時之盛事也子其為我志之余曰仁宗之德澤涵濡於萬物者四十餘年雖田夫野老之無知猶能悲歌思慕於壠畝之間而况儒臣學士得望清光蒙恩寵登金門而上玉堂者乎於是相與泫然流涕而書之夫玉韞石而珠藏淵其光氣常見於外也故山輝如白虹水變而五色者至寶之所在也今賜書之藏于子室也吾知將有望氣者言榮光起而屬天者必賜書之所在也御書閣記歐陽修醴陵縣東二十里有宫曰登真其前有山世傳仙人王喬鍊藥於此唐開元間神仙道家之説興天子為書六大字賜而揭焉太宗皇帝時詔求天下前世名山異迹而尤好書法聞登真有開元時所賜字甚竒乃取至京師閲焉已而還之又賜御書飛白字使藏焉其後登真大火獨飛白書存康定元年道士彭知一探其私笈以市工材悉復宫之舊建樓若干尺以藏賜書豫之故人處士任君為余言其事來乞文以志凡十餘請而不懈豫所領職方悉掌天下圖書考圖驗之醴陵老佛之居凡八十而所謂登真者其説皆然乃為之記夫老與佛之學皆行於世久矣為其徒者常相訾病若不相容於世二家之説皆見斥於吾儒宜其合勢并力以為拒守而乃反自相攻惟恐不能相弱者何哉豈其死生性命所持之説相盩而然耶故其代為興衰各繫於一時之好惡雖善辨者不能合二説而一之至其好大宫室以矜世人則其為事同焉然而佛能箝人情而鼓以禍福人之趣者常衆而熾老氏獨好言清淨逺去靈仙飛化之術其事冥深不可質究則其為常以淡泊無為為務故凡佛氏之動搖興作為力甚易而道家非遭人主之好尚不能獨興其間能自力而不廢者豈不賢於其徒者哉知一是已仁宗皇帝飛白御書記蘇軾問世之治亂必觀其人問人之賢不肖必以世考之孟子曰誦其詩讀其書不知其人可乎是以論其世也合抱之木不生於步仞之丘千金之子不出於三家之市臣嘗逮事仁宗皇帝其愚不足以測知聖德之所至獨私竊覽觀四十餘年之間左右前後之人其大者固已光明俊偉深厚雄傑不可窺較而其小者猶能敦朴愷悌靖恭持重號稱長者當是之時天人和同上下歡心才智不用而道德有餘功業難名而福祿無窮升遐以來十有二年若臣若子罔有內外下至深山窮谷老婦稚子外薄四海裔夷君長見當時之人聞當時之事未有不流涕稽首者也此豈獨上之澤歟凡在庭者與有力焉太子少傅安簡王公諱舉正臣不及見其人矣而識其為人其流風遺俗可得而稱者以世考之也熙寧六年冬以事至姑蘇其子誨出慶厯中所賜公端敏字二飛白筆一以示臣且謂臣記之將刻石而傳諸世臣官在太常職在太史於法得書且以為抱烏號之弓不若藏此筆寶曲阜之履不若傳此書考追蠡以論音聲不若推點書以究觀其所用之意存昌歜以追嗜好不若因褒貶以想見其所與之人或藏於名山或流於四方凡見此者皆當聳然而作如望旄頭之塵而聽屬車之音相與勉為忠厚而恥為浮薄或由此也夫上清儲祥宫碑蘇軾元祐六年六月丙午制詔臣軾上清儲祥宫成當書其事于石臣軾拜手稽首言曰臣以書命待罪北門記事之成職也然臣愚不知宫之所以廢興與凡材用之所從出敢昧死請乃命有司具其事以詔臣軾始太宗皇帝以聖文神武佐太祖定天下既即位盡以太祖所賜金帛作上清宫朝陽門之內旌興王之功且為五代兵革之餘遺民赤子請命上帝以至道元年正月宫成民不知勞天下頌之至慶厯三年十二月有司不戒于火一夕而燼自是為荆棘瓦礫之場凡三十七年元豐二年二月神宗皇帝始命道士王太初居宫之故地以法籙符水為民禳禬民趨歸之稍以其力修復祠宇詔用日者言以宫之所在為國家子孫地乃賜名上清儲祥宫且賜度牒與佛廟神祠之遺利為錢一千七百四十七萬又以官田十四頃給之刻玉如漢張道陵所用印及所被服冠佩劍履以賜太初所以寵之者甚備宫未成者十八而太初卒太皇太后聞之喟然歎曰民不可勞也兵不可役也大司徒錢不可發也而先帝之意不可以不成乃勑禁中供奉之物務從約損斥賣珠玉以巨萬計凡所謂以天下養者悉歸之儲祥積會所賜為錢一萬七千六百二十八萬而宫乃成內出白金六千三百餘兩以為香火瓜華之用召道士劉應貞嗣行太初之法命入內供奉官陳衍典領其事起四年之春訖六年之秋為三門兩廡中大殿三旁小殿九鐘經樓二石壇一建齋殿于東以待臨幸築道館于西以居其徒凡七百餘間雄麗靖深為天下偉觀而民不知有司不與焉嗚呼其可謂至德也已矣臣謹按道家者流本出於黃帝老子其道以清淨無為為宗以虛明應物為用以慈儉不爭為行合於周易何思何慮論語仁者靜夀之説如是而已自秦漢以來始用方士言乃有飛仙變化之術黃庭大洞之法太上天真木公金母之號延康赤明龍漢開皇之紀天皇太一紫微北極之祀下至於丹藥竒技符籙小數皆歸於道家學者不能必其有無然臣嘗竊論之黃帝老子之道本也方士之言末也修其本而末自應故仁義不施則韶濩之樂不能以降天神忠信不立則射鄉之禮不能以致刑措漢興蓋公治黃老而曹參師其言以謂治道貴清靜而民自定以此為政天下歌之曰蕭何為法顜若畫一曹參代之守而勿失載其清靜民以寧一其後文景之治大率依本黃老清心省事薄斂緩獄不言兵而天下富臣觀上與太皇太后所以治天下者可謂至矣檢身以律物故不怒而威捐利以豫民故不藏而富屈巳以消兵故不戰而勝虛心以觀世故不察而明雖黃帝老子其何以加此本既立矣則又惡衣菲食卑宫室陋器用斥其贏餘以成此宫上以終先帝未究之志下以為子孫無疆之福宫成之日民大和會鼓舞謳歌聲聞于天天地喜答神祗來格祝史無求福祿自至時萬時億永作神主故曰修其本而末自應豈不然哉臣既書其事皇帝若曰大哉太祖之功太宗之德神宗之志而聖母成之汝作銘詩而朕書其首曰上清儲祥宫碑臣軾拜手稽首獻銘曰天之蒼蒼正色非耶其視下也亦若斯耶我築上清儲祥之宫無以來之其肯我從元祐之政媚于上下何修何營曰是四者民懷其仁吏服其亷鬼畏其正神豫其謙帝既子民維子之視云何事帝而瘠其子允哲文母以公滅私作宫千柱人初不知於皇祖宗在帝左右風馬雲車從帝來狩閲視新宫察民之言佑我文母及其孝孫孝孫來饗左右耆耉無競惟人以燕我後多士為祥文母所培我膺受之篤其成材千石之鐘萬石之簴相以銘詩震于四海徐泗豪三州節度掌書記廳石記韓愈書記之任亦難矣元戎整齊三軍之士統理所部之氓以鎮守邦國贊天子施教化而又外與賔客四鄰交其朝覲聘問慰薦祭祀祈祝之文與所部之政三軍之號令升黜凡文辭之事皆出書記非閎辨通敏兼人之才莫宜居之然皆元戎自辟然後命於天子茍其帥之不文則其所辟或不當亦其理宜也南陽公自御史大夫豪夀廬三州觀察使授節移鎮徐州歷十一年而掌書記者三人其一人曰髙陽許孟容入仕于王朝今為尚書禮部郎中其一人曰京兆杜兼今為尚書禮部員外郎觀察判官其一人隴西李博自前鄉貢進士授祕書省校書郎方為之南陽公文章稱天下其所辟實所謂閎辨通敏兼人之才者也後之人茍未知南陽公之文章吾請觀於三君子茍未知三君子之文章吾請觀於南陽公可知矣蔚乎其相章炳乎其相輝志同而氣合魚川泳而鳥雲飛也愈樂是賔主之相得也故請刻石以記之而陷置于壁間俾來者得以覽觀焉藍田縣丞廳壁記韓愈丞之職所以二令於一邑無所不當問其下主簿尉主簿尉乃有分職丞位髙而逼例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手摘紙尾雁鶩行以進平立睨丞曰當署丞涉筆占位署惟謹目吏問可不可吏曰得則退不敢略省漫不知何事官雖尊力勢反出主簿尉下諺數慢必曰丞至以相訾謷丞之設豈端使然哉博陵崔斯立種學績文以蓄其有泓涵演迤日大以肆貞元初挾其能戰藝於京師再進再屈于人元和初以前大理評事言得失黜官再轉而為丞兹邑始至喟曰官無卑顧材不足塞職既噤不得施用又喟曰丞哉丞哉余不負丞而丞負余則盡枿去牙角一躡故迹破崖岸而為之丞廳故有記壞漏汚不可讀斯立易桷與瓦墁治壁悉書前任人名氏庭有老槐四行南牆巨竹千挺儼立若相持水㶁㶁循除鳴斯立痛掃溉對樹二松日哦其間有問者輒對曰余方有公事子姑去考功郎中知制誥韓愈記鳳鳴驛記蘇軾始余丙申嵗舉進士過扶風求舍於館人既入不可居而出次於逆旅其後六年為府從事至數日謁客於館視客之所居與其凡所資用如官府如廟觀如數世富人之宅四方之至者如歸其家皆樂而忘去將去既駕雖馬亦顧其皂而嘶余召館吏而問焉吏曰今太守宋公之所新也自辛丑八月而公始至既至逾月而興功五十有五日而成用夫三萬六千木以根計竹以竿計瓦甓壞釘各以枚計秸以石計者二十一萬四千七百二十有八而民未始有知者余聞而心善之其明年縣令胡允文具石請書其事余以為有足書者乃書曰古之君子不擇居而安安則樂樂則喜從事使人而皆喜從事則天下何足治歟後之君子常有所不屑則躁否則惰躁則妄惰則廢既妄且廢則天下之所以不治者常出於此而不足怪今夫宋公計其所歷而纍其勤使無齟齬於世則今且何為矣而猶為此官哉然而未嘗有不屑之心其治扶風也視其卼臲者而安植之求其蒙茸者而疏理之非特傳舍而巳事復有小於傳舍者公未嘗不盡心也嘗食芻豢者難於食菜嘗衣錦者難於衣布嘗為其大者不屑為其小此天下之通患也詩曰愷悌君子民之父母所貴乎愷悌者豈非以其不擇居而安安而樂樂而喜從事歟夫修傳舍誠無足書者以傳舍之修而見公之不擇居而安安而樂樂而喜從事者則是真足書也永州鐵爐步志柳宗元江之滸凡舟可縻而上下者曰步永州北郭有步曰鐵爐步余乘舟來居九年往來求其所以為鐵爐者無有問之人曰蓋嘗有煆鐵者居其人去而爐毁者不知年矣獨有其號冒而存余曰嘻世固有事去名存而冒焉若是耶步之人曰子何獨怪是今世有負其姓而立於天下者曰吾門大他不我敵也問其位與德曰久矣其先也然而彼猶曰我大世亦曰某氏大其冒於號有以異於兹步者乎向使有聞兹步之號而不足釡錡錢鏄刀鈇者懷價而來能有得其欲乎則求位與德於彼其不可得亦猶是也位存焉而德無有猶足以大其門然且樂為之下子胡不怪彼而獨怪於是大者桀冒禹紂冒湯幽厲冒文武以傲天下由不推知其本而姑大其故號以至於敗為世笑僇斯可以甚懼若求兹步之實而不得釡錡錢鎛刀鈇者則去而之它又何害乎子之驚於是末矣余以為古有太史觀民風采民言若是者則有得矣嘉其言可采書以為志全義縣復北門記栁宗元賢者之興而愚者之廢廢而復之為是習而循之為非恆人且猶知之不足乎列也然而復其事必由乎賢者推是類以從於政其事可少哉賢莫大於成功愚莫大於吝且誣桂之中嶺而邑者曰全義衛公城之南越以平盧遵為全義視其城塞北門鑿它雉以出問之其門人曰餘百年矣或曰巫言是不利於令故塞之或曰以賔旅之多有懼竭其餼饋者欲回其途故塞之遵曰是非吝且誣歟賢者之作思利乎人反是罪也余其復之詢于羣吏羣吏叶厥謀上于大府大府以俞邑人便焉歡舞里閭居者思正其家行者樂出其塗由是道以廢耶用賢棄愚推以革物宜民之蘇若是而不列殆非孔子徒也為之記云桂州新城記王安石儂智髙反南方出入十有二州十有二州之守吏或死或不死而無一人能守其州者豈其材皆不足歟蓋夫城郭之不設甲兵之不戒雖有智勇猶不能以勝一日之變也唯天子亦以為任其罪者不獨守吏故特推恩褒廣死節而一切貸其失職於是遂推選士大夫所論以為能者付之經略而今尚書户部侍郎余公靖當廣西焉寇平之明年蠻越輯和乃大城桂州其方六里其木甓瓦石之材以枚數之至四百萬有竒用人之力以工數之至一十餘萬凡所以守之具無一求而有不給者焉以至和元年八月始作而以二年之六月成夫其為役亦大矣蓋公之信於民也久而費之欲以衛其財勞之欲以休其力以故為是有大費與大勞而人莫或以為勤也古者君臣父子夫婦兄弟朋友之禮失則夷狄橫而窺中國方是時中國非無城郭也卒以陵夷毁頓陷滅而不救然則城郭者先王有之而非所以恃而為存也及至喟然覺悟興起舊政則城郭之修也又嘗不敢以謂後蓋有其患而圖之無其具有其具而守之非其人有其人而治之無其法能以久存而無敗者皆未之聞也故文王之興也有四方之難則城于朔方而以南仲宣王之起也有諸侯之患則城于東方而以仲山甫此二臣之德協于其君於為國之本末與其所先後可謂知之矣慮之以悄悄之勞而發赫赫之名承之以翼翼之勤而續明明之功卒所以靖兵戎而中國以全安者蓋其君臣如此而守衛之有其具也今余公亦以文武之材當明天子承平日久欲補弊立廢之時鎮撫一方修扞其民其勤於今與周之有南仲仲山甫蓋等矣是宜有紀也故其將吏相與謀而來取文將刻之城隅而以告後之人焉至和二年九月丙辰郡牧判官太常博士王某記錢塘六井記蘇軾潮水避錢塘而東擊西陵所從來逺矣沮洳斥鹵化為桑麻之區而久乃為城邑聚落凡今州之平陸皆江之故地其水苦惡惟負山鑿井乃得甘泉而所及不廣唐宰相李公長源始作六井引西湖水以足民用其後刺史白公樂天治湖浚井刻石湖上至於今賴之始長源六井其最大者在清湖中為相國井其西為西井少西而北為金牛池又北而西附城為方井為白龜池又北而東至錢塘縣治之南為小方井而金牛之廢久矣嘉祐中太守沈公文通又於六井之南絶河而東至美俗坊為南井出湧金門並湖而北有水閘三注以石溝貫城而東者南井相國方井之所從出也若西井則相國之𣲖别者也而白龜池小方井皆為匿溝湖底無所用閘此六井之大略也熙寧五年秋太守陳公述古始至問民之所病皆曰六井不治民不給於水南井溝庳而井髙水行地中率常不應公曰嘻甚矣吾在此可使民求水而不得乎乃命僧仲文子圭辦其事仲文子圭又引其徒如正思坦以自助凡出力以佐官者二十餘人於是發溝易甃完緝罅漏而相國之水大至坎滿溢流南注于河千艘更載瞬息百斛以方井為近於濁惡而遷之少西不能五步而得其故基父老驚曰此古方井也民李甲遷之於此六十年矣疏涌金池為上中下使浣衣浴馬不及於上池而列二閘於門外其一赴三池而決之河其一納之石檻比竹為五管以出之並河而東絶三橋以入于石溝注于南井水之所從來髙則南井常厭水矣凡為水閘四皆垣墻扃鐍以護之明年春六井畢修而嵗適大旱自江淮至浙右井皆竭民至以罌缶貯水相餉如酒醴而錢塘之民肩足所任舟楫所及南出龍山北至長河鹽官海上皆以飲牛馬給沐浴方是時汲者皆誦佛以祝公余以為水者人之所甚急而旱至於井竭非嵗之所常有也以其不常有而忽其所甚急此天下之通患也豈獨水哉故詳其語以告後之人使雖至於久逺廢壞而猶有考也石鐘山記蘇軾水經云彭蠡之口有石鐘山焉酈元以為下臨深潭微風鼓浪水石相搏聲如洪鐘是説也人嘗疑之今以鐘磬置水中雖大風浪不能鳴也而况石乎至唐李渤始訪其遺蹤得雙石於潭上扣而聆之南聲函胡北音清越枹止響騰餘韻徐歇自以為得之矣然是説也余尤疑之石之鏗然有聲者所在皆是也而此獨以鐘名何哉元豐七年六月丁丑余自齊安舟行適臨汝而長子邁將赴饒之德興尉送之至湖口因得觀所謂石鐘者寺僧使小童持斧於亂石間擇其一二扣之硿硿焉余固笑而不信也至暮夜月明獨與邁乘小舟至絶壁下大石側立千尺如猛獸竒鬼森然欲搏人而山上栖鶻聞人聲亦驚起磔磔雲霄間又有若老人咳且笑於山谷中者或曰此鸛鶴也余方心動欲還而大聲發於水上噌吰如鐘鼓不絶舟人大恐徐而察之則山下皆石穴罅不知其淺深微波入焉涵淡澎湃而為此也舟回至兩山間將入港口有大石當中流可坐百人空中而多竅與風水相吞吐有窽坎鏜鞳之聲與向之噌吰者相應如樂作焉因笑謂邁曰汝識之乎噌吰者周景王之無射也窽坎鏜鞳者魏獻子之歌鐘也古之人不余欺也事不目見耳聞而臆斷其有無可乎酈元之所見聞殆與余同而言之不詳士大夫終不肯以小舟夜泊絶壁之下故莫能知而漁工水師雖知而不能言此世所以不傳也而陋者乃以斧斤考擊而求之自以為得其實余是以記之蓋歎酈元之簡而笑李渤之陋也零陵郡復乳穴記柳宗元石鐘乳餌之最良者也楚越之山多産焉于連于韶者獨名於世連之人告盡焉者五載矣以貢則買諸它部今刺史崔公至逾月穴人來以乳復告邦人悅是祥也雜然謡曰氓之熙熙崔公之來公化所徹土石蒙烈以為不信起視乳穴穴人笑之曰是惡知所謂祥耶嚮吾以刺史之貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志潔先賴而後力欺誣屛息信順休洽吾以是誠告焉且夫乳穴必在深山窮林氷雪之所儲豺虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤若是出又不得吾直吾用是安得不以盡告今而乃誠吾告故也何祥之為士聞之曰謡者之祥也乃其所謂怪者也笑者之非祥也乃其所謂真祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熙熙然以效其有斯其為政也而獨非祥也歟莊子祠堂記蘇軾莊子蒙人也嘗為蒙漆園吏沒千餘嵗而蒙未有祀之者縣令祕書丞王兢始作祠堂求文以為記謹按史記莊子與梁惠王齊宣王同時其學無所不窺然要本歸於老子之言故其著書十餘萬言大抵率寓言也作漁父盜跖胠篋以詆訾孔子之徒以明老子之術此知莊子之粗者余以為莊子蓋助孔子者要不可以為法耳楚公子微服出亡而門者難之其僕操箠而罵曰𨽻也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可故莊子之言皆實豫而文不豫陽擠而隂助之其正言蓋無幾至於詆訾孔子未嘗不微見其意其論天下道術自墨翟禽滑釐彭蒙慎到田駢關尹老聃之徒以至於其身皆以為一家而孔子不與其尊之也至矣然余嘗疑盜跖漁父則若真詆孔子者至於讓王説劒皆淺陋不入於道反覆觀之得其寓言之意終曰陽子居西遊於秦遇老子老子曰而睢睢而盱盱而誰與居太白若辱盛德若不足陽子居蹴然變容其往也舍者將迎其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣去其讓王説劒漁父盜跖四篇以合於列禦寇之篇曰列禦寇之齊中道而反曰吾驚焉吾食於十漿而五漿先餽然後悟而笑曰是固一章也莊子之言未終而昧者勦之以入其言余不可以不辨凡分章名篇皆出於世俗非莊子本意李太白碑陰記蘇軾李太白狂士也又嘗失節於永王璘此豈濟世之人哉而畢文簡公以王佐期之不亦過乎曰士固有大言而無實虛名不適於用者然不可以此料天下之士士以氣為主方髙力士用事公卿大夫爭事之而太白使脫靴殿上固巳氣蓋天下矣使之得志必不肯附權幸以取容其肯從君於昏乎夏侯湛贊東方生云開濟明豁包含宏大陵轢卿相嘲哂豪傑籠罩靡前跆籍貴勢出不休顯賤不憂戚戲萬乘若僚友視儔列如草芥雄節邁倫髙氣蓋世可謂拔乎其萃遊方之外者也吾於太白亦云太白之從永王璘當由迫脅不然璘之狂肆寢陋雖庸人知其必敗也太白識郭子儀之為人傑而不能知璘之無成此理之必不然者也吾不可以不辨齊州閔子廟記蘇轍歷城之東五里有丘焉曰閔子之墓墳而不廟秩祀不至邦人不寧守土之吏有將舉焉而不克者熙寧七年天章閣待制右諫議大夫濮陽李公來守濟南越明年政修事治邦之耋老相與來告曰此邦之舊有如閔子而不廟食豈不大闕公唯不知茍知之其有不飭公曰噫信其可以緩於是鳩工為祠堂且使春秋修其常事堂成具三獻焉籩豆有列儐相有位百年之廢一日而舉學士大夫觀禮祠下咨嗟涕洟有言曰惟夫子生於亂世周流齊魯宋衛之間無所不仕其弟子之髙第亦咸仕於諸國宰我仕齊子貢冉有子遊仕魯季路仕衛子夏仕魏弟子之仕者亦衆矣然其稱德行者四人獨仲弓常為季氏宰其上三人皆未嘗仕季氏嘗欲以閔子為費宰閔子辭曰如有復我者則吾必在汶上矣且以夫子之賢猶不以仕為汙也而三子之不仕獨何歟言未卒有應者曰子獨不見夫適東海者乎望之茫洋不知其邊即之汗漫不測其深其舟如蔽天之山其帆如浮空之雲然後履風濤而不僨觸蛟蜃而不讋若夫以江河之舟楫而跨東海之灘則亦十里而返百里而溺不足以經萬里之害矣方周之衰禮樂崩弛天下大壞而有欲救之譬如涉海有甚焉者今夫夫子之不顧而仕則其舟楫足恃也諸子之汲汲而忘返蓋亦有陋舟而將試焉則亦隨其力之所及而巳矣若夫三子願為夫子而未能下顧諸子而以為不足為也是以止而有待夫子嘗曰世之學栁下惠者未有若魯獨居之男子吾於三子亦云衆曰然張益州畫像記蘇洵至和元年秋蜀人傳言有寇至邊軍夜呼野無居人妖言流聞京師震驚方命擇帥天子曰母養亂母助變衆言朋興朕志自定外亂不作變且中起不可以文令又不可以武競惟朕一二大吏孰為能處兹文武之間其命往撫朕師乃惟曰張公方平其人天子曰然公以親辭不可遂行冬十一月至蜀至之日歸屯軍徹守備使謂郡縣寇來在吾無爾勞苦明年正月朔旦蜀人相慶如它日遂以無事又明年正月相告留公像于淨衆寺公不能禁眉陽蘇洵言於衆曰未亂易治也既亂易治也有亂之萌無亂之形是謂將亂將亂難治不可以有亂急亦不可以無亂弛是惟元年之秋如器之欹未墜於地惟爾張公安坐於其旁顔色不變徐起而正之既正油然而退無矜容為天子牧小民不倦惟爾張公爾繄以生惟爾父母且公嘗為我言民無常性惟上所待人皆曰蜀人多變於是待之以待盜賊之意而繩之以繩盜賊之法重足屏息之民而以砧斧令於是民始忍以其父母妻子之所仰賴之身而棄之於盜賊故每每大亂夫約之以禮驅之以法惟蜀人為易至於急之而生變雖齊魯亦然吾以齊魯待蜀人而蜀人亦自以齊魯之人待其身若夫肆意於法律之外以威劫齊民吾不忍為也嗚呼愛蜀人之深待蜀人之厚自公而前吾未始見也皆再拜稽首曰然蘇洵又曰公之恩在爾心爾死在爾子孫其功業在史官無以像為也且公意不欲如何皆曰公則何事於斯雖然於我心有不釋焉今夫平居聞一善必問其人之姓名與其鄉里之所在以至於其長短大小美惡之狀甚者或詰其平生所嗜好以想見其為人而史官亦書之於其傳意使天下之人思之於心則存之於目存之於目故其思之於心也固由此觀之像亦不為無助蘇洵無以詰遂為之記公南京人為人慷慨有大節以度量雄天下天下有大事公可屬系之以詩曰天子在祚嵗在甲午西人傳言有寇在垣庭有武臣謀夫如雲天子曰嘻命我張公公來自東旗纛舒舒西人聚觀于巷于塗謂公暨暨公來于于公謂西人安爾室家無敢或訛訛言不祥往即爾常春爾條桑秋爾滌場西人稽首公我父兄公在西囿草木駢駢公宴其僚伐鼓淵淵西人來觀祝公萬年有女娟娟閨闥間間有童哇哇亦既能言昔公未來期汝棄捐禾麻芃芃倉庾崇崇嗟我婦子樂此嵗豐公在朝廷天子股肱天子曰歸公敢不承作堂嚴嚴有廡有庭公像在中朝服冠纓西人相告無敢逸荒公歸京師公像在堂道州毁鼻亭神記柳宗元鼻亭神象祠也不知何自始立因而勿除完而恆新相傳且千嵗元和九年河東薛公由刑部郎中刺道州除穢革邪敷和于下州之罷人去亂即治變呻為謡若痿而起若矇而瞭騰踴相視歡愛克順既底于理公乃考民風披地圖得是祠駭曰象之道以為子則傲以為弟則賊君有鼻而天子之吏實理以惡德而專世祀殆非化吾人之意哉命亟去之於是撤其屋墟其地沉其主於江公又懼楚俗之尚鬼而難諭也乃遍告于人曰吾聞鬼神不歆非類又曰淫祀無福凡天子命刺史于下非以專土疆督貨賄而巳蓋將教孝悌去竒邪俾斯人敦忠睦友祗肅信讓以順于道吾之斥是祠也以明教也茍離于正雖千載之違吾得而更之况今兹乎茍有不善雖異代之鬼吾得而攘之况斯人乎州民既諭相與歌曰我有耇老公燠其肌我有病癃公起其羸髫童之嚚公實智之鰥孤孔艱公實遂之孰尊惡德逺矣自古孰羡淫昏俾我斯瞽千嵗之冥公闢其户我子洎孫延世有慕宗元時謫永州邇公之邦聞其歌詩以為古道罕用賴公而存斥一祠而二教興焉明罰行于鬼神愷悌達于蠻夷不惟禁淫祀黜非類而巳願為記以刻山石俾知教之首樊侯廟災記歐陽修鄭之盜有入樊侯廟刳神象之腹者既而大風雨雹近鄭之田麥苗皆死人咸駭曰侯怒而為之也余謂樊侯本以屠狗立軍功佐沛公至成皇帝位為列侯邑食舞陽剖符傳封與漢長久禮所謂有功德於民則祀之者歟舞陽距鄭既不逺又漢楚常苦戰滎陽京索間亦侯平生提戈斬級所立功處故廟而食之宜矣方侯之參乘沛公事危鴻門振目一顧使羽失氣其勇力足以過人者故後世言雄武稱樊將軍宜其聰明正直有遺靈矣然當盜之剚刃腹中獨不能保其心腹腎腸哉而反貽怒於無罪之民以騁其恣睢何哉豈生能萬人敵而死不能庇一躬邪豈其靈不神於禦盜而反神於平民以駭其耳目耶風霆雨雹天之所以震耀威罰有司者而侯又得以濫用之耶蓋聞隂陽之氣怒則薄而為風霆其不和之甚者凝結而為雹方今歲且久旱伏隂不興壯陽剛燥疑有不和而凝結者豈其適會民之自災也耶不然則喑嗚叱吒使風馳霆擊則侯之威靈暴矣哉文編卷五十五

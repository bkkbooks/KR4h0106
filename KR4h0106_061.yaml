body:
  text: 文編卷六十一明唐順之編集賢院學士劉公墓志銘歐陽修公諱敞字仲原父姓劉氏世為吉州臨江人自其皇祖以尚書郎有聲太宗時遂為名家其後多聞人至公而益顯公舉慶厯六年進士中甲科以大理評事通判蔡州丁外艱服除召試學士院遷太子中允直集賢院判登聞鼓院吏部南曹尚書考功於是夏英公既薨天子賜諡曰文正公曰此吾職也即上疏言諡者有司之事也且竦行不應法今百司各得守其職而陛下侵臣官疏凡三上天子嘉其守為更其諡曰文莊公曰姑可以止矣權判三司開拆司又權度支判官同修起居注至和元年九月召試遷右正言知制誥宦者石全彬以勞遷宫苑使領觀察使意不滿退而愠有言居三日正除觀察使公封還辭頭不草制其命遂止二年八月奉使契丹公素知敵山川道里敵人道自古北口回曲千餘里至栁河公問曰自松亭趨栁河甚直而近不數日可至中京何不道彼而道此蓋敵人常故迂其路欲以國地險逺誇使者且謂莫習其山川不虞公之問也相與驚顧羞愧即吐其實曰誠如公言時順州山中有異獸如馬而食虎豹敵人不識以問公曰此所謂駮也為言其形狀聲音皆是敵人益歎服三年使還以親嫌求知揚州歲餘遷起居舍人徙知鄆州兼京東西路安撫使居數月召還糾察在京刑獄修玉牒知嘉祐四年貢舉稱為得人是歲天子卜以孟冬祫既廷告丞相用故事率文武官加上天子尊號公上書言尊號非古也陛下自寶元之郊止羣臣毋得以請逮今二十年無所加天下皆知甚盛德奈何一旦受虛名而損實美上曰我意亦謂當如此遂不允羣臣請而禮官前祫請祔郭皇后於廟自孝章以下四后在别廟者請母合食事下議議者紛然公之議曰春秋之義不薨于寢不稱夫人而郭氏以廢薨按景祐之詔許復其號而不許其諡與祔謂宜如詔書又曰禮於祫未毁廟之主皆合食而無帝后之限且祖宗以來用之傳曰祭從先祖宜如故於是皆如公言公既驟屈廷臣之議議者已多反目既而又論吕溱過輕而責重與臺諫異由是言事者亟攻之公知不容于時矣會永興闕守因自請行即拜翰林侍讀學士充永興軍路安撫使兼知永興軍府事長安多富人右族豪猾難治猶習故都時態公方發大姓范偉事獄未具而公召由是獄屢變連年吏不能決至其事聞制取以付御史臺乃決而卒如公所發也公為三州皆有善政在揚州奪發運使冒占雷塘田數百頃于民民至今以為德其治鄆永興皆承旱歉所至必雨雪蝗輒飛去歲用豐稔流亡來歸令行民信盜賊禁止至路不拾遺公於學博自六經百氏古今傳記下至天文地理卜醫數術浮圖老莊之説無所不通其為文章尤敏贍嘗直紫微閣一日追封皇子公主九人公方將下直為之立馬却坐一揮九制數千言文辭典雅各得其體公知制誥七年當以次遷翰林學士者數矣久而不遷及居永興歲餘遂以疾聞八年八月召還判三班院太常寺公在朝廷遇事多所建明如言渭州可棄孟陽河不可開樞密使狄青宜罷以保全之之類皆其語在士大夫間者若其規切人主直言逆耳至於從容進見開導聰明賢否人物其事不聞于外廷者其補益尤多故雖不合於世而特被人主之知方嘉祐中嫉者衆而攻之急其雖危而得無害者仁宗深察其忠也及侍英宗講讀不専章句解詁而指事據經因以諷諫每見聽納故尤竒其材已而復得驚眩疾告滿百日求便郡上曰如劉某者豈易得也復賜以告上每宴見諸學士時時問公少間否賜以新橙五十勞其良苦疾少間復求外補上悵然許之出知衛州未行徙汝州治平三年召還以疾不能朝改集賢院學士判南京留司御史臺熙寧元年四月八日卒于官舍享年五十嗚呼以先帝之知公使其不病其所以用之者豈一翰林學士而止哉方公以論事忤於時也又有構為謗語以怒時相者及歸自雍丞相韓公方欲還公學士未及而公病遂止于此豈非其命也夫公纍官至給事中階朝散大夫勳上輕車都尉開國彭城爵公邑戶二千一百實食者三百曽祖諱琠贈大理評事祖諱式尚書工部員外郎贈戶部尚書考諱立之尚書主客郎中贈工部尚書公再娶論氏皆侍御史程之女前夫人先公早卒後夫人以公貴纍封河南郡君子男四人長定國郊社掌座早卒次奉世大理寺丞次當時大理評事次安上太常寺太祝女三人長適大理評事韓宗直二尚幼公既卒天子推恩録其兩孫望旦一族子安世皆試將作監主簿公為人磊落明白推誠自信不為防慮至其屢見侵害皆置而不較亦不介于胸中居家不問有無喜賙宗族既卒家無餘財與其弟攽友愛尤篤有文集六十卷其為春秋之説曰傳曰權衡曰説例曰文權曰意林合四十一卷又有七經小傳五卷弟子記五卷而七經小傳今盛行於學者二年十月辛酉其弟攽與其子奉世等葬公於某所以狀來請銘乃為之銘曰嗚呼維仲原父學強而博識敏而明坦其無疑一以誠見利如畏義必爭觸機履險危不傾畜大不施奪其齡惟其文章粲日星雖欲有毁知莫能維古聖賢皆後亨有如不信考斯銘南陽主簿黃君墓志銘歐陽修豫友黃君夢升其先婺州金華人後徙洪州之分寧其曾祖諱某祖諱某父諱某皆不仕黃氏世為江南大族自其祖父以來樂以家資賑施鄉里多聚書以招延四方之士夢升兄弟皆好學尤以文章意氣自豪豫少家隋州夢升從其兄官于隋豫時為童子見夢升年十七八眉明秀善飲酒談笑豫雖幼已能知夢升為可竒其後八九年與豫皆舉進士于京師夢升得丙科初任興國軍永興主簿怏怏不得志以疾解去久之復調江陵府公安主簿豫時謫夷陵令遇之于江陵夢升顔色憔悴初不能識久而握手吁􅐵相勞以酒夜醉起舞歌呼自若豫益悲夢升志雖衰而少時意氣尚在也後又二年豫徙乾德令夢升復調南陽主簿又遇之于鄧間嘗問其平生所為文章幾何夢升慨然曰吾已諱之矣窮達有命非世人不知我乃我羞道於世人也求之不肯出遂飲以酒復大醉起舞歌呼因大笑曰獨子知我者也乃肯出其文其博辨雄偉意氣奔放猶若不可禦豫又益悲夢升志雖困而其文章獨未衰也是時謝希深守鄧州尤喜稱道天下士豫因手書夢升文一通將示希深未及而希深卒豫亦去鄧後之守鄧者皆庸人不復知夢升夢升素剛不茍合負其所有常憤憤無所發卒以不得志死於南陽夢升諱注以寶元三年四月某日卒享年四十有二其平生所為文曰破碎集公安集南陽集凡若干卷其娶溫氏生四男二女以某年某月某日葬于先塋之側其弟渭泣而來告曰吾兄患世之莫知孰可為其銘豫素悲夢升者乃為之銘曰豫嘗喜讀夢升之文至於哭其兄子庠之辭曰子之文章電激雷震雨雹忽止閴然滅泯未始不諷誦歎息而不已嗟夫夢升曾不及庠不震不驚鬱塞埋藏孰豫其有不使其施吾不知夫歸咎徒為夢升而悲大理寺丞狄君墓志銘歐陽修距長沙縣西三十里新陽鄉梅溪村有墓曰狄君之墓者乃豫所記穀城孔子廟碑所謂狄君栗者也始君居穀城有善政嘗已見於豫文及其亡也其子遵誼泣而請曰願卒其詳而銘之以終先君死生之賜烏呼豫哀狄君者其壽止於五十有六其官止於一卿丞蓋其生也以不知於世而止於是若其歿而又無傳則後世遂將泯沒而為善者何以勸焉此豫之所欲銘也君字仲莊世為長沙人幼孤事母鄉里稱其孝好學自立年四十始用其兄棐蔭補英州真陽主簿冉調安州應城尉能使其縣終君之去無一人為盜薦者稱其材任治民乃遷穀城令漢旁之民惟鄧穀為富縣尚書銓吏常邀厚賂以售貪令故省中私語以一二數之惜為竒貨而二邑之民未嘗得亷吏其豪猾習以賕賄汚令而為自恣至君一切以法繩之姦民大吏不便君之政者往往訴於其上雖按覆率不能奪君所為其州所下文符有不如理必輒封還州吏亦切齒求君過失不可得君益不為之屈其後民有訟田而君誤斷者訴之君坐被劾已而縣籍強壯為兵有告訟田之民隱丁以規避者君笑曰是嘗訴我者彼寃民能自伸此令之所欲也吾豈挾此而報以罪邪因置之不問縣民繇是知君為愛我是歲西北初用兵州縣既大籍強壯而訛言相驚云當驅以備邊縣民數萬聚邑中會秋大雨霖米踊貴絶粒君發常平粟賑之有司劾君擅發倉廪君即具狀事聞朝廷亦原之又為其民正其稅籍之失而吏得歲免破産之患逾年政大洽乃修孔子廟作禮器與其邑人春秋釋奠而興于學時豫為乾德令嘗至其縣與其民言皆曰吾邑不幸有生而未識亷吏者而長老之民所記才一人而繼之者今君也問其一人者曰張及也推及之歲至于君蓋三十餘年是謂一世矣嗚呼使民更一世而始得一良令吏其可不慎擇乎君其可不惜其歿乎其政之善者可遺而不録乎君用穀城之績遷大理寺丞知新州至則丁母夫人鄭氏憂服除赴京師道病卒于宿州實慶厯五年七月二十四日也曾祖諱崇謙連州桂陽令祖諱文蔚全州清湘令父諱杞不仕君娶滎陽鄭氏生子男二人遵誼遵微皆舉進士女四人長適進士胡純臣其三尚幼其銘曰強而仕古之道終中壽不為夭善在人宜有後銘于石著不朽翰林侍讀學士右諫議大夫贈工部侍郎張公墓志銘并序歐陽修翰林侍讀學士朝散大夫右諫議大夫上柱國清河縣伯張公諱錫字貺之其先京兆長安人也其祖山甫從唐僖宗入蜀留不返蜀遭王孟再亂絶於中國中國更五代天下為宋而蜀平張氏留蜀蓋亦已五世矣始得去為漢陽人又二世而張氏遂以大顯公為人清方敏默為善不倦而喜自晦斂若不欲人知其遇人怡怡若無所不可及視其發施於事者其義有可畏其守有不可奪其能有不可及既已則若未嘗有所為者少喜讀書至其疾革猶不釋手自經史子集百家之説無不記覽通達而絶口不道於人故其晚始侍讀于中上嘗歎曰自吾得張錫日益有所聞以飛白為博學二字賜之曰錫老矣恨得之晚也公初舉進士中大中祥符元年甲科試祕書省校書郎知南昌縣遷萍鄉令改著作佐郎又知安逺縣徙知新州興學校以教新人新人有進士自公始冉遷太常博士監染院詔選能吏治畿縣公以選知東明前為令者闔門重簾以壅隔廢治公至則闢門去簾告其人曰吾所治者三而已強恃力富恃資刑恃贖者吾所先也其人以謂公言簡必信法簡必嚴於是豪勢者屈而善弱者伸縣以大治工部侍郎李及薦公材堪御史上曰李及清慎人未嘗妄有所舉此可信也乃以為監察御史故相丁謂貶崖州至是議徙內地公疏言謂姦邪弄國罪當死無可憐且大臣竄逐本與天下棄之今復內還是違天下意由是止徙道州玉清昭應宫災坐火事劾當死者百餘人公疏言天災可畏不可反以罪人而重天怒願益修德以塞譴人乃獲免公於御史自監察厯殿中侍御史侍御史知雜事於尚書為員外郎郎中纍官至諌議大夫於外為荆湖北路京東河北轉運使江淮兩浙荆湖發運制置使利夔路安撫使知河中府滑州於三司為鹽鐵判官判旬院厯鹽鐵度支户部副使又嘗權知諌院判三班審官院太常寺國子監於侍從為天章閣待制龍圖閣直學士翰林侍讀學士雖其自晦其所居人皆以為宜其在京東籍淄青齊濮濟鄆六州之人冒耕河壖地收租緡絹歲二十八萬而六州之民爭訟遂息其後言利者請稅天下橋渡以佐軍公建言津梁利人而反稅之以為害卒爭罷之平居退讓未嘗肯為人先妖賊王則反貝州兵圍久不克而自河以北軍餉調發益急轉運使受命者以疾留不行公自滑州權河北轉運使命至即日馳城下軍需皆如其期其於取舍緩急常如此公居家有常法雖貴顯衣服飲食如少賤時事母至孝與族兄甚相友愛人以為同産公以皇祐元年七月十日遇疾卒于京師享年六十有八上聞震悼以白金三百兩賜其家特贈工部侍郎曾祖諱惟序不仕祖諱文翼復州録事參軍贈太子中舍父諱龜從贈右諫議大夫母南陽郡太君鄧氏自皇祖中舍君家于漢陽遂葬之至公始葬汝州之襄城某鄉某原實五年閏七月十七日也公初娶程氏再娶孫氏封樂安郡君先公五十日而卒公子五人曰子駿子充子雲子諒子真子真子充皆早喪於公之葬也子駿子雲皆為大理評事子諒大理寺丞有孫十人女三人長適虞部員外郎杜樞次早卒幼適大理寺丞王縡銘曰自足乎其中不求乎其外斯惟公之善晦仁能勇於必為善有應而無逺故公晦其終顯難於自進以晚見嗟而壽胡不俾其遐嗚呼其奈何尚書刑部郎中充天章閣待制兼侍讀贈右諫議大夫孫公墓志銘歐陽修公諱甫字之翰許州陽翟人也初舉進士天聖五年得同學究出身為蔡州汝陽縣主簿八年冉舉進士及第為華州觀察推官轉運使李紘薦其材遷大理寺丞知絳州翼城縣故丞相杜祁公與紘皆以清節自高尤難於取士聞公紘所薦也數招致之一見大喜已而祁公自御史中丞拜樞密直學士知永興軍辟公司録凡事之繁猥者一以委之公歎曰待我以此可以去矣祁公為謝顧事非他吏不能者不敢煩公公乃從容為陳當世之務所以緩急先後施設之宜又多薦士之賢而在下者於是祁公自以為得益友歲滿知彭州永昌縣監益州交子務再遷太常博士祁公為樞密副使薦于朝得祕閣校理是時諸將兵討靈夏久無功天下騷動盜賊數入州縣殺吏卒吏多失職而民弊矣天子方鋭意更用二三大臣乃極選一時知名士增置諌員使補闕失公以右正言居諫院上好納諫諍未嘗罪言者而至言宫禁事它人猶須委曲開諷而公獨曰所謂后者正嫡也其餘皆猶婢爾貴賤有等用物不宜過僣自古寵女色初不制而後不能制者其禍不可悔上曰用物在有司吾恨不知爾公曰世謂諫臣耳目官所以達不知也若所謂前世女禍者載在書史陛下可自知也上深嘉納之保州兵變前有告者大臣不時發之公因力言樞密使副當得罪使乃杜祁公也邊將劉滬城水洛于渭州部署尹洙以滬違節度將誅之大臣稍主洙議公以謂水洛通秦渭於國家利滬不可罪由是罷洙而釋滬洙公平生所善者也公在諌院所言補益尤多是三者其一人所難言其二人所難處者其後言宰相以某事當去者上亟為罷之因以陳執中為參知政事公又言執中不可用由是上難之公遂求解職於是小人不便大臣執政而朋黨之論起二三公相繼去位公亦在論中而辨諍愈切不自疑由是罷諫職以右司諫知鄧州徙知安州厯江南兩浙轉運使再遷兵部員外郎改直史館知陜府又徙晉州河東轉運使公素羸性淡然寡所好欲恂恂似不能言而內徑果遇事精明議者謂公道德文學宜在朝廷備顧問而錢穀刀筆非其職然公處之益辦至臨疑獄滯訟常立得其情大賊張海郭貌山攻劫商鄧新破南陽順陽公安輯有方常曰教民知戰古法也乃親閲縣弓手教之擊射坐作皆為精兵盜賊為息陜當東西衝吏苦厨傳而前為守者顧毁譽不能有所損至公痛裁節之過客畏其清初無所望而亦莫之毁也陜人賴以紓後遂以為法其為轉運使所至州縣視其職事修廢察其民樂否以此升黜官吏而不納毁譽遇下雖嚴而不害其在兩浙范文正公守杭州以大臣或便宜行事公曰范公貴臣也吾屈於此則不得伸於彼矣由是一切繩以法而常以監司自處范公遇公無倦色及退而不能無恨公遇范公不少下然退而未嘗不稱其賢也自河東召為度支副使勤其職不以為勞已而得疾嘉祐元年遷刑部郎中天章閣待制河北都轉運使不行疾少間乃留侍讀公博學強記尤喜言唐事能詳其君臣行事本末以推見當時治亂每為人説如其身履其間而聽者曉然如目見故學者以謂終歲讀史不如一日聞公論也所著唐史記七十五卷論議宏瞻書未及成以嘉祐二年正月戊戌卒于家享年六十公既卒詔取其書藏于祕府贈右諫議大夫又有文集七卷公喜接士務揚人善所得俸廩多所施與撫諸孤兒教育如已子曾祖諱恕博州堂邑主簿祖諱賁尚書庫部員外郎考諱從革不仕以公貴纍贈都官郎中母曰長安縣太君李氏娶陳氏壽昌縣君子三人長曰宜滑州節度推官次曰實曰置皆將作監主簿女三人一適將作監主簿程著餘皆早亡以五年七月丁酉葬公于陽翟縣舊學鄉塢頭村之北原銘曰惟學而知方以行其義惟簡而無欲以遂其剛力雖弱兮志則強積之厚兮發也光宜壽兮奄以藏有深其泉兮有崇其岡永安其固兮百世無傷尚書戶部侍郎參知政事贈右僕射文安王公墓志銘并序歐陽修公姓王氏其先太原祁人其六世祖某為唐輝州刺史遭世亂因留家碭山碭山近宋其後又徙宋州之虞城今為應天虞城人也公諱堯臣字伯庸天聖五年舉進士第一為將作監丞通判湖州召試以著作佐郎直集賢院知光州歲大飢羣盜發民倉廩吏法當死公曰此飢民求食爾荒政之所恤也乃請以減死論其後遂以著令至今用之丁父憂服除為三司度支判官再遷右司諫郭皇后廢居瑶華宫有疾上頗哀憐之方后廢時宦者閻文應有力及后疾文應又主監醫后且卒議者疑文應有姦謀公請付其事御史考按虛實以釋天下之疑事雖不行然自文應用事無敢指言者後文應卒以恣橫斥死后猶在殯有司以歲正月用故事張燈公言郭氏幸得蒙厚恩復位號乃天子后也張燈可廢上遽為之罷景祐四年以本官知制誥賜服金紫同知通進銀臺司兼門下封駮提舉諸司庫務遷翰林學士知審官院元昊反西邊用兵以公為陜西體量安撫使公視四路山川險易還言某路宜益兵若干某路賊所不攻某路宜急為備至於諸將材能長短盡識之薦其可用者二十餘人後皆為名將是時邊兵新敗於好水任福等戰死今韓丞相坐主帥失律奪招討副使知秦州范文正公亦以移書元昊不先聞奪招討副使知耀州公因言此兩人天下之選也其忠義智勇名動四方不宜以小故置之且任福由違節度以致敗尤不可深責主將由是忤宰相意并其它議多格不行明年賊入涇原戰定川殺大將葛懷敏乃公指言為備處由是始以公言為可信而前所格議悉見施行因復遣公安撫涇原路公曰陛下復用韓琦范仲淹幸甚然將不中御兵法也願許以便宜從事上以為然因言諸路都部署可罷經略副使以重將權而偏將見招討使以軍禮置德順軍於籠竿城廢涇原等五州營田以其地募弓箭手其所更置尤多方公使還行至涇州而德勝寨兵迫其將姚貴閉城叛公止道左解裝為榜射城中以招貴且發近兵討之初吏白曰公奉使且還歸報天子爾貴叛非公事也公曰貴土豪也頗得士心然初非叛者今不乘其未定速招降後必生事為朝廷患貴果出降明年四月以學士權三司使自朝廷理元昊罪軍興而用益廣前為三司者皆厚賦暴斂甚者借內藏率富人出錢下至果菜皆加稅而用益不足公始受命則曰今國與民皆弊矣在陛下任臣者如何由是天子一聽分所為公乃推見財利出入盈縮曰此本也彼末也計其緩急先後而去其蠧弊之有根冗者斥其妄計小利之害大體者然後一為條目使就法度罷副使判官不可用者十五人更薦用材且賢者期年民不加賦而用足明年以其餘償內藏所借者數百萬又明年其餘而積於有司者數千萬而所在流庸稍復其業公曰臣之術止於是矣且臣母老願解煩劇天子多公功以為翰林學士承旨兼端明殿學士羣牧使初宦者張永和方用事請收民房錢十之三以佐國事下三司永和隂遣人以利動公公執以為不可度支副使林濰附永和議不已公奏罷濰乃止益利夔三路轉運使皆請增民鹽井課歲可為錢十餘萬公亦以為不可而權幸因緣多見裁抑京師數為飛語及上之左右往往讒其短者上一切不問而公為之亦自若也及公既罷上慰勞之公頓首謝曰非臣之能惟陛下信用臣爾丁母憂去職服除復為學士羣牧使再遷給事中皇祐三年以本官為樞密副使公持法守正遂以身任天下事凡宗室宦官醫師樂工嬖習之賤莫不關樞密而濫恩幸請隨其事可損損之可絶絶之至其大者則皆著為定令由是小人益怨構為飛書以害公公得書自請曰臣恐不能勝衆怨願得罷去上愈知公為忠為下令購為書者甚急公益感勵在位六年廢職修舉皆有條理樞密使狄青以軍功起行伍居大位而士卒多屬目往往造作言語以相扇動人情以為疑而青色頗自得公嘗以語衆折青為陳禍福言古將帥起微賤至富貴而不能保首領者可以為鑒戒青稍沮畏嘉祐元年三月拜戶部侍郎參知政事三年遷吏部侍郎八月二十一日以疾薨于位享年五十有六公在政事論議有所不同必反覆切劘至於是而後止不為獨見在上前所陳天下利害甚多至施行之亦未嘗自名其所設施與在樞密時特異豈政事者丞相府也其體自宜如是邪公為人純質雖貴顯不忘儉約與其弟純臣相友愛世稱孝悌者言王氏遇人一以誠意無所矯飾善知人多所稱薦士為時名臣者甚衆有文集五十卷將終口授其弟純臣遺奏以宗廟至重儲嗣未立為憂天子愍然臨其喪輟視朝一日贈左僕射太常諡曰文安曾祖諱化某官贈太傅妣戚氏封曹國太夫人祖諱礪某官父諱瀆某官皆贈太師中書令兼尚書令祖妣袁氏鄆國太夫人妣仇氏徐國太夫人娶丁氏安康郡夫人子男三人同老大理評事周老太常寺太祝早卒朋老大理評事二女長適校書郎戚師道早卒次未嫁王氏自遷虞城由公曾祖而下或葬雙金或葬土山皆在虞城嘉祐四年八月十日改葬公之皇考于宋城縣平臺鄉石落原而以公從葬焉銘曰王為祁人遭亂不還六世之祖初留碭山其後再遷虞宋之間遂安其居葬不逺卜宋多名家王實大族族大而振自公顯聞公初奮躬以學以文逢國多事有勞有勤利歸于邦怨不避身帝識其忠謂堪豫弼俾副樞機出入惟密遂參政事實有謀謨惟中止之不俾相豫帝有褒章愍飾之贈長于百寮考德惟稱維古載功在其廟器今亦有銘幽宫是閟端明殿學士蔡公墓志銘歐陽修公諱襄字君謨興化軍仙遊人也天聖八年舉進士甲科為漳州軍事判官西京留守推官改著作佐郎館閣校勘慶厯三年以祕書丞集賢校理知諫院兼修起居注是時天下無事士大夫弛於久安一日元昊叛師久無功天子慨然厭兵思正百度以修太平既已排羣議進退二三大臣又詔增置諫官四員使拾遺補闕所以遇之甚寵公以材名在選中遇事感激無所回避權幸畏斂不敢撓法干政而上得益與大臣圖議明年屢下詔書勸農桑興學校革弊修廢而天下悚然知上之求治矣於此之時言事之臣無日不進見而公之補益為尤多四年以右正言直史館出知福州以便親遂為福建路轉運使復古五塘以溉田民以為利為公立生祠于塘側又奏減閩人五代時丁口稅之半丁父憂服除判三司鹽鐵勾院復修起居注今參知政事唐公介時為御史以直言忤旨貶春州别駕廷臣無敢言者必獨論其忠人皆危之而上悟意解唐公得改英州遂復召用皇祐四年遷起居舍人知制誥兼判流內銓御史吕景初吳中復馬遵坐論梁丞相適罷臺職除它官封還辭頭不草制其後屢有除授非當者必皆封還之而上遇公益厚曰有子如此其母之賢可知命特賜冠帔以寵之至和元年遷龍圖閣直學士知開封府三年以樞密直學士知泉州徙知福州未幾復知泉州公為政精明而世閩人知其風俗至則禮其士之賢者以勸學興善而變民之故除其甚害往時閩人多好學而専用賦以應科舉公得先生周希孟以經術傳授學者常至數百人公為親至學舍執經講問為諸生率延見處士陳烈尊以師禮而陳襄鄭穆方以德行著稱鄉里公皆折節下之閩俗重凶事其奉浮圖會賓客以盡力豐侈為孝否則深自愧恨為鄉里羞而姦民遊手無賴子幸而貪飲食利錢財來者無限極往往至數百千人至有親亡祕不舉哭必破産辦具而後敢發喪者有力者乘其急時賤買其田宅而貧者立劵舉責終身困不能償公曰弊有大於此邪即下令禁止至於巫覡主病蠱毒殺人之類皆痛斷絶之然後擇民之聰明者教以醫藥使治疾病其子弟有不率教令者條其事作五戒以教諭之久之閩人大便公既去閩人相率詣州請為公立德政碑吏以法不許謝即退而以公善政私刻于石曰俾我民不忘公之德嘉祐五年召拜翰林學士權三司使三司開封世稱省府為難治而易以毁譽居者不由以遷則由以敗而敗者十常四五公居之皆有能名其治京師談笑無留事尤善破姦隱吏不能欺至商財利則較天下盈虛出入量力以制用必使下完而上給下暨百司因習蠧弊切磨剗剔久之簿書纎悉紀綱條目皆可法七年季秋大享明堂後數月仁宗崩英宗即位數大賞賚及作永昭陵皆猝辦於縣官經費外公應煩愈間暇若有餘而人不知勞遂拜三司使居二歲以母老求知杭州即拜端明殿學士以往三年徙南京留守未行丁母夫人憂明年八月某日以疾卒于家享年五十有六蔡氏之譜自晉從事中郎克以來世有顯聞其後中衰隱德不仕公年十八以農家子舉進士為開封第一名動京師後官于閩典方州領使一路二親尚皆無恙閩人瞻望咨嗟不榮公之貴而榮其父母母夫人尤有壽年九十餘飲食起居康強如少者歲時為壽母子鬢髮皆皤然而命服金紫煌煌如也至今閩人之為子者必以夫人祝其親為父母者必以公教其子也公於朋友重信義聞其喪則不御酒肉為位以哭盡哀乃止嘗會飲食靈東園坐客有射矢誤傷人者客遽指為公矢京師喧然事既聞上以問公公即再拜愧謝終不自辨退亦未嘗以語人公為文章清綺粹美有文集若干卷工於書畫頗自惜不妄為人書故其殘章斷藁人悉珍藏而仁宗尤愛稱之御製元舅隴西王碑文詔公書之其後命學士撰溫成皇后碑文又敕公書則辭不肯書曰此待詔職也公纍官至禮部侍郎既卒翰林學士王圭等十餘人列言公賢其亡可惜天子新即位未及識公而聞其名久也為之惻然特贈吏部侍郎官其子旻為祕書省正字孫傳及弟之子均皆守將作監主簿而優以賻恤以旻尚幼命守吏助給其喪事曾祖諱顯皇不仕祖諱恭贈工部員外郎父諱琇贈刑部侍郎母夫人盧氏長安郡太君夫人葛氏永嘉郡君子男三人曰勻將作監主簿曰旬大理評事皆先公卒幼子旻也女三人一適著作佐郎謝仲規二尚幼以某年某月某日葬公于莆田縣某鄉將軍山銘曰誰謂閩逺而多竒産産非物寶惟士之賢嶷嶷蔡公其人傑然奮躬當朝讜言正色出入左右彌縫補益間歸于閩有政在人食不畏蠱喪不憂貧疾者有醫學者有師問誰使然孰不公思有髙其墳有拱其木凡閩之人過者必肅尚書兵部員外郎知制誥謝公墓志銘歐陽修朝散大夫行尚書兵部員外郎知制誥知鄧州軍州事兼管內勸農使上輕車都尉陽夏縣開國男食邑三百戶賜紫金魚袋謝公諱絳字希深其先出於黃帝之後任姓之别為十族謝其一也其國在南陽宛三代之際以微不見至詩嵩髙始言周宣王使召公營謝邑以賜申伯蓋謝先以失國其子孫散亡以國為姓厯秦漢魏益不顯至晉宋間謝氏出陳郡者始為盛族公之皇考曰太子賔客諱濤其爵陳留伯至公開國又為陽夏男皆在陳郡故用其封復因為陳郡人然其官邑卒葬隨世而遷其譜自八世而下可見曰八代祖汾為河南緱氏人至五代祖希圖始遷而南或葬嘉興或葬麗水自皇考已上三代皆葬杭州之富陽公以寶元二年四月丁卯來治鄧其年十一月己酉以疾卒于官以逺不克歸于南即以明年八月得州之西南某山之陽遂以葬公享年四十有五初娶夏侯氏先卒今舉以祔後娶高氏文安縣君三男六女男某皆將作監主簿女一早亡五尚幼公之卒其客歐陽修弔而哭于位退則歎曰初賓客之薨修獲銘其德納諸富陽之原今又哭公之喪哭者在位莫如修舊蓋嘗銘其世矣乃論次其終始曰公年十五起家試祕書省校書郎復舉進士中甲科以奉禮郎知頴州汝陰縣遷光祿寺丞上書論四民失業楊文公薦其材召試充祕閣校理再遷太常丞通判常州丁母晉陵郡君許氏憂服除遷太常博士用鄭氏經唐故事議昭武皇帝非受命祖不宜配享感生帝天聖中天下水旱而蝗河決壞滑州又上書用洪範五行京房傳推災異所以為天譴告之意極陳時所闕失無所諱與修真宗國史遷祠部員外郎直集賢院通判河南府移書丞相言歲凶嵩山宫宜罷勿治又上書論妖人方術士不宜出入禁中請追所賜先生處士號歲滿權開封府判官冉遷兵部員外郎為三司度支判官上書論法禁密花透背詔書云自內始今內人賜衣復下有司取之是為法而自戾無以信天下又言後苑作官市龜筒亦禁物民間非所有有之為犯法因請罷內作諸器皆以其職言又言有司多求上旨從中出而數更且謂號令數變則虧國體利害偏聽則惑聰明請者務欲各行而守者患於不一請凡詔令皆由中書樞密院然後行郭皇后廢上書用詩白華引申后褒姒以為戒景祐元年丁父憂服除召試知制誥判流內銓諫者言李照新定樂不可用下其議議者久不決公為兩議曰宋樂用三世矣無文法不合古吾從舊乃署其一議曰從新樂者異署議者皆從公署公為人肅然自修平居溫溫不妄喜怒及其臨事敢言何其壯也雖或聽或否或論高而不能行或後果如其言皆傳經據古切中時病二代已來文章盛者稱西漢公於制誥尤得其體世所謂常楊元白不足多也公既以文知名至於為政無所不達自汶隂已有能名佐常州至今常人思之錢思公守河南悉以事屬之是時莊獻明肅太后莊懿太后起二陵於永安至於鐵石畚鍤不取一物於民而足修國子學教諸生自逺而至者百餘人舉而中第者十八九河南人聞公喪皆出涕諸生畫像於學而祠之初吏部擬官以圭田有無為均公取州縣田覆其實者準其方之物賈差為多少揭之省中它有名而無實者皆不用人以為便天下之吏有定職而無定貟故選者常患其多而久積吏緣以姦至公為之選而集者有不逾旬而去天下皆稱其平其遇事尤劇尤若簡而有餘及求知鄧州其治益以寬靜為本州遂無事先時有妖僧者以偽言誘民男女數百人往往晝夜為會凡六七年不廢公則取其首惡二人置之法餘一不問民始知公法可畏而安於不苛南陽堰引湍水溉公田水之來逺而少能及民而堰撤墩破公議復召信臣故渠以罷鄧人歲役而以水與民大興學舍皆未就而卒始公來鄧食其廩者四十餘人或疑其多及其喪為之制服其治衣櫛才二婢至三從孤弟妹皆聚而食之卒之日廩無餘粟家無餘資入哭其堂椸無新衣然平生喜賓客談晏怡怡如也自少而仕凡三十年間自守不回而外亦不為甚異此其始終大節也銘曰壽吾不知命繫其偶不俾其隆安歸其咎惟德之明惟仁之茂惟力之為而公之有翰林侍讀侍講學士王公墓志銘歐陽修公諱洙字原叔其生始能言已知為詩指物能賦既長學問自六經史記百氏之書至於圗緯隂陽五行律吕星官算法訓故字音無所不學學必通達如其専家其語言初如不出諸口已而辨别條理發其精微聽者忘倦決疑請益人人必得其所欲故自其少也一時名臣賢士皆稱慕之其名聲著天下初舉進士為廬州舒城尉坐事免官歸居南京故相臨淄晏公為留守竒其文章待以客禮久之復調賀州富川主簿未行臨淄公薦其才留居應天府學教諸生會詔舉經術士為學官京東轉運使舉公應詔召為國子監直講遷大理評事史館檢討知太常禮院天章閣侍講直龍圖閣同判太常寺慶厯中小人有不便大臣執政者欲排去之未知所發而杜丞相子壻蘇舜欽為集賢校理負時名所與交遊皆當世賢豪已而舜欽坐監進奏院祠神會客為御史所彈公以坐客貶知濠州徙知襄徐亳三州范文正公富丞相皆言王某學問經術多識故事宜在朝廷復召為檢討同判太常寺侍講充史館修撰拜知制誥權判吏部流內銓至和元年九月為翰林學士三年以親嫌改侍讀學士兼侍講學士嘉祐二年九月甲戌朔以疾卒享年六十有一纍官至尚書吏部郎中階朝散大夫勳輕車都尉爵開國伯食邑五百户公為人寬厚樂易孝於宗族信於朋友諸孤不能自立者皆為之嫁娶始舉進士時與郭稹同保人有告稹冒母禫者法當連坐主司召公問果保稹否不然可易也公言保之不可易也於是與稹俱罷公以文儒進用能因其所學為上開陳其言緩而不迫天子常喜其説意有所欲必以問之無不能對嘗以塗金龍水箋為飛白詞林二字以褒之至於朝廷它有司前言故實皆就以考正既領太常吉凶禮典撰定尤多嘗修集韻校定史記前後漢書編國朝會要鄉兵制度祖宗故事三朝經武聖略皇祐中大享明堂翰林侍讀學士宋祁言明堂禮廢久必得通知古今之學者詔公共草其儀禮成撰大享明堂記又詔修雅樂晚喜𨽻書尤有古法著易傳一篇其它文章千有餘篇其施於為政敏而有方襄州中廬戍兵驕前為守者患之不能制公至因事召之悉集于庭告曰某時為某事者非某人邪取其一二人置于法餘悉不問兵始知懼是時妖賊反貝州州縣無逺近皆驚動佐吏勸公毋給州卒教習者真兵公笑曰是欲防亂乎此所以使人不安也在徐州遭歲大飢免民舟算緡使得糴旁郡而出公私糴粟賑民所活尤多有司上其最降詔書褒美其在朝廷多所論議遇人恂恂惟謹及既歿而考其言乃當世要務公知制誥夏竦卒天子以東宮舊恩賜諡文獻公曰此僖祖皇帝諡也封還其目不為草辭因曰前有司諡王溥為文獻章得象為文憲字雖異而音同皆當改於是太常更諡竦文莊而溥得象皆易諡又嘗論宗戚近幸冒法干恩澤以亂刑賞又言天下民田稅不均而姦民逃亡有司失其常稅請用郭咨孫琳千步開方為均田法頒之州縣使因民訟稍稍均之可不擾而有司得復其常數近時選諫官御史有執政之臣嘗薦舉者皆以嫌不用公以謂士飭身勵行而大臣薦賢以報國以嫌廢之是疑大臣而廢賢材不可及論河功邉食皆可施行方公病時八月開邇英閣侍臣並進講讀而公獨病天子思之遣使者問公病少間否能起而為豫講耶既而公病篤以卒天子震悼賻恤加等贈給事中特賜諡曰文即以其年十月辛酉葬於應天府虞城縣之孟諸鄉土山原公應天宋城人也曾祖諱厚祖諱化贈太傅父諱礪贈太師中書令兼尚書令公初娶董氏冉娶胡氏皆先公卒又娶齊氏封高陽郡君子男五人長曰叟臣早卒次曰力臣太常寺太祝次欽臣祕書省正字次陟臣將作監主簿次曾臣某官一女適太常博士陳安道銘曰惟王氏之先逺自三代下迄戰國商周齊魏其後之人皆以王為氏故其為姓尤多於後世而太原之王出周王子公世可考實太原人後家于宋遂以蕃延惟其皇考是生八子公實其季其德克嗣播其休聲以顯于仕八支之盛名譽材賢公考朝廷儒學之臣退食于家詵詵子孫豈其不樂胡奪之年朝無咨詢士失益友送車國門出泣引首子兹歸藏刻銘不朽太常博士尹君墓志銘并序歐陽修君諱源字子漸姓尹氏與其弟洙師魯俱有名於當世其論議文章博學強記皆有以過人而師魯好辨果於有為子漸為人剛簡不矜飾能自晦藏與人居久而莫知至其一有所發則人必驚伏其視世事若不干其意已而榷其情偽計其成敗後多如其言其性不能容常人而善與人交久而益篤自天聖明道之間豫與其兄弟交其得於子漸者如此其曽祖諱誼贈光祿少卿祖諱文化官至都官郎中贈刑部侍郎父諱仲宣官至虞部貟外郎贈工部郎中子漸初以祖廕補三班借職稍遷左班殿直天聖八年舉進士及第為奉禮郎纍遷太常博士厯知芮城河陽二縣簽署孟州判官事又知新鄭縣通判涇州慶州知懷州以慶厯五年三月十四日卒于官趙元昊寇邊圍定川堡大將葛懷敏發涇原兵救之君遺懷敏書曰賊舉其國而來其利不在城堡而兵法有不得而救者且吾軍畏法見敵必赴而不計利害此其所以數敗也宜駐兵瓦亭見利而後動懷敏不能用其言遂以敗死劉渙知滄州杖一卒不服渙命斬之以聞坐専殺降知密州君上書為渙論直得復知滄州范文正公常薦君材可以居館閣召試不用遂知懷州至期月大治是時天子用范文正公與今觀文殿學士富公武康軍節度使韓公欲更置天下事而權幸小人不便三公皆罷去而師魯與時賢士多被誣枉得罪君歎息憂悲發憤以謂生可厭而死可樂也往往被酒哀歌泣下朋友皆竊怪之已而以疾卒享年五十至和元年十有二月十三日其子材葬居于河南府壽安縣甘泉鄉龍澗里其平生所為文章六十篇皆行於世子男四人曰材植機桴嗚呼師魯常勞其智於事物而卒蹈憂患以窮死若子漸者曠然不有纍其心而無所屈其志然其壽考亦以不長豈其所謂短長得失者皆非此之謂歟其所以然者不可得而知歟銘曰有韞于中不以施一憤樂死其如歸豈其志之將衰不然世果可嫉其如斯江鄰幾墓志銘歐陽修君諱休復字鄰幾其為人外若簡曠而內行修飭不妄動於利欲其強學博覽無所不通而不以矜人至有問輒應雖好辨者不能窮也已則默若不能言者其為文章淳雅尤長於詩淡泊間逺往往造人之不至善𨽻書喜琴奕飲酒與人交久而益篤孝於宗族事孀姑如母天聖中與尹師魯蘇子美遊知名當時舉進士及第調藍山尉騎驢赴官每據鞍讀書至迷失道家人求得之乃覺厯信潞二州司法參軍又舉書判拔萃改大理寺丞知長葛縣事通判閴州以母喪去職服除知天長縣事遷殿中丞又以父憂終喪獻其所著書召試充集賢校理判尚書刑部當慶厯時小人不便大臣執政者欲纍以事去之君友蘇子美杜丞相壻也以祠神會飲得罪一時知名士皆被逐君坐落職監蔡州商稅久之知奉符縣事改太常博士通判睦州徙廬州復得集賢校理判吏部南曹登聞檢院為羣牧判官出知同州提點陜西路刑獄入判三司鹽鐵句院修起居注纍遷刑部郎中君於治人則曰為政所以安民也無擾之而已故所至民樂其簡易至辨疑折獄則或權以術舉無不得而不常用亦不自以為能也君所著書號唐宜鑒十五卷春秋世論三十卷文集二十卷又作神告一篇言皇嗣事以謂皇嗣國大事也臣子以為嫌而難言或言而不見納故假神告祖宗之意務為深切冀以感悟又嘗言昭憲太后杜氏子孫宜録用故翰林學士劉筠無後而官沒其資宜為立後還其資劉氏得不絶君之議論頗多凡與其遊者莫不稱其賢而在上位者久未之用也自其修起居注士大夫始相慶以為在上者知將用之矣而用君者亦方自以為得而君亡矣嗚呼豈非其命哉君以嘉祐五年四月乙亥以疾終于京師即以其年六月庚申葬于某所君享年五十有六方其亡恙時為理命數百言已而疾且革其子問所欲言曰吾已著之矣遂不復言曾祖諱濬殿中丞贈駕部員外郎妣李氏始平縣太君祖諱日新駕部貟外郎贈太僕少卿妣孫氏富陽縣太君考諱中古太常博士贈工部侍郎妣張氏仁壽縣太君夫人夏侯氏永安縣君金部郎中或之女先君數月卒子男三人長曰懋簡并州司户參軍次曰懋相太廟齋郎次曰懋迪女三人長適祕書丞錢衮餘尚幼君姓江氏開封陳留人也自漢轑陽侯德扂於陳留之圉城其後子孫分散而君世至今居圉城不去自高祖而上七世葬圉南夏岡由大王父而下三世乃葬陽夏銘曰彼馳而我後彼取而我不豈用力者好先而知命者不茍嗟吾鄰幾兮卒以不偶舉世之隨兮君子之守衆人所亡兮君子之有其失一世兮其存不朽惟其自以為得兮吾將誰咎蔡君山墓志銘歐陽修豫友蔡君謨之弟曰君山為開封府太康主簿時豫與君謨皆為館閣校勘居京師君山數往來其兄家見其以縣事決於其府府尹吳遵路素剛好以嚴憚下吏君山年少位卑能不懾屈而得盡其事之詳吳公獨喜以君山為能豫始知君山敏於為吏而未知其他也明年君謨南歸拜其親夏京師大疫君山以疾卒於縣其妻程氏一男二女皆幼縣之人哀其貧以錢二百千為其賻程氏泣曰吾家素以亷為吏不可以此汚吾夫拒而不受於是又知君山能以惠愛其縣人而以廉化其妻妾也君山間嘗語豫曰天子以六科策天下士而學者以記問應對為事非古取士之意也吾獨不然乃晝夜自苦為學及其亡也居謨發其遺藁得十數萬言皆當世之務其後踰年天子與大臣講天下利害為條目其所改更於君山之藁十得其五六於是又知君山果天下之竒才也君山景祐中舉進士初為長溪縣尉縣媪二子漁於海而亡媪指某氏為仇告縣捕賊縣吏難之皆曰海有風波豈知其不水死乎且雖果為仇所殺若尸不得則於法不可理君山獨曰媪色有寃吾不可不為理乃隂察仇家得其迹與媪約曰吾與汝宿海上期十日不得尸則為媪受捕賊之責凡宿七日海水潮二尸浮而至驗之皆殺也乃捕仇家伏法民有夫婦偕出而盜殺其守舍子者君山亟召里民畢會環坐而熟視之指一人曰此殺人者也訊之果伏衆莫知其以何術得也長溪人至今喜道君山事多如此曰前史所載能吏號如神明不過此也自天子與大臣條天下事而屢下舉吏之法尤欲官無小大必得其材方求天下能吏而君山死矣此可為痛惜者也君山諱高享年二十有八以某年某月某日卒今年君謨又歸迎其親自太康取其柩以歸將以某年某月某日葬於某所且謂豫曰吾兄弟始去其親而來京師欲以仕宦為親榮今幸還家吾弟獨以柩歸甚矣老者之愛其子也何以塞吾親之悲子能為我銘君山乎乃為之銘曰嗚呼吾聞仁義之行於天下也可使父不哭子老不哭少嗟夫君山不得其壽父母七十扶行送柩退之有言死孰謂夫子墓豫銘其傳不朽庶幾以此慰其父母太常博士曽公墓志銘王安石公諱易占字不疑姓曾氏建昌南豐人其世出有公之考贈諫議大夫致堯之碑大夫當太宗真宗世為名臣公少以廕補太廟齋郎為撫州宜黃臨川二縣尉舉三司法中進士第改鎮東節度推官還改武勝節度掌書記崇州軍事判官皆不往用舉者監真州裝卸米倉遷太子中允太常丞博士知泰州之如皋信州之玉山二縣知信州錢仙芝者有所丐於玉山公不與即誣公吏治之得所以誣公者仙芝則請出御史當是時仙芝蓋有所挾故雖坐誣公抵罪而公亦卒失博士歸不仕者十二年復如京師至南京病遂卒娶周氏吳氏最後朱氏封崇安縣君子男六人曄鞏牟宰布肇女九人公以端拱己丑生卒時慶厯丁亥也後卒之二年而葬其墓在南豐之先塋始公以文章有名及試於事又愈以有名臨川之治能不以威而使惡人之豪帥其黨數百人皆不復為惡在越州其守之合者倚公以治其不合者有所不可公輕正之莊獻太后用道士言作乾明觀匠數百人作數歲不成公語道士曰吾為汝成之為之捐其費太半役未幾而罷如皋歲大飢固請於州而越海以糴所活數萬人明年稍已熟州欲收租賦如常公獨不肯聽歲盡而泰之縣民有復亡者獨如皋為完既又作孔子廟諷縣人興于學玉山之政既除其大惡而至於橋梁廨驛無所不至蓋公之已試於事者能如此既仕不合即自放為文章十餘萬言而時議十卷尤行於世時議者懲已事憂來者不以一身之窮而遺天下之憂以為其志不見於事則欲發之於文其文不施於世則欲以傳於後後世有行吾言者而吾豈窮也哉蓋公之所為作之意也寶元中李元昊反契丹亦以兵近邉陽為欲棄約者天子獨憂之詔天下有能言者皆勿諱於是言者翕然論兵以進公獨以謂天下之安危顧吾自治不耳吾已自治敵人無可憂者不自治憂將在於近而敵人豈足道哉即上書言數事以為事不爾後當如此既而皆如其云公之遭誣人以為寃退而貧人為之憂也而公所為十餘萬言皆天下事古今之所以存亡治亂至其寃且困未嘗一以為言公沒而其家得其遺疏曰劉向有言讒邪之所以並進者由上多疑心用賢人而行善政如或譖之則賢人捨而善政還此可謂明白之論切於今者夫敵人動於外百姓窮於下臣以謂尚未足憂也臣之所謂可憂者特在分諸臣之忠邪而已其大略如此而其詳有人之難言者蓋公既病而為之未及上而終云嗚呼其尤可以見公之志也夫諫者貴言人之難言而傳者則有所不得言讀其略不失其詳後世其有不明者乎公之事親心意幾微輒逆得之好學不怠而不以求聞於世所見士大夫之喪葬二人逆一人之柩以歸又字其孤又一人者宰相舅嘗為贊善大夫死三十年猶殯殯壞公為增修又與宰相書責使葬之此公之行也蓋公之試於事者小而不盡其材而行之所加又近唯其文可以見公之所存而名後世故公之故人子王某取其尤可以銘後世者而為銘曰夫辨邪正之實去萬事之例而歸宰相之責合兵為農以立天下之本設學校奬名節以材天下之士正名分定考課通財幣以成制度之法古之所以治者不皆出於此乎而時議之言如此讀其書以求其志嗚呼公之志何如也司封員外郎祕閣校理丁君墓志銘王安石朝奉郎尚書司封員外郎充祕閣校理新差通判永州軍州兼管內勸農事上輕車都尉賜緋魚袋晉陵丁君卒王某曰噫吾僚也方吾少時輔我以仁義者乃發哭弔其孤祭焉而許以銘越三月君壻以狀至乃敘銘赴其葬敘曰君諱寶臣字元珍少與其兄宗臣皆以文行稱鄉里號為二丁景祐中皆以進士起家君為峽州軍事判官與廬陵歐陽公遊相好也又為淮南節度掌書記或誣富人以博州將貴人也猜而専吏莫敢議君獨力爭正其獄又為杭州觀察判官用舉者兼州學教授又用舉者遷太子中允知越州剡縣蓋其始至流大姓一人而縣遂治卒除弊興利甚衆人至今言之於是再遷為太常博士移知端州儂智高反攻至其治所君出戰能有所捕斬然卒不勝乃與其州人皆去避之坐免一官徙黃州會恩除太常丞監湖州酒又以大臣有解舉者遷博士就差知越州諸暨縣其治諸暨如剡越人滋以君為循吏也英宗即位以尚書屯田員外郎編校祕閣書籍遂為校理同知太常禮院君質直自守接上下以恕雖貧困未嘗言利於朋友故舊無所不盡故其不幸廢退則人莫不憐少進也則皆為之喜居無何御史論君嘗廢矣不當復用遂出通判永州世皆以咎言者謂為不宜夫驅未嘗教之卒臨不可守之城以戰虎狼百倍之賊議今之法則獨可守死爾論古之道也則有不去之以死有去之以生吏方操法以責士則君之流離窮困幾至老死尚以得罪於言者亦其理也君以治平三年待闕於常州於是冉遷尚書司封員外郎以四年四月四日卒年五十八有文集四十卷明年二月二十九日葬於武進縣懷德北鄉郭莊之原君曾祖諱輝祖諱諒皆弗仕考諱柬之贈尚書工部侍郎夫人饒氏封晉陵縣君前死子男隅太廟齋郎除隮為進士其季恩兒尚幼女嫁祕書省著作佐郎集賢校理同縣胡宗愈其季未嫁嫁胡氏者亦又死矣銘曰文於辭為達行於德為充道於古為可命於今為窮嗚呼已矣卜此新宫右領軍致仕王君墓志銘王安石君王氏諱乙字次公其望在太原而實家大名之元城不知其始所以徙曾祖諱安當周世宗時為閣門通事舍人祖諱廷溫開寶中泰寧軍節度副使考諱奉諲右班殿直贈左武衛大將軍君嘗舉進士不中因獻其所藏書祕閣而上書言先臣某逮事許王於先皇帝有一日之幸臣實其子天子下其問驗以為三班借職纍遷至內殿崇班閣門祗候淮南東路都巡檢使皇祐二年年七十三以右領軍衛將軍致仕卒於海州而以嘉祐二年葬真州之揚子縣某鄉某原以後夫人劉氏祔於是先夫人林氏既葬矣君強記博問剛毅而聰明好讀書雖老矣讀書未嘗少止於窮人賤士茍義所在樂與之為膠漆一欲以不直加我雖嚴貴人義終不為受也數上書言事皆中世病而用事者多不聽聽者兩言耳又事之小者然當時蒙其利言楚州可去堰為閘歲省卒一十一萬七千人錢一百三十萬米六萬八千石又言河隂可以茶鹽募入穀而漕之河北為十説以排三司之難三司不能絀其一此當時蒙其利者也宋興百年大定於太宗至真宗內外富矣內外自是遂務以無為養息天下朝廷所尚賢良進士而將相大臣之世用君方慨然懷古人趨赴功業之意欲起貧賤不勢左右而以其辨智當人主衆圓獨方用非其時卒以不合嗚呼甚可悲也然天下不肖多畏惡君以其伉直而幸其齟齬不得意以老獨賢者哀之耳君子越石秦州觀察判官其次子仁傑為進士女二人嫁進士林度陳州項城主簿宋造余嘗為君僚而與其子越石同年進士也銘其葬曰強能吾嬴吾與之為抗嬴者惴惴吾與之為讓卒嬴于強以窒于行維其心之亨以實其聲也廣西轉運使屯田員外郎蘇君墓志銘王安石慶厯五年河北都轉運使龍圖閣直學士信都歐陽修以言事切直為權貴人所怒因其孤甥女子有獄誣以姦利事天子使三司户部判官太常博士武功蘇君與中貴人雜治當是時權貴人連內外諸怨惡修者為惡言欲傾修鋭甚天下洶洶必修不能自脫蘇君卒白上曰修無罪言者誣之耳於是權貴人大怒誣君以不直絀使為殿中丞泰州監稅然天子遂寤言者不得意而修等皆無恙蘇君以此名聞天下嗟乎以忠為不忠而誅不當於有罪人主之大戒然古之陷此者相隨屬以有左右之讒而無如蘇君之救是以卒至於敗亡而不寤然則蘇君一動其功於天下豈小也哉蘇君既出遂權貴人更用事凡五年之間再赦而君六徙東西南北水陸奔走輒萬里其心恬然無有怨悔遇事強果未嘗少屈蓋孔子所謂剛者殆蘇君乎蘇君之仁與智又有足稱者嘗通判陜府當葛懷敏之敗邊告急樞密使使取道路戍還之卒再戍儀渭於是延州還者千人至陜聞再戍大恐即歡聚謀為變吏白閉城城中無一人敢出君徐以一騎出卒間諭慰止之而以便宜還使者戍卒喜曰微蘇君吾不得生陜人亦曰微蘇君吾其掠死矣有令刺陜西之民以為兵敢亡者死既而亡者得有司治之以死君輒縱去而言上曰令民以死者為事不集也事集矣亡者猶不赦恐其衆相率而為盜惟朝廷幸哀憐愚民使得自反天子以君言為然而三十州之亡者皆不死其後知坊州州稅賦之無歸者里正代為之輸歲幣大家數十君悉鈎治使歸其主坊人不憂為里正自蘇君始也蘇君諱安世字夢得其先武功人後徙蜀蜀亡歸家于京師今開封人也曾大考諱進之率府副率大考諱繼殿直考諱咸熙贈都官郎中君以進士起家三十二年其卒年五十九為廣西轉運使而官止於尚書屯田員外郎者以君十五年不求磨勘也君娶南陽郭氏又娶清河張氏為清河縣君子台文永州推官祥文大廟齋郎炳文試將作監主簿彥文未仕女子五人適進士會稽江嵩單州魚臺縣尉江山趙揚三人尚幼君既卒之三年嘉祐二年十月庚午其子葬君揚州之江都東興寧鄉馬坊村而太常博士知常州軍州事臨川王某為銘曰皇有四極周綏以福使維蘇君奠我南服亢亢蘇君不圜其方不晦其明君子之剛其枉在人我得吾直誰懟誰愠祗天之役日月有丘其下冥冥昭君無窮安石之銘節度推官陳君墓志銘王安石人之所難得乎天者聰明辨智敏給之材既得之矣能學問修為以自稱而不弊於無窮之欲此亦天之所難得乎人者也天能以人之所難得者與人人欲以天之所難得者徇天而天不少假以年則其得有不暇乎修為其為有不至乎成就此孔子所以歎夫未見其止而惜之者也陳君諱之元字某年二十七為武昌軍節度推官以卒自其為兒童強記捷見能不勞而超其長者少長慨然慕古人所為而又能學其文章既以進士起家則喜曰無事於詩賦矣以吾目力盡之於所好其庶乎吾可以成材於是悉橐其家書之官而蚤夜讀以思思而不得則又從其朋友講解至於達而後已其材與志如此使天少假以年則其成就當何如哉然無幾何得疾病遂至於不起嗟乎此亦所謂未見其止而可惜者也君某州之某縣人曾祖曰某祖曰某考曰某以嘉祐某年某月甲子其兄之方為之卜某州某縣某所之原以葬而臨川王某為銘曰浮揚清明升氣之鄉沈翳濁墨降形之宅其升逺矣其孰能追其降在此有銘昭之泰州海陵縣主簿許君墓志銘王安石君諱平字秉之姓許氏余嘗譜其世家所謂今泰州海陵縣主簿者也君既與兄元相友愛稱天下而自少卓犖不羈善辨説與其兄俱以智略為當世大人所器寶元時朝廷開方略之選以招天下異能之士而陜西大帥范文正公鄭文肅公爭以君所為書以薦於是得召試為太廟齋郎已而選泰州海陵縣主簿貴人多薦君有大才可試大事不宜棄之州縣君亦常慨然自許欲有所為然終不得一用其智能以卒噫其可哀也已士固有離世異俗獨行其意罵譏笑侮困辱而不悔彼皆無衆人之求而有所待於後世者也其齟齬固宜若夫智謀功名之士窺時俯仰以赴勢物之會而輒不遇者乃亦不可勝數辨足以移萬物而窮於用説之時謀足以奪三軍而辱於右武之國此又何説哉嗟乎彼有所待而不悔者其知之矣君年五十九以嘉祐某年某月某甲子葬真州之揚子縣甘露鄉某所之原夫人李氏子男瓌不仕璋真州司户參軍琦太廟齋郎琳進士女子五人已嫁二人進士周奉先泰州泰興縣令陶舜元銘曰有拔而起之莫擠而止之嗚呼許君而已於斯誰或使之文編卷六十一

body:
  text: 文編卷五明唐順之編賈誼陳政事疏漢書臣竊惟事藝可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難遍以疏舉進言者皆曰天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及然因謂之安方今之藝何以異此本末舛逆首尾衡决國制搶攘非甚有紀胡可謂治陛下何不一令臣得熟數之於前因陳治安之䇿試詳擇焉夫射獵之娛與安危之機孰急使為治勞智慮苦身體乏鐘鼓之樂勿為可也樂與今同而加之諸侯軌道兵革不動民保首領胸奴賔服四荒鄉風百姓素朴獄訟衰息大數既得則天下順治海內之氣清和咸理生為明帝沒為明神名譽之美垂于亡窮禮祖有功而宗有德使顧成之廟稱為太宗上配太祖與漢亡極建久安之藝成長治之業以承祖廟以奉六親至孝也以幸天下以育羣生至仁也立綱陳紀輕重同得後可以為萬世法程雖有愚幼不肖之嗣猶得䝉業而安至明也以陛下之明逹因使少知治體者得佐下風致此非難也其具可素陳於前願幸毋忽臣謹稽之天地驗之往古按之當今之務日夜念此至熟也雖使舜禹復生為陛下計亡以易此夫樹國固必相疑之藝下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過德澤有加焉猶尚如此况莫大諸侯權力且十此者乎然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上遍置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黃帝曰日中必􅡢操刀必割今令此道順而全安甚易不肯早為巳乃墮骨肉之屬而抗剄之豈有異秦之季世乎夫以天子之位乘今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣又知陛下有所必不能矣假設天下如曩時淮陰侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫髙為相盧綰王燕陳豨在代令此六七公皆亡恙當是時而陛下即天子位能自安乎臣有以知陛下之不能也天下淆亂髙皇帝與諸公併起非有仄室之藝以豫席之也諸公幸者乃為中㳙其次厪得舍人材之不逮至逺也髙皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣德至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自髙皇帝不能以是一嵗為安故臣知陛下之不能也然尚有可諉者曰疏臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治乎臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心慮亡不帝制而天子自為者擅爵人赦死罪甚者或戴黃屋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下之臣雖有悍如馮敬者適啓其口匕首已陷其胸矣陛下雖賢誰與領此故疏者必危親者必亂已然之效也其異姓負彊而動者漢已幸勝之矣又不易其所以然同姓襲是跡而動既有徵矣其藝盡又復然殃禍之變未知所移明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛而芒創不頓者所排擊剝割皆衆理解也至于髖髀之所非斤則斧夫仁義恩厚人主之芒創也權藝法制人主之斧斤也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刃臣以為不缺則折胡不用之淮南濟北藝不可也臣竊跡前事大抵彊者先反淮陰王楚最彊則最先反韓信倚胡則又反貫髙因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙乃在二萬五千户耳功少而最完藝疏而最忠非獨性異人也亦形藝然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知己欲諸王之皆忠附則莫若令如長沙王欲臣子之勿菹醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則無邪心令海內之藝如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻輳並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁他國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也所以數償之一寸之地一人之衆天子亡所利焉誠以定治而已故天下咸知陛下之廉地制一定宗室子孫莫慮不王下亡倍畔之心上亡誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫髙利幾之謀不生柴竒開章之計不萌細民鄉善大臣致順故天下咸知陛下之義卧赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖一動而五業附陛下誰憚而久不為此天下之藝方病大瘇一脛之大幾如要一指之大幾如股平居不可屈信一二指慉身慮亡聊失今不治必為錮疾後雖有扁鵲不能為已病非徒瘇也又苦􅏓盩元王之子帝之從弟也今之王者從弟之子也惠王親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以逼天子臣故曰非徒病瘇也又苦􅏓盩可為痛哭者此病是也天下之藝方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今胸奴嫚娒侵掠至不敬也為天下患至亡已也而漢嵗致金絮采繒以奉之夷狄徵令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶為國有人乎非亶倒縣而已又類辟且病痱夫辟者一面病痱者一方痛今西邊北邊之郡雖有長爵不輕得復五尺以上不輕得息斥候望烽燧不得卧將吏被介胄而睡臣故曰一方病矣醫能治之而上不使可為流涕者此也陛下何忍以帝王之號為戎人諸侯藝既卑辱而禍不息長此安窮進謀者率以為是固不可解也亡具甚矣臣竊料胸奴之衆不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主胸奴行臣之計請必繫單于之頸而制其命伏中行說而笞其背舉胸奴之衆唯上之令今不獵猛敵而獵田彘不搏反寇而搏畜菟玩細娛而不圖大患非所以為安也德可逺施威可逺加而直數百里外威令不信可為流涕者此也今民賣僮者為之繡衣絲履偏諸緣內之間中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皂綈而富民牆屋被文繡天子之后以緣其領庶人㜸妾緣其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡為奸邪不可得也國已屈矣盜賊直須時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡等也至冒上也進計者猶曰毋為可為長太息者此也商君遺禮義棄仁恩并心於進取行之二嵗秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有德色母取箕帚立而誶語抱哺其子與公併倨婦姑不相說則反唇而相稽其慈子耆利不同禽獸者亡幾耳然并心而赴時猶曰蹶六國兼天下功成求得矣終不知反廉愧之節仁義之厚信并兼之法遂進取之業天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海內德從天下曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮義捐廉恥日甚可謂月異而嵗不同矣逐利不耳慮非顧行也今其甚者殺父兄矣盜者剟寢户之簾搴兩廟之器白晝大都之中剽吏而奪之金矯僞者出幾十萬石粟賦六百餘萬錢乘傳而行郡國此其亡行義之尤至者也而大臣特以簿書不報期會之間以為大故至于俗流失世壞敗因恬而不知怪慮不動於耳目以為是適然耳夫移風易俗使天下回心而向道類非俗吏之所能為也俗吏之所務在于刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞管子曰禮義廉恥是為四維四維不張國乃滅亡使管子愚人也則可管子而少知治體則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姧人並起萬民離叛凡十三嵗而社稷為虛今四維猶未備也故姧人幾幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姧人亡所幾幸而羣臣衆信上不疑惑此業一定世世常安而後有所持循矣若夫經制不定是猶渡江河亡維楫中流而遇風波船必覆矣可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相逺也何三代之君有道之長而秦亡道之暴也其故可知也古之王者太子乃生固舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教固巳行矣昔者成王幼在襁抱之中召公為太保周公為太傅太公為太師保保其身體傅傅之德義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故乃孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行于是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所耆必先受業乃得嘗之擇其所樂必先有習乃得為之孔子曰少成若天性習貫如自然及太子少長知妃色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不踰矣帝入太學承師問道退習而考於太傅太傅罰其不則而匡其不及則德智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦詩工誦針諫大夫進謀士傳民語習與智長故切而不愧化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和步中采齊趣中肆夏所以明有度也其於禽獸見其生不忍其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罰也使趙髙傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以導之者非其理故也鄙諺曰不習為吏視已成事又曰前車覆後車誡夫三代之所以長久者其巳事可知也然而不能從者是不法聖智也秦世之所以亟絶者其轍跡可知也然而不避是後車又將覆也夫存亡之變治亂之機其要在是矣天下之命縣于太子太子之善在于早諭教與選左右夫心未濫而先諭教則化易成也開于道術智誼之指則教之力也若其服習積貫則左右而已夫胡粵之人生而同聲耆欲不異及其長而成俗纍數譯而不能相通行者有雖死而不相為者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也凡人之智能見已然不能見將然夫禮者禁于將然之前而法者禁於已然之後是故法之所用易見而禮之所為至難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公亡私如天地耳豈顧不用哉然而曰禮云禮云者貴絶惡於未萌而起教於微眇使民日遷善逺罪而不自知也孔子曰聽訟吾猶人也必也使無訟乎為人主計者莫如先審取舍取舍之極定於內而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以德教或驅之以法令道之以德教者德教洽而民氣樂驅之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百嵗而弗失秦王治天下十餘嵗則大敗此亡他故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而德澤洽禽獸草木廣裕德被蠻貊四夷纍子孫數十世此天下所共聞也秦王置天下於法令刑罰德澤亡一有而怨毒盈于世下憎惡之如仇讐禍幾及身子孫誅絶此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庶如地故陛九級上廉逺地則堂髙陛亡級廉近地則堂卑髙者難攀卑者易陵理藝然也故古者聖主制為等列內有公卿大夫士外有公侯伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器况於貴臣之近主乎廉恥節禮以治君子故有賜死而亡戮辱是以黥劓之罪不及大夫以其離主上不逺也禮不敢齒君之路馬蹴其芻者有罰見君之几杖則起遭君之乘車則下入正門則趨君之寵臣雖或有過刑戮之罪不加其身者尊君之故也此所以為主上豫逺不敬也所以體貌大臣而厲其節也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而命與衆庶同黥劓髠刖笞傌弃市之法然則堂不亡陛乎被戮辱者不太迫乎廉恥不行大臣無乃握重權大官而有徒𨽻亡恥之心乎夫望夷之事二世見當以重法者投鼠而不忌器之習也臣聞之履雖鮮不加于枕冠雖敝不以苴履夫嘗已在貴寵之位天子改容而禮貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之繫紲之輸之司寇編之徒官司寇小吏詈罵而榜笞之殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庶之所嘗寵死而死耳賤人安得如此而頓辱之哉豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁面吞炭必報襄子五起而不中人問豫子豫子曰中行衆人畜我我故衆人事之智伯國士遇我我故國士報之故此一豫讓也反君事讐行若狗彘已而抗節致忠行出乎烈士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓亡恥詬亡節廉恥不立且不自好茍若而可故見利則逝見便則奪主上有敗則因而挻之矣主上有患則吾茍免而已立而觀之耳有便吾身者則欺賣而利之耳人主將何便於此羣下至衆而主上至少也所託財器職業者粹于羣下也俱亡恥俱茍安則主上最病故古者禮不及庶人刑不至大夫所以厲寵臣之節也古者大臣有坐不廉而廢者不謂不廉曰簠簋不飭坐汙穢淫亂男女亡别者不曰汙穢曰帷簿不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥然正以呼之也尚遷就而為之諱也故其在大譴大呵之域者聞譴呵則白冠氂纓盤水加劍造請室而請罪耳上不執縛繫引而行也其有中罪者聞命而自弛上不使人頸盩而加也其有大罪者聞命則北面再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故羣臣自喜嬰以廉恥故人矜節行上設廉恥禮義以遇其臣而臣不以節行報其君者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不茍就害不茍去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守國扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存彼將為我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉恥行禮誼之所致也主上何喪焉此之不為而顧彼之久行故曰可為長太息者此也賈誼請封建子弟疏漢書陛下即不定制如今之藝不過一傳再傳諸侯猶且人恣而不制豪植而太彊漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳代北邊胸奴與强敵為鄰能自完則足矣而淮陽之比大諸侯厪如黑子之著面適足以餌大國耳不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉人主之行異布衣布衣者飾小行競小廉以自託于鄉黨人主唯天下安社稷固不耳髙皇帝瓜分天下以王功臣反者蝟毛而起以為不可故蔪去不義諸侯而虛其國擇良日立諸子雒陽上東門之外畢以為王而天下安故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯而縣屬于漢其吏民徭役往來長安者自悉而補中道衣敝錢用諸費稱此其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其藝不可久臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起于新郪以北著之河淮陽包陳以南揵之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下髙枕終亡山東之憂矣此二世之利也當今恬然適遇諸侯之皆少數嵗之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頤指如意髙拱以成六國之禍難以言智茍身亡事畜亂宿禍熟視而不定萬年之後傳之老母弱子將使不寧不可謂仁臣聞聖主言問其臣而不自造事故使人臣得畢其愚忠唯陛下財幸賈誼論積貯疏漢書管子曰倉廪實而知禮節民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之亡度則物力必屈古之治天下至纎至悉也故其畜積足恃今背本而趨末食者甚衆是天下之大殘也淫侈之俗日日以長是天下之大賊也殘賊公行莫之或止大命將泛莫之振救生之者甚少而靡之者甚多天下財産何得不蹶漢之為漢幾四十年矣公私之積猶可哀痛失時不雨民且狼顧嵗惡不入請賣爵子既聞耳矣安有為天下阽危者若是而上不驚者世之有飢穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十百萬之衆國胡以餽之兵旱相乘天下大屈有勇力者聚徒而衡擊罷夫羸老易子而咬其骨政治未畢通也逺方之能疑者並舉而爭起矣乃駭而圖之豈將有及乎夫積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附逺何招而不至今驅民而歸之農皆著于本使天下各食其力末技游食之民轉而緣南畝則畜積足而人樂其所矣可以為富安天下而直為此廪廪也竊為陛下惜之劉向論甘延夀等疏漢書郅支單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉陛下赫然欲誅之意未嘗有忘西域都護延壽副校尉湯承聖指倚神霛總百蠻之君攬城郭之兵出百死入絶域遂蹈康居屠五重城搴歙侯之旗斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之恥立昭明之功萬夷懾伏莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義稽首來賔願守北藩纍世稱臣立千載之功建萬世之安羣臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰燀燀焞焞如霆如靁顯允方叔征伐獫狁蠻荆來威易曰有嘉折首獲匪其醜言美誅首惡之人而諸不順者皆來從也今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜既多受祉來歸自鎬我行永久千里之鎬猶以為逺况萬里之外其勤至矣延壽湯既未獲受祉之報反屈捐命之功久挫於刀筆之前非所以勸有功厲戎士也昔齊桓公前有尊周之功後有滅項之罪君子以功覆過而為之諱行事二師將軍李廣利捐五萬之師靡億萬之費經四年之勞而厪獲駿馬三十匹雖斬宛王母鼓之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩侯三卿二千石百有餘人今康居國彊於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費斗糧比於二師功德百之且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓二師近事之功則髙於安逺長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功谷永上救陳湯疏漢書臣聞楚有子玉得臣文公為之側席而坐趙有廉頗馬服彊秦不敢窺兵井陘近漢有郅都魏尚胸奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也蓋君子聞鼓鼙之聲則思將率之臣竊見關內侯陳湯前使副西域都護忿郅支之亡道閔王誅之不加策慮愊億義勇奮發卒興師奔逝橫厲烏孫踰集都賴屠三重城斬郅支首報十年之逋誅雪邊吏之宿恥威震百蠻武暢四海漢元以來征伐方外之將未嘗有也今湯坐言事非是幽囚久繫歷時不决執憲之吏欲致之大辟昔白起為秦將南拔郢都北坑趙括以纎介之過賜死杜郵秦民憐之莫不隕涕今湯親秉鉞席卷蹀血萬里之外薦功祖廟告類上帝介胄之士靡不慕義以言事為罪亡赫赫之惡周書曰記人之功忘人之過宜為君者也夫犬馬有勞于人尚加帷蓋之報况國之功臣者哉竊恐陛下忽於鼓鼙之聲不察周書之意而忘帷蓋之施庸臣遇湯卒從吏議使百姓介然有秦民之恨非所以厲死難之臣也杜欽訟馮奉世疏漢書日前莎車王殺漢使者約諸國背畔左將軍奉世以衛侯便宜發兵誅莎車王策定城郭功施邊境議者以奉世奉使有指春秋之義亡遂事漢家之法有矯制故不得侯今胸奴郅支單于殺漢使者亡保康居都護延壽發城郭兵屯田吏士四萬餘人以誅斬之封為列侯臣愚以為比罪則郅支薄量敵則莎車衆用師則奉世寡計勝則奉世為功於邊境安慮敗則延壽為禍於國家深其違命而擅生事同延壽割地封而奉世獨不録臣聞功同賞異則勞臣疑罪鈞刑殊則百姓惑疑生亡常惑生不知所從亡常則節趨不立不知所從則百姓亡所措手足奉世圖難忘死信命殊俗威功白著為世使表獨抑厭而不揚非聖主所以塞疑厲節之意也願下有司議劉向論起昌陵疏漢書臣聞易曰安不忘危存不忘亡是以身安而國家可保也故聖賢之君博觀終始窮極事情而是非分明王者必通三統明天命所授者博非獨一姓也孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳於子孫是以富貴亡常不如是則王公其何以戒慎民萌何以勸勉蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔髙皇帝既滅秦將都雒陽感悟劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效故常戰栗不敢諱亡孔子所謂富貴亡常蓋謂此也孝文皇帝居霸陵北臨厠意悽愴悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斫陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖亡石椁又何戚焉夫死者亡終極而國家有廢興故釋之之言為亡窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪臧之中野不封不樹後世聖人易之以棺椁棺椁之作自黃帝始黃帝葬于橋山堯葬濟陰丘壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢秦穆公葬于雍槖泉宫祈年館下樗里子葬于武庫皆無丘壠之處此聖帝明王賢君智士逺覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳曰丘東西南北之人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死葬於嬴博之間穿不及泉斂以時服封墳掩坎其髙可隱而號曰骨肉歸復於土命也魂氣則亡不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非茍為儉誠便於體也宋桓司馬為石椁仲尼曰不如速朽秦相吕不韋集知略之士而造春秋亦言薄葬之義皆明於事者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王皆大作丘壠多其瘞藏咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳其髙五十餘丈周回五里有餘石椁為游館人膏為燈燭水銀為江海黃金為鳬雁珍寶之藏機械之變棺椁之麗宫館之盛不可勝原又多殺宫人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宫室營宇往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其藏椁自古及今葬未有盛如始皇者也數年之間外被項籍之災內罹牧竪之禍豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微亡德寡知其葬愈厚丘壠彌髙宫廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之斯干之詩是也上章道宫室之如制下章言子孫之衆多也及魯嚴公刻飾宗廟多築臺囿後嗣再絶春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制絶小天下莫不稱賢明及徙昌陵增埤為髙積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘死者恨於下生者愁於上怨氣感動陰陽因之以飢饉物故流離以十萬數臣甚惛焉以死者為有知發人之墓其害多矣若其亡知又安用大謀之賢知則不說以示衆庶則苦之若茍以說愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聰明疏逹蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方丘壟說愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚臧以侈生害足以為戒初陵之撫宜從公卿大臣之議以息衆庶谷永論梁王淫亂疏漢書臣聞禮天子外屏不欲見外也是故帝王之意不窺人閨門之私聽聞中冓之言春秋為親者諱詩云戚戚兄弟莫逺具爾今梁王年少頗有狂病始以惡言按驗既亡事實而發閨門之私非本章所指王辭又不服猥强劾力傳致難明之事獨以偏辭成罪斷獄亡益於治道汚衊宗室以內亂之惡披布宣揚於天下非所以為公族隱諱增朝廷之榮華昭聖德之風化臣愚以為王少而父同産長年齒不倫梁國之富足以厚聘美女招致妖麗父同産亦有恥辱之心案事者乃驗問惡言何故猥自發舒以三者揆之殆非人情疑有所迫切過誤失言而文吏躡尋不得轉移萌芽之時加恩勿治上也既已案驗舉憲宜及王辭不服詔廷尉選上德通理之吏更審考清問著不然之效定失誤之法而反命于下吏以廣公族附疏之德為宗室刷汙亂之恥甚得治親之誼王嘉薦公孫光等疏漢書臣聞聖王之功在於得人孔子曰才難不其然乎故繼世立諸侯象賢也雖不能盡賢天子為擇臣立命卿以輔之居是國也纍世尊重然後士民之衆附焉是以教化行而治功立今之郡守重于古諸侯往者致選賢材賢材難得拔擢可用者或起於囚徒昔魏尚坐事繫獄文帝感馮唐之言遣使持節赦其罪拜為雲中太守胸奴忌之武帝擢韓安國於徒中拜為梁內史骨肉以安張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家訟寃使者覆獄劾敞賊殺人上逮捕不下會免亡命數十日宣帝徵敞拜為冀州刺史卒獲其用前世非私此三人貪其材器有益於公家也孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有茍且之意其後稍稍變易公卿以下傅相促急又數改更政事司隸部刺史察過悉劾發揚陰私吏或居官數月而退送故迎新交錯道路中材茍容求全下材懷危內顧一切營私者多二千石益輕賤吏民慢易之或持其微過增加成罪言於刺史司隸或至上書章下衆庶知其易危小失意則有離畔之心前山陽亡徒蘇令等從橫吏士臨難莫肻伏節死義以守相威權素奪也孝成皇帝悔之下詔書二千石不為縱遣使者賜金慰厚其意誠以為國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其良民吏有章劾事留中會赦一解故事尚書希下章為煩擾百姓證驗繫治或死獄中章文必有敢告之字乃下惟陛下留神於擇賢記善忘過容忍臣子勿責以備二千石部刺史三輔縣令有材任職者人情不能不有過差宜可濶略令盡力者有所勸此方今急務國家之利也前蘇令發欲遣大夫使逐問狀時見大夫亡可使者召盩厔令尹逢拜為諫大夫遣之今諸大夫有材能者甚少宜豫畜養可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也嘉因薦儒者公孫光滿昌及能吏蕭咸薛修等皆故二千石有名稱天子納而用之論選皇子疏歐陽修臣聞言天下之難言者不敢冀必然之聽知未必聽而不可不言者所以盡為忠之心况臣遭遇聖明容納諫諍言之未必不聽其可默而不言臣伏見自去嵗以來羣臣多言皇嗣之事臣亦嘗因災異竊有奏陳雖聖度包容不加誅戮而愚誠懇至天聽未回臣實不勝愛君之心日夜區區未嘗忘此思欲再陳狂瞽而未知所以為言今者伏見兖國公主近已出降臣因竊思人之常道莫親於父子之親人之常情亦莫樂於父子之樂雖在聖哲異於凡倫其為天性於理則一陛下嚮雖未有皇嗣而尚有公主之愛上慰聖顔今既出降漸踈左右則陛下萬幾之暇處深宫之中誰可與語言誰可承顔色臣愚以謂宜因此時出自聖意於宗室之中選材賢可喜者録以為皇子使其出入左右問安侍膳亦足以慰恱聖情臣考於書史竊見自古帝王雖曰至尊未嘗獨處也其出而居外也不止百司公見奏事而已必有儒臣學士講論於閒宴又有左右侍從顧問語言其入而居內也不止宦官宫妾在於左右而已其平居燕寢也則有太子問安侍膳於朝夕其優游宴樂也多與宗室子弟歡然相接如家人計其一日之中未嘗一時獨處也今陛下日御前後殿百司奏事者往往仰瞻天顔而退其甚幸者得承一二言之德音君臣之情不通上下之意不接其餘在廷之臣儒學侍從之列未聞一人從容親近於左右入而居內則至於問安侍膳亦闕於朝夕是則陛下富有四海之廣躬享萬乘之尊居外則亡一人可親居內則亡一人得親此臣所以區區欲言也况陛下荷祖宗之業承宗廟社稷之重皇子未降儲位久虛羣臣屢言大議未决臣前所奏陳以謂未必立為儲二而且養為子既可以徐察其賢否亦可以待皇子之降生于今為之亦其時也臣言狂計愚伏俟斧鉞臣昧死再拜文編卷五

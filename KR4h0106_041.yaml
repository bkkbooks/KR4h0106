body:
  text: 文編巻四十一明唐順之編審勢蘇洵治天下者定所尚所尚一定至於萬千年而不變使民之耳目統於一而子孫有所守易以為治故三代聖人其後世遠者至七八百年夫豈惟其民之不忘其功以至於是葢其子孫得其祖宗之法而為據依可以永久今者天下幸方治安子孫萬世帝王之計不可不預定於此時然萬世帝王之計常先定所尚使其子孫可以安坐而守其舊至於政弊然後變其小節而其大體卒不可革易故享世長遠而民不茍簡今也考之於朝野之間以觀國家之所尚者而愚猶有惑也何則天下之勢有彊弱聖人審其勢而應之以權勢彊矣彊甚而不已則折勢弱矣弱甚而不已則屈聖人權之而使其甚不至於折與屈者威與惠也然而不知彊弱之勢者有殺人之威而下不懼有生人之惠而下不喜何者威竭而惠䙝故也故有天下者必先審知天下之勢而後可與言用威惠不先審知其勢而徒曰我能用威我能用惠者未也故有彊而益之以威弱而益之以惠以至於折與屈者是可悼也譬之人身將欲飲藥餌石以養其生必先審觀其性之為隂其性之為陽而投之以藥石藥石之陽而投之隂藥石之隂而投之陽故隂不至於涸而陽不至於亢昔者周有天下諸侯太盛當其盛時大者已有地五百里而畿内反不過千里其勢為弱秦有天下散為郡縣聚為京師守令無大權柄伸縮進退無不在我其勢為彊然方其成康在上諸侯無小大莫不臣伏弱之勢未見於外及其後世失徳而諸侯禽奔獸遁各固其國以相侵攘而其上之人卒不悟區區守姑息之道而望其能以制服彊國是謂以弱政濟弱勢故周之天下卒斃於弱秦自孝公其勢固已駸駸焉日趨於彊大及其子孫已并天下而亦不悟專任法制以斬撻平民是謂以彊政濟彊勢故秦之天下卒斃於彊周拘於惠而不知權秦勇於威而不知本二者皆不審天下之勢也吾宋制治有縣令有郡守有轉運使以大系小絲牽繩聯總合於上雖其地在萬里外方數千里擁兵百萬而天子一呼於殿陛間三尺豎子馳傳捧詔召而歸之京師則解印趨走惟恐不及如此之勢秦之所恃以彊之勢也勢彊矣然天下之病常病於弱噫有可彊之勢如秦而反陷於弱者何也習於惠而怯於威也惠太甚而威不勝也夫其所以習於惠而惠太甚者賞數而加於無功也怯於威而威不勝者刑弛而兵不振也由賞與刑與兵之不得其道是以有弱之實著於外焉何謂弱之實曰官吏曠惰職廢不舉而敗官之罰不加嚴也多贖數赦不問有罪而典刑之禁不能行也冗兵驕狂負力幸賞而維持姑息之恩不敢節也將帥覆軍匹馬不返而敗軍之責不加重也羌夷彊盛凌壓中國而邀金繒增幣帛之耻不為怒也若此類者太弱之實也久而不治則又將有大於此而遂浸微浸消釋然而潰以至於不可救止者乘之矣然愚以為弱在於政不在於勢是謂以弱政敗彊勢今夫一輿薪之火衆人之所憚而不敢犯者也舉而投之河則何熱之能為是以負彊秦之勢而溺於弱周之弊而天下不知其彊焉者以此也雖然政之弱非若勢弱之難治也借如弱周之勢必變易其諸侯而後彊可能也天下之諸侯固未易變易此又非一日之故也若夫弱政則用威而已矣可以朝改而夕定也夫齊古之弱國也而威王又齊之賢王也當其即位委政不治諸侯並侵而人不知其國之為彊國也一旦發怒裂萬家封即墨大夫召烹阿大夫與常譽阿大夫者而發兵擊趙魏衛趙魏衛盡走請和而齊國人人震懼不敢飾非者彼誠知其政之弱而能用其威以濟其弱也况今以天子之尊藉郡縣之勢言脱於口而四方響應其所以用威之資固巳完具且有天下者患不為焉有為而不可者今誠能一留意於用威不牽衆人之是非用不測之刑用不測之賞而使天下之人視之如風雨雷電遽然而至截然而下不知其所從發而不可迯遁朝廷如此然後平民益務儉慎而奸民猾吏亦常恐恐然懼刑法之及其身而歛其手足不敢輒犯法此之謂彊政政彊矣為之數年而天下之勢可以復彊或曰當今之事勢誠無便於尚威者然孰知夫萬世之間其政之不變而必曰威耶愚應之曰威者君之所恃以為君也一日而無威是無君也久而政弊變其小節而參之以惠使不至若秦之甚可也舉而棄之過矣或者又曰王者任徳不任刑任刑霸者之事也非所宜言此又非所謂知理者也夫湯武皆王也桓文皆霸也武王乘紂之暴出民於炮烙斬刖之地茍又遂多殺人多刑人以為治則民之心去矣故其治一出於禮義彼湯則不然桀之惡固無以異紂然其刑不若紂暴之甚也而天下之民化其風淫惰不事法度書曰有衆率怠弗協而又諸侯昆吾氏首為亂於是誅鋤其彊梗怠惰不法之人以定紛亂故記曰啇人先罰而後賞至於桓文之事則又非皆任刑也桓公用管仲管仲之書好言刑故桓公之治常任刑文公長者其佐狐趙先魏皆不説以刑法其治亦未甞以刑為本而號亦為霸而謂湯非王而文非霸也得乎故用刑不必霸而用徳不必王各觀其勢之何所宜用而已䇿畧一蘇軾臣聞天下治亂皆有常勢是以天下雖亂而聖人以為無難者其應之有術也水旱盜賊人民流離是安之而已也亂臣割據四分五裂是伐之而已也權臣專制擅作威福是誅之而已也四夷交侵邊鄙不寧是攘之而已也凡此數者其於害民蠧國為不少矣然其所以為害者有狀是故其所以救之者有方也天下之患莫大於不知其然而然不知其然而然者是拱手而待亂也國家無大兵革㡬百年矣天下有治平之名而無治平之實有可憂之勢而無可憂之形此其有未測者也方今天下非有水旱盜賊人民流離之禍而咨嗟怨憤常若不安其生非有亂臣割據四分五裂之憂而休養生息常若不足於用非有權臣專制擅作威福之弊而上下不交君臣不親非有四夷交侵邊鄙不寧之災而中國皇皇常有外憂此臣所以大惑也今夫醫之治病察脉觀色聴其聲音而知病之所由起曰此寒也此熱也或曰此寒熱之相搏也及其它無不可為者今且有人恍然而不樂問其所苦且不能自言則其受病有深而不可測者矣其言語飲食起居動作固無以異於常人此庸醫之所以為無足憂而扁鵲倉公之所以望而驚也其病之所由起者深則其所以治之者固非鹵莽因循茍且之所能去也而天下之士方且掇拾三代之遺文補葺漢唐之故事以為區區之論可以濟世不已疎乎方今之勢茍不能滌蕩振刷而卓然有所立未見其可也臣甞觀西漢之衰其君皆非有暴横淫虐之行特以怠惰弛廢溺於宴安畏期月之勞而忘千載之患是以日趨於亡而不自知也夫君者天也天之所以剛健而不屈者以其動而不息也惟其動而不息是以萬物雜然各得其職而不亂其光為日月其文為星辰其威為雷霆其澤為雨露皆生於動者也使天而不知動則其塊然者將腐懐而不能自持况能以御萬物哉茍天子一日赫然奮其剛明之威使天下明知人主欲有所立則智者願效其謀勇者樂致其死縱横顛倒無所施而不可茍人主不先自㫁於中羣臣雖有伊吕稷契無如之何故臣特以人主自㫁而欲有所立為先而後論所以為立之要云䇿畧二蘇軾天下無事久矣以天子之仁聖其欲有所立以為子孫萬世之計至切也特以為發而不中節則天下或受其病當宁而太息者幾年於此矣葢自近嵗始柄用二三大臣而天下皆洗心滌慮以聽朝廷之所為然而數年之間卒未有以大慰天下之望此其故何也二邊之大憂未去而天下之治終不可為也聞之師曰應敵不暇不可以自完自完不暇不可以有所立自古創業之君皆有敵國相持之憂命將出師兵交於外而中不失其所以為國者故其兵可敗而其國不可動其力可屈而其氣不可奪今天下一家二邊且未動也而吾君吾相終日皇皇焉應接之不暇亦竊為執事者不取也昔者大臣之議不為長久之計而為最下之䇿是以嵗出金繒數十百萬以資彊敵此其既往之咎不可追之悔也而議者方將深罪當時之失而不求後日之計亦無益矣臣雖不肖竊論當今之弊葢古之為國者不患有所費而患費之無名不患費之無名而患事之不立今一嵗而費千萬是千萬而已事之不立四海且不可保而奚千萬之足云哉今者二邊不折一矢不遺一鏃走一介之使馳數乘之傳所過騷然居人為之不寜大抵皆有非常之辭無厭之求難塞之請以觀吾之所答於是朝廷洶然大臣會議既而去未數月邊陲且復告至矣由此觀之二邊之使未絶則中國未知息肩之所而况能有所立哉臣故曰二邊之大憂未去則天下之治終不可為也中書者王政之所由出天子之所與宰相論道經邦而不知其它者也非至逸無以待天下之勞非至静無以制天下之動是故古之聖人雖有大兵役大興作百官奔走各執其職而中書之務不至於紛紜今者曾不得嵗月之暇則夫禮樂刑政教化之原所以使天下回心而嚮道者何時而議也千金之家久而不治使販夫豎子皆得執劵以誅其所負茍一朝發憤傾囷倒廪以償之然後更為之計則一簮之資亦足以富何遽至於皇皇哉臣嘗讀呉越世家觀勾踐困于會稽之上而行成於呉凡金玉女子所以為賂者不可勝計既反國而呉之百役無不從者使大夫女女于大夫士女女於士春秋貢獻不絶於呉府嘗竊怪其以蠻夷之國承敗亡之後救死扶傷之餘而賂遺費耗不可勝計如此然卒以滅呉則為國之患果不在費也彼其内外不相擾是以能有所立使范蠡大夫種二人分國而制之范蠡曰四封之外種不如蠡使蠡主之凡四封之外所以待呉者種不知也四封之内蠡不如種使種主之凡四封之内所以彊國富民者蠡不知也二人者各專其能各致其力是以不勞而滅呉其所以賄遺於呉者甚厚而有節也是以財不匱其所以聽役於呉者甚勞而有時也是以本不揺然後勾踐得以安意肆志焉而呉國固在其指掌中矣今以天下之大而中書常有蠻夷之憂宜其内治有不辦者故臣以為治天下不若清中書之務中書之務清則天下之事不足辦也今夫天下之財舉歸之司農天下之獄舉歸之廷尉天下之兵舉歸之樞密而宰相特持其大綱聽其治要而責成焉耳夫此三者豈少於蠻夷哉誠以為不足以累中書也今之所以待二邊者失在於過重古者有行人之官掌四方賓客之政當周之盛時諸侯四朝蠻夷荒服莫不來享故行人之官治其登降揖讓之節牲芻委積之數而巳至於周衰諸侯争彊而行人之職為難且重春秋時秦聘於晉叔向命召行人子員子朱曰朱也當御叔向曰秦晉不和久矣今日之事幸而集秦晉頼之不集三軍暴骨其後楚伍員奔呉為呉行人以謀楚而卒以入郢西劉之興有典屬國故賈誼曰陛下試以臣為屬國請必係單于之頸而制其命伏中行説而笞其背舉匈奴之衆惟上所令今若依倣行人屬國特建一官重任而後責之使宰相於兩制之中舉其可用者而勿奪其權使大司農以每嵗所以餽於二邊者限其常數而豫為之備其餘者朝廷不與知也凡吾所以遣使於敵與吾所以館其使者皆得以自擇而其非常之辭無厭之求難塞之請亦得以自答使其議不及於朝廷而其閒暇則収羅天下之俊才治其戰攻守禦之䇿兼聽博採以周知敵國之虚實凡事之闗於境外者皆以付之如此則天子與宰相特因其能否而定其黜陟其實不亦甚簡歟今自宰相以下百官汎汎焉莫任其責今舉一人而授之使日夜思所以待二邊宜無不濟者然後得以安居静慮求天下之大計唯所欲為將無不可者䇿畧三蘇軾臣聞聖王之治天下使天下之事各當其處而不相争天下之人各安其分而不相躐然後天子得優㳺無為而制其上今也不然夷狄抗衡本非中國之大患而每以累朝廷是以徘徊擾攘卒不能有所立今委任而責成使西北不過為未誅之冦則中國固吾之中國而安有不可為哉於此之時臣知天下之不足治也請言當今之勢夫天下有二患有立法之弊有任人之失二者疑似而難明此天下之所以亂也當立法之弊也其君必曰吾用某也而天下不治是某不可用也又從而易之不知法之弊而移咎於其人及其用人之失也又從而尤其法法之變未有已也如此則雖至於覆敗死亡相繼而不悟豈足怪哉昔者漢興因秦以為治刑法峻急禮義消亡天下蕩然恐後世無所執守故賈誼董仲舒咨嗟歎息以立法更制為事後世見二子之論以為聖人治天下凡皆如此是以腐儒小生皆欲妄有所變改以惑世主臣竊以為當今之患雖法令有所未安而天下之所以不大治者失在於任人而非法制之罪也國家法令凡幾變矣天下之不大治其咎果安在哉曩者大臣之議患天下之士其進不以道而取之不精也故為之法曰中年而舉取舊數之半而復明經之科患天下之吏無功而遷取高位而不讓也故為之法曰當遷者有司以聞而自陳者為有罪此二者其名甚美而其實非大有益也而議者欲以此等致天下之大治臣竊以為過矣夫法之於人猶五聲六律之於樂也法之不能無姦猶五聲六律之不能無淫樂也先王知其然故存其大畧而付之於人茍不至於害民而不可彊去也皆不變也故曰失在任人而巳夫有人而不用與用而不行其言行其言而不盡其心其失一也古之興王二人而已湯以伊尹武王以太公皆捐天下以與之而後伊吕得捐其一身以經營天下君不疑其臣功成而無後患是以知無不言言無不行其所欲用雖其親愛可也其所欲誅雖其讐隙可也使其心無所顧忌故能盡其才而責其成功及至後世之君始用區區之小數以繩天下之豪俊故雖有國士而莫為之用夫賢人君子之欲有所樹立以著不朽於後世者甚於人君顧恐功未及成而有所奪祗以速天下之亂耳鼂錯之事斷可見矣夫奮不顧一時之禍決然徒欲以身試人主之威者是亦其所挾者不甚大也斯固未足與有為而沉毅果敢之士又必有待而後發茍人主不先自去其不可測而示其可信則彼孰從而發哉慶厯中天子急於求治擢用元老天下日夜望其成功方其深思遠慮而未有所發也雖天子亦遲之至其一旦發憤條天下之利害百未及一二而舉朝喧譁以至於逐去曾不旋踵此天下之士所以相戒而不敢深言也居今之勢而欲納天下於至治非大有所矯拂於世俗不可以有成也何者天下獨患柔弱而不振怠惰而不肅茍且偷安而不知長久之計臣以為宜如諸葛亮之治蜀王猛之治秦使天下悚然人人不敢飾非務盡其心凡此者皆庸人之所大惡而讒言之所由興也是故先主拒闗張之間而後孔明得以盡其才苻堅斬樊世逐仇騰黜席寳而後王猛得以畢其功也夫天下未嘗無二子之才也而人主思治又如此之勤相須甚急而相合甚難者獨患君不信其臣而臣不測其君而巳矣惟天子一日慨然明告執政之臣所以欲為者使知人主之深知之也而内為之信然後敢有所發於外而不顧不然雖得賢人千萬一日百變法天下益不可治嵗復一嵗而終無以大慰天下之望豈不亦甚可惜哉䇿畧四蘇軾天子與執政之大臣既巳相得而無疑可以盡其所懐直已而行道則夫當今之所宜先者莫如破庸人之論以開功名之門而後天下可為也夫治天下譬如治水方其奔衝潰決騰涌飄蕩而不可禁止也雖欲盡人力之所至以求殺其尺寸之勢而不可得及其既衰且退也駸駸乎若不足以終日故夫善治水者不惟有難殺之憂而又有易衰之患導之有方決之有漸疏其故而納其新使不至於壅閼腐敗而無用嗟夫人知江河之有水患也而以為沼沚之可以無憂是烏知舟楫灌溉之利哉夫天下之未平英雄豪傑之士務以其所長角奔而争利惟恐天下一日無事也是以人人各盡其材雖不肖者亦自淬厲而不至於怠廢故其勇者相吞智者相賊使天下不安其生為天下者知夫大亂之本起於智勇之士争利而無厭是故天下既平則削去其具抑遠天下剛健好名之士而奬用柔懦謹畏之人不過數十年天下靡然無復往時之喜事也於是能者不自憤發而無以見其能不能者益以弛廢而無用當是之時人君欲有所為而左右前後皆無足使者是以綱紀日壊而不自知此其為患豈特英雄豪傑之士趦趄而已哉聖人則不然當其久安於逸樂也則以術起之使天下之心翹翹然常喜於為善是故能安而不衰且夫人君之所恃以為天下者天下皆為而已不為夫使天下皆為而己不為者開其利害之端而辨其榮辱之等使之踴躍奔走皆為我役而不自知夫是以坐而收其功也如使天下皆欲不為而得則天子誰與共天下哉今者治平之日久矣天下之患正在此也臣故曰破庸人之論開功名之門而後天下可為也今夫庸人之論有二其上之人務為寛深不測之量而下之士好言中庸之道此二者皆庸人相與議論舉先賢之言而獵取其近似者以自解説其無能而已矣夫寛深不測之量古人所以臨大事而不亂有以鎮世俗之躁葢非以隔絶上下之情養尊而自安也譽之則勸非之則沮聞善則喜見惡則怒此三代聖人之所共也而後之君子必曰譽之不勸非之不沮聞善不喜見惡不怒斯以為不測之量不已過乎夫有勸有沮有喜有怒然後有間而可入有間而可入然後智者得為之謀才者得為之用後之君子務為無間夫天下誰能入之古之所謂中庸者盡萬物之理而不過故亦曰皇極夫極盡也後之所謂中庸者循循焉為衆人之所能為斯以為中庸矣此孔子孟子之謂鄉原也今日之患惟不取於狂者獧者皆取於鄉原是以若此靡靡不立也孔子子思之所從受中庸者也孟子子思之所授以中庸者也然皆欲得狂者獧者而與之然則淬厲天下而作其怠惰莫如狂者獧者之賢也臣故曰破庸人之論開功名之門而後天下可為也䇿畧五蘇軾其次莫若深結天下之心臣聞天子者以其一身寄之乎巍巍之上以其一心運之乎茫茫之中安而為太山危而為累卵其間不容毫釐是故古之聖人不恃其有可畏之資而恃其有可愛之實不恃其有不可拔之勢而恃其有不忍叛之心何則其所居者天下之至危也天子恃公卿以有其天下公卿大夫士以至於民轉相屬也以有其富貴茍不得其心而欲羈之以區區之名控之以不足恃之勢者其平居無事猶有以相制一旦有急是皆行道之人掉臂而去尚安得而用之古之失天下者皆非一日之故其君臣之權去已久矣適會其變是以一散而不可復收方其未也天子甚尊大夫士甚賤奔走萬里無敢後先儼然南靣以臨其臣曰天何言哉百官俯首就位斂足而退兢兢惟恐有罪羣臣相率為茍安之計賢者既無所施其才而愚者亦有所容其不肖舉天下之事聽其自為而已及乎事出於非常變起於不測視天下莫與同其患雖欲分國以與人而且不及矣秦二世唐徳宗葢用此術以至於顛沛而不悟豈不悲哉天下者器也天子者有此器者也器久不用而置諸篋笥則器與人不相習是以扞格而難操良工者使手習知其器而器亦習知其手手與器相信而不相疑夫是故所為而成也天下之患非經營禍亂之足憂而養安無事之可畏何者懼其一旦至於扞格而難操也昔之有天下者日夜淬厲其百官撫摩其人民為之朝聘會同宴享以交諸侯之歡嵗時月朔致民讀法飲酒蜡臘以遂萬民之情有大事自庶人以上皆得至於外朝以盡其詞猶以為未也而五載一廵狩朝諸侯於方岳之下親見其耆老賢士大夫以周知天下之風俗凡此者非以為茍勞而巳將以馴致服習天下之心使不至於扞格而難操也及至後世壊先王之法安於逸樂而惡聞其過是以養尊而自高務為深嚴使天下拱手以貌相承而心不服其腐儒老生又出而為之説曰天子不可以妄有言也史且書之後世且以為譏使其君臣相視而不相知如此則偶人而已矣天下之心既已去而倀倀焉抱其空器不知英雄豪傑已議其後臣嘗觀西漢之初高祖創業之際事變之興亦已繁矣而高祖以項氏創殘之餘與信布之徒争馳於中原此六七公者皆以絶人之姿據有土地甲兵之衆其勢足以為亂然天下終以不揺卒定於漢傳十數世矣而至於元成哀平四夷嚮風兵革不試而王莽一豎子乃能舉而移之不用寸兵尺鐵而天下屏息莫敢或争此其故何也創業之君出於布衣其大臣將相皆握手之歡凡在朝廷者皆有嘗試擠掇以知其才之短長彼其視天下如一身茍有疾痛其手足不期而自救當此之時雖有近憂而無遠患及其子孫生於深宫之中而狃於富貴之勢尊卑闊絶而上下之情疏禮節繁多而君臣之義薄是故不為近憂而常為遠患及其一旦固已不可救矣聖人知其然是以去苛禮而務至誠黜虚名而求實效不愛高位重禄以致山林之士而欲聞切直不隠之言者凡皆以通上下之情也昔我太祖太宗既有天下法令簡約不為崖岸當時大臣將相皆得從容終日歡如平生下至士庶人亦得以自効故天下稱其善至今非有文采縁飾而開心見誠有以入人之深者此英主之竒術御天下之大權也方今治平之日久矣臣愚以為宜日新盛徳以激昻天下久安怠惰之氣故陳其五事以備採擇其一曰將相之臣天子所恃以為治者宜日夜召論天下之大計且以熟觀其為人其二曰太守刺史天子所寄以遠方之民者其罷歸皆當問其所以為政民情風俗之所安亦以揣知其才之所堪其三曰左右扈從侍讀侍講之人本以論説古今興衰之大要非以應故事備數而巳經籍之外茍有以訪之無傷也其四曰吏民上書茍小有可觀宜皆召問優㳺以養其敢言之氣其五曰天下之吏自一命以上雖其至賤無以自通於朝廷然人主之為豈有所不可哉察其善者卒然召見之使不知其所從來如此則遠方之賤吏亦務自激發為善不以位卑禄薄無以自通于上而不修飭使天下習知天子樂善親賢䘏民之心孜孜不倦如此翕然皆有所感發知愛於君而不可與為不善亦將賢人衆多而奸吏衰少刑法之外有以大慰天下之心焉耳䇿斷上蘇軾二邊為中國患至深遠也天下謀臣猛將豪傑之士欲有所逞於西北者久矣聞之兵法曰先為不可勝以待敵之可勝嚮者臣愚以為西北雖有可勝之形而中國未有不可勝之備故竊嘗以為可特設一官使獨任其責而執政之臣得以專治内事茍天下之弊莫不盡去紀綱修明食足而兵彊百姓樂業知愛其君卓然有不可勝之備如此則臣固將備論而極言之夫天下將興其積必有源天下將亡其發必有門聖人者唯知其門而塞之古之亡天下者四而天子無道不與焉葢有以諸侯彊偪而至於亡者周唐是也有以匹夫横行而至於亡者秦是也有以大臣執權而至於亡者漢魏是也有以蠻夷内侵而至於亡者司馬氏及石氏是也使此七代之君皆能逆知其所由亡之門而塞之則至於今可以不廢惟其諱亡而不為之備或備之而不得其門故禍發而不救夫天子之勢蟠於天下而結於民心者甚厚故其亡也必有大隙焉而日潰之其窺之甚難其取之甚密曠日持久然後可得而間葢非有一日卒然不救之患也是故聖人必於其全盛之時而塞其所由亡之門葢臣以為當今之患外之可畏者西夏契丹而内之可畏者天子之民也西夏契丹不足以為中國之大憂而其動也有以召内之禍内之民實執存亡之權而不能獨起其發也必將待外之變先之以戎狄而繼之以吾民臣之所謂可畏者在此而已昔者敵國之患起於多求而不供供者有倦而求者無厭以有倦待無厭而能久安於無事者天下未嘗有也故夫二邊之患特有遠近耳而要以必至於戰敢問今之所以戰者何也其無乃出於倉卒而備於一時乎且夫兵不素定而出於一時當其危疑擾攘之間而吾不能自必則權在敵國權在敵國則吾欲戰不能欲休不可進不能戰而退不能休則其計將出於求和求和而自我則其所以為媾者必重軍旅之後而繼之以重媾則國用不足國用不足則加賦於民加賦而不已則凡暴取豪奪之法不得不施於今之世矣天下一動變生無方國之大憂將必在此葢嘗聞之用兵有權權之所在其國乃勝是故國無小大兵無彊弱有小國弱兵而見畏於天下者權在焉耳千鈞之牛制於三尺之童弭耳而下之曾不如狙猿之奮擲於山林此其故何也權在人也我欲則戰不欲則守戰則天下莫能支守則天下莫能窺昔者秦嘗用此矣開闗出征以攻諸侯則諸侯莫不願割地而求和諸侯割地而求和於秦秦人未嘗急於割地之利若不得已而後應故諸侯常欲和而秦常欲戰如此則權固在秦矣且秦非能彊於天下之諸侯秦惟能自必而諸侯不能是以天下百變而卒歸於秦諸侯之利固在從横也朝聞陳軫之説而合為從暮聞張儀之計而散為横秦則不然横人之欲為横從人之欲為從皆使其自擇而審處之諸侯相顧而終莫能自必則權之在秦不亦宜乎嚮者寶元慶厯之間河西之役可以見矣其始也不得巳而後戰其終也逆探其意而與之和又從而厚餽之惟恐其一日復戰也如此則賊常欲戰而我常欲和賊非能常戰也特持其欲戰之形以乘吾欲和之勢賊屢用而屢得志是以中國之大而權不在焉欲天下之安則莫若使權在中國欲權之在中國則莫若先發而後罷示之以不憚形之以好戰而後天下之權有所歸矣今夫庸人之論則曰勿為禍始古之英雄之君豈其樂禍而好殺唐太宗既平天下而又嵗嵗出師以從事於突厥葢晚而不倦暴露於千里之外親擊高麗者再焉凡此者皆所以争先而處彊也當時羣臣不能深明其意以為敵本無釁而我則發之夫為國者使人備己則權在我而使己備人則權在人當太宗之時四裔狼顧以備中國故中國之權重茍不先之則彼或以執其權矣而我又鰓鰓焉惡戰而樂罷使敵國知吾之所忌而以是取必於吾如此則雖有天下吾安得而為之唐之衰也惟其厭兵而畏戰一有敗衂則兢兢焉縮首而去之是故奸臣執其權以要天子及至憲宗奮而不顧雖小挫而不為之沮當此之時天下之權在於朝廷伐之則足以為威舍之則足以為恩臣故曰先發而後罷則權在我矣䇿斷中蘇軾臣聞用兵有可以逆為數十年之計者有朝不可以謀夕者攻守之方戰鬭之術一日百變猶以為拙若此者朝不可以謀夕者也古之欲謀人之國者必有一定之計勾踐之取呉秦之取諸侯高祖之取項籍皆得其至計而固執之是故有利有不利有進有退百變而不同而其一定之計未始易也勾踐之取呉是驕之而已秦之取諸侯是散其從而已高祖之取項籍是間疎其君臣而已此其至計不可易者雖百年可知也今天下晏然未有用兵之形而臣以為必至於戰則其攻守之方戰鬭之術固未可以豫論而臆斷也然至於用兵之大計所以固執而不變者臣請得以豫言之夫西夏契丹皆為中國之患而西夏之患小契丹之患大此天下之所明知也管仲曰攻堅則瑕者堅攻瑕則堅者瑕故二者皆所以為憂而臣以為兵之所加宜先於西故先論所以制御西戎之大畧今夫鄒與魯戰則天下莫不以為魯勝大小之勢異也然而勢有所激則大者失其所以為大而小者忘其所以為小故有以鄒勝魯者矣夫大有所短小有所長地廣而備多備多而力分小國聚而大國分則彊弱之勢將有所反大國之人譬如千金之子自重而多疑小國之人計窮而無所恃則致死而不顧是以小國常勇而大國常怯恃大而不戒則輕戰而屢敗知小而自畏則深謀而必克此又其理然也夫民之所以守戰至死而不去者以其君臣上下歡欣相得之際也國大則君尊而上下不交將軍貴而吏士不親法令繁而民無所措其手足若夫小國之民截然其若一家也有憂則相恤有急則相赴凡此數者是小國之所長而大國之所短也大國而不用其所長使小國常出於其所短雖百戰而百屈豈足怪哉且夫大國則固有所長矣長於戰而不長於守夫守者出於不足而巳譬之於物大而不用則易以腐敗故凡擊搏進取所以用大也孫武之法十則圍之五則攻之倍則分之敵則能戰之少則能逃之不若則能避之自敵以上者未嘗有不戰也自敵以上而不戰則是以有餘而用不足之計固巳失其所長矣凡大國之所恃吾能分兵而彼不能分吾能數出而彼不能應譬如千金之家日出其財以罔市利而販夫小民終莫能與之競者非智不若其財少也是故販夫小民雖有桀黠之才過人之智而其勢不得不折而入於千金之家何則其所長者不可以與較也西戎之於中國可謂小國矣嚮者惟不用其所長是以聚兵連年而終莫能服今欲用吾之所長則莫若數出數出莫若分兵臣之所謂分兵者非分屯之謂也分其居者與行者而巳今河西之戍卒惟患其多而莫之適用故其便莫若分兵使其十一而行則一嵗可以十出十二而行則一嵗可以五出十一而十出十二而五出則是一人而嵗一出也吾一嵗而一出彼一嵗而十被兵焉則衆寡之不侔勞逸之不敵亦已明矣夫用兵必出於敵人之所不能我大而敵小是故我能分而彼不能此吳之所以肆楚而隋之所以狃陳歟夫御戎之術不可以逆知其詳而其大畧臣未見有過此者也文編巻四十一

body:
  text: 文編卷五十明唐順之編與崔羣書韓愈自足下離東都凡兩度枉問尋承已達宣州主人仁賢同列皆君子雖抱羈旅之念亦且可以度日無入而不自得樂天知命者固前修之所以禦外物者也况足下度越此等百千輩豈以出處近逺纍其靈臺邪宣州雖稱清涼髙爽然皆大江之南風土不並以北將息之道當先理其心心間無事然後外患不入風氣所宜可以審備小小者亦當自不至矣足下之賢雖在窮約猶能不改其樂况地至近官榮祿厚親愛盡在左右者邪所以如此云云者以為足下賢者宜在上位託於幕府則不為得其所是以及之乃相親重之道耳非所以待足下者也僕自少至今從事於往還朋友間一十七年矣日月不為不久所與交往相識者千百人非不多其相與如骨肉兄弟者亦且不少或以事同或以藝取或慕其一善或以其久故或初不甚知而與之已密其後無大惡因不復决捨或其人雖不皆入於善而於已已厚雖欲悔之不可凡諸淺者固不足道深者止如此至於心所仰服考其言行而無瑕尤窺之閫奧而不見畛域明白淳粹輝光日新者惟吾崔君一人僕愚陋無所知曉然聖人之書無所不讀其精粗巨細出入明晦雖不盡識抑不可謂不涉其流者也以此而推之以此而度之誠知足下出羣拔萃無謂僕何從而得之也與足下情義寧須言而后自明邪所以言者懼足下以為吾所與深者多不置白黑於胸中耳既謂能粗知足下而復懼足下之不我知亦過也比亦有人說足下誠盡善盡美抑猶有可疑者僕謂之曰何疑疑者曰君子當有所好惡好惡不可不明如清河者人無賢愚無不說其善服其為人以是而疑之耳僕應之曰鳳凰芝草賢愚皆以為美瑞青天白日奴𨽻亦知其清明譬之食物至於遐方異味則有嗜者有不嗜者至於稻也粱也膾也䏑也豈聞有不嗜者哉疑者乃解解不解於吾崔君無所損益也自古賢者少不肖者多自省事已來又見賢者恆不遇不賢者比肩青紫賢者恆無以自存不賢者志滿氣得賢者雖得卑位則旋而死不賢者或至眉夀不知造物者意竟如何無乃所好惡與人異心哉又不知無乃都不省記任其死生夀夭邪未可知也人固有薄卿相之官千乘之位而甘陋巷菜羮者同是人也猶有好惡如此之異者况天之與人當必異其所好惡無疑也合於天而乖於人何害况又時有兼得者邪崔君崔君無怠無怠僕無以自全活者從一官於此轉困窮甚思自放於伊潁之上當亦終得之近者尤衰憊左車第二牙無故動搖脫去目視昏花尋常間便不分人顔色兩鬢半白頭髮五分亦白其一鬚亦有一莖兩莖白者僕家不幸諸父諸兄皆康强早世如僕者又可以圖於久長哉以此忽忽思與足下相見一道其懷小兒女滿前能不顧念足下何由得歸北來僕不樂江南官滿便終老嵩下足下可相就僕不可去矣珍重自愛慎飲食少思慮惟此之望愈再拜答崔立之書韓愈斯立足下僕見險不能止動不得時顛頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也足下猶復以為可教貶損道德乃至手筆以問之扳援古昔辭義髙逺且進且勸足下之於故舊之道得矣雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子之不以丈夫期我也不能默默聊復自明僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不唯為人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試賦詩䇿等以相示僕以為可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕聞吏部有以博學宏辭選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃類於俳優者之辭顔忸怩而心不寧者數月既已為之則欲有所成就書所謂耻過作非者也因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎誠使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進于是選必知其懷慙乃不自進而已耳設使與夫今之善進取者競於䝉昧之中僕必知其辱焉然彼五子者且使生於今之世其道雖不顯於天下其自負何如哉肯與夫斗筲者决得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛養窮孤其大得蓋欲以同吾之所樂於人耳其他可否自計已熟誠不待人而後知今足下乃復比之獻玉者以為必俟工人之剖然後見知於天下雖兩刖足不為病且無使勍者再尅誠足下相勉之意厚也然仕進者豈捨此而無門哉足下謂我必待是而後進者尤非相悉之辭也僕之玉固未嘗獻而足固未嘗刖足下無為我戚戚也方今天下風俗尚有未及於古者邉境尚有被甲執兵者主上不得怡而宰相以為憂僕雖不賢亦且潛究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乘之若都不可得猶將耕於寬閒之野釣於寂寞之濵求國家之遺事考賢人哲士之終始作唐之一經垂之於無窮誅姦諛於既死發潛德之幽光二者將必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再尅之刑信如何也士固信於知己微足下無以發吾之狂言愈再拜上考功崔虞部書韓愈愈不肖行能誠無可取行已頗僻與時俗異態抱愚守迷固不識仕進之門乃與羣士爭名競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之如執事者不以是為念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也既以自咎又歎執事者所守異於人人之廢耳任目華實不兼故有所進故有所退且執事始考文之明日浮囂之徒已相與稱曰某得矣某得矣問其所從來必言其有自一日之間九變其說凡進士之應此選者三十有二人其所不言者數人而已而愈在焉及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變凡在京師八九年矣足不跡公卿之門名不譽於大夫士之口始者謬為今相國所第此時惟念以為得失固有天命不在趨時而偃仰一室嘯歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉欲事干謁則患不能小書困於投刺欲學為佞則患言訥詞直卒事不成徒使其躬儳焉而不終日是以勞思長懷中夜起坐度時揣己廢然而返雖欲從之末由也已又常念古之人日已進今之人日已退夫古之人四十而仕其行道為學既已大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也又曰樂只君子德音不已謂死而不亡也夫今之人務利而遺道其學其問以之取名致官而已得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡愈今二十有六矣距古人始仕之年尚十四年豈為晚哉行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以為知已者之報執事以為何如哉其信然否也今所病者在於窮約無僦屋賃僕之資無緼袍糲食之給驅馬出門不知所之斯道未喪天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無久故之事無顔色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以默又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其說如此庶執事察之也與陳給事書韓愈愈再拜愈之獲見於閣下有年矣始者未嘗辱一言之譽貧賤也衣食於奔走不得朝夕繼見其後閣下位益尊伺候於門牆者日益進夫位益尊則賤者日隔伺候於門牆者日益進則愛博而情不専愈也道不加修而文日益有名夫道不加修則賢者不與文日益有名則同進者忌始之以日隔之疏加之以不専之望以不與者之心而聽忌者之說由是閣下之庭無愈之跡矣去年春亦嘗一進謁於左右矣溫乎其容若加其新也屬乎其言若閔其窮也退而喜也以告於人其後如東京取妻子又不得朝夕繼見及其還也亦嘗一進謁于左右矣邈乎其容若不察其愚也悄乎其言若不接其情也退而懼也不敢復進今則釋然悟翻然悔曰其邈也乃所以怒其來之不繼也其悄也乃所以示其意也不敏之誅無所逃避不敢遂進輒自疏其所以并獻近所為復志賦已下十首為一卷有標軸送孟郊序一首生紙寫不加裝飾皆有楷字注字處急於自解而謝不能俟更為閣下取其意而略其禮可也愈恐懼再拜與袁相公書韓愈伏聞賔位尚有闕員幸䝉不以常輩知遇恆不自知愚且賤思有論薦竊見朝議郎前太子舍人樊宗師孝友聰明家故饒財身居長嫡悉推與諸弟諸弟皆優贍有餘而宗師妻子常寒露饑餒宗師怡然處之無有難色窮究經史章通句解至於隂陽軍法聲律悉皆研極原本又善為文章詞句刻深獨追古作者為徒不顧世俗輕重通微曉事可與晤語又習於吏職識時知變非如儒生文字止有偏長退勇守専未為宰物者所識年近五十遑遑勉勉思有所試閣下儻引而致之密加識察有少不如所言愈為欺罔大君子便宜得棄絶之罪於門下誠不忍竒寶橫棄道側而閣下篋櫝尚有少闕不滿之處猶足更容輒冒言之退增汗懾謹狀為人求薦書韓愈某聞木在山馬在肆過之而不顧者雖纍日千萬人未為不材與下乘也及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也以某在公之宇下非一日而又辱居姻婭之後是生于匠石之園長于伯樂之廄者也於是而不得知假有見知者千萬人亦何足云今幸賴天子每嵗詔公卿大夫貢士若某等比咸得以薦聞是以冒進其說以纍於執事亦不自量已然執事其知某何如哉昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧價增三倍某與其事頗相類是故終始言之耳答吕醫山人書韓愈愈白惠書責以不能如信陵執轡者夫信陵戰國公子欲以取士聲勢傾天下而然耳如僕者自度若世無孔子不當在弟子之列以吾子自山出有朴茂之美意恐未礱磨以世事又自周後文弊百子為書各自名家亂聖人之宗後生習傳雜而不貫故設問以觀吾子其已成熟乎將為友也其未成熟乎將以講去其非而趨是耳不如六國公子有市於道者也方今天下入仕惟以進士明經及卿大夫之世耳其人悉皆習熟時俗工於語言識形勢善候人主意故天下靡靡日入於衰壞恐不復振起務欲進足下趨死不顧利害去就之人於朝以爭救之耳非謂當今公卿間無足下輩文學知識也不得以信陵比然足下衣破衣繫麻鞋率然叩吾門吾待足下雖未盡賔主之道不可謂無意者足下行天下得此於人蓋寡乃遂能責不足於我此真僕所汲汲求者議雖未中節其不肯阿曲以事人者灼乃明矣方將坐足下三浴而三熏之聽僕之所為少安無躁愈頓首代張籍與李浙東書韓愈月日前某官某謹東向再拜寓書浙東觀察使中丞李公閣下籍聞議論者皆云方今居古方伯連帥之職坐一方得專制於其境內者惟閣下心事犖犖與俗輩不同籍固以藏之胸中矣近者閣下從事李協律翺到京師籍於李君友也不見六七年聞其馳至往省之問無恙外不暇出一言且先賀其得賢主人李君曰子豈盡知之乎吾將盡言之數日籍益聞所不聞籍私獨喜常以為自今已後不復有如古人者於今忽有之退自悲不幸兩目不見物無用於天下胸中雖有知識家無錢財寸步不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胸中之竒乎因飲泣不能語既數日復自奮曰無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢於行古人之道者浙水東七州户不下數十萬不盲者何限李中丞取人固當問其賢不賢不當計盲與不盲也當今盲於心者皆是若籍自謂獨盲於目爾其心則能别是非若賜之坐而問之其口固能言也幸未死實欲一吐出心中平生所知見閣下能信而致之於門邪籍又善於古詩使其心不以憂衣食亂閣下無事時一致之座側使跪進其所有閣下慿几而聽之未必不如聽吹竹彈絲敲金擊石也夫盲者業専於藝必精故樂工皆盲籍儻與此輩比並乎使籍誠不以蓄妻子憂饑寒亂心有錢財以濟醫藥其盲未甚庶幾其復見天地日月因得不廢則自今至死之年皆閣下之賜閣下濟之以已絶之年賜之以既盲之視其恩輕重大小籍宜如何報也閣下裁之度之籍慙靦再拜與孟東野書韓愈與足下别久矣以吾心之思足下知足下懸懸於吾也各以事牽不可合并其於人人非足下之為見而日與之處足丁知吾心樂否也吾言之而聽者誰歟吾唱之而和者誰歟言無聽也唱無和也獨行而無徒也是非無所與同也足下知吾心樂否也足下才髙氣清行古道處今世無田而衣食事親左右無違足下之用心勤矣足下之處身勞且苦矣混混與世相濁獨其心追古人而從之足下之道其使吾悲也去年春脫汴州之亂幸不死無所於歸遂來于此主人與吾有故哀其窮居吾于符離睢上及秋將辭去因被留以執事默默在此行一年矣到今年秋復辭去江湖余樂也與足下終幸矣李習之娶吾亡兄之女期在後月朝夕當來此張籍在和州居喪家甚貧恐足下不知故具此白冀足下一來相視也自彼至此雖逺要皆舟行可至速圖之吾之望也春且盡時氣向熱惟侍奉吉慶愈眼疾比劇甚無聊不復一一與李翺書韓愈使至辱足下書歡愧來并不容于心嗟乎子之言意皆是也僕雖巧說何能逃其責邪然皆子之愛我多重我厚不酌時人待我之情而以子之待我之意使我望於時人也僕之家本窮空重遇攻劫衣服無所得養生之具無所有家纍僅三十口攜此將安所歸託乎捨之入京不可也挈之而行不可也足下將安以為我謀哉此一事耳足下謂我入京城有所益乎僕之有子猶有不知者時人能知我哉持僕所守驅而使奔走伺候公卿間開口議論其安能有以合乎僕在京城八九年無所取資日求於人以度時月當時行之不覺也今而思之知痛定之人思當痛之時不知何能自處也今年加長矣復驅之使就其故地是亦難矣所貴乎京師者豈不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎以僕遑遑於其中能上聞而下達乎其知我者固少知而相愛不相忌者又加少內無所資外無所從終安所為乎嗟乎子之責我誠是也愛我誠多也今天下之人有如子者乎自堯舜以來士有不遇者乎無也子獨安能使我潔清不汙而處其所可樂哉非不願為子之所云者力不足勢不便故也僕於此豈以為大相知乎纍纍隨行役役逐隊饑而食飽而嬉者也其所以止而不去者以其心誠有愛於僕也然所愛於我者少不知我者猶多吾豈樂於此乎哉將亦有所病而求息於此也嗟乎子誠愛我矣子之所責於我者誠是矣然恐子有時不暇責我而悲我不暇悲我而自責且自悲也及之而後知履之而後難耳孔子稱顔回一簞食一瓢飲在陋巷人不堪其憂回也不改其樂彼人者有聖者為之依歸而又有簞食瓢飲足以不死其不憂而樂也豈不易哉若僕無所依歸無簞食無瓢飲無所取資則餓而死其不亦難乎子之聞我言亦悲矣嗟乎子亦慎其所之哉離違久乍還侍左右當日歡喜故専使馳此候足下意并以自解愈再拜答馮宿書韓愈垂示僕所闕非情之至僕安得聞此言朋友道闕絶久矣無有相針規磨切之道僕何幸乃得吾子僕常閔時俗人有耳不自聞其過凛凛然惟恐已之不自聞也而今而後有望於吾子矣然足下與僕交久僕之所守足下之所熟知在京城時囂囂之徒相訾百倍足下時與僕居朝夕同出入起居亦見僕有不善乎然僕退而思之雖無以獲罪於人亦有以獲罪於人者僕在京城一年不一至貴人之門人之所趨僕之所傲與已合者則從之逰不合者雖造吾廬未嘗與之坐此豈徒足致謗而已不戮於人則幸也追思之可為戰栗寒心故至此已來克已自下雖不肖人至未嘗敢以貌慢之况時所尚者邪以此自謂庶幾無時患不知猶復云云也聞流言不信其行嗚呼不復有斯人也君子不為小人之恟恟而易其行僕何能爾委曲健順向風承意汲汲恐不得合猶且不免云云命也可如何然子路聞其過則喜禹聞昌言則下車拜古人有言曰告我以過者吾之師也願足下不憚煩茍有所聞必以相告亦有以報子不敢虛也不敢忘也答侯繼書韓愈裴子自城來得足下一書明日又於崔大處得足下陕州所留書玩而復之不能自休尋知足下不得留僕又為考官所辱欲致一書開足下并自舒其所懷含意連辭將發復已卒不能成就其說及得足下二書凡僕之所欲進于左右者足下皆以自得之僕雖欲重纍其辭諒無居足下之意外者故絶意不為行自念方當逺去潛深伏隩與時世不相聞雖足下之思我無所窺尋其聲光故不得不有書為别非復有所感發也僕少好學問自六經之外百氏之書未有聞而不求得而不觀者然其所志惟在其意義所歸至於禮樂之名數隂陽土地星辰方藥之書未嘗一得其門户雖今之仕進者不要此道然古之人未有不通此而能為大賢君子者僕雖庸愚每讀書輒用自愧今幸不為時所用無朝夕役役之勞將試學焉力不足而後止猶將愈於汲汲於時俗之所爭既不得而怨天尤人者此吾今之志也懼足下以吾退歸因謂我不復能自强不息故因書奉曉冀足下知吾之退未始不為進而衆人之進未始不為退也既貨馬即求船東下二事皆不過後月十日有相問者為我謝焉與蕭翰林俯書栁宗元思謙兄足下昨祁縣王師範過永州為僕言得張左司書道思謙蹇然有當官之心乃誠助太平者也僕聞之喜甚然微王生之說僕豈不素知耶所喜者耳與心協果於不謬焉耳僕不幸嚮者進當臲􅑶不安之勢平居閉門口舌無數况又有久與游者乃岌岌而操其間其求進而退者皆聚為仇怨造作粉飾蔓延益肆非的然昭晰自斷於內則孰能了僕於冥冥之間哉然僕當時年三十三甚少自御史裏行得禮部貟外郎超取顯美欲免世之求進者怪怒媢嫉其可得乎凡人皆欲自達僕先得顯處才不能踰同列名不能壓當世世之怒僕宜也與罪人交十年官又以是進辱在附會聖朝宏大貶黜甚薄不能塞衆人之怒謗語轉移囂囂嗷嗷漸成怪民飾智求仕者更言僕以恱讐人之心目為新竒務相喜可自以速援引之路而僕輩坐益困辱萬罪橫生不知其端伏自思念過大恩甚乃以致此悲夫人生少得六七十者今已三十七矣長來覺日月益促嵗嵗更甚大都不過數十寒暑則無此身矣是非榮辱又何足道云云不已秪益為罪兄知之勿為他人言也居蠻夷中久慣習炎毒昏眊重膇意以為常忽遇北風晨起薄寒中體則肌革慘凛毛髮蕭條瞿然注視怵惕以為異候意緒殆非中國人楚越間聲音特異鴂舌啅譟今聽之怡然不怪已與為類矣家生小童皆自然嘵嘵晝夜滿耳聞北人言則啼呼走匿雖病夫亦怛然駭之出門見適州閭市井者其十有八九杖而後興自料居此尚復幾何豈可更不知止言說長短重為一世非笑哉讀周易困卦至有言不信尚口乃窮也往復益喜曰嗟乎余雖家置一喙以自稱道詬益甚耳用是更樂瘖默思與木石為徒不復致意今天子興教化定邪正海內皆欣欣愈愈而僕與四五子者獨淪陷如此豈非命歟命乃天也非云云者所制余又何恨獨喜思謙之徒遭時言道道之行物得其利僕誠有罪然豈不在一物之數耶身被之目覩之足矣何必攘袂用力而矜自我出耶果矜之又非道也事誠如此然居理平之世終身為頑人之類猶有少耻未能盡忘儻因賊平慶賞之際得以見白使受天澤餘潤雖朽枿敗腐不能生植猶足蒸出芝菌以為瑞物一釋廢錮移數縣之地則世必曰罪稍解矣然後收召魂魄買土一鄽為耕氓朝夕歌謠使成文章庶木鐸者采取獻之法言增聖唐大雅之什雖不得位亦不虛為太平之人矣此在望外然終欲為兄一言焉宗元再拜賀進士王參元失火書栁宗元得楊八書知足下遇火災家無餘儲僕始聞而駭中而疑終乃大喜蓋將弔而更以賀也道逺言略猶未能究知其狀若果蕩焉泯焉而悉無有乃吾所以尤賀者也足下勤奉養樂朝夕惟恬安無事是望也今乃有焚煬赫烈之虞以震駭左右而脂膏􅎵瀡之具或以不給吾是以始而駭也凡人之言皆曰盈虛倚伏去來之不可常欲將大有為也乃始厄困震悸於是有水火之孽有群小之愠勞苦變動而後能光明古之人皆然斯道遼濶誕漫雖聖人不能以是必信是故中而疑也以足下讀古人書為文章善小學其為多能若是而進不能出群士之上以取顯貴者蓋無他焉京城人多言足下家有積貨士之好亷名者皆畏忌不敢道足下之善獨自得之心蓄之銜忍而不出諸口以公道之難名而世之多嫌也一出口則嗤嗤者以為得重賂僕自貞元十五年見足下之文章蓄之者蓋六七年未嘗言是僕私一身而負公道久矣非特負足下也及為御史尚書郎自以幸為天子近臣得奮其舌思以發明足下之鬱塞然時稱道於行列猶有顧視而竊笑者僕良恨修已之不亮素譽之不立而為世嫌之所加常與孟幾道言而痛之乃今幸為天火之所滌蕩凡衆之疑慮舉為灰埃黔其廬赭其垣以示其無有而足下之才能乃可以顯白而不汚其實出矣是祝融回祿之相吾子也則僕與幾道十年之相知不若兹火一夕之為足下譽也宥而彰之使夫蓄於心者咸得開其喙發䇿决科者授子而不栗雖欲如嚮之蓄縮受侮其可得乎於兹吾有望於子是以終乃大喜也古者列國有災同位者皆相弔許不弔災君子惡之今吾之所陳若是有以異乎古故將弔而更以賀也顔曽之養其為樂也大矣又何闕焉足下前要僕文章古書極不忘候得數十幅乃併往耳吳二十一武陵來言足下為辭賦及對問大善可寄一本僕近亦好作文與在京城時頗異思與足下輩言之桎梏甚固未可得也因人南來致書訪死生不悉宗元白與郭秀才書歐陽修僕昨以吏事至漢東秀才見僕於叔父家以啓事三篇偕門刺先進自賔階拜起旋辟甚有儀坐而語諾甚謹讀其辭溫密華富甚可愛視秀才待僕之意甚勤而理也古人之相見必有歡欣交接之誠而不能達乃取羔羊雉鶩之類致其意為贄而先既致其意又耻其無文則以虎豹之皮繢畫之布以飾之然後意達情接客既贄而主人必禮以答之為陳酒殽幣篚壺矢燕樂之具將其意又為賦詩以陳其情今秀才好學甚精博記書史務為文辭不以羔禽皮布為飾獨以言文其身而其贄既美其意既勤矣宜秀才責僕之答厚也僕既無主人之具以為禮獨為秀才賦詩女曰雞鳴之卒章曰知子之來之雜佩以贈之取其知客之來豫儲珩璜琚瑀之美以送客雖無此物猶言之以致其意厚也僕誠無此物可謂空言之耳秀才年且少貌厚色揚志鋭學敏因進其業修其辭暴練緝織之不已使其文采五色潤澤炳鬱若贄以見當世公卿大夫非惟若僕空言以贈也必有分庭而禮加籩豆實幣篚延為上賔者惟勉之不已與陳員外書歐陽修陳君足下無恙近縣幹上府得書一角屬有少吏事不皇作報既而私有惑者修本愚無似固不足以希執友之逰然而群居平日幸得肩從齒序跪拜起居竊兄弟行寓書存勞謂宜有所欵曲以親之之意奈何一幅之紙前名後書且狀且牒如上公府退以尋度非謙即疏此乃世之浮道之交外陽相尊者之為非宜足下之所以賜修也古之書具惟有鉛刀竹木而削札為刺止於達名姓寓書於簡止於舒心意為問好惟官府吏曹凡公之事上而下者則曰符曰檄問訊列對下而上者則曰狀位等相與往來曰移曰牒非公之事長吏或自以意曉其下以戒以飭者則曰教下吏以私自達於其屬長而有所候問請謝者則曰箋記書啓故非有狀牒之儀施於非公之事相參如今所行者其原蓋出唐世大臣或貴且尊或有權於時縉紳湊其門以傳嚮者謂舊禮不足為重務稍增之然始於刺謁有參候起居因為之狀及五代始復以候問請謝加狀牒之儀如公之事然止施於官之尊貴及吏之長者其僞繆所從來既逺世不根古以為當然居今之世無不知此而莫以易者蓋常俗所為積習以牢而不得以更之也然士或同師友締交游以道誼相期者尚有手書勤勤之意猶為近古噫候問請謝非公之事有狀牒之儀以施于尊貴長吏猶曰非古之宜用况又用之於肩從齒序跪拜起居如兄弟者乎豈足下不以道義交游期我而惜手書之勤邪將待以牽俗積習者而姑用世禮以遇我之勤邪不然是為浮道以陽相尊也是以不勝拳拳之心謹布左右屬以公檄赴滑臺行視驛傳迫於促裝楊秀才旦詣縣府中事可悉數與張秀才第二書歐陽修修頓首白秀才足下前日去後復取前所貺古今雜文十數篇反復讀之若大節賦樂古太古曲等篇言尤髙而志極大尋足下之意豈非閔世病俗究古明道欲援今以復之古而翦剝齊整凡今之紛淆駮冗者歟然後益知足下之好學甚有志者也然而述三皇太古之道捨近取逺務髙言而鮮事實此少過也君子之於學也務為道為道必求知古知古明道而後履之以身施之於事而又見於文章而發之以信後世其道周公孔子孟軻之徒常履而行之者是也其文章則六經所載至今而取信者是也其道易知而可法其言易明而可行及誕者言之乃以混䝉虛無為道洪荒廣略為古其道難法其言難行堯禹之書皆曰若稽古傅說曰事不師古匪說攸聞仲尼曰吾好古敏以求之者凡此所謂古者其事乃君臣上下禮樂刑法之事孔子刪書斷自堯典而弗道其前蓋以其漸逺而難彰不可以信後世唐虞之道為百王首仲尼之嘆曰蕩蕩乎謂髙深閎大而不可名也書之言豈不髙邪然其事不過於親九族平百姓憂水患問臣下誰可任以女妻舜及祀山川見諸侯齊律度謹權衡使臣下誅放四罪而已孔子之後惟孟軻最知道然其言不過於教人樹桑麻畜雞豚以謂養生送死為王道之本夫二典之文豈不為文孟軻之言道豈不為道而其事乃世人之甚易知而近者蓋切於事實而已今學者不深本之務而髙逺之為勝以廣誕者無用之說是非學者之所盡心也宜少下其髙而近其逺以及乎中則庶乎至矣凡僕之所論者皆陳言淺語如足下之多聞博學不宜為足下道之也然某之所以云者本欲損足下髙逺而俯就之則安敢務為竒言以自髙邪幸足下少思焉與刁景純學士書歐陽修修頓首啓近自罷乾德遂居南陽始見謝舍人知丈丈內翰凶訃聞問驚怛不能已已丈丈位望並隆然平生亦嘗坎軻數年以來方履亨塗任要劇其去大用尺寸間爾豈富與貴不可力為而天之賦豫多少有限邪凡天之賦豫人者又量何事而為之節也前既不可詰但痛惜感悼而已某自束髮為學初未有一人知者及首登門便被憐奬開端誘道勤勤不已至其粗若有成而後止雖其後逰於諸公而獲齒多士雖有知者皆莫之先也然亦自念不欲效世俗子一遭人之顧已不以至公相期反趨走門下脅肩諂笑甚者獻讒諛而備使令以卑昵自親名曰報德非惟自私直亦待所知以不厚是故懼此惟欲少勵名節庶不泯然無聞用以不負所知爾某之愚誠所守如此然雖胥公亦未必諒某此心也自前嵗得罪夷陵奔走萬里身日益窮迹日益疏不及再聞語言之音而遂為幽明之隔嗟夫世俗之態既不欲為愚誠所守又未克果惟有望門長號臨柩一奠亦又不及此之為恨何可道也徒能惜不永年與未大用遂與道路之人同歎爾知歸葬廣陵遂謀京居議者多云不便而聞理命若斯必有以也若須春水下汴某嵗盡春初當過京師尚可一拜見以盡區區身賤力微於此之時當有可致而無毫髮之助慚愧慚愧不宣某再拜上王長安書蘇洵判府左丞閣下天下無事天子甚尊公卿甚貴士甚賤從士而逆數之至於天子其積也甚厚其為變也甚難是故天子之尊至於不可指而士之卑至於可殺嗚呼見其安而不見其危如此而已矣衛懿公之死非其無人也以鶴辭而不與戰也方其未敗也天子之士望為其鶴而不可得也及其敗也思以千乘之國與匹夫共之而不可得也人知其卒之至於如此則天子之尊可以栗栗于上而士之卑可以肆志於下又焉敢以勢言哉故夫士之貴賤其勢在天子天子之存亡其權在士世衰道喪天下之士學之不明持之不堅於是始以天子存亡之權下而就一匹夫貴賤之勢甚矣夫天下之惑也持千金之璧以易一瓦缶幾何其不舉而棄諸溝也古之君子其道相為徒其徒相為用故一夫不用乎此則天下之士相率而去之使夫上之人有失天下士之憂而後有失一士之懼今之君子幸其徒之不用以茍容其身故其始也輕用之而其終也亦輕去之嗚呼其亦何便於此也當今之世非有賢公卿不能振其前非有賢士不能奮其後洵從蜀來明日將至長安見明公而東伏惟讀其書而察其心以輕重其禮幸甚幸甚與李方叔書蘇軾屢獲來教因循不一裁答悚息不已比日履兹秋暑起居佳勝録示子駿行狀及數詩辭意整暇有加於前得之極喜慰纍書見責以不相薦引讀之甚愧然其說不可不盡君子之知人務相勉於道不務相引於利也足下之文過人處不少如李氏墓表及子駿行狀之類筆勢翩翩有可以追古作者之道至若前所示兵鑑則讀之終篇莫知所謂意者足下未甚有得於中而張其外者不然則老病昏惑不識其趣也以此私意猶冀足下積學不倦落其華而成其實深願足下為禮義君子不願足下豐於財而亷於德也若進退之際不甚慎靜則於定命不能有毫髮增益而於道德有丘山之損矣古之君子貴賤相因先後相援固多矣軾非敢廢此道平生相知心所謂賢者則於稠人中譽之或因其言以考其實實至則名隨之名不可掩其自為世用理勢固然非力致也陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得中丞傅欽之侍郎孫莘老薦之軾亦掛名其間會朝廷多知履常者故得一官軾孤立言輕未嘗獨薦人也爵祿乃人主所専宰相猶不敢必而欲責於軾可乎東漢處士私相諡非古也殆似丘明為素臣當得罪於孔門矣孟生貞曜蓋亦蹈襲流弊不足法而况相近名字者乎甚不願足下此等也軾於足下非愛之深期之逺定不及此猶能察其意否近秦少游有書來亦論足下近文益竒明主求人如不及豈有終汨沒之理足下但信道自守當不求自至若不深自重恐喪失所有言切而盡臨紙悚息未即會見千萬保愛近夜眼昏不一不一與章子厚書蘇軾子厚參政諫議執事春初辱書尋遞中裁謝不審得達否比日機務之暇起居萬福軾䝉恩如昨顧以罪廢之餘人所鄙惡雖公不見棄亦不欲頻通姓名今兹復陳區區誠義有不可已者軾在徐州日聞沂州丞縣界有賊何九郎者謀欲劫利國監又有闞溫秦平者皆猾賊往來沂兖間欲使人緝捕無可使者聞沂州葛墟村有程棐者家富有心膽其弟嶽坐與李逢往還配桂州牢城棐雖小人而篤於兄弟常欲為嶽洗雪而無由竊意其人可使因令本州支使孟易呼至郡喻使自效以刷門户垢汙茍有成績當為奏乞放免其弟棐願盡力因出帖付與不逾月軾移湖州棐相送出境云公更留兩月棐必有以自效今已去奈何軾語棐但盡力不可以軾去而廢也茍有所獲當速以相報不以逺近所在仍為奏乞如前約也是嵗七月二十七日棐使人至湖州見報云已告捕獲妖賊郭先生等及得徐州孔目官以下狀申告捕妖賊事如棐言不謬軾方欲具始末奏陳棐所以盡力者為其弟也乞勘會其弟嶽所犯如只是與李逢􅉨還本不與其謀者乞賜放免以勸有功草具未上而軾就逮赴詔獄遂不果發今者棐又遣人至黃州見報云郭先生等皆已鞠治得實行法久矣䝉恩授殿直且録其告捕始末以相示原棐之意所以孜孜於軾者凡為其弟以曩言見望也軾固不可以復有言矣然獨念愚夫小人以一言感發猶能奮身不顧以遂其言而軾乃以罪廢之故不為一言以負其初心獨不愧乎且其弟嶽亦豪健絶人者也徐沂間人鷙勇如棐嶽類甚衆若不收拾驅使令捕賊即作賊耳謂宜因事勸奬使皆歆艷捕告之利懲創為盜之禍庶幾少變其俗今棐必在京師參班公可自以意召問其始末特為一言放免其弟嶽或與一名目牙校鎮將之類付京東監司驅使緝捕其才用當復過於棐也此事至微末公執政大臣豈復治此但棐於軾本非所部吏民而能自效者以軾為不食言也今既不可言於朝廷又不一言於公是終不言矣以此愧於心不能自已可否在公獨願祕其事毋使軾重得罪也徐州南北襟要自昔用武之地而利國監去州七十里土豪百餘家金帛山積三十六冶器械所産而兵衛微寡不幸有猾賊十許人一呼其間吏兵皆弃而走耳散其金帛以嘯召無賴烏合之衆可一日得也軾在郡時常令三十六冶每户㸃集冶夫數十人持劫刃槍每月兩衙於知監之庭以示有備而已此地蓋常為京東豪猾之所擬公所宜知因程棐事輒復及之秋冷伏冀為國自重謝張太保撰先人墓碣書蘇軾伏䝉再示先人墓表特載辨姦一篇恭覽涕泗不知所云竊惟先人早嵗汨沒晚乃有聞雖當時賢者知師尊之然於其言語文章猶不能盡而况其中之不可形者乎所謂知之盡而信其然者舉世惟公一人雖若不幸然知我者希正老氏之所貴辨姦之始作也自軾與舍弟皆有嘻其甚矣之諫不論他人獨明公一見以為與我意合公固已論之先朝載之史冊今雖容有不知後世决不可沒而先人之言非公表而出之則人未必信信不信何足深計然使斯人用區區小數以欺天下天下莫覺莫知恐後世必有秦無人之歎此墓表之所以作而軾之所以流涕再拜而謝也黃叔度淡然無作郭林宗一言至今以為顔子林宗於人材小大畢取所賢非一人而叔度之賢無一見於外者而後世猶信徒以林宗之重也今公之重不减林宗所賢惟先人而其心迹粗若可見其信於後世必矣多言何足為謝聊發一二福州上執政書曽鞏鞏頓首再拜上書某官竊以先王之迹去今逺矣其可槩見者尚存於詩詩存先王養士之法所以撫循待遇之者恩意可謂備矣故其長育天下之材使之成就則如蘿蒿之在大陵無有不遂其賓而接之出於懇誠則如鹿鳴之相呼召其聲音非自外至也其燕之則有飲食之具樂之則有琴瑟之音將其厚意則有幣帛筐篚之贈要其大㫖則未嘗不在於得其歡心其人材既衆列于庶位則如棫朴之盛得而薪之其以為使臣則寵其往也必以禮樂使其光華皇皇於逺近勞其來也則既知其功又本其情而敘其勤其以為將率則其於行也既送遣之又識薇蕨之始生而恐其歸時之晚及其還也既休息之又追念其悄悄之憂而及於僕夫之瘁當此之時后妃之於內助又知臣下之勤勞其憂思之深至於山脊石阻僕馬之間而志意之一至於雖采卷耳而心不在焉蓋先王之世待天下士其勤且詳如此故稱周之士也貴又稱周之士也肆而天保亦稱君能下下以成其政臣能歸美以報其上其君臣上下相與之際如此可謂至矣所謂必本其情而敘其勤者在四牡之三章曰王事靡盬不遑將父四章曰王事靡盬不遑將母而其卒章則曰豈不懷歸是用作歌將母來諗釋者以為諗告也君勞使臣敘述其情曰豈不誠思歸乎故作此詩之歌以養父母之志來告其君也既休息矣而又追敘其情如此者繇是觀之上之所以接下未嘗不恐失其養父母之心下之所以事上有養父母之心未嘗不以告也其勞使臣之辭則然而推至於戍役之人亦勞之以王事靡盬憂我父母則先王之政即人之心莫大於此也及其後世或任使不均或苦於征役而不得養其父母則有北山之感鴇羽之嗟或行役不已而父母兄弟則有陟岵之思詩人皆推其意見於國風所謂發乎情止乎禮義者也伏惟吾君有出於數千載之大志方興先王之治以上繼三代吾相於時皆同德合謀則所以待天下之士者豈異於古士之出於是時者豈有不得盡其志耶鞏獨何人幸遇兹日鞏少之時尚不敢飾其固陋之質以干當世之用今髮齒日衰聰明日耗今其至愚固不敢有徼進之心况其少有知邪轉走五郡蓋十年矣未嘗敢有半言片辭求去邦域之任而冀陪朝廷之儀此鞏之所以自處竊計已在聽察之日久矣今輒以其區區之腹心敢布於下執事者誠以鞏年六十老母年八十有八老母寓食京師而鞏守閩越仲弟守南越南越者天下之逺處也於著令有一人仕於此二邦者同居之親當逺仕者皆得不行鞏固不敢為不肖之身求自比於是也顧以道里之阻既不可御老母而南則非獨省晨昏承顔色不得效其犬馬之愚至於書問往還蓋以萬里非纍月踰時不通此白首之母子所以義不可以茍安恩不可以茍止者也方去嵗之春有此邦之命鞏敢以情告於朝而詔報不許屬閩有盜賊之事因不敢繼請及去秋到職閩之餘盜或數十百為曹伍者往往蟻聚於山谷桀黠能動衆為魁首者又以十數相望於州縣閩之室廬莫能寧而逺近聞者亦莫不疑且駭也州屬邑又有出於饑旱之後鞏於此時又不敢以私計自陳其於寇孽屬前日之纍敗士氣既奪而吏亦無可屬者其於經營既不敢以輕動迫之又不敢以少縱玩之一則諭以招納一則戒以剪除既而其悔悟者自相執拘以歸其不變者亦為士吏之所係獲其魁首則或縻而致之或殱而去之自冬至春逺近皆定亭無枹鼓之警里有室家之樂士氣始奮而人和始洽至於風雨時若田出自倍今野行海涉不待朋儔市粟而來價减什七此皆吾君吾相至仁元澤覆冒所及故寇旱之餘曽未期嵗既安且富至於如此鞏與斯民與䝉其幸地方數十里既無一事繫官於此又已彌年則可以將母之心告於吾君吾相未有易於此時也伏惟推古之所以待士之詳思勞歸之詩本士大夫之情而及於其親逮之以即乎人心之安或還之闕下或處以閒曹或引之近畿屬以一郡使得諧其就養之心慰其髙年之母則仁治之行豈獨昏愚得䝉賜於今日其流風餘法傳之永久後世之士且將賴此以無北山之怨鴇羽之譏陟岵之歎蓋行之甚易為德於士類者甚廣惟留意而圖之不宣鞏頓首答韶州張殿丞書王安石某啓伏䝉再賜書示及先君韶州之政為吏民稱誦至今不絶傷今之士大夫不盡知又恐史官不能記載以次前世良吏之後此皆不肖之孤言行不足信於天下不能推揚先人之功緒餘烈使人人得聞知之所以夙夜愁痛疚心疾首而不敢息者以此也先人之存某尚少不得備聞為政之迹然常侍左右尚能記誦教誨之餘蓋先君所存嘗欲大潤澤於天下一物枯槁以為身羞大者既不得試已試乃其小者耳小者又將泯沒而無傳則不肖之孤罪大釁厚矣尚何以自立於天地之間邪閣下勤勤惻惻以不傳為念非夫仁人君子樂道人之善安能以及此自三代之時國各有史而當時之史多世其家往往以身死職不負其意蓋其所傳皆可考據後既無諸侯之史而近世非尊爵盛位雖雄竒雋烈道德滿衍不幸不為朝廷所稱輒不得見於史而執筆者又雜出一時之貴人觀其在廷論議之時人人得講其然否尚或以忠為邪以異為同誅當前而不栗訕在後而不羞茍以饜其忿好之心而止耳而况隂挾翰墨以裁前人之善惡疑可以貸褒似可以附毁往者不能訟當否生者不得論曲直賞罰謗譽又不施其間以彼其私獨安能無欺於冥昧之間邪善既不盡傳而傳者又不可盡信如此唯能言之君子有大公至正之道名實足以信後世者耳目所遇一以言載之則遂以不朽於無窮耳伏惟閣下於先人非有一日之雅餘論所及無黨私之嫌茍以發潛德為己事務推所聞告世之能言而足信者使得論次以傳焉則先君之不得列於史官豈有恨哉答吕吉甫書李定某啓與公同心以至異意皆緣國事豈有他哉同朝紛紛公獨助我則我何憾於公人或言公吾無與焉則公何尤於我趨時便事吾不知其說焉考實論情公宜昭其如此開喻重悉覽之悵然昔之在我者誠無細故之可疑則今之在公者尚何舊惡之足念然公以壯烈方進為於聖世而某薾然衰疢特待盡於山林趣舍異路則相詬以濕不如相忘之愈也想趨召在朝夕惟良食為時自愛文編卷五十

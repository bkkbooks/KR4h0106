body:
  text: 文編卷一明唐順之編董仲舒對賢良策一漢書制曰朕獲承至尊休德傳之亡窮而施之罔極任大而守重是以夙夜不皇康寧永惟萬事之統猶懼有闕故廣延四方之豪雋郡國諸侯公選賢良修潔博習之士欲聞大道之要至論之極今子大夫褎然為舉首朕甚嘉之子大夫其精心致思朕垂聽而問焉蓋聞五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫盛於韶於周莫盛於勺聖王已沒鐘鼓管絃之聲未衰而大道微缺陵夷至乎桀紂之行王道大壞矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆然猶不能反日以仆滅至後王而後止豈其所持操或悖謬而失其統與固天降命不可復反必推之於大衰而後息與嗚呼凡所為屑屑夙興夜寐務法上古者又將無補與三代受命其符安在災異之變何緣而起性命之情或夭或壽或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何修何飭而膏露降百穀登德潤四海澤臻草木三光全寒暑平受天之祐享神鬼之靈德澤洋溢施乎方外延及羣生子大夫明先聖之業習俗化之變終始之序講聞髙誼之日久矣其明以諭朕科别其條勿猥勿并取之於術慎其所出乃其不正不直不忠不極枉於執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隱朕將親覽焉對曰陛下發德音下明詔求天命與情性皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大亡道之世天盡欲扶持而全安之事在彊勉而已矣彊勉學問則聞見博而知益明彊勉行道則德日起而大有功此皆可使還至而立有效者也詩曰夙夜匪解書曰茂哉茂哉皆彊勉之謂也道者所繇適於治之路也仁義禮樂皆其具也故聖王已沒而子孫長久安寧數百嵗此皆禮樂教化之功也王者未作樂之時乃用先王之樂宜於世者而以深入教化於民教化之情不得雅頌之樂不成故王者功成作樂樂其德也樂者所以變民風化民俗也其變民也易其化民也著故聲發於和而本於情接於肌膚藏於骨髓故王道雖微缺而管絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之德興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱誦至今不絶此夙夜不解行善之所致也孔子曰人能𢎞道非道𢎞人也故治亂廢興在於已非天降命不可得反其所操持悖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏此蓋受命之符也周公曰復哉復哉孔子曰德不孤必有鄰皆積善纍德之效也及至後世淫泆衰微不能統理羣生諸矦背畔殘賊良民以爭壤土廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜于上上下不和則隂陽繆盩而妖孽生矣此災異所緣而起也臣聞命者天之令也性者生之質也情者人之欲也或夭或壽或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之德風小人之德草草上之風必偃故堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄綏之斯徠動之斯和此之謂也臣謹案春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云耳然則王者欲有所為宜求其端於天天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育長飬為事隂常居大冬而積于空虛不用之處以此見天之任德不任刑也天使陽出布施于上而主嵗功使隂入伏于下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成歲為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也今廢先王德教之官而獨任執法之吏治民毋乃任刑之意與孔子曰不教而誅謂之虐虐政用於下而欲德教之被四海故難成也臣謹按春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深採其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一於正而亡有邪氣奸其間者是以隂陽調而風雨時羣生和而萬民殖五穀熟而草木茂天地之閒被潤澤而大豐美四海之內聞盛德而皆徠臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢又有能致之資行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而奸邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明於此是故南面而治天下莫不以教化為大務立太學以教於國設庠序以化於邑漸民以仁摩民以義節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百嵗尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之其心欲盡滅先聖之道而顓為自恣茍簡之治故立為天子十四嵗而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冒殊扞孰爛如此之甚者也孔子曰腐朽之木不可雕也糞土之牆不可杇也今漢繼秦之後如朽木糞牆矣雖欲善治之亡可奈何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚亡益也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也古人有言曰臨淵羡魚不如退而結網今臨政而願治七十餘嵗矣不如退而更化更化則可善治善治則災害日去福祿日來詩云宜民宜人受祿于天為政而宜於民者固當受祿于天夫仁誼禮知信五常之道王者所當修飾也五者修飾故受天之祐而亨鬼神之靈德施于方外延及羣生也董仲舒對賢良䇿二漢書制曰蓋聞虞舜之時遊於巖廊之上垂拱無為而天下太平周文王至於日昃不暇食而宇內亦治夫帝王之道豈不同條共貫與何逸勞之殊也蓋儉者不造𤣥黃旌旗之飾及至周室設兩觀乘大路朱干玉戚八佾陳於庭而頌聲興夫帝王之道豈異指哉或曰良玉不瑑又云非文亡以輔德二端異焉殷人執五刑以督姦傷肌膚以懲惡成康不式四十餘年天下不犯囹圄空虛秦國用之死者甚衆刑者相望耗矣哀哉鳴呼朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在力本任賢今朕親耕籍田以為農先勸孝弟崇有德使者冠蓋相望問勤勞恤孤獨盡思極神功烈休德未始云獲也今隂陽錯繆氛氣充塞羣生寡遂黎民未濟廉恥貿亂賢不肖渾殽未得其真故詳延特起之士意庶幾乎今子大夫待詔百有餘人或道世務而未濟稽諸上古而不同考之于今而難行毋乃牽於文繫而不得騁與將所繇異術所聞殊方與各悉對著于篇毋諱有司明其指略切磋究之以稱朕意對曰臣聞堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔德賢能佐職教化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道故孔子曰如有王者必世而後仁此之謂也堯在位七十載乃遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡美矣又盡善也此之謂也至于殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入于河海天下耗亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭太顛散宜生等亦聚于朝廷愛施兆民天下歸之故太公起海濵而即三公也當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉由此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也此之謂也臣聞制度文采𤣥黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不遜儉則固儉非聖人之中制也臣聞良玉不瑑資質潤美不待刻瑑此亡異於達巷黨人不學而自知也然則常玉不瑑不成文章君子不學不成其德臣聞聖王之治天下也少而習之學長則材諸位爵祿以飬其德刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此教化之漸而仁誼之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之說憎帝王之道以貪狠為俗非有文德以教訓於天下也誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾虛辭而不顧實外有事君之禮內有背上之心造僞飾詐趣利無恥又好用􅉃酷之吏賦斂亡度竭民財力百姓散亡不得從耕織之業羣盜並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰道之以政齊之以刑民免而無恥此之謂也今陛下并有天下海內莫不率服廣覽兼聽極羣下之知盡天下之美至德昭然施於方外夜郎康居殊方萬里說德歸誼此太平之致也然而功不加於百姓者殆王心未加焉曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在於他在乎加之意而已願陛下因用所聞設誠於內而致行之則三王何異哉陛下親耕籍田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素飬士而欲求賢譬猶不瑑玉而求文采也故飬士之大者莫大乎太學太學者賢士之所關也教化之本原也今以一郡一國之衆無應詔書者是王道往往而絶也臣願陛下興太學置明師以飬天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主德不宣恩澤不流今吏既亡教訓於下或不承用主上之法暴虐百姓與姦為市貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非謂積日纍久也故小材雖纍日不離於小官賢才雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然纍日以取貴積久以致官是以廉恥貿亂賢不肖混淆未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也遍得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官録德而定位則廉恥殊路賢不肖異處矣陛下加惠寬臣之罪令勿牽制於文使得切磋究之臣敢不盡愚董仲舒對賢良䇿三漢書制曰蓋聞善言天者必有徵於人善言古者必有驗於今故朕垂問乎天人之應上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改今子大夫明於隂陽所以造化習於先聖之道業然而文采未極豈惑乎當世之務哉條貫靡竟統紀未終意朕之不明與聽若眩與夫三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之孰之復之詩不云乎嗟爾君子毋常安息神之聽之介爾景福朕將親覽焉子大夫其茂明之對曰臣聞論語曰有始有卒者其唯聖人乎今陛下幸加惠留聽於承學之臣復下明冊以切其意而究盡聖德非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也䇿曰善言天者必有徵於人善言古者必有驗於今臣聞天者羣物之祖也故遍覆包函而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私布德施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以飬也霜者天之所以殺也刑者君之所以罰也繇此言之天人之徵古今之道也孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一端也古者修教訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不修亡以化民民以故棄仁誼而死財利是以犯法而罪多一嵗之獄以萬千數以此見古之不可不用也故春秋變古則譏之天令之謂命命非聖人不行質朴之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹於承天意以順命也下務明教化民以成性也正法度之宜别上下之序以防欲也修此三者而大本舉矣人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長幼之施粲然有文以相接歡然有恩以相愛此人之所以貴也生五穀以食之桑麻以衣之六畜以飬之服牛乘馬圈豹檻虎是其得天之靈貴於物也故孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子故孔子曰不知命亡以為君子此之謂也策曰上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改臣聞衆少成多積小致巨故聖人莫不以暗致明以微致顯是以堯發於諸侯舜興乎深山非一日而顯也蓋有漸以致之矣言出於已不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著詩云惟此文王小心翼翼故堯兢兢日行其道而舜業業日致其孝善積而名顯德章而身尊此其寖明寖昌之道也積善在身猶長日加益而人不知也積惡在身猶火銷膏而人不見也非明乎情性察乎流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如景鄉之應形聲也故桀紂暴慢讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天終陵夷而大壞夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也䇿曰三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道道者萬世亡弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以救溢扶衰所遭之變然也故孔子曰無為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之救當用此也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者陛下有明德嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論誼考問將欲興仁誼之休德明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言厪能勿失耳若乃論政事之得失察天下之息耗此大臣輔佐之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民亡盜賊囹圄空虛德潤草木澤被四海鳳凰來集麒麟來游以古凖今一何不相逮之逺也安所繆盩而陵夷若是意者有所失於古之道與有所詭於天之理與試迹之古返之於天儻可得見乎夫天亦有所分豫豫之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所豫祿者不食於力不動於末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而况人乎此民之所以囂囂苦不足也身寵而載髙位家溫而食厚祿因乘富貴之資力以與民爭利於下民安能如之哉是故衆其奴婢多其牛羊廣其田宅博其産業畜其積委務此而亡已以迫蹴民民日削月朘寖以大窮富者奢侈羡溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵愠而拔其葵曰吾已食祿又奪園夫紅女利乎古之賢人君子在列位者皆如是是故下髙其行而從其教民化其廉而不貪鄙及至周室之衰其卿大夫緩於義而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山惟石巖巖赫赫師尹民具爾瞻爾好義則民鄉仁而俗善爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效逺方之所四面而內望也近者視而放之逺者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之說滅息然後統紀可一而法度可明民知所從矣文編卷一

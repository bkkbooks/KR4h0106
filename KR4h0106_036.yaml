body:
  text: 文編卷三十六明唐順之編改葬服議韓愈經曰改葬緦春秋穀梁傳亦曰改葬之禮緦舉下緬也此皆謂子之于父母其他則皆無服何以識其必然經次五等之服小功之下然後著改葬之制更無輕重之差以此知惟記其最親者其他無服則不記也若主人當服斬衰其餘親各服其服則經亦言之不當惟云緦也傳稱舉下緬者緬猶逺也下謂服之最輕者也以其逺故其服輕也江熙曰禮天子諸侯易服而葬以為交于神明者不可以純凶况其緬者乎是故改葬之禮其服惟輕以此而言則亦明矣衛司徒文子改葬其叔父問服于子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又其著者也文子又曰喪服既除然後乃葬則其服何服子思曰三年之喪未葬服不變除何有焉然則改葬與未葬者有異矣古者諸侯五月而葬大夫三月而葬士逾月無故未有過時而不葬者也過時而不葬謂之不能葬春秋譏之若有故而未葬雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以是知其至少也改葬者為山崩水涌毁其墓及葬而禮不備者若文王之葬王季以水齧其墓魯隱公之葬惠公以有宋師太子少葬故有闕之類是也喪事有進而無退有易以輕服無加以重服殯于堂則謂之殯瘞于野則謂之葬近代以來事與古異或游或仕在千里之外或子幼妻稚而不能自還甚者拘以隂陽畏忌遂葬于其土及其返葬也逺者或至數十年近者亦出三年其吉服而從于事也久矣又安可取未葬不變服之例而反為之重服歟在喪當葬猶宜易以輕服况既逺而反純凶以葬乎若果重服是所謂未可除而除不當重而更重也或曰喪與其易也寧戚雖重服不亦可乎曰不然易之與戚則易固不如戚矣雖然未若合禮之為懿也儉之與奢則儉固愈于奢矣雖然未若合禮之為懿也過猶不及其此類之謂乎或曰經稱改葬緦而不著其月數則似三月而後除也子思之對文子則曰既葬而除之今宜如何曰自啓至于既葬而三月則除之未三月則服以終三月也曰妻為夫何如曰如子無弔服而加麻則何如曰今之弔服猶古之弔服也省試學生代齊郎議韓愈齊郎職奉宗廟社稷之小事蓋士之賤者也執豆籩駿奔走以役于其官之長不以德進不以言揚蓋取其人力以備其事而已矣奉宗廟社稷之小事執豆籩駿奔走亦不可以不敬也于是選大夫士之子弟未爵命者以塞員填闕而教之行事而勤雖小其使之不可以不報也必書其嵗嵗既久矣于是乎命之以官而授之以事其亦微矣哉學生或以通經舉或以能文稱其微者至于習法律知字書皆有以贊于教化可以使令于上者也自非天姿茂異曠日經久以所進業發聞于鄉閭稱道于朋友薦于州府而升之司業則不可得而齒乎國學矣然則奉宗廟社稷之小事任力之小者也贊于教化可以使令于上者德藝之大者也其亦不可移易明矣今議者謂學生之無所事謂齊郎之幸而進不本其意因謂可以代任其事而罷之蓋亦不得其理矣今夫齊郎之所事者力也學生之所事者德與藝也以德藝舉之而以力役之是使君子而服小人之事且非國家崇儒勸學誘人為善之道也此一說不可者也抑又有大不可者焉宗廟社稷之事雖小不可以不専敬之至也古之道也今若以學生兼其事及其嵗時日月然後授其宗彞罍洗其周旋必不合度其進退必不得宜其思慮必不固其容貌必不莊此其無他其事不習而其志不専故也非近于不敬者歟又有大不可者其是之謂歟若知此不可將令學生恆掌其事而隳壞其本業則是學生之教加少學生之道益貶而齊郎之實猶在齊郎之名茍無也大凡制度之改政令之變利于其舊不什則不可為已又况不如其舊哉考之于古則非訓稽之于今則非利尋其名而求其實則失其宜故曰議罷齊郎而以學生薦享亦不得其理矣講官議曽鞏孔子之語教人曰不憤悱不啓發舉一隅不以三隅反則不告也孟子之語教人曰有答問者荀子之語教人曰不問而告謂之傲問一而告二謂之囋傲非也囋非也君子如嚮故禮無往教而有待問則師之道有問而告之者爾世之挾書而講者終日言而非有問之者也乃不自知其强聒而欲以師自任何其妄也古之教世子之法太傅審父子君臣之道以示之少傅奉世子以觀太傅之德行而審喻之則示之以道者以審喻之為淺故不為也况于師者何為也哉正己而使觀之者化爾故得其行者或不得其所以行得其言者或不得其所以言也仰之而彌髙鑽之而彌堅德如是然後師之道盡故天子不得而名也諸侯不得而友也又况得而臣之乎此伊尹太公子思孟子之徒所以忘人之勢而唐虞三代大有為之君所以忘其勢也世之挾書而講于禁中者官以侍為名則其任故可知矣乃自以謂吾師道也宜坐而講以為請于上其為說曰必如是然後合于古之所謂坐而論道者也夫坐而論道謂之三公作而行之謂之卿大夫語其任之無為與有為非以是為尊師之道也且禮于朝王及羣臣皆立無獨坐者于燕皆坐無獨立者故坐未嘗以為尊師之禮也昔晉平公之于亥唐坐云則坐曽子之侍仲尼子曰參復坐則坐云者蓋師之所以命學者未有果師道也顧僕僕然以坐自請者也則世之為此者非妄歟故為此議以解其惑晉文公問守原議栁宗元晉文公既受原于王難其守問寺人勃鞮以畀趙衰余謂守原政之大者也所以承天子樹霸功致命諸侯不宜謀及媟近以忝王命而晉君擇大任不公議于朝而私議于宫不博謀于卿相而獨謀之寺人雖獲衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣况當其時不乏言議之臣乎狐偃為謀臣先軫將中軍晉君疏而不咨外而不求乃卒定于內豎其可以為法乎且晉君將襲齊桓之業以翼天子乃大志也然而齊桓任管仲以興進豎刁以敗則獲原啓疆適其始政所以觀視諸侯也而乃背其所以興跡其所以敗然而能霸諸侯者以土則大以力則强以義則天子之冊也誠畏之矣烏能得其心服哉其後景監得以相衛鞅𢎞石得以殺望之誤之者晉文公也嗚呼得賢臣以守大邑則非失舉也蓋失問也然猶羞當時陷後代若此况于問與舉又兩失者其何以救之哉余故著晉君之罪以附春秋許世子止趙盾之義公族議曽鞏天子之適子繼世以為天子其别子皆為諸侯諸侯之適子繼世以為諸侯其别子各為其國之卿大夫皆有采地别子之適子繼世以食其采地其族人百世宗之此之謂大宗其别子亦各仕於其國為卿大夫其適子兄弟宗之五世而止此之謂小宗蓋天子之適子繼世以為天子其别子世為諸侯諸侯之適子繼世以為諸侯其别子各為其國之卿大夫世世食采地皆傳於無窮夫豈有服盡而絶其祿位衣食嫁娶使之自謀者乎非特如此也昔周公兼制天下立七十一國姬姓居五十三人蓋兄弟之國者十有五人姬姓之國者四十人其可見者則管蔡郕霍魯衛毛聃郜雍曹滕畢原豐郇邘晉應韓凡蔣邢茅胙祭之屬是也其稱兄弟之國者十有五人則周之近屬其稱姬姓之國者四十人則周之同姓而已其爵命之使傳國至於無窮夫豈以服為斷乎至於宗廟之數天子七諸侯五而祭法虞夏商周禘郊祖宗逺或至於數十世之上亦皆未嘗以服為斷也其推而上之報本於祖宗至不可為數推而下之廣骨肉之恩至於無窮蓋其積厚者其流澤逺有天下之功者受天下之報其理勢次序固然也是豈可以拘於常見議於錙銖之內乎故服盡而戚單者所以節人之常情而為大宗小宗之數安可以論帝者之功德而為廣親親之法乎昔武王克商未及下車而封黃帝唐虞之後下車而封夏商之後其在異代尚特顯之其急如此况受重於祖宗推原功德之所自出其可以天下之大而儉於骨肉之恩以不滿足海內之望乎孟子曰仁人之於兄弟也親愛之而已矣親之欲其貴也愛之欲其富也先王推是心以及於同姓之間故有土分之有民分之有寶玉分之有寶器分之成王康王之言曰吾無専享文武之功是皆無所不盡其厚未有從夫略者也蓋詩裳裳者華刺時棄賢者之類絶功臣之世而傳欒郤胥原狐續慶伯陪臣之族爾其降在皂𨽻叔向亦以為晉國之憂况於帝者之功德與天地等而可使七八世之子孫夷於閭巷之凡民乎後世公族無封國采地之制而有列於朝有賜於府是亦親而貴之愛而富之之意也其名書於宗籍者繁衍盛大實國家之慶有司雖費非多於天下之國七十有一而姬姓獨居者五十三人其亦求中以節之而已矣顧令袒免以外毋與官衣食嫁娶使之自謀是亦不考於古矣何其野於禮也以世莫能辨故作公族議使好學者得詳焉為人後議曽鞏禮大宗無子則族人以支子為之後為之後者為所後服斬衰三年而降其父母朞禮之所以如此者何也以謂人之所知者近則知親愛其父母而已所知者逺則知有嚴父之義知有嚴父之義則知尊祖知尊祖則知大宗者上以繼祖下以收族不可以絶故有以支子為之後者為之後者以受重於斯人故不得不以尊服服之以尊服服之而不為之降己親之服則猶恐未足以明所後者之重也以尊服服之又為之降己親之服然後以謂可以明所後者之重而繼祖之道盡此聖人制禮之義也夫所謂收族者記稱與族人合食序以昭穆别以禮義之類是特諸侯别子之大宗而嚴之如此况如禮所稱天子及其始祖之所自出者此天子之大宗是為天地宗廟百神祭祀之主族人萬世之所依歸而可以不明其至尊至重哉故前世人主有以支子繼立而崇其本親加以號位立廟奉祀者皆見非於古今誠由所知者近不能割棄私愛節之以禮故失所以奉承正統尊無二上之意也若於所後者以尊服服之又為之降己親之服而退於己親號位不敢以非禮有加也廟祀不敢以非禮有奉也則為至恩大義固已備矣而或謂又當易其父母之名從所後者為屬是未知考於禮也禮為人後者為所後者之祖父母父母妻之父母昆弟昆弟之子若子者此其服為所後者而非其為己也為其父母朞為其昆弟大功為其姊妹適人者小功皆降本服一等者此其服為己而非為所後者也使於其父母服則為己名則為所後者則是名與實相違服與恩相戾矣聖人制禮不如是之舛也且自古為人後者不必皆親昆弟之子族人之同宗者皆可為之則有以大功小功昆弟之子而為之者矣有以緦麻袒免無服昆弟之子而為之者矣若當從所後者為屬則亦當從所後者為服從所後者為服則於其父母有宜為大功為小功為緦麻為袒免為無服者矣而聖人制禮皆為其父母朞使足以明所後者重而己非遂以謂當變其親也親非變則名固不得而易矣戴德王肅喪記曰為人後者為其父母降一等服齊衰朞其服之節居倚廬言語飲食與父在為母同其異者不祥不禫雖除服心喪三年故至於今著於服令未之有改也豈有制服之重如此而其名遂可以絶乎又崔凱喪服駮曰本親有自然之恩降一等則足以明所後者為重無緣乃絶之矣夫未嘗以謂可以絶其親而輒謂可以絶其名是亦惑矣且支子所以後大宗者為推其嚴父之心以尊祖也顧以尊祖之故而不父其父豈本其恩之所由生而先王教天下之意哉又禮適子不可為人後者以其傳重也支子可以為人後者以非傳重也使傳重者後己宗非傳重者後大宗其意可謂即乎人心而使之兩義俱安也今若使為人後者以降其父母之服一等而遂變革其名不以為父母則非使之兩義俱安而不即乎人心莫大乎如是也夫人道之於大宗至尊至重不可以絶尊尊也人子之於父母亦至尊至重不可以絶親親也尊尊親親其義一也未有可廢其一者故為人後者為之降其父母之服禮則有之矣為之絶其父母之名則禮未之有也或以謂欲絶其名者蓋惡其為二而欲使之為一所以使為人後者之道盡也夫迹其實則有謂之所後有謂之所生制其服則有為己而非為所後者有為所後而非為己者皆知不可以惡其為二而强使之為一也至於名者蓋生於實也乃不知其不可以惡其為二而欲强使之為一是亦過矣藉使其名可以强使之為一而迹其實之非一制其服之非一者終不可以易則惡在乎欲絶其名也故古之聖人知不可以惡其為二而强使之為一而能使其屬之疏者相與為重親之厚者相與為輕則以禮義而已矣何則使為人後者於其所後非己親也而為之服斬衰三年為其祭主是以義引之也於其所生實己親也而降服齊衰朞不得與其祭是以禮厭之也以義引之則屬之疏者相與為重以禮厭之則親之厚者相與為輕而為人後之道盡矣然則欲為人後之道盡者在以禮義明其內而不在於惡其為二而强易其名於外也故禮喪服齊衰不杖朞章曰為人後者為其父母報此見於經為人後者於其本親稱父母之明文也漢蔡義以謂宣帝親諡宜曰悼魏相以為宜稱尊號曰皇考立廟後世議者皆以其稱皇立廟為非至於稱親稱考則未嘗有以為非者也其後魏明帝尤惡為人後者厚其本親故非漢宣加悼考以皇號又謂後嗣有由諸侯入繼正統者皆不得謂考為皇稱妣為后蓋亦但禁其猥加非正之號而未嘗廢其考妣之稱此見於前世議論為人後者於其本親稱考妣之明文也又晉王坦之喪服議曰罔極之重非制教之所裁昔日之名非一朝之所去此出後之身所以有服本親也又曰情不可奪名不可廢崇本叙恩所以為降則知為人後者未有去其所出父母之名此古今之常理故坦之引以為制服之證此又見於前世議論為人後者於其本親稱父母之明文也是則為人後者之親見於經見於前世議論謂之父母謂之考妣者其大義如此明文如此至見於他書及史官之記亦謂之父母謂之考妣謂之私考妣謂之本親謂之親者則不可一二數而以為世父叔父者則不特禮未之有載籍已來固未之有也今欲使從所後者為屬而變革其父母之名此非常異議也不從經文與前世數千載之議論亦非常異議也而無所考據以持其說將何以示天下乎且中國之所以為貴者以有父子之道又有六經與前世數千載之議論以治之故也今忽欲棄之而伸其無所考據之說豈非誤哉或謂為人後者於其本親稱父母則為兩統二父其可乎夫兩統二父者謂加考以皇號立廟奉祀是不一於正統懷二於所後所以著其非而非謂不變革其父母之名也然則加考以皇號與禮及世之稱皇考者有異乎曰皇考一名而為說有三禮曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟是以皇考為曽祖之廟號也魏相謂漢宣帝父宜稱尊號曰皇考既非禮之曽祖之稱又有尊號之文故魏明帝非其加悼考以皇號至於光武亦於南頓君稱皇考廟義出於此是又以加皇號為事考之尊稱也屈原稱朕皇考曰伯庸又晉司馬機為燕王告禰廟文稱敢昭告於皇考清惠亭侯是又達於羣下以皇考為父殁之通稱也以為曽祖之廟號者於古用之以為事考之尊稱者於漢用之以為父沒之通稱者至今用之然則稱之亦有可有不可者乎曰以加皇號為事考之尊稱者施於為人後之義是干正統此求之於禮而不可者也達於羣下以皇考為父沒之通稱者施於為人後之義非干正統此求之於禮而可者也然則以為父沒之通稱者其不可如何曰若漢哀帝之親稱尊號曰恭皇安帝之親稱尊號曰孝德皇是又求之於禮而不可者也且禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也前世失禮之君崇本親以位號者豈獨失為人後奉祀正統尊無二上之意哉是以子爵父以卑命尊亦非所以尊厚其親也前世崇飭非正之號者其失如此而後世又謂宜如朞親故事增官廣國者亦可謂皆不合於禮矣夫考者父沒之稱然施於禮者有朝廷典冊之文有宗廟祝祭之辭而已若不加位號則無典冊之文不立廟奉祀則無祝祭之辭則雖正其名豈有施於事者顧言之不可不順而已此前世未嘗以為可疑者以禮甚明也今世議者紛紛至於曠日纍時不知所決者蓋由不考於禮而率其私見也故采於經列其㫖意庶得以商榷焉文編卷三十六

body:
  text: 文編巻十明唐順之編魏相條國家便宜奏漢書臣聞明主在上賢輔在下則君安虞而民和睦臣相幸得備位不能奉明法廣教化理四方以宣聖徳民多背本趨末或有饑寒之色為陛下之憂臣相罪當萬死臣相知能淺薄不明國家大體時用之宜惟民終始未得所繇竊伏觀先帝聖徳仁恩之厚勤勞天下垂意黎庶憂水旱之災為民貧窮發倉廩振乏餒遣諫大夫博士巡行天下察風俗舉賢良平寃獄冠葢交道省諸用寛租賦弛山澤陂池禁秣馬酤酒貯積所以周急繼困慰安元元便利百姓之道甚備臣相不能悉陳昧死奏故事詔書凡二十三事臣謹案王法必本於農而務積聚量入制用以備凶災亡六年之畜尚謂之急元鼎三年平原渤海太山東郡溥被災害民饑死于道路二千石不豫慮其難使至于此賴明詔振捄乃得䝉更生今嵗不登穀暴騰踴臨秋収歛猶有乏者至春恐甚亡以相恤西羌未平師旅在外兵革相乘臣竊寒心宜蚤圖其備唯陛下留神元元帥繇先帝盛德以撫海内趙充國上屯田奏一漢書臣聞兵者所以明德除害也故舉得於外則福生於内不可不慎臣所將吏士馬牛食月用糧穀十九萬九千六百三十斛鹽千六百九十三斛茭藳二十五萬二百八十六石難久不解繇役不息又恐它夷卒有不虞之變相因並起為明主憂誠非素定廟勝之策且羌虜易以計破難用兵碎也故臣愚以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其間郵亭多壞敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南步兵與吏士私從者合凡萬二百八十一人用穀月二萬七千三百六十三斛鹽三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠治湟陿以西道橋七十所令可至鮮水左右田事出賦人二十畮至四月草生發郡騎及属國胡騎伉健各千倅馬什二就草為田者遊兵以充入金城郡益積畜省大費令大司農所轉穀至者足支萬人一歲食謹上田處及器用簿惟陛下裁許趙充國上屯田奏二漢書臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草薦草稠草也愁於寄託遠遯骨肉心離人有畔志而明主般師罷兵萬人留田順天時因地利以待可勝之敵雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也臣謹條不出兵留田便宜十二事步兵九校吏士萬人留屯以為武備因田致穀威徳並行一也又因排折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支甲士一歲罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以眎羌虜揚威武傳世折衝之具五也以閒暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墮之患坐得必勝之道七也亡經阻逺追死傷之害八也内不損威武之重外不令虜得乘間之埶九也又亡驚動河南大开小开使生他變之憂十也治湟陿中道橋令可至鮮水以制西域信威千里從枕席上過師十一也大費既省徭役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長策惟明詔博詳公卿議臣採擇趙充國上屯田奏三漢書臣聞兵以計為本故多筭勝少筭先零羌精兵今餘不過七八千人失地逺客分散饑凍䍐开莫須又頗暴略其羸弱畜産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為虜破壞可日月冀逺在來春故曰兵決可期月而望竊見北邊自燉煌至遼東萬一千五百餘里乗塞列隧有吏卒數千人虜數大衆攻之而不能害今留步士萬人屯田地埶平易多高山遠望之便部曲相保為塹壘木樵與譙同謂高樓望敵校聨不絶便兵弩飭鬭具㷭火幸通埶及并力以逸待勞兵之利者也臣愚以為屯田内有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸徳宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子于它種中遠涉河山而來為寇又見屯田之士精兵萬人終不敢復將其累重還歸故地是臣之愚計所以度虜且必瓦解其處不戰而自破之策也至于虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不茍接刃攻不必取不茍勞衆誠令兵出雖不能滅先零亶能令虜絶不為小寇則出兵可也即今同是而釋坐勝之道從乗危之埶往終不見利空内自罷敝貶重而自損非所以視蠻夷也又大兵一出還不可復留湟中亦未可空如是徭役復發也且匈奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以贍一隅臣愚以為不便校尉臨衆幸得承威德奉厚幣撫循衆羌諭以明詔宜皆鄉風雖其前辭嘗曰得亡效五年宜亡它心不足以故出兵臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲于山埜雖亡尺寸之功媮得避慊之便而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅辠當萬死陛下寛仁未忍加誅令臣數得孰計愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚惟陛下省察劉向上星孛等奏漢書臣聞帝舜戒伯禹毋若丹朱傲周公戒成王毋若殷王紂詩曰殷監不遠在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚惟陛下留神察焉謹按春秋二百四十二年日食三十六襄公尤數率三嵗五月有竒而一食漢興訖竟寧孝景帝尤數率三嵗一月而一食臣向嘗數言日當食今連三年比食自建始以來二十嵗間而八食率二嵗六月而一發古今罕有異有小大希稠占有舒疾緩急而聖人所以斷疑也易曰觀乎天文以察時變昔孔子對魯哀公並言夏桀殷紂暴虐天下故厯失則攝提失方孟陬亡紀此皆易姓之變也秦始皇之末至二世時日月薄食山陵淪亡辰星出于四孟太白經天而行亡雲而雷枉矢夜光熒惑襲月㜸火燒宫埜禽戲廷都門内崩長人見臨洮石隕于東郡星孛大角大角以亡觀孔子之言考暴秦之異天命信可畏也及項籍之敗亦孛大角漢之入秦五星聚于東井得天下之象也孝惠時有雨血日食於衝滅光星見之異孝昭時有泰山卧石自立上林僵栁復起大星如月西行衆星隨之此為特異孝宣興起之表天狗夾漢而西久隂不雨者二十餘日昌邑不終之異也皆著於漢紀觀秦漢之易世覽惠昭之亡後察昌邑之不終視孝宣之紹起天之去就豈不昭昭然㢤高宗成王亦有雊雉拔木之變能思其故故高宗有百年之福成王有復風之報神明之應應若景嚮世所同聞也幸得託末屬誠見陛下寛明之徳冀銷大異而興高宗成王之聲以崇劉氏故豤豤數奸死亡之誅今日食尤屢星孛東井攝提炎及紫宫有識長老莫不震動此變之大者也其事難一二記故易曰書不盡言言不盡意是以設卦指爻而復說義書曰伻來以圖天文難以相曉臣雖圖上猶須口說然後可知願賜清燕之間指圖陳状王尊劾丞相衡等奏漢書丞相衡御史大夫譚位三公典五常九徳以總方畧壹統類廣教化美風俗為職知中書謁者令顯等專權擅埶大作威福縱恣不制亡所畏忌為海内患害不以時白奏行罰而阿諛曲從附下罔上懷邪迷國亡大臣輔政之義皆不道在赦令前赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚于主上卑君尊臣非所宜稱失大臣體又正月行幸曲臺臨饗罷衛士衡與中二千石大鴻臚賞等會坐殿門下衡南鄉賞等西鄉衡更為賞布東鄉席起立延賞坐私語如食頃衡知行臨百官共職萬衆會聚而設不正之席使下坐上相比為小惠於公門之下動不中禮亂朝廷爵秩之位衡又使官大奴入殿中問行起居還言漏上十四刻行臨到衡安坐不變色改容亡怵惕肅敬之心驕慢不謹皆不敬御史中丞衆等劾薛况奏漢書况朝臣父故宰相再封列侯不相敕丞佐而骨肉相疑疑咸受修言以謗毁宣咸所言皆宣行迹衆人所共見公家所宜聞况知咸給事中恐為司𨽻舉奏宣而公令明等迫切宫闕要遮創戮近臣於大道人衆中欲以鬲塞聰明杜絶論議之端桀黠亡所畏忌萬衆讙譁流聞四方不與凡民忿怒爭鬭者同臣聞敬近臣為近主也禮公門式路馬君畜産且猶敬之春秋之義意惡功遂不免於誅上浸之源不可畏也况首為惡明手傷功意俱惡皆大不敬明當以重論及况皆弃市㳙勲論丞相宣奏漢書春秋之義王人微者序乎諸侯之上尊王命也臣幸得奉使以督察公卿以下為職今丞相宣請遣掾史以宰士督察天子奉使命大夫甚誖逆順之理宣本不師受經術因事以立奸威案浩商所犯一家之禍耳而宣欲專權作威乃害于國不可之大者願下中朝特進列侯將軍以下正國法度翟方進劾㳙勲奏漢書臣聞國家之興尊尊而敬長爵位上下之禮王道綱紀春秋之義尊上公謂之宰海内亡不統焉丞相進見聖主御坐為起在輿為下羣臣宜皆承順聖化以視四方勲吏二千石幸得奉使不遵禮儀輕謾宰相賤易上卿而又詘節失度邪讇亡常色厲内荏墮國體亂朝廷之序不宜處位臣請下丞相免勲翟方進劾陳咸等奏漢書立素行積為不善衆人所共知邪臣自結附托為黨庶㡬立與政事欲獲其利今立斥逐就國所交結尤著者不宜備大臣為郡守案後將軍朱博鉅鹿太守孫閎故光禄大夫陳咸與立交通厚善相與為腹心有背公死黨之信欲相攀援死而後已皆内有不仁之性而外有雋材過絶於人勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而亡纎介愛利之風天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何言不仁之人亡所施用不仁而多材國之患也此三人皆内懷奸猾國之所患而深相與結信於貴戚奸臣此國家大憂大臣所宜没身而爭也昔季孫行父有言曰見有善于君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也翅翼雖傷不避也貴戚彊黨之衆誠難犯犯之衆敵並怨善惡相冐臣幸得備宰相不敢不盡死請免博閎咸歸故鄉以銷奸雄之黨絶羣邪之望陳崇劾陳遵奏漢書遵兄弟幸得䝉恩超等厯位遵爵列侯備郡守級州牧奉使皆以舉直察枉宣揚聖化為職不正身自慎始遵初除乘藩車入閭巷過寡婦左阿君置酒謌謳遵起舞跳梁頓仆坐上暮因留宿為侍婢扶卧遵知飲酒飫宴有節禮不入寡婦之門而湛酒溷肴亂男女之別輕辱爵位羞汙印韍惡不可忍聞臣請皆免毋將隆収還武庫兵器奏漢書武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乗輿不以給共養共養勞賜一出少府葢不以本藏給末用不以民力共浮費別公私示正路也古者諸侯方伯得顓征伐乃賜斧鉞漢家邊吏職在距寇亦賜武庫兵皆任其事然後䝉之春秋之誼家不藏甲所以抑臣威損私力也今賢等便僻弄臣私恩微妾而以天下公用給其私門契國威器共其家備民力分於㺯臣武兵設於微妾建立非宜以廣驕僣非所以示四方也孔子曰奚取於三家之堂臣請収還武庫賈讓論治河奏漢書治河有上中下策古者立國居民疆理土地必遺川澤之分度水埶所不及大川亡防小水得入陂障卑下以為汚澤使秋水多得有所休息左右游波寛緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言葢隄防之作近起戰國壅防百川各以自利齊與趙魏以河為竟趙魏瀕山齊地卑下作隄去河二十五里河水東抵齊隄則西汎趙魏趙魏亦為隄去河二十五里雖非其正水尚有所游盪時至而去則填淤肥美民耕田之或久亡害稍築室宅遂成聚落大水時至漂没則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防陿者去水數百步逺者數里近黎陽南故大金隄從河西西北行至西山南頭乃折東與東山相屬民居金隄東為廬舎往十餘嵗更起隄從東山南頭直南與故大隄會又内黄界中有澤方數十里環之有隄往十餘歲太守以賦民民今起廬舎其中此臣親所見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河逺者數十里内亦數重此皆前世所排也河從河内北至黎陽為石隄激使東抵東郡平剛又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東迫阨如此不得安息今行上策徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄埶不能逺泛濫期月自定難者將曰若如此敗壞城郭田廬冡墓以萬數百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門辟伊闕析底柱破碣石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄歲費且萬萬及其大決所殘亡數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相奸且以大漢方制萬里豈其與水爭咫尺之地㢤此功一立河定民安千載亡患故謂之上策若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水高於平地歲增隄防猶尚決溢不可以開渠臣竊按視遮害亭西十八里至淇水口乃有金隄高一丈自是東地稍下隄稍高至遮害亭高四五丈往五六歲河水大盛增丈七尺壞黎陽南郭門入至隄下水未踰隄二尺所從隄上北望河高出民屋百姓皆走上山水留十三日隄潰二所吏民塞之臣循隄上行視水埶南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十步至今四十餘歲適至隄足由是言之其地堅矣恐議者疑河大川難禁制滎陽漕渠足以卜之其水門但用木與土耳今據堅地作石隄埶必完安冀州渠首盡當卬此水門治渠非穿地也但為東方一隄北行三百餘里入漳水中其西因山足高地諸渠皆往往股引取之旱則開東方下水門溉冀州水則開西方高門分河流通渠有三利不通有三害民常罷於救水半失作業水行地上湊潤上徹民則病濕氣木皆立枯鹵不生穀決溢有敗為魚鼈食此三害也若有渠溉則鹽鹵下隰填淤加肥故種禾麥更為秔稻高田五倍下田十倍轉漕舟船之便此三利也今瀕河隄吏卒郡數千人伐買薪石之費歲數千萬足以通渠成水門又民利其灌溉相率治渠雖勞不罷民田適治河隄亦成此誠富國安民興利除害支數百歲故謂之中策若乃繕完故隄增卑倍薄勞費無已數逢其害此最下策也朱博復置御史大夫奏漢書帝王之道不必相襲各繇時務高皇帝以聖徳受命建立鴻業置御史大夫位次丞相典正法度以職相參總領百官上下相監臨厯載二百年天下安寧今更為大司空與丞相同位未獲嘉祐故事選郡國守相高第為中二千石選中二千石為御史大夫任職者為丞相位次有序所以尊聖徳重國相也今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百寮率朱博復刺史奏漢書漢家至徳溥大宇内萬里立置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九歲舉為守相其有異材功効著者輒登擢秩卑而賞厚咸勸功樂進前丞相方進奏罷刺史更置州牧秩真二千石位次九卿九卿闕以高第補其中材則茍自守而已恐功効陵夷奸宄不禁臣請罷州牧置刺史如故丙吉奏記霍光漢書將軍事孝武皇帝受襁褓之屬任天下之寄孝昭皇帝早崩亡嗣海内憂懼欲亟聞嗣主發䘮之日以大誼立後所立非其人復以大誼廢之天下莫不服焉方今社稷宗廟羣生之命在將軍之一舉竊伏聽於衆庶詧其所言諸侯宗室在列位者未有所聞于民間也而遺詔所養武帝曾孫名病已在掖庭外家者吉前使居郡邸時見其㓜小至今十八九矣通經術有美材行安而節和願將軍詳大議參以蓍龜豈宜褒顯先使入侍令天下昭然知之然後決定大䇿天下幸甚文編巻十

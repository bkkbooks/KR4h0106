body:
  text: 文編巻二十五明唐順之編非十二子茍子假今之世飾邪說文奸言以梟亂天下矞宇嵬𤨏使天下混然不知是非治亂之所存者有人矣縱情性安恣睢禽獸之行不足以合文通治然而其持之有故其言之成理足以欺惑愚衆是它囂魏牟也忍情性綦谿利跂茍以分異人為髙不足以合大衆明大分然而其持之有故其言之成理足以欺惑愚衆是陳仲史鰌也不知一天下建國家之權稱上功用大儉約而僈差等曾不足以容辨異懸君臣然而其持之有故其言之成理足以欺惑愚衆是墨翟宋鈃也尚法而無法下脩而好作上則取聽於上下則取從於俗終日言成文典及紃察之則倜然無所歸宿不可以經國定分然而其持之有故其言之成理足以欺惑愚衆是慎到田駢也不法先王不是禮義而好治怪說玩琦辯甚察而不恵辯而無用多事而寡功不可以為治綱紀然而其持之有故其言之成理足以欺惑愚衆是恵施鄧析也畧法先王而不知其統猶然而材劇志大聞見雜博案往舊造說謂之五行甚僻違而無類幽隱而無說閉約而無解案飾其辭而祗敬之曰此眞先君子之言也子思唱之孟軻和之世俗之溝猶瞀儒嚾嚾然不知其所非也遂受而傳之以為仲尼子㳺為兹厚於後世是則子思孟軻之罪也若夫總方畧齊言行一統類而羣天下之英傑而告之以太古教之以至順奥窔之間簟席之上歛然聖王之文章具焉佛然平世之俗起焉六說者不能入也十二子者不能親也無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容成名況乎諸侯莫不願以為臣是聖人之不得勢者也仲尼子弓是也一天下財萬物養長生民兼利天下通達之屬莫不服從六說者立息十二子者遷化則聖人之得勢者舜禹是也今夫仁人將何務哉上則法舜禹之制下則法仲尼子弓之義以務息十二子之說如是則天下之害除仁人之事畢聖王之跡著矣八奸韓非子凡人臣之所道成奸者有八術一曰在同牀何謂同牀曰貴夫人愛孺子便僻好色此人主之所惑也託於燕處之虞乘醉飽之時而求其所欲此必聽之術也為人臣者内事之以金玉使惑其主此之謂同牀二曰在旁何謂在旁曰優笑侏儒左右近習此人主未命而唯唯未使而諾諾先意承㫖觀貌而察色以先主心者也此皆俱進俱退皆應皆對一辭同軌以移主心者也為人臣者内事之以金玉玩好外為之行不法使之化其主此之謂在旁三曰父兄何謂父兄曰側室公子人主之所親愛也大臣廷吏人主之所與度計也此皆盡力畢議人主之所必聽也為人臣者事公子側室以音聲子女收大臣廷吏以辭言處約言事事成則益爵益禄以勸其心使犯其主此之謂父兄四曰養殃何謂養殃曰人主樂羙宫室臺池好飾子女狗馬以娛其心此人主之殃也為人臣者盡民力以美宫室䑓池重賦歛以飾子女狗馬以娛其主而亂其心從其所欲而樹私利其間此謂養殃五曰民萌何謂民萌曰為人臣者散公財以說民人行小恵以取百姓使朝廷市井皆勸譽巳以塞其主而成其所欲此之謂民萌六曰流行何謂流行曰人主者固壅其言談希於聽論議易移以辨說為人臣者求諸侯之辯士養國中之能說者使之以語其私為巧文之言流行之辭示之以利勢懼之以患害施屬虚辭以壊其主此之謂流行七曰威强何謂威强曰君人者以羣臣百姓為威强者也羣臣百姓之所善則君善之非羣臣百姓之所善則君不善之為人臣者聚帶劍之客養必死之士以彰其威明為已者必利不為已者必死以恐其羣臣百姓而行其私此之謂威强八曰四方何謂四方曰君人者國小則事大國兵弱則畏强兵大國之所索小國必聽強兵之所加弱兵必服為人臣者重賦歛盡府庫虚其國以事大國而用其威求誘其君甚者舉兵以聚邊境而制歛於内薄者數内大使以震其君使之恐懼此之謂四方凡此八者人臣之所以道成奸世主所以壅刼失其所有也行軍孫子孫子曰凡處軍相敵絶山依谷視生處髙戰隆無登此處山之軍也絶水必逺水客絶水而來勿迎之於水内令半渡而擊之利欲戰者無附於水而迎客視生處髙無迎水流此處水上之軍也絶斥澤唯亟去無留若交軍於斥澤之中必依水草而背衆樹此處斥澤之軍也平陸處易右背髙前死後生此處平陸之軍也凡此四軍之利黄帝之所以勝四帝也凡軍好髙而惡下貴陽而賤隂養生處實軍無百疾是謂必勝丘陵隄防必處其陽而右背之此兵之利地之助也上雨水沫至欲渉者待其定也凡地有絶澗天井天牢天羅天陷天隙必亟去之勿近也吾逺之敵近之吾迎之敵背之軍旁有險阻潢井蒹葭林木蘙薈者必謹覆索之此伏奸之所也近而静者恃其險也逺而挑戰者欲人之進也其所居易者利也衆樹動者來也衆草多障者疑也鳥起者伏也獸駭者覆也塵髙而鋭者車來也卑而廣者徒來也散而條達者樵採也少而往來者營軍也辭卑而益備者進也辭强而進驅者退也輕車先出其側者陳也無約而請和者謀也奔走而陳兵者期也半進半退者誘也杖而立者飢也汲而先飲者渴也見利而不進者勞也鳥集者虛也夜呼者恐也軍擾者將不重也旌旗動者亂也吏怒者倦也殺馬肉食者軍無糧也懸缻不返其舍者窮寇也諄諄翕翕徐與人言者失衆也數賞者窘也數罰者困也先暴而後畏其衆者不精之至也來委謝者欲休息也兵怒而相迎乆而不合又不相去必謹察之兵非益多也雖無武進足以併力料敵取人而巳夫唯無慮而易敵者必擒於人卒未親附而罰之則不服不服則難用卒已親附而罰不行則不可用故令之以文齊之以武是謂必取令素行以教其民則民服令不素行以教其民則民不服令素行者與衆相得也詭使韓非子聖人之所以為治道者三一曰利二曰威三曰名夫利者所以得民也威者所以行令也名者上下之所同道也非此三者雖有不急矣今利非無有也而民不化上威非不存也而下不聽從官非無法也而治不當名三者非不存也而世一治一亂者何也夫上之所貴賞與其所以為治相反也夫立名號所以為尊也今有賤名輕實者世謂之髙設爵位所以為賤貴基也而簡上不求見者世謂之賢威利所以行令也而無利輕威者世謂之重法令所以為治也而不從法令為私善者世謂之忠官爵所以勸民也而好名義不進仕者世謂之烈士刑罰所以擅威也而輕法不避刑戮死亡之罪者世謂之勇夫民之急名也甚其求利也如此則士之飢餓乏絶者焉得無巖居苦身以爭名於天下哉故世之所以不治者非下之罪上失其道也常貴其所以亂而賤其所以治是故下之所欲常與上之所以為治相詭也今下而聽其上上之所急也而惇慤純信用心壹者則謂之窶守法固聽令審則謂之愚敬上畏罪則謂之怯言時莭行中適則謂之不肖無二心私學聽吏從教者則謂之陋難致謂之正難予謂之廉難禁謂之齊有令不聽從謂之勇無利於上謂之愿少欲寛恵行徳謂之仁重厚自尊謂之長者私學成羣謂之師徒閒静安居謂之有思損人逐利謂之疾險躁佻反覆謂之智先為人而後自為類名號言汎愛天下謂之聖言大本稱而不可用行而乖於世者謂之大人賤爵禄不撓上者謂之傑下漸行如此入則亂民出則不便也上宜禁其欲滅其迹而不止也又從而尊之是教下亂上以為治也凡所治者刑罰也今有私行義者尊社稷之所以立者安静也而躁險讒䛕者任四封之内所以聽從者信與徳也而陂知傾覆者使令之所以行威之所以立者恭儉也不聽上而巖居非世者顯倉廪之所以實者耕農之本務也而綦組錦繡刻書為末作者富名之所以成城池之所以廣者戰士也今死戰之孤飢餓乞子道而優笑酒徒之屬乘車衣絲賞禄所以盡民力易下死也今戰勝攻取之士勞而賞不霑而卜筮視手理狐虫為順辭於前者日賜上握度量所以擅生殺之柄也今守度奉量之士欲以忠嬰上而不得見巧言利辭行奸軌以倖偷世者數御據法直言名刑相當循䋲墨誅奸人所以為上治也而愈䟽逺謟施順意從欲以危世者近習悉租稅專民力所以備難充倉府也而士卒之逃事伏匿附託有威之門以避徭賦而上不得者萬數夫陳善田利宅所以戰士卒也而斷頭裂腹播骨乎平原曠野者無宅容身身死田奪而女妹有色大臣左右無功者擇宅而受擇田而食賞利一從上出所擅制下也而戰介之士不得職而閒居之士尊顯上以此為教名安得無卑位安得無危夫卑名位者必下之不從法令有二心無私學反逆世者也而不禁其行不破其羣以散其黨又從而尊之用事者過矣上世之所以立廉恥者所以屬下也今士大夫不羞汙泥醜辱而宦女妹私義之門不待次而宦賞賜之所以為重也而戰鬬有功之士貧賤而便辟優徒紹級名號誠信所以通威也而主揜障近習女謁並行百官主爵遷人用事者過矣大臣官人與下先謀比周不法行威利在下則主卑而大臣重矣立法令者以廢夫私也法令行而私道廢矣私者所以亂法也而士有二心私學巖居窞處託伏深慮大者非世細者惑下上不禁又從而尊之以名化之以實是無功而顯無勞而富也如此則士之有二心私學者焉得無深慮勉知詐與誹謗法令以求索與世相反者也凡亂上反世者常士有二心私學者也故本言曰所以治者法也所以亂者私也法立則莫得為私矣故曰道私者亂道法者治上無其道則智者有私詞賢者有私意上有私恵下有私欲聖智成羣造言作辭以非法措於上上不禁塞又從而尊之是教下不聽上不從法也是以賢者顯名而居奸人頼賞而富賢者顯名而居奸人頼賞而富是以上不勝下也說難韓非子凡說之難非我知之有以說之之難也又非吾辯之能明吾意之難也又非吾敢横佚而能盡之難也凡說之難在如所說之心可以吾說當之所說出於為名髙者也而說之以厚利則見下莭而遇卑賤必棄逺矣所說出於厚利者也而說之以名髙則見無心而逺事情必不收矣所說隂為厚利而顯為名髙者也而說之以名髙則陽收其身而實䟽之說之以厚利則隂用其言顯棄其身矣此不可不察也夫事以宻成語以泄敗未必其身泄之也而語及所匿之事如此者身危彼顯有所出事而乃以成它故說者不徒知所出而已矣又知其所以為如此者身危規異事而當知者揣之外而得之事泄於外必以為已也如此者身危周澤未渥也而語極知説行而有功則徳忘説不行而有敗則見疑如此者身危貴人有過端而説者明言禮義以挑其惡如此者身危貴人或得計而欲自以為功説者與知焉如此者身危强以其所不能為止以其所不能已如此者身危故與之論大人則以為間已與之論細人則以為賣重論其所愛則以為藉資論其所憎則以為嘗已徑省其說則以為不智而拙之米鹽博辯則以為多而交之畧事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此說之難不可不知也凡說之務在知飾所說之所矜而滅其所耻彼有私急也必以公義示而强之其意有下也然而不能已說者因為之飾其美而少其不為也其心有髙也而實不能及說者為之舉其過而見其惡而多其不行也有欲矜以智能則為之舉異事之同類者多為之地使之資說於我而佯不知也以資其智欲内相存之言則必以美名明之而微見其合於私利也欲陳危害之事則顯其毁誹而㣲見其合於私患也譽異人與同行者規異事與同計者有與同汙者則必以大飾其無傷也有與同敗者則必以明飾其無失也彼自多其力則毋以其難概之也自勇其斷則毋以其謫怒之自智其計則毋以其敗窮之大意無所拂忤辭言無所繫縻然後極騁智辯焉此道所得親近不疑而得盡辭也伊尹為宰百里奚為虜皆所以千其上也此二人者皆聖人也然猶不能無役身以進如此其汙也今以吾言為宰虜而可以聽用而振世此非能仕之所耻也夫曠日彌乆而周澤未渥深計而不疑引爭而不罪則明割利害以致其功直指是非以飾其身以此相持此說之成也昔者鄭武公欲伐胡先以其女妻胡君以娛其意因問於羣臣吾欲用兵誰可伐者大夫關其思對曰胡可伐武公怒而戮之曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親已遂不備鄭鄭人襲胡取之宋有富人天雨墻壊其子曰不築必將有盗其鄰人之父亦云暮而果大亡其財其家甚智其子而疑隣人之父此二人說者皆當矣厚者為戮薄者見疑則非知之難也處知則難也故繞朝之言當矣其為聖於晉而為戮於秦也此不可不察昔者彌子瑕有寵於衛君衛國之法竊駕君車者罪刖彌子毋病人間往夜告彌子彌子矯駕君車以出君聞而賢之曰孝哉為母之故忘其刖罪異日與君㳺於果園食桃而甘不盡以其半㗖君君曰愛我哉忘其口味以㗖寡人及彌子色衰愛弛得罪於君君曰是固嘗矯駕吾車又嘗㗖吾以餘桃故彌子之行未變於初也而以前之所以見賢而後獲罪者愛憎之變也故有愛於主則智當而加親有憎於主則智不當見罪而加踈故諫說談論之士不可不察愛憎之主而後說焉夫龍之為虫也柔可狎而騎也然其喉下有逆鱗徑尺若人有嬰之者則必殺人人主亦有逆鱗說者能無嬰人主之逆鱗則㡬矣王覇篇荀子國者天下之制利用也人主者天下之利勢也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大累也有之不如無之有也及其綦也索為匹夫不可得也齊湣宋獻是也故人主天下之利勢也然而不能自安也安之者必將道也故用國者義立而王信立而覇權謀立而亡三者明主之所謹擇也仁人之所務白也故挈國以呼禮義而無以害之行一不義殺一無罪而得天下仁者不為也櫟然扶持心國且若是其固也之所與為之者之人則舉義士也之所以為布陳於國家刑法者則舉義法也主之所極然帥羣臣而首嚮之者則舉義志也如是則下仰上以義矣是其綦定也綦定而國定國定而天下定仲尼無置錐之地誠義乎志意加義乎身行著之言語濟之日不隱乎天下名垂乎後世今亦以天下之顯諸侯誠義乎志意加義乎法則度量著之以政事案申重之以貴賤殺生使襲然終始猶一也如是則夫名聲之部發於天地之間也豈不如日月雷霆然矣哉故曰以國齊義一日而白湯武是也湯以亳武以鎬皆百里之地天下為一諸侯為臣通達之屬莫不從服無它故焉以濟義矣是所謂義立而王也徳雖未至也義雖未濟也然而天下之理畧奏矣刑賞已諾信乎天下矣臣下曉然皆知其可要也政令已陳雖覩利敗不欺其民約結已定雖覩利敗不欺其與如是則兵勁城固敵國畏之國一綦明與國信之雖在僻陋之國威動天下五覇是也非本政教也非致隆髙也非綦文理也非服人之心也鄉方畧審勞佚謹畜積修戰備齺然上下相信而天下莫之敢當故齊桓晉文楚莊吳闔閭越勾踐是皆僻陋之國也威動天下强殆中國無它故焉畧信也是所謂信立而覇也絜國以呼功利不務張其義齊其信唯利之求内則不憚詐其民而求小利焉外則不憚詐其與而求大利焉内不修正其所以有然常欲人之有如是則臣下百姓莫不以詐心待其上矣上詐其下下詐其上則是上下析也如是則敵國輕之與國疑之權謀日行而國不免危削綦之而亡齊閔薛公是也故用强齊非以修禮義也非以本政教也非以一天下也綿綿嘗以結引馳外為務故强南足以破楚西足以詘秦北足以敗燕中足以舉宋及以燕趙起而攻之若振槁然而身死國亡為天下大戮後世言惡則必稽焉是無它故焉唯其不由禮義而由權謀也三者明主之所謹擇也仁人之所務白也善擇者制人不善擇者人制之國者天下之大器也重任也不可不善為擇所而後錯之錯險則危不可不善為擇道然後道之塗薉則塞危塞則亡彼國錯者非封焉之謂也何法之道誰子之與也故道王者之法與王者之人為之則亦王道覇者之法與覇者之人為之則亦霸道亡國之法與亡國之人為之則亦亡三者明主之所謹擇也而仁人之所務白也故國者重任也不以積持之則不立故國者世所以新者也是憚憚非變也改玉改行也故一朝之日也一日之人也然而厭焉有千歳之國何也曰援夫千歳之信法以持之也安與夫千歳之信士為之也人無百歳之壽而有千歳之信士何也曰以夫千歳之法自持者是乃千歳之信士矣故與積禮義之君子為之則王與端誠信全之士為之則霸與權謀傾覆之人為之則亡三者明主之所謹擇也仁人之所務白也善擇之者制人不善擇之者人制之彼持國者必不可以獨也然則强國榮辱在於取相矣身能相能如是者王身不能知恐懼而求能者如是强身不能不知恐懼而求能者安唯便僻左右親比已者之用如是者危削綦之而亡國者巨用之則大小用之則小綦大而王綦小而亡小巨分流者存巨用之者先義而後利安不䘏親踈不䘏貴賤唯誠能之求夫是之謂巨用之小用之者先利而後義安不恤是非不治曲直唯便僻親比已者之用夫是之謂小用之巨用之者若彼小用之者若此小巨分流者亦一若彼也亦一若此也故曰粹而王駮而霸無一焉而亡此之謂也國無禮則不正禮之所以正國也譬之猶衡之於輕重也猶繩墨之於曲直也猶規矩之於方圓也故錯之而人莫能誣也詩云如霜雪之將將如日月之光明為之則存不為之則亡此之謂也國危則無樂君國安則無憂民亂則國危治則國安今君人者急逐樂而緩治國豈不過甚矣哉譬之是猶好聲色而恬無耳目也豈不哀哉夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚此五綦者人情之所必不免也養五綦者有具無具則五綦者不可得而致也萬乗之國可謂廣大富厚矣加有治辯强固之道焉若是則恬愉無患難矣然後養五綦之具具也故百樂者生於治國者也憂患生於亂國者也急逐樂而緩治國者非知樂者也故明君者必將先治其國然後百樂得其中闇君者必將荒逐樂而緩治國故憂患不可勝校也必至於身死國亡然後止也豈不哀哉將以為樂乃得憂焉將以為安乃得危焉將以為福乃得死亡焉豈不哀哉於乎君人者亦可以察若言矣故治國有道人主有軄若夫貫日而治詳一日而曲列之是以所使夫百吏官人為也不足以是傷逰玩安燕之樂若夫論一相以兼率之使臣下百吏莫不宿道鄉方而務是夫人主之軄也若是則一天下名配堯禹之主者守至約而詳事至佚而功垂衣裳不下簟席之上而海内之民莫不願得以為帝王夫是之謂至約樂莫大焉人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之百畆一守事業窮無所移之也今以一人兼聽天下日有餘而治不足者使人為之也大有天下小有一國必自為之然後可則勞苦耗悴莫甚焉如是則雖臧獲不肻與天子易勢業以是縣天下一四海何故必自為之為之者役夫之道也墨子之説也論徳使能而官施之者聖王之道也儒之所謹守也傳曰農分田而耕賈分貨而販百工分事而勸士大夫分軄而聽建國諸侯之君分土而守三公總方而議則天子共已而已矣出若入若天下莫不平均莫不治辯是百王之所同也而禮法之大分也百里之地可以取天下是不虚其難者在人主之知之也取天下者非負其土地而從之之謂也道足以一人而已矣彼其人茍一則其土地且奚去我而適它故百里之地其等位爵服足以容天下之賢士矣其官軄事業足以容天下之能士矣脩其舊法擇其善者而明用之足以順服好利之民矣賢士一焉能士官焉好利之民服焉三者具而天下盡無有是其外矣故百里之地足以竭勢矣致忠信著仁義足以竭人矣兩者合而天下取諸侯後同者先危詩曰自西自東自南自北無思不服一人之謂也羿蠭門者善服射者也王良造父者善服馭者也聰明君子者善服人者也人服而勢從之人不服而勢去之故王者已於服人矣故人主欲得善射射逺中㣲則莫若羿蠭門矣欲得善馭及速致逺則莫若王良造父矣欲調一天下制秦楚則莫若聰明君子矣其用知甚簡其為事不勞而功名致大甚易處而綦可樂也故明君以為寳而愚者以為難夫貴為天子富有天下名為聖王兼制人人莫得而制也是人情之所同欲也而王者兼而有是者也重色而衣之重味而食之重財而制之合天下而君之飲食甚厚聲樂甚大䑓榭甚髙園囿甚廣臣使諸侯一天下是又人情之所同欲也而天子之禮制如是者也制度以陳政令以挾官人失要則死公侯失禮則幽四方之國有侈離之徳則必滅名聲若日月功積如天地天下之人應之如影嚮是又人情之所同欲也而王者兼而有是者也故人之情口好味而臭味莫羙焉耳好聲而聲樂莫大焉目好色而文章致繁婦女莫衆焉形體好佚而安重間静莫愉焉心好利而糓祿莫厚焉合天下之所同願兼而有之睪牢天下而制之若制子孫人茍不狂惑戇陋者其誰能睹是而不樂也哉欲是之主並肩而存違是之士不世絶千歳而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則争軄而妬賢是其所以不合之故也人主胡不廣焉無恤親踈無偏貴賤唯誠能之求若是則人臣輕軄業讓賢而安隨其後如是則禹舜還至王業還起功一天下名配禹舜物由有可樂如是其羙者乎嗚呼君人者亦可以察若言矣楊朱哭衢塗曰此夫過舉蹞歩而覺跌千里者夫哀哭之此亦榮辱安危存亡之衢已此其為可哀甚於衢塗嗚呼哀哉君人者千嵗而不覺也無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士無國而不有愿民無國而不有悍民無國而不有羙俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危上一而王下一而亡故其治法其佐賢其民愿其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得甲兵不勞而天下服故湯以亳武王以鎬皆百里之地也天下為一諸侯為臣通達之屬莫不服從無他故焉四者齊也桀紂即序於有天下之勢索為匹夫不可得也是無它故焉四者並亡也故百王之法不同若是所歸者一也上莫不致愛其下而制之以禮上之於下如保赤子政令制度所以接下之人百姓有不理者如豪末則雖孤獨鰥寡必不加焉故下之親上歡如父母可殺而不可使不順君臣上下貴賤長㓜至於庶人莫不以是為隆正然後皆内自省以謹於分是百王之所以同也而禮法之樞要也然後農分田而耕賈分貨而販百工分事而勸士大夫分軄而聽建國諸侯之君分土而守三公總方而議則天子共已而正矣若出若入天下莫不平均莫不治辯是百王之所同而禮法之大分也若夫貫日而治平權物而稱用使衣服有制宫室有度人徒有數䘮祭械用皆有等宜以是用挾於萬物尺寸尋丈莫得不脩乎制數度量然後行則是官人使吏之事也不足數於大君子之前故君人者立隆政本朝而當所使要百事者誠仁人也則身佚而國治功大而名羙上可以王下可以覇立隆政夲朝而不當所使要百事者非仁人也則身勞而國亂功廢而名辱社稷必危是人君者之樞機者也故能當一人而天下取失當一人而社稷危不能當一人而能當千人百人者説無之有也既能當一人則身有何勞而為垂衣裳而天下定故湯用伊尹文王用吕尚武王用召公成王用周公且卑者五霸齊桓公閨門之内懸樂奢泰游抏之修於天下不見謂修然九合諸侯一匡天下為五霸長是亦無它故焉知一政於管仲也是君人者之要守也知者易為之興力而功名綦大舍是而孰足為也故古之有大功名者必道是者也䘮其國危其身者必反是者也故孔子曰知者之知固以多矣有以守少能無察乎愚者之知固以少矣有以守多能無狂乎此之謂也治國者分已定則主相臣下百吏各謹其所聞不務聽其所不聞各謹其所見不務視其所不見所聞所見誠以齊矣則雖幽閒隠僻百姓莫敢不敬分安制以化其上是治國之徴也主道治近不治逺治明不治幽治一不治二主能治近則逺者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也既能治近又務治逺既能治明又務見幽既能當一又務正百是過者也過猶不及也辟之是猶立直木而求其影之枉也不能治近又務治逺不能察明又務見幽不能當一又務正百是悖者也辟之是猶立枉木而求其影之直也故明主好要而闇主好詳主好要則百事詳主好詳則百事荒君者論一相陳一法明一指以兼覆之兼炤之以觀其盛者也相者論列百官之長要百事之聽以飾朝廷臣下百吏之分度其功勞論其慶賞嵗終奉其成功以效於君當則可不當則廢故君人勞於索之而休於使之解蔽篇茍子凡人之患蔽於一曲而闇於大理治則復經兩疑則惑矣天下無二道聖人無兩心今諸侯異政百家異説則必或是或非或理或亂亂國之君亂家之人此其誠心莫不求正而以自為也妬繆於道而人誘其所迨也私其所積唯恐聞其惡也倚其所私以觀異術唯恐聞其美也是以與治雖走而是已不輟也豈不蔽於一曲而失正求也哉心不使焉則白黒在前而目不見雷鼓在側而耳不聞况於使者乎徳道之人亂國之君非之上亂家之人非之下豈不哀哉數為蔽欲為蔽惡為蔽始為蔽終為蔽逺為蔽近為蔽傳為蔽淺為蔽古為蔽今為蔽凡萬物異則莫不相為蔽此心術之公患也昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行紂蔽於妲己飛亷而不知㣲子啓以惑其心而亂其行故羣臣去忠而事私百姓怨非而不用賢良退處而隠逃此其所以䘮九牧之地而虛宗廟之國也桀死於亭山紂懸於赤斾身不先知又莫之諫此蔽塞之祸也成湯鑒於夏桀故主其心而慎治之是以能長用伊尹而身不失道此其所以代夏王而受九有文王鑒於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代􅇻王而受九牧逺方莫不致其珍故目視備色耳聽備聲口食備味形居備宫名受備號生則天下歌死則天下哭夫是之謂至盛詩曰鳯凰秋秋其翼若干其聲若簫有鳯有凰樂帝之心此不蔽之福也昔人臣之蔽者唐鞅奚齊是也唐鞅蔽於欲權而逐載子奚齊蔽於欲國而罪申生唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身為刑戮然而不知此蔽塞之禍也故以貪鄙背叛争權而不滅亡者自古及今未嘗有之也鮑叔寗戚隰朋仁智且不蔽故能持管仲而名利福禄與管仲齊召公吕望仁智且不蔽故能持周公而名利福禄與周公齊傳曰知賢之謂明輔賢之謂强勉之强之其福必長此之謂也此不蔽之福也昔賔孟之蔽者亂家是也墨子蔽於用而不知文宋子蔽於欲而不知得慎子蔽於法而不知賢申子蔽於勢而不知知恵子蔽於辭而不知實莊子蔽於天而不知人故由用謂之道盡利也由俗謂之道盡嗛也由法謂之道盡數矣由數謂之道盡便矣由辭謂之道盡論矣由天謂之道盡因矣而此數具者皆道之一隅也夫道者體常而盡變一隅不足舉之曲知之人觀於道之一隅猶未之能識也故以為足而飾之内以自亂外以惑人上以蔽下下以蔽上此蔽塞之祸也孔子仁智且不蔽故學亂術足以為先王者也一家得周道舉而用之不蔽於成積也故徳與周公齊名與三王並此不蔽之福也聖人知心術之患見蔽塞之祸故無欲無惡無始無終無近無逺無博無淺無古無今兼陳萬物而中懸衡焉是故衆異不得相蔽以亂其倫何謂衡曰道故心不可不知道心不知道則不可道而可非道人孰欲得恣而守其所不可以禁其所可以其不可道之心取人則必合於不道人而不知合於道人以其不可道之心與不可道之人論道亂之本也故曰心知道然後可道可道然後能守道以禁非道以其可道之心取人則合於道人而不合於不道之人矣以其可道之心與道人論非道治之要也何患不知故治之要存於知道人何以知道曰心心何以知曰虛一而静心者形之君也而神明之主也出令而無所受令自禁也自使也自奪也自取也自行也自止也故口可刼而使墨云形可刼而使詘申心不可刼而使易意是之則受非之則辭故曰心容其擇也無禁必自見其物也雜博其情之至也不貳詩云采采巻耳不盈頃筐嗟我懐人寘彼周行頃筐易滿也巻耳易得也然而不可以貳周行故曰心枝則無知傾則不精貳則疑惑以賛稽之萬物可兼知也身盡其故則羙類不可兩也故知者擇一而一焉農精於田而不可以為田師賈精於市而不可以為賈師工精於器而不可以為器師有人也不能此三技而可使治三官曰精於道者也精於物者也精於物者以物物精於道者兼物物故君子一於道而以賛稽物一於道則正以賛稽物則察以正志行察論則萬物官矣昔者舜之治天下也不以事詔而萬物成處一之危其榮滿側飬一之㣲榮矣而未知故道經曰人心之危道心之㣲危㣲之幾惟明君子而後能知之故人心譬如槃水正錯而勿動則湛濁在下而清明在上則足以見鬚眉而察理矣㣲風過之湛濁動乎下清明亂於上則不可以得大形之正也心亦如是矣𨗳之以理養之以清物莫之傾則足以定是非决嫌疑矣小物引之則其正外易其心内傾則不足以决粗理也故好書者衆矣而蒼頡獨傳者一也好稼者衆矣而后稷獨傳者一也好樂者衆矣而夔獨傳者一也好義者衆矣而舜獨傳者一也倕作弓浮游作矢而羿精於射奚仲作車乘杜作乘馬而造父精於御自古及今未嘗有兩而能精者也曾子曰視其庭可以搏鼠惡能與我歌乎空石之中有人焉其名曰觙其為人也善射以好思耳目之欲接則敗其思蚊虫之聲聞則挫其精是以闢耳目之欲而逺蚊䖟之聲閒居静思則通思仁若是可謂㣲乎孟子惡敗而出妻可謂能自强矣有子惡卧而焠掌可謂能自忍矣未及好也闢耳目之欲可謂能自强矣未及思也蚊䖟之聲聞則挫其精可謂危矣未可謂㣲也夫㣲者至人也至人也何强何忍何危故濁明外景清明内景聖人縱其欲兼其情而制焉者理矣夫何强何忍何危故仁者之行道也無為也聖人之行道也無疆也仁者之思也恭聖人之思也樂此理心之道也凡觀物有疑中心不定則外物不清吾慮不清則未可定然否也㝠㝠而行者見寢石以為伏虎也見植林以為後人也㝠㝠蔽其明也醉者越百歩之溝以為􅀈歩之澮俯而出城門以為小之閨也酒亂其神也厭目而視者視一以為兩掩耳而聽者聽漠漠以為㕼㕼勢亂其官也故從山上望牛者若羊而求羊者不下牽也逺蔽其大也從山下望木者十仭之木若箸而求箸者不上折也髙蔽其長也水動而影搖人不以定羙惡水勢𤣥也瞽者仰視而不見星人不以定有無用精惑也有人焉以此時定物則世之愚者也彼愚者之定物以疑决疑决必不當夫茍不當安能無過乎夏首之南有人焉曰㳙蜀梁其為人也愚以善畏明月而宵行俯見其影以為伏鬼也仰視其髪以為立魅也背而走比至其家失氣而死豈不哀哉凡人之有鬼也必以其感忽之間疑𤣥之時正之此人之所以無有而有無之時也而已以正事故傷於溼而撃鼓鼓痺則必有蔽鼓䘮豚之費矣而未有俞疾之福也故雖不在夏首之南則無以異矣凡以知人之性也可以知物之理也以可知人之性求可知物之理而無所疑止之則沒世窮年不能徧也其所以貫理焉雖億萬已不足以浹萬物之變與愚者若一學老身長子而與愚者若一猶不知錯夫是之謂妄人故學也者固學止之也惡乎止之曰止諸至足曷謂至足曰聖也聖也者盡倫者也王也者盡制者也兩盡者足以為天下極矣故學者以聖王為師案以聖王之制為法法其法以求其統類以務象效其人嚮是而務士也類是而幾君子也知之聖人也故有知非以慮是則謂之懼有勇非以持是則謂之賊察孰非以分是則謂之簒多能非以修蕩是則謂之知辯利非以言是則謂之詍傳曰天下有二非察是是察非謂合王制與不合王制也天下有不以是為隆正也然而猶有能分是非治曲直者耶若夫非分是非非治曲直非辯治亂非治人道雖能之無益於人不能之無損於人案直將治怪說玩竒辭以相撓滑也案强鉗而利口厚顔而忍詬無正而恣睢妄辯而幾利不好辭讓不敬禮節而好相推擠此亂世奸人之說也則天下之治說者方多然矣傳曰析辭而為察言物而為辯君子賤之博聞强志不合王制君子賤之此之謂也為之無益於成也求之無益於得也憂戚之無益於幾也則廣焉能克之矣不以自妨也不少頃干之胷中不慕往不閔來無邑憐之心當時則動動至而應事起而辯治亂可否昭然明矣周而成泄而敗明君無之有也宣而成隠而敗闇君無之有也故君人者周則讒言至矣而直言反矣小人邇而君子逺矣詩曰墨以為明狐狸而蒼此言上幽而下險也君人者宣則直言至矣而讒言反矣君子邇而小人逺矣詩云明明在下赫赫在上此言上明而下化也性惡篇荀子人之性惡其善者偽也今人之性生而有好利焉順是故爭奪生而辭讓亡焉生而有疾惡焉順是故殘賊生而忠信亡焉生而有耳目之欲有好聲色焉順是故滛亂生而禮義文理亡焉然則從人之性順人之情必出於爭奪合於犯分亂理而歸於暴故必將有師法之化禮義之道然後出於辭讓合於文理而歸於治用此觀之然則人之性惡明矣其善者偽也故构木必將待櫽栝烝矯然後直鈍金必將待礱厲然後利今人之性惡必將待師法然後正得禮義然後治今人無師法則偏險而不正無禮義則悖亂而不治古者聖人以人之性惡以為偏險而不正悖亂而不治是以為之起禮義制法度以矯飾人之情性而正之以擾化人之情性而道之也使皆出於治合於道者也今人化師法積文學道禮義者為君子縱性情安恣睢慢禮義者為小人用此觀之然則人之性惡明矣其善者偽也孟子曰人之學者其性善曰是不然是不及知人之性而不察乎性偽之分者也凡性者天之就也不可學不可事禮義者聖人之所生也人之所學而能所事而成者也不可學不可事而在人者謂之性可學而能可事而成在人者謂之偽是性偽之分也今人之性目可以見耳可以聽夫可以見之明不離目可以聽之聰不離耳目明而耳聰不可學明矣孟子曰今之人性善將皆失䘮其性故也曰若是則過矣今之人性生而離其朴離其資必失而䘮之用此觀之然則人之性惡明矣所謂性善者不離其朴而美之不離其資而利之也使夫資朴之於美心意之於善若夫可以見之明不離目可以聽之聰不離耳故曰目明而耳聰也今人之性飢而欲飽寒而欲煖勞而欲休此人之情性也今人飢見長而不敢先食者將有所讓也勞而不敢求息者將有所代也夫子之讓乎父弟之讓乎兄子之代父弟之代兄此二行者皆反於性而悖於情也然而孝子之道禮義之文理也故順情性則不辭讓矣辭讓則悖於情性矣用此觀之然則人之性惡明矣其善者偽也問者曰人之性惡則禮義惡生應之曰凡禮義者是生於聖人之偽非故生於人之性也故陶人埏埴而為器然則器生於工人之偽非故生於人之性也故工人斵木而成器然則器生於工人之偽非故生於人之性也聖人積思慮習偽故以生禮義而起法度然則禮義法度者是生聖人之偽非故生於人之性也若夫目好色耳好聲口好味心好利骨體膚理好愉怢是皆生於人之情性也感而自然不待事而後生之者也夫感而不能然必且待事而後然者人之生於偽是性偽之所生其不同之徴也故聖人化性而起偽偽起而生禮義禮義生而制法度然則禮義法度者是聖人之所生也故聖人之所以同於衆其不異於衆者性也所以異而過衆者偽也夫好利而欲得者此人之情性也假之有弟兄資財而分者且順情性好利而欲得若是則兄弟相拂奪矣且化禮義之文理若是則讓乎國人矣故順性情則弟兄爭矣化禮義則讓國人矣凡人之欲為善者為性惡也夫薄願厚惡願美狹願廣貧願富賤願貴茍無之中者必求於外故富而不願財貴而不願勢茍有之中者不及於外用此觀之人之欲為善者為性惡也今人之性固無禮義故强學而求有之也性不知禮義故思慮而求知之也然則性而已則人無禮義不知禮義人無禮義則亂不知禮義則悖然則性而已則悖亂在已用此觀之人之性惡明矣其善者偽也孟子曰人之性善曰是不然凡古今天下之所謂善者正理平治也所謂惡者偏險悖亂也是善惡之分也已今誠以人之性固正理平治邪則有惡用聖王惡用禮義矣哉雖有聖王禮義將曷加於正理平治也哉今不然人之性惡故古者聖人以人之性惡以為偏險而不正悖亂而不治故為之立君上之勢以臨之明禮義以化之起法正以治之重刑罰以禁之使天下皆出於治合於善也是聖王之治而禮義之化也今當試去君上之勢無禮義之化去法正之治無刑罰之禁倚而觀天下民之相與也若是則夫强者害弱而奪之衆者暴寡而譁之天下之悖亂而相亡不待頃矣用此觀之然則人之性惡明矣其善者偽也故善言古者必有節於今善言天者必有徴於人凡論者貴其有辯合其符騐故坐而言之起而可設張而可施行今孟子曰人之性善無辨不合符驗坐而言之起而不可設張而不可施行豈不過甚矣哉故性善則去聖王息禮義矣性惡則興聖王貴禮義矣故櫽栝之生為构木也䋲墨之起為不直也立君上明禮義為性惡也用此觀之然則人之性惡明矣其善者偽也直木不待櫽栝而直者其性直也构木必將待櫽栝烝矯然後直者以其性不直也今人之性惡必將待聖王之治禮義之化然後皆出於治合於善也用此觀之則人之性惡明矣其善者偽也問者曰禮義積偽者是人之性故聖人能生之也應之曰是不然夫陶人埏埴而生瓦然則瓦埴豈陶人之性也哉工人斵木而生器然則器木豈工人之性也哉夫聖人之於禮義也辟亦陶埴而生之也然則禮義積偽者豈人之性也哉凡人之性者堯舜之與桀跖也其性一也君子之與小人其性一也今將以禮義積偽人之性耶然則有曷貴堯禹曷貴君子矣哉凡所貴堯禹君子者能化性能起偽偽起而生禮義然則聖人之於禮義積偽也亦陶埏而生之也用此觀之然則禮義積偽豈人之性也哉所賤於桀跖小人者從其性順其情安恣睢以出乎貪利爭奪故人之性惡明矣其善者偽也天非私曾騫孝己而外衆人也然則曾騫孝己獨厚於孝之實而全於孝之名者何也以綦禮義故也天非私齊魯之民而外秦人也然而於父子之義夫婦之别不如齊魯之孝具敬文者何也以秦人之從情性安恣睢慢於禮義故也豈其性異矣哉塗之人可以為禹曷謂也曰凡禹之所以為禹者以其為仁義法正也然則仁義法正有可知可能之理然而塗之人也皆有可以知仁義法正之質皆有可以能仁義法正之具然則其可以為禹明矣今以仁義法正為固無可知可能之理邪然則唯禹不知仁義法正不能仁義法正也將使塗之人固無可以知仁義法正之質而固無可以能仁義法正之具邪然則塗之人也且内不可以知父子之義外不可以知君臣之正不然今塗之人者皆内可以知父子之義外可以知君臣之正然則其可以知之質可以能之具其在塗之人明矣今使塗之人者以其可以知之質可以能之具本夫仁義可知之理可能之具然則其可以為禹明矣今使塗之人伏術為學專心一志思索熟察加日縣乆積善而不息則通於神明叅於天地矣故聖人者人之所積而致也曰聖可積而致然而皆不可積何也曰可以而不可使也故小人可以為君子而不肻為君子君子可以為小人而不肻為小人小人君子者未嘗不可以相為也然而不相為者可以而不可使也故塗之人可以為禹則然塗之人能為禹未必然也雖不能為禹無害可以為禹足可以徧行天下然而未嘗有能徧行天下者也夫工匠農賈未嘗不可以相為事也然而未嘗能相為事也用此觀之然則可以為未必能也雖不能無害可以為然則能不能之與可不可其不同逺矣其不可以相為明矣堯問於舜曰人情何如舜對曰人情甚不美又何問焉妻子具而孝衰於親嗜欲得而信衰於友爵禄盈而忠衰於君人之情乎人之情乎甚不美又何問焉唯賢者為不然有聖人之知者有士君子之知者有小人之知者有役夫之知者多言則文而類終日議其所以言之千舉萬變其統類一也是聖人之知也少言則徑而省論而法若佚之以䋲是士君子之知也其言也謟其行也悖其舉事多侮是小人之知也齊給便敏而無類雜能旁􅅎而毋用折速粹熟而不急不恤是非不論曲直以期勝人為意是役夫之知也有上勇者有中勇者有下勇者天下有中敢直其身先王有道敢行其意上不循於亂世之君下不俗於亂世之民仁之所在無貧窮仁之所亡無富貴天下知之則欲與天下同苦樂之天下不知之則傀然獨立天地之間而不畏是上勇也禮恭而意儉大齊信焉而輕貨財賢者敢推而上之不肖者敢援而廢之是中勇也輕身而重貨恬禍而廣解茍不恤是非然不然之情以期勝人為意是下勇也繁弱鉅黍古之良弓也然而不得排擏則不能自正桓公之葱太公之闕文王之錄莊君之􅘈闔閭干將莫邪鉅闕辟閭此皆古之良劍也然而不加砥礪則不能利不得人力則不能斷驊騮騏驥纎離綠耳此皆古之良馬也然而前必有衘轡之制後有鞭䇿之威加之以造父之馭然後一日而致千里也夫人雖有性質美而心辯知必將求賢師而事之擇賢友而友之得賢師而事之則所聞者堯舜禹湯之道也得良友而友之則所見者忠信敬讓之行也身日進於仁義而不自知也者靡使然也今與不善人處則所聞者欺誣詐偽也所見者汗漫滛邪貪利之行也身且加於刑戮而不自知者靡使然也傳曰不知其子視其友不知其君視其左右靡而已矣正名篇荀子凡語治而待去欲者無以道欲而困於有欲者也凡語治而待寡欲者無以節欲而困於多欲者也有欲無欲異類也生死也非治亂也欲之多寡異類也情之所也非治亂也欲不待可得而求者從所可欲不待可得所受乎天也求者從所可受乎心也故欲過之而動不及心止之也心之所可中理則欲雖多奚傷於治欲不及而動過之心使之也心之所可失理則欲雖寡奚止於亂故理亂在於心之所可亡於情之所欲不求之其所在而求之其所亡雖曰我得之失之矣性者天之就也情者性之質也欲者情之應也以欲為可得而求之情之所必不免也以為可而道之知所必出也故雖為守門欲不可去性之具也雖為天子欲不可盡欲雖不可盡可以近盡也欲雖不可去求可節也所欲雖不可盡求者猶近盡欲雖不可去所求不得慮者欲節求也道者進則近盡退則節求天下莫之若也凡人莫不從其所可而去其所不可知道之知莫之若也而不從道者無之有也假之有人而欲南無多而惡北無寡豈為夫南者之不可盡也離南行而北走也哉今人所欲無多所惡無寡豈為夫欲之不可盡也離得欲之道而取所惡也哉故可道而從之奚以損之而亂不可道而離之奚以益之而治故知者論道而已矣小家珎說之所願皆衰矣凡人之取也所欲未嘗粹而來也其去也所惡未嘗粹而徃也故人無動而不與權俱衡不正則重懸於仰而人以為輕輕懸於俛而人以為重此人所以惑於輕重也權不正則祸託於欲而人以為福福託於惡而人以為祸此亦人所以惑於祸福也道者古今之正權也離道而内自擇則不知祸福之所託易者以一易一人曰無得亦無䘮也以一易兩人曰無䘮而有得也以兩易一人曰無得而有䘮也計者取所多謀者從所可以兩易一人莫之為明其數也從道而出猶以一易兩也奚䘮離道而内自擇是猶以兩易一也奚得累百年之欲易一時之嫌然且為之不明其數也有嘗試深觀其隠而難其察者志輕理而不重物者無之有也外重物而不内憂者無之有也行離理而不外危者無之有也外危而不内恐者無之有也心憂恐則口衘芻豢而不知其味耳聽鍾鼓而不知其聲目視黼黻而不知其狀輕煖平簟而體不知其安故嚮萬物之羙而不能嗛也假問而嗛之則不能離也故嚮萬物之羙而盛憂兼萬物之利而盛害如此者其求物也飬生也粥夀也故欲飬其欲而縱其情欲飬其性而危其形欲飬其樂而攻其心欲飬其名而亂其行如此者雖封侯稱君其與盗無以異雖乘軒戴絻其與無足無以異夫是之謂以已為物役矣心平愉則色不及傭而可以飬目聲不及傭而可以飬耳蔬食菜􅅅而可以飬口麄布之衣麄紃之履而可以飬體屋室廬庾葭藁辱尚几筵而可以飬形故無萬物之羙而可以飬樂無勢利之位而可以飬名如是而加天下焉其為天下多其和樂少矣夫是之謂重已役物無稽之言不見之行不聞之謀君子慎之文編巻二十五

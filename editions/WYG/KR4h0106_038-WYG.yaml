body:
  text: 文編巻三十八明唐順之編原道韓愈博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳仁與義為定名道與徳為虚位故道有君子小人而徳有凶有吉老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂徳徳其所徳非吾所謂徳也凡吾所謂道徳云者合仁與義言之也天下之公言也老子之所謂道徳云者去仁與義言之也一人之私言也周道衰孔子沒火於秦黄老於漢佛於晉魏梁隋之間其言道徳仁義者不入於楊則入於墨不入於老則入於佛入於彼必出於此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道徳之說孰從而聴之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而自小也亦曰吾師亦嘗師之云爾不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道徳之說其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立然後教之以相生相飬之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣饑然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其壹鬱為之政以率其怠勌為之刑以鋤其强梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患至而為之防今其言曰聖人不死大盜不止剖斗折衡而民不争嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以争食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不行君之令而致之民則失其所以為臣民不出粟米麻絲作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生相飬之道以求其所謂清浄寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號雖殊其所以為聖一也夏葛而冬裘渇飲而饑食其事雖殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責饑之食者曰曷不為飲之之易也傳曰古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎己無待於外之謂徳其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服麻絲其居宫室其食粟米果蔬魚肉其為道易明而其為教易行也是故以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與楊也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其說長然則如之何而可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡狐獨廢疾者有養也其亦庶乎其可也原性韓愈性也者與生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七曰何也曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡楊子之言性曰人之性善惡混夫始善而進惡與始惡而進善與始也混而今也善惡皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎后稷之生也其母無災其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽瞍之舜鯀之禹習非不惡也而卒為聖人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其一者也曰然則性之上下者其終不可移乎曰上之性就學而易明下之性畏威而寡罪是故上者可教而下者可制也其品則孔子謂不移也曰今之言性者異於此何也曰今之言者雜佛老而言也雜佛老而言也者奚言而不異原毁韓愈古之君子其責己也重以周其待人也輕以約重以周故不怠輕以約故人樂為善聞古之人有舜者其為人也仁義人也求其所以為舜者責於己曰彼人也予人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者聞古之人有周公者其為人也多才與藝人也求其所以為周公者責於己曰彼人也予人也彼能是而我乃不能是早夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責於身者重以周乎其於人也曰彼人也能有是是足為良人矣能善是是足為藝人矣取其一不責其二即其新不究其舊恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣不亦待於人者輕以約乎今之君子則不然其責人也詳其待己也亷詳故難於為善亷故自取也少己未有善曰我善是是亦足矣己未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣不亦待其身者已亷乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是之謂以衆人待其身而以聖人望於人吾未見其尊己也雖然為是者有本有原怠與忌之謂也怠者不能修而忌者畏人修吾甞試之矣甞試語於衆曰某良士某良士其應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必怒於言懦者必怒於色矣又甞語於衆曰某非良士某非良士其不應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必說於言懦者必說於色矣是故事修而謗興徳髙而毁来嗚呼士之處此世而望名譽之光道徳之行難矣將有作於上者得吾說而存之其國家可幾而理歟原鬼韓愈有嘯於梁從而燭之無見也斯鬼乎曰非也鬼無聲有立於堂從而視之無見也斯鬼乎曰非也鬼無形有觸吾躬從而執之無得也斯鬼乎曰非也鬼無聲與形安有氣曰鬼無聲也無形也無氣也果無鬼乎曰有形而無聲者物有之矣土石是也有聲而無形者物有之矣風霆是也有聲與形者物有之矣人獸是也無形與聲者物有之矣鬼神是也曰然則有怪而與民物接者何也曰是有二有鬼有物漠然無形與聲者鬼之常也民有忤於天有違於民有爽於物逆於倫而感於氣於是乎鬼有形於形有憑於聲以應之而下殃禍焉皆民之為之也其既也又反乎其常曰何謂物曰成於形與聲者土石風霆人獸是也反乎無聲與形者鬼神是也不能有形與聲不能無形與聲者物怪是也故其作而接於民也無恒故有動於民而為禍亦有動於民而為福亦有動於民而莫之為禍福適丁民之有是時也作原鬼原過王安石天有過乎有之陵歴鬭蝕是也地有過乎有之崩弛竭塞是也天地舉有過卒不累覆且載者何善復常也人介乎天地之間則固不能無過卒不害聖且賢者何亦善復常也故太甲思庸孔子曰勿憚改過揚雄貴遷善皆是術也予之朋有過而能悔悔而能改人則曰是向之從事云爾今從事與向之從事弗類非其性也飾表以疑世也夫豈知言哉天播五行於萬靈人固備而有之有而不思則失思而不行則廢一日咎前之非沛然思而行之是失而復得廢而復舉也顧曰非其性是率天下而戕性也且如人有財見簒於盜已而得之曰非夫人之財向簒於盜矣可歟不可也財之在己固不若性之為已有也財失復得曰非其財且不可性失復得曰非其性可乎師說韓愈古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而耻學於師是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則耻師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也句讀之不知惑之不解或師焉或否焉小學而大遺吾未見其明也巫醫樂師百工之人不耻相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智乃反不能及其可怪也歟聖人無常師孔子師郯子萇𢎞師襄老耼郯子之徒其賢不及孔子孔子曰三人行則必有我師是故弟子不必不如師師不必賢於弟子聞道有先後術業有専攻如是而已李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師說以貽之雜說韓愈龍嘘氣成雲雲固弗靈於龍也然龍乗是氣茫洋窮乎𤣥間薄日月伏光景感震電神變化下水土汨陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴𨽻人之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬也雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也䇿之不以其道食之不能盡其材鳴之而不能通其意執䇿而臨之曰天下無馬嗚呼其真無馬耶其真不知馬耶捕蛇者說栁宗元永州之野産異蛇黒質而白章觸草木盡死以齧人無禦之者然得而腊之以為餌可以已大風攣踠瘻癘去死肌殺三蟲其始太醫以王命聚之嵗賦其二募有能捕之者當其租入永之人争奔走焉有蔣氏者専其利三世矣問之則曰吾祖死於是吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚慼者余悲之且曰若毒之乎余將告於莅事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久己病矣自吾氏三世居是鄉積於今六十嵗矣而鄉隣之生日蹙殫其地之出竭其廬之入號呼而轉徙饑渇而頓踣觸風雨犯寒暑呼吸毒癘徃徃而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死則徙爾而吾以捕蛇獨存悍吏之来吾鄉叫囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒盖一嵗之犯死者二焉其餘則熙熙而樂豈若吾鄉隣之旦旦有是哉今雖死乎此比吾鄉隣之死則已後矣又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也吾甞疑乎是今以蔣氏觀之猶信嗚呼孰知賦歛之毒有甚是蛇者乎國馬說李翺有乗國馬者與乗駿馬者竝道而行駿馬嚙國馬之髪血流於地國馬行步自若也精神自若也不為之顧如不知也既駿馬歸芻不食水不飲慄而立者二日駿馬之人以告國馬之人曰彼盖其所羞也吾以馬徃而喻之斯可矣乃如之於是國馬見駿馬而鼻之遂與之同櫪而芻不終時而駿馬之病自已夫四足而芻者馬之類也二足而言者人之類也如國馬者四足而芻則馬也耳目鼻口亦馬也四支百骸亦馬也不能言而聲亦馬也觀其所以為心者則人也故犯而不校國馬也過而能改駿馬也有人焉恣其氣以乗人人容之而不知者多矣觀其二足而言則人也耳目口鼻亦人也四支百骸亦人也求其所以為人者而弗得也彼人者以形骸為人國馬者以形骸為馬以彼人乗國馬人皆以為人乗馬吾未始不謂之馬乗人悲夫稼送張琥蘇軾曷甞觀於富人之稼乎其田美而多其食足而有餘其田美而多則可以更休而地力得完其食足而有餘則種之常不後時而歛之常及其熟故富人之稼常美少秕而多實久藏而不腐今吾十口之家而共百畝之田寸寸而取之日夜以望之鋤耰銍艾相尋於其上者如魚鱗而地力竭矣種之常不及時而歛之常不待其熟此豈能復有美稼哉古之人其才非有以大過今之人也其平居所以自養而不敢輕用以待其成者閔閔焉如嬰兒之望長也弱者養之以至於剛虚者養之以至於充三十而後仕五十而後爵信於久屈之中而用於至足之後流於既溢之餘而發於持滿之末此古之人所以大過人而今之君子所以不及也吾少也有志於學不幸而早得與吾子同年吾子之得亦不可謂不早也吾今雖欲自以為不足而衆且妄推之矣嗚呼吾子其去此而務學也哉博觀而約取厚積而薄發吾告子止於此矣子歸過京師而問焉有曰轍子由者吾弟也其亦以是語之說用曽鞏物有根而殖柯葉而茂芽若穂而實翼而天飛足而陸走喙而鳴息而食嚙者其形類多矣非有主於虚空以蕃而息之者歟吾觀其用亦宻矣彼使之水而濡火而焚雷而動風霆而鳴雪霜而悴雨露而滋碩則世得而知之矣若其裁之為形散之為聲充之為氣始終之為死生則非水也火也雷也風霆也雪霜也雨露也所能使為之也世固不可測其所以為也然而萬物相得以生是則其用非宻耶今夫羣而居縫而衣燧而食築土石搆竹木而廬者其嗜慾衆矣非有制而一之者則其争滋不息吾觀其用也宻矣彼立之君臣父子夫婦兄弟之序為之衣食飲用之物節之以儀通之以聲習之以言束縛之以刑則世皆得而知之矣若其擾之使相親和之使相恱厚之使相讓以不争結之使樂出其死而不顧其私遷之使去於利而就於誼則非序也物也儀也聲也氣也言也形也所能使為之也世固不測其所以為也然而萬民相得以治是則其用亦非宻耶吾有以知之矣生而死萬物者隂與陽也運于内而莫顯于外不可得而窮其妙也世之以水火雷風雪霜雨露而求之者妄也親而善萬人者仁與義也興于上而隂被于下馴于其心而不可彊通于其耳目不可得而識其㣲也世之侈于儀繁于聲音執于器據于文字以力驅而法縛者之求之也愈妄易曰隂陽不測之謂神又曰顯諸仁藏諸用善播萬物善教萬民者為之也明蘇洵天下有大知有小知人之智慮有所及有所不及聖人以其大知而兼其小知之功賢人以其所及而濟其所不及愚者不知大知而以其所不及喪其所及故聖人之治天下也以常而賢人之治天下也以時既不能常又不能時悲夫殆哉夫惟大知而後可以常以其所及濟其所不及而後可以時常也者無治而不治者也時也者無亂而不治者也日月經乎中天大可以被四海而小或不能入一室之下彼固無用此區區小明也故天下視日月之光儼然其若君父之威故自有天地而有日月以至于今而未甞可以一日無焉天下甞有言曰叛父母䙝神明則雷霆下擊之雷霆固不能為天下盡擊此等輩也而天下之所以兢兢然不敢犯者有時而不測也使雷霆日轟轟焉遶天下以求夫叛父母䙝神明之人而擊之則其人未必能盡而雷霆之威無乃䙝乎故夫知日月雷霆之分者可以用其明矣聖人之明吾不得而知也吾獨愛夫賢者之用其心約而成功博也吾獨怪夫愚者之用其心勞而功不成也是無他也専於其所及而及之則其及必精兼於其所不及而及之則其及必粗及之而精人將曰是惟無及及則精矣不然吾恐姦雄之竊笑也齊威王即位大亂三載威王一奮而諸侯震懼二十年是何修何營耶夫齊國之賢者非獨一即墨大夫明矣亂齊國者非獨一阿大夫與左右譽阿而毁即墨者幾人亦明矣一即墨大夫易知也一阿大夫易知也左右譽阿而毁即墨者幾人易知也從其易知而精之故用心甚約而成功博也天下之事譬如有物十焉吾舉其一而人不知吾之不知其九也歴數之至於九而不知其一不如舉一之不可測也而况乎不至於九也守戒韓愈詩曰大邦維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有宅於山者知猛獸之為害則必髙其柴援而外施陷阱以待之宅於都者知穿窬之為盜則必峻其垣牆而内固扃鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈强之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為有不足歟盖以謂不足為而不為耳天下之禍莫大於不足為材力不足者次之不足為者敵至而不知材力不足者先事而思則其於禍也有間矣彼之屈强者帶甲荷戈不知其多少其緜地則千里而與我壤地相錯無有丘陵江河洞庭孟門之闗其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乗吾之便此其暴於猛獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人釋言韓愈元和元年六月十日愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐且曰吾見子某詩吾時在翰林職親而地禁不敢相聞今為我寫子詩書為一通以来愈再拜謝退録詩書若干篇擇日時以獻於後之數月有来謂愈者曰子獻相國詩書乎曰然曰有為讒於相國之座者曰韓愈曰相國徴余文余不敢匿相國豈知我哉子其慎之愈應之曰愈為御史得罪徳宗朝同遷於南者凡三人獨愈為先收用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣四海九州之人自百官已下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜何以報况在天子之宰乎人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖日勉焉而不迨束帶執笏立士大夫之行不見斥以不肖幸矣其何敢敖於言乎夫敖雖凶徳必有恃而敢行愈之族親鮮少無扳聨之勢於今不善交人無相先相死之友於朝無宿資蓄貨以釣聲勢弱於才而腐於力不能奔走乗機抵􅇖以要權利夫何恃而敖若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈又知其無是疾也雖有讒者百人相國將不信之矣愈何懼而慎歟既累月又有来謂愈曰有讒子於翰林舎人李公與裴公者子其慎歟愈曰二公者吾君朝夕訪焉以為政於天下而階太平之治居則與天子為心膂出則與天子為股肱四海九州之人自百官已下其孰不願忠而望賜愈也不狂不愚不蹈河而入火病風而妄罵不當有如讒者之說也雖有讒者百人二公將不信之矣愈何懼而慎既以語應客夜歸私自尤曰咄市有虎而曽參殺人讒者之效也詩曰取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊傷於讒疾而甚之之辭也又曰亂之初生僭始既涵亂之又生君子信讒始疑而終信之之謂也孔子曰逺佞人夫佞人不能逺則有時而信之矣今我恃直而不戒禍其至哉徐又自解之曰市有虎聴者庸也曽參殺人以愛惑聰也巷伯之傷亂世是逢也今三賢方與天子謀所以施政於天下而階太平之治聽聰而視明公正而敦大夫聰明則聽視不惑公正則不邇讒邪敦大則有以容而思彼讒人者孰敢進而為讒哉雖進而為之亦莫之聴矣我何懼而慎既累月上命李公相客謂愈曰子前被言於一相今李公又相子其危哉愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者宰相不知也今二公合處而會言若及愈必曰韓愈亦人耳彼敖宰相又敖翰林其將何求必不然吾乃今知免矣既而讒言果不行罪言蘇軾吾聞肉食之憂非藿食者所宜慮也府居之謀非巷居者所宜處也分之所不及義之所弗出也義之所弗出利之所不擇也犯義者惑維卒不自克作罪言萬夫之望萬夫所依匪才尚之而量包之丘山之憾一笑可散芥蔕之仇千河不收嗚呼寧我容汝豈汝不可神之聴之終和而同乎乗人之氣決之易耳解忮觸猜是惟難哉水激則悍其傷滛夷矢激則逺行將安追嗚呼佐涉者湍佐鬬者呼柴不立其愚乃可以須愛心之偏其辭溢妍惡心之厚其辭溢醜惟仁人之言愛惡兩捐廣大恬愉上通於天嗚呼善言未升賔客瞰門曷以夀我公侯承之天道好還莫適後先人事喜復無常倚伏前之所是事定而渝今之所是後當焉如嗚呼禍不在先亦不在天還隠其心有萬其全疾惡過義美惡易位矯枉過直美惡同則如食宜饇饜則為度如酌孔取劇則荒舞嗚呼乃隂乃陽神理所藏一弛一張人道之常對禹問韓愈或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世争之之亂也堯舜之利民也大禹之慮民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人慮其患而不傳者禹也舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮也則深矣傳之子而當不淑則奈何曰時益以難理傳之人則争未前定也傳之子則不争前定也前定雖不當賢猶可以守法不前定而不遇賢則争且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢争傳諸子得大惡然後人受其亂禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而争且亂孰若傳諸子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不茍私於其子以害天下求其說而不得從而為之辭咸宜栁宗元興王之臣多起汙賤人曰幸也亡王之臣多死寇盜人曰禍也余咸宜之當兩漢氏之始屠販徒𨽻出以為公侯卿相無他焉彼固公侯卿相器也遭時之非是以詘獨其始之不幸非遭髙光而以為幸也漢晉之末公侯卿相劫戮困餓伏牆壁間以死無他焉彼固劫戮困餓器也遭時之非是以出獨其始之幸非遭卓曜而後為禍也彼困於昏亂伏志氣屈身體以下奴隸平難澤物之徳不施于人一得適其傃其進晚耳而人猶幸之彼伸於昏亂抗志氣肆身體以傲豪傑殘民興亂之伎行於天下一得適其傃其死後耳而人猶禍之悲夫余是以咸宜之庖丁莊周庖丁為文恵君解牛手之所觸肩之所倚足之所履膝之所踦砉然響然奏刀騞然莫不中音合於桑林之舞乃中經首之會文恵君曰嘻善哉技盖至此乎庖丁釋刀對曰臣之所好者道也進乎技矣始臣之解牛之時所見無非牛者三年之後未甞見全牛也方今之時臣以神遇而不以目視官知止而神欲行依乎天理批大郤導大􅑆因其固然技經肯綮之未甞而况大軱乎良庖嵗更刀割也族庖月更刀折也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於游刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族吾見其難為怵然為戒視為止行為遲動刀甚㣲謋然已解如土委地提刀而立為之四顧為之躊躇為之滿志善刀而藏之文恵君曰善哉吾聞庖丁之言得養生焉問養生蘇軾余問養生於吳子得二言焉曰和曰安何謂和曰子不見天地之為寒暑乎寒暑之極至於折膠流金而物不以為病其變者㣲也寒暑之變晝與日俱逝夜與月竝馳俯仰之間屢變而人不知者㣲之至和之極也使此二極者相尋而狎至則人之死久矣何謂安曰吾甞自牢山浮海達於淮遇大風焉舟中之人如附於桔橰而與之上下如蹈車輪而行反逆眩亂不可止而吾飲食起居如他日吾非有異術也惟莫與之争而聴其所為故凡病我者舉非物也食中有蛆人之見者必嘔也其不見而食者未甞嘔也請察其所從生論八珍者必嚥言糞穢者必唾二者未甞與我接也唾與嚥何從生哉果生於物乎果生於我乎知其生於我也則雖與之接而不變安之至也安則物之感我者輕和則我之應物者順外輕内順而生理備矣吳子古之静者也其觀於物也審矣是以私識其言而時省觀焉續楚語蘇軾屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之君子曰不違而道唐栁宗元非之曰屈子以禮之末忍絶其父將死之言且禮有齊之日思其所樂思其所嗜子木去芰安得為道甚矣栁子之陋也子木楚卿之賢者也夫豈不知為人子之道事死如事生况於將死丁寧之言棄而不用人情之所忍乎是必有大不忍於此者而奪其情也夫死生之際聖人嚴之薨於路寢不死於婦人之手至於結冠纓啟手足之末不敢不勉其於死生之變亦重矣父子平日之言可以恩掩義至於死生至嚴之際豈容以私害公乎曽子有疾稱君子之所貴乎道者三孟僖子卒使其子學禮於仲尼管仲病勸桓公去三豎夫數君子之言或主社稷或勤於道徳或訓其子孫雖所趨不同然皆篤於大義不私其躬也如此今赫赫楚國若敖氏之賢聞於諸侯身為正卿死不在民而口腹是憂其為陋亦甚矣使子木行之國人誦之太史書之天下後世不知夫子之賢而唯陋是聞子木其忍為此乎故曰是必有大不忍者而奪其情也然禮之所謂思其所樂思其所嗜此言人子追思之道也曽晳嗜羊棗而曽子不忍食父没而不能讀父之書母没而不能執母之器皆人子之情自然也豈待父母之命耶今薦芰之事若出於子則可自其父命則為陋耳豈可以飲食之故而成父莫大之陋乎曽子寢疾曽元難於易簀曽子曰君子之愛人也以徳細人之愛人也以姑息若以栁子之言為然是曽元為孝子而童子顧禮之末易簀於病革之中為不仁之甚也中行偃死視不可含范宣子盥而撫之曰事吳敢不如事主猶視欒懷子曰主茍終所不嗣事於齊者有如河乃瞑嗚呼范宣子知事吳為忠於主而不知報齊以成夫子憂國之美其為忠則大矣古人以愛惡比之美疢藥石曰石猶生我疢之美者其毒滋多由是觀之栁子之愛屈到是疢之美子木之違父命為藥石也哉日喻蘇軾生而眇者不識日問之有目者或告之曰日之狀如銅槃扣槃而得其聲他日聞鐘以為日也或告之曰日之光如燭捫燭而得其形他日揣籥以為日也日之與鐘籥亦逺矣而眇者不知其異以其未甞見而求之人也道之難見也甚於日而人之未達也無以異於眇達者告之雖有巧譬善導亦無以過於槃與燭也自槃而之鐘自燭而之籥轉而相之豈有既乎故世之言道者或即其所見而名之或莫之見而意之皆求道之過也然則道卒不可求歟蘇子曰道可致而不可求何謂致孫武曰善戰者致人不致於人孔子曰百工居肆以成其事君子學以致其道莫之求而自至斯以為致也歟南方多没人日與水居也七嵗而能涉十嵗而能浮十五而能没矣夫没者豈茍然哉必將有得於水之道者日與水居則十五而得其道生不識水則雖壯見舟而畏之故北方之勇者問於没人而求其所以沒以其言試之河未有不溺者也故凡不學而務求道皆北方之學没者也昔者以聲律取士士雜學而不志於道今也以經術取士士知求道而不務學渤海吳君彦律有志於學者也方求舉於禮部作日喻以告之文編巻三十八

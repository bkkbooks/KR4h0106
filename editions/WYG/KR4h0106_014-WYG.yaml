body:
  text: 文編卷十四明唐順之編蘇秦説秦惠王國䇿蘇秦始將連横説秦惠王曰大王之國西有巴蜀漢中之利北有胡貉代馬之用南有巫山黔中之限東有殽函之固田肥美民殷富戰車萬乗奮擊百萬沃埜千里畜積饒多地勢形便此所謂天府天下之雄國也以大王之賢士民之衆車騎之用兵法之教可以并諸侯吞天下稱帝而治願大王少留意臣請奏其効秦王曰寡人聞之毛羽不豐滿者不可以髙飛文章不成者不可以誅罰道徳不厚者不可以使民政教不順者不可以煩大臣今先生儼然不逺千里而庭教之願以異日蘇秦曰臣固疑大王之不能用也昔者神農伐補遂黄帝伐涿鹿而禽蚩尤堯伐驩兠舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂齊桓任戰而霸天下由此觀之惡有不戰者乎古者使車轂擊馳言語相結天下為一約從連横兵革不藏文士並飭諸侯亂惑萬端俱起不可勝理科條既備民多偽態書策稠濁百姓不足上下相愁民亡所聊明言章理兵甲愈起辯言偉服戰攻不息繁稱文辭天下不治舌敝耳聾不見成功行義約信天下不親扵是乃廢文任武厚養死士綴甲厲兵効勝扵戰塲夫徒處而致利安坐而廣地雖古五帝三王五伯明主賢君常欲坐而致之其勢不能故以戰續之寛則兩軍相攻迫則杖㦸相撞然後可建大功是故兵勝扵外義强扵内威立于上民服于下今欲并天下凌萬乗詘敵國制海内子元元臣諸侯非兵不可今之嗣主忽扵至道皆惽扵教亂于治迷于言惑于語沉于辯溺于辭以此論之王固不能行也説秦王書十上而説不行黑貂之裘敝黄金百斤盡資用乏絶去秦而歸贏縢履蹻負書擔囊形容枯槁面目黧黒狀有愧色歸至家妻不下絍嫂不為炊父母不與言蘇秦喟然歎曰妻不以我為夫嫂不以我為叔父母不以我為子是皆秦之罪也乃夜發書陳篋數十得太公陰符之謀伏而誦之簡練以為揣摩讀書欲睡引錐自刺其股血流至足曰安有説人主不能出其金玉錦繡取卿相之尊者乎期年揣摩成曰此眞可以説當世之君矣于是乃摩燕烏集闕見説趙王于華屋之下抵掌而談趙王大說封為武安君受相印革車百乗錦繡千純白璧百雙黄金萬鎰以隨其後約從散横以抑强秦故蘇秦相于趙而闗不通當此之時天下之大萬民之衆王侯之威謀臣之權皆欲決扵蘇秦之䇿不費斗糧未煩一兵未戰一士未絶一弦未折一矢諸侯相親賢于兄弟夫賢人在而天下服一人用而天下從故曰式扵政不式扵勇式扵廊廟之内不式扵四境之外當秦之隆黄金萬鎰為用轉轂連騎炫熿扵道山東之國從風而服使趙大重且夫蘇秦特窮巷掘門桑户捲樞之士耳伏軾撙銜横厯天下庭説諸侯之主杜左右之口天下莫之伉將說楚王路過洛陽父母聞之清宫除道張樂設飲郊迎三十里妻側目而視側耳而聽嫂蛇行匍伏四拜自跪而謝蘇秦曰嫂何前倨而後卑也嫂曰以季子位尊而多金蘇秦曰嗟乎貧窮則父母不子富貴則親戚畏懼人生世上勢位富厚盖可以忽乎哉蘇秦說燕文侯國䇿蘇秦将為從北説燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沲易水地方二千里帶甲數十萬車七百乗騎六千匹粟支二年南有碣石鴈門之饒北有棗栗之利民雖不田作棗栗之實足食扵民矣此所謂天府也夫安樂亡事不見覆軍殺将之憂亡過燕矣大王知其所以然乎夫燕之所以不犯寇被兵者以趙之為蔽扵其南也秦趙五戰秦再勝而趙三勝秦趙相敝而王以全燕制其後此燕之所以不犯難也且夫秦之攻燕也踰雲中九原過代上谷彌地踵道數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之衆軍扵東垣矣度呼沲涉易水不至四五日而距國都矣故曰秦之攻燕也戰扵千里之外趙之攻燕也戰扵百里之内夫不憂百里之患而重千里之外計亡過扵此者是故願大王與趙從親天下為一則國必亡患矣燕王曰寡人國小西迫强秦促近齊趙齊趙强國今主君幸教詔之合從以安燕敬以國從扵是齎蘇秦車馬金帛以至趙蘇秦説趙王國䇿蘇秦從燕之趙始合從説趙王曰天下之卿相人臣乃至布衣之士莫不髙賢大王之行義皆願奉教陳忠扵前之日久矣雖然奉陽君妬大王不得任事是以外賔客㳺談之士亡敢盡忠扵前者今奉陽君捐館舍大王乃今然後得與士民相親臣故敢進其愚忠為大王計莫若安民亡事請亡庸有為也安民之本在扵擇交擇交而得則民安擇交不得則民終身不得安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭斷絶人之交願大王愼亡出扵口也請屏左右曰言所以異隂陽而已矣大王誠能聽臣燕必致氊裘狗馬之地齊必致海隅魚鹽之地楚必致橘柚雲夢之地韓魏皆可使致封地湯沐之邑貴戚父兄皆可以受封侯夫割地效實五伯之所以覆軍禽将而求也封侯貴戚湯武之所以放殺而争也今大王垂拱而兩有之是臣之所以為大王願也大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則効宜陽宜陽効則上郡絶河外割則道不通楚弱則亡援此三策者不可不熟計也夫秦下軹道則南陽動刼韓包周則趙自銷鑠據衛取淇則齊必入朝秦欲己得行扵山東則必舉甲而向趙秦甲涉河踰漳據番吾則兵必戰扵邯鄲之下矣此臣之所以為大王患也當今之時山東之建國莫如趙彊趙地方三千里帶甲數十萬車千乗騎萬匹粟支十年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也且秦之所畏害扵天下者莫如趙然而秦不敢舉兵甲而伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也則不然亡有名山大川之限稍蠶食之傅之國都而止矣韓魏不能支秦必入臣扵秦秦亡韓魏之隔禍必中扵趙矣此臣之所以為大王患也臣聞堯亡三夫之分舜亡咫尺之地以有天下禹亡百人之聚以王諸侯湯武之卒不過三千人車不過三百乗而為天子誠得其道也是故明主外料其敵國之彊弱内度其士卒之衆寡賢與不肖不待兩軍相當而勝敗存亡之機節固己見扵胷中矣豈掩扵衆人之言而以㝠㝠決事哉臣竊以天下地圖按之諸侯之地五倍扵秦料諸侯之卒十倍扵秦六國并力為一西面而攻秦秦破必矣今西面而事之見臣扵秦夫破人之與破扵人也臣人之與臣扵人也豈可同日而言之哉夫横人者皆欲割諸侯之地以與秦成與秦成則髙臺榭美宫室聽竽笙琴瑟之音察五味之和前有軒轅後有長庭美人巧笑卒有秦患而不與其憂是故横人日夜務以秦權恐喝諸侯以求割地願大王之熟計之也臣聞明主絶疑去讒屏流言之迹塞朋黨之門故尊主廣地彊兵之計臣得陳忠扵前矣故竊為大王計莫如一韓魏齊楚燕趙六國從親以儐畔秦令天下之将相相與㑹扵洹水之上通質刑白馬以盟之約曰秦攻楚齊魏各出鋭師以佐之韓絶食道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出銳師以佐之趙涉河漳燕守雲中秦攻齊則楚絶其後韓守成臯魏塞午道趙涉河漳博闗燕出銳師以佐之秦攻燕則趙守常山楚軍武闗齊涉渤海韓魏出銳師以佐之秦攻趙則韓軍宜陽楚軍武闗魏軍河外齊涉渤海燕出銳師以佐之諸侯有先背約者五國共伐之六國從親以儐秦秦必不敢出兵扵函谷闗以害山東矣如是則霸業成矣趙王曰寡人年少莅國之日淺未嘗得聞社稷之長計今上客有意存天下安諸侯寡人敬以國從乃封蘇秦為武安君飾車百乗黄金千鎰白璧百雙錦繡千純以約諸侯蘇秦説韓王國䇿蘇秦為趙合從說韓王曰韓北有鞏洛成臯之固西有宜陽常阪之塞東有宛穰洧水南有陘山地方千里帶甲數十萬天下之彊弓勁弩皆自韓出谿子少府時力距來皆射六百步之外韓卒超足而射百發不暇止逺者達胸近者掩心韓卒之劒㦸皆出扵冥山棠谿墨陽合伯鄧師宛馮龍淵太阿皆陸斷馬牛水擊鵠鴈當敵即斬堅甲盾鞮鍪鐵幕革決㕹芮亡不畢具以韓卒之勇被堅甲蹠勁弩帶利劒一人當百不足言也夫以韓之勁與大王之賢乃欲西面事秦稱東藩築帝宫受冠帶祠春秋交臂而服焉夫羞社稷而為天下笑無過此者矣是故願大王之熟計之也大王事秦秦必求宜陽成臯今兹効之明年又益求割地與之即無地以給之不與則棄前功而後更受其禍且夫大王之地有盡而秦之求無己夫以有盡之地而逆無己之求此所謂市怨而賈禍者也不戰而地已削矣臣聞鄙語曰寧為雞口無為牛後今大王西面交臂而臣事秦何以異扵牛後乎夫以大王之賢挾彊韓之兵而有牛後之名臣竊為大王羞之韓王忿然作色攘臂按劒仰天太息曰寡人雖死必不能事秦今主君以趙王之教詔之敬奉社稷以從蘇秦說魏王國策蘇子為趙合從說魏王曰大王之地南有鴻溝陳汝許鄢昆陽邵陵舞陽新郪東有淮頴沂黄煮棗無疎西有長城之界北有河外巻衍燕酸棗地方千里名雖小然而廬田廡舍曾亡所芻牧牛馬之地人民之衆車馬之多日夜行不休已亡以異扵三軍之衆臣竊料之大王之國不下扵楚然横人訹謀王外交强虎狼之秦以侵天下卒有國患不被其禍夫挾强秦之勢以内刼其主罪亡過此者且魏天下之强國也大王天下之賢主也今乃有意西面而事秦稱東藩築帝宫受冠帶祠春秋臣竊為大王愧之臣聞越王句踐以散卒三千禽夫差扵干遂武王卒三千人革車三百乗斬紂于牧之埜豈其士卒衆哉誠能振其威也今竊聞大王之卒武力二十餘萬蒼頭二十萬奮擊二十萬厮徒十萬車六百乗騎五千匹此其過越王句踐武王逺矣今乃刼扵羣臣之說而欲臣事秦夫事秦必割地効質故兵未用而國已虧矣凡羣臣之言事秦者皆奸臣非忠臣也夫為人臣割其主之地以外交偷取一旦之功而不顧其後破公家而成私門外挾强秦之勢以内刼其主以求割地願大王之熟察之也周書曰綿綿不絶蔓蔓若何毫毛不拔將成斧柯前慮不定後有大患将奈之何大王誠能聽臣六國從親専心并力則必亡强秦之患故敝邑趙王使使臣獻愚計奉明約在大王詔之魏王曰寡人不肖未嘗得聞明教今主君以趙王之詔詔之敬以國從蘇秦說齊宣王國䇿蘇秦為趙合從説齊宣王曰齊南有泰山東有琅邪西有清河北有渤海此所謂四塞之國也齊地方二千里帶甲數十萬粟如丘山齊車之良五家之兵疾如錐矢戰如雷電解如風雨即有軍役未嘗倍太山絶清河涉渤海也臨淄之中七萬户臣竊度之下户三男子三七二十一萬不待發扵逺縣而臨淄之卒固己二十一萬矣臨淄甚富而實其民亡不吹竽鼔瑟擊筑彈琴鬭雞走犬六博蹹鞠者臨淄之途車轂擊人肩摩連袵成幃舉袂成幙揮汗成雨家敦而富志髙而揚夫以大王之賢與齊之强天下不能當今乃西面事秦竊為大王羞之且夫韓魏所以畏秦者以與秦接界也兵出而相當不至十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四竟不守戰而不勝以亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦攻齊則不然倍韓魏之地至衛陽晉之道徑亢父之險車不得方􅁤馬不得並行百人守險千人不能過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虚喝髙躍而不敢進則秦不能害齊亦明矣夫不料秦之不奈我何也而欲西面事秦是羣臣之計過今臣亡事秦之名而有强國之實臣固願大王之少留計齊王曰寡人不敏今主君以趙王之詔告之敬奉社稷以從蘇秦說楚威王國䇿蘇秦為趙合從説楚威王曰楚天下之强國也大王天下之賢王也楚地西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有陘塞郇陽地方五千里帶甲百萬車千乗騎萬匹粟支十年此霸王之資也夫以楚之强大王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不南面而朝扵章臺之下矣秦之所害扵天下莫如楚楚强則秦弱楚弱則秦强此其勢不兩立故為大王計莫如從親以孤秦大王不從親秦必起兩軍一軍出武闗一軍下黔中若此則鄢郢動矣臣聞之治之其未亂為之其未有也患至而後憂之則無及矣故願大王之早計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之明制委社稷宗廟練士厲兵在大王之所用之大王誠能聽臣之愚計則韓魏齊燕趙之妙音美人必充後宫矣趙代良馬槖駝必實扵外廏故從合則楚王横成則秦帝今釋霸王之業而有事人之名竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讐也横人皆欲割諸侯之地以事秦此所謂養仇而奉讐者也夫為人臣而割其主之地以外交强虎狼之秦以侵天下卒有秦患不顧其禍夫外挾强秦之威以内刼其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚横合則楚割地以事秦此兩策者相去逺矣有億兆之數兩者大王何居焉故敝邑趙王使臣効愚計奉明約在大王命之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏迫扵秦患不可與深謀與深謀恐反人以入扵秦故謀未發而國已危矣寡人自料以楚當秦未見勝焉内與羣臣謀不足恃也寡人卧不安席食不甘味心揺揺如懸旌而無所終薄今君欲一天下安諸侯存危國寡人謹奉社稷以從蘇秦説齊閔王國䇿蘇秦説齊閔王曰臣聞用兵而喜先天下者憂約結而喜主怨者孤夫後起者藉也而逺怨者時也是以聖人從事必藉扵權而務興扵時夫權藉者萬物之率也而時勢者百事之長也故無權藉倍時勢而能事成者寡矣今雖干将莫邪非得人力則不能割劌矣堅箭利金不得弦機之利則不能逺殺矣矢非不銛而劒非不利也何則權藉不在焉何以知其然也昔者趙氏襲衛車舍人不休傳衛國城割平衛八門土而二門墮矣此亡國之形也衛君跣行告遡扵魏魏王身被甲底劒挑趙索戰邯鄲之中騖河山之間亂衛得是藉也亦收餘甲而北而殘剛平墮中牟之郭衛非强扵趙也譬之衛矢而魏弦機也藉力魏而有河東之地趙氏懼楚人救趙而伐魏戰扵州西出梁門軍舍林中馬飲扵大河趙得是藉也亦襲魏之河北燒棘蒲隊黄城故剛平之殘也中牟之墮也黄城之隊也棘蒲之燒也此皆非趙魏之欲也然二國勸行之者何也衛明扵時權之藉也今世之為國者不然矣兵弱而好敵彊國罷而好衆怨事敗而好鞠之兵弱而憎下人地狹而好敵大事敗而好長詐行此六者而求霸則逺矣臣聞善為國者順民之意而料兵之能然後從扵天下故約不為人主怨伐不為人挫强如此則兵不費權不輕地可廣欲可成也昔者齊之與韓魏伐秦楚也戰非甚疾也分地又非多韓魏也然而天下獨歸咎扵齊者何也以其為韓魏主怨也且天下徧用兵矣齊燕戰而趙氏兼中山秦楚戰韓魏不休而宋越専用其兵此十國者皆以相敵為意而獨舉心扵齊者何也約而好主怨伐而好挫强也且夫强大之禍常以王人為意也夫弱小之殃常以謀人為利也是以大國危小國滅也大國之計莫若後起而重伐不義夫後起之藉與多而兵勁則是以衆强敵罷寡也兵必立也事不塞天下之心則利必附矣大國行此則名號不攘而至霸王不為而立矣小國之情莫如謹静而寡信諸侯謹静則四鄰不反寡信諸侯則天下不賣外不賣内不反則稸積朽腐而不用幣帛矯蠧而不服矣小國道此則不祠而福矣不貸而見足矣故曰祖仁者王立義者霸用兵窮者亡何以知其然也昔呉王夫差以强大為天下先襲郢而棲越身從諸侯之君而卒身死國亡為天下戮者何也此夫差平居而謀王强大而喜先天下之禍也昔者萊莒好謀陳蔡好詐莒恃越而滅蔡恃晉而亡此皆内長詐外信諸侯之殃也由此觀之則强弱大小之禍可見扵前事矣語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之夫駑馬女子筋力骨勁非賢扵騏驥孟賁也何則後起之藉也今天下之相與也不並滅有能案兵而後起寄怨而誅不直微用兵而寄扵義則亡天下可跼足而須也眀扵諸侯之故察扵地形之理者不約親不相質而固不趨而疾衆事而不反交割而不相憎俱强而加以親何則形同憂而兵趨利也何以知其然也昔者燕齊戰扵桓之曲燕不勝十萬之衆盡胡人襲燕樓煩數縣取其牛馬夫胡之與齊非素親也而用兵又非約質而謀燕也然而甚扵相趨者何也形同憂而兵趨利也由此觀之約扵同形則利長後起則諸侯可趨役也故明主察相誠欲以霸王為志則戰攻非所先戰者國之殘也而都縣之費也殘費已先而能從諸侯者寡矣彼戰者之為殘也士聞戰則輸私財而富軍市輸飲食而待死士令折轅而炊之殺牛而觴士則是路窘之道也中人禱祀君翳釀通都小縣置社有市之邑莫不正事而奉王則此虚中之計也夫戰之明日尸死扶傷雖若有功也軍出費中哭泣則傷主心矣死者破家而葬夷傷者空財而共藥完者内酺而華樂故其費與死傷者鈞故民之所費也十年之田而不償也軍之所出矛㦸折鐶弦絶傷弩破車罷馬亡矢之太半甲兵之具宫之所私出也士大夫之所匿厮養士之所竊十年之田而不償也天下有此再費者而能從諸侯者寡矣攻城之費百姓理襜蔽舉衝櫓家雜總身窟穴中罷扵刀金而士困扵土功将不釋甲期數而能拔城者為亟耳上倦扵教士斷扵兵故三下城而能勝敵者寡矣故曰彼戰攻者非所先也何以知其然也昔智伯瑶攻范中行氏殺其君滅其國又西圍晉陽吞并二國而憂一主此用兵之盛也然而智伯卒身死國亡為天下笑者何謂也兵先戰攻而滅二子之患也昔者中山悉起而迎燕趙南戰扵長子敗趙氏北戰扵中山克燕軍殺其将夫中山千乗之國也而攻萬乗之國二再戰比勝此用兵之上節也然而國遂亡君臣扵齊者何也不嗇扵戰攻之患也由此觀之則戰攻之敗可見扵前事矣今世之所謂善用兵者終戰比勝而守不可抜天下稱為善一國得而保之則非國之利也臣聞戰大勝者其士多死而兵益弱守而不可拔者其百姓罷而城郭露夫士死扵外民殘扵内而城郭露扵境則非王之樂也今夫鵠的非咎罪扵人也便弓引弩而射之中者則善不中則愧少長貴賤則同心扵貫之者何也惡其示人以難也今窮戰比勝而守必不拔則是非徒示人以難也又且害人者也然則天下仇之必矣夫罷士露國而多與天下為仇則明君不居也素用强兵而弱之則察相不事彼明君察相者則五兵不動而諸侯從辭讓而重賂至矣故明君之攻戰也甲兵不出扵軍而敵國勝衝櫓不施而邊城降士民不知而王業至矣彼明君之從事也用財少曠日逺而利長者故曰兵後起則諸侯可趨役也臣之所聞攻戰之道非師者雖有百萬之軍比之堂上雖有闔閭吳起之将禽之户内千丈之城拔之尊俎之間百尺之衝折之袵席之上故鐘鼔竽瑟之音不絶地可廣而欲可成和樂倡優侏儒之笑不乏諸侯可同日而致也故名配天地不為尊利制海内不為厚故夫善為王業者在勞天下而自逸亂天下而自安諸侯亡成謀則其國亡宿憂也何以知其然也佚治在我勞亂在天下則王之道也銳兵來則拒之患至則趨之使諸侯亡成謀則其國無宿憂矣何以知其然也昔者魏王擁土千里帶甲三十六萬恃其强而㧞邯鄲西圍定陽又從十二諸侯朝天子以西謀秦秦王恐之寝不安席食不甘味令扵境内盡堞中為戰具竟為守備為死士置将以待魏氏衛鞅謀扵秦王曰夫魏氏其功大而令行于天下有十二諸侯而朝天子其與必衆故以一秦而敵大魏恐不如王何不使臣見魏王則臣請必北魏矣秦王許諾衛鞅見魏王曰大王之功大矣令行扵天下矣今大王之所從十二諸侯非宋衛也則鄒魯陳蔡此固大王之所以鞭箠使也不足以王天下大王不若北取燕東伐齊則趙必從矣西取秦南伐楚則韓必從矣大王有伐齊楚心而從天下之志則王業成矣大王不如先行王服然後圖齊楚魏王説扵衛鞅之言也故身廣公宫制丹衣柱建九斿從七星之旟此天子之位也而魏王處之扵是齊楚怒諸侯奔齊齊人伐魏殺其太子覆其十萬之軍魏王大恐跣行按兵扵國而東次扵齊然後天下乃舍之當是時秦王垂拱而受西河之外而不以徳魏王故衛鞅之始與秦王計也謀約不下席言扵尊俎之間謀成扵堂上而魏将己禽扵齊矣衝櫓未施而西河之外已入扵秦矣此臣之所謂比之堂上禽将户内拔賊扵尊俎之間折衝席上者也張儀説韓王國䇿張儀為秦連横説韓王曰韓地險惡山居五穀所生非麥而豆民之所食大抵豆飯藿羹一嵗不収民不厭糟糠地方不滿九百里無二嵗之所食料大王之卒悉之不過三十萬而厮徒負養在其中矣為除守徼亭障塞見卒不過二十萬而已秦帶甲百餘萬車千乗騎萬匹虎鷙之士跿跔科頭貫頥奮㦸者至不可勝計也秦馬之良戎兵之衆探前蹶後蹄間三尋者不可勝數也山東之卒被甲冐胄以㑹戰秦人捐甲徒裎以趨敵左挈人頭右挾生虜夫秦卒之與山東之卒也猶孟賁之與怯夫也以重力相壓猶烏獲之與嬰兒也夫戰孟賁烏獲之士以攻不服之弱國無以異扵墮千鈞之重集扵鳥卵之上必無幸矣諸侯不料兵之弱食之寡而聽從人之甘言好辭比周以相飾也皆言曰聽吾計則可以强伯天下夫不顧社稷之長利而聽須㬰之説詿誤人主者無過扵此者矣大王不事秦秦下甲據宜陽斷絶韓之上地東取成臯宜陽則鴻臺之宫桑林之苑非王之有己夫塞成臯絶上地則王之國分矣先事秦則安矣不事秦則危矣夫造禍而求福計淺而怨深逆秦而順趙楚雖欲無亡不可得也故為大王計莫如事秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能强扵楚也其地勢然也今王西面而事秦以攻楚敝邑秦王必喜夫攻楚而私其地轉禍而説秦計無便于此者也是故秦王使使臣獻書大王御史須以決事韓王曰客幸而教之請比郡縣築帝宫祠春秋稱東藩効宜陽張儀説楚王國䇿張儀為秦破從連横説楚王曰秦地半天下兵敵四國被山帶河以為固虎賁之士百餘萬車千乗騎萬匹粟如丘山法令既明士卒安難樂死主嚴以明将智以武雖無出兵甲席卷常山之險折天下之脊天下後服者先亡且夫為從者無以異扵驅羣羊而攻猛虎也夫虎之與羊不格明矣今大王不與猛虎而與羣羊竊以為大王之計過矣凡天下彊國非秦而楚非楚而秦兩國敵侔交争其勢不兩而大王不與秦秦下甲兵據宜陽韓之上地不通下河東取成臯韓必入臣扵秦韓入臣魏則從風而動秦攻楚之西韓魏攻其北社稷豈得無危哉且夫約從者聚羣弱而攻至强也夫以弱攻强不料敵而輕戰國貧而驟舉兵此危亡之術也臣聞之兵不如者勿與挑戰粟不如者勿與持久夫從人者飾辯虚辭髙主之節行言其利而不言其害卒有楚禍無及為己是故願大王之熟計之也秦西有巴蜀方船積粟起扵汶山循江而下至郢三千餘里舫船載卒一舫載五十人與三月之糧下水而浮一日行三百餘里里數雖多不費汗馬之勞不至十日而距扞闗扞闗驚則從竟陵以東盡城守矣黔中巫郡非王之有已秦舉甲出之武闗南面而攻則北地絶秦兵之攻楚也危難在三月之内而楚恃諸侯之救在半嵗之外此其勢不相及也夫恃弱國之救而忘强秦之禍此臣所以為大王之患也且大王嘗與吳人五戰三勝而亡之陳卒盡矣有偏守新城而居民苦矣臣聞之攻大者易危而民敝者怨扵上夫守易危之功而逆强秦之心臣竊為大王危之且夫秦之所以不出甲扵函谷闗十五年以攻諸侯者隂謀有吞天下之心也楚嘗與秦搆難戰扵漢中楚人不勝通侯執珪死者七十餘人遂亡漢中楚王大怒興師襲秦與秦戰扵藍田又却此所謂兩虎相搏者也夫秦楚相敝而韓魏以全制其後計無過一作危扵此者矣是故願大王熟計之也秦下兵攻衛陽晉必闗扃天下之匈大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有已凡天下所信約從親堅者蘇秦封為武安君而相燕即隂與燕王謀破齊共分其地乃佯有辠出奔入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦扵市夫以一詐偽反覆之蘇秦而欲經營天下混一諸侯其不可成也亦明矣今秦之與楚也接境壤界固形親之國也大王誠能聽臣臣請秦太子入質扵楚楚太子入質扵秦請以秦女為大王箕帚之妾效萬家之都以為湯沐之邑長為昆弟之國終身亡相攻擊臣以謂計無便扵此者故敝邑秦王使使臣獻書之從車下風須以決事楚王曰楚國僻陋託東海之上寡人年幼不習國家之長計今上客幸教以明制寡人聞之敬以國從乃遣使車百乗獻雞駭之犀夜光之璧扵秦王張儀説魏王國䇿張儀為秦連横説魏王曰魏地方不至千里卒不過三十萬人地四平諸侯四通條達輻湊亡有名山大川之限從鄭至梁不過百里從陳至梁二百餘里馬馳人趨不待倦而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方守亭障者參列粟糧漕庾不下十萬魏之地勢故戰塲也魏南與楚而不與齊則齊攻其東東與齊而不與趙則趙攻其北不合扵韓則韓攻其西不親扵楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者以安社稷尊主彊兵顯名也合從者一天下約為兄弟刑白馬以盟扵洹水之上以相堅也夫親昆弟同父母尚有争錢財而欲恃詐偽反覆蘇秦之餘謀其不可以成亦明矣大王不事秦秦下兵攻河外拔巻衍燕酸棗刼衛取晉陽則趙不南趙不南則魏不北魏不北則從道絶則大王之國欲求無危不可得也秦挾韓而攻魏韓刼扵秦不敢不聽秦韓為一國魏之亡可立而須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王髙枕而卧國必無憂矣且夫秦之所欲弱莫如楚而能弱楚者莫如魏楚雖有富大之名其實空虚其卒雖衆多然而輕走易北不敢堅戰悉魏之兵南面而伐勝楚必矣夫虧楚而益魏攻楚而適秦内嫁禍安國此善事也大王不聽臣秦甲出而東伐雖欲事秦而不可得也且夫從人多奮辭而寡可信説一諸侯之王出而乗其車約一國而成反而取封侯之基是故天下之㳺士莫不日夜搤腕瞋目切齒以言從之便以說人主人主覽其辭牽其説惡得無眩哉臣聞積羽沈舟羣輕折軸衆口鑠金故願大王之熟計之也魏王曰寡人惷愚前計失之請稱東藩築帝宫受冠帶祠春秋効河外張儀説齊王國䇿張儀為秦連横説齊王曰天下强國無過齊者大臣父兄殷衆富樂無過齊者然而為大王計者皆為一時説而不顧萬世之利從人説大王者必謂齊西有强趙南有韓魏負海之國也地廣人衆兵强士勇雖有百秦将無奈我何大王覽其説而不􅊫其至實夫從人朋黨比周莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有勝名而有亡之實是何故也齊大而魯小今趙之與秦也猶齊之與魯也秦趙戰扵河漳之上再戰而再勝秦戰扵番吾之下再戰而再勝秦四戰之後趙亡卒數十萬邯鄲僅存雖有勝秦之名而國破矣是何故也秦强而趙弱也今秦楚嫁子取婦為昆弟之國韓獻宜陽魏效河外趙入朝黽池割河間以事秦大王不事秦秦驅韓魏攻齊之南地悉趙涉河闗指博闗臨菑即墨非王之有也國一日被攻雖欲事秦不可得也是故願大王熟計之齊王曰齊僻陋隱居託扵東海之上未嘗聞社稷之長利今大客幸而教之請奉社稷以事秦獻魚鹽之地三百扵秦張儀説趙王國䇿張儀為秦連横説趙王曰敝邑秦王使臣敢獻書扵大王御史大王收率天下以儐秦秦兵不敢出函谷闗十五年矣大王之威行扵天下山東敝邑恐懼懾伏繕甲厲兵飾車騎習馳射力田積粟守四封之内愁居懾處不敢動揺唯大王有意督過之也今秦以大王之力西舉巴蜀并漢中東収兩周而西遷九鼎守白馬之津秦雖僻逺然而心忿悁含怒之日久矣今寡君有敝甲鈍兵軍扵澠池願渡河踰漳據番吾迎戰邯鄲之下願以甲子之日合戰以正殷紂之事敬使臣先以聞扵左右凡大王之所信以為從者恃蘇秦之計秦熒惑諸侯以是為非以非為是欲反覆齊國而不能自令車裂扵齊之市夫天下之不可一亦明矣今楚與秦為昆弟之國而韓魏稱扵東藩齊獻魚鹽之地此斷趙之右臂也夫斷右臂而求與人鬭失其黨而孤居求欲無危豈可得哉今秦發三將軍一軍塞午道告齊使興師渡清河軍扵邯鄲之東一軍軍扵成臯敺韓魏而軍扵河外一軍軍扵澠池約曰四國為一以攻趙破趙而四分其地是故不敢匿意隱情先以聞扵左右臣切為大王計莫如與秦遇扵澠池面相見而身相結也臣請案兵無攻願大王之定計趙王曰先王之時奉陽君相専權擅勢蔽晦先王獨制官事寡人宫居屬扵師傅不得與國謀先王棄羣臣寡人年少奉祠祭之日淺私心固竊疑焉以為一從不事秦非國之長利也乃且願變心易慮剖地謝前過以事秦方將約車趨行而適聞使者之明詔扵是乃以車二百乗入朝澠池割河間以事秦張儀説燕王國䇿張儀為秦破從連横謂燕王曰大王之所親莫如趙昔趙王以其姊為代王妻欲并代約與代王遇于勾注之塞乃令工人作為金斗長其尾令之可以擊人與代王飲而隂告厨人曰即酒酣樂進熱歠即因反斗擊之于是酒酣樂進取熱歠厨人進斟羮因反斗而擊代王殺之王腦塗地其姊聞之摩笄以自刺也故至今有摩笄之山天下莫不聞夫趙王之狼戾亡親大王之所明見知也且以趙王為可親邪趙興兵而攻燕再圍燕都而刼大王大王割十城乃却以謝趙王已入朝澠池效河間以事秦今大王不事秦秦下甲雲中九原馳趙而攻燕則易水長城非王之有也且今時趙之於秦猶郡縣也不敢妄興師以征伐今大王事秦秦王必喜而趙不敢妄動矣是西有强秦之援而南無齊趙之患是故願大王之熟計也燕王曰寡人蠻夷僻處雖大男子裁如嬰兒言不足以求正謀不足以決事今上客幸而教之請奉社稷西面而事秦獻常山之尾五城韓非初見秦王國䇿韓非初見秦王曰臣聞弗知而言為不智知而不言為不忠為人臣不忠當死言不審亦當死雖然臣願悉言所聞大王裁其罪臣聞天下隂燕陽魏連荆固齊収餘韓成從將西南以與秦為難臣竊笑之世有三亡而天下得之其此之謂乎臣聞之曰以亂攻治者亡以邪攻正者亡以逆攻順者亡今天下之府庫不盈囷倉空虚悉其士民張軍數千百萬白刃在前斧質在後而皆去之不能死非其百姓不能死也言賞則不與言罰則不行賞罰不行故民不死也今秦出號令而行賞罰不攻耳有功無功相事也出其父母懐袵之中生未嘗見冦也聞戰頓足徒裼犯白刃蹈煨炭斷死於前者比比是也夫斷死與斷生也不同而民為之者是貴奮也一可以合十十可以合百百可以合千千可以合萬萬可以勝天下矣今秦地形斷長續短方數千里名師數百萬秦之號令賞罰地形利善天下莫如也以此與天下天下不足兼而有也是知秦戰未嘗不勝攻未嘗不取所當未嘗不破也開地數千里此甚大功也然而甲兵頓士民病蓄積索田疇荒囷倉虚四鄰諸侯不服伯王之名不成此無異故謀臣皆不盡其忠也臣敢言徃昔昔者齊南破荆中破宋西服秦北破燕中使韓魏之君地廣而兵强戰勝攻取詔令天下濟清河濁足以為限長城鉅防足以為塞齊五戰之國也一戰不勝而無齊故由此觀之夫戰者萬乗之存亡也且臣聞之曰削株掘根無與禍鄰禍乃不存秦與荆人戰大破荆襲郢取洞庭五都江南荆王亡走東伏扵陳當是之時隨荆以兵則兵可舉舉荆則其民足貪也地足利也東以强齊燕中陵三晉然則是一舉而伯王之名可成也四隣諸侯可朝也而謀臣不為引軍而退與荆人和令荆人収亡國聚㪚民立社主置宗廟令帥天下西面以與秦為難此固己無霸王之道一矣天下有比志而軍華下大王以詐破之兵至梁都圍梁數旬則梁可拔拔梁則魏可舉舉魏則荆趙之志絶荆趙之志絶則趙危趙危而荆孤東以强齊燕中陵三晉然則是一舉而霸王之名可成也四鄰諸侯可朝也而謀臣不為引軍而退與魏氏和令魏氏収亡國取散民立社主置宗廟此固己無霸王之道二矣前者穰侯之治秦也用一國之兵而欲以成兩國之功是故兵終身暴露扵外士民潞病扵内霸王之名不成此固已無霸王之道三矣趙氏中央之國也雜民之所居也其民輕而難用也號令不治賞罰不信地形不便上非能盡其民力彼固亡國之形也而不憂民氓悉其士民軍扵長平之下以争韓之上黨大王以詐破之拔武安當是時趙氏上下不相親也貴賤不相信也然則是邯鄲不守拔邯鄲完河間引軍而去西攻修武踰羊腸降代上黨代三十六縣上黨十七縣不用一領甲不苦一民皆秦之有也代上黨不戰而已為秦矣東陽河外不戰而已反為齊矣中呼沱以北不戰而已為燕矣然則是舉趙則韓必亡韓亡則荆魏不能獨立則是一舉而壞韓蠧魏挾荆以東弱齊燕決白馬之口以流魏氏一舉而三晉亡從者敗大王拱手以須天下徧隨而伏霸王之名可成也而謀臣不為引軍而退與趙氏為和以大王之明秦兵之强霸王之業地尊不可得乃取欺扵亡國是謀臣之拙也且夫趙當亡不亡秦當霸不霸天下固量秦之謀臣一矣乃復悉以攻邯鄲不能拔也棄甲兵怒戰慄而却天下固量秦力二矣軍乃引退并扵李下大王又并軍而致與戰非能厚勝之也又交罷却天下固量秦力三矣内者量吾謀臣外者極吾兵力由是觀之臣以天下之從豈其難矣内者吾甲兵頓士民病蓄積索田疇荒囷倉虛外者天下比志甚固願大王有以慮之也且臣聞之戰戰慄慄日愼一日茍愼其道天下可有也何以知其然也昔者紂為天子帥天下将百萬左飲扵淇谷右飲扵洹水淇水竭而洹水不流以與周武為難武王將素甲三千領戰一日破紂之國禽其身據其地而有其民天下莫不傷智伯帥三國之衆以攻趙襄主扵晉陽決水灌之三年城且拔矣襄主錯龜數策占兆以視利害何國可降而使張孟談扵是潛行而出反智伯之約得兩國之衆以攻智伯之國禽其身以成襄子之功今秦地斷長續短方數千里名師數百萬秦國號令賞罰地形利害天下莫如也以此與天下天下可兼而有也臣昧死望見大王言所以舉破天下之從舉趙亡韓臣荆魏親齊燕以成霸王之名朝四鄰諸侯之道大王試聽其説一舉而天下之從不破趙不舉韓不亡荆魏不臣齊燕不親霸王之名不成四鄰諸侯不朝大王斬臣以狥扵國以主不忠扵國者蘇代為韓說秦國䇿韓人攻宋秦王大怒曰吾愛宋與新城陽晉同也韓珉與我交而攻我所甚愛何也蘇代因為韓説秦王曰韓珉之攻宋所以為王也以韓之强輔之以宋楚魏必恐恐必西面事秦王不折一兵不殺一人無事而割安邑此韓珉之所以禱扵秦也秦王曰吾固患韓之難知一從一横此其說何也對曰天下固令韓可知矣韓固已攻宋矣其西事秦以萬乗自輔不西事秦則宋地不安矣中國白頭游敖之士皆積智欲離秦韓之交伏軾結靷西馳者未有一人言善韓者也伏軾結靷東馳者未有一人言善秦者也皆不欲韓秦之合者何也則晉楚智而韓秦愚也晉楚合必同韓秦韓秦合必圖晉楚請以決事秦王曰善蘇代為信安君說秦國䇿秦召魏相信安君信安君不欲往蘇代為説秦王曰臣聞之忠不必黨黨不必忠今臣願為大臣陳臣之愚意恐其不忠扵下吏自使有要領之辠願大王察之今大王令人執事扵魏以完其交臣恐魏交之益疑也将以塞趙也臣又恐趙之益勁也夫魏王之愛習魏信也甚矣其智能而任用之也厚矣其畏惡嚴尊秦也明矣今王之使人入魏而不用則王之使人入魏亡益也若用魏必舍所愛習而用所畏惡此魏王之所不安也夫舍萬乗之事而退此魏信之所難行也夫令人之君處所不安令人之相行所不能以此為親則難久矣臣故恐魏交之益疑也且魏信舍事則趙之謀者必曰合扵秦秦必令其所愛信者用趙是趙存而我亡也趙亡而我危也則上有埜戰之氣下有堅守之心臣故恐趙之益勁也大王欲完魏之交而使趙小心乎不如用魏信而尊之以名魏信事王則國安而名尊離王則國危而權輕然則魏信之事王也上所以為其主者忠矣下所以自為者厚矣彼其事王必完矣趙之用事者必曰魏氏之名族不高扵我土地之實不厚扵我魏信以韓魏事秦秦甚善之國得安焉身得尊焉今我搆難扵秦兵為招質國處削危之形非得計也結怨扵外生患扵中身處死亡之地非完事也彼将傷其前事而悔過其行冀其利必多割地以深下王則是大王垂拱多割地以為利重堯舜之所求而不能得也臣願大王察之黄歇說秦昭王國䇿物至而反冬夏是也致至而危絫棊是也今大國之地半天下有二垂此從生民以來萬乗之地未嘗有也先帝文王武王王之身三世而不接地扵齊以絶從親之要今王使成橋守事扵韓成橋以北入燕是王不用甲不伸威而出百里之地王可謂能矣王又舉甲兵而攻魏杜大梁之門舉河内拔燕酸棗虚桃人楚燕之兵雲翔而不敢校王之功亦多矣王休甲息衆二年然後復之又取蒲衍首垣以臨仁平丘小黄濟陽嬰城而魏氏服矣王又割濮磨之北屬之燕斷齊秦之要絶楚魏之脊天下五合六聚而不敢救也王之威亦單矣王若能持功守威省攻伐之心而肥仁義之誡使亡復後患三王不足四五伯不足六也王若負人徒之衆恃甲兵之强毁魏氏之威而欲以力臣天下之主臣恐有後患詩云靡不有初鮮克有終易曰狐濡其尾此言始之易終之難也何以知其然也智氏見伐趙之利而不知榆次之禍也吳見伐齊之便而不知干隧之散也此二國者非亡大功也没利扵前而易患扵後也吳之信越也從而伐齊遂攻齊人扵艾陵還為越王禽扵三江之浦智氏信韓魏從而伐趙攻晉陽之城勝有日矣韓魏反之殺智伯瑶扵鑿臺之上今王妬楚之不毁也而忘毁楚之彊魏也臣為大王慮而不取詩云大武逺宅不涉從此觀之楚國援也鄰國敵也詩云他人有心予忖度之躍躍毚兔遇犬獲之今王中道而信韓魏之善王也此正吳信越也臣聞敵不可易時不可失臣恐韓魏之卑辭慮患而實欺大國也王既亡重世之徳扵韓魏而有絫世之怨焉夫韓魏父子兄弟接踵而死扵秦者百世矣本國殘社稷壞宗廟隳刳腹拆頤首身分離暴骨草澤頭顱僵仆相望扵境父子老弱係虜相隨扵路鬼神狐祥亡所食百姓不聊生族類離散流亡為臣妾滿海内矣韓魏之不亡秦社稷之憂也今王之攻楚不亦失乎且王攻楚之日則惡出兵王将藉路扵仇讐之韓魏乎兵出之日而王憂其不反也是王以兵資扵仇讐之韓魏必攻隨陽右壤此皆廣川大水山林溪谷不食之地王雖有之不為得地是王有毁楚之名亡得地之實也且王攻楚之日四國必悉起應王秦楚之兵搆而不離魏氏将出兵而攻留方與銍胡陵碭蕭相故宋必盡齊人南面泗北必舉此皆平原四達膏腴之地也而王使之獨攻王破楚扵以肥韓魏扵中國而勁齊韓魏之强足以校扵秦矣而齊南以泗為境東負海北倚河而無後患天下之國莫强扵齊齊魏得地葆利而詳事下吏一年之後為帝若未能扵以禁王之為帝有餘夫以王壤土之博人徒之衆兵革之强而注地扵楚詘令韓魏歸帝重扵齊是王失計也臣為王慮莫若善楚秦楚合而為一以臨韓韓必授首王襟以山東之險帶以河曲之利韓必為闗中之侯若是王以十萬戍鄭梁氏寒心許鄢陵嬰城上蔡召陵不徃來也如此而魏亦闗内侯矣王一善楚而闗内二萬乗之主注地扵秦齊之右壤可拱手而取也是王之地一經兩海要絶天下也是燕趙無齊楚齊楚無燕趙也然後危動燕趙持齊楚此四國者不待痛而服矣楚人以弋説頃襄王國䇿楚人有好以弱弓微繳加鳬鴈之上者頃襄王聞召而問之對曰小臣之好射鶀鴈羅鸗小矢之發也何足為大王道也且稱楚之大因大王之賢所弋非直此也昔者三王以弋道徳五伯以弋戰國故秦魏燕趙者鶀鴈也齊魯韓衛者青首也鄒費郯邳者羅鸗也外其餘則不足射者見鳥六雙以王何取王何不以聖人為弓以勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳬鴈之實也王朝張弓而射魏之大梁之南加其右臂而徑屬之扵韓則中國之路絶而上蔡之郡壊矣還射圉之東解魏左肘而外擊定陶則魏之東外棄而大宋方興二郡者舉矣且魏斷二臂顚越矣膺撃郯國大梁可得而有也王綪繳蘭臺飲馬西河定魏大梁此一發之樂也若王之扵弋誠好而不厭則出寳弓碆新繳射噣鳥扵東海還盖長城以為防朝射東莒夕發須丘夜加即墨顧據午道則長城之東収而太山之北舉矣西結境扵趙而北達扵燕三國布􅖬則從不待約而可成也北逰目扵燕之遼東而南登望扵越之㑹稽此再發之樂也若夫泗上十二諸侯左縈而右拂之可一旦而盡也今秦破韓以為長憂得列城而不敢守也伐魏而亡功擊趙顧病則秦魏之勇力屈矣楚之故地漢中析酈可得而復有也王出寳弓碆新繳涉鄳塞而待秦之倦也山東河内可得而一也勞民休衆南面稱王矣故曰秦為大鳥負海内而處東面而立左臂據趙之西南右臂傅楚鄢郢膺擊韓魏垂頭中國處既形便勢有地利奮翼鼔􅖬方三千里則秦未可得獨招而夜射也欲以激怒襄王故對以此言襄王因召與語遂言曰夫先王為秦所欺而客死扵外怨莫大焉今以匹夫有怨尚有報萬乗白公子胥是也今楚之地方五千里帶甲百萬猶足以踴躍中埜也而坐受困臣竊為大王弗取也扵是頃襄王遣使扵諸侯約為從欲以伐秦婁敬説髙祖都闗中漢書陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周之先自后稷堯封之邰積徳絫善十餘世公劉避桀居豳太王以狄伐故去豳杖馬箠去居岐國人争歸之及文王為西伯斷虞芮訟始受命吕望伯夷自海濱來歸之武王伐紂不期而㑹孟津上八百諸侯遂滅殷成王即位周公之屬傅相焉乃營成周都雒以為此天下中諸侯四方納貢職道里鈞矣有徳則易以王無徳則易以亡凡居此者欲令務以徳致人不欲阻險令後世驕奢以虐民也及周之衰分而為二天下莫朝周周不能制非徳薄形勢弱也今陛下起豐沛収卒三千人以之徑往巻蜀漢定三秦與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地父子暴骸中埜不可勝數哭泣之聲不絶傷夷者未起而欲比隆成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具因秦之故資甚美膏腴之地此所謂天府陛下入闗而都之山東雖亂秦故地可全而有也夫與人鬬不搤其亢拊其背未能全勝今陛下入關而都按秦之故此亦搤天下之亢而拊其背也枚乗說吳王辭漢書昔者秦西舉胡戎之難北備榆中之闗南距羌筰之塞東當六國之從六國乗信陵之籍明蘇秦之約厲荆軻之威并力一心以備秦然秦卒禽六國滅其社稷而并天下是何也則地利不同而民輕重不等也今漢據全秦之地兼六國之衆修戎狄之義而南朝羌筰此其與秦地相什而民相百大王之所明知也今夫諂䛕之臣為大王計者不論骨肉之義民之輕重國之大小以為呉禍此臣所以為大王患也夫舉吳兵以訾扵漢譬猶蠅蚋之附羣牛腐肉之齒利劍鋒接必無事矣天子聞吳率失職諸侯願責先帝之遺約今漢親誅其三公以謝前過是大王之威加扵天下而功越扵湯武也夫吳有諸侯之位而實富扵天子有隱匿之名而居過扵中國夫漢并二十四郡十七諸侯方輸錯出運行數千里不絶扵道其珍怪不如東山之府轉粟西鄉陸行不絶水行滿河不如海陵之倉修治上林雜以離宫積聚玩好圈守禽獸不如長洲之苑㳺曲臺臨上道不如朝夕之池深壁髙壘副以闗城不如江淮之險此臣之所為大王樂也今夫王還兵疾歸尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黄頭循江而下襲大王之都魯東海絶吳之饟道梁王飭車騎習戰射積粟固守以備滎陽待吾之飢大王雖欲反都亦不得已夫三淮南之計不負其約齊王殺身以滅其跡四國不得出兵其郡趙囚邯鄲此不可掩亦已明矣大王已去千里之國而制扵十里之内矣張韓将北地弓髙宿左右兵不得下壁軍不得太息臣竊哀之願大王熟􅊫焉杜欽說王鳳論九女漢書禮壹娶九女所以極陽數廣嗣重祖也必鄉舉求窈窕不問華色所以助徳理内也娣姪雖缺不復補所以養夀塞争也故后妃有貞淑之行則𦙍嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女徳不厭女徳不厭則夀命不究扵髙年書云或四三年言失欲之生害也男子五十好色未衰婦人四十容貌改前以改前之容侍扵未衰之年而不以禮為制則其原不可救而後俫異態後倈異態則正后自疑而支庶有間適之心是以晉獻被納讒之謗申生蒙亡罪之辜今聖主富扵春秋未有適嗣方鄉術入學未親后妃之議将軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質毋必有聲色音技能為萬世大法夫少戒之在色小弁之作可為寒心惟将軍常以為憂杜欽説王鳳論罽賓漢書前罽賓王隂求赴本漢所立後卒畔逆夫徳莫大扵有國子民辠莫大扵執殺使者所以不報恩不愳誅者自知絶逺兵不至也有求則卑辭亡欲則驕嫚終不可懐服凡中國所以為通厚蠻夷㥦快其求者為壤比而為寇今縣度之阸非罽賓所能越也其鄉慕不足以安西域雖不附不能危城郭前親逆節惡暴西域故絶而不通今悔過来而亡親屬貴人奉獻者皆行賈賤人欲通貨市買以獻為名故煩使者送至縣度恐失實見欺凡遣使送客者欲為防護寇害也起皮山南更不屬漢之國四五斥候士百餘人五分夜擊刁斗自守尚時為所侵盜驢畜負糧須諸國稟食得以自贍國或貧小不能食或桀黠不肯給擁漢之節餒山谷之間乞丐亡所得離一二旬則人畜棄捐曠埜而不反又厯大頭痛小頭痛之山赤土身熱之阪令人身熱亡色頭痛嘔吐驢畜盡然又有三池盤石阪道陿者尺六七寸長者徑三十里臨峥嶸不測之深行者騎步相持繩索相引二千餘里乃到縣度畜隊未半阬谷盡靡碎人墮勢不得相収視險阻危害不可勝言聖王分九州制五服務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆涉危難之路罷敝所恃以事亡用非久長計也使者業已受節可至皮山而還文編巻十四

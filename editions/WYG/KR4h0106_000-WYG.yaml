body:
  text: 文編總集類提要臣等謹案文編六十四巻明唐順之編順之有左編已著錄是集取由周迄宋之文分體排纂陳元素序稱以真徳秀文章正中為藁本然徳秀書主於論理而此書主於論文宗㫖逈異元素説似未確也其中如以莊韓孫子諸篇入之論中為强立名目又不錄史記漢書列傳而獨取後漢書黄憲傳冠諸傳之上進退亦多失據葢彚收太廣義例太多蹖駁往往不免然順之深于古文能心知其得失凡所别擇具有精意觀其自序云不能無文即不能無法是編者文之工匠而法之至也其平日又嘗謂漢以前之文未嘗無法而未嘗有法法寓于無法之中故其為法也宻而不可窺唐與宋之文不能無法而能毫釐不失乎法以有法為法故其為法也嚴而不可犯其言皆妙解文理故是編所錄雖皆習誦之文而標舉脈絡批導窽㑹使後人得以窺見開闔順逆經緯錯綜之妙而神明變化以蘄至於古學秦漢者當於唐宋求門徑學唐宋者固當以此編為門徑矣自正嘉之後北地信陽聲價奔走一世太倉歴下流派彌長而日久論定言古文者終以順之及歸有光王慎中三家為歸豈非以學七子者畫虎不成反類狗學三家者刻鵠不成尚類鶩耶閻若璩潛邱劄記有與戴唐器書述宋實頴之言曰荆川才大如海評書有詳有畧惟文編出陳元素者非其原本又稱兩本舍下俱有他日呈寄自知之云云今世所行惟此一本其為原本陳本不復可考要其大㫖固皆出於順之也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀文編原序歐陽子述揚子雲之言曰斷木為棋梡革為鞠莫不有法而况於書乎然則又况於文乎以為神明乎吾心而止矣則之畫亦贅矣然而畫非贅也神明之用所不得巳也畫非贅則所謂一與言為二二與一為三自茲以往巧厯不能盡而又不可勝窮矣文而至於不可勝窮其亦有不得巳而然者乎然則不能無文而文不能無法是編者文之工匠而法之至也聖人以神明而逹之於文文士研精於文以窺神明之奥其窺之也有偏有全有小有大有駁有醇而皆有得也而神明未嘗不在焉所謂法者神明之變化也易曰剛柔交錯天文也文明以止人文也學者觀之可以知所謂法矣嘉靖丙辰夏五月既望武進唐順之應徳甫書欽定四庫全書集部八文編目録總集類巻一制䇿巻二對巻三諫疏巻四論疏巻五疏巻六疏請巻七疏議巻八封事巻九表巻十奏巻十一上書一巻十二上書二巻十三上書三巻十四説巻十五劄子一巻十六劄子二巻十七劄子三巻十八狀一巻十九狀二巻二十狀三巻二十一論一巻二十二論二巻二十三論三巻二十四論四巻二十五論五巻二十六論六巻二十七論七巻二十八論八巻二十九論九巻三十論十巻三十一論十一巻三十二論十二巻三十三年表論斷巻三十四論斷巻三十五論巻三十六議巻三十七雜著一巻三十八雜著二巻三十九雜著三巻四十雜著四巻四十一䇿一巻四十二䇿二巻四十三䇿三巻四十四䇿四巻四十五辭命巻四十六書一巻四十七書二巻四十八書三巻四十九書四巻五十書五巻五十一啓狀巻五十二序一巻五十三序二巻五十四序三巻五十五記一巻五十六記二巻五十七記三巻五十八神道碑巻五十九碑銘巻六十墓誌銘一巻六十一墓誌銘二巻六十二墓誌銘三巻六十三墓表傳巻六十四行狀祭文

body:
  text: 文編巻五十三明唐順之編韋侍講盛山十二詩序韓愈韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其材韋侯將怨且不釋矣或曰不然夫得利則躍躍以喜不利則戚戚以泣若不可生者豈韋侯謂哉韋侯讀六藝之文以探周公孔子之意又妙能為辭章可謂儒者夫儒者之於患難茍非其自取之其拒而不受於懷也若築河堤以障屋霤其容而消之也若水之於海冰之於夏日其翫而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲况一不快於考功盛山一出入息之間哉未幾果有以韋侯所為十二詩遺余者其意方且以入谿谷上巖石追逐雲月不足日為事讀而歌詠之令人欲棄百事往而與之逰不知其出於巴東以屬朐䏰也于時應而和者凡十人及此年韋侯為中書舍人侍講六經禁中和者通州元司馬為宰相洋州許使君為京兆忠州白使君為中書舍人李使君為諫議大夫黔府嚴中丞為秘書監温司馬為起居舍人皆集闕下於是盛山十二詩與其和者大行於時聨為大巻家有之焉慕而為者將日益多則分為别巻韋侯俾余題其首荆潭唱和詩序韓愈從事有示愈以荆潭酬和詩者愈既受以卒業因仰而言曰夫和平之音淡泊而愁思之聲要妙讙愉之辭難工而窮苦之言易好也是故文章之作恒發於羇旅草野至若王公貴人氣滿志得非性能而好之則不暇以為今僕射裴公開鎮蠻荆統郡惟九常侍楊公領湖之南壤地二千里德刑之政並勤爵禄之報兩崇乃能存志乎詩書寓辭乎詠歌往復循環有唱斯和搜竒抉怪雕鏤文字與韋布里閭憔悴専一之士較其毫釐分寸鏗鏘發金石幽𦕈感鬼神信所謂材全而能鉅者也兩府之從事與部屬之吏屬而和之茍在編者咸可觀也宜乎施諸樂章紀諸冊書從事曰子之言是也告於公書以為荆潭唱和詩序石鼎聨句詩序韓愈元和七年十二月四日衡山道士軒轅彌明自衡下來舊與劉師服進士衡湘中相識將過太白知師服在京夜抵其居宿有校書郎侯喜新有能詩聲夜與劉說詩彌明在其側貌極醜白鬚黒面長頸而髙結喉中又作楚語喜視之若無人彌明忽軒衣張眉指鑪中石鼎謂喜曰子云能詩能與我賦此乎劉往見衡湘間人說云年九十餘矣解捕逐鬼物拘囚蛟螭虎豹不知其實能否也見其老頗貌敬之不知其有文也聞此說大喜即援筆題其首兩句次傳於喜喜踊躍即綴其下云云道士啞然笑曰子詩如是而已乎即袖手竦肩倚北牆坐謂劉曰吾不解世俗書子為我書因髙吟曰龍頭縮菌蠢豕腹漲彭亨初不似經意詩㫖有似譏喜二子相顧慙駭欲以多窮之即又為而傳之喜喜思益苦務欲壓道士毎營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也畢即傳道士道士髙踞大唱曰劉把筆吾詩云云其不用意而功益竒不可附說語皆侵劉侯喜益忌之劉與侯皆已賦十餘韻彌明應之如響皆穎脫含譏諷夜盡三更二子思竭不能續因起謝曰尊師非世人也某伏矣願為弟子不敢更論詩道士奮曰不然章不可以不成也又謂劉曰把筆來吾與汝就之即又唱出四十字為八句書訖使讀畢謂二子曰章不已就乎二子齊應曰就矣道士曰此皆不足與語此寧為文邪吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞也吾閉口矣二子大懼皆起立牀下拜曰不敢他有問也願聞一言而已先生稱吾不解人間書敢問解何書請聞此而已道士寂然若無聞也累問不應二子不自得即退就座道士倚牆睡鼻息如雷鳴二子怛然失色不敢喘斯須曙鼓鼕鼕二子亦困遂坐睡及覺日已上驚顧覓道士不見即問童奴奴曰天且明道士起出門若將便旋然奴怪久不返即出到門覓無有也二子驚惋自責若有失者間遂詣余言余不能識其何道士也嘗聞有隠君子彌明豈其人耶韓愈序上巳日燕太學聽彈琴詩序韓愈與衆樂之之謂樂樂而不失其正又樂之尤也四方無鬭爭金革之聲京師之人既庶且豐天子念致理之艱難樂居安之閒暇肇置三令節詔公卿羣有司至于其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也三月初吉實惟其時司業武公於是總太學儒官三十有六人列燕于祭酒之堂罇俎既成肴羞惟時醆斚序行獻酬有容歌風雅之古辭斥鄭衛之新聲褒衣危冠與與如也有儒一生魁然其形抱琴而來歴階以昇坐于罇俎之南鼓有虞氏之南風賡之以文王宣父之操優㳺夷愉廣厚髙明追三代之遺音想舞雩之詠歎及暮而退皆充然若有得也武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈序之讀韓愈所著毛穎傳後題栁宗元自吾居夷不與中州人通書有來南者時言韓愈為毛穎傳不能舉其辭而獨大笑以為怪而吾久不克見楊子誨之來始持其書索而讀之若捕龍蛇搏虎豹急與之角而力不敢暇信韓子之怪於文也世之模擬竄竊取青嫓白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜且世人笑之也不以其俳乎而俳又非聖人之所棄者詩曰善戲謔兮不為虐兮太史公書有滑稽列傳皆取乎有益於世者也故學者終日討說答問呻吟習復應對進退掬溜播灑則罷憊而廢亂故有息焉㳺焉之說不學操縵不能安絃有所拘者有所縱也太羮𤣥酒體節之薦味之至者而又設以竒異小蟲水草樝梨橘柚苦醎酸辛雖蜇吻裂鼻縮舌澁齒而咸有篤好之者文王之昌蒲葅屈到之芰曽晢之羊棗然後盡天下之竒味以足於口獨文異乎韓子之為也亦將弛焉而不為虐歟息焉㳺焉而有所縱歟盡六藝之竒味以足其口歟而不若是則韓子之辭若壅大川焉其必决而放諸陸不可以不陳也且凡古今是非六藝百家大細穿宂用而不遺者毛穎之功也韓子窮古書好斯文嘉穎之能盡其意其奮而為之傳以發其鬱積而學者得之勵其有益於世歟是其言也固與異世者語而貪常嗜瑣者猶呫呫然動其喙亦勞甚矣乎愚溪詩序栁宗元灌水之陽有溪焉東流入於瀟水或曰冉氏嘗居也故姓是溪曰冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今予家是溪而名莫能定土之居者猶齗齗然不可以不更也故更之為愚溪愚溪之上買小丘為愚丘自愚丘東北行六十步得泉而又買居之為愚泉愚泉凡六穴皆出山下平地蓋上出也合流屈曲而南為愚溝遂負土累石塞其隘為愚池愚池之東為愚堂其南為愚亭池之中為愚島嘉木異石錯置皆山水之竒者以余故咸以愚辱焉夫水智者樂也今是溪獨見辱於愚何哉蓋其流甚下不可以灌溉又峻急多抵石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類於余然則雖辱而愚之可也寗武子邦無道則愚智而為愚者也顔子終日不違如愚睿而為愚者也皆不得為真愚今余遭有道而違於理悖於事故凡為愚者莫我若也夫然則天下莫能爭是溪余得専而名焉溪雖莫利於世而善鑒萬類清瑩秀澈鏘鳴金石能使愚者喜笑眷慕樂而不能去也余雖不合於俗亦頗以文墨自慰潄滌萬物牢籠百態而無所避之以愚辭歌愚溪則茫然而不違昏然而同歸超鴻䝉混希夷寂寥而莫我知也於是作八愚詩紀于溪石上梅聖俞詩集序歐陽修予聞世謂詩人少達而多窮夫豈然哉蓋世所傳詩者多出於古窮人之辭也凡士之藴其所有而不得施於世者多喜自放於山巔水涯外見蟲魚草木風雲鳥獸之狀類往往探其竒怪内有憂思感憤之鬱積其興於怨刺以道羇臣寡婦之所歎而寫人情之難言蓋愈窮則愈工然則非詩之能窮人殆窮者而後工也予友梅聖俞少以䕃補為吏累舉進士輙抑於有司困於州縣凡十餘年年今五十猶從辟書為人之佐鬱其所蓄不得奮見於事業其家宛陵幼習於詩自為童子出語已驚其長老既長學乎六經仁義之說其為文章簡古純粹不求茍說於世世之人徒知其詩而已然時無賢愚語詩者必求之聖俞聖俞亦自以其不得志者樂於詩而發之故其平生所作於詩尤多世既知之矣而未有薦于上者昔王文康公嘗見而歎曰二百年無此作矣雖知之深亦不果薦也若使其幸得用於朝廷作為雅頌以歌詠大宋之功德薦之清廟而追商周魯頌之作者豈不偉歟奈何使其老不得志而為窮者之詩乃徒發於蟲魚物類羇愁感歎之言世徒喜其工不知其窮之久而將老也可不惜哉聖俞詩既多不自收拾其妻之兄子謝景初懼其多而易失也取其自洛陽至于吳興以來所作次為十巻予嘗嗜聖俞詩而患不能盡得之遽喜謝氏之能類次也輙序而藏之其後十五年聖俞以疾卒于京師余既哭而銘之因索于其家得其遺藁千餘篇并舊所藏掇其尤者六百七十七篇為一十五巻嗚呼吾於聖俞詩論之詳矣故不復云書梅聖俞藁後歐陽修凡樂達天地之和而與人之氣相接故其疾徐奮動可以感於心歡欣惻愴可以察於聲五聲單出於金石不能自和也而工者和之然抱其器知其聲節其亷肉而調其律吕如此者工之善也今指其器以問於工曰彼簨者簴者堵而編執而列者何也彼必曰鼗鼔鐘磬絲管千戚也又語其聲以問之曰彼清者濁者剛而奮柔而曼衍者或在郊或在廟堂之下而羅者何也彼必曰八音五聲六代之曲上者歌而下者舞也其聲器名物皆可以數而對也然至乎動盪血脈流通精神使人可以喜可以悲或歌或泣不知手足鼓舞之所然問其何以感之者則雖在善工猶不知其所以然焉蓋不可得而言也樂之道深矣故工之善者必得於心應於手而不可述之言也聴之善亦必得於心而會以意不可得而言也堯舜之時䕫得之以和人神舞百獸三代春秋之際師襄師曠州鳩之徒得之為樂官理國家知興亡周衰官失樂器淪亡散之河海逾千百嵗間未聞有得之者其天地人之和氣相接者既不得泄於金石疑其遂獨鍾於人故其人之得者雖不可和於樂尚能歌之為詩古者登歌清廟大師掌之而諸侯之國亦各有詩以道其風土性情至於投壺饗射必使工歌以達其意而為賔樂蓋詩者樂之苗裔與漢之蘇李魏之曹劉得其正始宋齊而下得其浮淫流佚唐之時子昻李杜沈宋王維之徒或得其淳古淡泊之聲或得其舒和髙暢之節而孟郊賈島之徒又得其悲愁鬱堙之氣由是而下得者時有而不純焉今聖俞亦得之然其體長於本人情狀風物英華雅正變態百出哆兮其似春凄兮其似秋使人讀之可以喜可以悲陶暢酣適不知手足之將鼓舞也斯固得深者邪其感人之至所謂與樂同其苗裔者邪余嘗問詩於聖俞其聲律之髙下文語之疵病可以指而告余也至其心之得者不可以言而告也余亦將以心得意會而未能至之者也聖俞久在洛中其詩亦往往人皆有之今將告歸余因求其稿而寫之然余前所謂心之所得者如伯牙鼓琴子期聽之不相語而意相知也余今得聖俞之稿猶伯牙之琴絃乎蘇氏文集序歐陽修予友蘇子美之亡後四年始得其平生文章遺稿於太子太傅杜公之家而集録之以為十巻子美杜氏壻也遂以其集歸之而告于公曰斯文金玉也棄擲埋沒糞土不能銷蝕其見遺于一時必有收而寳之于後世者雖其埋沒而未出其精氣光怪已能常自發見而物亦不能揜也故方其擯斥摧挫流離窮厄之時文章已自行于天下雖其怨家仇人及嘗能出力而擠之死者至其文章則不能少毁而揜蔽之也凡人之情忽近而貴逺子美屈于今世猶若此其伸於後世宜如何也公其可無恨予嘗考前世文章政理之盛衰而怪唐太宗致治幾乎三王之盛而文章不能革五代之餘習後百有餘年韓李之徒出然後元和之文始復于古唐衰兵亂又百餘年而聖宋興天下一定晏然無事又幾百年而古文始盛于今自古治時少而亂時多幸時治矣文章或不能純粹或遲久而不相及何其難之若是歟豈非難得其人歟茍一有其人又幸而及出于治世世其可不為之貴重而愛惜之歟嗟吾子美以一酒食之過至廢為民而流落以死此其可以歎息流涕而為當世仁人君子之職位宜與國家樂育賢材者惜也子美之齒少於予而予學古文反在其後天聖之間予舉進士于有司見時學者務以言語聲偶擿裂號為時文以相誇尚而子美獨與其兄才翁及穆㕘軍伯長作為古謌詩雜文時人頗共非笑之而子美不顧也其後天子患時文之弊下詔書諷勉學者以近古由是其風漸息而學者稍趨於古焉獨子美為於舉世不為之時其始終自守不牽世俗趨舍可謂特立之士也子美官至大理評事集賢校理而廢後為湖州長史以卒享年四十有一其狀貌竒偉望之昻然而即之温温久而愈可愛慕其材雖髙而人亦不甚嫉忌其擊而去之者意不在子美也賴天子聰明仁聖凡當時所指名而排斥二三大臣而下欲以子美為根而累之者皆䝉保全今並列於榮寵雖與子美同時飲酒得罪之人多一時之豪俊亦被收采進顯于朝廷而子美獨不幸死矣豈非其命也悲夫禮部唱和詩序歐陽修嘉祐二年春予幸得從五人者於尚書禮部考天下所貢士凡六千五百人蓋絶不通人者五十日乃於其間時相與作為古律長短歌詩雜言庶幾所謂羣居燕處言談之文亦所以宣其底滯而忘其倦怠也故其為言易而近擇而不精然綢繆反復若斷若續而時發於竒怪雜以詼嘲笑謔及其至也往往亦造於精微夫君子之博取於人者雖滑稽鄙俚猶或不遺而况於詩乎古者詩三百篇其言無所不有惟其肆而不放樂而不流以卒歸乎正此所以為貴也於是次而録之得一百七十三篇以傳於六家嗚呼吾六人者志氣可謂盛矣然壯者有時而衰衰者有時而老其出處離合參差不齊則是詩也足以追惟平昔握手以為笑樂至於慨然掩巻而流涕嘘嚱者亦將有之雖然豈徒如此而止也覽者其必有取焉廖氏文集序歐陽修自孔子殁而周衰接乎戰國秦遂焚書六經於是中絶漢興蓋久而後出其散亂磨滅既失其傳然後諸儒因得措其異說於其間如河圖洛書怪妄之尤甚者余嘗哀夫學者知守經以篤信而不知偽說之亂經也屢為說以黜之而學者溺其久習之傳反駭然非余以一人之見决千嵗不可考之是非欲奪衆人之所信徒自守而世莫之從也余以謂自孔子殁至今二千嵗之間有一歐陽修者為是說矣又二千嵗焉知無一人焉與修同其說也又二千嵗將復有一人焉然則同者至于三則後之人不待千嵗而有也同予說者既衆則衆人之所溺者可勝而奪也夫六經非一世之書其將與天地無終極而存也以無終極視數千嵗於其間頃刻爾是則余之有待於後者逺矣非汲汲有求於今世也衡山廖倚與余逰三十年已出其兄偁之遺文百餘篇號朱陵編者其論洪範以為九疇聖人之法爾非有龜書出洛之事也余乃知不待千嵗而有與余同於今世者始余之待於後世也冀有因余言而同者爾若偁者未嘗聞余言蓋其意有所合焉然則舉今之世固有不相求而同者矣亦何待於數千嵗乎廖氏家衡山世以能詩知名於湖南而偁尤好古能文章其德行聞於鄉里一時賢士皆與之逰以其不達而早死故不顯於世嗚呼知所待者必有時而獲知所畜者必有時而施茍有志焉不必有求而後合余喜與偁不相求而兩得也於是乎書江鄰幾文集序歐陽修余竊不自揆少習為銘章因得論次當世賢士大夫功行自明道景祐以來名卿鉅公往往見於余文矣至於朋友故舊平居握手言笑意氣偉然可謂一時之盛而方從其逰遽哭其死遂銘其藏者是可歎也蓋自尹師魯之亡逮今二十五年之間相繼而歿為之銘者至二十人又有余不及銘與雖銘而非交且舊者皆不與焉嗚呼何其多也不獨善人君子難得易失而交逰零落如此反顧身世死生盛衰之際又可悲夫而其間又有不幸罹憂患觸網羅至困阨流離以死與夫仕宦連蹇志不獲伸而歿獨其文章尚見於世者則又可哀也歟然則雖其殘篇斷稿猶為可惜况其可以垂世而行逺也故余於聖俞子美之歿既已銘其壙又類集其文而序之其言尤感切而殷勤者以此也陳留江君鄰幾常與聖俞子美逰而又與聖俞同時以卒余既誌而銘之後十有五年來守淮西又於其家得其文集而序之鄰幾毅然仁厚君子也雖知名於時仕宦久而不進晚而朝廷方將用之未及而卒其學問通博文辭雅正深粹而論議多所發明詩尤清淡閒肆可喜然其文已自行於世矣固不待余言以為輕重而余特區區於是者蓋發於有感而云然熙寧四年三月日六一居士序歸田録序歐陽修歸田録者朝廷之遺事史官之所不記與夫士大夫笑談之餘而自録者録之以備閒居之覽也有聞而誚余者曰何其迂哉子之所學者修仁義以為業誦六經以為言其自待者宜如何而幸䝉人主之知備位朝廷與聞國論者蓋八年于兹矣既不能因時奮身遇事發憤有所建明以為補益又不能依阿取容以狥世俗使怨嫉謗怒叢于一身以受侮于羣小當其驚風駭泿卒然起於不測之淵而蛟鰐黿鼉之怪方駢首而闖伺乃措身其間以蹈必死之禍賴天子仁聖惻然哀憐脫於垂涎之口而活之以賜其餘生之命曽不聞吐珠衘環效蛇雀之報蓋方其壯也猶無所為今既老且病矣是終負人主之恩而徒久費大農之錢為太倉之䑕也為子計者謂宜乞身于朝逺引疾去以深戒前日之禍而優㳺田畆盡其天年猶足竊知止之賢名而乃徘回俯仰久之不决此而不思尚何歸田之録乎余起而謝曰凡子之責我者皆是也吾其歸哉子姑待治平四年九月乙未歐陽修序續思潁詩序歐陽修皇祐二年余方留守南都已約梅聖俞買田于潁上其詩曰優㳺琴酒逐漁釣上下林壑相攀躋及身彊健始為樂莫待衰病須扶攜此蓋余之本志也時年四十有四其後丁家艱服除還朝遂入翰林為學士忽忽七八年間歸潁之志雖未遑也然未嘗一日少忘焉故其詩曰乞身當及彊健時顧我蹉跎已衰老蓋歎前言之未踐也時年五十有二自是誤被選擢叨塵二府遂歴三朝蓋自嘉祐治平之間國家多事固非臣子敢自言其私時也而非才竊位謗咎已盈賴天子仁聖聰明辨察誣罔始終保全其出處俯仰十有二年今其年六十有四蓋自有蹉跎之歎又復一紀矣中間在亳幸遇朝廷無事中外晏然而身又不當責任以謂臣子可退無嫌之時遂敢以其私言天子惻然閔其年猶未也謂尚可以勉故奏封十上而六被詔諭未賜允俞今者䝉上哀憐察其實病且衰矣既不責其避事又曲從其便私免并得蔡俾以偷安此君父廓大度之寛仁遂萬物之所欲覆載含容養育之恩也而覆蔡潁連疆因得以為歸老之漸兾少償其夙願兹又莫大之幸焉初陸子履以余自南都至在中書所作十有三篇為思潁詩以刻於石今又得在亳及青十有七篇以附之蓋自南都至在中書十有八年而得十三篇在亳及青三年而得十有七篇以見余之年益加老病益加衰其日漸短其心漸迫故其言愈多也庶幾覽者知余有志於彊健之時而未償於衰老之後幸不譏其踐言之晚也熈寧三年九月七日六一居士序釋秘演詩集序歐陽修予少以進士逰京師因得盡交當世之賢豪然猶以謂國家臣一四海休兵革養息天下以無事者四十年而智謀雄偉非常之士無所用其能者往往伏而不出山林屠販必有老死而世莫見者欲從而求之不可得其後得吾亡友石曼卿曼卿為人廓然有大志時人不能用其材曼卿亦不屈以求合無所放其意則往往從布衣野老酣嬉淋漓顛倒而不猒予疑所謂伏而不見者庶幾狎而得之故嘗喜從曼卿逰欲因以隂求天下竒士浮屠秘演者與曼卿交最久亦能遺外世俗以氣節相髙三人懽然無所間曼卿隠於酒秘演隠於浮屠皆竒男子也然喜為歌詩以自娛當其極飲大醉歌吟笑呼以適天下之樂何其壯也一時賢士皆願從其㳺予亦時至其室十年之間秘演北渡河東之濟鄆無所合困而歸曼卿已死秘演亦老病嗟夫二人者予乃見其盛衰則余亦將老矣夫曼卿詩辭清絶尤稱秘演之作以為雅健有詩人之意秘演狀貌雄傑其胸中浩然既習于佛無所用獨其詩可行于世而懶不自惜已老胠其橐尚得三四百篇皆可喜者曼卿死秘演漠然無所向聞東南多山水其巔崖崛峍江濤洶涌甚可壯也遂欲往逰焉足以知其老而志在也於其將行為叙其詩因道其盛時以悲其衰釋惟儼文集序歐陽修惟儼姓魏氏杭州人少逰京師三十餘年雖學于佛而通儒術喜為辭章與吾亡友曼卿交最善曼卿遇人無所擇必皆盡其忻歡惟儼非賢士不交有不可其意無貴賤一切閉拒絶去不少顧曼卿之兼愛惟儼之介所趣雖異而交合無所間曼卿嘗曰君子泛愛而親仁惟儼曰不然吾所以不交妄人故能得天下士若賢不肖混則賢者安肯顧我哉以此一時賢士多從其逰居相國浮圖不出其户十五年士嘗逰其室者禮之惟恐不至及去為公卿貴人未始一往干之然嘗竊怪平生所交皆當世賢傑未見卓卓著功業如古人可記者因謂世所稱賢材若不笞兵走萬里立功海外則當佐天子號令賞罰於明堂茍皆不用則絶寵辱遺世俗自髙而不屈尚安能酣豢於富貴而無為哉醉則以此誚其坐人人亦復之以謂遺世自守古人之所易若奮身逢時欲必就功業此雖聖賢難之周孔所以窮達異也今子老於浮圖不見用於世而幸不踐窮亨之塗乃以古事之已然而責今人之必然邪雖然惟儼傲乎退偃於一室天下之務當世之利病聽其言終日不厭惜其將老也已曼卿死惟儼亦買地京城之東以謀其終乃歛平生所為文數百篇示予曰曼卿之死既已表其墓願為我序其文然及我之見也嗟夫惟儼既不用於世其材莫見於時若考其筆墨馳騁文章贍逸之能可以見其志矣范文正公文集序蘇軾慶厯三年軾始總角入鄉校士有自京師來者以魯人石守道所作慶厯聖德詩示鄉先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也耶則不敢知若亦人耳何為其不可先生竒軾言盡以告之且曰韓范富歐陽此四人者人傑也時雖未盡了則已私識之矣嘉祐二年始舉進士至京師則范公沒既葬而墓碑出讀之至流涕曰吾得其為人蓋十有五年而不一見其面豈非命也歟是嵗登第始見知于歐陽公因公以識韓富皆以國士待軾曰恨予不識范文正公其後三年過許始識公之仲子今丞相堯夫又六年始見其叔彛叟京師又十一年遂與其季德孺同僚于徐皆一見如舊且以公遺藁見屬為序又十三年乃克為之嗚呼公之功德蓋不待文而顯其文亦不待序而傳然不敢辭者自以八嵗知敬愛公今四十七年矣彼三傑者皆得從之逰而公獨不識以為平生之恨若獲挂名其文字中以自託於門下士之末豈非疇昔之願也哉古之君子如伊尹太公管仲樂毅之流其王伯之略皆定於畎畆中非仕而後學者也淮隂侯見髙帝於漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主論曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口傳耳受嘗試為之而僥倖其或成者哉公在天聖中居太夫人憂則已有憂天下致太平之意故為萬言書以遺宰相天下傳誦至用為將擢為執政考其平生所為無出此書者今其集二十巻為詩賦二百六十八為文一百六十五其於仁義禮樂忠信孝悌蓋如饑渇之於飲食欲須臾忘而不可得如火之熱如水之濕蓋其天性有不得不然者雖㺯翰戲語率然而作必歸於此故天下信其誠爭師尊之孔子曰有德者必有言非其言也德之發於口者也又曰我戰則克祭則受福非能戰也德之見於怒者也六一居士集序蘇軾夫言有大而非誇達者信之衆人疑焉孔子曰天之將喪斯文也後死者不得與於斯文也孟子曰禹抑洪水孔子作春秋而予距楊墨蓋以是配禹也文章之得喪何與於天而禹之功與天地並孔子孟子以空言配之不已誇乎自春秋作而亂臣賊子懼孟子之言行而楊墨之道廢天下以是為固然而不知其功孟子既没有申商韓非之學違道而趨利殘民以厚主其說至陋也而士以是罔其上上之人僥倖一切之功靡然從之而世無大人先生如孔子孟子者推其本末權其禍福之輕重以救其惑故其學遂行秦以是喪天下陵夷至於勝廣劉項之禍死者十八九天下蕭然洪水之患蓋不至此也方秦之未得志也使復有一孟子則申韓為空言作於其心害於其事作於其事害於其政者必不至若是烈也使楊墨得志於天下其禍豈減於申韓哉由此言之雖以孟子配禹可也太史公曰蓋公言黃老賈誼晁錯明申韓錯不足道也而誼亦為之予以是知邪說之移人雖豪傑之士有不免者况衆人乎自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子蓋庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏著禮樂仁義之實以合於大道其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之自歐陽子之存世之不說者譁而攻之能折困其身而不能屈其言士無賢不肖不謀而同曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為髙以救時行道為賢以犯顔納諫為忠長育成就至嘉祐末號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之歐陽子沒十有餘年士始為新學以佛老之似亂周孔之真識者憂之賴天子明聖詔修取士法風厲學者專治孔氏黜異端然後風俗一變考論師友淵源所自復知誦習歐陽子之書予得其詩文七百六十六篇於其子棐乃次而論之曰歐陽子論大道似韓愈論事似陸䞇記事似司馬遷詩賦似李白此非予言也天下之言也歐陽子諱修字永叔既老自謂六一居士云邵茂誠詩集序蘇軾貴賤夀夭天也賢者必仁仁者必夀人之所欲也人之所欲適與天相值實難譬如匠慶之山而得成虡豈可常也哉因其適相值而責之以常然此人之所以多怨而不通也至於文人其窮也固宜勞心以耗神盛氣以忤物未老而衰病無惡而得罪鮮不以文者天人之相值既難而人又自賊如此雖欲不困得乎茂誠諱迎姓邵氏與予同年登進士第十有五年而見之於吳興孫莘老之座上出其詩數百篇予讀之彌月不厭其文清和妙麗如晉宋間人而詩尤可愛咀嚼有味雜以江左唐人之風其為人篤學強記恭儉孝友而貫穿法律敏於吏事其狀若不勝衣語言氣息僅屬予固哀其任衆難以瘁其身且疑其將病也踰年而茂誠卒又明年予過髙郵則其喪在焉入哭之敗幃瓦燈塵埃蕭然為之出涕太息夫原憲之貧顔回之短命揚雄之無子馮衍之不遇皇甫士安之篤疾彼遇其一而人哀之至今而茂誠兼之豈非命也哉予是以録其文哀而不怨亦茂誠之意也樂全先生文集序蘇軾孔北海志大而論髙功烈不見于世然英偉豪傑之氣自為一時所宗其論盛孝章郗鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊訓說命相表裏非秦漢以來以事君為恱者所能至也常恨二人之文不見其全今吾樂全先生張公安道其庶幾乎嗚呼士不以天下之重自任久矣言語非不工也政事文學非不敏且博也然至於臨大事鮮不忘其故失其守者其器小也公為布衣則頎然已有公輔之望自少出仕至老而歸未嘗以言狥物以色假人雖對人主必審而後言毁譽不動得喪若一真孔子所謂大臣以道事君者世逺道散雖志士仁人或少貶以求用公獨以邁往之氣行正大之言曰用之則行舍之則藏上不求合於人主故雖貴而不用用而不盡下不求合於士大夫故恱公者寡不恱公者衆然至言天下偉人則必以公為首公盡性知命體乎自然而行乎不得已非蘄以文字名世者也然自慶厯以來訖元豐四十餘年所與人主論天下事見于章疏者多矣或用或不用而皆本於禮義合於人情是非有考於前而成敗有驗於後及其它詩文皆清逺雄麗讀者可以想見其為人信乎其有似於孔北海諸葛孔明也軾年二十以諸生見公成都公一見待以國士今三十餘年所以開發成就之者至矣而軾終無所效尺寸於公者獨求其文集手校而家藏之且論其大略以待後世之君子昔曽魯公嘗為軾言公在人主前論大事它人終日反復不能盡者公必數言而决燦然成文皆可書而誦也言雖不盡用然慶厯以來名臣為人主所敬莫如公者公今年八十一杜門却掃終日危坐將與造物者逰於無何有之鄉言且不可得聞而况其文乎凡為文若干巻詩若干首錢塘勤上人詩集序蘇軾昔翟公罷廷尉賔客無一人至者其後復用賔客欲往翟公大書其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見世以為口實然予嘗薄其為人以為客則陋矣而公之所以待客者獨不為小哉故太子太師歐陽公好士為天下第一士有一言中於道不逺千里而求之甚於士之求公以故盡致天下豪傑自庸衆人以顯於世者固多矣士之負公者亦時有之蓋嘗慨然太息以人之難知為好士者之戒意公之於士自是少倦而其退老於潁水之上予往見之則猶論士之賢者惟恐其不聞於世也至於負己者則曰是罪在我非其過翟公之客負之於死生貴賤之間而公之士叛公於瞬息俄頃之際翟公罪客而公罪已與士益厚賢於古人逺矣公不喜佛老其徒有治詩書學仁義之說者必引而退之佛者恵勤從公逰三十餘年公常稱之為聰明才智有學問者尤長於詩公薨於汝隂予哭之於其室其後見之語及於公未嘗不涕泣也勤固無求於世而公又非有德於勤者其所以涕泣不忘豈為利也哉予然後益知勤之賢使其得列於士大夫之間而從事於功名其不負公也審矣熈寧七年余自錢塘將赴髙宻勤出其詩若干篇求予文以傳於世予以為詩非待文而傳者也若其為人之大略則非斯文莫之傳也牡丹記序蘇軾熈寧五年三月二十三日余從太守沈公觀花於吉祥寺僧守璘之圃圃中花千本其品以百數酒酣樂作州人大集金槃綵籃以獻于坐者五十有三人飲酒樂甚素不飲者皆醉自輿臺皂𨽻皆挿花以從觀者數萬人明日公出所集牡丹記十巻以示客凡牡丹之見於傳記與栽植接養剥治之方古今詠歌詩賦下至怪竒小說皆在余既觀花之極盛與州人共逰之樂又得觀此書之精究博備以為三者皆可紀而公乂求余文以冠于篇蓋此花見重於世三百餘年窮妖極麗以擅夫天下之觀美而近嵗尤復變態百出務為新竒以追逐時好者不可勝紀此草木之智巧便佞者也今公自耆老重德而余又方憃迂濶舉世莫與為比則其於此書無乃皆非其人乎然鹿門子常怪宋廣平之為人意其鐵心石腸而為梅花賦則清便艶發得南朝徐庾體今以余觀之凡託於權陋以眩世者又豈足信哉余雖非其人強為公紀之公家書二萬巻博覽強記遇事成書非獨牡丹也胡寅字序歐陽修寅之為言恭且畏之辭虞書寅賔出日寅餞納日云者堯命其臣羲和者修其官而史美之之文又曰夙夜惟寅云者舜勑其臣伯夷之辭也又曰同寅協恭和衷哉云者皋陶戒禹之言也堯舜禹之事載於書者於萬世之法而其君臣之際相言語者如此是知恭恪畏慎以思其事雖聖人猶然尉氏胡君名寅以問於余且將字之余以謂名者古之人生而有别之稱爾若太甲盤庚仲壬者又直識其次第而已至於左丘明者載魯大夫之語始謂命名必有義而學者又以文王武王伯魚之類附其說者尤非也文王之世為商諸侯偶商不幸而紂為淫虐然猶身服事之豈其生也已有滅商自大之心而名昌其子始生又期使殺君而發其功業哉孔子之生子適有饋鯉者遂名之若史魚孔鮒又有饋者乎則是真為識别之稱未嘗有義也然考古人之命字者則似若有義蓋將釋其名曰其字若此而已胡君曰我所以問其字者將知其寅者何謂然因考于古取堯舜禹之書常所道告之而字曰子畏作字說趙德麟字說蘇軾宋有天下百餘年所與分天工治民事者皆取之疎逺側微而不私其親故宗室之賢未有以勲名聞者神宗皇帝實始慨然欲出其英材與天下共之増立教養選舉之法所以封植而琢磨之者甚備行之二十年而文武之器彬彬稍見焉元祐六年予自禁林出守汝南始與越王之孫華原公之子簽書君令畤游得其為人博學而文篤行而剛信於為道而敏於為政予以為有杞梓之用瑚璉之貴將必顯聞於天下非特佳公子而已昔漢武帝幸雍祠五畤獲白麟以薦上帝作白麟之歌而司馬遷班固書曰獲一角獸蓋麟云蓋之為言疑之也夫獸而一角固麟矣二子何疑焉豈求之武帝而未見所以致麟者歟漢有一汲黯而武帝不能用乃以白麟赤雁為祥二子非疑之蓋陋之也今先帝立法以出宗室之賢而主上虛已盡下求人如不及四方之符瑞皆抑而不聞此真獲麟者也麟固不求獲不幸而有是德與是形此麟之所病也今君學道觀妙澹泊自守以富貴為浮雲而文章議論載其令名而馳之既有麟之病矣又可得逃乎敬字君德麟而為之說楊薦字說蘇軾楊君以其所名薦請字於余余字之尊已而告之曰古之君子佩玉而服韍戴冕而垂旒一獻之禮賔主百拜俯僂而後食夫所為飲食者為飽也所為衣服者為暖也若直曰飽暖而已則夫古之君子其無乃為紛紛而無益迂濶而過當邪蓋君子小人之分生於足與不足之間若是足以己矣而必為之節文故其所以養其身者甚周而其所以自居者甚髙而可畏凜乎其若處女之在閨也兢兢乎其若懷千金之璧而行也夫是以不仁者不敢至於其牆不義者不敢過其門惟其所為者止於足以己矣之間則人亦狎之而輕加之以不義由此觀之凡世之所謂紛紛而無益迂濶而過當者皆君子之所以自尊也易曰籍用白茅無咎孔子曰茍錯諸地而可矣籍之用茅何咎之有地非不足錯也而必茅之為籍是君子之過以自尊也予欲楊君之過以自尊故因其名薦而取諸易以為之字楊君有俊才聰明果敢有過於人而余獨憂其所以自愛重者不至而已矣石仲卿字序王安石子生而父名之以别於人云爾冠而字成人之道也奚而為成人之道也成人則貴其所以成人而不敢名之於是乎命以字之字之為有可貴焉孔子作春秋記人之行事或名之或字之皆因其行事之善惡而貴賤之二百四十二年之間字而不名者十二人而已人有可貴而不失其所以貴乃爾其少也閩人石仲卿來請字予以子正字之附其名之義而為之云爾子正於進士中名知經往往脫傳注而得經所以云之意接之久未見其行已有闕也庶幾不失其所以貴者歟聽琴序曽鞏凡有貴於物者豈特物不能勝之歟抑亦無所待於物故也世之有學者名占一藝茍不狥物則不足貴矣然以自售然後人得而賤之故工於藝者常恐人之羞薄則往往怫人之好而自要其簡重雖求之者愈勤而拒之者愈堅然不知人亦愈羞薄之也琴之為藝雖聖人所不廢也其制作之意蓋有所寓而至其所聞者不出乎几席之間而所感者常在乎滄浪之濵崔嵬之巔亦已至矣雖然聲自外入也使聞於彼而應於此者猶且如此况不自外入者乎故樂之實不在於器而至於皷之以盡神則樂由中也明矣故聞其樂可以知其德而德之有見於樂者豈係於器哉惟其未離於器也故習之有曲以至於有數推之則將以得其志又中於得其人則器之所不及矣故樂作而喜曲終而悲豈能易吾於須臾哉若夫吾之心在於雁門吾之目在於鴻鵠則雖九奏於吾之前猶不聞也故琴之作有厭乎人之耳者豈非自外入無有久而不倦者乎雖然吾嘗學琴於師矣反宫於脾而聖亦不廢也反商於肺而義亦不廢也反角於肝而仁亦不廢也反徵於心而禮亦不廢也反羽於腎而智亦不廢也方是時也非春也求之於律則不中夾鍾物安得而生哉非夏也求之於律則不中㽔賔物安得而長哉非秋也求之於律則不中南吕物安得而歛哉非冬也求之於律則不中應鍾物安得而藏哉故無出無内無緩無急無修無短巧厯不能盡其數豈止於十九八六而已耶故聞也其神之逰東不極於碣石南不極於北户西不極於流沙沈羽北不極於令正之谷則鳥何從而舞魚何從而躍六馬何從而仰秣景風何從而翔慶雲何從而浮甘露何從而降醴泉何從而出吾之琴如是則有耳者無所用其聽尚何厭之有乎則凡貴者且不足貴也故在鄭則不淫也在宋則不溺也在衛則不煩也在齊則不驕也用之於祭祀則鬼神亦蒞乎其所矣尚何煩於知音哉若乃當春而叩商及秋而叩角當夏而叩羽當冬而叩徵雖知四時之行在我未免乎有手動絃也某人嘗與鞏適撫之金谿因以琴稱而不知吾之琴也某人茍知所存不在絃所志不在聲然後吾之琴可得矣雖然它日祭酒之堂罇俎之宴追三代之遺風想舞雩之詠歎使聞者若有所得則庶幾不愧於昔人矣尚何恨於羞薄哉序飲栁宗元買小丘一日鋤理二日洗滌遂置酒溪石上嚮之為記所謂牛馬之飲者離坐其背實觴而流之接取以飲乃置監史而令曰當飲者舉籌之十寸者三逆而投之能不洄于洑不止于坘不沈于底者過不飲而洄而止而沈者飲如籌之數既或投之則旋眩滑汨若舞若躍速者遲者去者住者衆皆據石注視歡汴以助其勢突然而逝乃得無事於是或一飲或再飲客有婁生圖南者其投之也一洄一止一沈獨三飲衆乃大笑驩甚余病痜不能食酒至是醉焉遂損益其令以窮日夜而不知歸吾聞昔之飲酒者有揖讓酬酢百拜以為禮者有呌號屢舞如沸如羮以為極者有裸裎袒裼以為達者有資絲竹金石之樂以為和者有以促數糺逖而為宻者今則舉異是焉故捨百拜而禮無呌號而極不袒裼而達非金石而和去糺逖而宻簡而同肆而恭衎衎而從容於以合山水之樂成君子之心宜也作序飲以貽後之人序棊栁宗元房生直温與予二弟逰皆好學予病其確也思所以休息之者得木局隆其中而規焉其下方以直置棊二十有四貴者半賤者半貴曰上賤曰下咸自第一至十二下者二乃敵一用朱墨以别焉房於是取二毫如其第書之既而抵戲者二人則視其賤者而賤之貴者而貴之其使之擊觸也必先賤者不得已而使貴者則皆慄焉惛焉亦鮮克以中其獲也得朱焉則若有餘得墨焉則若不足余諦睨之以思其始則皆類也房子一書之而輕重若是適近其手而先焉非能擇其善而朱否而墨之也然而上焉而上下焉而下貴焉而貴賤焉而賤其易彼而敬此遂以逺焉然則若世之所以貴賤人者有異房之貴賤兹棊者歟無亦近而先之耳有果能擇其善否者歟其敬而易者亦從而動心矣有敢議其善否者歟其得於貴者有不氣揚而志蕩者歟其得於賤者有不貌慢而心肆者歟其所謂貴者有敢輕而使之者歟所謂賤者有敢避其使之擊觸者歟彼朱而墨者相去千萬不啻有敢以二敵其一者歟余墨者徒也觀其始與末有似棊者故叙叙盜曽鞏盜三十人凡十五發繇孫仙而下盜吳慶船者殺人皆應斬盜朱縞船者贓重應絞凡應死者十有八人繇湯慶而下或贓輕或竊盜或常自言凡應徒者十有二人此有司之法也今圖之所見者其名氏稅等械器與其發之日月所盜之家所取之財至於人各别其凡若干發皆旁行以見之各别其凡若于發者又别之以朱欲覽者之易曉也吳慶之船贓分為三與吳慶吳道之屬有親疎居有異同至於孫仙湯慶之族屬以及十二人之所得不死者皆别見于圖之上下而獄之輕重詳矣其創作兵仗合衆以轉刼數百里之間至於賊殺良民此情狀之尤可嫉者也方五六月之時水之害甚矣田疇既以蕩溺矣屋廬既以漂流矣城廓之内糶官粟以賑民而猶有不得食者窮鄉僻壤大川長谷之間自中家以上日昃持錢無告糴之所况於躡所素困之人乎方且結草葦以自託於壊隄毁垾之上士有饑餓之迫無樂生之情屢發而為盜亦情狀之可哀者也康誥曰殺越人於貨暋不畏死凡民罔不憝孟子以謂不待教而誅者也是則殺人之盜不待教而誅皆百王之所同而未有知其所始者也然而孔子曰天下有道盜其先變乎此謂養之既足導之既明則為盜者知恥而自新則非殺人之盜有待教而誅此亦百王之所同而未有知其所始者也不待教而誅者天下之所不得容也待教而誅者俟之之道既盡矣然後可以責之備也茍為養之既有不足導之既有不明俟之之道既有不盡矣故凶年人食不足而有起為盜賊者天子嘗宻下寛大之令許降其罪而此非有司之法也至殺人與贓重者亦不降有司之法存焉亦康誥之意也余嘗閱是獄故具列其本末情狀以覽觀焉以明余之於是盡心矣文編巻五十三

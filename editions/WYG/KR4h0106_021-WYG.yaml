body:
  text: 文編巻二十一明唐順之編伯陽甫論三川震國語幽王三年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民之亂也陽伏而不能出隂遁而不能烝于是有地震今三川實震是陽失其所而鎮隂也陽失而在隂源必塞源塞國必亡夫水土演而民用也水土無演民乏財用不亡何待昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣其川源又塞塞必竭夫國必依山川山崩川竭亡之徴也川竭山必崩若國亡不過十年數之紀也夫天之所棄不過其紀是嵗也三川竭岐山崩十一年幽王乃滅周乃東遷史蘇論驪姬敗國國語獻公伐驪戎克之滅驪子獲驪姬以歸立以為夫人生奚齊其娣生卓子驪姬請使申生處曲沃以速懸重耳處蒲城夷吾處屈奚齊處絳以儆亡辱之故公許之史蘇朝告大夫曰二三大夫其戒之乎亂本生矣日君以驪姬為夫人民之疾心固皆至矣昔者之伐也起百姓以為百姓也是以民能欣之故莫不盡忠極勞以致死今君起百姓以自封也民外不得其利而内惡其貪則上下既有判矣然而又生男其天道也天彊其毒民疾其態其亂生哉吾聞君子好好而惡惡樂樂而安安是以能有常伐木不自其本必復生塞水不自其源必復流滅禍不自其基必復亂今君滅其父而畜其子禍之基也畜其子又從其欲子思報父之耻而信其欲雖好色必惡心不可謂好好其色必授之情彼得其情以厚其欲從其惡心必敗國且深亂亂必自女戎三代皆然驪姬果作難殺太子而逐二公子君子曰知難本矣郤叔虎論伐翟柤國語獻公田見翟柤之氛歸寢不寐郤叔虎朝公語之對曰牀第之不安邪抑驪姬之不存側邪公辭焉出遇士蒍曰今夕君不寐必為翟柤也夫翟柤之君好專利而不忌其臣競謟以求媚其進者壅塞其退者距違其上貪以忍其下偷以幸有縱君而亡諫臣有冐上而亡忠下君臣上下各厭其私以縱其回民各有心亡所據依以是處國不亦難乎君若伐之可克也吾不言子必言之士蒍以告公説乃伐翟柤展禽論祀爰居國語海鳥曰爰居止于魯東門之外三日臧文仲使國人祭之展禽曰越哉臧孫之為政也夫祀國之大節也而節政之所成也故慎制祀以為國典今亡故而加典非政之宜也夫聖王之制祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典昔烈山氏之有天下也其子曰柱能殖百穀百蔬夏之興也周棄繼之故祀以為稷共工氏之伯九有也其子曰后土能平九土故祀以為社黄帝能成命百物以明民共財顓頊能修之帝嚳能序三辰以固民堯能單均刑法以儀民舜勤民事而野死鯀鄣洪水而殛死禹能以德修鯀之功契為司徒而民輯㝠勤其官而水死湯以寛治民而除其邪稷勤百穀而山死文王以文昭武王去民之穢故有虞氏禘黄帝而祖顓頊郊堯而宗舜夏后氏禘黄帝而祖顓頊郊鯀而宗禹商人禘舜而祖契郊㝠而宗湯周人禘嚳而郊稷祖文王而宗武王幕能帥顓頊者也有虞氏報焉杼能帥禹者也夏后氏報焉上甲微能帥契者也商人報焉高圉太王能帥稷者也周人報焉凡禘郊宗祖報此五者國之典祀也加之以社稷山川之神皆有功烈於民者也及前哲令德之人所以為民質也及天之三辰民所以瞻仰也及地之五行所以生殖也及九州名山川澤所以出財用也非是不在祀典今海鳥至已不知而祀之以為國典難以為仁且知矣夫仁者講功而知者處物亡功而祀之非仁也不知而不問非知也今兹海其有災乎夫廣川之鳥獸恒知而避其灾也是嵗也海多大風冬煗文仲聞柳下季之言曰信吾過也季子之言不可不法也使書以為三筴内史過論晉君臣國語襄王使召公過及内史過賜晉惠公命呂甥郤芮相晉侯不敬晉侯執玉卑拜不稽首内史過歸以告王曰晉不亡其君必無後且呂郤將不免王曰何故對曰夏書有之曰衆非元后何戴后非衆無與守邦在湯誓曰予一人有罪無以萬夫萬夫有罪在予一人在盤庚曰國之臧則維女衆國之不臧則維予一人是有逸罰如是則長衆使民不可不慎也民之所急在於大事先王知大事之必以衆濟也故祓除其心以和惠民考中度衷以蒞之昭明物則以訓之制義庶孚以行之祓除其心精也考中度衷忠也昭明物則禮也制義庶孚信也然則長衆使民之道非精不和非忠不立非禮不順非信不行今晉侯即位而背内外之賂虐其處者棄其信也不敬王命棄其禮也施其所惡棄其忠也以惡實心棄其精也四者皆棄則遠不至而近不和矣將何以守國古者先王既有天下又崇立上帝明神而敬事之于是乎有朝日夕月以教民事君諸侯春秋受職于王以臨其民大夫士日恪位著以儆其官庶人工商各守其業以共其上猶恐有墜失也故為車服旗章以旌之為贄幣瑞節以鎮之為班爵貴賤以列之為令聞嘉譽以聲之猶有散遷解慢而著在刑辟流在裔土於是乎有夷蠻之國有斧鉞刀墨之民而况可以淫縱其身乎夫晉侯非嗣也而得其位亹亹􅇶惕保任戒懼猶曰未也若將廣其心而遠其鄰陵其民而卑其上將何以固守夫執玉卑替其摯也拜不稽首誣其王也替摯無鎮誣王無民夫天事恒象任重享大者必速及故晉侯誣王人亦將誣之欲替其摯人亦將替之大臣享其禄弗諫而阿之亦必及焉襄王三年而立晉侯八年而隕于韓十六年而晉人殺懐公無胄秦人殺子金子公單襄公言陳必亡國語定王使單襄公聘于宋遂假道于陳以聘于楚火朝覿矣道茀不可行也侯不在疆司空不視塗澤不陂川不梁埜有庾積場功未畢道無列樹墾田若藝膳宰不致餼司里不授館國無寄寓縣無施舍民將築臺于夏氏及陳陳靈公與孔寜儀行父南冠以如夏氏留賔弗見單子歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢天根見而水涸本見而草木節解駟見而隕霜火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁草木節解而備藏隕霜而冬裘具清風至而修城郭宮室故夏令曰九月除道十月成梁其時儆曰收而場功偫而畚挶營室之中土功其始火之初見期于司里此先王之所以不用財賄而廣施德于天下者也今陳國火朝覿矣而道路若塞埜場若棄澤不陂障川無舟梁是廢先王之教也周制有之曰列樹以表道立鄙食以守路國有郊牧疆有寓望藪有圃草囿有林池所以禦災也其餘無非穀土民無懸耜埜無奥草不奪民時不蔑民功有優無匱有逸無罷國有班事縣有序民今陳國道路不可知田在草間功成而不收民罷於逸樂是棄先王之法制者也周之秩官有之曰敵國賔至關尹以告行理以節逆之候人為導卿出郊勞門尹除門宗祝執祀司里授館司徒具徒司空視塗司㓂詰奸虞人入材甸人積薪火師監燎水師監濯膳宰致餐廪人獻餼司馬陳芻工人展車百官各以物至賔入如歸是故小大莫不懐愛其貴國之賔至則以班加一等益䖍至于王使則皆官正涖事上卿監之若王廵守則君親監之今雖朝也不才有分族於周承王命以為過賔於陳而司事莫至是蔑先王之官也先王之令有之曰天道賞善而罰淫故凡我造國無從非彛無即慆淫各守爾典以承天休今陳侯不念𦙍續之常棄其伉儷妃嬪而帥其卿佐以淫于夏氏不亦凟姓矣乎陳我大姬之後也棄衮冕而南冠以出不亦簡彛乎是又犯先王之令也昔先王之敎茂帥其德也猶恐隕越若廢其教而棄其制蔑其官而犯其令將何以守國居大國之間而無此四者其能久乎六年單子如楚八年陳侯殺于夏氏九年楚子入陳單襄公論郤氏必亡國語晉既克楚于鄢使郤至告慶於周未將事王叔簡公飲之酒交酧好貨皆厚飲酒宴語相説也明日王叔子譽諸朝郤至見召桓公與之語召公以告單襄公曰王叔子譽温季以為必相晉國相晉國必大得諸侯勸二三君子必先導焉可以樹今夫子見我以晉國之克也為已實謀之曰微我晉不戰矣楚有五敗晉不知乗我則彊之背宋之盟一也薄德而以地賂諸侯二也棄壯之良而用幼弱三也建立卿士而不用其言四也夷鄭從之三陳而不整五也罪不由晉晉得其民四軍之帥旅力方剛卒伍治整諸侯與之是有五勝也有辭一也得民二也軍帥彊禦三也行列治整四也諸侯輯睦五也有一勝猶足用也有五勝以伐五敗而避之者非人也不可以不戰欒范不欲我則彊之戰而勝是吾力也且夫戰也㣲謀吾有三伐勇而有禮反之以仁吾三逐楚君之卒勇也見其君必下而趨禮也能獲鄭伯而赦之仁也若是而知晉國之政楚越必朝吾曰子則賢矣抑晉國之舉也不失其次吾懼政之未及子也謂我曰夫何次之有昔先大夫荀伯自下軍之佐以政趙宣子未有軍行而以政今欒伯自下軍徃是三子也吾又過于四之無不及若佐新軍而升為政不亦可乎將必求之是其言也君以為奚若襄公曰人有言曰兵在其頸其郤至之謂乎君子不自稱也非以讓也惡其蓋人也夫人性陵上者也不可蓋也求蓋人其抑下滋甚故聖人貴讓且諺曰獸惡其網民惡其上書曰民可近也而不可上也詩曰豈弟君子求福不回在禮敵必三讓是則聖人知民之不可加也故王天下者必先諸民然後庇焉則能長利今郤至在七人之下而欲上之是求蓋七人也其亦有七怨怨在小醜猶不可堪而况在侈卿乎其何以待之晉之克也天有惡於楚也故儆之以晉而郤至佻天以為已力不亦難乎佻天不祥乗人不義不祥則天棄之不義則民勝之且郤至何三伐之有夫仁禮勇皆民之為也以義死用謂之勇奉義順則謂之禮畜義豐功謂之仁奸仁為佻奸禮為羞奸勇為賊夫戰盡敵為上守和同順義為上故制戍以果毅制朝以序成畔戰而擅舍鄭君賊也棄毅行容羞也畔國即讐佻也有三奸以求替其上遠于得政矣以吾觀之兵在其頸不可久也雖吾王叔未能違難在大誓曰民之所欲天必從之王叔欲卻至能勿從乎郤至歸明年死難及伯輿之獄王叔陳生奔晉單襄公論晉君臣國語柯陵之㑹單襄公見晉厲公視遠歩高晉郤錡見單子其語犯郤犨見其語迃郤至見其語伐齊國佐見其語盡魯成公見言及晉難及郤犨之􅉲單子曰君何患焉晉將有亂其君與三郤其當之乎魯侯曰寡人愳不免於晉今君曰將有亂敢問天道乎抑人故也對曰吾非瞽史焉知天道吾見晉君之容而聼三郤之語矣殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以歩目今晉侯視遠而足髙目不存體而足不歩目其心必異矣目體不相從何以能乆夫合諸侯國之大事也於是乎觀存亡故國將無咎其君在㑹歩言視聼必皆無謫則可以知德矣視遠日絶其義足髙日棄其德言爽日反其信聼淫日離其名夫目以處義足以踐德口以庇信耳以聼名者也故不可不慎也偏䘮有咎既䘮則國從之晉侯爽二吾是以云夫郤氏晉之寵人也三卿而五大夫可以戒懼矣髙位實疾僨厚味實腊毒今郤伯之語犯叔迃季伐犯則陵人迃則誣人伐則揜人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立于淫亂之國而好盡言以招人過怨之本也唯善人能受盡言齊其有乎吾聞之國德而鄰於不修必受其福今君偪于晉而鄰於齊齊晉有禍可以取伯無德之患何憂於晉北宮文子論威儀左傳衛侯在楚北宮文子見令尹圍之威儀言于衛侯曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之德曰大國畏其力小國懐其德言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂于是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也公子札來聘左傳吳公子札來聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不愳其周之東乎為之歌鄭曰美哉其細巳甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之遠也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不貳怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熈熈乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不偪遠而不擕遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象箾南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶箾者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已晏嬰叔向論齊晉左傳齊侯使晏嬰請繼室於晉既成昏晏子受禮叔向從之宴相與語叔向曰齊其如何晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加于山魚鹽蜃蛤弗加于海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公大姬巳在齊矣叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乗無人卒列無長庶民罷敝而宫室滋侈道殣相望而女富溢尤民聞公命如逃宼讐欒卻胥原􅈢續慶伯降在皂𨽻政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠況日不悛其能久乎晏子曰子將若何叔向曰晉之公族盡矣肹聞之公室將卑其宗族枝葉先落則公從之肹之宗十一族惟羊舌氏在而已肹又無子公室無度幸而得死豈其獲祀子產論伯有為厲左傳鄭人相驚以伯有曰伯有至矣則皆走不知所徃鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帯也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明月子產立公孫洩及良止以撫之乃止子大叔問其故子産曰鬼有所歸乃不為厲吾為之歸也太叔曰公孫洩何為子產曰説也為身無義而圖説從政有所反之以取媚也不媚不信不信民不從也及子產適晉趙景子問焉曰伯有猶能為鬼乎子產曰能人生始化曰魄既生魄陽曰魂用物精多則䰟􅅎彊是以有精爽至于神明匹夫匹婦彊死其䰟􅅎猶能馮依於人以為淫厲况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而彊死能為鬼不亦宜乎叔向論楚子干得國左傳子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無德五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀為羈終世可謂無民亡無愛徴可謂無德王虐而不忌楚君子干渉五難以弑舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉苛慝不作盗賊伏隐私欲不違民無怨心先神命之國民信之芊姓有亂必季實立楚之常也獲神一也有民二也令德三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又遠之其貴亡矣其寵棄矣民無懐焉國無與焉將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衛姬之子也有寵於僖有鮑叔牙賔須無隰朋以為輔佐有莒衛以為外主有國高以為内主從善如流下善齊肅不藏賄不從欲施舍不倦求善不厭是以有國不亦宜乎我先君文公􅈢季姬之子也有寵於獻好學而不貳生十七年有士五人有先大夫子餘子犯以為腹心有魏犨賈佗以為股肱有齊宋秦楚以為外主有欒郤􅈢先以為内主亡十九年守志彌篤惠懐棄民民從而與之獻無異親民無異望天方相晉將何以代文此二君者異于子干共有寵子國有奥主無施于民無援于外去晉而不送歸楚而不逆何以冀國子太叔對趙簡子問禮左傳子太叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子產曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦外内以經二物為父子兄弟姑娣甥舅昏媾姻亞以象天明為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮為温慈惠和以效天之生殖長育民有好惡喜怒哀樂生於六氣是故審則宜類以制六志哀有哭泣樂有歌舞喜有施舍怒有戰鬬喜生于好怒生于惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能叶于天地之性是以長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎簡子曰鞅也請終身守此言也沈尹戍論子常城郢左傳楚囊瓦為令尹城郢沈尹戍曰子常必亡郢苟不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四境慎其四境結其四援民狎其埜三務成功民無内憂而又無外懼國焉用城今吳是懼而城于郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宮而民潰民棄其上不亡何待夫正其疆場修其土田險其走集親其民人明其五候信其鄰國慎其官守守其交禮不僭不貪不懦不耆完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德無亦監乎若敖蚡冐至于武文土不過同慎其四境猶不城郢今土數圻而郢是城不亦難乎鬬旦論子常必亡國語鬬旦廷見令尹子常子常與之語問蓄貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹令尹問畜聚積實如餓豺狼焉殆必亡者也夫古者聚貨不妨民衣食之利聚馬不害民之財用國馬足以行軍公馬足以稱賦不是過也公貨足以賔獻家貨足以共用不是過也夫貨馬郵則闕於民民多闕則有離畔之心將何以封矣昔鬬子文三舍令尹無一日之積恤民之故也成王聞子文之朝不及夕也于是乎毎朝設脯一束糗一筐以羞子文至于今令尹秩之成王毎出子文之祿必逃王止而後復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠者而我取富焉是勤民以自封也死無日矣我逃死非逃富也故莊王之世滅若敖氏唯子文之後在至於今處鄖為楚良臣是不先恤民而後已之富乎今子常先大夫之後也而相楚君無令名于四方民之羸餒日日已甚四境盈壘道殣相望盗賊司目民無所放是之不恤而畜聚不厭其速怨於民多矣積貨滋多畜怨滋厚不亡何待夫民心之慍也若防大川焉潰而所犯必大矣子常其能賢于成靈乎成不禮于穆願食熊蹯不獲而死靈王不顧于民一國棄之如遺迹焉子常為政而無禮不顧甚於成靈其獨何力以待之期年乃有栢舉之戰子常奔鄭昭王奔隨史墨論季氏出君左傳趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有倍貳故天有三辰地有五行體有左右各有配耦王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日乆矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓於今為庶主所知也在易卦雷乗乾曰大壯天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功於魯受費以為上卿至于文子武子世增其業不廢舊績魯文公薨而東門遂殺嫡立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人司馬錯與張儀爭論戰國策司馬錯與張儀爭論於秦惠王前司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其説對曰親魏善楚下兵三川塞轘轅緱氏之口當屯留之道魏絶南陽楚臨南鄭秦攻新城宜陽以臨二周之郊誅周主之罪侵楚魏之地周自知不救九鼎寶噐必出據九鼎按圖籍挾天子以令天下天下莫敢不聼此王業也今夫蜀西僻之國而戎狄之長也敝兵勞衆不足以成名得其地不足以為利臣聞爭名者于朝爭利者于市今三川周室天下之市朝也而王不爭焉顧爭於戎狄去王業遠矣司馬錯曰不然臣聞之欲富國者務廣其地欲强兵者務富其民欲王者務博其德三資者備而王隨之矣今王之地小民貧故臣願從事於易夫蜀西僻之國也而戎狄之長也而有桀紂之亂以秦攻之辟如使豺狼逐羣羊也取其地足以廣國也得其財足以富民繕兵不傷衆而彼已服矣故㧞一國而天下不以為暴利盡四海諸侯不以為貪是我一舉而名實兩附而又有禁暴正亂之名今攻韓劫天子劫天子惡名也而未必利也又有不義之名而攻天下之所不欲危臣請謁其故周天下之宗室也韓周之與國也周自知失九鼎韓自知亡三川則必將二國并力合謀以因于齊趙而求解乎楚魏以鼎與楚以地與魏王不能禁此臣所謂危不如伐蜀之完也惠王曰善寡人聼子卒起兵伐蜀十月取之遂定蜀蜀主更號為侯而使陳莊相蜀蜀既屬秦益强富厚輕諸侯田需對管燕戰國䇿管燕得罪齊王謂其左右曰子孰而與我赴諸侯乎左右默然莫對管燕連然流涕曰悲夫士何其易得而難用也田需對曰士三日不得饜而君鵝鶩有餘食下宮糅羅紈曵綺縠而士不得以為緣且財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君非士易得而難用也蘇代謂燕昭王戰國䇿蘇代謂燕昭王曰今有人於此孝如曾參孝已信如尾生高廉如鮑焦史鰌兼此三行以事王奚如王曰如是足矣對曰足下以為足則臣不事足下矣臣且處無為之事歸耕乎周之上地耕而食之織而衣之王曰何故也對曰孝如曾參孝巳則不過養其親耳信如尾生髙則不過不欺人耳廉如鮑焦史鰌則不過不竊人之財耳今臣為進取者也臣以為廉不與身俱達義不與生俱立仁義者自完之道也非進取之術也王曰自憂不足乎對曰以自憂為足則秦不出殽函齊不出營丘楚不出疏章三王代位五伯改政皆以不自憂故也若自憂而足則臣亦周之負籠耳何為煩大王之廷耶昔者楚取章武諸侯北面而朝秦取西山諸侯西面而朝曩者使燕母去周室之上則諸侯不為别馬而朝矣臣聞之善為事者先量其國之大小而揆其兵之强弱故功可成而名可立也不能為事者不先量其國之大小不揆其兵之强弱故功不可成而名不可立也今主有東嚮伐齊之心而愚臣知之王曰子何以知之對曰矜㦸砥劍登丘東嚮而歎是以愚臣知之今夫烏獲舉千鈞之重行年八十而求扶持故齊雖强國也西勞於宋南罷於楚則齊軍可敗而河間可取燕王曰善吾請拜子為上卿奉子車百乗子以此為寡人東游於齊何如對曰足下以愛之故與何不與愛子與諸舅叔父負床之孫不得而乃以與亡能之臣何也王之論臣何如人哉今臣之所以事足下者忠信也恐以忠信之故見罪於左右王曰安有為人臣盡其力竭其能而得罪者乎對曰臣請為王譬昔周之上地嘗有之其丈夫宦三年不歸其妻愛人其所愛者曰子之丈夫來則且柰何乎其妻曰勿憂也吾已為藥酒而待其來矣已而其丈夫果來于是因令其妾酌藥酒而進之其妾知之半道而立慮曰吾以此飲吾主父則殺吾主父以此事告吾主父則逐吾主母以殺吾主父逐吾主母者寜佯躓而覆之于是且佯僵而仆之其妻曰為子之遠行來之故為美酒今妾奉而仆之其丈夫不知縛其妾而笞之故妾所以笞者忠信也今臣為足下使於齊恐忠信不諭于左右也臣聞之曰萬乗之主不制於人臣十乗之家不制於衆人匹夫徒歩之士不制於妻妾而又况於當時之賢主乎臣請行矣願足下之無制于羣臣也觸讋請長安君為質戰國䇿趙太后新用事秦急攻之趙氏求救於齊齊曰必以長安君為質兵乃出太后不肯大臣彊諫太后明謂左右有復言令長安君為質者老婦必唾其靣左師觸讋願見太后盛氣而揖之入而徐趨至而自謝曰老臣病足曾不能疾走不得見久矣竊自恕恐太后玉體之有所郄也故願望見太后曰老婦恃輦而行曰日食飲得無衰乎曰恃鬻耳曰老臣今者殊不欲食乃自强歩日三四里少益嗜食和於身曰老婦不能太后之色少解左師公曰老臣賤息舒祺最少不肖而臣衰竊愛憐之願令補黑衣之數以衛王宮没死以聞太后曰敬諾年幾何矣對曰十五嵗矣雖少願及未塡溝壑而託之太后曰丈夫亦愛憐其少子乎對曰甚於婦人太后曰婦人異甚對曰老臣竊以為媪之愛燕后賢于長安君曰君過矣不若長安君之甚左師公曰父母之愛子則為之計深遠媪之送燕后也持其踵為之泣念悲其遠也亦哀之矣巳行非弗思也祭祀必祝之祝曰必勿使反豈非計久長有子孫相繼為王也哉太后曰然左師公曰今三世以前至于趙之為趙趙王之子孫侯者其繼有在者乎曰無有曰微獨趙諸侯有在者乎曰老婦不聞也此其近者禍及身遠者及其子孫豈人主之子孫則必不善哉位尊而亡功奉厚而無勞而挾重器多也今媪尊長安之位而封以膏腴之地多予之重器而不及今令有功於國一旦山陵崩長安君何以自託于趙老臣以媪為長安君計短也故以為其愛不若燕后太后曰諾恣君之所使之于是為長安君約車百乗質于齊齊兵乃出子義聞之曰人主之子也骨肉之親也猶不能恃無功之尊無勞之奉以守金玉之重也而况人臣乎楚王用羣臣計不予齊地戰國䇿楚襄王為太子之時質于齊懐王薨太子辭于齊王而歸齊王隘之予我東地五百里乃歸子子不予我不得歸太子曰臣有傅請退而問傅傅慎子曰獻之地所以為身也愛地不送死父不義臣故曰獻之便太子入致命齊王曰敬獻地五百里齊王歸楚太子太子歸即位為王齊使車五十乗來取東地於楚楚王告慎子曰齊使來求東地為之柰何慎子曰王明日朝羣臣皆令獻其計上柱國子良入見王曰寡人之得求反主墳墓復羣臣歸社稷也以東地五百里許齊今來求地為之柰何子良曰王不可不與也王身出玉聲許强萬乗之齊而不與則不信後不可以約結諸侯請與而復攻之與之信攻之武臣故曰與之子良出昭常入見王曰齊使來求東地五百里為之柰何昭常曰不可與也萬乗者以地大為萬乗今去東地五百里是去戰國之半也有萬乗之號而無千乗之用也不可臣故曰勿與常請守之昭常出景鯉入見王曰齊使來求東地五百里為之柰何景鯉曰不可與也雖然楚不能獨守王身出玉聲許萬乗之强齊也而不與負不義於天下楚亦不能獨守臣請西索救于秦景鯉出慎子入王以三大夫計告慎子曰子良見寡人曰不可不與也與而復攻之常見寡人曰不可與也常請守之鯉見寡人曰不可與也雖然楚不能獨守也臣請索救于秦寡人誰用於三子之計慎子對曰王皆用之王怫然作色曰何謂也慎子曰臣請効其説而王且見其誠然也王發上柱國子良車五十乗而北獻地五百里於齊發子良之明日遣昭常為大司馬令徃守東地遣昭常之明日遣景鯉車五十乗西索救于秦王曰善乃遣子良北獻地於齊遣子良之明日立昭常為大司馬使守東地又遣景鯉西索救于秦子良至齊齊使人以甲受東地昭常應齊使曰我典主東地且與死生悉五尺至六十三十餘萬敝甲鈍兵願承下塵齊王謂子良曰大夫來獻地今常守之何如子良曰臣身受命敝邑之王是常矯也王攻之齊王大興兵攻東地伐昭常未渉疆秦以五十萬臨齊右壤曰夫隘楚太子弗出不仁又欲奪之東地五百里不義其縮甲則可不然則願待戰齊王恐焉乃請子良南道楚西使秦解齊患士卒不用東地復全蘇子論留楚太子戰國䇿楚王死太子在齊質蘇子秦謂薛公曰君何不留楚太子以市其下東國薛公曰不可我留太子郢中立王然則是我抱空質而行不義于天下也蘇子秦曰不然郢中立王君因謂其新王曰與我下東國吾為王殺太子不然吾將與三國共立之然則下東國必可得也蘇子秦之事可以請行可以令楚王亟入下東國可以益割於楚可以忠太子而使楚益入地可以為楚王走太子可以忠太子使之亟去可以惡蘇子秦於薛公可以為蘇子秦請封于楚可以使人説薛公以善蘇子可以使蘇子自解于薛公蘇子秦謂薛公曰臣聞謀泄者事亡功計不决者名不成今君留楚太子者以市下東國也非亟得下東國者則楚之計變變則是君抱空質而負名于天下也薛公曰善為之柰何對曰臣請為君之楚使亟入下東國之地楚得成則君無敗矣薛公曰善因遣之故曰可以請行也謂楚王曰齊欲奉太子而立之臣觀薛公之留太子者以市下東國也今王不亟入下東國則太子且倍王之割而使齊奉巳楚王曰謹受命因獻下東國故曰可以使楚亟入地也謂薛公曰楚之勢可多割也薛公曰柰何請告太子其故使太子謁之君以忠太子使楚王聞之可以益入地故曰可以益割於楚謂太子曰齊奉太子而立之楚王請割地以留太子齊少其地太子何不倍楚之割地而資齊齊必奉太子太子曰善倍楚之割而延齊楚王聞之恐益割地而獻之尚恐事不成故曰可以使楚益入地也謂楚王曰齊之所以多割地者挾太子也今巳得地而求不止者以太子權王也故臣能去太子太子去齊無辭必不倍於王也王因馳强齊而為交齊辭必聼王然則是王去讐而得齊交也楚王大説曰請以國因故曰可以為楚王使太子亟去也謂太子曰夫剬楚者王也以空名市者太子也齊未必信太子之言也而楚功見矣楚交成太子必危矣太子其圖之太子曰謹受命乃約車而暮去故曰可以使太子急去也蘇子秦使人請薛公曰夫勸留太子者蘇子秦也蘇子秦非誠以為君也且以便楚也蘇子秦恐君之知之故多割楚以滅跡也今勸太子去者又蘇子秦也而君弗知也臣竊為君疑之薛公大怒於蘇子秦故曰可以使人惡蘇子於薛公也奉王而代立楚太子者又蘇子秦也割地因約者又蘇子秦也忠王而走太子者又蘇子秦也今人惡蘇子秦於薛公之側以其為齊薄而為楚厚也願王之知之楚王曰謹受命因封蘇子秦為武貞君故曰可以為蘇子秦請封於楚也又使景鯉請薛公曰君之所以重於天下者以能得天下之士而有齊權也今蘇子秦天下之辨士也世與少有君因不善蘇子秦則是圍塞天下士而不利説途也夫不善君者且奉蘇子秦而于君之事殆矣今蘇子秦善於楚王而君不蚤親則是與楚為讐也故君不如因而親之貴而重之是君有楚也薛公因善蘇子秦故曰可以為蘇子秦説薛公以善蘇子秦魯仲連責新垣衍史記趙孝成王時秦王使白起破趙長平之軍前後四十餘萬秦兵遂東圍邯鄲趙王恐諸侯之救兵莫敢擊秦軍魏安釐王使將軍晉鄙救趙畏秦止于蕩隂不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所為急圍趙者前與齊湣王争强為帝巳而復歸帝今齊湣王已益弱方今唯秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦昭王為帝秦必喜罷兵去平原君猶豫未有所决此時魯仲連適遊趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又内圍邯鄲而不能去魏王使客將軍新垣衍令趙帝秦今其人在是勝也何敢言事魯仲連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介而見之于先生平原君遂見新垣衍曰東國有魯仲連先生者今其人在此勝請為紹介交之于將軍新垣衍曰吾聞魯仲連先生齊國之高士也衍人臣也使事有職吾不願見魯仲連先生平原君曰勝既已泄之矣新垣衍許諾魯連見新垣衍而無言新垣衍曰吾視居此圍城之中者皆有求於平原君者也今吾觀先生之玉貌非有求于平原君者也曷為久居此圍城之中而不去魯仲連曰世以鮑焦為無從頌而死者皆非也衆人不知則為一身彼秦者棄禮義而上首功之國也權使其士虜使其民彼即肆然而為帝過而為政於天下則連有蹈東海而死耳吾不忍為之民也所為見將軍者欲以助趙也新垣衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊楚則固助之矣新垣衍曰燕則吾請以從矣若乃梁者則吾乃梁人也先生惡能使梁助之魯連曰梁未睹秦稱帝之害故耳使梁睹秦稱帝之害則必助趙矣新垣衍曰秦稱帝之害何如魯連曰昔者齊威王嘗為仁義矣率天下諸侯而朝周周貧且微諸侯莫朝而齊獨朝之居嵗餘周烈王崩齊後徃周怒赴于齊曰天崩地拆天子下席東藩之臣田嬰齊後至則斮齊威王勃然怒曰叱嗟而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然其亡足怪新垣衍曰先生獨不見夫僕乎十人而從一人者寜力不勝而智不若邪畏之也魯仲連曰嗚呼梁之比於秦若僕邪新垣衍曰然魯仲連曰吾將使秦王烹醢梁王新垣衍怏然不悦曰噫嘻亦太甚矣先生之言也先生又惡能使秦王烹醢梁王魯仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之於紂紂以為惡醢九侯鄂侯爭之强辨之疾故脯鄂侯文王聞之喟然而歎故拘之羑里之庫百日欲令之死曷為與人俱稱王卒就脯醢之地齊湣王將之魯夷維子為執䇿而從謂魯人曰子將何以待吾君魯人曰吾將以十太牢待子之君夷維子曰子安取禮而來吾君彼吾君者天子也天子廵狩諸侯辟舍納筦籥攝袵抱杌視膳于堂下天子已食乃退而聼朝也魯人投其籥不果納不得入于魯將之薛假途于鄒是時鄒君死湣王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯棺設北面于南方然後天子南面弔也鄒之羣臣曰必若此吾將伏劍而死故不敢入于鄒鄒魯之臣生則不得事養死則不得賻襚然且欲行天子之禮于鄒魯鄒魯之臣不果納今秦萬乗之國也梁亦萬乗之國也俱據萬乗之國各有稱王之名睹其一戰而勝欲從而帝之是使三晉之大臣不如鄒魯之僕妾也且秦無已而帝則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯妃姬處梁之宮梁王安得晏然而已乎而將軍又何以得故寵乎于是新垣衍起再拜謝曰始以先生為庸人吾乃今日知先生為天下之士也吾請出不敢復言帝秦蔡澤説應侯辭位史記蔡澤聞應侯任鄭安平王稽皆負重罪于秦應侯内慙蔡澤乃西入秦將見昭王使人宣言以感怒應侯曰燕客蔡澤天下雄俊𢎞辯智士也彼一見秦王秦王必困君而奪君之位應侯聞曰五帝三代之事百家之説吾既知之衆口之辨吾皆摧之是惡能困我而奪我位乎使人召蔡澤蔡澤入則揖應侯應侯固不快及見之又倨應侯因讓之曰子常宣言欲代我相秦寜有之乎對曰然應侯曰請聞其説蔡澤曰吁君何見之晚也夫四時之序成功者去夫人生百體堅强手足便利耳目聰明而心聖智豈非士之願與應侯曰然蔡澤曰質仁秉義行道施德得志于天下天下懐樂敬愛而尊慕之皆願以為君王豈不辯智之期與應侯曰然蔡澤復曰富貴顯榮成理萬物使各得其所性命壽長終其天年而不夭傷天下繼其統守其業傳之亡窮名實純粹澤流千里世世稱之而無絶與天地終始豈道德之符而聖人所謂吉祥善事者與應侯曰然蔡澤曰若夫秦之商君楚之吳起越之大夫種其卒然亦可願與應侯知蔡澤之欲困已以説復謬曰何為不可夫公孫鞅之事孝公極身而無貳慮盡公而不顧私設刀鋸以禁奸邪信賞罰以致治披腹心示情素蒙怨咎欺舊友奪魏公子印安秦社稷利百姓卒為秦禽將破敵攘地千里吳起之事悼王也使私不得害公讒不得蔽忠言不取苟合行不取茍容不為危易行行義不辟難然為霸王彊國不辭禍凶大夫種之事越王也主雖困辱悉忠而不解主雖絶亡盡能而弗離成功而弗矜貴富而不驕怠若此三子者固義之至也忠之節也是故君子以義死難視死如歸生而辱不如死而榮士固有殺身以成名唯義之所在雖死無所恨何為不可哉蔡澤曰主聖臣賢天下之盛福也君明臣直國之福也父慈子孝夫信妻貞家之福也故比干忠而不能存殷子胥智而不能完吳申生孝而晉國亂是皆有忠臣孝子而國家滅亂者何也無明君賢父以聽之故天下以其君父為僇辱而憐其臣子今商君吳起大夫種之為人臣是也其君非也故世稱三子致功而不見德豈慕不遇世死乎夫待死而後可以立忠成名是微子不足仁孔子不足聖管仲不足大也夫人之立功豈不期于成全邪身與名俱全者上也名可法而身死者其次也名在僇辱而身全者下也于是應侯稱善蔡澤少得間因曰夫商君吳起大夫種其為人臣盡忠致功則可願矣閎夭事文王周公輔成王也豈不亦忠聖乎以君臣論之商君吳起大夫種其可願孰與閎夭周公旦哉應侯曰商君吳起大夫種弗若也蔡澤曰然則君之主慈仁任忠惇厚舊故其賢智與有道之士為膠漆義不倍功臣孰與秦孝公楚悼王越王乎應侯曰未知何如也蔡澤曰今主親忠臣不過秦孝公楚悼王越王君之設智能為主安危修政治亂彊兵批患折難廣地植穀富國足家彊主尊社稷顯宗廟天下莫敢欺犯其主主之威蓋震海内功彰萬里之外聲名光輝傳于千世君孰與商君吳起大夫種應侯曰不若蔡澤曰今主之親忠臣不忘舊故不若孝公悼王勾踐而君之功績愛信親幸又不若商君吳起大夫種然而君之禄位貴盛私家之富過於三子而身不退者恐患之甚于三子竊為君危之語曰日中則移月滿則虧物盛則衰天地之常數也進退盈縮與時變化聖人之常道也故國有道則仕國亡道則隱聖人曰飛龍在天利見大人不義而富且貴於我如浮雲今君之怨已讐而德已報意欲至矣而無變計竊為君不取也且夫翠鵠犀象其處勢非不遠死也而所以死者惑於餌也蘇秦智伯之智非不足以辟辱遠死也而所以死者惑于貪利不止也是以聖人制禮節欲取於民有度使之以時用之有止故志不溢行不驕常與道俱而不失故天下承而不絶昔者齊桓公九合諸侯一匡天下至于葵丘之㑹有驕矜之志畔者九國吳王夫差兵無敵於天下勇彊以輕諸侯陵齊晉故遂以殺身亡國夏育太史激叱呼駭三軍然而身死於庸夫此皆乗至盛而不返道理不居卑退處儉約之患也夫商君為秦孝公明法令禁奸本尊爵必賞有罪必罰平權衡正度量調輕重决裂阡陌以静生民之業而一其俗勸民耕農利土一室無二事力田稸積習戰陳之事是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯成秦國之業功已成矣而遂以車裂楚地方數千里持㦸百萬白起率數萬之師以與楚戰一戰舉鄢郢以燒夷陵再戰南并蜀漢又越韓魏而攻彊趙北坑馬服誅屠四十餘萬之衆盡之於長平之下流血成川沸聲若雷遂入圍邯鄲使秦有帝業楚趙天下之彊國而秦之仇敵也自是之後楚趙皆懾伏不敢攻秦者白起之勢也身所服者七十餘城功已成矣而遂賜劍死于杜郵吳起為楚悼王立法卑減大臣之威重罷無能廢無用損不急之官塞私門之請一楚國之俗禁游客之民精耕戰之士南收揚越北并陳蔡破横散從使馳説之士無所開其口禁朋黨以厲百姓定楚國之政兵震天下威服諸侯功已成矣而卒枝解大夫種為越王深謀遠計免㑹稽之危以亡為存因辱為榮墾草入邑辟地殖穀率四方之士專上下之力輔勾踐之賢報夫差之讐卒擒勁吳令越成霸功已彰而信矣勾踐終負而殺之此四子者功成不去禍至於此此所謂信而不能詘徃而不能返者也范蠡知之超然辟世長為陶朱公君獨不觀夫博者乎或欲大投或欲分功此皆君之所明知也今君相秦計不下席謀不出廊廟坐制諸侯利施三川以實宜陽决羊腸之險塞太行之道又斬范中行之塗六國不得合從棧道千里通於蜀漢使天下皆畏秦秦之欲得矣君之功極矣此亦秦之分功之時也如是而不退則商君白公吳起大夫種是也吾聞之鑒於水者見面之容鑒於人者知吉與㐫書曰成功之下不可久處四子之禍君何居焉君何不以此時歸相印讓賢者而授之退而巖居川觀必有伯夷之廉長為應侯世世稱孤而有許由延陵季子之讓喬松之壽孰與以禍終哉即君何居焉忍不能自離疑不能自决必有四子之禍矣易曰亢龍有悔此言上而不能下信而不能詘徃而不能自反者也願君熟計之應侯曰善吾聞欲而不知止失其所以欲有而不知足失其所以有先生幸教睢敬受命文編巻二十一

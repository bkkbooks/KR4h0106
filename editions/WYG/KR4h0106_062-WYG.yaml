body:
  text: 文編卷六十二明唐順之編太子太師致仕杜祁公墓誌銘歐陽修故太子太師致仕祁國公贈司徒兼侍中杜公諱衍字世昌越州山隂人也其先本岀於堯之後歴三代嘗為諸侯後徙其封於杜而子孫散適他國者以杜為氏自杜赫為秦將軍後三世御史大夫周及其子建平侯延年仍顯於漢又九世當陽侯預顯於晉又十有四世岐國公佑顯於唐又九世而至於祁公其為家有法其吉㐫祭祀齋戒日時幣祝從事一用其家書自唐滅士䘮其舊禮而一切茍簡獨杜氏守其家法不遷於世俗盖自春秋諸侯之子孫歴秦漢千有餘嵗得不絶其世譜而唐之盛時公卿家法存於今者惟杜氏公自曽高以來以恭儉孝謹稱鄉里至公為人尤潔㢘自剋其為大臣事其上以不欺為忠推於人以行已取信故其動静纎悉謹而有法至考其大節偉如也公享年八十官至尚書左丞方其六十有九嵗且盡即上書告老明年以太子少師致仕累遷太子太保太傅太師封祁國公於其家天子祀明堂遣使者召公陪祠將有所問以疾不至而嵗時存問勞賜不絶公少舉進士高第為揚州觀察推官知平遙縣通判晉州知乾州遷河東京西路提㸃刑獄知揚州河東陜西路轉運使入為三司戸部副使拜天章閣待制知荆南府未行以為河北路都轉運使遂知天雄軍召為御史中丞判流内銓知審官院拜樞密直學士知永興軍徙知并州遷龍圖閣學士復知永興軍權知開封府康定元年以刑部侍郎同知樞密院事即拜副使慶厯三年遷吏部侍郎樞密使明年以本官同中書門下平章事公治吏事如其為人其聽獄訟雖明敏而審覈愈精故屢决疑獄人以為神其簿書出納推析毫髪終日無倦色至為條目必使吏不得為奸而已及其施於民者則簡而易行始居平遙嘗以吏事適他州而縣民爭訟者皆不肻決以待公歸知乾州未滿嵗安撫使察其治行以公權知鳯翔府二邦之民爭於界上一曰此我公也汝奪之一曰今我公也汝何有焉夏人初叛命天下苦於兵而自陜以西尤甚吏縁侵漁調發督迫至民破産不能足徃徃自經投水以死於是時公在永興語其人曰吾不能免汝然可使汝不勞爾乃為之區處計較量物有無貴賤道里逺近寛其期㑹使以次輸送由是物不踴貴車牛芻秣宿食來徃如平時而吏束手無所施民比它州費省十六七至於繕治城郭器械民皆不知開封治京師常撓於權要有干其法而能不為之屈者世皆以為難至公能使權要不敢有所干凡其為治以聽斷盗賊為能否爾獨公始有餘力省其民事如治他州而畿赤諸縣之民皆被其惠開封比比出能吏而兼於民政者惟公一人吏部審官主天下吏員而居職者類以不乆遷去故吏得為奸公始視銓事一日選者三人爭其闕公以問吏吏受丙賕對曰當與甲乙不能爭遂授他闕居數日吏敎丙訟甲負某事不當得公悟召乙問之乙謝曰業已得它闕不願爭公不得已與丙而笑曰此非吏罪乃吾未知銓法爾因命諸曹各具格式科條以白問曰盡乎曰盡矣明日勅諸吏無得升堂使坐曹聽行文書而已由是吏不得與銓事與奪一出於公居月餘翕然聲動京師其在審官有以賄求官者吏謝不受曰我公有賢名不乆見用去矣姑少待之慶厯之初上猒西兵之乆出而民弊亟用今丞相富公樞密韓公及范文正公而三人者遂欲盡革衆事以修紀綱而小人權倖皆不悦獨公與相佐佑而公尤抑絶僥倖凡内降與恩澤者一切不與每積至十數則連封而面還之或詰責其人至慙恨涕泣而去上嘗謂諫官歐陽修曰外人知杜某封還内降邪吾居禁中有求恩澤者毎以杜某不可告之而止者多於所封還也其助我多矣此外人及杜某皆不知也然公與三人者卒皆以此罷去公多知本朝故實善決大事初邊將議欲大舉以擊夏人雖韓公亦以為可舉公爭以為不可大臣至有欲以沮軍罪公者然兵後果不得出契丹與夏人争銀甕族大戰黄河外而雁門麟府皆警范文正公安撫河東欲以兵從公以為契丹必不來兵不可妄出范公怒至以語侵公公不為恨後契丹卒不來二公皆世俗指公與為朋黨者其論議之際盖如此及三人者將罷去公獨以為不可遂亦罷以尚書左丞知兖州嵗餘乃致仕公自布衣至為相衣服飲食無所加雖妻子亦有常節家故饒財諸父分産公以所得悉與昆弟之貧者俸禄所入分給宗族賙人急難至其歸老無屋以居寓於南京驛舍者乆之自少好學工書畫喜為詩讀書雖老不倦推奬後進今世知名士多出其門居家見賔客必問時事聞有善喜若已出至有所不可憂見於色或夜不能寐如任其責者凡公所以行之終身者有能履其一君子以為人之所難而公自謂不足以名後世遺戒子孫無得紀述嗚呼豈所謂任重道逺而為善惟日不足者歟曽祖太子少保諱某贈太師祖鴻臚卿諱叔詹追封吳國公父尚書度支員外郎諱遂良追封韓國公皆贈太師中書令兼尚書令娶相里氏封晉國夫人子男曰詵大理評事訢太常博士訥將作監主簿詒秘書省正字三子早卒女長適集賢校理蘇舜欽次適秘閣校理李綖次適單州圑練推官張遵道公以嘉祐二年二月五日卒于家其子訢以其年十月十八日𦵏公子應天府宋城縣之仁孝原銘曰翼翼祁公率履自躬一其初終惟徳之恭公在于位士知貪㢘退老于家四方之瞻豈惟士夫天子曰咨爾曲爾直繩之墨之正爾方圓有矩有規人莫之踰公無爾欺予左予右惟公是毗公雖告休受寵不已宫臣國公即命于第奕奕明堂萬邦從祀豈無臣工為予執法何以召之惟公舊徳公不能來予其徃鍚君子愷悌民之父母公雖百齡人以為少不俾黄耉喪予元老寵禄之隆則有止期惟其不已既去而思銘昭于逺萬世之詒鎮安軍節度使同中書門下平章事贈中書令諡文簡程公墓誌銘歐陽修嘉祐元年閏三月己丑鎮安軍節度使檢校太師同中書門下平章事使持節陳州諸軍事陳州刺史程公薨于位以聞詔輟視朝二日贈公中書令於是其孤嗣隆以狀上考功移于太常而博士起曰法宜諡乃諡曰文簡明年十月十八日𦵏公于河南伊闕之某鄉某原其孤又以請于太史而史臣修曰禮宜銘乃考次公之世族官封爵號卒葬時日與其始終之大節合而誌於其墓且銘之曰惟程氏逺有世序自重黎以來其後居中山者出於魏安鄉侯昱之後公諱琳字天球中山博野人也曽祖贈太師諱新曽祖妣吳國夫人齊氏祖贈太師中書令諱賛明祖妣秦國夫人吳氏考袁州宜春令贈太師中書令尚書令冀國公諱元白妣晉國夫人楚氏公以大中祥符四年舉服勤辭學高第為泰寜軍節度掌書記改著作佐郎知夀陽縣秘書丞監左藏庫天僖中詔舉辭學履行召試直集賢院今天子即位遷太常博士三司戸部判官是時契丹所遣使者數出不遜語生事而主者應對多失辭上患之已而契丹來賀即位乃選公為接伴使而契丹使者言太后當遣使通書公遽以禮折之乃已史官修真宗實録而起居注闕命公修大中祥符八年以後起居注遂修起居注遷祠部員外郎提舉在京諸司庫務以本官知制誥同判吏部流内銓天聖五年館伴契丹賀乾元節使使者言中國使至契丹坐殿中位次高而契丹使來坐次下當陛語甚切不已而上與大臣皆以為小故不足爭將許之公以謂許其小必啟其大力爭以為不可遂止河決滑州初議者言可塞役既作而後議者以為不可乃命公徃視之公言可塞遂塞之嵗中遷右諫議大夫權御史中丞明年拜樞密直學士知益州蜀人輕而喜亂公常先制於無事至其臨時如不用意而畧其細治其大且甚者不過一二而蜀人安之自寮吏皆不能窺其所為正月俗放燈吏民夜㑹聚遨嬉盛天下公先戒吏為火備有失火者使隨救之勿白以動衆既而大宴五門城中火吏救止卒宴民皆不知盖其他設施多類此軍士見監軍告其軍有變監軍入白公笑遣之惶恐不敢去公曰軍中動静吾自知之茍有謀者不待告也可使告者來監軍去而告者卒不敢來公亦不問遂止蜀州妖人有自號李氷神子者署官屬吏卒聚徒百餘人公命捕寘之法而讒之朝者言公妄殺人蜀人恐且亂矣上遣中貴人馳視之使者入其境居人行旅爭道公善使者問殺妖人事其父老皆曰殺一人可使蜀數十年無事使者問其故對曰前亂蜀者非有智謀豪傑之才乃里閭無賴小人爾惟不制其始遂至於亂也使者視蜀既無事又得父老語還白於是上益以公為能遷給事中知開封府禁中大火延兩宫宦者治獄得縫人火斗已誣伏而下府命公具獄公立辨其非禁中不得入乃命工圖火所經而後宫人多所居隘其烓竈近版壁嵗乆燥而焚曰此豈一日火哉乃建言此殆天災也不宜以罪人上為緩其獄故卒得無死者公在府決事神速一嵗中獄常空者四五遷工部侍郎龍圖閣直學士守御史中丞是嵗以翰林侍讀學士復知開封府明年為三司使治財賦知本末出入有節雖一金不可妄取累遷吏部侍郎景祐四年以本官參知政事司天言日食明年正旦請移閏月以避之公以謂天有所譴非移閏可免惟修徳政而已乃止范仲淹以言事忤大臣貶饒州已而上悔悟欲復用之稍徙知潤州而惡仲淹者復誣以事語入上怒亟命置之嶺南自仲淹貶而朋黨之論起朝士牽連出語及仲淹皆指為黨人公獨為上開説明其誣枉上意解而後已公為人剛決明敏多識故事議論慨然及知政事益奮勵無所迴避宰相有所欲私輙以語折之至今人徃徃能道其語而小人僥倖多不得志遂共以事中之坐貶光禄卿知潁州已而上思之徙知青州又徙大名府居一嵗間遷戸部吏部二侍郎尚書左丞資政殿學士北京建與宦者皇甫繼明爭治行宫事章交上上遣一御史視其曲直御史直公遂罷繼明是時繼明方信用其勢傾動中外自朝廷大臣莫不屈意下之而公被中傷方起未復而獨與之爭雖小故不少假也故議者不以公所直為難而以能不為繼明屈為難也遷工部尚書資政殿大學士河北安撫使慶厯六年拜武昌軍節度使陜西安撫使知永興軍府事明年加宣徽北院使判延州夏人以兵三萬臨界上前三日公諜知其來戒諸堡寨按兵閉壁冦至以為有備引去訖公去不復窺邊趙元昊死子諒祚立方幼三大將共治其國言事者謂可除其諸將皆以為節度使使各有其所部以分弱其勢可遂無西患事下公公以謂幸人之喪非所以示大信撫逺人而諒祚雖幼君臣和三將無異志雖欲有為必無功而反生事不如因而撫之上以為然皇祐元年加同中書門下平章事復判大名府兼北京留守自元昊反河西契丹亦犯約求地二邊兵興連嵗不解而公方入與謀議更守西北二方尤知敵人虛實情偽山川要害所以行師制勝營陣出入之法於河北尤詳其奏議頗多雖不能盡用其指畫䂓為之際有可喜也再居大名前後十年威惠信於其人人為立生祠公自罷政事益不妄與人合亦卒不復用既徙鎮安居三嵗上書曰臣雖老尚能為國守邊未報而得疾享年六十有九公累階開府儀同三司勲上柱國開國廣平郡爵公食戸七千四百而實封二千一百賜號推誠保徳守正翊戴功臣娶陳氐封衛國夫人子男四人曰嗣隆太常博士嗣弼殿中丞嗣恭太常博士嗣先大理寺丞女五人長適職方員外郎榮諲次適秘書丞韓縝次適都官員外郎晁仲約次適大理寺丞吳得次適將作監主簿王偁孫三人長曰伯孫次曰公孫皆太常寺太祝次曰昌孫守秘書郎有文集奏議六十巻公平生寡言笑慎於知人既已知之乆而益篤喜飲酒引滿然人罕得其驩而與余尤相好也銘曰君子之守志於不奪不學而剛有摧必折毅毅程公其剛不屈公在政事有諤其言直雖不容志豈不完謂公不顯公位將相豈無謀謨胡不以訪老于輔藩白首猶壯公雖在外邦國之光奄其不存士夫曷望吉卜之從兆此新岡惟其休聲逾逺彌長贈太子太傅胡公墓誌銘歐陽修太子少師致仕贈太子大傅胡公諱宿字武平其先豫章人也後徙常州之晉陵世有隠徳為晉陵著姓公舉進士中天聖二年乙科為真州揚子尉縣大水漂溺居民令不能救公曰拯溺吾職也即率公私舟活數千人嵗滿調廬州合淝主簿張丞相士遜稱其文行薦諸朝召試學士院為館閣校勘與修北史改集賢校理通判宣州三遷太常博士判吏部南曹賜緋衣銀魚知湖州為政有惠愛築石塘百里捍水患大興學校學者盛於東南自湖學始公丁母夫人憂去而州人思之名其塘曰胡公塘學者為公立生祠于學中至今祠之公居喪毁瘠過禮三年不居于内服除為三司鹽鐡判官轉尚書祠部貟外郎判度支局院知蘇州兩浙路轉運使召還修起居注以本官知制誥兼勾當三班院已而兼判吏部流内銓入内都知楊懐敏坐衛士夜盜入禁中驚乘輿斥出為和州都監懐敏用事乆勢動中外未幾召復故職公封還辭頭不草制論曰衛士之變蹤跡連懐敏得不窮治誅死幸矣豈冝復在左右其命遂止乆之拜公翰林侍讀學士遷翰林學士兼史館修撰判館事兼端明殿學士累遷尚書左司郎中兼知通進銀臺司審刑院羣牧使提舉在京諸司庫務醴泉宫判尚書禮部遂判都省再知禮部貢舉奉使契丹館伴北朝人使亦皆再而北人嚴憚之公為人清儉謹黙内剛外和羣居笑語諠譁獨正容色温温不動聲氣與人言必思而後對故其涖官臨事慎重不輙發發亦不可囘止而其趣要歸於仁厚朝議在官年七十而不致仕者有司以時按籍舉行公以謂養亷恥厚風俗宜有漸而欲一切以吏議從事殆非所以優老勸功之意當少緩其事使人得自言而全其美節朝廷嘉其言是至今行之皇祐新樂成議者多異論有詔新樂用於常祀朝㑹而郊廟仍用舊樂公言書稱同律而今舊樂高新樂下相去一律難並用而新樂未施於郊廟先用之朝㑹非先王薦上帝配祖考之意皆不可近制禮部四嵗一貢士議者患之請更為間嵗議已定公獨以為不然曰使士子廢業而奔走無寜嵗不如復用三嵗之制也衆皆以公言為非行之數年士子果以為不便而卒用三嵗之制仁宗乆未有皇子羣臣多以皇嗣為言未省公以學士當作青辭禱嗣于山川即建言儲位乆虛非所以居安而慮危願擇宗室之賢者立之以慰安天下之心語甚切至公學問該博兼通隂陽五行天人災異之説南京鴻慶宫災公以謂南京聖宋所以受命建號而大火主于商丘國家乘火徳而王者也今不領於祠官而比年數災宜修火祀事下太常嵗以長吏奉祠商丘自公始慶厯六年夏河北河東京東同時地震而登萊尤甚公以嵗推之曰明年丁亥嵗之刑徳皆在北宫隂生於子而極於亥然隂猶彊而未即伏陽猶㣲而未即勝此所以震也是謂龍戰之㑹而其位在乾今夏人元昊中國之隂也宜為之備不然必有内盜起於河朔明年王則以貝州叛公又以為登萊視京師為東北隅乃少陽之位也今二州並置金坑多聚民以鑿山谷陽氣損泄故隂乘而動縣官入金嵗幾何小利而大害可即禁止以寜地道皇祐五年正月㑹靈宫災是嵗冬至祀天南郊以三聖並配明年大旱公曰五行火禮也去嵗火而今又旱其應在禮此殆郊丘並配之失也即建言並配非古宜用迭配如初詔其後并州議建軍為節鎮公以星土考之曰昔高辛氏之二子不相能也堯遷閼伯於商丘主火而商為宋星遷實沈於臺駘主水而參為晉星國家受命始於商丘王以火徳又京師當宋之分野而并為晉地參商仇讐之星今欲崇晉非國之利也自宋興平僣偽并最後服太宗削之不使列於方鎮八十年矣謂宜如舊制公在翰林十年多所補益大抵不為茍止而妄隨故其言或用或不用或後卒如其言然天子察公之忠欲大用者乆矣嘉祐六年八月拜公諫議大夫樞密副使公既慎静而當大任尤顧惜大體而羣臣方建利害多更張庶事以革弊公獨厭之曰變法古人之難不務守祖宗成法而徒紛紛無益於治也又以謂契丹與中國通好六十餘年自古未有也善待敵人者謹為備而已今三邊武備多弛牧馬著虛名於籍可乘而戰者百無一二又謂滄州宜分為一路以禦敵此今急務也若其界上交侵小故乃城寨主吏之職朝廷宜守祖宗之約不宜爭小利而隳大信深戒邊臣生事以為功在位六年其論議類皆如此英宗即位拜給事中治平三年累上表乞致仕未允乆之拜尚書吏部侍郎觀文殿學士知杭州為政不畧細故或謂大臣不宜自勞公曰此民事也吾不敢忽以是民尤愛之明年今上即位遷左丞五月公以疾告遂除太子少師致仕命未至而公以六月十一日薨于正寢享年七十有三即以其年十一月某日𦵏于某州某縣某鄉之某原公之曽祖諱持累贈太傅曽祖妣歐陽氏追封晉陵郡太夫人祖諱徽累贈太師祖妣楊氏追封華隂郡太夫人余氏嘉興郡太夫人余氏丹陽郡太夫人龔氏武陵郡太夫人父諱㝝累贈太師兼中書令妣沈氏追封東陽郡太夫人貝氏南陽郡太夫人李氏金城郡太夫人公累階光禄大夫勲上柱國開國安定爵公食邑二千八百戸食實封四百戸賜推誠保徳翊戴功臣初娶吳氏追封蘭陵郡夫人再娶何氏封南康郡夫人子男五人長曰宗堯今為都官貟外郎次曰遵路早卒次曰宗質國子博士次曰宗炎著作佐郎次曰宗厚秘書省正字早卒女四人皆適士族孫志修太常寺大祝行修守秘書省校書郎簡修試秘書省校書郎世修徳修安修奕修慎修益修公自為進士知名于時楊文公億得其詩題于秘閣歎曰吾恨未識此人其舉進士也謝陽夏公絳薦公為第一公名以此益彰而謝公亦以此自負少嘗善一浮圖其人將死謂公曰我有秘術能化瓦石為黄金子其𦵏我我以此報子公曰爾之後事吾敢不勉秘術非吾欲也浮圖歎曰子之志未可量也其篤行自勵至於貴顯常如布衣時有文集四十巻銘曰允矣胡公順外剛中惟初暨終一徳之恭公之燕居其氣温温舉必可法思而後言公在朝廷正色侃侃蔚有嘉話憂深慮逺不迎利趨不畏勢反有或不從後必如之乆而愈信孰不公思侍從之親樞機之密名望三朝清職峻秩愷悌之仁宜國黄耉七十而止孰云多夀惟善在人刻銘不朽贈尚書工部侍郎孔公墓誌銘王安石宋故朝請大夫給事中知鄆州軍州事兼管内河堤司農同羣牧使上䕶軍魯郡開國侯食邑一千六百戸食實封二百戸賜紫金魚袋孔公者尚書工部侍郎贈尚書吏部侍郎諱朂之子兖州曲阜縣令襲封文宣公贈兵部尚書諱仁玉之孫兖州泗水縣主簿諱光嗣之曽孫而孔子之四十五世孫也其仕當今天子天聖寳元之間以剛毅諒直名聞天下嘗知諫院矣上書請明肅太后歸政天子而廷奏樞密使曹利用尚御藥羅崇勲罪状當是時崇勲操權利與士大夫為市而利用悍彊不遜内外憚之嘗為御史中丞矣皇后郭氏廢引諫官御史伏閤以爭又求見上皆不許而固爭之得罪然後已盖公事君之大節如此此其所以名聞天下而士大夫多以公不終於大位為天下惜者也公諱道輔字原魯初以進士釋褐補寜州軍事推官年少耳然斷獄議事已能使老吏憚驚遂遷大理寺丞知兖州仙源縣事又有能名其後嘗直史館待制龍圖閣判三司理欠慿由司登聞檢院吏部流内銓糺察在京刑獄知許徐兖鄆泰五州留守南京而兖鄆御史中丞皆再至所至官治數以爭職不阿或絀或遷而公持一節以終身盖未嘗自詘也其在兖州也近臣有獻詩百篇者執政請除龍圖閣直學士上曰是詩雖多不如孔道輔一言乃以公為龍圖閣直學士於是人度公為上所思且不乆於外矣未幾果復召以為中丞而宰相使人説公稍折節以待遷公乃告以不能於是人又度公且不得乆居中而公果出初開封府吏馮士元坐獄語連大臣數人故移其獄御史御史劾士元罪止於杖又多更赦公見上上固怪士元以小吏與大臣交私汙朝廷而所坐如此而執政又以謂公為大臣道地故出知鄆州公以寳元二年如鄆道得疾以十二月壬申卒於滑州之韋城驛享年五十四其後詔追復郭皇后位號而近臣有為上言公明肅太后時事者上亦記公平生所為故特贈公尚書工部侍郎公夫人金城郡君尚氏尚書都官員外郎諱賔之女生二男子曰淘今為尚書屯田員外郎曰宗翰今為太常博士皆有行治世其家累贈公金紫光禄大夫尚書兵部侍郎而以嘉祐七年十月壬寅𦵏公孔子墓之西南百步公㢘於財樂振施遇故人子恩厚尤篤而尤不好鬼神禨祥事在寜州道士治真武像有蛇穿其前數出近人人傳以為神州將欲視驗以聞故率其屬徃拜之而蛇果出公即舉笏擊蛇殺之自州將以下皆大驚已而又皆大服公由此始知名然余觀公數處朝廷大議視禍福無所擇其智勇有過人者勝一蛇之妖何足道哉世多以此稱公者故余亦不得而畧也銘曰展也孔公維志之求行有險夷不改其輈權彊所忌讒諂所讐考終厥位寵禄優優維皇好直是錫公休序行納銘為識諸幽貞曜先生墓誌銘韓愈唐元和九年嵗在甲午八月己亥貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍㑹哭明日使以錢如東都供𦵏事諸嘗與徃來者咸來哭弔韓氏遂以書告興元尹故相餘慶閏月樊宗師使來弔告葬期徵銘愈哭曰嗚呼吾尚忍銘吾友也夫興元人以幣如孟氏賻且來商家事樊子使來速銘曰不則無以掩諸幽乃序而銘之先生諱郊字東野父庭玢娶裴氏女而選為崑山尉生先生及二季酆郢而卒先生生六七年端序則見長而愈騫涵而揉之内外完好色夷氣清可畏而親及其為詩劌目鈢心刃迎縷解鉤章棘句掐擢胃腎神施鬼設間見層出唯其大翫於詞而與世抹摋人皆劫劫我獨有餘有以後時開先生者曰吾既擠而與之矣其猶足存邪年幾五十始以尊夫人之命來集京師從進士試既得即去間四年又命來選為溧陽尉迎侍溧上去尉二年而故相鄭公尹河南奏為水陸運從事試協律郎親拜其母於門内母卒五年而鄭公以節領興元軍奏為其軍參謀試大理評事挈其妻行之興元次于閿鄉暴疾卒年六十四買棺以歛以二人輿歸酆郢皆在江南十月庚申樊子合凡贈賻而𦵏之洛陽東其先人墓左以餘財附其家而供祀將𦵏張籍曰先生掲徳振華於古有光賢者故事有易名况士哉如曰貞曜先生則姓名字行有載不待講説而明皆曰然遂用之初先生所與俱學同姓簡于世次為叔父由給事中觀察浙東曰生吾不能舉死吾知恤其家銘曰於戲貞曜維執不猗維出不訾維卒不施以昌其詩施先生墓誌銘韓愈貞元十八年十月十一日太學博士施先生士丐卒其寮太原郭伉買石誌其墓昌黎韓愈為之辭曰先生明毛鄭詩通春秋左氏傳善講説朝之賢士大夫從而執經考疑者繼于門太學生習毛鄭詩春秋左氏傳者皆其弟子貴游之子弟時先生之説二經來太學帖帖坐諸生下恐不卒得聞先生死二經生喪其師仕於學者亡其朋故自賢士大夫老師宿儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九在太學者十九年由四門助教為太學助教由助教為博士大學秩滿當去諸生輙拜䟽乞留或留或遷凡十九年不離太學祖曰旭袁州宜春尉父曰婼豪州定逺丞妻曰太原王氏先先生卒子曰友直明州鄮縣主簿曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讐為博士延為太尉太尉之孫始為吳人曰然曰續亦載其跡先生之興公車是召纂序前聞于光有曜古聖人言其㫖密㣲箋注紛羅顛倒是非聞先生講論如客得歸卑讓肫肫出言孔揚今其死矣誰嗣為宗縣曰萬年原曰神禾高四尺者先生墓邪孫明復先生墓誌銘并序歐陽修先生諱復字明復姓孫氏晉州平陽人也少舉進士不中退居泰山之陽學春秋著尊王發㣲魯多學者其尤賢而有道者石介自介而下皆以弟子事之先生年逾四十家貧不娶李丞相迪將以其弟之女妻之先生疑焉介與羣弟子進曰公卿不下士乆矣今丞相不以先生貧賤而欲託以子是高先生之行義也先生宜因以成丞相之賢名於是乃許孔給事道輔為人剛直嚴重不妄與人聞先生之風就見之介執杖屨侍左右先生坐則立升降拜則扶之及其徃謝也亦然魯人既素高此兩人由是始識師弟子之禮莫不歎嗟之而李丞相孔給事亦以此見稱於士大夫其後介為學官語于朝曰先生非隠者也欲仕而未得其方也慶厯二年樞密副使范仲淹資政殿學士富弼言其道徳經術宜在朝廷召拜校書郎國子監直講嘗召見邇英閣説詩將以為侍講而嫉之者言其講説多異先儒遂止七年徐州人孔直温以狂謀捕治索其家得詩有先生姓名坐貶監䖍州商稅徙泗州又徙知河南府長水縣簽署應天府判官公事通判陵州翰林學士趙槩等十餘人上言孫某行為世法經為人師不宜棄之逺方乃復為國子監直講居三嵗以嘉祐二年七月二十四日以疾卒于家享年六十有六官至殿中丞先生在太學時為大理評事天子臨幸賜以緋衣銀魚及聞其喪惻然予其家錢十萬而公卿大夫朋友太學之諸生相與弔哭賻治其喪於是以其年十月二十七日𦵏先生于鄆州須城縣盧泉鄉之北扈原先生治春秋不惑傳註不為曲説以亂經其言簡易明於諸侯大夫功罪以考時之盛衰而推見王道之治亂得於經之本義為多方其病時樞密使韓琦言之天子選書吏給紙筆命其門人祖無擇就其家得其書十有五篇録之藏于秘閣先生一子大年尚幼銘曰聖既歿經更戰焚逃藏脱亂僅傳存衆説乘之汨其原怪迂百出雜偽真後生牽卑習前聞有欲患之寡攻羣徃徃止燎以膏薪有勇夫子闢浮雲刮磨蔽蝕相吐吞日月卒復光破昏博哉功利無窮垠有考其不在斯文徂徠石先生墓誌銘并序歐陽修徂徠先生姓石氏名介字守道兖州奉符人也徂徠魯東山而先生非隠者也其仕嘗位於朝矣魯之人不稱其官而稱其徳以為徂徠魯之望先生魯人之所尊故因其所居山以配其有徳之稱曰徂徠先生者魯人之志也先生貌厚而氣完學篤而志大雖在畎畝不忘天下之憂以謂時無不可為為之無不至不在其位則行其言吾言用功利施於天下不必出乎已吾言不用雖獲禍咎至死而不悔其遇事發憤作為文章極陳古今治亂成敗以指切當世賢愚善惡是是非非無所諱忌世俗頗駭其言由是謗議喧然而小人尤嫉惡之相與出力必擠之死先生安然不惑不變曰吾道固如是吾勇過孟軻矣不幸遇疾以卒既卒而奸人有欲以竒禍中傷大臣者猶指先生以起事謂其詐死而北走契丹矣請發棺以騐賴天子仁聖察其誣得不發棺而保全其妻子先生世為農家父諱丙始以仕進官至太常博士先生年二十六舉進士甲科為鄆州觀察推官南京留守推官御史臺辟主簿未至以上書論赦罷不召秩滿遷某軍節度掌書記代其父官于蜀為嘉州軍事判官丁内外艱去官垢面跣足躬耕徂徠之下𦵏其五世未𦵏者七十喪服除召入國子監直講是時兵討元昊乆無功海内重困天子奮然思欲振起威徳而進退二三大臣増置諫官御史所以求治之意甚鋭先生躍然喜曰此盛事也雅頌吾職其可已乎乃作慶厯聖徳詩以褒貶大臣分别邪正累數百言詩出太山孫明復曰子禍始於此矣明復先生之師友也其後所謂奸人作竒禍者乃詩之所斥也先生自閒居徂徠後官于南京常以經術教授及在太學益以師道自居門人弟子從之者甚衆太學之興自先生始其所為文章曰某集者若干巻曰某集者若干巻其斥佛老時文則有怪説中國論曰去此三者然後可以有為其戒奸臣宦女則有唐鑑曰吾非為一世監也其餘喜怒哀樂必見於文其辭博辯雄偉而憂思深逺其為言曰學者學為仁義也惟忠能忘其身信篤於自信者乃可以力行也以是行於己亦以是敎於人所謂堯舜禹湯文武周公孔子孟軻揚雄韓愈氏者未嘗一日不誦於口思與天下之士皆為周孔之徒以致其君為堯舜之君民為堯舜之民亦未嘗一日少忘于心至其違世驚衆人或笑之則曰吾非狂癡者也是以君子察其行而信其言推其用心而哀其志先生直講嵗餘杜祁公薦之天子拜太子中允今丞相韓公又薦之乃直集賢院又嵗餘始去太學通判濮州方待次于徂徠以慶厯五年七月某日卒于家享年四十有一友人廬陵歐陽修哭之以詩以謂待彼謗焰熄然後先生之道明矣先生既沒妻子凍餒不自勝今丞相韓公與河陽富公分俸買田以活之後二十一年其家始克𦵏先生于某所將𦵏其子師訥與其門人姜潛杜黙徐遁等來告曰謗焰熄矣可以發先生之光矣敢請銘某曰吾詩不云乎子道自能乆也何必吾銘遁等曰雖然魯人之欲也乃為之銘曰徂徠之巖巖與子之徳兮魯人之所瞻汶水之湯湯與子之道兮逾逺而彌長道之難行兮孔孟遑遑一世之屯兮萬世之光曰吾不有命兮安在夫桓魋與臧倉自古聖賢皆然兮噫子雖毁其何傷孔處士墓誌銘王安石先生諱旼字寜極睦州桐廬縣尉諱詢之曽孫贈國子博士諱延淊之孫尚書都官員外郎諱昭亮之子自都官而上至孔子四十五世先生嘗欲舉進士已而悔曰吾豈有不得已於此邪遂居於汝州之龍興山而上𦵏其親於汝汝人争訟之不可平者不聽有司而聽先生之一言不羞犯有司之刑而以不得於先生為恥慶厯七年詔求天下行義之士而守臣以先生應詔於是朝廷賜之米帛又勅州縣除其雜賦嘉祐三年近臣多言先生有道徳可用而執政度以為不肻屈除守秘書省校書郎致仕四年近臣又多以為言乃詔以為國子監直講先生辭乃除守光禄寺丞致仕五年大臣有請先生為其屬縣者於是天子以知汝州龍興縣事先生又辭辭未聽而六月某日先生終於家年六十七大臣有為之請命者乃特贈太常丞至七年月日弟㬙𦵏先生於堯山都官之兆而以夫人李氏祔李氏故大理評事昌符之女生一女嫁為士人妻而先物故先生事父母至孝居喪如禮遇人恂恂雖僕奴不忍以辭氣加焉衣食與田桑有餘輙以賙其鄉里貸而後不能償者未嘗問也未嘗疑人人亦以故不忍欺之而世之傳先生者多異學士大夫有知而能言者盖先生孝弟忠信無求于世足以使其鄉人畏服之如此而先生未嘗為異也先生博學尤喜易未嘗著書獨大衍一篇傳於世考其行治非有得於内其孰能致此耶當漢之東徙高守節之士而亦以故成俗故當世處士之聞獨多于後世乃至於今知名為賢而處者盖亦無有幾人豈世之所不尚遂湮沒而無聞抑士之趨操亦有待於世耶若先生固不為有待於世而卓然自見於時豈非所謂豪傑之士者哉其可銘也已銘曰有入而不出以身易物有徃而不反以私其佚嗚呼先生好潔而無尤匪佚之私維志之求臨川吳子善墓誌銘王安石臨川吳氏有子興宗字子善年二十喪母而其父以生事付之則先日出以作後日入以息日午矣家一人未飯其夫婦必尚空腹天寒矣家一人未纊其夫婦必尚單衣盖如此者二十年而終三十年而已死凡嫁五妹辦數喪又以其筋力之餘及於鄉黨茍有故必我勞人佚先徃後歸而尤篤於友愛見弟有過則顔色愈温須飲酒歡極之間乃㣲示以意既而即泣下曰吾親屬我以汝吾所以不避艱險者保汝而已其弟終感悟悔改為善士以文學名於世此待其弟乃爾若於它人則絶口不涉其非然里中少年聞其謦欬之音徃徃逃匿若匿不及則俛首恐愧而嘗有所絓一至訟庭及著械同絓數十人為之皆哭掌獄者驚起白守守立免焉其見畏愛多此類某謂其父為諸舅甚知其所為故於其弟子經孝宗之求誌以𦵏也為道而不辭子善嘗應進士舉後專於耕養遂不復應其死以治平四年八月九日而十二月十二日與其母黄氏共𦵏於靈源村父墓之域中父諱偃亦有行義用疾弗仕祖諱表㣲尚書屯田員外郎曽祖諱英殿中丞初妻姓王氏一男良弼皆前卒再娶楊氏生蕘适杜蕘始九嵗而四女幼者一嵗云云王深父墓誌銘王安石吾友深父書足以致其言言足以遂其志志欲以聖人之道為己任盖非至於命弗止也故不為小廉曲謹以投衆人耳目而取舍進退去就必度於仁義世皆稱其學問文章行治然真知其人者不多而多見謂迂闊不足趣時合變嗟乎是乃所以為深父也令深父而有以合乎彼則必無以同乎此矣嘗獨以謂天之生夫人也殆將以夀考成其才使有待而後顯以施澤於天下或者誘其言以明先王之道覺後世之民嗚呼孰以為道不任於天徳不酬於人而今死矣甚哉聖人君子之難知也以孟軻之聖而弟子所願止於管仲晏嬰况餘人乎至于揚雄尤當世之所賤簡其為門人者一侯芭而已芭稱雄書以為勝周易易不可勝也芭尚不為知雄者而人皆曰古之人生無所遇合至其歿乆而後世莫不知若軻雄者其歿皆過千嵗讀其書知其意者甚少則後世所謂知者未必真也夫此兩人以老而終幸能著書書具在然尚如此嗟乎深父其志雖能知軻其於為雄雖幾可以無悔然其志未就其書未具而既早死豈特無所遇於今又將無所傳於後天之生夫人也而命之如此盖非余所能知也深父諱囘本河南王氏其後自光州之固始遷福州之侯官為侯官人者三世曽祖諱某某官祖諱某某官考諱某尚書兵部員外郎兵部𦵏潁州之汝隂故今為汝隂人深父嘗以進士補亳州衛真縣主簿嵗餘自免去有勸之仕者輙辭以養母其卒以治平二年七月二十八日年四十三於是朝廷用薦者以為某軍節度推官知陳州南頓縣事書下而深父死矣夫人曽氏先若干日卒子男一人某女二人皆尚幼諸弟以某年某月某日𦵏深父某縣某鄉某里以曽氏祔銘曰嗚呼深父惟徳之仔肩以迪祖武厥艱荒遐力必踐取莫吾知庸亦莫吾侮神則尚反歸形此土栁子厚墓誌銘韓愈子厚諱宗元七世祖慶為拓跋魏侍中封濟隂公曽伯祖奭為唐宰相與禇遂良韓瑗俱得罪武后死髙宗朝皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所與游皆當世名人子厚少精敏無不通達逮其父時雖少年已自成人能取進士第嶄然見頭角衆謂栁氏有子矣其後以博學宏詞授集賢殿正字㒞傑㢘悍議論證據今古出入經史百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部員外郎遇用事者得罪例出為刺史未至又例貶州司馬居閒益自刻苦務記覽為詞章汎濫停蓄為深博無涯涘而自肆於山水間元和中嘗例召至京師又偕出為刺史而子厚得栁州既至歎曰是豈不足為政耶因其土俗為設教禁州人順賴其俗以男女質錢約不時贖子本相侔則沒為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一嵗免而歸者且千人衡湘以南為進士者悉以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱徃理請於朝將拜疏願以栁易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕悦酒食游戲相徴逐詡詡彊笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸盜賊所不忍為而其人自視以為得計聞子厚之風亦可以少媿矣子厚前時少年勇於為人不自貴重顧藉謂功業可立就故坐廢退既退又無相知有氣力得位者推挽故卒死于窮裔材不為世用道不行於時也使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不乆窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辯之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸𦵏萬年先人墓側子厚有子男二人長曰周六始四嵗季曰周七子厚卒乃生女子二人皆幼其得歸𦵏也費皆出觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚亦為之盡竟賴其力𦵏子厚於萬年之墓者舅弟盧遵遵涿人性謹順學問不厭自子厚之斥遵從而家焉逮其死不去既徃葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人南陽樊紹述墓誌銘韓愈樊紹述既卒且𦵏愈將銘之從其家求書得書號魁紀公者三十巻曰樊子者又三十巻春秋集傳十五巻表牋䇿狀書序傳記紀誌説論今文讚銘凡二百九十一篇道路所遇及器物門里雜銘二百二十賦十詩七百一十九曰多矣哉古未嘗有也然而必出於己不襲蹈前人一言一句又何其難也必出入仁義其富若生蓄萬物必具海含地負放恣横從無所統紀然而不煩於繩削而自合也嗚呼紹述於斯術其可謂至於斯極者矣生而其家貴富長而不有其藏一錢妻子告不足顧且笑曰我道盖是也皆應曰然無不意滿嘗以金部郎中告哀南方還言某師不治罷之以此出為綿州刺史一年徴拜左司郎中又出刺絳州綿絳之人至今皆曰于我有徳以為諫議大夫命且下遂病以卒年若干紹述諱宗師父諱澤嘗帥襄陽江陵官至右僕射贈某官祖某官諱泳自祖及紹述三世皆以軍謀堪將帥䇿上第以進紹述無所不學於辭於聲天得也在衆若無能者嘗與觀樂問曰何如曰後當然已而果然銘曰惟古於詞必已出降而不能乃剽賊後皆指前公相襲從漢迄今用一律寥寥乆哉莫覺屬神徂聖伏道絶塞既極乃通發紹述文從字順各識職有欲求之此其躅李元賔墓誌銘韓愈李觀字元賔其先隴西人也始來自江之東年二十四舉進士三年登上第又舉博學宏辭得太子校書一年年二十九客死于京師既斂之三日友人博陵崔𢎞禮𦵏之于國東門之外七里鄉曰慶義原曰嵩原友人韓愈書石以誌之辭曰已虖元賔夀也者吾不知其所慕夭也者吾不知其所惡生而不淑誰謂其夀死而不朽誰謂之夭已虖元賔才高乎當世而行出乎古人已虖元賔竟何為哉竟何為哉覃季子墓誌銘栁宗元覃季子其人生愛書貧甚尤介特不茍受施讀經傳言其説數家推太史公班固書下到今横竪鉤貫又且數十家通為書號覃子史纂又取鬻老管莊子思晏孟下到今其術自儒墨名法至於狗彘草木凡有益於世者為子纂又百有若干家篤於聞不以仕為事黜陟使取其書以氏名聞除太子校書某年月日死永州祁陽縣某鄉將死歎曰寜有聞而窮乎將無聞而豐乎寜介而躓乎將溷而遂乎𦵏其鄉後若千年栁先生來永州戚其文不大於世求其墓以石銘銘曰困其獨豐其辱故霸州文安縣主簿蘇君墓誌銘并序歐陽修有蜀君子曰蘇君諱洵字明允眉州眉山人也君之行義修於家信於鄉里聞於蜀之人乆矣當至和嘉祐之間與其二子軾轍偕至京師翰林學士歐陽修得其所著書二十二篇獻諸朝書既出而公卿士大夫爭傳之其二子舉進士皆在高等亦以文學稱於時眉山在西南數千里外一日父子隠然名動京師而蘇氏文章遂擅天下君之文博辯宏偉讀者悚然想見其人既見而温温似不能言及即之與居愈乆而愈可愛間而出其所有愈叩而愈無窮嗚呼可謂純明篤實之君子也曽祖諱祐祖諱杲父諱序贈尚書職方員外郎三世皆不顯職方君三子曰澹曰渙皆以文學舉進士而君少獨不喜學年已壯猶不知書職方君縱而不問鄉閭親族皆怪之或問其故職方君笑而不答君亦自如也年二十七始大發憤謝其素所徃來少年閉戸讀書為文辭嵗餘舉進士再不中又舉茂材異等不中退而歎曰此不足為吾學也悉取所為文數百篇焚之益閉戸讀書絶筆不為文辭者五六年乃大究六經百家之説以考質古今治亂成敗聖賢窮達出處之際得其粹精涵蓄充溢抑而不發乆之慨然曰可矣由是下筆頃刻數千言其縱横上下出入馳驟必造於深㣲而後止盖其禀也厚故發之遲志也慤故得之精自來京師一時後生學者皆尊其賢學其文以為師法以其父子俱知名故號老蘇以别之初修為上其書召試紫㣲閣辭不至遂除試秘書省校書郎㑹太常修纂建隆以來禮書乃以為霸州文安縣主簿使食其禄與陳州項城縣令姚闢同修禮書為太常因革禮一百巻書成方奏未報而君以疾卒實治平三年四月戊申也享年五十有八天子聞而哀之特贈光禄寺丞勅有司具舟載其喪歸于蜀君娶程氏大理寺丞文應之女生三子曰景先早卒軾今為殿中丞直史館轍權大名府推官三女皆早卒孫曰邁曰遲有文集二十巻諡法三巻君善與人交急人患難死則䘏養其孤鄉人多徳之盖晚而好易曰易之道深矣汨而不明者諸儒以附㑹之説亂之也去之則聖人之㫖見矣作易傳未成而卒治平四年十月壬申𦵏于彭山之安鎮鄉可龍里君生于逺方而學又晚成常歎曰知我者惟吾父與歐陽公也然則非余誰宜銘銘曰蘇顯唐世實欒城人以宦留眉蕃蕃子孫自其高曽鄉里稱仁偉歟明允大發於文亦既有文而又有子其存不朽其嗣彌昌嗚呼明允可謂不亡湖州長史蘇君墓誌銘歐陽修故湖州長史蘇君有賢妻杜氏自君之喪布衣蔬食居數嵗提君之孤子歛其平生文章走南京號泣于其父曰吾夫屈於生猶可伸於死其父太子太師以告於予予為集次其文而序之以著君之大節與其所以屈伸得失以深誚世之君子當為國家樂育賢材者且悲君之不幸其妻卜以嘉祐元年十月某日𦵏君于潤州丹徒縣義里鄉檀山里石門村又號泣于其父曰吾夫屈於人間猶可伸於地下於是杜公及君之子泌皆以書來乞銘以𦵏君諱舜欽字子美其上世居蜀後徙開封為開封人自君之祖諱易簡以文章有名太宗時承㫖翰林為學士參知政事官至禮部侍郎父諱耆官至工部郎中直集賢院君少以父䕃補太廟齋郎調滎陽尉非所好也已而鎻其㕔去舉進士中第改光禄寺主簿知䝉城縣丁父憂服除知長垣縣遷大理評事監在京樓店務君狀貌竒偉慷慨有大志少好古工為文章所至皆有善政官于京師位雖卑數上疏論朝廷大事敢道人之所難言范文正公薦君召試得集賢校理自元昊反兵出無功而天下殆於乆安尤困兵事天子奮然用三四大臣欲盡革衆弊以紓民于是時范文正公與今富丞相多所設施而小人不便顧人主方信用思有以撼動未得其根以君文正公之所薦而宰相杜公婿也乃以事中君坐監進奏院祠神奏用市故紙錢㑹客為自盜除名君名重天下所㑹客皆一時賢俊悉坐貶逐然後中君者喜曰吾一舉網盡之矣其後三四大臣繼罷去天下事卒不復施為君㩦妻子居蘇州買水石作滄浪亭日益讀書大涵肆於六經而時發其憤悶於歌詩至其所激徃徃驚絶又喜行狎書皆可愛故其雖短章醉墨落筆爭為人所傳天下之士聞其名而慕見其所傳而喜徃揖其貌而竦聽其論而驚以服乆與其居而不能捨以去也居數年復得湖州長史慶厯八年十二月某日以疾卒于蘇州享年四十有一君先娶鄭氏後娶杜氏三子長曰泌將作監主簿次曰液曰激二女長適前進士陳紘次尚幼初君得罪時以奏用錢為盗無敢辨其寃者自君卒後天子感悟凡所被逐之臣復召用皆顯列于朝而至今無復為君言者宜其欲求伸於地下也宜予述其得罪以死之詳而使後世知其有以也既又長言以為之辭庶幾并寫予之所以哀君者其辭曰謂為無力兮孰擊而去之謂為有力兮胡不反子之歸豈彼能兮此不為善百譽而不進兮一毁落世以顛擠荒孰問兮杳難知嗟子之中兮有韞而無施文章發耀兮星日光輝雖㝠㝠以掩恨兮不昭昭其永垂尹師魯墓誌銘歐陽修師魯河南人姓尹氏諱洙然天下之士識與不識皆稱之曰師魯盖其名重當世而世之知師魯者或推其文學或高其議論或多其材能至其忠義之節處窮逹臨禍福無愧于古君子則天下之稱師魯者未必盡知之師魯為文章簡而有法博學彊記通知今古長於春秋其與人言是是非非務窮盡道理乃已不為茍止而妄隨而人亦罕能過也遇事無難易而勇於敢為其所以見稱於世者亦所以取嫉於人故其卒窮以死師魯少舉進士及第為絳州正平縣主簿河南府戸曹叅軍邵武軍判官舉書判拔萃遷山南東道掌書記知伊陽縣王文康公薦其才召試充館閣校勘遷太子中允天章閣待制范公貶饒州諫官御史不肻言師魯上書言仲淹臣之師友願得俱貶貶監郢州酒税又徙唐州遭父䘮服除復得太子中允知河南縣趙元昊反陜西用兵大將葛懐敏奏起為經畧判官思魯雖用懐敏辟而尤為經畧使韓公所深知其後諸將敗於好水韓公降知秦州師魯亦徙通判濠州乆之韓公奏得通判秦州遷知涇州又知渭州兼涇原路經畧部署坐城水洛與邊臣異議徙知晉州又知潞州為政有惠愛潞州人至今思之累遷官至起居舍人直龍圖閣師魯當天下無事時獨喜論兵為叙燕息戍二篇行于世自西兵起凡五六嵗未嘗不在其間故其論議益精密而於西事尤習其詳其為兵制之説述戰守勝敗之要盡當今之利害又欲訓土兵代戍卒以减邊用為禦戎長乆之䇿皆未及施為而元昊臣西兵解嚴師魯亦去而得罪矣然則天下之稱師魯者於其材能亦未必盡知之也初師魯在渭州將吏有違其節度者欲按軍法斬之而不果其後吏至京師上書訟師魯以公使錢貸部將貶崇信軍節度副使徙監均州酒税得疾無醫藥舁至南陽求醫疾革隠几而坐顧稚子在前無甚憐之色與賔客言終不及其私享年四十有六以卒師魯娶張氏某縣君有兄源字子漸亦以文學知名前一嵗卒師魯凡十年間三貶官喪其父又喪其兄有子四人連喪其三女一適人亦卒而其身終以貶死一子三嵗四女未嫁家無餘貲客其喪于南陽不能歸平生故人無逺邇皆徃賻之然後妻子得以其柩歸河南以某年某月某日𦵏于先塋之次余與師魯兄弟交嘗銘其父之墓矣故不復次其世家焉銘曰藏之深固之密石可朽銘不滅梅聖俞墓誌銘并序歐陽修嘉祐五年京師大疫四月乙亥聖俞得疾臥城東汴陽坊明日朝之賢士大夫徃問疾者騶呼屬路不絶城東之人市者廢行者不得徃來咸驚顧相語曰兹坊所居大人誰邪何致客之多也居八日癸未聖俞卒於是賢士大夫又走弔哭如前日益多而其尤親且舊者相與聚而謀其後事自丞相以下皆有以賻䘏其家粤六月甲申其孤増載其柩南歸以明年正月丁丑𦵏于某所聖俞字也其名堯臣姓梅氏宣州宣城人也自其家世頗能詩而從父詢以仕顯至聖俞遂以詩聞自武夫貴戚童兒野叟皆能道其名字雖妄愚人不能知詩義者直曰此世所貴也吾能得之用以自矜故求者日踵門而聖俞詩遂行天下其初喜為清麗閒肆平淡乆則涵演深逺間亦琢刻以出怪巧然氣完力餘益老以勁其應于人者多故辭非一體至于它文章皆可喜非如唐諸子號詩人者僻固而狹陋也聖俞為人仁厚樂易未嘗忤於物至其窮愁感憤有所罵譏笑謔一發於詩然用以為驩而不怨懟可謂君子者也初在河南王文康公見其文歎曰二百年無此作矣其後大臣屢薦宜在館閣嘗一召試賜進士出身餘輙不報嘉祐元年翰林學士趙槩等十餘人列言于朝曰梅某經行修明願得留與國子諸生講論道徳作為雅頌以謌詠聖化乃得國子監直講三年冬祫于太廟御史中丞韓絳言天子且親祠當更制樂章以薦祖考惟梅某為宜亦不報聖俞初以從父䕃補太廟齋郎歴桐城河南河陽三縣主簿以徳興縣令知建徳縣又知襄城縣監湖州鹽税簽署忠武鎮安兩軍節度判官監永濟倉國子監直講累官至尚書都官員外郎嘗奏其所撰唐載二十六巻多補正舊史闕繆乃命編修唐書書成未奏而卒享年五十有九曽祖諱逺祖諱邈皆不仕父諱讓太子中舍致仕贈職方郎中母曰仙遊縣太君束氏又曰清河縣太君張氏初娶謝氏封南陽縣君再娶刁氏封某縣君子男五人曰増曰墀曰坰曰龜兒一早卒女二人長適太廟齋郎薛通次尚幼聖俞學長於毛氏詩為小傳二十巻其文集四十巻注孫子十三篇余嘗論其詩曰世謂詩人少達而多窮盖非詩能窮人殆窮者而後工也聖俞以為知言銘曰不戚其窮不困其鳴不躓于艱不履于傾養其和平以發厥聲震越渾鍠衆聽以驚以揚其清以播其英以成其名以告諸㝠馬氏女雷五𦵏誌栁宗元馬室女雷五父曰師儒業進士雷五生巧慧異甚凡事絲纊文繡不類人所為者余覩之甚駭家貧嵗不易衣而天姿潔清修嚴恒若簪珠璣衣紈縠寥然不易為塵垢雜年十五病死後二日𦵏永州東郭東里以其姨母為妓於余也將死曰吾聞栁公嘗巧我惠我今不幸死矣安得公之文志我𦵏其父母不敢以云𦵏之日余乃聞焉既而閔焉以攻石之後也遂為砂書𤣥塼追而納諸墓馬少監墓誌銘韓愈君諱繼祖司徒贈太師北平莊武王之孫少府監贈太子少傅諱暢之子生四嵗以門功拜太子舍人積三十四年五轉而至殿中少監年三十七以卒有男八人女二人始余初冠應進士貢在京師窮不自存以故人稚弟拜北平王於馬前王問而憐之因得見於安邑里第王軫其寒饑賜食與衣召二子使為之主其季遇我特厚少府監贈太子少傅者也姆抱幼子立側眉眼如畫髪漆墨肌肉玉雪可念殿中君也當是時見王於北亭猶高山深林鉅谷龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子娟好静秀瑤環瑜珥蘭茁其芽稱其家兒也後四五年吾成進士去而東游哭北平王於客舍後十五六年吾為尚書都官郎分司東都而分府少傅卒哭之又十餘年至今哭少監焉嗚呼吾未耄老自始至今未四十年而哭其祖子孫三世于人世何如也人欲乆不死而觀居此世者何也張子野墓誌銘歐陽修吾友張子野既亡之二年其弟充以書來請曰吾兄之喪將以今年三月某日𦵏于開封不可以不銘銘之莫如子宜嗚呼予雖不能銘然樂道天下之善以傳焉况若吾子野者非獨其善可銘又有平生之舊朋友之恩與其可哀者皆宜見于予文宜其來請於予也初天聖九年予為西京留守推官是時陳郡謝希深南陽張堯夫與吾子野尚皆無恙於時一府之士皆魁傑賢豪日相徃來飲酒歌呼上下角逐爭相先後以為笑樂而堯夫子野退然其間不動聲氣衆皆指為長者予時尚少心壯志得以為洛陽東西之衝賢豪所聚者多為適然耳其後去洛來京師南走夷陵並江漢其行萬三四千里山砠水厓窮居獨遊思從曩人邈不可得然雖洛人至今皆以謂無如嚮時之盛然後知世之賢豪不常聚而交游之難得為可惜也初在洛時已哭堯夫而銘之其後六年又哭希深而銘之今又哭吾子野而銘於是又知非徒相得之難而善人君子欲使幸而乆在於世亦不可得嗚呼可哀也已子野之世曰贈太子太師諱某曽祖也宣徽北院使樞密副使累贈尚書令諱遜皇祖也尚書比部郎中諱敏中皇考也曽祖妣李氏隴西郡夫人祖妣宋氏昭應郡夫人孝章皇后之妹也妣李氏永安縣太君子野家聫后姻世乆貴仕而被服操履甚於寒儒好學自力善筆札天聖二年舉進士歴漢陽軍司理叅軍開封府咸平主簿河南法曹參軍王文康公錢思公謝希深與今參知政事宋公咸薦其能改著作佐郎監鄭州酒税知閬州閬中縣就拜秘書丞秩滿知亳州鹿邑縣寳元二年二月丁未以疾卒于官享年四十有八子伸郊社掌坐次從次幼未名女五人一適人矣妻劉氏長安縣君子野為人外雖愉怡中自刻苦遇人渾渾不見圭角而志守端直臨事敢決平居酒半脱冠垂頭童然秃且白矣予固已悲其早衰而遂止於此豈其中亦有不自得者邪子野諱先其上世博州高堂人自曽祖已來家京師而𦵏開封今為開封人也銘曰嗟夫子野質厚材良孰屯其亨孰短其長豈其中有不自得而外物有以戕開封之原新里之鄉三世于此其歸其藏廣平郡太君張氏墓誌銘并序歐陽修故右諫議大夫集賢院學士贈禮部尚書虢畧楊氏之夫人曰廣平郡太君張氏其先青州人後徙為開封人也楊公諱大雅以文行知名於時號有清節夫人佐公以勤儉治其家教子弟和宗族皆有法公以明道元年四月某日薨後二十有四年至和二年六月某日夫人以疾卒于高郵以嘉祐元年十二月某日𦵏于杭州錢塘縣履泰鄉湖西村靈隠山祖塋之西夫人曽祖嗣當五代之亂不顯祖平舉三禮太宗皇帝為晉王署平押衙為人剛果有智謀以此尤見親信官至三司鹽鐡使父從古莊宅副使景徳中以殿直從李繼隆軍擊契丹繼隆戰敗從古入見陳繼隆所以敗之狀其言甚辯稱㫖㑹宜州蠻叛乃以從古為供奉官守宜州從古招降叛蠻秩滿罷去以内殿崇班馮勵代之蠻復叛攻宜州斬勵而去告邊吏曰得張侯守宜州我則聽命即復遣從古守宜州凡七年蠻無事徙知澧州而宜州人陳進反攻嶺南驛召從古以為巡撫副使與賊戰象州斬首萬餘級已破進留宜州以疾卒宜人為立廟于州北韓婆嶺慶厯中蠻賊區希範攻宜桂轉運使杜杞禱兵于廟下更其名曰制勝嶺至今宜人祠之盖楊氏自漢以來世有令譽迨公千餘嵗常有顯人而張氏威烈信于一方楊氏以徳張氏以功合二族之美而夫人為淑女為賢婦母享年六十以夀終公先娶漳南縣君張氏生子二人曰洎虞部員外郎曰濬殿中丞女三人長適國子博士袁成師次大理寺丞李嚴次殿中丞温嗣良夫人生子男四人曰泳大理寺丞曰漸奉禮郎曰沆太子中舍曰渢衛尉寺丞有女一人歸于修女之適李氏者今封武原縣太君餘女及濬泳漸皆先夫人而亡孫男十四人嗚呼惟徳與功與賢法皆宜銘銘曰有邑清河遂開其邦又徙南陽皆以夫榮後用子封京兆廣平宜其夫子有淑其聲子孫之思考徳有銘南陽縣君謝氏墓誌銘歐陽修慶厯四年秋予友宛陵梅聖俞來自吳興出其哭内之詩而悲曰吾妻謝氏亡矣丐我以銘而𦵏焉予未暇作居一嵗中書七八至未嘗不以謝氏銘為言且曰吾妻故太子賔客諱濤之女希深之妹也希深父子為時聞人而世顯榮謝氏生於盛族年二十以歸吾凡十七年而卒卒之夕歛以嫁時之衣甚矣吾貧可知也然謝氏怡然處之治其家有常法其飲食器皿雖不及豐侈而必精以㫖其衣無故新而澣濯縫紉必潔以完所至官舍雖庳陋而庭宇灑掃必肅以嚴其居平語言容止必怡以和吾窮於世乆矣其出而幸與賢士大夫遊而樂入則見吾妻之怡怡而忘其憂使吾不以富貴貧賤累其心者抑吾妻之助也吾嘗與士大夫語謝氏多從戸屏竊聽之間則盡能商㩁其人才能賢否及時事之得失皆有條理吾官吳興或自外醉而歸必問曰今日孰與飲而樂乎聞其賢者也則悦否則歎曰君所交皆一時賢㒞豈其屈己下之耶惟以道徳焉故合者尤寡今與是人飲而歡邪是嵗南方旱仰見飛蝗而歎曰今西兵未解天下重困盗賊暴起於江淮而天旱且蝗如此我為婦人死而得君𦵏我幸矣其所以能安居貧而不困者其性識明而知道理多此類嗚呼其生也迫吾之貧而沒也又無以厚焉謂惟文字可以著其不朽且其平生尤知文章謂可貴歿而得此庶幾以慰其䰟且塞予悲此吾所以請銘於子之勤也若此予忍不銘夫人享年三十七用夫恩封南陽縣君一男一女以某年七月七日卒于高郵梅氏世𦵏宛陵以貧不能歸也某年某月某日𦵏于潤州之某縣某原銘曰高崖斷谷兮京口之原山蒼水深兮土厚而堅居之可樂兮卜者曰然骨肉雖土兮䰟氣則天何必故鄉兮然後為安北海郡君王氏墓誌銘歐陽修太常丞致仕吳君之夫人曰北海郡君王氏濰州北海人也皇考諱汀舉明經不中後為本州助教夫人年二十三歸于吳氏天聖元年六月二日以疾卒享年三十有七夫人為人孝順儉勤自其幼時凡於女事其保傅皆曰教而不勞組紃織絍其諸女皆曰巧莫可及其歸於吳氏也其母曰自吾女適人吾之内事無所助而吳氏之姑曰自吾得此婦吾之内事不失時及其卒也太常君曰舉吾里中有賢女者莫如王氏於是娶其女弟以為繼室而今夫人戒其家曰凡吾吳氏之内事惟吾女兄之法是守至今而不敢失夫人有賢子曰奎字長文初舉明經為殿中丞後舉賢良方正直言極諫今為翰林學士尚書兵部員外郎知制誥夫人初用子恩追封福夀縣君其後長文貴顯以夫人為請天子曰近臣吾所寵也有請其可不從乃特追封夫人為北海郡君長文號泣頓首曰臣奎不幸竊享厚禄不得及其母而天子寵臣以此俾以報其親臣奎其何以報當是時朝廷之士大夫吳氏之鄉黨隣里皆咨嗟歎息曰吳氏有子矣嘉祐四年冬長文請告于朝將以明年正月丁酉𦵏夫人于鄆州之魚山夫人生三男曰奎奄胃今夫人生一男曰參女三人孫男女九人曽孫女二人銘曰奎顯矣奄早亡胃與參仕方強以一子榮一鄉生雖不及歿有光孫曽多有後愈昌文編巻六十二

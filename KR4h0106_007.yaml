body:
  text: 文編卷七明唐順之編韓安國王恢議擊胸奴漢書大行王恢燕人數為邊吏習胡事議曰漢與胸奴和親率不過數嵗即復背約不如勿許舉兵擊之安國曰千里而戰兵不獲利今胸奴負戎馬足懷鳥獸心遷徙烏集難得而制得其地不足為廣有其衆不足為強自上古弗屬漢數千里爭利則人馬罷虜以全制其敝藝必危殆臣故以為不如和親羣臣議多附安國于是上許和親明年雁門馬邑豪聶一因大行王恢言胸奴初和親親信邊可誘以利致之伏兵襲擊必破之道也上乃召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盜亡已邊境數驚朕甚閔之今欲舉兵攻之何如大行恢對曰陛下雖未言臣固願效之臣聞前代之時北有強胡之敵內連中國之兵然尚得養老長幼種樹以時倉廪常實胸奴不輕侵也今以陛下之威海內為一天下同任又遣子弟乘邊守塞轉粟挽輸以為之備然胸奴侵盜不已者亡他以不恐之故耳臣竊以為擊之便御史大夫安國曰不然臣聞髙皇帝嘗圍於平城胸奴至者投鞍髙如城者數所平城之飢七日不食天下歌之及解圍反位而亡忿怒之心夫聖人以天下為度者也不以己私怒傷天下之公故乃遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又嘗一擁天下之精兵聚之廣武常溪然終亡尺寸之功而天下黔首亡不憂者孝文寤於兵之不可宿故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂非故相反也各因時宜也且髙帝身被堅執鋭蒙霧露沐霜雪行幾十年所以不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒傷死中國槥車相望此仁人之所隱也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也且自三代之盛夷狄不與正朔服色非威不能制強弗能服也以為逺方絶地不牧之民不足煩中國也且胸奴輕疾悍亟之兵也至如炎風去如收電畜牧為業弧弓射獵逐獸隨草居處亡常難得而制今使邊郡久廢耕織以支胡之常事其藝不相權也臣故曰勿擊便恢曰不然臣聞鳯鳥乘于風聖人因於時昔秦穆公都雍地方三百里知時宜之變攻取西戎辟地千里并國十四隴西北地是也及後蒙恬為秦侵胡辟數千里以河為境纍石為城樹榆為塞胸奴不敢飲馬於河置烽燧然後敢牧馬夫胸奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻胸奴譬猶以強弩射且潰之癰也必不留行矣若是則北發月氏可得而臣也臣故曰擊之便安國曰不然臣聞用兵者以飽待飢正治以待其亂定舍以待其勞故接兵覆衆伐國墮城常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽強弩之末力不能入魯縞夫盛之有衰猶朝之必莫也今將卷甲輕舉深入長驅難以為功從行則迫脅衡行則中絶疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也意者有他繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂今臣言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士陰伏而處以為之備審遮險阻以為其戒吾藝已定或營其左或營其右或當其前或絶其後單于可禽百全必取上曰善乃從恢議蕭望之入粟贖罪議漢書民函陰陽之氣有仁義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不慎也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不一也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅政教一傾雖有周召之佐恐不能復古者臧於民不足則取有餘則與詩曰爰及矜人哀此鰥寡上惠下也又曰雨我公田遂及我私下急上也今有西邊之役民失作業雖户賦口斂以贍其困乏古之通義百姓莫以為非以死救生恐未可也陛下布德施教教化既成堯舜亡以加也今議開利路以傷既成之化臣竊痛之侯應罷邊備議漢書周秦以來胸奴暴桀寇侵邊境漢興尤被其害臣聞北邊塞至遼東外有陰山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為寇是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞徼起亭隧築外城設屯戍以守之然後邊境得用少安幕北地平少草木多大沙胸奴來寇少所蔽隱從塞以南徑深山谷往來差難邊長老言胸奴失陰山之後過之未嘗不哭也如罷備塞戍卒示夷狄之大利不可一也今聖德廣被天覆胸奴胸奴得蒙全活之恩稽首來臣夫夷狄之情困則卑順強則驕逆天性然也前以罷外城省亭隧今裁足以候望通烽火而已古者安不忘危不可復罷二也中國有禮義之教刑罰之誅愚民猶尚犯禁又况單于能必其終不犯約哉三也自中國尚建關梁以制諸侯所以絶臣下之覬覦也設塞徼置屯戍非獨為胸奴而已亦為諸屬國降民本故胸奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背畔世世不絶今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多日聞胸奴中樂無奈候望急何然時有亡出塞者七也盜賊桀黠羣輩犯法如其窘迫亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落溪谷水門稍稍平之卒徒築治功費久逺不可勝計臣恐議者不深慮其終始欲以一切省繇戍十年之外百嵗之內卒有他變障塞破壞亭隧滅絶當更發屯繕治纍世之功不可卒復九也如罷戍卒省候望單于自以保塞守禦必深德漢請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長策也谷永受伊邪莫演降議漢書漢興胸奴數為邊害故設金爵之賞以待降者今單于詘體稱臣列為北藩遣使朝賀亡有二心漢家接之宜異於往時今既享單于聘貢之質而更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧德沮善令單于自疏不親邊吏或者設為反間欲因而生隙受之適合其策使得歸曲而直責此誠邊境安危之原師旅動靜之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便劉歆毁廟議漢書臣聞周室既衰四夷並侵獫狁最強於今胸奴是也至宣王而伐之詩人美而頌之曰薄伐獫狁至于太原又曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁荆蠻來威故稱中興及至幽王犬戎來伐殺幽王取宗器自是之後南夷與北夷交侵中國不絶如線春秋紀齊桓南伐楚北伐山戎孔子曰微管仲吾其被髮左衽矣是故棄桓之過而録其功以為伯首及漢興冒頓始強破東國禽月氏并其土地地廣兵強為中國害南越尉他總百粵自稱帝故中國雖平猶有四夷之患且亡寧嵗一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬衆近屯京師及四邊嵗發屯備敵其為患久矣非一世之漸也諸侯郡守連胸奴及百粵以為逆者非一人也胸奴所殺郡守郡尉略取人民不可勝數孝武皇帝愍中國罷勞亡安寧之時乃遣大將軍驃騎伏波樓船之屬南滅百粵起七郡北攘胸奴降昆邪十萬之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起玄菟樂浪以斷胸奴之左臂西伐大宛并三十六國結烏孫起敦煌酒泉張掖以鬲婼羌裂胸奴之右臂單于孤特逺遁於幕北四垂亡事斥地逺境起十餘郡功業既定乃封丞相為富民侯以大安天下富實百姓其規模可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永亡逆爭之心至今纍世賴之單于守藩百蠻服從萬世之基也中興之功未有髙焉者也髙帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發德音也禮記王制及春秋穀梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也茍有功德則宗之不可預為設數故於殷太甲為太宗太戊為中宗武丁曰髙宗周公為無逸之戒舉殷三宗以勸成王繇是言之宗亡數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂亡功德禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德皆兼而有焉凡在於異姓猶將特祀之况於先祖或説天子五廟亡見文又説中宗髙宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法亡殊功異德固以親疏相推及至祖宗之序多少之數經傳亡明文至尊至重難以疑文虛説定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覽其議而從之制曰太僕舜中壘校尉歆議可師丹為共皇立廟議漢書聖王制禮取法於天地故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而陰陽順其節人主與萬民俱蒙祐福尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊卑亡二上之義也定陶共皇號諡已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子亡爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母期明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀今共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝持重太宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟于京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也禘祫議韓愈伏以陛下追孝祖宗肅敬祀事凡在擬議不敢自専聿求厥中延訪羣下然而禮文繁漫所執各殊自建中之初迄至今嵗屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切效忠今輒先舉衆議之非然後申明其説一曰獻懿廟主宜永藏之夾室臣以為不可夫祫者合也毁廟之主皆當合食于太祖獻懿二祖即毁廟主也今雖藏于夾室至禘祫之時豈得不食于太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毁之瘞之臣又以為不可謹按禮記天子立七廟一壇一墠其毁廟之主皆藏于祧廟雖百代不毁祫則陳于太廟而饗焉自魏晉以降始有毁瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毁瘞而不禘祫乎三曰獻懿廟主宜各遷于其陵所臣又以為不可二祖之祭於京師列於太廟也二百年矣今一朝遷之豈惟人聽疑惑抑恐二祖之靈眷顧依遲不即饗于下國也四曰獻懿廟主宜附於興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖太祖其於屬乃獻懿之子孫也今欲正其子東向之位廢其父之大祭固不可為典矣五曰獻懿二祖宜别立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而之逺其祭益稀昔者魯立煬宫春秋非之以為不當取已毁之廟既藏之主而復築宫以祭今之所議與此正同又雖違禮立廟至于禘祫也合食則禘無其所廢祭則於義不通此五説者皆所不可故臣博采前聞求其折中以為殷祖玄王周祖后稷太祖之上皆自為帝又其代數已逺不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者蓋以紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎事異殷周禮從而變非失禮也臣伏以制禮作樂者天子之職也陛下以臣議有可采粗合天心斷而行之是則為禮如以為猶或可疑乞召臣對面陳得失庶有發明謹議復讐議韓愈右伏奉今月五日勑復讐據禮經則義不同天徵法令則殺人者死禮法二事皆王教之端有此異同必資論辨宜令都省集議聞奏者朝議郎行尚書職方員外郎上騎都尉韓愈議曰伏以子復父讐見於春秋見於禮記又見周官又見諸子史不可勝數未有非而罪之者也最宜詳於律而律亡其條非闕文也蓋以為不許復讐則傷孝子之心而乖先王之訓許復讐則人將倚法専殺亡以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深沒其文於律者其意將使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讐讐之則死義宜也明殺人而不得其宜者子得復讐也此百姓之相讐者也公羊傳曰父不受誅子復讐可也不受誅者罪不當誅也誅者上施于下之辭非百姓之相殺者也又周官曰凡報仇讐者書于士殺之亡罪言將復讐必先言于官則亡罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自専訪議羣下臣愚以為復讐之名雖同而其事各異或百姓相讐如周官所稱可議於今者或為官所誅如公羊所稱不可行于今者又周官所稱將復讐先告于士則亡罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言于官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡有復父讐者事發具其事申尚書省尚書省集議奏聞酌其宜而處之則經律亡失其指矣謹議駁復讐議柳宗元臣伏見天后時有同州下邽人徐元慶者父爽為縣尉趙師韞所殺卒能手刃父讐束身歸罪當時諫臣陳子昻建議誅之而旌其閭且請編之於令永為國典臣竊獨過之臣聞禮之大本以防亂也若曰無為賊虐凡為子者殺無赦刑之大本亦以防亂也若曰無為賊虐凡為治者殺無赦其本則合其用則異旌與誅莫得而並焉誅其可旌兹謂濫黷刑甚矣旌其可誅兹謂僣壞禮甚矣果以是示于天下傳于後代趨義者不知所向違害者不知所立以是為典可乎蓋聖人之制窮理以定賞罰本情以正褒貶統於一而已矣嚮使刺讞其誠偽考正其曲直原始而求其端則刑禮之用判然離矣何者若元慶之父不陷於公罪師韞之誅獨以其私怨奮其吏氣虐於非辜州牧不知罪刑官不知問上下蒙冒籲號不聞而元慶能以戴天為大恥枕戈為得禮處心積慮以衝讐人之胸介然自克即死無憾是守禮而行義也執事者宜有慙色將謝之不暇而又何誅焉其或元慶之父不免於罪師韞之誅不愆於法是非死於吏也是死於法也法其可讐乎讐天子之法而戕奉公之吏是悖驁而凌上也執而誅之所以正邦典而又何旌焉且其議曰人必有子子必有親親親相讐其亂誰救是惑於禮也甚矣禮之所謂讐者蓋以寃抑沉痛而號亡告也非謂抵罪觸法陷于大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已其非經背聖不亦甚哉周禮調人掌司萬人之讐凡殺人而義者令勿讐讐之則死有反殺者邦國交讐之又安得親親相讐也春秋公羊傳曰父不受誅子復讐可也父受誅子復讐此推刃之道復讐不除害今若取此以斷兩下相殺則合於禮矣且夫不忘讐孝也不愛死義也元慶能不越于禮服孝死義是必逹理而聞道者也夫逹理聞道之人豈其以王法為敵讐者哉議者反以為戮黷刑壞禮其不可以為典明矣請下臣議附于令有斷斯獄者不宜以前議從事謹議文編卷七

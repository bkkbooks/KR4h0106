body:
  text: 文編巻二十二明唐順之編秋水莊子秋水時至百川灌河涇流之大兩涘渚崖之間不辨牛馬於是焉河伯欣然自喜以天下之美為盡在巳順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以為莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我睹子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家北海若曰井鼃不可以語於海者拘於虛也夏蟲不可以語於氷者篤於時也曲士不可以語於道者束於教也今爾出於崖涘觀於大海乃知爾醜爾將可與語大理矣天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虚春秋不變水旱不知此其過江河之流不可為量數而吾未嘗以此自多者自以比形於天地而受氣於隂陽吾在於天地之間猶小石小木之在大山也方存乎見少又奚以自多計四海之在天地之間也不似礨空之在大澤乎計中國之在海内不似稊米之在太倉乎號物之數謂之萬人處一焉人卒九州穀食之所生舟車之所通人處一焉此其比萬物也不似毫末之在於馬體乎五帝之所連三王之所爭仁人之所憂任士之所勞盡此矣伯夷辭之以為名仲尼語之以為博此其自多也不似爾向之自多於水乎河伯曰然則吾大天地而小毫末可乎北海若曰否夫物量無窮時無止分無常終始無故是故大知觀於逺近故小而不寡大而不多知量無窮證曏今故故遙而不悶掇而不跂知時無止察乎盈虚故得而不喜失而不憂知分之無常也明乎坦塗故生而不說死而不禍知終始之不可故也計人之所知不若其所不知其生之時不若未生之時以其至小求窮其至大之域是故迷亂而不能自得也由此觀之又何以知毫末之足以定至細之倪又何以知天地之足以窮至大之域河伯曰世之議者皆曰至精無形至大不可圍是信情乎北海若曰夫自細視大者不盡自大視細者不明夫精小之㣲也垺大之殷也故異便此勢之有也夫精粗者期於有形者也無形者數之所不能分也不可圍者數之所不能窮也可以言論者物之粗也可以意致者物之精也言之所不能論意之所不能察致者不期精粗焉是故大人之行不出乎害人不多仁恩動不為利不賤門𨽻貨財弗爭不多辭讓事焉不借人不多食乎力不賤貪汙行殊乎俗不多辟異為在從衆不賤佞謟世之爵祿不足以為勸戮恥不足以為辱知是非之不可為分細大之不可為倪聞曰道人不聞至徳不得大人無已約分之至也河伯曰若物之外若物之内惡至而倪貴賤惡至而倪小大北海若曰以道觀之物無貴賤以物觀之自貴而相賤以俗觀之貴賤不在已以差觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之為稊米也知毫末之為丘山也則差數覩矣以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無知東西之相反而不可以相無則功分定矣以趣觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非知堯桀之自然而相非則趣操覩矣昔者堯舜讓而帝之噲讓而絶湯武爭而王白公爭而滅由此觀之爭讓之禮堯桀之行貴賤有時未可以為常也梁麗可以衝城而不可以窒宂言殊器也騏驥驊騮一日而馳千里捕䑕不如狸狌言殊技也鴟鵂夜撮蚤察毫末晝出瞋目而不見丘山言殊性也故曰葢師是而無非師治而無亂乎是未明天地之理萬物之情者也是猶師天而無地師隂而無陽其不可行明矣然且語而不舍非愚則誣也帝王殊禪三代殊繼差其時逆其俗者謂之簒夫當其時順其俗者謂之義之徒黙黙乎河伯女惡知貴賤之門小大之家河伯曰然則我何為乎何不為乎吾辭受趣舎吾終柰何北海若曰以道觀之何貴何賤是謂反衍無拘而志與道大蹇何少何多是謂謝施無一而行與道參差嚴乎若國之有君其無私徳繇繇乎若祭之有社其無私福泛泛乎其若四方之無窮其無所畛域兼懐萬物其孰承翼是謂無方萬物一齊孰短孰長道無終始物有死生不恃其成一虚一滿不位乎其形年不可舉時不可止消息盈虚終則有始是所以語大義之方論萬物之理也物之生也若驟若馳無動而不變無時而不移何為乎何不為乎夫固將自化河伯曰然則何貴於道耶北海若曰知道者必達於理達於理者必明於權明於權者不以物害巳至徳者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊非謂其薄之也言察乎安危寧於禍福謹於去就莫之能害也故曰天在内人在外徳在乎天知天人之行本乎天位乎得蹢䠱而屈伸反要而語極曰何謂天何謂人北海若曰牛馬四足是謂天絡馬首穿牛鼻是謂人故曰無以人滅天無以故滅命無以得殉名謹守而勿失是謂反其真䕫憐蚿蚿憐蛇蛇憐風風憐目目憐心䕫謂蚿曰吾以一足趻踔而行予無如矣今子之使萬足獨柰何蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今予動吾天機而不知其所以然蚿謂蛇曰吾以衆足行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉蛇謂風曰予動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也風曰然予蓬蓬然起於北海而入於南海也然而指我則勝我鰌我亦勝我雖然夫折大木蜚大屋者唯我能也故以衆小不勝為大勝也為大勝者唯聖人能之孔子遊於匡宋人圍之數匝而絃歌不輟子路入見曰何夫子之娛也孔子曰來吾語女我諱窮久矣而不免命也求通久矣而不得時也當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也由處矣吾命有所制矣無幾何將甲者進辭曰以為陽虎也故圍之今非也請辭而退公孫龍問於魏牟曰龍少學先王之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮衆口之辨吾自以為至達已今吾聞莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隱機太息仰天而笑曰子獨不聞夫埳井之鼃乎謂東海之鱉曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接掖持頥蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跱塪井之樂此亦至矣夫子奚不時來入觀乎東海之鱉左足未入而右膝已縶矣於是逡廵而却告之海曰夫千里之逺不足以舉其大千仞之髙不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃久推移不以多少進退者此亦東海之大樂也於是埳井之鼃聞之適適然驚規規然自失也且夫知不知是非之竟而猶欲觀於莊子之言是猶使蚉負山商蚷馳河也必不勝任矣且夫知不知論極妙之言而自適一時之利者是非塪井之鼃與且彼方跐黄泉而登大皇無南無北奭然四解淪於不測無東無西始於𤣥冥反於大通子乃規規然而求之以察索之以辨是直用管闚天用錐指地也不亦小乎子徃矣且子獨不聞夫壽陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走莊子釣於濮水楚王使大夫二人徃先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千嵗矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎二大夫曰寧生而曵尾塗中莊子曰徃矣吾將曵尾於塗中恵子相梁莊子徃見之或謂恵子曰莊子來欲代子相於是恵子恐搜於國中三日三夜莊子徃見之曰南方有鳥其名鵷雛子知之乎夫鵷雛發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是鴟得腐䑕鵷雛過之仰而視之曰嚇今子欲以子之梁國而嚇我耶莊子與惠子遊於濠梁之上莊子曰鯈魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰女安知魚樂云者既已知吾知之而問我我知之濠上也難一韓非子晉文公將與楚人戰召舅犯問之曰吾將與楚人戰彼衆我寡為之柰何舅犯對曰臣聞之繁禮君子不厭忠信戰陣之間不厭詐偽君其詐之而已矣文公辭舅犯因召雍季而問之曰我將與楚人戰彼衆我寡為之柰何雍季對曰焚林而田偷取多獸後必無獸以詐遇民偷取一時後必無復文公曰善辭雍季以舅犯之謀與楚人戰以敗之歸而行爵先雍季而後舅犯羣臣曰城濮之事舅犯謀也夫用其言而後其身可乎文公曰此非君所知也夫舅犯言一時之權也雍季言萬世之利也仲尼聞之曰文公之霸也宜哉既知一時之權又知萬世之利或曰雍季之對不當文公之問凡對問者有因因小大緩急而對也所問髙大而對以卑狹則明主弗受也今文公問以少遇衆而對曰後必無復此非所以應也且文公不知一時之權又不知萬世之利戰而勝則國安而身定兵强而威立雖有後復莫大於此萬世之利奚患不至戰而不勝則國亡兵弱身死名息㧞拂今日之死不及安暇待萬世之利待萬世之利在今日之勝今日之勝在詐於敵詐敵萬世之利己故曰雍季之對不當文公之問且文公又不知舅犯之言舅犯所謂不厭詐偽者不謂詐其民謂詐其敵也敵者所伐之國也後雖無復何傷哉文公之所以先雍季者以其功耶則所以勝楚破軍者舅犯之謀也以其善言耶則雍季乃道其後之無復也此未有善言也舅犯則以兼之矣舅犯曰䌓禮君子不厭忠信者忠所以愛其下也信所以不欺其民也夫既以愛而不欺矣言孰善於此然必曰出於詐偽者軍旅之計也舅犯前有善言後有戰勝故舅犯有二功而後論雍季無一焉而先賞文公之霸也不亦宜乎仲尼不知善賞也管仲有病桓公徃問之曰仲父病不幸卒於大命將奚以告寡人管仲曰㣲君言臣故將謁之願君去竪刁除易牙逺衛公子開方易牙為君主味君主惟人肉未嘗易牙烝其首子而進之夫人情莫不愛其子今弗愛其子安能愛君君妬而好内竪刁自宫以治内人情莫不愛其身身且不愛安能愛君開方事君十五年齊衛之間不容數日行棄其母久官不歸其母不愛安能愛君臣聞之矜偽不長盖虛不久願君去此三子者也管仲卒死而桓公弗行及桓公死蟲出尸不葬或曰管仲所以見告桓公者非有度者之言也所以去竪刁易牙者以不愛其身適君之欲也曰不愛其身安能愛君然則臣有盡死力以為其主者管仲將不用也曰不愛其死安能愛君是君去忠臣也且以不愛其身度其不愛其君是將以管仲之不能死公子糾度其不死桓公也是管仲亦在所去之域矣明主之道不然設民所欲以求其功乃為爵祿以勸之設民所惡以禁其奸故為刑罰以威之慶賞信而刑罰必故君舉功於臣而姦不用於上雖有竪刁其柰君何且臣盡死力以與君市君垂爵禄以與臣市君臣之際非父子之親也計數之所出也君有道則臣盡力而姦不生無道則臣上塞主明而下成私管仲非明此度數於桓公也使去竪刁一竪刁又至非絶姦之道也且桓公所以身死蟲流尸不葬者是臣重也臣重之實擅主也有擅主之臣則君令不下究臣情不上通一人之力能隔君臣之間使善敗不聞禍福不通故有不葬之患也明主之道一人不兼官一官不兼事卑賤不待尊貴而進大臣不因左右而見百官修通羣臣輻凑有賞者君見其功有罰者君知其罪見知不悖於前賞罰不蔽於後安有不葬之患管仲非明此言於桓公也使去三子故曰管仲無度矣靡笄之役韓獻子將斬人郄獻子聞之駕徃救之比至則已斬之矣郄子因曰胡不以殉其僕曰曩不將救之乎郄子曰吾敢不分謗乎或曰郄子言不可不察也非分謗也韓子之所斬也若罪人則不可救救罪人法之所以敗也法敗則國亂若非罪人則勸之以殉勸之以殉是重不辜也重不辜民所以起怨者也民怨則國危郄子之言非危則亂不可不察也且韓子之所斬若罪人郄子奚分焉斬若非罪人則巳斬之矣而郄子乃至是韓子之謗已成而郄子且後至也夫郄子曰以殉不足以分斬人之謗而又生殉之謗是何言分謗也昔者紂為炮烙崇侯惡來又曰斬渉者之脛也奚分於紂之謗且民之望於上也甚矣韓子弗得且望郄子得之也今郄子俱弗得則民絶望於上矣故曰郄子之言非分謗也益謗也且郄子之徃救罪也以韓子為非也不道其所以為非而勸之以殉是使韓子不知其過也夫下使民望絶於上又使韓子不知其失吾未得郄子之所以分謗者也韓宣王問於樛留吾欲兩用公仲公叔其可乎樛留對曰昔魏兩用樓翟而亡西河楚兩用昭景而亡鄢郢今君兩用公仲公叔此必將爭事而外市則國必憂矣或曰昔者齊桓公兩用管仲鮑叔成湯兩用伊尹仲虺夫兩用臣者國之憂則是桓公不霸成湯不王也湣王一用淖齒而身死乎東廟主父一用李兊減食而死主有術兩用不為患無術兩用則爭爭事而外市一則專制而刼弑今留無術以規上使其主去兩用一是不有西河鄢郢之憂則必有身死減食之患是樛留未有善以知言也難二韓非子景公過晏子曰子宫小近市請徙子家豫章之圃晏子再拜而辭曰且嬰家貧待市食而朝暮趨之不可以逺景公笑曰子家習市識貴賤乎是時景公䌓於刑晏子對曰踊貴而屨賤景公曰何故對曰刑多也景公造然變色曰寡人其暴乎於是損刑五或曰晏子之貴踊非其誠也欲便辭以止多刑也此不察治之患也夫刑當無多不當無少無以不當聞而以太多説無術之患也敗軍之誅以千百數猶北不止即治亂之刑如恐不勝而姦尚不盡今晏子不察其當否而以太多為説不亦妄乎夫惜草茅者耗禾穗惠盗賊者傷良民今緩刑罰行寛惠是利姦邪而害善人也此非所以為治也齊桓公之時晉客至有司請禮桓公曰告仲父者三而優笑曰易哉為君一曰仲父二曰仲父桓公曰吾聞君人者勞於索人佚於使人吾得仲父巳難矣巳得仲父之後何為不易乎哉或曰桓公之所應優非君人者之言也桓公以君人為勞於索人何索人為勞哉伊尹自以為宰干湯百里奚自以為媵干穆公媵所辱也宰所羞也䝉羞辱而接君上賢者之憂世急也然則君人者無逆賢而已矣索賢不為人主難且官職所以任賢也爵祿所以賞功也設官職陳爵禄而士自至君人者奚其勞哉使人又非所佚也人主雖使人必以度量準之以刑名參之以事遇於法則行不遇於法則止功當其言則賞不當則誅以刑名收臣以度量準下此不可釋也君人者焉佚哉索人不勞使人不佚而桓公曰勞於索人佚於使人者不然且桓公索管仲又不難管仲不死其君而歸桓公鮑叔輕官讓能而任之桓公得管仲又不難明矣已得管仲之後奚遽易哉管仲非周公旦周公旦假為天子七年成王壯授之以政非為天下計也為其職也夫不奪幼子而行天下者必不背死君而事其讐倍死君而事其讐者必不難奪幼子而行天下不難奪幼子而行天下者必不難奪其君國矣管仲公子糾之臣也謀殺桓公而不能其君死而臣桓公管仲之取舍非周公旦未可知也若使管仲大賢也且為湯武湯武桀紂之臣也桀紂作亂湯武奪之今桓公以易居其上是以桀紂之行居湯武之上桓公危矣若使管仲不肖人也且為田常田常簡公之臣也而弑其君今桓公以易居其上是以簡公之易居田常之上也桓公又危矣管仲非周公旦亦明矣然為湯武與田常未可知也為湯武有桀紂之危為田常有簡公之亂也已得仲父之後桓公奚遽易哉若使桓公之任管仲必知不欺已也是知不欺主之臣也然雖不知不欺主之臣今桓公以任管仲之專任竪刁易牙蟲流出尸而不葬桓公不知臣欺主與不欺主已明矣而任臣如彼其專也故曰桓公闇主孤憤韓非子智術之士必逺見而明察不明察不能燭私能法之士必强毅而勁直不勁直不能矯姦人臣循令而從事按法而治官非謂重人也重人也者無令而擅為虧法以利私耗國以便家力能得其君此所謂重人也智術之士明察聽用且燭重人之隂情能法之士勁直聽用且矯重人之姦行故智術能法之士用則貴重之臣必在䋲之外矣是智法之士與當塗之人不可兩存之仇也當塗之人擅事要則外内為之用矣是以諸侯不因則事不應故敵國為之訟百官不因則業不進故羣臣為之用郎中不因則不得近主故左右為之匿學士不因則養祿薄禮卑故學士為之談也此四助者邪臣之所以自飾也重人不能忠主而進其仇人主不能越四助而燭察其臣故人主愈弊而大臣愈重凡當塗者之於主也希不信愛也又且習故若夫即主心同乎好惡固其所自進也官爵貴重朋黨又衆而一國為之訟則法術之士欲干上者非有所信愛之親習故之澤也又將以法術之言矯人主阿辟之心是與人主相反也處勢卑賤無黨孤特夫以踈逺與近愛信爭其數不勝也以新旅與習故爭其數不勝也以反主意與同好爭其數不勝也以輕賤與貴重爭其數不勝也以一口與一國爭其數不勝也法術之士操五不勝之勢以歳數而又不得見當塗之人乘五勝之資而旦暮獨説於前故法術之士奚道得進而人主奚時得悟乎故資必不勝而勢不兩存法術之士焉得不危其可以罪過誣者公法而誅之其不可被以罪過者以私劒而窮之是明法術而逆主上者不僇於吏誅必死於私劒矣朋黨比周以蔽主言曲以便私者必信於重人矣故其可以功伐借者以官爵貴之其不可借以美名者以外權重之是以蔽主上而趨於私門者不顯於官爵必重於外權矣今人主不合參驗而行誅不待見功而爵祿故法術之士安能䝉死亡而進其說姦邪之臣安肯乗利而退其身故主上愈卑私門益尊夫越雖國富兵强中國之主皆知無益於已也曰非吾所得制也今有國者雖地廣人衆然而人主壅蔽大臣專權是國為越也知不類越而不知不類其國不察其類者也人主所以謂齊亡者非地與城亡也吕氏弗制而田氏用之也所以謂晉亡者亦非地與城亡也姬氏弗制而六卿專之也今大臣執柄獨斷而上弗知收是人主不明也與死人同病者不可生也與亡國同事者不可存也今襲跡於齊晉欲國安存不可得也凡法術之難行也不獨萬乘千乘亦然人主之左右不必智也人主於人有所智而聽之因與左右論其言是與愚人論智也人主之左右不必賢也人主於人有所賢而禮之因與左右論其行是與不肖論賢也智者决䇿於愚人賢士程行於不肖則賢智之士羞而人主之論悖矣人臣之欲得官者其修士且以精潔固身其智士且以治辨進業其修士不能以貨賂事人恃其精潔而更不能以枉法為治則修智之士不事左右不聽請謁矣人主之左右行非伯夷也求索不得貨賂不至則精辨之功息而毁誣之言起矣治亂之功制於近習精潔之行决於毁譽則修智之吏廢人主之明塞矣不以功伐决智行不以參伍審罪過而聽左右近習之言則無能之士在廷而愚汙之吏處官矣萬乘之患大臣太重千乘之患左右太信此人主之所公患也且人臣有大罪人主有大失臣主之利與相異者也何以明之哉曰主利在有能者任官臣利在無能而得事主利在有勞而爵祿臣利在無功而富貴主利在豪傑使能臣利在朋黨用私是以國地削而私家富主上卑而大臣重故主失勢而臣得國主更稱蕃臣而相室剖符此人臣之所以譎主便私也故當世之重臣主變勢而得固寵者十無二三是其故何也人臣之罪大也臣有大罪者其行欺主也其罪當死亡也智士者逺見而畏於死亡必不從重人矣賢士者修㢘介羞與姦臣欺其主必不從重人矣是當塗者之徒屬非愚而不知患者必汙而不避姦者也大臣挾愚汙之人上與之欺主下與之收利侵漁朋黨比周相與一口惑主敗法以亂士民使國危削主上勞辱此大罪也臣有大罪而主弗禁此大失也使其主有大失於上臣有大罪於下索國之不亡者不可得也正論荀子世俗之為説者曰主道利周是不然主者民之唱也上者下之儀也彼將聽唱而應視儀而動唱嘿則民無應也儀隱則下無動也不應不動則上下無以相有也若是則與無上同也不祥莫大焉故上者下之本也上宣明則下治辨矣上端誠則下愿慤矣上公正則下易直矣治辨則易一愿慤則易使易直則易知易一則疆易使則功易知則明是治之所由生也上周宻則下疑眩矣上幽險則下漸詐矣上偏曲則下比周矣疑眩則難一漸詐則難使比周則難知難一則不疆難使則不功難知則不明是亂之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危故下安則貴上下危則賤上故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危故主道莫惡乎難知莫危乎使下畏已傳曰惡之者衆則危書曰克明明徳詩曰明明在下故先王明之豈特眩之耳哉世俗之為説者曰桀紂有天下湯武簒而奪之是不然以桀紂為常有天下之籍則然親有天下之籍則不然天下謂在桀紂則不然古者天子千官諸侯百官以是千官也令行於諸夏之國謂之王以是百官也令行於境内國雖不安不至於廢易遂亡謂之君聖王之子也有天下之後也勢籍之所在也天下之宗室也然而不材不中内則百姓疾之外則諸侯叛之近者境内不一遥者諸侯不聽令不行於境内甚者諸侯侵削之攻伐之若是則雖未亡吾謂之無天下矣聖王沒有勢籍者罷不足以縣天下天下無君諸侯有能徳明威積海内之民莫不願得以為君師然而暴國獨侈安能誅之必不傷害無罪之民誅暴國之君若誅獨夫若是則可謂能用天下矣能用天下之謂王湯武非取天下也修其道行其義興天下之同利除天下之同害而天下歸之也桀紂非去天下也反禹湯之徳亂禮義之分禽獸之行積其㓙全其惡而天下去之也天下歸之之謂王天下去之之謂亡故桀紂無天下而湯武不弑君由此効之也湯武者民之父母也桀紂者民之怨賊也今世俗之為説者以桀紂為君而以湯武為弑然則是誅民之父母而師民之怨賊也不祥莫大焉以天下合為君則天下未嘗合於桀紂也然則以湯武為弑則天下未嘗有説也直隳之耳故天子唯其人天下者至重也非至彊莫之能任至大也非至辨莫之能分至衆也非至明莫之能知此三至者非聖人莫之能盡故非聖人莫之能王聖人備道全美者也是縣天下之權稱也桀紂者其知慮至險也其志意至闇也其行之為至亂也親者䟽之賢者賤之生民怨之禹湯之後也而不得一人之與刳比干囚箕子身死國亡為天下之大戮後世之言惡者必稽焉是不容妻子之數也故至賢疇四海湯武是也至罷不容妻子桀紂是也今世俗之為説者以桀紂為有天下而臣湯武豈不過甚矣哉譬之是猶傴巫跂匡大自以為有知也故可以有奪人國不可有以奪人天下可以有竊國不可以有竊天下也可以奪之者可以有國而不可以有天下竊可以得國而不可以得天下是何也曰國小具也可以小人有也可以小道得也可以小力持也天下者大具也不可以小人有也不可以小道得也不可以小力持也國者小人可以有之然而未必不亡也天下者至大也非聖人莫之能有也世俗之為説者曰治古無肉刑而有象刑墨黥慅嬰共艾畢菲䋽屨殺赭衣而不純治古如是是不然以為治耶則人固莫觸罪非獨不用肉刑亦不用象刑矣以為人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡也亂莫大焉凡刑人之本禁暴惡惡且徵其未也殺人者不死而傷人者不刑是謂惠暴而寛賊也非惡惡也故象刑殆非生於治古並起於亂今也治古不然凡爵列官職賞慶刑罰皆報也以類相從者也一物失稱亂之端也夫徳不稱位能不稱官賞不當功罰不當罪不祥莫大焉昔者武王伐有商誅紂斷其首懸之赤斾夫征暴誅捍治之盛也殺人者死傷人者刑是百王之所同未有知其所由來者也刑稱罪則治不稱罪則亂故治則刑重亂則刑輕犯治之罪固重犯亂之罪固輕書曰刑罰世輕世重此之謂也世俗之為説者曰湯武不能禁令是何也曰楚越不受制是不然湯武者至天下之善禁令者也湯居亳武王居鄗皆百里之地也天下為一諸侯為臣通達之屬莫不振動從服以化順之曷為楚越獨不受制也彼王者之制也視形勢而制械用稱逺邇而等貢獻豈必齊哉故魯人以榶衛人用柯齊人用一革土地形制不同者械用備飾不可不異也故諸夏之國同服同儀蠻夷戎狄之國同服不同制封内甸服封外侯服侯衛賔服蠻夷要服戎狄荒服甸服者祭侯服者祀賔服者享要服者貢荒服者終王日祭月祀時享歲貢終王夫是之謂視形勢而制械用稱逺近而等貢獻是王者之至也彼楚越者且時享嵗貢終王之屬也必齊之日祭月祀之屬然後曰受制耶是規磨之説也溝中之瘠也則未足與及王者之制也語曰淺不足與測深愚不足以謀知坎井之鼃不可與語東海之樂此之謂也世俗之為説者曰堯舜擅讓是不然天子者勢位至尊無敵於天下夫有誰與讓矣道徳純備智慧甚明南面而聽天下生民之屬莫不振動從服以化順之天下無隱士無遺善同焉者是也異焉者非也夫有惡擅天下矣曰死而擅之是又不然聖王在上圖徳而定次量能而授官皆民載其事而各得其宜不能以義制利不能以偽飾性則兼以為民聖王以沒天下無聖則固莫足以擅天下矣天下有聖而在後者則天下不離朝不易位國不更制天下厭焉與鄉無以異也以堯繼堯夫又何變之有矣聖不在後子而在三公則天下如歸猶復而振之也天下厭然與鄉無以異也以堯易堯夫又何變之有矣唯其徙朝改制為難故天子生則天下一隆致順而治論徳而定次死則能任天下者必有之矣夫禮義之分盡矣擅讓惡用矣哉曰老衰而擅是又不然血氣筯力則有衰若夫智慮取舍則無衰曰老者不堪其勞而休也是又畏事者之議也天子者勢至重而形至佚心至愉而志無所詘形不為勞尊無上矣衣被則服五采雜間色重文繡加飾之以珠玉食飲則重太牢而備珍怪期臭味曼而饋代睪而食雍而徹乎五祀執薦者百人待西房居則設張容負依而坐諸侯趨走乎堂下出戸而巫覡有事出門而宗祝有事乘大路越席以養安側載睪芷以養鼻前有錯衡以養目和鸞之聲歩中武象騶中韶䕶以養耳三公奉軛持納諸侯持輪挾輿先馬大侯編後大夫次之小侯元士次之庶士介而坐道庶人隠竄莫敢望視居如大神動如天帝持老養衰猶有善於是者與不老者休也休猶有安樂恬愉如是乎故曰諸侯有老天子無老有擅國無擅天下古今一也夫曰堯舜擅讓是虛言也是淺者之傳陋者之説也不知逆順之理小大至不至之變也未可與及天下之大理者也世俗之為説者曰堯舜不能教化是何也曰朱象不化是不然也堯舜至天下之善教化者也南面而聽天下生民之屬莫不振動從服以化順之然而朱象獨不化是非堯舜之過朱衆之罪矣堯舜者天下之英也朱象者天下之嵬一時之𤨏也今世俗之為説者不怪朱象而非堯舜豈不過甚矣哉夫是之謂嵬説羿蠭門者天下之善射者也不能以撥弓曲矢中王梁造父者天下之善馭者也不能以辟馬毁輿致逺堯舜者天下之善教化者也不能使嵬瑣化何世而無嵬何時而無𤨏自太皡燧人莫不有也故作者不祥學者受其殃非者有慶詩曰下民之孽匪降自天噂沓背憎職競由人此之謂也世俗之為説者曰太古薄葬棺厚三寸衣衾三領葬田不妨田故不掘也亂今厚葬飾棺故掘也是不及知治道而不察於抇不抇者之所言也凡人之盗也必以有為不以備不足足則以重有餘也而聖王之生民也皆使當厚優猶知足而不得以有餘過度故盜不竊賊不刺狗豕吐菽粟而農賈皆能以貨財讓風俗之美男女自不取於塗而百姓羞拾遺故孔子曰天下有道盜其先變乎雖珠玉滿體文繡充棺黄金充椁加之以丹矸重之以曾青犀象以為樹琅玕龍兹華覲以為實人猶且莫之抇也是何也則求利之詭緩而犯分之羞大也夫亂今而後反是上以無法使下以無度行知者不得慮能者不得治賢者不得使若是則上失天性下失地利中失人和故百事廢財物屈而禍亂起王公則病不足於上庶人則凍餒羸瘠於下於是桀紂羣居而盜賊擊奪以危上矣安禽獸行虎狼貪故脯巨人而炙嬰兒矣若是則有何尤抇人之墓抉人之口而求利矣哉雖此倮而埋之猶且必抇也安得葬埋哉彼乃將食其肉而齕其骨也夫太古薄葬故不抇也亂今厚葬故抇也是持姦人之誤於亂説以欺愚者而潮陷之以偷取利焉夫是之謂大姦傳曰危人而自安害人而自利此之謂也子宋子曰明見侮之不辱使人不闘人皆以見侮為辱故闘也知見侮之為不辱則不鬬矣應之曰然則亦以人之情為不惡侮乎曰惡而不辱也曰若是則必不得所求焉凡人之鬬也必以其惡之為説非以其辱之為故也今俳優侏儒狎徒詈侮而不鬬者是詎知見侮之為不辱哉然而不鬬者不惡故也今人或入其央瀆竊其猪彘則援劍㦸而逐之不避死傷是豈以䘮猪為辱也哉然而不憚鬬者惡之故也雖以見侮為辱也不惡則不鬬雖知見侮為不辱惡之則必鬬然則鬬與不鬬耶亡于辱之與不辱也乃在於惡之與不惡也夫今子宋子不能解人之惡侮而務説人以勿辱也豈不過甚矣哉金舌蔽口猶將無益也不知其無益則不知知其無益也直以欺人則不仁不仁不知辱莫大焉將以為有益於人耶則與無益於人也則得大辱而退耳説莫病是矣子宋子曰見侮不辱應之曰凡議必將立隆正然後可也無隆正則是非不分而辨訟不决故所聞曰天下之大隆也是非之封界分職名象之所起王制是也故凡言議期命是非以聖王為師而聖王之分榮辱是也是有兩端矣有義榮者有勢榮者有義辱者有勢辱者志意修徳行厚知慮明是榮之由中出者也夫是之謂義榮爵列尊貢祿厚形勢勝上為天子諸侯下為卿相士大夫是榮從外至者也夫是之謂勢榮流淫汙僈犯分亂理驕暴貪利是辱之由中出者也夫是之謂義辱詈侮捽搏捶笞臏腳斬斷枯磔藉靡舌􅀈是辱之由外至者也夫是之謂勢辱是榮辱之兩端也故君子可以有勢辱而不可以有義辱小人可以有勢榮而不可以有義榮有勢辱無害為堯有勢榮無害為桀義榮勢榮唯君子而後兼有之義辱勢辱唯小人然後兼有之是榮辱之分也聖王以為法士大夫以為道官人以為守百姓以為成俗萬世不能易也今子宋子案不然獨詘容為已慮一朝而改之説必不行矣譬之是猶以塼塗而塞江海也以僬僥而戴太山也蹎跌碎折不待頃矣二三子之善於子宋子者殆不若止之將恐得傷其體也子宋子曰人之情欲寡而皆以已之情欲為多是過也故率其羣徒辯其談説明其譬稱將使人知情欲之寡也應之曰然則亦以人之情為欲目不欲綦色耳不欲綦聲口不欲綦味鼻不欲綦臭形不欲綦佚此五綦者亦以人之情為不欲乎曰人之情欲是已曰若是則説必不行矣以人之情為欲此五綦者而不欲多譬之是猶以人之情為欲富貴而不欲貨也好美而惡西施也古之人為之不然以人之情為欲多而不欲寡故賞以富厚而罰以殺損也是百王之所同也故上賢祿天下次賢祿一國下賢禄田邑愿慤之民完衣食今子宋子以是之情為欲寡而不欲多然則先王以人之所不欲者賞而以人之所欲者罰耶亂莫大焉今子宋子嚴然而好説聚人徒立師學成文曲然而説不免於以至治為至亂矣豈不過甚矣哉文編巻二十二

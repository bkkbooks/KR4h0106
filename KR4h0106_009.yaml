body:
  text: 文編卷九明唐順之編諸葛亮出師表臣亮言先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諌之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵以為督愚謂營中之事事無大小悉以咨之必能使行陳和穆優劣得所也親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞亮死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂勤恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當將率三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣之所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興德之言則責攸之禕允等之咎以彰其慢陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表泣涕不知所云諸葛亮再出師表三國志先帝深慮以漢賊不兩立王業不偏安故託臣以討賊以先帝之明量臣之才固當知臣伐賊才弱敵強然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可偏安於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左髙帝明並日月謀臣淵深然涉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今嵗不戰明年不征使孫策坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣佛孫吳然困於南陽險於烏巢危於祁連逼於黎陽幾敗北山殆死潼關然後偽定一時耳况臣才弱而欲以不危定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委任夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間期年耳然喪趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎千餘人皆數十年之內所紏合四方之精鋭非一州之所有若復數年則損三分之二當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及蚤圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關侯毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆睹也論佛骨表韓愈伏以佛者外國之一法耳自後漢時流入中國上古未嘗有也昔者黃帝在位百年年百一十嵗少昊在位八十年年百嵗顓頊在位七十九年年九十八嵗帝嚳在位七十年年百五嵗帝堯在位九十八年年百一十八嵗帝舜及禹年皆百嵗此時天下太平百姓安樂夀考然而中國未有佛也其後殷湯亦年百嵗湯孫太戊在位七十五年武丁在位五十九年書史不言其年夀所極推其年數蓋亦俱不減百嵗周文王年九十七嵗武王年九十三嵗穆王在位百年此時佛法亦未入中國非因事佛而致然也漢明帝時始有佛法明帝在位才十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏以下事佛漸謹年代尤促惟梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止于菜果其後竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更得禍由此觀之佛不足事亦可知矣髙祖始受隋禪則議除之當時羣臣材識不逺不能深知先王之道古今之宜推闡聖明以救斯弊其事遂止臣常恨焉伏惟睿聖文武皇帝陛下神聖英武數千百年已來未有倫比即位之初即不許度人為僧尼道士又不許創立寺觀臣嘗以為髙祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令羣僧迎佛骨于鳳翔御樓以觀舁入大內又令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以年豐人樂徇人之心為京都士庶設詭異之觀戲玩之具耳安有聖明若此而肯信此等事哉然百姓愚冥易惑難曉茍見陛下如此將謂真心事佛皆云天子大聖猶一心敬信百姓何人豈合更惜身命焚頂燒指百十為羣解衣散錢自朝至暮轉相倣效惟恐後時老少奔波棄其業次若不即加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也夫佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之情假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出之於境不令惑衆也况其身死已久枯朽之骨凶穢之餘豈宜令入宫禁孔子曰敬鬼神而逺之古之諸侯行弔于其國尚令巫祝先以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付之有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍祟凡有殃咎宜加臣身上天鑒臨臣不怨悔徐州賀河平表蘇軾聖謨獨運天眷莫違庶邦子來民罔告病萬杵雷動役不逾時遂消東北莫大之憂然後麥禾可得而食人無後患喜若再生伏以大河為災歷世所病禹治兖州之野十有三載乃同漢築宣房之宫二十餘年而定未有收狂瀾於既潰復故道於將堙俯仰而成神速若此恭惟皇帝陛下至仁博施神智無方達四聰以來衆言廣大孝以安宗廟水當潤下河不溢流屬嵗久之無虞故患生於所忽方其決也本吏失其防而非天意及其復也蓋天助有德而非人功振古所亡溥天同慶維豐沛之大澤實汴泗之所鍾伊昔橫流凛孤城之若塊逮兹平定蔚秋稼以如雲害既廣則利多憂獨深而喜倍雖官守有限不獲趨外庭以稱觴而民意所同亦能抒下情而作頌賀南郊禮畢肆赦第一表王安石精意上昭神靈底豫茂恩旁暢夷夏接和臣聞道以饗帝為難禮以配天為至有秩斯祜唯四表之歡心胡臭亶時匪九州之美味自古在昔若聖與仁厥遭昌辰乃暏熙事恭惟皇帝陛下邁種三德敷奏九功率籲奉璋之衆髦肇稱奠璧之新禮廟籩致孝郊血告幽誠既格於穹旻福遂均於品庶振憂矜寡原宥眚災第五玉以褒封善人是富發三錢而慶賜賤者不虛天其居歆人以呼舞臣夙叨寵奬親值休成雖亡預于駿奔實不勝于竊抃賀南郊禮畢肆赦第二表王安石精眀條達神眷顧而依懷膏澤川流人歡呼而蹈厲臣聞語孝之至莫大於配天議禮而輕不足以享帝能舉釐事實歸聖時恭惟皇帝陛下鴻化已昭康年屢應奔走籩豆有董正之治官潔豐粢盛有底慎之財賦禮成榖旦恩浹綿區雖洛誦之休明尚難譬稱豈兒寬之淺訥能盡揄揚臣夙荷慈憐方嬰衰瘵望九賓之紳笏獨逺句傳狎百獸於山林猶知率舞賀駕幸太學表蘇軾輦回原廟既崇廣孝之風幄次儒宫復示右文之化禮行一日風動四方臣聞五學之臨三代所共蓋天子不敢自聖而盛德必有達尊在漢永平始舉是禮雖臨雍拜老有先王之規而正坐自講非人主之事豈如允哲退托不能奠爵復興意默通於先聖橫經問難言各盡於諸儒恭惟皇帝陛下文武憲邦聰明齊聖大度同符於藝祖至仁追配於昭陵故舉舊章以興盛節臣早塵法從久侍經幃永矣馳誠想聞合語於東序斐然作頌行觀獻馘於西戎請皇帝御正殿復常膳表王安石陽春生物偶霑澤之稍愆睿意恤民遽側身而自抑德已修於消變數或係於非常當服彜儀用安羣下恭惟皇帝陛下天仁博施神知曲成躬忘旰食之勞坐講日新之政四時協序萬物致和適當化養之辰宜得涵濡之澤少違常候深軫清衷退師氏之正朝約大官之盛饌仰窺謙德志在閔民然而異國來朝當即法宫之位誕辰入慶合陳燕俎之珍事有所先禮難偏廢伏願仰回淵聽俯徇輿情夙御九筵之居並羞十閣之具上以全於國體下以副於臣誠請皇帝御正殿復常膳第二表王安石時澤偶愆屢勤齋禱聖衷愈勵曲盡焦勞將損已以召休因退次而貶食列朝剡奏尚闕嗣音在臣列之靡遑伏帝閽而再扣恭惟皇帝陛下體居離正德稟乾剛期揉俗以致康嘗納隍而興念七載于此繼獲豐穰一春而來或罹愆亢皇慈深軫羣祀遍修恐狴犴乖則親慮其囚愳黼黻美則躬變其服仍損內饔之舉兼虛正宇之朝然而禮貴從宜事難泥古而况甫臨誕節交舉慶儀有列辟拜萬年之觴有殊俗修兩朝之好茍虧彛制難副羣情伏望少屈淵衷特從誠懇天臨廣厦日御常珍親事法宫廓宣於政治惟辟玉食昭示於等威仰以慰兩宫之慈俯以安羣下之望李密陳情表晉書臣密言臣以險釁夙遭閔凶生孩六月慈父見背行年四嵗舅奪母志祖母劉愍臣孤弱躬親撫養臣少多疾病九嵗不行零丁孤苦至於成立既亡叔伯終鮮兄弟門衰祚薄晚有兒息外亡期功強近之親內亡應門五尺之童煢煢獨立形影相弔而劉夙嬰疾病常在床蓐臣侍湯藥未曾廢離逮奉聖朝沐浴清化前太守臣逵察臣孝亷後刺史臣榮舉臣秀才臣以供養亡主辭不赴會詔書特下拜臣郎中尋蒙國恩除臣洗馬猥以微賤當侍東宫非臣隕首所能上報臣具以表聞辭不就職詔書切峻責臣逋慢郡縣逼迫催臣上道州司臨門急於星火臣欲奉詔奔馳則劉病日篤欲茍順私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶蒙矜育况臣孤苦特為尤甚且臣少仕偽朝歷職郎署本圖宦達不矜名節今臣亡國賤俘至微至陋過蒙拔擢寵命優渥豈敢盤桓有所希冀但以劉日薄西山氣息奄奄人命危淺朝不慮夕臣亡祖母亡以至今日祖母亡臣亡以終餘年母孫二人更相為命是以區區不能廢逺臣密今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長報劉之日短也烏鳥私情願乞終養臣之辛苦非獨蜀之人士及二州牧伯所見明知皇天后土實所共鑒願陛下矜愍愚誠聽臣微志庶劉僥幸卒保餘年臣生當隕首死當結草臣不勝犬馬怖懼之情謹拜表以聞乞罷政事表歐陽修臣聞士之行已所重者始終之不渝臣之事君所難者進退而合理茍亡大過善退其身昔之為臣全此者少臣頃侍先帝屢陳斯言今之懇誠蓋迫於此伏念臣識不足以通今古材不足以語經綸達逄盛際之休明早自諸生而拔擢方其與儒學文章之選居言語侍從之流每蒙過奬於羣公常愧虛名之浮實暨晚叨於重任益可謂於得時何嘗敢傷一士之賢豈不樂得天下之譽而動皆臣忌毁必臣歸人之愛憎不應遽異臣之本末亦豈頓殊蓋以處非所宜用過其量惟是要權之地不勝指目之多周防所以履危而簡疏自任委曲所以從衆而拙直難移宜其舉足則蹈禍之機以身為斂怨之府復盤桓而不去遂謗議以交興讒説震驚輿情共憤皇明洞照聖斷不疑孤臣獲雪於至寃四海共欣於新政至於賴天地保全之力脫風波險陷之危使臣散髮林丘幅巾衡巷以此沒地猶為幸民况乎擁蓋垂襜其榮可喜撫民求瘼所寄非輕茍可效於勤勞亦寧分於內外伏惟皇帝陛下曲回天造俯察愚衷許臣解劇繁處之間僻物還其分庶獲遂於安全心匪無知豈敢忘於報效乞罷政事第二表王安石私懷懇至已具布聞聖訓丁寧未蒙聞納敢冒崇髙之聽再輸愊悃之情臣聞任賢之方要其有用陳力之義止於不能茍弗集於事功且重罹於疹疾豈容叨據以纍明揚伏念臣猥以孤生親逢盛世昧于量巳志欲補於休明失在信書事浸成於迂濶每煩衆論上慁聖聰久知素願之難諧繼以積痾而自困辭而去位庶逃竊食之誅勉以就功重荷包荒之德雖貪順命終愳妨功伏惟皇帝陛下閎度并容大明俯燭特垂矜允俾遂退藏如此則孤進之身獲全生于末路具瞻之地得改命於時材亳州乞致仕第二表歐陽修臣近貢封章乞還官政伏奉詔答未賜允俞退自省循奚勝殞越臣聞神功不宰而萬物得以曲成者惟各從其欲天鑒孔昭而一言可以感動者在能致其誠敢傾虔至之心再黷髙明之聽伏念臣本以一介之賤叨塵二府之聯知直道以事君每師心而自信然而既乏捐軀之效又無先覺之明用之已過其分而曾不自量毁者不堪其辱而莫知引去幸賴乾坤之再造得逃陷穽之危機仍許避於要權俾退安於晚節今乃苦於衰病莫自支持顧難冒於寵榮始欲收於骸骨敢期聖念過軫天慈謂雖迫於桑榆未忍棄於草莾竊以古今之制沿襲不同蓋由兩漢而來雖處三公之貴每上還於印綬多自駕於車轅朝去朝廷暮歸田里一辭髙爵遂列編民豈如至治之朝深篤愛賢之意每示隆恩之典以勸知止之人故雖有還政之名而仍享終身之祿固已不類昔時之士無殊居位之榮然則在臣素心雖竊退休之志迹臣所乞尚虞僥幸之譏伏望皇帝陛下惻以深仁矜其至懇俾解方州之任遂歸環堵之居固將優遊垂盡之年涵泳太平之樂惟辛勤白首迄亡一善之稱孤負明時莫報三朝之德此為慚恨何可勝陳蔡州乞致仕第二表歐陽修睿訓丁寧曲加慰諭愚衷懇迫尚敢瀆煩將再干於冕旒宜先伏於砧鑕伏念臣世惟寒陋少苦竒屯識不達於古今學僅知於章句名浮於實用之始見於無能器小易盈過則不勝於幾覆徒以早際千齡之亨會誤蒙三聖之奬知寵榮既溢其涯憂患亦隨而至稟生素弱顧身未老而先衰大道甚夷嗟力不前而難強每念恩私之莫報兼之疾病以交攻爰于守亳之初遂決竄漳之計逮此三遷於嵗律又更兩易於州符而犬馬巳疲理亡復壯田廬甚邇今也其時是敢更殫螻蟻之誠仰冀乾坤之造况今時不乏士物咸遂生鳬雁去來固不為於多少鳶魚上下皆自適於飛潛茍遂乞於殘骸庶少償其夙志伏望皇帝陛下哀憐舊物懚惻至仁察其有素非偽之誠成其識分知止之節曲從其欲賜報曰俞俾其解組官庭還車故里披裘散髮逍遙垂盡之年鑿井耕田歌詠太平之樂其為榮幸曷可勝陳蔡州乞致仕第三表歐陽修恩深煦嫗感極涕洟雖情有迫於危心不知自止而辭已窮於纍牘幾至亡言惟以至誠期於必達自乞憐於君父不復訊於蓍龜伏念臣家世單平性姿中下少從宦學本免飢寒不自意於遭逢遂進階于華顯然而羣材方茂蒲栁未秋而早衰衆駿並馳駑駘中道而先乏而况荷難勝之任用竊逾分之寵榮風波憂畏而慮以深疾病侵凌而老亦至故自辭於機政即願謝于軒裳蒙上聖之至仁念三朝之舊物每曲煩於訓諭久未忍於棄捐竊惟臣知事君必本忠信言不顧行是為罔欺而臣口日誦於田廬身坐貪於祿利可畏至公之議何施有靦之顔每自省循莫遑啓處是敢罔避再三之煩瀆猶希萬一之矜從伏望皇帝陛下特軫天慈俯回睿聽察前言之可復蓋屢請者有年哀下愚之不移俾卒成于素志徇其所欲乞以殘骸臣若得上還印綬於有司自架柴車而即路晚節知亡於大過沒身永荷於鴻私乞退第一表王安石臣忠於為國故進而能致其身君恕以及人故病則閔勞以事此今昔共由之通義實上下相與之至情敢觸冒昧之誅冀蒙哀矜之聽臣受才鄙劣遭運休明陳愚或會於聖心承乏遂尸於宰事謀謨淺拙謾不見其有成操行陵夷又或幾于亡恥久宜辭位尚茍貪恩豈圖養拙以乖方重以瞀昏而廢務粗嘗陳列未獲矜從黽勉以來浸淫遂劇大懼典司之曠上煩程督之嚴伏惟陛下詢事考言循名責實或輟夜分之寐常臨日昃之朝萬方黎獻之多各皆祗辟三事大夫之守豈可瘝官仰冀髙明俯昭悃愊念其服勞之久愍其攖瘵之深及未干鈇鉞之時令遂解機衡之任豈特少安於私義兹惟畢協於師虞乞退第三表王安石聖恩所及有隆天重地之施私義未安有深淵薄氷之愳竊惟成湯髙宗之世有若伊尹傅説之臣其道則格于帝而無疑其政則加乎民而有變后惟時又相亦有終逮乎中世之陵夷非復古人之髣佛忠或不足以取信而事事至於自明義或不足以勝姦而人人與之為敵以此乘權而久處孰能持祿以少安此臣之慮危於居寵之時而昧死有均勞之乞况於抱病浸以瘝官伏惟陛下道與日躋德侔乾覆哀一夫之失所樂萬物之皆昌矧夫眷遇之優既已勤劬之久宜蒙善貸使獲曲全賜其疲賤之身假以安間之地則敝車無用猶可具於勞薪棄席未忘或再施於華幄謝明堂覃恩轉官表歐陽修天地號令風雷鼓行一氣所均萬物咸被遂容僥幸亦與褒升伏念臣材不逮人識非慮逺徒有事君之節未知報國之方冒寵貪榮已踰其量見利臨得曽不知慙此蓋伏遇皇帝陛下堯舜聰明禹湯勤儉修前王之曠典述先志以繼成昭致精禋躬臨路寢膺受上天之多福推與萬方而不私臣於此時限以官守講儀制禮不預議郎博士之流助祭陪祠不在諸侯方物之列既乏一言之獻又亡執事之勞徒隨翟閽共享餘賜普天率土難異衆以獨辭蹐厚局髙但撫躬而無措謝朱炎傳聖旨令視事表王安石使旨遄臻訓詞俯逮敢圖衰疾尚誤眷存伏念臣曲荷搜揚久孤付屬有能必獻未嘗擇事而辭難無力可陳乃始籲天而求佚然方焦思有為之日以此懷恩未報之身茍營燕安豈免慙悸伏蒙皇帝陛下人惟求舊義不忘遐乃因乘詔賦命之臣更喻推轂授方之意踦履亡用誠弗忍于棄捐朽株匪材尚奚勝于器使永惟奬勵徒誓糜捐謝復龍圖閣直學士表歐陽修恩還舊職事雪前誣感極心驚涕隨言出臣伏見前世材賢之士身結主知勛德之臣功施王室然尚或一遭謗毁欲辨亡由少忤要權其禍不測顧如臣者何足道哉臣材不逮于中人功無益于當世用之未見有效去之無足可思矧罔極之讒交興而並進易危之迹何恃而不顛而聖心不忘恩意特至辨罔欺於曖昧沮仇嫉於衆多雖暫居譴謫之中而屢被升遷之渥今又特蒙甄録牽復寵名以臣之愚豈比前人而獨異推其所幸蓋由聖主之親逢謂宜如何可以論報再念臣稟生孤拙本乏藝能徒因學古之勤粗識事君之節茍臨危效命尚當不顧以奮身况為善亡傷何憚竭忠而報國誓期盡瘁少答髙明謝宣召入翰林表歐陽修使車入里君命在門閭巷驚傳豈識朝廷之故事縉紳竦歎以為儒者之至榮在臣之愚何以堪此竊以文章之任自古非輕待遇寵榮至有私人之目詢謀獻納因加內相之名恩既異於常倫人愈難於稱職伏念臣器非宏逺識匪該明學不通古今之宜材不適方圓之用久叨塵於侍從曽莫著於勞能而自出守外藩近遭家禍茍存餘喘復齒周行風波流落者十年天日再瞻於雙闕進對之際已蕭颯於霜毛慰勞有加賜憫憐於玉色形神若此志意可知身巳分於早衰心敢蒙於希進加以羇危之迹仇嫉交攻進退動繫于羣言議論多煩於睿聽雖覆載之造每賜保全而孤蹇偷安常思引去伏蒙皇帝陛下俯憐舊物曲軫宸慈因內署之闕員俾備官而承乏臣敢不勉尋舊學益勵前修感遺簮未棄之仁竭駑馬已疲之力庶伸薄效少答鴻恩謝宣召入院表蘇軾詔語春溫再命而僂使華天降一節以趨在故事以嘗聞豈平生之敢望省循非稱愧汗交深竊以視草之官自唐為盛雖職親事祕號為北門學士之榮而祿薄地寒至有京兆掾曹之請豈如聖代一振儒風非徒好爵之縻兼享大亨之養玉堂賜篆仰淳化之彌文寶帶重金佩元豐之新渥既厚其禮愈難其人而臣以空踈冗散之材衰病流離之後生還萬里坐閲三遷不緑左右之容躐處賢豪之上此蓋伏遇皇帝陛下生資文武天祚聖神雖亮隂不言尚隱髙宗之德而訪落求助已啓成王之心首擇輔臣次求法從知人材之難得采虛名而用臣敢不益勵初心力圖後效才不逮古雖慙內相之名志常在民庶免私人之誚謝除侍讀表蘇軾北門視草已叨儒者之極榮西學上賢復玷侍臣之髙選省循非稱愧汗交懷竊惟講讀之臣止以言語為職考功課吏亡殿最之可書陳善閉邪有膏澤之潛潤豈臣愚陋亦所克堪此蓋伏遇太皇太后陛下憂思深長德業久大受先帝投艱之託為神孫經逺之謀故選左右前後之人罔非吉士使知興亡治亂之效莫若多聞謂臣雖無大過人之才知臣粗有不欺君之實故使朝夕與於討論奉永日之清間未知所報畢微生於盡瘁終致此心謝復官提舉玉局觀表蘇軾七年逺謫不意自全萬里生還適有天幸驟從縲絏復齒縉紳伏念臣才不逮人性多忤物剛褊自用可謂小忠猖狂妄行乃蹈大難皆臣自取不敢怨尤會真人之勃興與萬物而更始而臣獨在幽逺最為冥頑逮兹起廢之初倍費生成之力終蒙記録不遂棄捐此蓋伏遇皇帝陛下正位龍飛對時虎變神武不殺孰非受命之符清淨無為坐獲銷兵之福聰明不作邪正自分使臣得同草木之微共霑雷雨之澤臣敢不益堅素守深念往愆沒齒何求不厭飯蔬之陋蓋棺未已猶懷結草之忠南京留守謝上表歐陽修守宫鑰之謹嚴敢忘夙夜布政條之纎悉上副憂勤寄任非堪兢營並集伏念臣賦材庸薄稟數奇屯毁譽交興兩嘗過實寵榮踰分動輒招尤念報效之未伸敢不竭忠而盡瘁因風波之可畏則思逺去以深藏逮此六年外更三守學偷安而杜口負素志以愧心朽質易衰已凋零於齒髮良時難得尚希慕於功名豈謂皇慈未捐舊物擢從支郡委以名都惟此别京舊當孔道簿領少勤於職事厨傳取悅於路人茍循俗吏之所為雖能免過非有古人之大節未足報君亳州謝上表歐陽修二政非才雖獲奉身而退分符善地猶懷竊祿之慙祗荷寵靈惟知戰懼伏念臣章句腐儒之學也豈足經邦斗筲小器之量也寧堪大用而叨塵二府首尾八年荷三朝之誤知罄一心而盡瘁若乃樞機宜慎而見事輒言陷穽當前而橫身不避竊尋前載未有能全怨出仇家搆為死禍造謗于下者初若含沙之射影但期隂以中人宣言于廷者遂肆鳴梟之惡音孰不聞而掩耳賴聖人之在上廓日月之至明悉究罔誣遂投讒賊再念臣性實甚愚而踈於接物事多輕信而待以至誠如彼匪人失於泛愛平居握手惟期道義之交延譽當朝常丐齒牙之論而未乾薦襧之墨已彎射羿之弓知士其難世必以臣為戒常情共惡人將不食其餘而臣與遊既昧於擇賢在滿不思於將覆自貽禍釁幾至顛隮上煩睿聖之保全得完名節於終始洎懇辭於重任尤深惻於皇慈雖避寵辭隆僅能去位而清資顯秩愈更叨榮莫逃徼幸之譏實負心顔之靦斯蓋伏遇皇帝陛下乾坤大度堯舜至仁察臣自取於怨仇本由孤直憫臣力難於勉強蓋迫衰殘既獲免于非辜仍曲從于私欲遂同萬物俾無失所之嗟未盡餘生敢忘必報之效謝男雱除中允説書表王安石恩驟加於私室多所超踰事或纍於公朝誠難冒昧仰煩睿訓曲喻至懷永惟眷奬之殊實重兢慙之至伏念臣首叨召節得侍詞林隨被贊書使陪經幄稍更嵗月莫補涓埃竊觀上智之日躋內訟淺聞而知困况如賤息厥有童心尚迷鑽仰之方豈稱招延之禮恕已量主非敢以私而自嫌為官擇人顧雖成命而宜改輒布可辭之義上干難犯之威伏惟皇帝陛下屈體優容垂精寵答謂大人照臨之道廣當養以蒙意小夫誦説之智專遽忘其賤褒稱備厚訓飭加嚴揣實未安寄顔有恧重念自古君臣之相與未有如臣父子之所遭蓋當用儒之時尤難講藝之職典謨方御實參備于討論誥誓未終已繼叨于奬擢獲世官於閭巷嗣家學於朝廷自非忘軀何以報國知人而官以哲慨已誤於明揚委質而教之忠誓永肩於素守謝元豐元年厯日表曾鞏一逺闕庭十移星厯顧雕零于齒髮亡報補于毫分伏惟皇帝陛下敘大禹之九疇齊有虞之七政隂陽寒暑罔不若時草木昆蟲舉皆遂性循用頒正之典寵詒分土之官臣幸備守藩預聞告朔去親方逺巳驚嵗月之新許國雖堅更歎功名之晚惟體在民之意庶禆及物之仁謝賜漢書表歐陽修俯躬承命拭目生輝竊以右文興化乃致治之所先著録藏書須太平而大備惟漢室上繼三代之統而班史自成一家之書文或舛訛蓋其傳之已久詔加刋定俾後學之無疑一新方册之文增煥祕書之府而奏篇之始方經衡石之程賜本之榮惟及鈞樞之近敢期孤外特與恩頒此蓋伏遇皇帝陛下曲軫睿慈俯矜舊物謂其嘗與臣鄰之列不忍遽遺憐其自喜文字之間俾之娛老然臣兩目昏眊雖嗟執卷之已艱十襲珍藏但誓傳家而氷寶謝賜對衣金帶馬表蘇軾服章在笥賁及衰殘銜勒過庭喜先徒御伏以物生有待天地亡窮草木何知冒慶雲之渥采魚蝦至陋借滄海之榮光雖若可觀終非其有妻孥相顧驚屢致于匪頒道路竊窺或反增於指目此蓋伏遇太皇太后陛下聰明齊聖陳錫載周含垢匿瑕而察於求賢卑宫菲食而侈於養士士豈輕于千里念非其人言有重於兼金當思所報謝賜對衣鞍馬表王安石出大庭之顯服束以精鏐引內廄之名駒傳之錯采隆恩所逮朽質知榮竊念臣弱力淺聞久憂積疹中預從官之選外分守將之權僅免譴訶更蒙收召論思潤色曽莫效於微勞衣被服乘乃前叨於異數此蓋伏遇皇帝陛下醲於慶賞詳在招延因示眷懷使知奮勵誓竭愚忠之報冀無虛授之嫌謝擅止散青苗錢放罪表歐陽修有罪必誅是為彜典原情以恕特出深仁聞命驚慙省躬涕泗伏念臣以一介之微賤荷三聖之奬知寵祿既豐初亡報效筋骸巳憊尚此遲徊曲蒙大度之并容誤委一方之寄任職當撫俗責在分憂方兹旰昃之勞心豈敢因循而避事昨遇國家新建官司而主計大商財利以均通分命出使之車交馳於郡縣悉發舊藏之鏹取息於農氓而臣方久苦於昏衰初莫詳其利害既已大喧於物議始知不便於人情亦嘗略陳衆弊之三冀補萬分之一屬再當于班給顧已逼於會期雖具奏陳乃先擅止據兹專妄合被譴呵豈謂伏蒙皇帝陛下深軫睿慈俯矜朴拙免從吏議特貸刑章夫何草木之微曲被乾坤之施臣敢不益思祗畏更勵操修戒小人之遂非希君子之改過冀圖薄效少答鴻私謝失覺察妖賊放罪表蘇軾盜發所臨守臣固當重責罪疑則赦聖主所以廣恩自驚廢逐之餘猶在愍憐之數伏念臣早蒙殊遇擢領大邦上不能以道化民達忠孝於所部下不能以刑齊物消姦冗於未萌致使妄庸敢圖僣逆原其不職夫豈勝誅况兹溝瀆之中重遇雷霆之譴無官可削撫已知危至於捕斬羣盜之功乃是鄰近一夫之力靖言其始偶出於臣雖為國督姦常懷此志而因人成事豈足言勞勉自列於涓埃庶少寬於斧鉞豈謂蕩然之澤許以勿推收驚魄于散亡假餘生之晷刻退思所自為幸何多此蓋伏遇皇帝陛下舞虞舜之干示人不殺祝成湯之網與物求生其間用刑本不得巳稍有可赦無不從寬務在考實而原情何嘗記過而忘善益悟向時之所坐皆是微臣之自貽感愧終身論報無地布衣蔬食或未死於飢寒石心木腸誓不忘於忠義杭州謝放罪表蘇軾臣近以法外刺配本州百姓顔益二人上章待罪奉聖旨特放罪者職在承宣當遵三尺之約束事關利害輒從一切之便宜曲荷天慈不從吏議伏念臣早緣剛拙屢致憂虞用之朝廷則逆耳之蠢形於言施之郡縣則疾惡之心見於政雖知難每以為戒而臨事不能自回茍非日月之明肝膽必照則臣豈惟獲罪于今日久已見傾於衆言恭惟皇帝陛下濬哲生知清明旁逹委任羣下退託於不能愛養成材惟恐其有過知臣欲去一方之積弊須除二猾以示民特屈憲章以全器使臣敢不省循過咎祗服簡書眷此善良自不犯於漢法時有貸捨用益廣於堯仁謝太皇太后表蘇軾亂羣之誅不請而決蓋恩威之亡素致姦猾之敢行方俟譴呵豈期寬宥伏以法吏網密蓋出於近年守臣權輕無甚於今日觀祖宗信任之意以州郡責成於人不擇師帥之良但知繩墨之馭若平居僅能守法則緩急何以使民顧臣不才難以議此恭惟太皇太后陛下寬仁從衆信順得天推一身之至公納萬方於無罪而臣始終被遇中外蒙恩謂事有專而合宜情無他而可恕故加貸捨以示寵綏朝廷之明粗以臣為可信吏民自服當不令而率從文編卷九

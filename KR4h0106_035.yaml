body:
  text: 文編卷三十五明唐順之編論秦伯用孟明左傳文三年秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之一也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉邾黑肱來奔左傳昭三十一年冬邾黑肱以濫來奔賤而書名重地故也君子曰名之不可不慎也如是夫有所有名而不如其已以地叛雖賤必書地以名其人終為不義弗可滅巳是故君子動則思禮行則思義不為利回不為義疚或求名而不得或欲蓋而名彰懲不義也齊豹為衛司冦守嗣大夫作而不義其書為盜邾庶其莒牟夷邾黑肱以土地出求食而巳不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以僥大利而無名貪冒之民將置力焉是以春秋書齊豹曰盜三叛人名以懲不義數惡無禮其善志也故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之論初獻六羽公羊傳隱五年初獻六羽初者何始也六羽者何舞也初獻六羽何以書譏何譏爾譏始僭諸公也六羽之為僭奈何天子八佾諸公六諸侯四諸公者何諸侯者何天子三公稱公王者之後稱公其餘大國稱侯小國稱伯子男天子三公者何天子之相也天子之相則何以三自陜而東者周公主之自陜而西者召公主之一相處乎內始僭諸公昉於此乎前此矣前此則曷為始乎此僭諸公猶可言也僭天子不可言也孔父公羊傳桓公二年春王正月戊申宋督弒其君與夷及其大夫孔父及者何纍也弒君多矣舍此無纍者乎曰有仇牧荀息皆纍也舍仇牧荀息無纍者乎曰有有則此何以書賢也何賢乎孔父孔父可謂義形於色矣其義形於色奈何督將弒殤公孔父生而存則殤公不可得而弒也故於是先攻孔父之家殤公知孔父死已必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣桓公救衛公羊傳僖二年春王正月城楚邱孰城城衛也曷為不言城衛滅也孰滅之蓋狄滅之曷為不言狄滅之為桓公諱也曷為為桓公諱上無天子下無方伯天下諸侯有相滅亡者桓公不能救則桓公恥之也然則孰城之桓公城之曷為不言桓公城之不與諸侯專封也曷為不與實與而文不與文曷為不與諸侯之義不得專封諸侯之義不得專封則其曰實與之何上無天子下無方伯天下諸侯有相滅亡者力能救之則救之可也荀息不食言公羊傳僖十年春晉里克弒其君卓子及其大夫荀息及者何纍也弒君多矣舍此無纍者乎曰有孔父仇牧皆纍也舍孔父仇牧無纍者乎曰有有則此何以書賢也何賢乎荀息荀息可謂不食其言矣其不食其言奈何奚齊卓子者驪姬之子也荀息傅焉驪姬者國色也獻公愛之甚欲立其子於是殺世子申生申生者里克傅之獻公病將死謂荀息曰士何如則可謂之信矣荀息對曰使死者反生生者不愧乎其言則可謂信矣獻公死奚齊立里克謂荀息曰君殺正而立不正廢長而立幼如之何願與子慮之荀息曰君嘗訊臣矣臣對曰使死者反生生者不愧乎其言則可謂信矣里克知其不可與謀退弒奚齊荀息立卓子里克弒卓子荀息死之荀息可謂不食其言矣毛伯來求金公羊傳文九年毛伯來求金毛伯者何天子之大夫也何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子也踰年稱公矣則曷為於其封內三年稱子緣民臣之心不可一日無君緣始終之義一年不二君不可曠年無君緣孝子之心則三年不忍當也毛伯來求金何以書譏何譏爾王者無求求金非禮也然則是王者與曰非也非王者則曷為謂之王者王者無求曰是子也繼文王之體守文王之法度文王之法無求而求故譏之也世室壞公羊傳文十三年自正月不雨至於秋七月世室屋壞世室者何魯公之廟也周公稱太廟魯公稱世室羣公稱宫此魯公之廟也曷為謂之世室世室猶世室也世世不毁也周公何以稱太廟於魯封魯公以為周公也周公拜乎前魯公拜乎後曰生以養周公死以為周公主然則周公之魯乎曰不之魯也封魯公以為周公主然則周公曷為不之魯欲天下之一乎周也魯祭周公何以為牲周公用白牲魯公用騂犅羣公不毛魯祭周公何以為盛周公盛魯公燾羣公廩世室屋壞何以書譏何譏爾久不修也晉納接災不克公羊傳文十有四年晉人納接災于邾婁弗克納納者何入辭也其言弗克納何大其弗克納也何大乎其弗克納晉郤缺帥師革車八百乘以納接災于邾婁力沛若有餘而納之邾婁人言曰接災晉出也貜且齊出也子以其指則接災也四貜且也六子以大國壓之則未知齊晉孰有之也貴則皆貴矣雖然貜且也長郤缺曰非吾力不能納也義實不爾克也引師而去之故君子大其弗克納也此晉郤缺也其稱人何貶曷為貶不與大夫專廢置君也曷為不與實與而文不與文曷為不與大夫之義不得專廢置君也季札讓國公羊傳襄二十九年吳子使札來聘吳無君無大夫此何以有君有大夫賢季子也何賢乎季子讓國也其讓國奈何謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君謁曰今若是迮而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子皆曰諾故諸為君者皆輕死為勇飲食必祝曰天茍有吳國尚速有悔于豫身故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國宜之季子者也季子使而亡焉僚者長庶也即之季子使而反至而君之爾闔廬曰先君之所以不與子國而與弟者凡為季子故也將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚惡得為君乎于是使專諸刺僚而致國乎季子季子不受曰爾殺吾君吾受爾國是吾與爾為篡也爾殺吾兄吾又殺爾是父子兄弟相殺終身無巳也去之延陵終身不入吳國故君子以其不受為義以其不殺為仁賢季子則吳何以有君有大夫以季子為臣則宜有君者也札者何吳季子之名也春秋賢者不名此何以名許夷狄者不一而足也季子者所賢也曷為不足乎季子許人臣者必使臣許人子者必使子也許世子止弒其君公羊傳昭十有九年秋齊髙發帥師伐莒冬葬許悼公賊未討何以書葬不成于弒也曷為不成于弒止進藥而藥殺也止進藥而藥殺則曷為加弒焉耳譏子道之不盡也其譏子道之不盡奈何曰樂正子春之視疾也復加一飯則脫然愈復損一飯則脫然愈復加一衣則脫然愈復損一衣則脫然愈止進藥而藥殺是以君子加弒焉耳曰許世子止弒其君買是君子之聽止也葬許悼公是君子之赦止也赦止者免止之罪辭也論隱公不書即位穀梁傳隱元年公何以不言即位成公志也焉成之言君之不取為公也君之不取為公何也將以讓桓也讓桓正乎曰不正春秋成人之美不成人之惡隱不正而成之何也將以惡桓也其惡桓何也隱將讓而桓弒之則桓惡矣桓弒而隱讓則隱善矣善則其不正焉何也春秋貴義而不貴惠信道而不信邪孝子揚父之美不揚父之惡先君之欲與桓非正也邪也雖然既勝其邪心以與隱矣巳探先君之邪志而遂以與桓則是成父之惡也兄弟天倫也為子受之父為諸侯受之君已廢天倫而忘君父以行小惠曰小道也若隱者可謂輕千乘之國蹈道則未也武氏子來求賻穀梁傳隱三年秋武氏子來求賻武氏子者何也天子之大夫也天子之大夫其稱武氏子何也未畢喪孤未爵未爵使之非正也其不言使何也無君也歸死者曰賵歸生者曰賻曰歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之築王姬之館穀梁傳莊元年夏單伯逆王姬單伯者何吾大夫之命乎天子者也命大夫故不名也不言如何也其義不可受於京師也其義不可受於京師何也曰躬君弒於齊使之主婚姻與齊為禮其義固不可受也秋築王姬之館於外築禮也於外非禮也築之為禮何也主王姬者必自公門出於廟則巳尊於寢則巳卑為之築節矣築之外變之正也築之外變之為正何也仇讐之人非所以接婚姻也衰麻非所以接辨冕也其不言齊侯之來逆何也不使齊侯得與吾為禮也會王世子于首止穀梁傳僖五年夏公孫兹如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首戴及以會尊之也何尊焉王世子云者唯王之二也云可以重之尊焉尊之也何重焉天子世子世天下也秋八月諸侯盟于首戴無中事而復舉諸侯何也尊王世子而不敢與盟也尊則其不敢與盟何也盟者不相信也故謹信也不敢以所不信而加之尊者桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊巳而立乎其位是不子也桓不臣王世子不子則其所善焉何也是則變之正也天子微諸侯不享覲桓控大國扶小國統諸侯不能以朝天子亦不敢致天王尊王世子於首戴乃所以尊天王之命也世子含王命會齊桓亦所以尊天王之命也世子受之可乎是亦變之正也天子微諸侯不享覲世子受諸侯之尊巳而天王尊矣世子受之可也閽弒吳子餘祭穀梁傳襄二十九年閽弒吳子餘祭閽門者也寺人也不稱名姓閽不得齊于人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也論項羽史記吾聞之周生曰舜目蓋重瞳子又聞項羽亦重瞳子羽豈其苗裔耶何興之暴也夫秦失其政陳涉首難豪傑蜂起相與並爭不可勝數然羽非有尺寸乘勢起隴畝之中三年遂將五諸侯滅秦分裂天下而封王侯政由羽出號為霸王位雖不終近古以來未嘗有也及羽背關懷楚放逐義帝而自立怨王侯叛已難矣自矜功伐奮其私智而不師古謂霸王之業欲以力征經營天下五年卒亡其國身死東城尚不覺寤而不自責過矣乃引天亡我非用兵之罪也豈不謬哉淮南衡山史記詩之所謂戎狄是膺荆舒是懲信哉是言也淮南衡山親為骨肉疆土千里列為諸侯不務遵蕃臣職以承輔天子而專挾邪僻之計謀為畔逆仍父子再亡國各不終其身為天下笑此非獨王過也亦其俗薄臣下漸靡使然也夫荆楚僄勇輕悍好作亂乃自古記之矣論孔子史記詩有之高山仰止景行行止雖不能至然心鄉往之余讀孔氏書想見其為人適魯觀仲尼廟堂車服禮器諸生以時習禮其家余低回留之不能去云天下君王至于賢人衆矣當時則榮沒則巳焉孔子布衣傳十餘世學者宗之自天子王侯中國言六藝者折中于夫子可謂至聖矣老子申韓史記老子所貴道虛無因應變化于無為故著書辭稱微妙難識莊子散道德放論要亦歸之自然申子卑卑施之于名實韓子引繩墨切事情明是非其極慘礉少恩皆原于道德之意而老子深逺矣孫武吳起史記世俗所稱師旅皆道孫子十三篇吳起兵法世多有故弗論論其行事所設施者語曰能行之者未必能言能言之者未必能行孫子籌䇿龎涓明矣然不能早救患于被刑吳起説武侯以形勢不如德然行之于楚以刻暴少恩亡其軀悲夫論平原君虞卿史記平原君翩翩濁世之佳公子也然未睹大體鄙語曰利令智昏平原君貪馮亭邪説使趙陷長平兵四十餘萬衆邯鄲幾亡虞卿料事揣情為趙畫䇿何其工也及不忍魏齊卒困于大梁庸夫且知其不可况賢人乎然虞卿非窮愁亦不能著書以自見于後世云藺相如史記知死必勇非死者難也處死者難方藺相如引璧睨柱及叱秦王左右勢不過誅然士或怯懦而不敢發相如一奮其氣威信敵國退而讓頗名重太山其處智勇可謂兼之矣蒙恬史記吾適北邊自直道歸行觀蒙恬所為秦築長城亭鄣塹山堙谷通直道固輕百姓力矣夫秦之初滅諸侯天下之心未定痍傷者未瘳而恬為名將不以此時強諫振百姓之急養老存孤務修衆庶之和而阿意興功此其兄弟遇誅不亦宜乎何乃罪地脈哉韓信史記吾如淮隂淮隂人為余言韓信雖為布衣時其志與衆異其母死貧無以葬然乃行營髙敞地令其旁可置萬家余視其母冢良然假令韓信學道謙讓不伐已功不矜其能則庶幾哉于漢家勳可以比周召太公之徒後世血食矣不務出此而天下巳集乃謀畔逆夷滅宗族不亦宜乎列子古史劉向論列子書穆王湯問迂誕恢詭非君子之言今觀穆王與化人遊若清都紫微鈞天廣樂帝之所居而夏革所言四海之外天地之表無極無盡此固後世仙佛之常言理之當然而漢之儒者未聞焉耳孟子稱楊氏為我其害至于無君楊朱之説不見于世而列子時取之蓋其所以為我者必有聞于大道而失于偏故列子莊子時取其合者載焉若楊朱之篇以愛身故至于遺禮義毁名節無所復顧此則孟子所謂無君者矣雖列子亦無取焉耳列子之徒不知其師之詳以為朱之言皆不可棄而并録之過矣戾太子漢書巫蠱之禍豈不哀哉此不唯一江充之辜亦有天時非人力所致焉建元六年蚩尤之旗見其長竟天後遂命將出征略取河南建置朔方其春戾太子生自是之後師行三十年兵所誅屠夷滅死者不可勝數及巫蠱事起京師流血僵尸數萬太子子父皆敗故太子生長于兵與之終始何獨一嬖臣哉秦始皇即位三十九年內平六國外攘四夷死人如亂麻暴骨長城之下頭盧相屬于道不一日而無兵由是山東之難興四方潰而逆秦秦將吏外畔賊臣內發亂作蕭牆禍成二世故曰兵猶火也弗戢必自焚信矣是以蒼頡作書止戈為武聖人以武禁暴整亂止息兵戈非以為殘而興縱之也易曰天之所助者信也君子履信思順自天祐之吉無不利也故田千秋指明蠱情章太子之寃千秋材知未必能過人也以其銷惡運遏亂原因衰激極道迎善氣傳得天人之祐助云蕭曹漢書蕭何曹參皆起秦刀筆吏當時録録未有竒節漢興依日月之末光何以信謹守管籥參與韓信俱征伐天下既定因民之疾秦法順流與之更始二人同心遂安海內淮隂黥布等已滅唯何參擅功名冠羣后聲施後世為一代宗臣慶流苗裔盛矣哉蒯通等漢書仲尼惡利口之覆邦家蒯通一説而喪三雋其得不烹者幸也伍被安于危國身為謀主忠不終而詐讐誅夷不亦宜乎書放四罪詩歌青蠅春秋以來禍敗多矣昔子翬謀桓而魯隱危欒書搆郤而晉厲弒豎牛奔仲叔孫卒郈伯毁季昭公逐費忌納女楚建走宰嚭譛胥夫差喪李園進妹春申斃上官訴屈懷王執趙高敗斯二世縊伊戾坎盟宋痤死江充造蠱太子殺息夫作姦東平誅皆自小覆大繇疏陷親可不懼哉可不懼哉司馬相如漢書司馬遷稱春秋推見至隱易本隱以之顯大雅言王公大人而德逮黎庶小雅譏小已之得失其流及上所言雖殊其合德一也相如雖多虛辭濫説然要其歸引之于節儉此亦詩之風諫何異揚雄以為靡麗之賦勸百而風一猶騁鄭衛之聲曲終而奏雅不巳戲乎東方朔漢書劉向言少時數問長老賢人通于事及朔時者皆曰朔口諧倡辨不能持論喜為庸人誦説故今後世多傳聞者而揚雄亦以為朔言不純師行不純德其流風遺書蔑如也然朔名過實者以其詼達多端不名一行應諧似優不窮似智正諫似直穢德似隱非夷齊而是柳下惠戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢其滑稽之雄乎朔之詼諧逢占射覆其事浮淺行于衆庶童兒牧豎莫不眩耀而後世好事者因取竒言怪語附著之朔故詳録焉司馬遷漢書自古書契之作而有史官其載籍博矣至孔氏纂之上繼唐堯下訖秦繆唐虞以前雖有遺文其語不經故言黃帝顓頊之事未可明也及孔子因魯史記而作春秋而左邱明輯其本事以為之傳又纂異同為國語又有世本録黃帝以來至春秋時帝王公侯卿大夫祖世所出春秋之後七國並爭秦兼諸侯有戰國䇿漢興伐秦定天下有楚漢春秋故司馬遷據左氏國語采世本戰國䇿述楚漢春秋接其後事訖于大漢其言秦漢詳矣至于采經托傳分散數家之事甚多疏略或有抵梧亦其涉獵者廣博貫穿經傳馳騁古今上下數千載間斯以勤矣又其是非頗謬于聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇藝利而羞貧賤此其所蔽也然而劉向揚雄博極羣書皆稱遷有良史之材服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録嗚呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤書亦信矣迹其所以自傷悼小雅巷伯之倫夫唯大雅既明且哲能保其身難矣哉劉向漢書仲尼稱材難不其然與自孔子後綴文之士衆矣唯孟軻荀況董仲舒司馬遷劉向揚雄此數公者皆博物洽聞通達古今其言有補於世傳曰聖人不出其間必有命世者焉豈近是乎劉氏鴻範論發明大傳著天人之應七略剖判藝文總百家之緒三統厯譜考步日月五星之度有意其推本之也嗚呼向言山陵之戒于今察之哀哉指明梓柱以推廢興昭矣豈非直諒多聞古之益友與揚雄漢書雄之自序云爾初雄年四十餘自蜀來遊至京師大司馬車騎將軍王音奇其文雅召以為門下史薦雄待詔嵗餘奏羽獵賦除為郎給事黃門與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦莫不拔擢而雄三世不徙官及莽篡位談説之士用符命稱功德獲封爵者甚衆雄復不侯以耆老久次轉為大夫恬于藝利乃如是實好古而樂道其意欲求文章成名于後世以為經莫大于易故作太玄傳莫大于論語作法言史篇莫善于倉頡作訓纂針莫善于虞針作州針賦莫深于離騷反而廣之辭莫麗于相如作四賦皆斟酌其本相與放依而馳騁云用心于內不求于外于時人皆曶之唯劉歆及范逡敬焉而桓談以為絶倫王莽時劉歆甄豐皆為上公莽既以符命自立即位之後欲絶其原以神前事而豐子尋歆子棻復獻之莽誅豐父子投棻四裔辭所連及便收不請時雄校書天祿閣上治獄使者來欲收雄雄恐不能自免乃從閣上自投下幾死莽聞之曰雄素不與事何故在此間問其故乃劉棻嘗從雄學作竒字雄不知情有詔勿問然京師為之語曰惟寂寞自投閣爰清淨作符命雄以病免復召為大夫家素貧嗜酒人希至其門時有好事者載酒肴從遊學而巨鹿侯芭常從雄居受其太玄法言焉劉歆亦嘗觀之謂雄曰空自苦今學者有祿利然尚不能明易又如玄何吾恐後人用覆醬瓿也雄笑而不應年七十一天鳯五年卒侯芭為起墳喪之三年大司空王邑納言嚴尤聞雄死謂桓談曰子常稱揚雄書豈能傳於後世乎談曰必傳顧君與談不及見也凡人賤近而貴逺親見揚子雲祿位容貌不能動人故輕其書昔老聃著虛無之言兩篇薄仁義非禮學然後世好之者尚以為過于五經自漢文景之君及司馬遷皆有是言今揚子之書其義至深而論不詭于聖人若使遭遇時君更越賢知為所稱善則必度越諸子矣諸儒或譏以為雄非聖人而作經猶春秋吳楚之君僣號稱王蓋誅絶之罪也自雄之殁至今四十餘年其法言大行而玄終不顯然篇籍具存吳漢後漢書論曰吳漢自建武世常居上公之位終始倚愛之親諒由質簡而強力也子曰剛毅木訥近仁斯豈漢之方乎昔陳平智有餘以見疑周勃質朴忠而見信夫仁義不足以相懷則智者以有餘為疑而朴者以不足取信矣鄧訓隲後漢書論曰漢世外戚自東西京十有餘族非徒豪橫盈極自取災故必于貽釁後主以至顛敗者其數有可言焉何則恩非已結而權以先之情疏禮重而枉性圖之來寵方授地既害之隙開勢謝讒亦勝之悲哉隲悝兄弟委逺時柄忠勞王室而終莫之免斯樂生所以泣而辭燕也竇憲後漢書論曰衛青霍去病資強漢之衆連年以事胸奴國耗太半矣而胸奴未之勝後世猶傳其良將豈非以身名自終耶竇憲率羌人邉雜之師一舉而空朔庭至乃追奔稽落之表飲馬北鞮之曲銘石負鼎薦告清廟列其功庸兼茂于前多矣而後世莫稱者章末釁以降其實也是以下流君子所甚惡焉夫二三子得之不過房幄之間非復搜揚仄陋選舉而登也當青病奴僕之時竇將軍念咎之日乃庸力之不暇思鳴之無晨何意裂膏腴享崇號乎東方朔稱用之則為虎不用則為鼠信矣以此言之士有懷琬琰以就煨塵者亦何可支哉龎參橋玄後漢書論曰任棠薑岐世著其清結甕牖而辭三命殆漢陽之幽人乎龎參躬求賢之禮故民恱其政橋玄厲邦君之威而衆失其情夫豈力不足歟將有道在焉如令其道可忘則強梁勝矣語曰三軍可奪帥匹夫不可奪志子貢曰寧喪千金不失士心昔段干木踰牆而避文侯之命泄柳閉門不納穆公之請貴必有所屈賤亦有所伸矣樊英後漢書論曰漢世之所謂名士者其風流可知矣雖弛張趣舍時有未純于刻情修容依倚道藝以就其聲價非所能通物方𢎞時務也及徴樊英楊厚朝廷若待神明至竟無他異英名最高毁最甚李固朱穆等以為處士純盜虛名無益于用故其所以然也然而後進希之以成名世主禮之以得衆原其無用亦所以為用則其有用或歸于無用矣何以言之夫煥乎文章時或乖用本乎禮樂適末或疏及其陶搢紳藻心性使由之而不知者豈非道邈用表乖之數迹乎而或者忽不踐之地賖無用之功至乃誚譟逺術賤斥國華以為力詐可以救淪敝文律足以致寧平智盡于猜察道足于法令雖濟萬世其將與夷狄同也孟軻有言曰以夏變夷不聞變夷于夏况有未濟者乎馮衍後漢書論曰夫貴者負勢而驕人才士負能而遺行其大略然也二子不其然乎馮衍之引挑妻之譬得矣夫納妻皆知取詈已者而取士則不能何也豈非反妒情易而恕義情難光武雖得之于鮑永猶失之于馮衍夫然義直所以見屈于既往守節故亦彌阻于來情嗚呼丁鴻後漢書論曰孔子曰太伯三以天下讓民無得而稱焉孟子曰聞伯夷之風者貪夫亷懦夫有立志若乃太伯以天下而違周伯夷率潔清以去國並未始有其讓也故太伯稱至德伯夷稱賢人後世聞其讓而慕其風徇其名而昧其致所以激詭行生而取與妄矣至夫鄧彪劉愷讓其弟以取義使弟受非服而已厚其名于義不亦薄乎君子立言非茍顯其理將以啓天下之方悟者立行非獨善其身將以訓天下之方動者言行之所開塞可無慎哉原丁鴻之心主于忠愛乎何其終悟而從義也異夫數子類乎徇名者焉馬融後漢書論曰馬融辭命鄧氏逡巡隴漢之間將有意于居貞乎既而羞曲士之節惜不資之軀終以奢樂恣性黨附成譏固知識能匡欲者鮮矣夫事苦則矜全之情薄生厚故安存之慮深登高不懼者胥靡之人也坐不垂堂者千金之子也原其大略歸于所安而巳矣物我異觀亦更相笑也烏震五代史嗚呼忠孝以義則兩得吾既巳言之矣若烏震者可謂忠乎甚矣震之不思也夫食人之祿而任人之事事有任專其責而其國之利害由已之為不為為之雖利于國而有害于其親者猶將辭其祿而去之矧其事衆人所皆可為而任不專已又其為與不為國之利害不繫焉者如是而不顧其親雖不以為利猶曰不孝况因而利之乎夫能事其親以孝然後能事其君以忠若烏震者可謂大不孝矣尚何有于忠乎燕蘇轍燕召公之後立國于蠻貊之間禮樂微矣春秋之際未嘗出與諸侯會盟至于戰國亦以耕戰自守安樂無事未嘗被兵文公二十八年蘇秦入燕始以縱橫之事説之自是兵交中國無復寧嵗六世而亡吳自太伯至壽夢十七世不通諸侯自巫臣入吳教吳乘車戰射與晉楚力爭七世而亡燕吳雖南北絶逺而興亡之迹大略相似彼説客策士借人之國以自快于一時可矣而為國者因而徇之猖狂恣行以速滅亡何哉夫起于僻陋之中而奮于諸侯之上如商周先王以德服人則可不然皆禍也至太子丹不聽鞠武而用田光欲以一匕首斃秦雖使荆軻能害秦王亦何救秦之滅燕而况不能哉此又蘇秦之不取也趙蘇轍趙于戰國強國也非大失計未遽亡也孝成王貪上黨之利不聽趙豹而聽趙勝以致秦怒一失矣使亷頗拒秦長平聽秦之間而使趙括代頗再失矣趙括既敗邯鄲被圍虞卿請以重寶附楚魏以援國示秦則秦媾可合王不能用而聽趙豹使鄭朱入秦求媾諸侯由此莫肯救趙三失矣積此三失以致大敗僅能自存由此觀之非獨秦能敗趙而趙之所以自敗者多矣故善為國者必先定計慮計慮既定雖有禍敗不至亡國也蘇秦蘇轍秦強而諸侯弱遊談之士為橫者易為功為從者難為力然而從成則諸侯利而秦病橫成則秦帝而諸侯虜要之二者皆出于權譎而從為愈歟蘇秦本説秦為橫不合而激于燕趙甘心于其所難為之期年歃血于洹水之上可不謂能乎然口血未乾犀首一出而齊趙背盟從約皆破蓋諸侯異心譬如連雞不能俱棲勢固然矣而太史公以為約書入秦秦人為之閉函谷者十五年此説客之浮語而太史公信之過矣穰侯蘇轍秦誅商君逐穰侯君臣皆失之矣彼二子者知得而不知喪雖智能霸秦而不能免其身蓋無足言者而惠王以怨誅鞅至誣以叛逆昭王以逼遷冉至出老母逐弱弟而不顧甚矣其少恩也彼公子虔方欲報怨固不暇為國慮矣而范雎欲毁人以自成而至于是可畏也哉蒙恬蘇轍蒙氏為秦吞滅諸侯其所殘暴多矣子孫以無罪戮死此天意也恬以長城之役竭民力斷地脈自知當死而毅以忠信事上自許無罪死而不厭夫偷合取容咎亞李斯此其所以不免者哉然始皇病于琅琊使毅還禱山川至于沙邱而崩使毅尚從則趙高李斯廢適之謀殆不能發嗚呼天之廢人謀固無所復施耶荀彧蘇轍荀文若之于曹公則漢高帝之子房也董昭建九錫之議文若不欲曹公心不能平以致其死君子惜之或以為文若先識之未究或以為文若欲終致節于漢氏二者皆非文若之心也文若始從曹公于東郡致其算略以摧滅羣雄固以帝王之業許之矣豈其晚節復疑而不豫哉方是時中原略定中外之望屬于曹公矣雖不加九錫天下不歸曹氏而將安往文若之意以為劫而取之則我有力爭之嫌人懷不忍之志徐而俟之我則無嫌而人亦無憾要之必得而免爭奪之纍此文若之本心也惜乎曹公志于速得不忍數年之須以致文若之死九錫雖至而禪代之事至子乃遂此則曹公之陋而非文若之過也文編卷三十五

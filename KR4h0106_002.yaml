body:
  text: 文編卷二明唐順之編芈尹無宇對楚子左傳楚子之為令尹也為王旌以田芈尹無宇斷之曰一國兩君其誰堪之及即位為章華之宫納亡人以實之無宇之閽入馬無宇執之有司弗與曰執人於王宫其罪大矣執而謁諸王將飲酒無宇辭曰天子經略諸侯正封古之制也封略之內何非君土食土之毛誰非君臣故詩曰普天之下莫非王土率土之濱莫非王臣天有十日人有十等王至臺是也下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人於王宫將焉執之周文王之法曰有亡荒閲所以得天下也吾先君文王作僕區之法曰盜所隱器與盜同罪所以封汝也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二王之法取之盜有所在矣王曰取而臣以往盜有寵未可得也遂赦之中山靖王聞樂對漢書臣聞悲者不可為絫欷思者不可為歎息故髙漸離擊築易水之上荆軻為之低而不食雍門子一微吟孟嘗君為之於邑今臣心結日久每聞幼眇之聲不知涕泣之橫集也夫衆喣漂山聚蚊成靁朋黨執虎十夫橈椎是以文王拘於羑里孔子厄於陳蔡此乃蒸庶之成風增積之生害也臣身逺與寡莫為之先衆口鑠金積毁銷骨叢輕折軸羽翮飛肉紛驚逢羅澘然出涕臣聞白日曬光幽隱皆照明月曜夜蚊虻宵見然雲蒸列布杳冥晝昏塵埃抪覆昧不見泰山何則物有蔽之也今臣壅閼不得聞讒言之徒蜂生道遼路逺曾莫為臣聞臣竊自悲也臣聞社鼷不灌屋鼠不薰何則所託者然也臣雖薄也得蒙肺腑位雖卑也得為東藩屬又稱兄今羣臣非有葭莩之親鴻毛之重羣居黨議朋友相為使夫宗室擯郤骨肉氷釋斯伯竒所以流離比干所以橫分也詩云我心憂傷惄焉如搗假寐永歎唯憂用老心之憂矣疢如疾首臣之謂也吾丘夀王議禁民挾弓弩對漢書臣聞古者作五兵非以相害以禁暴討邪也安居則以制猛獸而備非常有事則以設守衛而施行陳及至周室衰微上無明王諸侯力政強侵弱衆暴寡海內抏敝巧詐並生是以知者陷愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令去仁恩而任刑戮墮名城殺豪傑銷甲兵折鋒刃其後民以耰鉏箠梃相撻擊犯法滋衆盜賊不勝至于赭衣塞路羣盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭明德建太平舉俊材興學官三公有司或由窮巷起白屋裂地而封宇內日化方外鄉風然而盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也孔子曰吾何執執射乎大射之禮自天子降及庶人三代之道也詩云大侯既抗弓矢斯張射夫既同獻爾發功言貴中也愚聞聖王合射以明教矣未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也竊以為亡益於禁姦而廢先王之典使學者不得習行其禮大不便東方朔化民有道對漢書堯舜禹湯文武成康上古之事經厯數千載尚難言也臣不敢陳願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劒莞蒲為席兵木亡刃衣緼亡文集上書囊以為殿帷以道德為麗以仁義為凖于是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳯闕右神明號稱千門萬戶木土衣綺繡狗馬被繢罽宫人簪玳瑁垂珠璣設戲車教馳逐飾文采叢珍怪撞萬石之鐘擊雷霆之鼓作俳優舞鄭女上為淫侈如此而欲使民獨不奢侈失農事之難者也陛下誠能用臣朔之計推甲乙之帳燔之於四通之衢却走馬示不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之毫釐差以千里願陛下留意察之賈捐之罷珠崖對漢書臣幸得遭明盛之朝蒙危言之䇿無忌諱之患敢昧死竭卷卷臣聞堯舜聖之盛也禹入聖域而不優故孔子稱堯曰大哉韶曰盡善禹曰無間以三聖之德地方不過數千里西被流沙東漸于海朔南暨聲教迄于四海欲與聲教則治之不欲與者不強治也故君臣歌德含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黃西不過氐羌南不過蠻荆北不過朔方是以頌聲並作視聽之類咸樂其生越裳氏重九譯而獻此非兵革之所能致及其衰也南征不還齊桓救其難孔子定其文以至乎秦興兵逺攻貪外虛內務欲廣地不慮其害然地南不過閩越北不過太原而天下潰畔禍卒在於二世之末長城之歌至今未絶賴聖漢初興為百姓請命平定天下至孝文皇帝閔中國未安偃武行文則斷獄數百民賦四十丁男三年而一事時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行日三十里朕乘千里之馬獨先安之於是還馬與道里費而下詔曰朕不受獻也其令四方毋求來獻當此之時逸遊之樂絶竒麗之賂塞鄭衛之倡微矣夫後宫盛色則賢者隱處佞人用事則諍臣杜口而文帝不行故諡為孝文廟稱太宗至孝武皇帝元狩六年太倉之粟紅腐而不可食都內之錢貫朽而不可校乃探平城之事録冒頓以來數為邊害籍兵厲馬因富民以攘服之西連諸國至于安息東過碣石以玄莵樂浪為郡北郤胸奴萬里更起營塞制南海以為八郡則天下斷獄萬數民賦數百造鹽鐡酒𣙜之利以佐用度猶不能足當此之時寇賊並起軍旅數發父戰死於前子鬭傷於後女子乘亭鄣孤兒號於道老母寡婦飲泣巷哭遙設虛祭想魂乎萬里之外淮南王盜寫虎符隂聘名士關東公孫勇等詐為使者是皆廓地泰大征伐不休之故也今天下獨有關東關東大者獨有齊楚民衆久困連年流離離其城郭相枕席於道路人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中快心幽冥之地非所以救助飢饉保全元元也詩云蠢爾蠻荆大邦為讐言聖人起則後服中國衰則先畔動為國家難自古而患之久矣何況乃復其南方萬里之蠻乎貉越之人父子同川而浴相習以鼻飲與禽獸亡異本不足郡縣置也顓顓獨居一海之中霧露氣濕多毒草蟲蛇水土之害人未見敵戰士自死又非獨珠崖有珠犀玳瑁也棄之不足惜不擊不損威其民譬猶魚鱉何足貪也臣竊以往者羌軍言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此況於勞師逺攻亡士毋功乎求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠崖專用恤關東為憂李尋災異對漢書陛下聖德尊天敬地畏命重民悼懼變異不忘疏賤之臣幸使重臣臨問愚臣不足以奉明詔竊見陛下新即位開大明除忌諱博延名士靡不並進臣尋位卑術淺過隨衆賢待詔食大官衣御府久汚玉堂之署比得召見亡以自效復特見延問至誠自以逢不世出之命願竭愚心不敢有所避庶幾萬分有一可采唯棄須臾之間宿留瞽言考之文理稽之五經揆之聖意以參天心夫變異之來各應象而至臣謹條陳所聞易曰縣象著明莫大乎日月夫日者衆陽之長輝光所燭萬里同晷人君之表也故日將旦清風發羣隂伏君以臨朝不牽於色日初出炎以陽君登朝佞不行忠直進不蔽障日中輝光君德盛明大臣奉公日將入專以一君就房有常節君不修道則日失其度暗昧亡光各有云為其於東方作日初出時隂雲邪氣起者法為牽于女謁有所畏難日出後為近臣亂政日中為大臣欺誣日且入為妻妾役使所營間者日尤不精光明侵奪失色邪氣珥霓數作本起於晨相連至昏其日出後至日中間差愈小臣不知內事竊以日視陛下志操衰於始初多矣其咎恐有以守正直言而得罪者傷嗣害世不可不慎也唯陛下執乾剛之德強志守度毋聽女謁邪臣之態諸保阿乳母甘言悲辭之託斷而勿聽勉強大誼絶小不忍良有不得已可賜以貨財不可私以官位誠皇天之禁也日失其光則星辰放流陽不能制隂隂桀得作間者太白正晝經天宜隆德克躬以執不軌臣聞月者衆隂之長銷息見伏百里為品千里立表萬里連紀妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君德春夏南秋冬北間者月數以春夏與日同道過軒轅上后受氣入太微帝廷楊光輝犯上將近臣列星皆失色厭厭如滅此為母后與政亂朝隂陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足杖矣屋大柱小可為寒心唯陛下親求賢士無強所惡以崇社稷尊強本朝臣聞五星者五行之精五帝司命應王者號令為之節度嵗星主嵗事為統首號令所紀今失度而盛此君指意欲有所為未得其節也又填星不避嵗星者后帝共政相留於奎婁當以義斷之熒惑往來亡常周歷兩宫作態低昻入天門上明堂貫尾亂宫太白發越犯庫兵寇之應也貫黃龍入帝庭當門而出隨熒惑入天門至房而分欲與熒惑為患不敢當明堂之精此陛下神靈故禍亂不成也熒惑厥弛佞巧依藝微言毁譽進類蔽善太白出端門臣有不臣者火入室金上堂不以時解其憂凶填嵗相守又主內亂宜察蕭牆之內毋忽親疏之微誅放佞人防絶萌芽以蕩滌濁濊消散積惡毋使得成禍亂辰星主正四時當效於四仲四時失序則辰星作異今出於嵗首之孟天所以譴告陛下也政急則出蚤政緩則出晚政絶不行則伏不見而為彗茀四孟皆出為易王命四季皆出星家所諱今幸獨出寅孟之月蓋皇天所以篤右陛下也宜深自改治國固不可以戚戚欲速則不逹經曰三載考績三考黜陟加以號令不順四時既往不咎來事之師也間者春三月治大獄時賊隂立逆恐嵗小收季夏舉兵法時寒氣應恐後有霜雹之災秋月行封爵其月土溼奧恐後有雷雹之變夫以喜怒賞罰而不顧時禁雖有堯舜之心猶不能致和善言天者必有效於人設上農而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也易曰時止則止時行則行動靜不失其時其道光明書曰敬授人時故古之王者尊天地重隂陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設羣下請事若陛下出令有繆於時者當知爭之以順時氣臣聞五行以水為本其星玄武婺女天地所紀終始所生水為凖平王道公正修明則百川理落脈通偏黨失綱則踊溢為敗書云水曰潤下隂動而卑不失其道天下有道則河出圖洛出書故河洛決溢所為最大今汝穎畎澮皆川水漂踊與雨水並為民害此詩十月之交所謂不寧不令百川沸騰者也其咎在於皇甫卿士之屬唯陛下留意詩人之言少抑外親大臣臣聞地道柔靜隂之常義也地有上中下其上位震應妃后不順中位應大臣作亂下位應庶民離畔震或於其國國君之咎也四方中央連國歷州俱動者其異最大間者關東地數震五星作異亦未大逆宜務崇陽抑隂以救其咎固志建威閉絶私路拔進英雋退不任職以強本朝夫本強則精神折衝本弱則招殃致凶為邪謀所陵聞往者淮南王作謀之時其所難者獨有汲黯以為公孫𢎞等不足言也𢎞漢之名相於今亡比而尚見輕何況亡𢎞之屬乎故曰朝廷亡人則為賊亂所輕其道自然也天下未聞陛下奇䇿固守之臣也語曰何以知朝廷之衰人人自賢不務於通人故世陵夷馬不伏櫪不可以趨道士不素養不可以重國詩曰濟濟多士文王以寧孔子曰十室之邑必有忠信非虛言也陛下秉四海之衆曾亡柱幹之固守聞於四境殆開之不廣取之不明勸之不篤傳曰土之美者善養禾君之明者善養士中人皆可使為君子詔書進賢良赦小過亡求備以博聚英雋如近世貢禹以言事忠切蒙尊榮當此之時士厲身立名者多禹死之後日日以衰及京兆尹王章坐言事誅滅智者結舌邪偽並興外戚顓命君臣隔塞至絶繼嗣女宫作亂此行事之敗誠可畏而悲也本在積任母后之家非一日之漸往者不可及來者猶可追也先帝大聖深見天意昭然使陛下奉承天統欲矯正之也宜少抑外親選練左右舉有德行道術通明之士充備天官然後可以輔聖德保帝位承大宗下至郎吏從官行能亡以異又不通一藝及博士無文雅者宜皆使就南畝以視天下明朝廷皆賢材君子於以重朝尊君滅凶致安此其本也臣自知所言害身不辟死亡之誅唯財留神反覆愚臣之言文編卷二

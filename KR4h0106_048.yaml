body:
  text: 文編卷四十八明唐順之編移太常博士書劉歆昔唐虞既衰而三代迭興聖帝明王纍起相襲其道甚著周室既微而禮樂不正道之難全也如此是故孔子憂道之不行歷國應聘自衛反魯然後樂正雅頌乃得其所修易序書制作春秋以紀帝王之道及夫子沒而微言絶七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳孔子之道抑而孫吳之術興陵夷至于暴秦燔經書殺儒士設挾書之法行是古之罪道術由是遂滅漢興去聖帝明王遐逺仲尼之道又絶法度無所因襲時獨有一叔孫通略定禮儀天下唯有易卜未有他書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介胄武夫莫以為意至孝文皇帝始使掌故朝錯從伏生受尚書尚書初出於屋壁朽折散絶今其書見在時師傳讀而已詩始萌芽天下衆書往往頗出皆諸子傳說猶廣立於學官為置博士在漢朝之儒唯賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師皆起於建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂崩書缺簡脫朕甚閔焉時漢興已七八十年離於全經固已逺矣及魯恭王壞孔子宅欲以為宫而得古文於壞壁之中逸禮有三十九篇書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所修皆古文舊書多者二十餘通藏於祕府伏而未發孝成皇帝閔學殘文缺稍離其真乃陳發祕藏校理舊文得此三事以考學官所傳經或脫簡傳或間編傳問民間則有魯國柏公趙國貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絶之闕茍因陋就寡分文析字煩言碎辭學者罷老且不能究其一藝信口說而背傳記是末師而非往古至於國家將有大事若立辟雍封禪巡狩之儀則幽冥而莫知其原猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懷妬嫉不考情實雷同相從隨聲是非抑此三學以尚書為備謂左氏為不傳春秋豈不哀哉今聖上德通神明繼統揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓樂與士君子同之故下明詔試左氏可立又遣近臣奉㫖銜命將以輔弱扶微與二三君子比意同力冀得廢遺今則不然深閉固距而不肯試猥以不誦絶之欲以杜塞餘道絶滅微學夫可與樂成難與慮始此乃衆庶之所為耳非所望士君子也且此數家之事皆先帝所親論今上所考視其古文舊書皆有徴驗外內相應豈茍而已哉夫禮失求之於野古文不猶愈於野乎往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶廣立穀梁春秋梁丘易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寧過而立之傳曰文武之道未墜於地在人賢者識其大者不賢者識其小者今此數家之言所以兼包大小之義豈可偏絶哉若必専已守殘黨同門妬道真違明詔失聖意以陷於文吏之議甚為二三君子不取也黃州上文潞公書蘇軾軾再拜孟夏漸熱恭惟留守太尉執事台候萬福承以元功正位兵府備物典冊首冠三公雖曽孫之遇絶口不言而金縢之書因事自顯真古今之異事聖朝之光華也有自京師來轉示所賜書教一通行草爛然使破甑敝帚復增九鼎之重軾始得罪倉皇出獄死生未分六親不相保然私心所念不暇及他但顧平生所存名義至重不知今日所犯為已見絶於聖賢不得復為君子乎抑雖有罪不可赦而猶可改也伏念五六日至于旬時終莫能決輒復强顔忍耻飾鄙陋之詞道疇昔之眷以卜於左右遽辱還答恩禮有加豈非察其無他而恕其不及亦如聖天子所以貸而不殺之意乎伏讀灑然知其不肖之軀未死之間猶可以洗濯磨治復入於道德之場追申徒而謝子産也軾始就逮赴獄有一子稍長徒步相隨其餘守舍皆婦女幼稚至宿州御史符下就家取文書州郡望風遣吏發卒圍船搜取老幼幾怖死既去婦女恚罵曰是好著書書成何所得而怖我如此悉取燒之比事定重復尋理十亡其七八矣到黃州無所用心輒復覃思於易論語端居深念若有所得遂因先子之學作易傳九卷又自以意作論語說五卷窮苦多難夀命不可期恐此書一旦復淪沒不傳意欲寫數本留人間念新以文字得罪人必以為凶衰不祥之書莫肯收藏又自非一代偉人不足託以必傳者莫若獻之明公而易傳文多未有力裝寫獨致論語說五卷公退閒暇一為讀之就使無取亦足見其窮不忘道老而能學也軾在徐州時見諸郡盜賊為患而察其人多凶俠不遜因之以饑饉恐其憂不止於竊攘剽殺也輒草具其事上之㑹有㫖移湖州而止家所藏書既多亡軼而此書本以為故紙糊籠篋獨得不燒籠破見之不覺惘然如夢中事輒録其本以獻軾廢逐至此豈敢復言天下事但惜此事粗有益於世既不復施行猶欲公知之此則宿昔之心掃除未盡者也公一讀訖即燒之而已黃州食物賤風土稍可安既未得去去亦無所歸必老於此拜見無期臨紙於邑惟冀以時為國自重答史諷書蘇軾前日蒙訪及以易說一通且欲責某之一言以信之天下大非某智力之所能任也某於易嘗學之矣而未之有得故雖悅足下志意之高辭說之明而不敢斷其義之是非則何能推其義以信之天下雖然足下屬我良重不可以無說蓋學者君子之本務而教者聖人之餘事故學則求之教則應之有餘則應不足則求蓋有餘而求之者有矣未有不足而能應者也蓋見求而不應者矣未有不求而應之者也為足下計亦志於學而已學足乎已則不有知於上必有知於下不有傳於今必有傳於後不幸而不見知於上下而不傳於今又不傳於後古之人蓋猶不憾也知我者其天乎此乃易所謂知命也命者非獨貴賤死生爾萬物之廢興皆命也孟子曰君子行法以俟命而已矣且足下求以誨人者也道無求而誨之者求人而誨之則喪道喪道以求傳道則孰取以為道足下其試思之答張籍書韓愈愈始者望見吾子於人人之中固有異焉及聆其音聲接其辭氣則有願交之志因緣幸㑹遂得所圖豈惟吾子之不遺抑僕之所遇有時焉耳近者嘗有意吾子之闕焉無言意僕所以交之之道不至也今乃大得所圖脫然若沈疴去體灑然若執熱者之濯清風也然吾子所論排釋老不若著書囂囂多言徒相為訾若僕之見則有異乎此也夫所謂著書者義止於辭耳宣之於口書之於簡何擇焉孟軻之書非軻自著軻既殁其徒萬章公孫丑相與記軻所言焉耳僕自得聖人之道而誦之排前二家有年矣不知者以僕為好辨也然從而化者亦有矣聞而疑者又有倍焉頑然不入者親以言諭之不入則其觀吾書也固將無得矣為此而止吾豈有愛於力乎哉然有一說化當世莫若口傳來世莫若書又懼吾力之未至也三十而立四十而不惑吾於聖人既過之猶懼不及矧今未至固有所未至耳請待五六十然後為之冀其少過也吾子又譏吾與人人為無實駁雜之說此吾所以為戲耳比之酒色不有間乎吾子議之似同浴而譏裸裎也若商論不能下氣或似有之當更思而悔之耳博塞之譏敢不承教其他俟相見薄晚須到公府言不能盡愈再拜重答張籍書韓愈吾子不以愈無似意欲推而納諸聖賢之域拂其邪心增其所未髙謂愈之質有可以至於道者浚其源導其所歸溉其根將食其實此盛德者之所辭讓況於愈者哉抑其中有宜復者故不可遂已昔者聖人之作春秋也既深其文辭矣然猶不敢公傳道之口授弟子至於後世然後其書出焉其所以慮患之道微也今夫二氏之所宗而事之者下乃公卿輔相吾豈敢昌言排之哉擇其可語者誨之猶時與吾悖其聲嘵嘵若遂成其書則見而怒之者必多矣必且以我為狂為惑其身之不能恤書於吾何有夫子聖人也且曰自吾得子路而惡聲不入於耳其餘輔而相者周天下猶且絶糧於陳畏於匡毁於叔孫奔走於齊魯宋衛之郊其道雖尊其窮也亦甚矣賴其徒相與守之卒有立於天下向使獨言之而獨書之其存也可冀乎今夫二氏行乎中土也蓋六百年有餘矣其植根固其流波漫非可以朝令而夕禁也自文王沒武王周公成康相與守之禮樂皆在及乎夫子未久也自夫子而及乎孟子未久也自孟子而及乎揚雄亦未久也然猶其勤若此其困若此而後能有所立吾其可易而為之哉其為也易則其傳也不逺故余所以不敢也然觀古人得其時行其道則無所為書書者皆所為不行乎今而行乎後世者也今吾之得吾志失吾志未可知俟五六十為之未失也天不欲使兹人有知乎則吾之命不可期如使兹人有知乎非我其誰哉其行道其為書其化今其傳後必有在矣吾子其何遽戚戚於吾所為哉前書謂吾與人商論不能下氣若好勝者然雖誠有之抑非好已勝也好己之道勝也非好己之道勝也已之道乃夫子孟軻揚雄所傳之道也若不勝則無以為道吾豈敢避是名哉夫子之言曰吾與回言終日不違如愚則其與衆人辨也有矣駮雜之譏前書盡之吾子其復之昔者夫子猶有所戲詩不云乎善戲謔兮不為虐兮記曰張而不弛文武不能也惡害於道哉吾子其未之思乎孟君將有所適思與吾子别庶幾一來上兩制諸公書蘇轍轍讀書至於諸子百家紛紜同異之辨後世工巧組繡鑽研離析之學蓋嘗喟然太息以為聖人之道譬如山海藪澤之奧人之入於其中者莫不皆得其所欲充足飽滿各自以為有餘而無慕乎其外今夫班輸共工旦而操斧斤以遊叢林取其大者以為楹小者以為桷圓者以為輪挺者以為軸長者擾雲霓短者蔽牛馬大者擁丘陵小者伏榛莽芟夷蹶取皆自以為盡山林之奇怪矣而獵夫漁師結網聚餌左彊弓右毒矢陸攻則斃象犀水伐則執蛟鱓熊羆虎豹之皮毛黿龜犀兕之骨革上盡飛鳥下及走獸昆蟲之類紛紛籍籍折翅捩足鱗鬛委頓縱橫滿前肉登鼎俎膏潤砧几皮革齒骨披裂四出被於器用求珠之工隋侯夜光間以纇玭磊落的皪充滿其家求金之工輝赫晃蕩鏗鏘交戞遍為天下冠冕佩帶飲食之飾此數者皆自以為能盡山海之珍然山海之藏終滿而莫見其盡昔者夫子及其生而從之遊者蓋三千餘人是三千人者莫不皆有得於其師是以從之周旋奔走逐於宋魯饑餓於陳蔡困厄而莫有去之者蓋顔淵見於夫子而出告人曰吾能知之子路子貢冉有出而告人亦曰吾知之下而至於邽巽孔忠公西輿公西針此數子者門人之下第者也竊窺於道德之光華而有聞於議論之末皆以自得於一世其後田子方段干木之徒講之不詳乃竊以為虛無淡泊之說而吳起禽滑釐之類又以猖狂於戰國蓋夫子之道分散四布後之人得其遺波餘澤者至於如此而楊朱墨翟莊周鄒衍田駢慎到韓非申不害之徒又不見夫子之大道皇皇惑亂譬如陷於大澤之陂荆榛棘茨蹊隧滅絶求以自致於通衢而不可得乃妄冒蒺藜蹈崖谷崎嶇繚繞而不能自止何者彼亦自以為已之得之也轍嘗怪古之聖人既已知之矣而不遂以明告天下而著之六經六經之說皆微見其端而非所以破天下之疑惑使之一見而寤者是以世之君子紛紛至此而不可執也今夫易者聖人之所以盡天下剛柔喜怒之情吉凶得失之際以教天下之趨利避害而世之說者王氏韓氏至以老子之虛無京房焦貢至以隂陽災異之數言詩者不言咏歌勤苦酒食燕樂之際極歡極戚而不違於道而言五際子午卯酉之事言書者不言其君臣之歡吁俞嗟嘆有以深感天下而論其魯誓秦誓之不當作也夫孔子豈不知後世之至此極歟其意以為後之學者無所據依感發以自盡其才是以說為六經而使之求之蓋又欲其深思而得之也是以不為明著其說使天下各以其所長而求之故曰仁者見之謂之仁智者見之謂之智而子貢亦曰在人賢者識其大者不賢者識其小者夫使仁者效其仁智者效其智賢者推明其大而不遺其小小者樂致其小以自附於大各因其才而盡其力以求其至微至密之地則天下將有終身於其說而無倦者矣至於後世不明其意患乎異說之多而學者之難明也於是舉聖人之微言而折之以一人之私意而傳疏之學橫放於天下由是學者愈怠而聖人之說益以不明今夫使天下之人因說者之異同得以縱觀博覽而辨其是非論其可否推其精粗而後至於微密之際則講之當益深守之當益固昔者轍之始學也得一書伏而讀之不求其傳而惟其書之知求之而莫得則反覆而思之至於終日而莫見而後退而求其傳何者懼其入於心之易而守之不堅也及既長乃觀百家之書縱橫顛倒可喜可愕無所不讀泛然無所適從蓋晚而讀孟子而後遍觀乎百家而不亂也而世之言者曰學者不可以讀天下之雜說不幸而見之則小道異術將乘間而入於其中雖揚雄尚然曰吾不觀非聖之書以為世之賢人所以自養其心者如人之弱子幼弟不當出而置之於紛華雜擾此何其不思之甚也古之所謂知道者邪詞入之而不能蕩詖詞犯之而不能訐爵祿不能使之驕貧賤不能使之辱如使深居自閉於閨闥之中兀然頽然而曰知道知道云者此乃所謂腐儒者也古者伯夷隘柳下惠不恭隘與不恭是君子之所不為也而孔子曰伯夷叔齊不降其志不辱其身柳下惠少連降志而辱身言中倫行中慮至於孟子惡鄉原之敗俗而知於陵仲子之不可常也美禹稷之汲汲於天下而知顔氏之自樂之非固也知天下之諸侯其所取之為盜而知王者之不必盡誅也知賢者之不可召而知召之役之為義也故士之言學者皆曰孔孟何者以其知道而已今轍山林之匹夫何敢自附於孟子然其所以泛觀天下之異說三代以來興亡治亂之際而皎然其有以折之者蓋其學出於孟子而不可誣也今年春天子將求直言之士而轍適來調官京師舍人楊公不知其不肖取其鄙野之文五十篇而薦之俾與明召之末伏惟執事方今之偉人而朝之名卿也其德業之所服聲華之所耀孰不欲一見以效薄技於左右夫其五十篇之文從中而下則執事亦既見之矣是以不敢復以為獻姑述其所以為學之道而執事試觀焉上兵部李侍郎書韓愈十二月九日將仕郎守江陵府法曹參軍韓愈謹上書侍郎閣下愈少鄙鈍於時事都不通曉家貧不足以自活應舉覓官凡二十年矣薄命不幸動遭讒謗進寸退尺卒無所成性本好文學因困厄悲愁無所告語遂得究窮於經傳史記百家之說沈濳乎訓義反復乎句讀礱磨乎事業而奮發乎文章凡自唐虞已來編簡所存大之為河海髙之為山嶽明之為日月幽之為鬼神纎之為珠璣華實變之為雷霆風雨奇辭奧㫖靡不通達惟是鄙鈍不通曉於時事學成而道益窮年老而智益困私自憐悼悔其初心髮秃齒豁不見知已夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聼而識之者難遇也伏以閣下內仁而外義行髙而德巨尚賢而與能哀窮而悼屈自江而西既化而行矣今者入守內職為朝廷大臣當天子新即位汲汲於理化之日出言舉事宜必施設既有聽之之明又有振之之力寧戚之歌鬷明之言不發於左右則後而失其時矣謹獻舊文一卷扶樹教道有所明白南行詩一卷舒憂娛悲雜以瓌怪之言時俗之好所以諷於口而聽於耳也如賜覽觀亦有可采干瀆嚴尊伏增惶恐愈再拜答李翊書韓愈六月二十六日愈白李生足下生之書辭甚髙而其問何下而恭也能如是誰不欲告生以其道道德之歸也有日矣況其外之文乎抑愈所謂望孔子之門牆而不入于其宫者焉足以知是且非邪雖然不可不為生言之生所謂立言者是也生所為者與所期者甚似而幾矣抑不知生之志蘄勝於人而取於人邪將蘄至於古之立言者邪蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於勢利養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戞戞乎其難哉其觀於人不知其非笑之為非笑也如是者亦有年猶不改然後識古書之正僞與雖正而不至焉者昭昭然白黑分矣而務去之乃徐有得也當其取於心而注於手也汨汨然來矣其觀於人也笑之則以為喜譽之則以為憂以其猶有人之說者存也如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉雖然不可以不養也行之乎仁義之途游之乎詩書之源無迷其途無絶其源終吾身而已矣氣水也言浮物也水大而物之浮者大小畢浮氣之與言猶是也氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂幾於成乎雖幾於成其用於人也奚取焉雖然待用於人者其肖於器邪用與舍屬諸人君子則不然處心有道行已有方用則施諸人舍則傳諸其徒垂諸文而為後世法如是者其亦足樂乎其無足樂也有志乎古者希矣志乎古必遺乎今吾誠樂而悲之亟稱其人所以勸之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不志乎利聊相為言之愈白答陳商書韓愈愈白辱惠書語髙而㫖深三四讀尚不能通曉茫然增愧赧又不以其淺弊無過人知識且喻以所守幸甚愈敢不吐情實然自識其不足補吾子所須也齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律吕客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世求祿利行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟文雖工不利於求求不得則怒且怨不知君子必爾為不也故區區之心每有來訪者皆有意於不肖者也略不辭讓遂盡言之惟吾子諒察愈白答劉正夫書韓愈愈白進士劉君足下辱箋教以所不及既荷厚賜且愧其誠然幸甚幸甚凡舉進士者於先進之門何所不往先進之於後輩茍見其至寧可以不答其意邪來者則接之舉城士大夫莫不皆然而愈不幸獨有接後輩名名之所存謗之所歸也有來問者不敢不以誠答或問為文宜何師必謹對曰宜師古聖賢人曰古聖賢人所為書具存辭皆不同宜何師必謹對曰師其意不師其辭又問曰文宜易宜難必謹對曰無難易惟其是爾如是而已非固開其為此而禁其為彼也夫百物朝夕所見者人皆不注視也及覩其異者則共觀而言之夫文豈異於是乎漢朝人莫不能為文獨司馬相如太史公劉向揚雄為之最然則用功深者其收名也逺若皆與世沈浮不自樹立雖不為當時所怪亦必無後世之傳也足下家中百物皆賴而用也然其所珍愛者必非常物夫君子之於文豈異於是乎今後進之為文能深探而力取之以古聖賢人為法者雖未必皆是要若有司馬相如太史公劉向揚雄之徒出必自於此不自於循常之徒也若聖人之道不用文則已用則必尚其能者能者非他能自樹立不因循者是也有文字來誰不為文然其存於今者必其能者也顧常以此為說耳愈於足下忝同道而先進者又常從遊於賢尊給事既辱厚賜又安得不進其所有以為答也足下以為何如愈白答竇秀才書韓愈愈白愈少駑怯於他藝能自度無可努力又不通時事而與世多齟齬念終無以樹立遂發憤篤専於文學學不得其術凡所辛苦而僅有之者皆符於空言而不適於實用又重以自廢是故學成而道益窮年老而智愈困今又以罪黜於朝廷逺宰蠻縣愁憂無聊瘴癘侵加喘喘焉無以冀朝夕足下年少才俊辭雅而氣鋭當朝廷求賢如不及之時當道者又皆良有司操數寸之管書盈尺之紙髙可以釣爵位循次而進亦不失萬一於甲科今乃乘不測之舟入無人之地以相從問文章為事身勤而事左辭重而請約非計之得也雖使古之君子積道藏德遁其光而不曜膠其口而不傳者遇足下之請懇懇猶將倒廩傾囷羅列而進也若愈之愚不肖又安敢有愛於左右哉顧足下之能足以自奮愈之所有如前所陳是以臨事愧耻而不敢答也錢財不足以賄左右之匱急文章不足以發足下之事業稛載而往垂橐而歸足下亮之而已愈白答尉遲生書韓愈愈白尉遲生足下夫所謂文者必有諸其中是故君子慎其實實之美惡其發也不掩本深而末茂形大而聲宏行峻而言厲心醇而氣和昭晰者無疑優游者有餘體不備不可以為成人辭不足不可以為成文愈之所聞者如是有問於愈者亦以是對今吾子所為皆善矣謙謙然若不足而以徴於愈愈又敢有愛於言乎抑所能言者皆古之道古之道不足以取於今吾子何其愛之異也賢公卿大夫在上比肩始進之賢士在下比肩彼其得之必有以取之也子欲仕乎其往問焉皆可學也若獨有愛於是而非仕之謂則愈也嘗學之矣請繼今以言與友人論文書栁宗元古今號文章為難足下知其所以難乎非謂比興之不足恢拓之不逺鑽礪之不工頗纇之不除也得之為難知之愈難耳茍或得其髙朗探其深賾雖有蕪敗則為日月之蝕也大圭之瑕也曷足傷其明黜其寶哉且自孔氏以來兹道大闡家修人勵刓精竭慮者幾千年矣其間耗費簡札役用心神者其可數乎登文章之籙波及後代越不過數十人耳其餘誰不欲爭裂綺繡互攀日月髙視於萬物之中雄峙於百代之下乎率皆縱臾而不克躑躅而不進力䠞勢窮吞志而沒故曰得之為難嗟乎道之顯晦幸不幸繫焉談之辨訥升降繫焉鑒之頗正好惡繫焉交之廣狹屈伸繫焉則彼卓然自得以奮其間者合乎否乎是未可知也而又榮古虐今者比肩疊跡大底生則不遇死而垂聲者衆焉揚雄沒而法言大興馬遷生而史記未振彼之二才且猶若是況乎未甚聞著者哉固有文不傳於後祀聲遂絶於天下者矣故曰知之愈難而為文之士亦多漁獵前作戕賊文史抉其意抽其華置齒牙間遇事蜂起金聲玉耀誑聾瞽之人徼一時之聲雖終淪棄而其奪朱亂雅為害已甚是其所以難也間聞足下欲觀僕文章退發囊笥編其蕪穢心悸氣動交於胸中未知孰勝故久滯而不往也今往僕所著賦頌碑碣文記議論書序之文凡四十八篇合為一通想令治書蒼頭吟諷之也擊轅拊缶必有所擇顧鑒視何如耳還以一字示褒貶焉答韋珩示韓愈相推以文墨事書栁宗元足下所封示退之書云欲推避僕以文墨事且以勵足下若退之之才過僕數人尚不宜推避於僕非其實可知固相假借為之詞耳退之所敬者司焉遷揚雄遷於退之固相上下若雄者如太𤣥法言及四愁賦退之獨未作耳決作之加恢奇至它文過揚雄逺甚雄文遣言措意頗短局滯澀不若退之猖狂恣睢肆意有所作若然者使雄來尚不宜推避而況僕耶彼好奬人善以為不屈已善不可奬故慊慊云爾也足下幸勿信之且足下志氣髙好讀南北史書通國朝事穿穴古今後來無能和而僕稚騃卒無所為但趦趄文墨筆硯淺事今退之不以吾子勵僕而反以僕勵吾子愈非所宜然卒篇欲足下自挫抑合當世事以固當雖僕亦知無出此吾子年甚少知己者如麻不患不顯患道不立耳此僕以自勵亦以佐退之勵足下不宣答貢士廖有方論文書柳宗元三日宗元白得秀才書知欲僕為序然吾為文非茍然易也於秀才則吾不敢愛吾在京都時好以文寵後輩由吾文知名者亦為不少焉自遭斥逐禁錮益為輕薄小兒譁囂羣朋增飾無狀當途人率謂僕垢汚重厚舉將去而逺之今不自料而序秀才秀才無乃未得嚮時之益而受後時之纍吾是以懼潔然盛服而與負塗者處而又何賴焉然觀秀才勤懇意甚久遠不為頃刻私利欲以就文雅則吾曷敢以讓當為秀才言之然而無顯出於今之世視不為流俗所扇動者乃以示之既無以纍秀才亦不增僕之詬罵也計無宜於此若果能是則吾之荒言出矣宗元白答吳充秀才書歐陽修修頓首白先輩吳君足下前辱示書及文三篇發而讀之浩乎若千萬言之多及少定而視焉才數百言爾非夫辭豐意雄霈然有不可禦之勢何以至此然猶自患倀倀莫有開之使前者此好學之謙言也修材不足用於時仕不足榮於世其毁譽不足輕重氣力不足動人世之欲假譽以為重借力而後進者奚取於修焉先輩學精文雄其施於時又非待修譽而為重力而後進者也然而惠然見臨若有所責得非急於謀道不擇其人而問焉者歟夫學者未始不為道而至者鮮焉非道之於人逺也學者有所溺焉爾蓋文之為言難工而可喜易悅而自足世之學者往往溺之一有工焉則曰吾學足矣甚者至棄百事不關于心曰吾文士也職於文而已此其所以至之鮮也昔孔子老而歸魯六經之作數年之頃爾然讀易者如無春秋讀書者如無詩何其用功少而至於至也聖人之文雖不可及然大抵道勝者文不難而自至也故孟子皇皇不暇著書荀卿蓋亦晚而有作若子雲仲淹方勉焉以模言語此道未足而彊言者也後之惑者徒見前世之文傳以為學者文而已故愈力愈勤而愈不至此足下所謂終日不出於軒序不能縱橫髙下皆如意者道未足也若道之充焉雖行乎天地入於淵泉無不之也先輩之文浩乎霈然可謂善矣而又志於為道猶自以為未廣若不止焉孟荀可至而不難也修學道而不至者然幸不甘於所悅而溺於所止因吾子之能不自止又以勵修之少進焉幸甚幸甚修白代人上王樞密求先集序書歐陽修某月日具位某謹齊沐獻書樞密相公閣下某聞傳曰言之無文行而不逺君子之所學也言以載事而文以飾言事信言文乃能表見於後世詩書易春秋皆善載事而尤文者故其傳尤逺荀卿孟軻之徒亦善為言然其道有至有不至故其書或傳或不傳猶繫於時之好惡而興廢之其次楚有大夫者善文其謳歌以傳漢之盛時有賈誼董仲舒司馬相如揚雄能文其文辭以傳由此以來去聖益逺世益薄或衰下迄周隋其間亦時時有善文其言以傳者然皆紛雜滅裂不純信故百不傳一幸而一傳傳亦不顯不能若前數家之焯然暴見而大行也甚矣言之難行也事信矣須文文至矣又繫其所載之大小以見其行逺不逺也書載堯舜詩載商周易載九聖春秋載文武之法荀孟二家載詩書易春秋者楚之辭載風雅漢之徒各載其時主聲名文物之盛以為辭後之學者蕩然無所載則其言之不純信其傳之不久逺勢使然也至唐之興若太宗之政開元之治憲宗之功其臣下又爭載之以文其詞或播樂歌或刻金石故其間巨人碩德閎言髙論流鑠前後者恃其所載之在文也故其言之所載者大且文則其傳也章言之所載者不文而又小則其傳也不章某不佞守先人之緒餘先人在太宗時以文辭為名進士以對䇿為賢良方正既而守道純正為賢待制逢時太平奮身揚名宜其言之所載文之所行大而可恃以傳也然未能甚行於世者豈其嗣續不肖不能繼守而泯沒之抑有由也夫文之行雖繫其所載猶有待焉詩書易春秋待仲尼之刪正荀孟屈原無所待猶待其弟子而傳焉漢之徒亦得其史臣之書其始出也或待其時之有名者而後發其既殁也或待其後之紀次者而傳其為之紀次也非其門人故吏則其親戚朋友如夢得之序子厚李漢之序退之也伏惟閣下學老文巨為時雄人出入三朝其能望光輝接步武者惟先君為舊則亦先君之所待也豈小子之敢有請焉謹以家集若干卷數寫獻門下惟哀其誠而幸賜之上歐陽內翰書蘇洵內翰執事洵布衣窮居常竊自歎以為天下之人不能皆賢不能皆不肖故賢人君子之處於世合必離離必合往者天子方有意於治而范公在相府富公為樞密副使執事與余公蔡公為諫官尹公馳騁上下用力於兵革之地方是之時天下之人毛髮絲粟之才紛紛然而起合而為一而洵也自度其愚魯無用之身不足以自奮於其間退而養其心幸其道之將成而可以復見於當世之賢人君子不幸道未成而范公西富公北執事與余公蔡公分散四出而尹公亦失勢奔走於小官洵時在京師親見其事忽忽仰天歎息以為斯人之去而道雖成不復足以為榮也既復自思念往者衆君子之進於朝其始也必有善人焉推之今也亦必有小人焉間之今之世無復有善人也則已矣如其不然也吾何憂焉姑養其心使其道大有成而待之何傷退而處十年雖未敢自謂其道有成矣然浩浩乎其胸中若與曩者異而余公適亦有成功於南方執事與蔡公復相繼登於朝富公復自外入為宰相其勢將復合為一喜且自賀以為道既已粗成而果將有以發之也既又反而思其向之所慕望愛悅之而不得見之者蓋有六人焉今將往見之矣而六人者已有范公尹公二人亡焉則又為之澘然出涕以悲嗚呼二人者不可復見矣而所恃以慰此心者猶有四人也則又以自解思其止於四人也則又汲汲欲一識其面以發其心之所欲言而富公又為天子之宰相逺方寒士未可遽以言通於其前而余公蔡公逺者又在萬里外獨執事在朝廷間而其位差不甚貴可以呌呼扳援而聞之以言而饑寒衰老之病又痼而留之使不克自至於執事之庭夫以慕望愛悅其人之心十年而不得見而其人已死如范公尹公二人者則四人者之中非其勢不可遽以言通者何可以不能自往而遽已也執事之文章天下之人莫不知之然竊自以為洵之知之特深愈於天下之人何者孟子之文語約而意盡不為巉刻斬絶之言而其鋒不可犯韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪惶惑而抑遏蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視執事之文紆餘委備往復百折而條達踈暢無所間斷氣盡語極急言竭論而容與閒易無艱難勞苦之態此三者皆斷然自為一家之文也惟李翺之文其味黯然而長其光油然而幽俯仰揖讓有執事之態陸贄之文遣言措意切近的當有執事之實而執事之才又自有過人者蓋執事之文非孟子韓子之文而歐陽子之文也夫樂道人之善而不為諂者以其人誠足以當之也彼不知者則以為譽人以求其悅已也夫譽人以求其悅已洵亦不為也而其所以道執事光明盛大之德而不自知止者亦欲執事之知其知我也雖然執事之名滿於天下雖不見其文而固已知有歐陽子矣而洵也不幸墮在草野泥塗之中而其知道之心又近而粗成欲徒手奉咫尺之書自託於執事將使執事何從而知之何從而信之哉洵少年不學生二十五嵗始知讀書從士君子遊年既已晚而又不遂刻意厲行以古人自期而視與已同列者皆不勝已則遂以為可矣其後困益甚然後取古人之文而讀之始覺其出言用意與已大異時復內顧自思其才則又似夫不遂止於是而已者由是盡燒其曩時所為文數百篇取論語孟子韓子及其他聖人賢人之文而兀然端坐終日以讀之者七八年矣方其始也入其中而惶然博觀於其外而駭然以驚及其久也讀之益精而其胸中豁然以明若人之言固當然者然猶未敢自出其言也時既久胸中之言日益多不能自制試出而書之已而再三讀之渾渾乎覺其來之易矣然猶未敢以為是也近所為洪範論史論凡七篇執事觀其如何噫嘻區區而自言不知者又將以為自譽以求人之知已也惟執事思其十年之心如是之不偶然也而察之上田樞密書蘇洵天之所以與我者夫豈偶然哉堯不得以與丹朱舜不得以與商均而瞽叟不得奪諸舜發於其心出於其言見於其事確乎其不可易也聖人不得以與人父不得奪諸其子於此見天之所以與我者不偶然也夫其所以與我者必有以用我也我知之不得行之不以告人天固用之我實置之其名曰棄天自卑以求幸其言自小以求用其道天之所以與我者何如而我如此也其名曰䙝天棄天我之罪也褻天亦我之罪也不棄不褻而人不我用不我用者之罪也其名曰逆天然則棄天褻天者其責在我逆天者其責在人在我者吾將盡吾力之所能為者以塞夫天之所以與我之意而求免乎天下後世之譏在人者吾何知焉吾求免夫一身之責之不暇而暇為人憂乎哉孔子孟軻之不遇老於道塗而不倦不愠不怍不沮者夫固知夫責之所在也衛靈魯哀齊宣梁惠之徒不足相與以有為也我亦知之矣抑將盡吾心焉耳吾心之不盡吾恐天下後世無以責夫衛靈魯哀齊宣梁惠之徒而彼亦將有以辭其責也然則孔子孟軻之目將不瞑於地下矣夫聖人賢人之用心也固如此如此而生如此而死如此而貧賤如此而富貴升而為天沈而為泉流而為川止而為山彼不預吾事吾事畢矣竊怪夫後之賢者之不能自處其身也饑寒窮困之不勝而號於人嗚呼使吾誠死於饑寒窮困耶則天下後世之責將必有在彼其身之責不自任以為憂而我取而加之吾身不已過乎今洵之不肖何敢以自列於聖賢然其心亦有所不甚自輕者何則天下之學者孰不欲一蹴而造聖人之域然及其不成也求一言之幾乎道不可得也千金之子可以貧人可以富人非天之所與雖以貧人富人之權求一言之幾乎道不可得也天子之宰相可以生人可以殺人非天之所與雖以生人殺人之權求一言之幾乎道不可得也今洵用力於聖人賢人之術亦已久矣其言語其文章雖不識其果可以有用於今而傳於後與否獨怪其得之之不勞方其致思於心也若或起之得之心而書之紙也若或相之夫豈無一言之幾於道乎千金之子天子之宰相求而不得者一旦在已故其心得以自負或者天其亦有以與我也曩者見執事於益州當時之文淺狹可笑饑寒窮困亂其心而聲律記問又從而破壞其體不足觀也已數年來退居山野自分永棄與世俗日疏濶得以大肆其力於文章詩人之優柔騷人之清深孟韓之溫淳遷固之雄剛孫吳之簡切投之所嚮無不如意常以為董生得聖人之經其失也流而為迂鼂錯得聖人之權其失也流而為詐有二子之才而不流者其惟賈生乎惜乎今之世愚未見其人也作䇿二道曰審勢審敵作書十篇曰權書洵有山田一頃非凶嵗可以無饑力耕而節用亦足以自老不肖之身不足惜而天之所與者不忍棄且不敢褻也執事之名滿天下天下之士用與不用在執事故敢以所謂䇿一道權書十篇者為獻平生之文逺不可多致有洪範論史論七篇近以獻內翰歐陽公度執事與之朝夕相從而議天下之事則斯文也其亦庶乎得陳於前矣若夫其言之可用與其身之可貴與否者執事事也執事責也於洵何有哉答謝舉廉書蘇軾軾啓近奉違亟辱問訊具審起居佳勝感慰深矣軾受性剛簡學汙材下坐廢纍年不敢復齒縉紳自還海北見平生親舊惘然如隔世人況與左右無一日之雅而敢求交乎數賜見臨傾蓋如故幸甚過望不敢言也所示書教及詩賦雜文觀之熟矣大略如行雲流水初無定質但常行於所當行常止於不可不止文理自然姿態橫生孔子曰言之不文行之不逺又曰辭達而已矣夫言止於達意則疑若不文是大不然求物之妙如繫風捕影能使是物了然於心者蓋千萬人而不一遇也而況能使了然於口與手者乎是之謂辭達辭至於能達則文不可勝用矣揚雄好為艱深之詞以文淺易之說若正言之則人人知之矣此正所謂雕蟲篆刻者其太𤣥法言皆是物也而獨悔於賦何哉終身雕蟲而獨變其音節便謂之經可乎屈原作離騷經蓋風雅之再變者雖與日月爭光可也可以其似賦而謂之雕蟲乎使賈誼見孔子升堂有餘矣而乃以賦鄙之至與司馬相如同科雄之陋如此比者甚衆可與知者道難與俗人言也因論文偶及之耳歐陽文忠公言文章如精金美玉市有定價非人所能以口舌貴賤也紛紛多言豈能有益於左右愧悚不已所須惠力法雨堂字軾本不善作大字彊作終不佳又舟中局迫難寫未能如教然軾方過臨江當往遊焉或僧欲有所記録當為作數句留院中慰左右念親之意今已至峽山寺少留即去愈逺惟萬萬以時自愛不宣答李端叔書蘇軾軾聞足下名久矣又於相識處往往見所作詩文雖不多亦足以髣佛其為人矣尋常不通書問怠慢之罪猶可闕略及足下斬然在疚亦不能以一字奉慰舍弟子由至先䝉惠書又復懶不即答頑鈍廢禮一至於此而足下終不棄絶遞中再辱手書待遇益隆覽之面熱汗下也足下才髙識明不應輕許與人得非用黃魯直秦太虛輩語真以為然耶不肖為人所憎而二子獨喜見譽如人嗜昌􅍦羊棗未易詰其所以然者以二子為妄則不可遂欲以移之衆口又大不可也軾少年時讀書作文専為應舉而已既及進士第貪得不已又舉制䇿其實何所有而其科號為直言極諫故每紛然誦說古今考論是非以應其名耳人苦不自知既以此得因以為實能之故譊譊至今坐此得罪幾死所謂齊虜以口舌得官真可笑也然世人遂以軾為欲立異同則過矣妄論利害攙說得失此正制科人習氣譬之候蟲時鳥自鳴自已何足為損益軾每怪時人待軾過重而足下又復稱說如此愈非其實得罪以來深自閉塞扁舟草屨放浪山水間與樵漁雜處往往為醉人所推罵輒自喜漸不為人識平生親友無一字見及有書與之亦不答自幸庶幾免矣足下又復創相推與甚非所望木有癭石有暈犀有通以取妍於人皆物之病也謫居無事默自觀省回視三十年以來所為多其病者足下所見皆故我非今我也無乃聞其聲不考其情取其華而遺其實乎抑將又有取於此也此事非相見不能盡自得罪後不敢作文字此書雖非文然信筆書意不覺纍幅亦不須示人必喻此意答劉沔書蘇軾軾頓首都曹劉君足下䝉示書教及編録拙書文二十卷軾平生以言語文字見知於世亦以此取疾於人得失相補不如不作之安也以此常欲焚棄筆硯為瘖默人而習氣宿業未能盡去亦謂隨手雲散烏沒矣不知足下默隨其後綴拾編掇略無遺者覽之慙汗可為多言之戒然世之蓄軾詩文者多矣率真僞相半又多為俗子所改竄讀之使人不平然亦不足怪識真者少蓋從古所病梁蕭統集文選世以為工以軾觀之拙於文而陋於識者莫統若也宋玉賦髙唐神女其初略陳所夢之因如子虛亡是公相與問答皆賦矣而統謂之叙此與兒童之見何異李陵蘇武贈别長安而詩有江漢之語及陵與武書詞句儇淺正齊梁間小兒所擬作決非西漢文而統不悟劉子𤣥獨知之范曄作蔡琰傳載其二詩亦非是董卓已死琰乃流落方卓之亂伯喈尚無恙也而其詩乃云以卓亂故流入於胡此豈真琰語哉其筆勢乃效建安七子者非東漢詩也李太白韓退之白樂天詩文皆為庸俗所亂可為太息今足下所示二十卷無一篇僞者又少謬誤及所示書詞清婉雅奧有作者風氣知足下致力於斯文久矣某窮困本坐文字蓋願刳形去皮而不可得者然幼子過文益竒在海外孤寂無寥過時出一篇見娛則為數日喜寢食有味以此知文章如金玉珠貝未易鄙棄也見足下詞學如此又喜吾同年兄龍圖之有後也故勉作報書匆匆不宣與祖擇之書王安石治教政令聖人之所謂文也書之策引而被之天下之民一也聖人之於道也蓋心得之作而為治教政令也則有本末先後權勢制義而一之於極其書之策也則道其然而已矣彼陋者不然一適焉一否焉非流焉則泥非過焉則不至甚者置其本求之末當後者反先之無一焉不悖於極彼其於道也非心得之也其書之䇿也獨能不悖耶故書之䇿而善引而被之天下之民反不善焉無矣二帝三王引而被之天下之民而善者也孔子孟子書之䇿而善者也皆聖人也易地則皆然某生十二年而學學十四年矣聖人之所謂文者私有意焉書之䇿則未也間或悱然動於事而出於詞以警戒其躬若施於朋友褊迫陋庳非敢謂之文也乃者執事欲收而教之使獻焉雖自知明敢自蓋邪謹書所為書序原說若干篇因叙所聞與所志獻左右惟賜覽觀焉上人書王安石嘗謂文者禮教治政云爾其書諸䇿而傳之人大體歸然而已而曰言之不文行之不逺云者徒謂辭之不可以已也非聖人作文之本意也自孔子之死久韓子作望聖人於百千年中卓然也獨子厚名與韓並子厚非韓比也然其文卒配韓以傳亦豪傑可畏者也韓子嘗語人以文矣曰云云子厚亦曰云云疑二子者徒語人以其辭耳作文之本意不如是其已也孟子曰君子欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原孟子之云爾非直施於文而已然亦可託以為作文之本意且所謂文者務為有補於世而已矣所謂辭者猶器之有刻鏤繪畫也誠使巧且華不必適用誠使適用亦不必巧且華要之以適用為本以刻鏤繪畫為之容而已不適用非所以為器也不為之容其亦若是乎否也然容亦未可已也勿先之其可也某學文久數挾此說以自治始欲書之䇿而傳之人其試於事者則有待矣其為是非邪未能自定也執事正人也不阿其所好者書雜文十篇獻左右願賜之教使之是非有定焉答錢公輔學士書王安石比蒙以銘文見屬足下于世為聞人力足以得顯者銘父母以屬于不腆之文似其意非茍然故輒為之而不辭不圖乃猶未副所欲欲有所增損鄙文自有意義不可改也宜以見還而求能如足下意者為之耳家廟以今法凖之恐足下未得立也足下雖多聞要與識者講之如得甲科為通判通判之署有池臺竹林之勝此何足以為太夫人之榮而必欲書之乎貴為天子富有天下茍不能行道適足以為父母之羞況一科甲通判茍粗知為辭賦雖市井小人皆可以得之何足道哉何足道哉故銘以謂閭巷之士以為太夫人榮明天下有識者不以置悲歡榮辱于其心也太夫人能異于閭巷之士而與天下有識同此其所以為賢而宜銘者也至于諸孫亦不足列孰有五子而無七孫者乎七孫業之有可道固不宜略若皆兒童賢不肖未可知列之於義何當也諸不具道計足下當與有識者講之南去愈逺君子惟順愛自重與蔡君謨求書集古録序書歐陽修修啓嚮在河朔不能自閒嘗集録前世金石之遺文自三代以來古文竒字莫不皆有中間雖罪戾擯斥水陸奔走顛危困踣兼之人事吉凶憂患悲愁無聊倉卒未嘗一日忘也蓋自慶厯乙酉逮嘉祐壬寅十有八年而得千卷顧其勤至矣然亦可謂富哉竊復自念好嗜與俗異馳乃獨區區收拾世人之所棄者惟恐不及是又可笑也因輒自叙其事庶以見其志焉然顧其文鄙意陋不足以示人既則自視前所集録雖浮屠老子詭妄之說常見貶絶於吾儒者往往取之而不忍遽廢者何哉豈非特以其字畫之工邪然則字書之法雖為學者之餘事亦有助於金石之傳也若浮屠老子之說當棄而獲存者乃直以字畫而傳是其幸而得所託爾豈特有助而已哉僕之文陋矣顧不能以自傳其或幸而得所託則未必不傳也由是言之為僕不朽之託者在君謨一揮毫之頃爾竊惟君子樂善欲成人之美者或聞斯說謂宜有不能却也故輒持其說以進而不疑伏惟幸察文編卷四十八

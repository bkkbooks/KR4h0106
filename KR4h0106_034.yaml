body:
  text: 文編卷三十四明唐順之編儒林史記太史公曰余讀功令至於廣厲學官之路未嘗不廢書而歎也曰嗟乎夫周室衰而關雎作幽厲微而禮樂壞諸侯恣行政由強國故孔子閔王路廢而邪道興於是論次詩書修起禮樂適齊聞韶三月不知肉味自衛返魯然後樂正雅頌各得其所世以混濁莫能用是以仲尼干七十餘君無所遇曰茍有用我者期月而已矣西狩獲麟曰吾道窮矣故因史記作春秋以當王法其辭微而指博後世學者多録焉自孔子卒後七十子之徒散游諸侯大者為師傅卿相小者友教士大夫或隱而不見故子路居衛子張居陳淡臺子羽居楚子夏居西河子貢終於齊如田子方段干木吳起禽滑釐之屬皆受業於子夏之倫為王者師是時獨魏文侯好學後陵遲以至於始皇天下並爭於戰國儒術既絀焉然齊魯之門學者獨不廢也於威宣之際孟子荀卿之列咸遵夫子之業而潤色之以學顯於當世及至秦之季世焚詩書坑術士六藝從此缺焉陳涉之王也而魯諸儒抱孔氏之禮器往歸陳王於是孔甲為陳涉博士卒與涉俱死陳涉起匹夫驅瓦合適戍旬月以王楚不滿半嵗竟滅亡其事至微淺然而搢紳先生之徒負孔子禮器往委質為臣者何也以秦焚其業積怨而發憤於陳王也及高皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂絃歌之音不絶豈非聖人之遺化好禮樂之國哉故孔子在陳曰歸與歸與吾黨小子狂簡斐然成章不知所以裁之夫齊魯之間於文學自古以來其天性也故漢興然後諸儒始得修其經藝講習大射鄉飲之禮叔孫通作漢禮儀因為太常諸生弟子共定者咸為選首於是喟然歎興於學然尚有干戈平定四海亦未暇遑庠序之事也孝惠吕后時公卿皆武力有功之臣孝文時頗徴用然孝文帝本好刑名之言及至孝景不任儒者而竇太后又好黃老之術故諸博士具官待問未有進者及今上即位趙綰王臧之屬明儒學而上亦鄉之於是招方正賢良文學之士自是之後言詩於魯則申培公於齊則轅固生於燕則韓太傅言尚書自濟南伏生言禮自魯高堂生言易自菑川田生言春秋於齊魯自胡母生於趙自董仲舒及竇太后崩武安侯田蚡為丞相絀黃老刑名百家之言延文學儒者數百人而公孫𢎞以春秋白衣為天子三公封以平津侯天下之學士靡然鄉風矣公孫𢎞為學官悼道之鬱滯乃請曰丞相御史言制曰蓋聞導民以禮風之以樂婚姻者居室之大倫也今禮廢樂崩朕甚愍焉故詳延天下方正博聞之士咸登諸朝其令禮官勸學講議洽聞興禮以為天下先太常議與博士弟子崇鄊里之化以廣賢才焉謹與太常臧博士平等議曰聞三代之道鄉里有教夏曰校殷曰序周曰庠其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始由內及外今陛下昭至德開大明配天地本人倫勸學修禮崇化厲賢以風四方太平之原也古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身太常擇民年十八已上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞者令相長丞上屬所二千石二千石謹察可者當與計偕詣太常得受業如弟子一歲皆輒試能通一藝以上補文學掌故缺其髙第可以為郎中者太常籍奏即有秀才異等輒以名聞其不事學若下材及不能通一藝輒罷之而請諸不稱者罰臣謹按詔書律令下者明天人分際通古今之義文章爾雅訓辭深厚恩施甚美小吏淺聞不能究宣無以明布諭下治禮掌故以文學禮義為官遷流滯請選擇其秩比二百石以上及吏百石通一藝以上補左右內史大守卒史比百石已下補郡大守卒史皆各二人邊郡一人先用誦多者若不足乃擇掌故補中二千石屬文學掌故補郡屬備員請著功令他如律令制曰可自此以來則公卿大夫士吏斌斌多文學之士矣遊俠史記韓子曰儒以文亂法而俠以武犯禁二者皆譏而學士多稱於世云至如以術取宰相卿大夫輔翼其世主功名俱著於春秋固無可言者及若季次原憲閭巷人也讀書懷獨行君子之德義不茍合當世當世亦笑之故季次原憲終身空室蓬戶褐衣疏食不厭死而已四百餘年而弟子志之不倦今游俠其行雖不軌於正義然其言必信其行必果已諸必誠不愛其軀赴士之厄困既已存亡死生矣而不矜其能羞伐其德蓋亦有足多者焉且緩急人之所時有也太史公曰昔者虞舜窘於井廩伊尹負於鼎俎傳說匿於傅險吕尚困於棘津夷吾桎梏百里飯牛仲尼畏匡菜色陳蔡此皆學士所謂有道仁人也猶然遭此菑况以中材而涉亂世之末流乎其遇害何可勝道哉鄙人有言曰何知仁義已嚮其利者為有德故伯夷醜周餓死首陽山而文武不以其故貶王跖蹻暴戾其徒誦義無窮由此觀之竊鈎者誅竊國者侯侯之門仁義存非虛言也今拘學或抱咫尺之義久孤於世豈若卑論儕俗與世沉浮而取滎名哉而布衣之徒設取豫然諾千里誦義為死不顧世此亦有所長非茍而已也故士窮窘而得委命此非人之所謂賢豪間者邪誠使鄉曲之俠豫季次原憲比權量力效功於當世不同日而論矣要以功見言信俠客之義又曷可少哉古布衣之俠靡得而聞已近世延陵孟嘗春申平原信陵之徒皆因王者親屬藉於有土卿相之富厚招天下賢者顯名諸侯不可謂不賢者矣比如順風而呼聲非加疾其勢激也至如閭巷之俠修行砥名聲施於天下莫不稱賢是為難耳然儒墨皆排擯不載自秦以前匹夫之俠湮滅不見余甚恨之以余所聞漢興有朱家田仲王公劇孟郭解之徒雖時扞當世之文罔然其私義廉潔退讓有足稱者名不虛立士不虛附至如朋黨宗彊比周設財役貧豪暴侵凌孤弱恣欲自快遊俠亦醜之余悲世俗不察其意而猥以朱家郭解等令與暴豪之徒同類而共笑之也龜䇿史記自古聖王將建國受命興動事業何嘗不寶卜筮以助善唐虞以上不可記已自三代之興各據禎祥塗山之兆從而夏啓世飛燕之卜順故殷興百穀之筮吉故周王王者决定諸疑參以卜筮斷以蓍龜不易之道也蠻夷氐羌雖無君臣之序亦有决疑之卜或以金石或以草木國不同俗然皆可以戰伐攻擊推兵求勝各信其神以知來事略聞夏殷欲卜者乃取蓍龜已則棄去之以為龜藏則不靈蓍久則不神至周室之卜官常寶藏蓍龜又其大小先後各有所尚要其歸等耳或以為聖王遭事無不定决疑無不見其設稽神求問之道者以為後世衰微愚不師智人各自安化分為百室道而無垠故推歸之至微要潔於精神也或以為昆蟲之所長聖人不能與爭其處吉凶别然否多中於人至高祖時因秦太卜官天下始定兵革未息及孝惠享國日少吕后女主孝文孝景因襲掌故未遑講試雖父子疇官世世相傳其精微深妙多所遺失至今上即位博開藝能之路悉延百端之學通一伎之士咸得自效絶倫超竒者為右無所阿私數年之間太卜大集㑹上欲擊胸奴西攘大宛南收百越卜筮至預見表象先圖其利及猛將推鋒執節獲勝於彼而蓍龜時日亦有力於此上尤加意賞賜至或數千萬如邱子明之屬富溢貴寵傾於朝廷至以卜筮射蠱道巫蠱時或頗中素有眦睚不快因公行誅恣意所傷以破族滅門者不可勝數百僚蕩恐皆曰龜䇿能言後事覺姧窮亦誅三族夫摓䇿定數灼龜觀兆變化無窮是以擇賢而用占焉可謂聖人重事者乎周公卜三龜而武王有瘳紂為暴虐而元龜不占晉文將定襄王之位卜得黃帝之兆卒受彤弓之命獻公貪驪姬之色卜而兆有口象其禍竟流五世楚靈將背周室卜而龜逆終被乾溪之敗兆應信誠於內而時人明察見之於外可不謂兩合者哉君子謂夫輕卜筮無神明者悖背人道信禎祥者鬼神不得其正故書建稽疑五謀而卜筮居其二五占從其多明有而不專之道也余至江南觀其行事問其長老云龜千歲乃遊蓮葉之上蓍百莖共一根又其所生獸無虎狼草無毒螫江傍家人常畜龜飲食之以為能導引致氣有益於助衰養老豈不信哉酷吏漢書孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格老氏稱上德不德是以有德下德不失德是以無德法令滋章盜賊多有信哉是言也法令者治之具而非制治清濁之原也昔天下之網嘗密矣然姦軌愈起其極也上下相遁至於不振當是之時吏治若救火揚沸非武健嚴酷惡能勝其任而愈快乎言道德者溺其職矣故曰聽訟吾猶人也必也使無訟乎下士聞道大笑之非虛言也漢興破觚而為圜斫雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民乂安由是觀之在彼不在此髙后時酷吏獨有侯封刻轢宗室侵辱功臣吕氏已敗遂夷侯封之家孝景時鼂錯以刻深頗用術輔其資而七國之亂發怒於錯錯卒以被戮其後有郅都寧成之倫貨殖漢書昔先王之制自天子公侯卿大夫士至於皂𨽻抱關擊􅢎者其爵祿奉飬宫室車服棺槨祭祀死生之制各有差品小不得僣大賤不得踰貴夫然故上下序而民志定於是辨其土地川澤邱陵衍沃原隰之宜教民種樹畜養五穀六畜及至魚鱉鳥獸雚蒲材幹器械之資所以養生送死之具靡不皆育育之以時而用之有節草木未落斧斤不入於山林豺獺未祭罝網不布於野澤鷹隼未擊矰弋不施於徯隧既順時而取物然猶山不茬蘖澤不伐夭蝝魚麛卵咸有常禁所以順時宣氣蕃阜庶物稸足功用如此之備也然後四民因其土宜各任智力夙興夜寐以治其業相與通功易事交利而俱贍非有徴發期㑹而逺近咸足故易曰后以裁成輔相天地之宜以左右民備物致用立成器以為天下利莫大乎聖人此之謂也管子云古之四民不得雜處士相與言仁誼於閒宴工相與議技巧於官府商相與語財利于市井農相與謀稼穡于田野朝夕從事不見異物而遷焉故其父兄之教不肅而成子弟之學不勞而能各安其居而樂其業甘其食而美其服雖見竒麗紛華非其所習辟猶戎翟之與于越不相入矣是以欲寡而事節財足而不爭於是在民上者導之以德齊之以禮故民有取而且敬貴誼而賤利此三代之所以直道而行不嚴而治之大略也及周室衰禮法墮諸侯刻桷丹楹大夫山節藻棁八佾舞於庭雍徹於堂其流至於士庶人莫不離制而棄夲稼穡之民少商旅之民多穀不足而貨有餘陵夷至乎桓文之後禮誼大壞上下相冒國異政家殊俗耆欲不制僣差亡極於是商通難得之貨工作亡用之器士設反道之行以追時好而取世資僞民背實而要名姦夫犯害而求利篡弒取國者為王公圉奪成家者為雄桀禮誼不足以拘君子刑戮不足以威小人富者木土被文錦犬馬餘肉粟而貧者短褐不完唅菽飲水其為編戶齊民同列而以財力相君雖為僕虜猶亡愠色故夫飾變詐為姦軌者自足乎一世之間守道循理者不免於饑寒之患其教自上興繇法度之無限也故列其行事以傳世變云外戚漢書易著吉凶而言謙盈之效天地鬼神至於人道靡不同之夫女寵之興繇至微而體至尊窮富貴而不以功此固道家所畏禍福之宗也序自漢興終於孝平外戚後庭色寵著聞二十有餘人然其保位全家者唯文景武帝太后及邛成后四人而已至如史良娣王悼后許恭哀后身皆夭折不辜而家依託舊恩不敢縱恣是以能全其餘大者夷滅小者放流嗚呼鑒兹行事變亦備矣佞幸漢書柔曼之傾意非獨女德蓋亦有男色焉觀籍閎鄧韓之徒非一而董賢之寵尤甚父子並為公卿可謂貴重人臣無二矣然進不繇道位過其任莫能有終所謂愛之適足以害之者也漢世衰於元成壞於哀平哀平之際國多釁矣主疾無嗣弄臣為輔鼎足不彊棟幹微撓一朝帝崩姦臣擅命董賢縊死丁傅流放辜及母后奪位幽廢咎在親便嬖所任非仁賢故仲尼著損者三友王者不私人以官殆為此也胸奴漢書書戒蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣夷狄之為患也故自漢興忠言嘉謀之臣曷嘗不運籌䇿相與爭於廟堂之上乎髙祖時則劉敬吕后時樊噲季布孝文時賈誼鼂錯孝武時王恢韓安國朱買臣公孫𢎞董仲舒人持所見各有同異然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究胸奴之終始也自漢興以至於今曠世歷年多於春秋其與胸奴有修文而和親之矣有用武而克伐之矣有卑下而承事之矣有威服而臣畜之矣詘伸異變強弱相反是故其詳可得而言也昔和親之論發於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于冀以救安邉壤孝惠髙后時遵而不違胸奴寇盜不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女增厚其賂歲以千金而胸奴數背約束邉境屢被其害是以文帝中年赫然發憤遂躬戎服親御鞍馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎曰思古名臣此則和親無益已然之明效也仲舒親見四世之事猶復欲守舊文頗增其約以為義動君子利動貪人如胸奴者非可以仁義說也獨可說以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以纍其心胸奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知其未合於當時而有闕於後世也當孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里胸奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子而為質乎此不合當時之言也若不置質空約和親是襲孝文既往之悔而長胸奴無已之詐也夫邊城不選守境武略之臣修障隧備塞之具厲長㦸徑弩之械恃吾所以待邊寇而務賦斂於民逺行貨賂割剝百姓以奉寇讐信甘言守空約而幾胡馬之不窺不已過乎至孝宣之世承武帝奮擊之威直胸奴百年之運因其壞亂幾亡之厄權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱藩賓於漢庭是時邊城晏閉牛馬布野三世無犬吠之警黎庶亡干戈之役後六十餘載之間遭王莽篡位始開邉隙單于由是歸怨自絶莽遂斬其侍子邉境之禍搆矣故呼韓邪始朝於漢漢議其儀而蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮讓而不臣如其後嗣􅋟逃竄伏使於中國不為叛臣及孝元時議罷守塞之備侯應以為不可可謂盛不忘衰安必思危遠見識微之明矣至單于咸棄其愛子昧利不顧侵掠所獲歲巨萬計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之固而偷恃一時之事者未可以經遠也若乃征伐之功秦漢行事嚴尤論之當矣故先王度土中立封畿分九州列五服物土貢制外內或修刑政或昭文德逺近之藝異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左袵人面獸心其與中國殊章服異習俗飲食不同言語不通辟居北垂寒露之野逐草隨畜射獵為生隔以山谷雍以沙幕天地所以絶外內也是故聖王禽獸畜之不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招冦其地不可耕而食也其民不可臣而畜也是以外而不內疏而不戚政教不及其人正朔不加其國來則懲而御之去則備而守之其慕義而貢獻則接之以禮讓羈縻不絶使曲在彼蓋聖王制御蠻夷之常道也西域漢書孝武之世圖制胸奴患其兼從西國結黨南羌乃表河曲列四郡開玉門通西域以斷胸奴右臂隔絶南羌月氐單于失援由是逺遁而幕南無王庭遭值文景𤣥默養民五世天下殷富財力有餘士馬彊盛故能睹犀布玳瑁則建珠崖七郡感枸醬竹杖則開牂柯越嶲聞天馬蒲萄則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宫蒲梢龍文魚目汗血之馬充於黃門巨象獅子猛犬大雀之羣食於外囿殊方異物四面而至於是廣開上林穿昆明池營千門萬户之宫立神明通天之臺興造甲乙之帳落以隋珠和璧天子負黼依襲翠被􅑀玉几而處其中設酒池肉林以饗四夷之客作巴俞都盧海中碭極曼衍魚龍角抵之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足乃𣙜酒酤管鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭因之以凶年冦盜並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆遠則葱嶺身熱頭痛縣度之厄淮南杜欽揚雄之論皆以為此天地所以界别區域絶外內也書曰西戎即序禹既就而序之非上威服致其貢物也西域諸國各有君長兵衆分弱無所統一雖屬胸奴不相親附胸奴能得其馬畜旃罽而不能統率與之進退與漢隔絶道里又遠得之不為益棄之不為損盛德在我無取於彼故自建武以來西域思漢威德咸樂內屬唯其小邑鄯善車師界迫丐奴尚為所拘而其大國莎車于闐之屬數遣使置質於漢願請屬都護聖上遠覽古今因時之宜羈縻不絶辭而未許雖大禹之序西戎周公之讓白雉太宗之郤走馬義兼之矣亦何以尚兹二十八將後漢書論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感㑹風雲奮其智勇稱為佐命亦各志能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖遠算固將有以焉爾若乃王道既衰降及霸德猶能授受惟庸勳賢皆序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶王運皆武人屈起亦有鬻繒屠狗輕猾之徒或崇以連城之賞或任以阿衡之地故勢疑則隙生力侔則亂起蕭樊且猶縲絏信越終見葅戮不其然乎自兹以降迄於孝武宰輔五世莫非公侯遂使縉紳道塞賢能蔽壅朝有世及之私下多抱關之怨其懷道無聞委身草莽者亦何可勝言故光武鍳前事之違存矯枉之志雖冦鄧之高勳耿賈之鴻烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以政齊之以刑者乎若格之功臣其傷已甚何者直繩則虧喪恩舊撓情則違廢禁典選德則功不必厚舉勞則人或未賢參任則羣心難塞並列則其敝未逺不得不校其勝否即以事相權故高秩厚禮允答元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎其餘並優以寬科完其封祿莫不終以功名延慶於後昔留侯以為高祖悉用蕭曹故人而郭伋亦譏南陽多顯鄭興又戒功臣專任夫崇恩偏授易啓私溺之失至公均被必廣招賢之路意者不其然乎永平中顯宗追感前世功臣乃圖畫二十八將於南宫雲臺其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功臣之次云爾宦者後漢書易曰天垂象聖人則之宦者四星在皇位之側故周禮制官亦備其數閽者守中門之禁寺人掌女宫之戒又云王之正內者五人月令仲冬命閹尹審門閭謹房室詩之小雅亦有巷伯刺讒之篇然宦人之在王朝者其來舊矣將以其體非全氣情志專良通關中人易以役養乎然而後世因之才任稍廣其能者則勃貂管蘇有功於楚晉景監繆賢著庸於秦趙及其敝也則豎刁亂齊伊戾禍宋漢興仍襲秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省及高后稱制乃以張卿為大謁者出入卧內受宣詔命文帝時有趙談北宫伯子頗見親幸至於孝武亦愛李延年帝數宴後庭或潛游離館故請奏機事多以宦人主之至元帝之世史游為黃門令勤心納忠有所補益其後𢎞恭石顯以佞險自進卒有蕭周之禍損穢帝德焉中興之初宦官悉用閹人不復雜調他士至永平中始置員數中常侍四人小黃門十人和帝即阼幼弱而竇憲兄弟專總權威內外臣僚莫由親接所與居者唯閹宦而已故鄭衆得專謀禁中終除大憝遂享分土之封超登宫卿之位於是中官始盛焉自明帝以後迄乎延平委用漸大而其員稍增中常侍至有十人小黃門二十人改以金璫右貂兼領卿署之職鄧后以女主臨政而萬幾殷逺朝臣國議無由參斷帷幄稱制下令不出房闈之間不得不委用刑人寄之國命手握王爵口含天憲非復掖庭永巷之職閨牖房闥之任也其後孫程定立順之功曹騰參建桓之策續以五侯合謀梁冀受鉞迹因公正恩固主心故中外服從上下屛氣或稱伊霍之勳無謝於往載或謂良平之畫復興於當今雖時有忠公而竟見排斥舉動回山海呼吸變霜露阿㫖曲求則光寵三族直情忤意則參夷伍宗漢之綱紀大亂矣若夫髙冠長劒紆朱懷金者布滿宫闈苴茅分虎南靣臣人者蓋以十數府署第館棊列於都鄙子弟支附過半於州國南金和寶氷紈霧縠之積盈仞珍藏嬙媛侍兒歌童舞女之玩充備綺室狗馬飾雕文土木被緹繡皆割剝萌黎競恣奢欲搆害明賢專樹黨類其有更相援引希附權彊者皆腐身熏子以自衒達同敝相濟故其徒有繁敗國蠧政之事不可單書所以海內嗟毒志士窮棲冦劇緣間搖亂區夏雖忠良懷憤時或奮發而言出禍從旋見拏戮因復大考鉤黨轉相誣染凡稱善士莫不離被災毒竇武何進位崇戚近乘九服之囂怨協羣英之藝力而以疑留不斷至於殄敗斯亦運之極乎雖袁紹龔行芟夷無餘然以暴易亂亦何云及自曹騰說梁冀竟立昏弱魏武因之遂遷龜鼎所謂君以此始必以此終信乎其然矣論曰自古喪大業絶宗禋者其所漸有由矣三世以嬖色取禍嬴氏以奢虐致災西京自外戚失祚東都緣閹尹傾國成敗之來先史商之久矣至於釁起宦夫其略猶或可言何者刑餘之醜理謝全生聲榮無暉於門閥肌膚莫傳於來體推情未覺其敝即事易以取信加漸染朝事頗識典物故少主憑謹舊之庸女君資出內之命顧訪無猜憚之心恩狎有可悅之色亦有忠厚平端懷術糾邪或敏才給對飾巧亂實或借譽貞良先時薦譽非直茍恣凶德止於暴橫而已然真邪竝行情貌相越故能回惑昏幼迷瞀視聽蓋亦有其理焉詐利既滋朋徒日廣直言抗議必漏先言之間至戚發憤方啓專奪之隙斯忠賢所以智屈社稷故其為墟易曰履霜堅冰至云所從來久矣今迹其所以亦豈一朝一夕哉儒林後漢書論曰自光武中年以後干戈稍戢專事經學自是其風世篤焉其服儒衣稱先王遊庠序聚橫孰者蓋布之於邦域矣若乃經生所處不逺萬里之路精廬暫建贏糧動有千百其耆名高義開門受徒者編牒不下萬人皆專相傳祖莫或訛雜至有分爭王庭樹朋私里繁其章條穿求崖穴以合一家之說故揚雄曰今之學者非獨為之華藻又從而繡其鞶帨夫書理無二義歸有宗而碩學之徒莫之或徙故通人鄙其固焉又雄所謂譊譊之學各習其師也且觀成名高第終能逺至者蓋亦寡焉而迂滯若是矣然所談者仁義所傳者聖法也故人識君臣父子之綱家知違邪歸正之路自桓靈之間君道秕僻朝綱日陵國隙屢啓自中智以下靡不審其崩離而權彊之臣息其窺盜之謀豪俊之夫屈於鄙生之議者人誦先王言也下畏逆順藝也至如張溫皇甫嵩之徒功定天下之半聲馳四海之表俯仰顧盻則天業可移猶鞠躬昏主之下狼狽折札之命散成兵就繩約而無悔心暨乎剝撓自極人神數盡然後羣英乘其運世德終其祚跡衰敝之所由致而能多歷年所者斯豈非學之效乎故先師垂典文褒勵學者之功篤矣切矣不循春秋至乃比於殺逆其將有意乎獨行後漢書孔子曰與其不得中庸必也狂狷乎又云狂者進取狷者有所不為也此蓋失於周全之道而取諸偏至之端者也然則有所不為亦將有所必為者矣既云進取亦將有所不取者矣如此性尚分流為否異適矣中世偏行一介之夫能成名立方者蓋亦衆也或志剛金石而尅扞於彊禦或意嚴冬霜而甘心於小諒亦有結朋協好幽明共心蹈義陵險死生等節雖事非通圓良其風軌有足懷者而情迹殊雜難為條品片辭特趣不足區別措之則事或有遺載之則貫序無統以其名體雖殊而操行俱絶故總為獨行篇焉庶備諸闕文紀志漏脫云爾方術後漢書仲尼稱易有君子之道四焉曰卜筮者尚其占占也者先王所以定禍福决嫌疑幽贊於神明遂知來物者也若夫隂陽推步之學往往見於墳記矣然神經怪牒玉策金繩關扃於明靈之府封縢於瑶壇之上者靡得而窺也至乃河洛之文龜龍之圖箕子之術師曠之書緯候之部鈐决之符皆所以探抽冥賾參驗人區時有可聞者焉其流又有風角遁甲七政元氣六日七分逄占日者挺專須臾孤虛之術及望雲省氣推處祥妖時亦有以效於事也而斯道隱逺𤣥奧難原故聖人不語怪神罕言性命或開末而抑其端或曲辭以章其義所謂民可使由之不可使知之漢自武帝頗好方術天下懷協道藝之士莫不負䇿抵掌順風而届焉後王莽矯用符命及光武尤信讖言士之赴趣時宜者皆騁馳穿鑿爭談之也故王梁孫咸名應圖籙越登槐鼎之任鄭興賈逵以附同稱顯桓談尹敏以乖忤淪敗自是習為內學尚竒文貴異數不乏於時矣是以通儒碩生忿其姦妄不經奏議慷慨以為宜見藏擯子長亦云觀陰陽之書使人拘而多忌蓋為此也夫物之所偏未能無蔽雖云大道其硋則同若乃詩之失愚書之失誣然則數術之失至於詭俗乎如令溫柔敦厚而不愚斯深於詩者也疏通知逺而不誣斯深於書者也極數知變而不詭俗斯深於數術者也故曰茍非其人道不虛行意者多迷其統取遣頗偏甚有雖流宕過誕亦失也中世張衡為陰陽之宗郎顗咎徴最密餘亦班班名家焉其徒亦有雅才偉德未必體極藝能今蓋糾其推變尤長可以宏補時事因合表之云逸民後漢書易稱遁之時義大矣哉又曰不事王侯高尚其事是以堯舜則天不屈潁陽之高武盡美矣終全孤竹之潔自兹以降風流彌繁長往之軌未殊而感致之數匪一或隱居以求其志或曲避以全其道或靜已以鎮其躁或去危以圖其安或垢俗以動其槩或庛物以激其清然觀其甘心畎畝之中憔悴江海之上豈必親魚鳥樂林草哉亦云性分所至而已故䝉恥之賓屢黜不去其國蹈海之節千乘莫移其情適使矯易去就則不能相為矣彼雖硜硜有類沽名者然而蟬蛻囂埃之中自致寰區之外異夫飾智巧以逐浮利者乎荀卿有言曰志意修則驕富貴道義重則輕王公也漢室中微王莽篡位士之藴藉義憤甚矣是時裂冠毁冕相携持而去之者蓋不可勝數揚雄曰鴻飛冥冥弋者何篡焉言其違患之逺也光武側席幽人求之若不及旌帛蒲車之所徴賁相望於巖中矣若薛方逄萌聘而不肯至嚴光周黨王霸至而不能屈羣方咸遂志士懷仁斯固所謂舉逸民天下歸心者乎肅宗亦禮鄭均而徴高鳯以成其節自後帝德稍衰邪嬖當朝處士耿介羞與卿相等列至乃抗憤而不顧多失其中行焉蓋録其絶塵不反同夫作者例之此篇西南夷後漢書論曰漢氏征伐戎狄有事邉逺蓋亦與王業而終始矣至於傾沒疆垂喪師敗將者不出時嵗卒能開四夷之境款殊俗之附若乃文約之所沾漸風聲之所周流幾將日所出入處也著自山經水志者亦略及焉雖服叛難常威澤時曠及其化行則緩耳雕腳之倫獸居鳥語之類莫不舉種盡落回靣而請吏陵海越障纍譯以內屬焉故其録名中郎校尉之署編數都護部守之曹動以數百萬計若乃藏山隱海之靈物沈沙棲陸之瑋寶莫不呈表怪麗雕被宫幄焉又其賨幪火毳馴禽封獸之賦軨積於內府夷歌巴舞殊音異節之技列倡於外門豈柔服之道必足於斯然亦云致逺者矣蠻夷雖附阻巖谷而類有土居連涉荆交之區布護巴庸之外不可量極然其凶勇校算薄於羌狄故陵暴之害不能深也西南之徼尤為劣焉故關守永昌肇自逺離啓土立人至今成都焉西羌後漢書論曰羌戎之患自三代尚矣漢世方之胸奴頗為衰寡而中興以後邊難漸大朝規失綏御之和戎帥騫然諾之信其內屬者或倥偬於豪右之手或屈折於奴僕之勤塞候時清則憤怒而思禍桴革暫動則屬鞬以鳥驚故永初之間羣種蜂起遂解仇嫌結盟詛招引山豪轉相嘯聚揭木為兵負柴為械轂馬揚埃陸梁於三輔建號稱制恣睢於北地東犯趙魏之郊南入漢蜀之鄙塞湟中斷隴道燒陵園剽城市傷敗踵係羽書日聞并涼之士特衝殘斃壯悍則委身於兵場女婦則徽纆而為虜發冢露胔死生塗炭自西戎作逆未有陵斥上國若斯其熾也和熹以女君親政威不外接朝議憚兵力之損情存茍安或以邊州難援宜見捐棄或懼疽食浸淫莫知所限謀夫回遑猛士疑慮遂徙西河四郡之人雜寓關右之縣發屋伐樹塞其戀土之心燔破資積以防顧還之思於是諸將鄧隲任尚馬賢皇甫規張奐之徒爭設雄規更奉征討之命徴兵㑹衆以圖其隙馳騁東西奔救首尾搖動數州之境日耗千金之資至於假人增賦借俸侯王引金錢縑綵之珍徴糧粟鹽鐵之積所以賂遺購賞轉輸勞來之費前後數十巨萬或梟尅酋健摧破附落降俘載路牛羊滿山軍書未奏其利害而離叛之狀已言矣故得不酬失功不半勞暴露師徒連年而無所勝官人屈竭烈士憤喪段熲受事專掌軍任資山西之猛性練戎俗之態情窮武思盡飈鋭以事之被羽前登身當百死之陳䝉沒氷雪經履千折之道始殄西種卒定東冦若乃陷擊之所殲傷追走之所崩籍頭顱斷落於萬丈之山支革判解於重崖之上不可校計其能穿竄草石自脫於鋒鏃者百不一二而張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羌雖外患實深內疾若攻之不根是養疾痾於心腹也惜哉冦敵略定矣而漢祚亦衰焉嗚呼昔先王疆理九土判别畿荒知夷貊殊性難以道御故斥逺諸華薄其貢職唯與辭要而已若二漢御戎之方失其本矣何則先零侵境趙充國遷之地內當煎作冦馬文淵徙之三輔貪其暫安之藝信其馴服之情計日用之權宜忘經世之逺略豈夫識微者之為乎故微子垂泣於象箸辛有浩歎於伊川也西域後漢書論曰西域風土之載前古未聞也漢世張騫懷致逺之略班超奮封侯之志終能立功西遐羈服外域自兵威之所肅服財賂之所懷誘莫不獻方竒納愛質露頂肘行東向而朝天子故設戊巳之官分任其事建都護之帥總領其權先馴則賞籝金而賜龜綬後服則繫頭顙而釁北闕立屯田於膏腴之野列郵置於要害之路馳命走驛不絶於時月商胡販客日款於塞下其後井英乃抵條支而歷安息臨西海以望大秦拒玉門陽關者四萬餘里靡不周盡焉若其境俗性智之優薄産載物類之區品川河領障之基源氣節凉暑之通隔梯山棧谷繩行沙度之道身熱首痛風災鬼難之域莫不備寫情形審求根實至於佛道神化興自身毒而二漢方志莫有稱焉張騫但著地多暑濕乘象而戰班勇雖列其奉浮圖不殺伐而精文善法導逹之功靡所傳述余聞之後說也其國則殷乎中土玉燭和氣靈聖之所降集賢懿之所挺生神迹鬼怪則理絶人區感驗明顯則事出天外而騫超無聞者豈其道閉往運數開叔葉乎不然何誣異之甚也漢自楚英始盛齊戒之祀桓帝又修華蓋之飾將微義未譯而但神明之邪詳其清心釋纍之訓空有兼遣之宗道書之流也且好仁惡殺蠲敝崇善所以賢逹君子多愛其法焉然好大不經竒譎無已雖鄒衍談天之辨莊周蝸角之論尚未足以槩其萬一又精靈起滅因報相尋若曉而昧者故通人多惑焉蓋道俗無方適物異㑹取諸同歸措夫疑說則大道通矣胸奴後漢書論曰漢初遭冒頓凶黠種衆强熾髙祖威加四海而窘平城之圍太宗政鄰刑措不雪憤辱之恥逮孝武亟興邉略有志胸奴赫然命將戎旗星屬候列郊甸火通井泉而猶鳴鏑揚塵出入畿內至於窮竭武力單用天財歷紀嵗以攘之冦雖頗折而漢之疲耗略相當矣宣帝值虜庭分爭呼韓邪來臣乃權納懷柔因為邊衛罷關徼之警息兵民之勞龍駕帝服鳴鐘傳鼓於清渭之上南面而朝單于朔易無復匹馬之蹤六十餘年矣後王莽陵篡擾動戎夷續以更始之亂方夏幅裂自是胸奴得志狼心復生乘間侵佚害流傍境及中興之初更通舊好報命連屬金幣載道而單于驕踞益橫內暴滋深世祖以用事諸華未遑沙塞之外忍愧思難徒報謝而已因徙幽并之民增邉屯之卒及關東稍定隴蜀已清其猛夫扞將莫不頓足攘手爭言衛霍之事帝方厭兵間修文政未之許也其後胸奴爭立日逐來奔願修呼韓之好以禦北狄之衛奉蕃稱臣永為外扞天子總攬羣䇿和而納焉乃詔有司開北鄙擇肥美之地量水草以處之馳中郎之使盡法度以臨之制衣裳備文物加璽紱之綬正單于之名於是胸奴分破始有南北二庭焉讐釁既深互伺便隙控弦抗戈覘望風塵雲屯鳥散更相馳突至於陷潰創傷者靡歲或寧而漢之塞地晏然矣後亦頗為出師并兵窮討命竇憲耿䕫之徒前後並進皆用果譎設竒數異道同㑹究掩其窟穴躡北追奔三千餘里遂破龍祠焚罽幕坑十角梏閼氏銘功封石倡呼而還單于震懾屏氣䝉氈遁走於烏孫之地而漠北空矣若因其時藝及其虛曠還南虜於陰山歸河西於內地上申光武權宜之略下防戎羯亂華之變使耿國之算不謬於當世袁安之議見從於後王平易正直若此其宏也而竇憲矜三捷之效忽經世之規狠戾不端專行威惠遂復更立北虜反其故庭並恩兩護以私已福棄蔑天公坐樹大鯁永言前載何恨憤之深乎自後經綸失方畔服不一其為疢毒胡可單言降及後世玩為常俗終於吞噬神鄉丘墟帝宅嗚呼千里之差興自毫端失得之源百世不磨矣藝文唐書自六經焚於秦而復出於漢其師傳之道中絶而簡編脫亂訛缺學者莫得其本真於是諸儒章句之學興焉其後傳注箋解義疏之流轉相講述而聖道粗明然其為說固已不勝其繁矣至於上古三皇五帝以來世次國家興滅終始僭竊僞亂史官備矣而傳記小說外暨方言地理職官氏族皆出於史官之流也自孔子在時方修明聖經以絀繆異而老子著書論道德接乎周衰戰國遊談放蕩之士田駢慎到列莊之徒各極其辨而孟軻荀卿始專修孔氏以折異端然諸子之論各成一家自前世皆存而不絶也夫王迹熄而詩亡離騷作而文辭之士興歷代盛衰文章與時高下然其變態百出不可窮極何其多也自漢以來史官列其名氏篇第以為六藝九種七略至唐始分為四類曰經史子集而藏書之盛莫盛於開元其著録者五萬三千九百一十五卷而唐之學者自為之書又二萬八千四百六十九卷嗚呼可謂盛矣六經之道簡嚴易直而天人備故其愈久而益明其餘作者衆矣質之聖人或離或合然其精深閎博各盡其術而怪竒偉麗往往震發於其間此所以使好竒愛博者不能忘也然凋零磨滅亦不可勝數豈其華文少實不足以行逺與而俚言俗說猥有存者亦其有幸不幸歟今著於篇有其名而無其書者十蓋五六也可不惜哉梁紀五代史嗚呼天下之惡梁久矣自後唐以來皆以為僞也至豫論次五代獨不僞梁議者或譏豫大失春秋之㫖以謂梁負大惡當加誅絶而反進之是奬篡也非春秋之志也豫應之曰是春秋之志爾魯桓公弒隱公而自立者宣公弒子赤而自立者鄭厲公逐世子忽而自立者衛公孫剽逐其君衎而自立者聖人於春秋皆不絶其為君此豫所以不僞梁者用春秋之法也然則春秋亦奬篡乎曰惟不絶四者之為君於此見春秋之意也聖人之於春秋用意深故能勸戒切為言信然後善惡明夫欲著其罪於後世在乎不沒其實其實嘗為君矣書其為君其實篡也書其篡各傳其實而使後世信之則四君之罪不可得而掩爾使為君者不得掩其惡然後人知惡名不可逃則為惡者庶乎其息矣是謂用意深而勸戒切為言信而善惡明也桀紂不待貶其王而萬世所共惡者也春秋於大惡之君不誅絶之者不害其褒善貶惡之㫖也惟不役其實以著其罪而信乎後世與其為君而不掩其惡以息人之為惡能知春秋之此意然後知豫不僞梁之㫖也晉出帝五代史嗚呼古之不幸無子而以其同宗之子為後者聖人許之著之禮經而不諱也而後世閭閻鄙俚之人則諱之諱則不勝其欺與僞也故其茍偷竊取嬰孩襁褓諱其父母而自欺以為我生之子曰不如此則不能得其一志盡愛於我而其心必二也而為其子者亦自諱其所生而絶其天性之親反視以為叔伯父以此欺其九族而亂其人鬼親疏之屬凡物生而有知未有不愛其父母者使是子也能忍而真絶其天性歟曽禽獸之不若也使其不忍而外陽絶之是大僞也夫閭閻鄙俚之人之慮於事者亦已深矣然而茍竊欺僞不可以為法者小人之事也惟聖人則不然以謂人道莫大於繼絶此萬世之通制而天下之公行也何必諱哉所謂子者未有不由父母而生者也故為人後者必有所生之父有所後之父此理之自然也何必諱哉其簡易明白不茍不竊不欺不僞可以為通制而公行者聖人之法也又以謂為人後者所承重故加其服以斬而不絶其所生之親者天性之不可絶也然而恩有屈於義故降其服以朞服外物也可以降而父母之名不可改故著於經曰為人後者為其父母服自三代以來有天下國家者莫不用之而晉氏不用也出帝之於敬儒絶其父道臣而爵之非特以其義不當立不得已而絶之蓋亦習見閭閻鄙俚之所為也五代干戈賊亂之世也禮樂崩壞三綱五常之道絶而先王之制度文章掃地而盡於是矣如寒食野祭而焚紙錢天子而為閭閻鄙俚之事者多矣而晉氏起於夷狄以篡逆而得天下高祖以耶律德光為父而出帝於德光則以為祖而稱孫於其所生父則臣而名之是豈可以人理責哉朋黨五代史嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉豫嘗至繁城讀魏受禪碑見漢之羣臣稱魏功德而大書深刻自列其姓名以夸耀於世又讀梁實録見文蔚等所為如此未嘗不為流涕也夫以國豫人而自夸耀及遂相之此非小人孰能為也漢唐之末舉其朝皆小人也而其君子者何在哉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷之士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡夫欲空人之國而去其君子者必進朋黨之說欲孤人主之勢而蔽其耳目者必進朋黨之說欲奪國而與人者必進朋黨之說夫為君子者固嘗寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其類而盡去之惟指以為朋黨耳故其親戚故舊謂之朋黨可也交游執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣夫善善之相樂以其類同此自然之理也故聞善者必相稱譽稱譽則謂之朋黨得善者必相薦引薦引則謂之朋黨使人聞善不敢稱譽人主之耳不聞有善於下矣見善不敢薦則人主之目不得見善人矣善人日逺而小人日進則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之說也一君子存羣小人雖衆必有所忌而有所不敢為惟空國而無君子然後小人得肆志於無所不為則漢魏唐之際是也故曰可奪國而與人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之說人主可不察哉傳曰一言可以喪邦者其是之謂與可不鑒哉可不戒哉伶官五代史嗚呼盛衰之理雖曰天命豈非人事哉原莊宗之所以得天下與其所以失之者可以知之矣世言晉王之將終也以三矢賜莊宗而告之曰梁吾仇也燕王吾所立契丹與吾約為兄弟而背晉以歸梁此三者吾遺恨也與爾三矢爾其無忘乃父之志莊宗受而藏之於廟其後用兵則遣從事以一少牢告廟請其矢盛以錦囊負而前驅及凱旋而納之方其係燕父子以組函梁君臣之首入於太廟還矢先王而告以成功其意氣之盛可謂壯哉及仇讐已滅天下已定一夫夜呼亂者四應倉皇東出未及見賊而士卒離散君臣相顧不知所歸至於誓天斷髮泣下沾襟何其衰也豈得之難而失之易歟抑夲其成敗之迹而皆自於人歟書曰滿招損謙受益憂勞可以興國逸豫可以亡身自然之理也故方其盛也舉天下之豪傑莫能與之爭及其衰也數十伶人困之而身死國滅為天下笑夫禍患常積於忽微而智勇多困於所溺豈獨伶人也哉宦官五代史自古宦者亂人之國其源深於女禍女色而已宦者之害非一端也蓋其用事也近而習其為心也專而忍能以小善中人之意小信固人之心使人主必信而親之待其已信然後懼以禍福而把持之雖有忠臣碩士列於朝廷而人主以為去已疏逺不若起居飲食前後左右之親為可恃也故前後左右者日益親則忠臣碩士日益疏而人主之勢日益孤勢孤則懼禍之心日益切而把持者日益牢安危出其喜怒禍患伏於帷闥則嚮之所謂可恃者乃所以為患也患已深而覺之欲與疏逺之臣圖左右之親近緩之則養禍而益深急之則挾人主以為質雖有聖智不能與謀謀之而不可為為之而不可成至其甚則俱傷而兩敗故其大者亡國其次亡身而使姦豪得借以為資而起至抉其種類盡殺以快天下之心而後已此前史所載宦者之禍常如此者非一世也夫為人主者非欲養禍於內而疏忠臣碩士於外蓋其漸積而勢使之然也夫女色之惑不幸而不悟則禍斯及矣使其一悟捽而去之可也宦者之為禍雖欲悔悟而勢有不得而去也唐昭宗之事是已故曰深於女禍者謂此也可不戒哉司天五代史昔孔子作春秋而天人備豫述本紀書人而不書天豫何敢異於聖人哉其文雖異其意一也自堯舜三代以來莫不稱天以舉事孔子刪詩書不去也蓋聖人不絶天於人亦不以天參人絶天於人則天道廢以天參人則人事惑故常存而不究也春秋雖書日食星變之類孔子未嘗道其所以然者故其弟子之徒莫得有所述於後世也然則天果與於人乎果不與於人乎曰天吾不知質諸聖人之言可也易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙此聖人極論天人之際最詳而明者也其於天地鬼神以不可知為言其可知者人而已夫日中則昃盛衰必復天吾不知吾見其虧益於物者矣草木之成者變而衰落之物之下者進而流行之地吾不知吾見其變流於物者矣人之貪滿者多禍其守約者多福鬼神吾不知吾見人之禍福者矣天地鬼神不可知其心則因其著於物者而測之故據其迹之可見者以為言曰虧益曰變流曰害福若人則可知者故直言其情曰好惡其知與不知異辭也參而㑹之與人無以異也其果與於人乎不與於人乎則所不知也以其不可知故常尊而逺之以其與人無所異也則修吾人事而已人事者天意也書曰天視自我民視天聽自我民聽未有人心悅於下而天意怒於上者未有人理逆於下而天道順於上者然則王者君天下子生民布德行政以順人心是之謂奉天至於三辰五星常動而不息不能無盈縮差忒之變而占之有中有不中不可以為常者有司之事也本紀所述人君行事詳矣其興亡治亂可以見至於三辰五星逆順變見有司之所占者故以其官志之以備司天之所考嗚呼聖人既沒而異端起自秦漢以下學者惑於災異矣天文五行之說不勝其繁也豫之所述不得不異乎春秋也考者可以知焉前蜀五代史嗚呼自秦漢以來學者多言祥瑞雖有善辨之士不能袪其惑也豫讀蜀書至於龜龍麟鳯騶虞之類世所謂王者之嘉瑞莫不畢出於其國異哉然考王氏之所以興亡成敗者可以知之矣或以為一王氏不足以當之則視時天下治亂可以知之矣龍之為物也以不見為神以升雲行天為得志今偃然暴露其形是不神也不上於天而下見於水中是失職也然其一何多歟可以為妖矣鳯凰鳥之逺人者也昔舜治天下政成而民悅命䕫作樂樂聲和鳥獸聞之皆鼓舞當是之時鳯凰適至舜之史因並記以為美後世因以鳯來為有道之應其後鳯凰數至或出於庸君謬政之時或出於危亡大亂之際是果為瑞哉麟獸之逺人者也昔魯哀公出獵得之而不識蓋索而獲之非其自出也故孔子書於春秋曰西狩獲麟者譏之也西狩非其逺也獲麟惡其盡取也狩必書地而哀公馳騁所涉地多不可偏以名舉故書西以包衆地謂其舉國之西皆至也麟人罕識之獸也以見公之窮山竭澤而盡取至於不識之獸皆搜索而獲之故曰譏之也聖人已沒而異端之說興乃以麟為王者之瑞而附以符命讖緯詭怪之言鳯嘗出於舜以為瑞猶有說也及其後出於亂世則可以知其非瑞矣若麟者前有治世如堯舜禹湯文武周公之世未嘗一出其一出而當亂世然則孰知其為瑞哉龜𤣥物也汚泥川澤不可勝數其死而貴於卜官者用適其宜爾而戴氏禮以其在宫沼為王者難致之瑞戴禮雜出於諸家其失亦已多矣騶虞吾不知其何物也詩曰吁嗟乎騶虞賈誼以為騶者文王之囿虞虞官也當誼之時其說如此然則以之為獸者其出於近世之說乎夫破人之惑者難與爭於篤信之時待其有所疑焉然後從而攻之龜龍麟鳯王者之瑞而出於五代之際又皆萃於蜀此雖好為祥瑞之說者亦可疑也因其可疑者而攻之庶幾惑者有以思焉文編卷三十四

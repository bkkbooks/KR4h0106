body:
  text: 文編卷四十三明唐順之編君術一蘇轍天下之事雖其甚大而難辦者天下必有能辦之人蓋當今之所謂大患者不過曰四夷強盛而兵革不振百姓凋弊而官吏不飭重賦厚斂而用度不足嚴法峻令而姦宄不止此數四者所以使天子坐不安席中夜太息而不寐者也然臣皆以為不足憂何者天下必有能為天子出力而為之者而臣之所憂在乎天下之所不能如之何者也臣聞善治天下者必明於天下之情而後得御天下之術古之聖人惟其知天下之情而以術制之也故萬物皆可得而役其生皆可得而制其死牛服於箱馬服於轅鷹隼服於韝牛不可以有所觸馬不可以有所踶鷹隼不可以有所擊此三者喜怒好惡之情發於其外而見於人也是以因其所忌而授之以其術至於終身制於人而不去且治天下何異於治馬也馬之性剛狠而難制急之則弊而不勝緩之則情而不進王良造父為之先後而制其遲速驅之有方而掣之有時則終日躞躞而不知止古之聖人驅天下之人而盡用之仁者使效其仁勇者使效其勇智者使效其智力者使效其力天下之人雖雜然皆列於前安得仁人君子而後任之雖有天下之善人與之處而不知其情御之而不中其病則雖有好善之心而不獲好善之利何者彼不徒為吾用也而况乎天下之英雄欲收其功而不制其心哉昔者秦漢之際姦宄猛悍之人所在而為寇高祖發於豐沛之間行而收之黥布彭越之倫皆撫而納諸其中其所以制之者甚備也玉帛子女牛羊犬馬以極其豪侈之心輕財好施敦厚長者以服其趦趄之懷倨肆傲岸輕侮凌辱以折其強狠之氣其視天下之英雄不啻若匹夫孺子然皆得其歡心而用其死力至於元成之世天下久於太平士大夫生於其間無復英雄難制之風天下之士皆書生好儒其才氣勇力無足畏者俯首下氣求為之用而不暇元成哀平亦欲得天下之賢才而用之然而不知其情不獲其術賢人君子避讒畏譏逺引而去而小人宦豎縱橫放肆而制其事此甚可憫也夫人之平居朋友之間僕妾之際莫不有術以制其變蓋非有深逺難見之事也欲其用命而見其所害欲其樂從而見其所利欲其喜而致其所恱欲其懼而致其所忌欲其開心見誠而示之以無所恐欲其守死不去而示之以無所往此天下之人皆能知之而至於治天下則不能用此過矣天下以為天子之尊無所事術也而不知天下之事惟其英雄而後能有大功而世之英雄常苦豪橫太過而難制由此觀之治天下愈不可以無術也君術二蘇轍臣聞將求御天下之術必先明於天下之情不先明於天下之情則與無術何異夫天下之術臣固已略言之矣而又將竊言其情今使天子皆得賢人而任之雖可以無憂乎其為姦然猶有情焉而不可以不知蓋臣聞之人有好為名高者臨財推之以讓其親見位去之以讓其下進而天子禮焉則以為歡進而不禮焉則雖逼之而不食其祿力為廉恥之節以高天下若是而天子不知焉而豢之以厚利則其心赧然有所不平人有好為厚利者見祿而就之以優其身見利而取之以豐其家良田大屋惟其與之則可以致其才如是而天子不知焉而強之以名高則其心缺然有所不恱人惟無好自勝也好自勝而不少柔之則忿鬬而不和人惟無所相惡也有所相惡而不為少避之則事其私怒而不求成功素剛則無折之也素畏則無強之也強之則將不勝而折之則將不振凡此數者皆所以求用其才而不傷其心也然猶非所以馭天下之姦雄蓋臣聞之天下之姦雄其為心也甚深而其為迹也甚微將營其東而形之於西將取其右而擊之於左古之人有欲得其君之權者不求之其君也優遊翺翔而聽其君之所欲為使之得其所欲而油然自放以釋天下之權天下之權既去其君而無所歸然後徐起而收之故能取其權而其君不之知古之人有為之者李林甫是也夫人既獲此權也則思專而有之專而有之則常恐天下之人從而傾之夫人惟能自固其身而後可以謀人自固之不暇而欲謀人也實難故古之權臣常合天下之爭天下且相與爭而不解則其勢無暇及我是故可以久居而不可去古之人有為之者亦李林甫是也世之人君茍無好善之心幸而有好善之心則天下之小人皆將賣之以為姦何者有好善之名而不察為善之實天下之善固有可以謂之惡者天下之惡固有可以謂之善者彼知吾之欲為善也則或先之以善而終之以惡或有指天下之惡而飾之以善古之人有為之者石顯是也人之將欲為此釁也將欲建此事也必先得於其君欲成事而君有所不恱則事不可以成故古之姦雄劫之以其所必不能其所必不能者不可為也則將反而從吾之所欲為古之人有為之者驪姬之説獻公使之老而避禍是也此數者天下之至情故聖人見其初而求其終聞其聲而推其形蓋惟能察人於無故之中故天下莫能欺何者無故者必有其故也古者明王在上天下之小人伏而不見夫小人者豈其能無意於天下也舉而見其情發而中其病是以愧恥退縮而不敢進臣欲天子明知君子之情以養當世之賢公名卿而深察小人之病以絶其自進之漸此亦天下之至明也君術四蘇轍臣聞古者君臣之間相信如父子相愛如兄弟朝廷之中優遊恱懌歡然相得而無間知無所不言言無所不盡開心平意表裏洞達終身而不見其隙當此之時天下之人出身以事君委命於上而無所憂懼安神定氣以觀天下之政蕩然肆志有所欲為而上不見忌其所據者甚堅而無疑是以士大夫皆敢進而擅天下之大功至於後世君臣相虞皆有猜防之憂君不敢以其誠心致諸其臣而臣亦不耿直已以行事二者相與齟齬而不相信上下相顧鰓鰓然而不能以自安而尚何暇及於天下之利害故天下之事每每擾敗而無所成就臣竊傷之而以為其弊在於防禁之太深而督責之太急夫古之聖人至嚴而有所至寬至易而有所至險使天下有所易信而有所不可測用之各當其處而不失節是以天下畏其嚴而樂其寬至於後世之君徒知天下之不可以甚寬也而用之其君臣之際使其公卿大臣終日憂懼不得安意肆志以自盡於其上而以為畏威徒知天下之不可甚嚴也而用之其法律之事使其天下之官吏欺其長上得以茍免取容不畏天子之法而以為行惠蓋其所以用之之術甚悖而不順者至於如此夫天下之人上自百官而下至於庶民其為數安可窮盡而天子者以其一身寄乎其中論其衆寡之勢則天下至衆而天子至寡論其智詐巧偽之術則天下之衆固必有過於天子者吾欲臨之以天子之威則彼有畏憚而不敢言多為之隄防以御其變詐則彼之智將有以出於隄防之所不能及是以古之聖人推之以至誠而御之以至威容之以至寬而待之以至易以君子長者之心待天下之士而不防其為詐談笑議論無所不及以開其歡心故天下士大夫皆欣然而入於其中有所愧恥而不忍為欺詐之行力行果斷而無憂懼不敢之意其所任用雖其兄弟朋友之親而不顧徇私之名其所誅戮雖其仇怨睚眥之人而不恤報怨之嫌何者君臣相信之篤此所謂至嚴而有所至寬者也然至大吏縱橫放肆犯法而無忌天下之所指目律令之所當取則雖天子有所不可輒釋使之一入而不可解而後天下知有所畏此所謂至易而有所至險二者其事不同而相與為用夫是以至寬而天下無頺惰靡迤之風至險而君臣無猜防逼迫之慮夫惟能通其君臣之歡而盡行其刑法之所禁而後可以及此也君術五蘇轍臣聞事有若緩而其變甚急者天下之勢是也天下之人幼而習之長而成之相咻而成風相比而成俗縱橫顛倒紛紛而不知以自定當此之時其上之人刑之則懼驅之則聽其勢若無能為者然及其為變常至於破壞而不可禦故夫天子者觀天下之勢而制其所向以定其所歸者也夫天下之人弛而縱之拱手而視其所為則其勢無所不至其狀如長江大河日夜渾渾趨於下而不能止抵曲則激激而無所泄則咆勃潰亂蕩然而四出壞隄防包陵谷汗漫而無所制故善治水者因其所入而導之則其勢不至於激怒坌湧而不可收既激矣又能徐徐而泄之則其勢不至於破決蕩溢而不可止然天下之人常狎其安流無事之不足畏也而不為去其所激觀其激作相蹙潰亂未發之際而以為不至於大懼不能徐泄其怒是以遂至橫流於中原而不可卒治昔者天下既安其人皆欲安坐而守之循循以為敦厚默默以為忠信忠臣義士之氣憤悶而不得發豪俊之士不忍其鬱鬱之心起而振之而世之士大夫好勇而輕進喜氣而不懾者皆樂從而羣和之直言忤世而不顧直行犯君而不忌今之君子纍纍而從事於此矣然天下猶有所不從其餘風故俗猶衆而未去相與抗拒而勝負之數未有所定邪正相搏曲正相犯二者潰潰而不知其所終極蓋天下之勢已少激矣而上之人不從而遂決其壅臣恐天下之賢人不勝其忿而自決之也夫惟天子之尊有所欲為而天下從之今不為決之於上而聽其自決則天下之不同者將悻然而不服而天下之豪俊亦將奮踴不顧而力決之發而不中故大者傷小者死橫潰而不可救譬如東漢之士李膺杜密范滂張儉之黨慷慨議論本以矯拂世俗之弊而當時之君不為分别天下之邪正以決其氣而使天下之士發憤而自決之而天下遂以大亂由此觀之則夫英雄之士不可以不少遂其意也是以治水者惟能使之日夜流注而不息則雖有蛟龍鯨鯢之患亦將順流奔走奮迅恱豫而不暇及於為變茍其瀦蓄渾亂壅閉而不決則水之百怪皆將勃然放肆求以自快其意而不可禦故夫天下亦不可不為少決以順適其意也臣事一蘇轍臣聞天下有權臣有重臣二者其迹相近而難明天下之人知惡夫權臣之專而世之重臣亦遂不容於其間夫權臣者天下不可一日而有而重臣者天下不可一日而無也天下徒見其外而不察其中見其皆侵天子之權而不察其所為之不類是以舉皆嫉之而無所喜此亦已太過也今夫權臣之所為者重臣之所切齒而重臣之所取者權臣之所不顧也將為權臣耶必將內恱其君之心委曲聽順而無所違戾外竊其生殺豫奪之柄黜陟天下以見已之權而沒其君之威惠內能使其君歡愛恱懌無所不順而安為之上外能使其公卿大夫百官庶吏無所不歸命而爭為之腹心上愛下順合而為一然後權臣之勢遂成而不可拔至於重臣則不然君有所為不可以必爭爭之不能而其事有所必不可聽則專行而不顧待其成敗之迹著則上之心將釋然而自解其在朝廷之中天子為之踧然而有所畏士大夫不敢安肆怠惰於其側爵祿慶賞已得以議其可否而不求以為已之私惠刀鋸斧鉞已得以參其輕重而不求以為已之私勢要以使天子有所不可必為而羣下有所震懼而已不與其利何者為重臣者不待天下之歸已而為權臣者亦無所事天下之畏已也故各因其行事而觀其意之所在則天下誰可欺者臣故曰為天下安可一日無重臣也且今使天下而無重臣則朝廷之事惟天子之所為而無所可否雖天子有納諌之明而百官畏懼戰栗無平昔尊重之勢誰肯觸忌諱冒罪戾而為天下言者惟其小小得失之際乃敢上章歡譁而無所憚至於國之大事安危存亡之所繫則將卷舌而去誰敢發而受其禍此人主之所大患也悲夫後世之君徒見天下之權臣出入唯唯以為有禮而不知此乃所以潛潰其國徒見天下之重臣剛毅果敢喜逆其意則以為不遜而不知其有社稷之慮二者淆亂於心而不能辨其邪正是以喪亂相仍而不悟何足傷也昔者衛太子聚兵以誅江充武帝震怒發兵而攻之京師至使丞相太子相與交戰不勝而走又使天下極其所往而翦滅其迹當此之時茍有重臣出身而當之擁護太子以待上意之少解徐發其所蔽而開其所怒則其父子之際尚可得而全也惟無重臣故天下皆知之而不敢言臣愚以為凡為天下宜有以養其重臣之威使天下百官有所畏忌而緩急之間能有所堅忍持重而不可奪者竊觀方今四海無變非常之事宜其息而不作然及今日而慮之則可以無異日之患不然者誰能知其果無有也而不為之計哉抑臣聞之今世之弊在於法禁太密一舉足不如律令法吏且以為言而不問其意之所屬是以雖天子之大臣亦安敢有所為於法律之外以安天下之大事故為天子之計莫若少寬其法使大臣得有所守而不為法之所奪昔申屠嘉為丞相至召天子之幸臣鄧通立之堂下而詰責其過是時通幾至於死而不救天子知之亦不以為怪而申屠嘉亦卒非漢之權臣由此觀之重臣何損於天下哉臣事二蘇轍臣聞仲尼之稱管仲曰奪伯氏駢邑三百飯蔬食沒齒無怨言又讀蜀志其言諸葛孔明遷李平殛廖立及孔明既死而此二人皆哭泣有至死者臣每讀其書至此未嘗不嗟歎古人之不可及也夫為天下國家惟剛者能守其法而公者能以剛服天下天下者天子之天下也賞罰之柄豫奪之事其出於天子本無敢言者惟其不公故有一人焉受戮而去雖其當罪而亦勃然有不服之心而上之人雖其甚公於此而亦畏其不服而不敢顯然明斥其罪故夫天下之不公足以敗天下之至剛而天下之不剛亦足以破天下之至公臣嘗竊悲唐季五代之亂外有執兵強忿之臣威蓋天下而以其力內脅天子天子不敢輒忤其意意有所不恱則其上下不能自保當此之時人主務為安身之政不敢以其剛心而守其公事此其勢不得不然耳方今海內治安外無諸侯之虞而內無執政之患然臣竊觀之於政令刑賞之際常若有所畏而不敢自必者此其故何也夫朝廷之臣無罪而留有罪而黜此為臣之常也故其有罪以為當黜則官必削以為不當黜則無故而置之外地猶為不可今有罪而推之於外反從而增其爵秩是將以為賞耶為刑耶是不可得而知也蓋曰姑以鎮撫其耿耿之意彼其失為近臣而去也雖賜之千金而猶有所慊然於其心且天下之罪人而皆欲滿其所懷則為天子安可以有所刑戮哉然而事之所不平者又非特如此也黜之者一人則必有排而辨之者一人以為黜者之有所不恱乎其辨之者也而使與之皆黜夫此二人其罪果誰在乎以其言而黜人亦以其言而黜之是為黜者報仇耳是以天下雖無強臣之災而臣下竊揣天子之心皆有所持而邀之此其弊始於執之不剛而成於守之不公夫朝廷之事臣安得知其有所不公者然竊怪每有所除吏民間莫不切切口語以為此誰人之親戚故舊而得之者每有所措置亦莫不以為此誰人之所欲而行之者使上之人凡果如此則宜乎人之受罪而不服而吾亦不敢以加於人也詩云人亦有言柔則茹之剛則吐之唯仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏強禦夫人唯能不侮鰥寡也而後能不畏強禦臣故曰惟公者能以剛服天下此其勢然也且夫古之為君者有所大樂而今世不知也人君之樂非樂夫有天下而樂得與天下去惡而奬善以快吾志今使天下有不義之臣誅之不獲又從而尊之尊之不足以為恱而又從而黜其所怨以慰其盛怒此二事者夫豈為君之樂哉蓋事有所不可並從而欲不可以皆得今夫人之有所私愛而不公者是亦人之所樂焉耳然其為樂有所害於為君之樂是以不若棄彼而全此也且事之利害有知之而患不可為者有患不知之而知之則可行者今欲潔然無私而行吾法之所至有罪而黜黜而無所姑息使天下皆知賞之為賞罰之為罰此非有所勤苦而難成者而顧患不肯為夫管仲孔明惟其為之而已矣臣事三蘇轍臣聞天下有無窮之才不叩則不鳴不觸則不發是以古之聖人迎其好善之端而作其勉強之氣洗濯磨淬日夜不息凡此將以求盡天下之無窮也夫天下譬如大器焉有器不用而置諸牖下久則蟲生其中故善用器者提携不去時濯而溉之使之日親於人而獲盡其力以無速敗有小丈夫徒知愛其器而不知所以為愛也知措諸地之安而不知不釋吾手之為不壞也是以事不得成而其器速朽且夫天下之物人則皆用其形而不求其神也神者何也物之精華果鋭之氣也精華果鋭之氣其在物也曄然而有光確然而能堅是氣也亡則物皆枵然無所用之夫是氣也時叩而存之則日長而不衰置而不知求則脫去而不居是氣也物莫不有也而人為甚天下亂則君子有以自養而全之而天下治則天子養之以求其用今夫朝廷之精明戰陳之勇力獄訟之所以能盡其情而錢榖之所以能治其要處天下之紛紜而物莫能亂者皆是氣之所為也蓋古者英雄之君唯能叩天下之才而存之是以所求而必從所欲而必得漢武帝唐太宗國富而兵強所欲如意而天下之才用之不見其盡當其季年元臣宿將死者大半而新進之士亦自足以辦天下由此觀之則天下固有無窮之才而獨患乎上之不叩不觸而使其神弛放而不張也臣竊觀當今之人治文章習議論明會計聽獄訟所以為治者其類莫不備具而天下之所少者獨將帥武力之臣往者天下既安先世老將已死而西寇作難當此之時天子茫然反顧思得竒才良將以屬之兵而終莫可得其後數年邉鄙日蹙兵勢日急士大夫始漸習兵而西夏臣服以至于今又將十有餘年而曩之所謂西邉之良將者亦已略盡矣而天下之人未知誰可任以為將此甚可慮也夫天下之事莫難於用兵而今世之所畏莫甚於為將責之以難事強之以其所甚畏而不作其氣是以將帥之士若此不可得也蓋嘗聞之善用兵者雖匹夫之賤亦莫不養其氣而後求其用方其未戰也使之投石超距以致其勇故其後遇敵而不懼見難而致死何者氣盛故也今天下有大弊二以天下之治安而薄天下之武臣以天下之冗官而廢天下之武舉彼其見天下之方然則摧沮退縮而無自喜之意今之武臣其子孫之家往往轉而從進士矣故臣欲復武舉重武臣而天子時亦親試之以騎射以觀其能否而為之賞罰如唐正觀之故事雖未足以盡天下之奇才要以使之知上意之所恱有以自重而爭盡其力則夫將帥之士可以漸見矣臣事四蘇轍臣聞天下之患無常處也惟見天下之患而去之就其所安而從之則可久而無憂有淺丈夫見其生於東也而盡力於東以忘其西見其起於外也而鋭意於外以忘其中是以禍生於無常而變起於不測莫能救也昔者西漢之禍當文景之世天下莫不以為必起於諸侯之太強也然至武帝之時七國之餘日以漸衰天下坦然四顧以為無虞而陵夷至於元成之間朝廷之強臣實制其命而漢以不祀世祖顯宗既平天下以為世之所患莫不在乎朝廷之強臣矣而東漢之亡其禍乃起於宦官由此觀之則天下之患安在其防之哉人之將死也或病於大勞或病於飲酒天下之人見其死於此也而曰必無勞力與飲酒則是不亦拘而害事哉昔唐季五代之亂果何在也海內之兵各𨽻其將大者數十萬人而小者不下數萬撫循鞠養美衣豐食同其甘苦而順其好惡甚者養以為子而授之以其姓故當是時軍旅之士各知其將而不識天子之惠君有所令不從而聽其將而將之所為雖有大姦不義而無所違拒故其亂也姦臣擅命擁兵而不可制而方其不為亂也所攻而必降所守而必固良將徑兵遍於天下其所摧敗破滅足以上快天子鬱鬱之心而外抗敵國竊發之難何者兵安其將而樂為用命也然今世之人遂以其亂為戒而不收其功舉天下之兵數百萬人而不立素將將兵者無腹心親愛之兵而士卒亦無附著而欲為之效命者故命將之日士卒不知其何人皆莫敢仰視其面夫莫敢仰視是禍之本也此其為禍非有脅從駢起之殃緩則畏而怨之而有急則無不忍之意此二者用兵之深忌而當今之人蓋亦已知之矣然而不敢改者畏唐季五代之禍也而臣竊以為不然天下之事有此利也則必有此害天下之無全利是聖人之所不能如之何也而聖人之所能要在不究其利利未究而變其方使其害未至而事已遷故能享天下之利而不受其害昔唐季五代之法豈不大利於世惟其利已盡而不知變是以其害隨之而生故我太祖太宗以為不可以長久而改易其政以便一時之安為將者去其兵權而為兵者使不知將凡此皆所以杜天下之私恩而破其私計其意以為足以變五代豪將之風而非以為後世之可長用也故臣以為當今之勢不變其法無以求成功且夫邀天下之大利則必有所犯天下之危欲享大利而顧其全安則事不可成而方今之弊在乎不欲有所搖撼而徒得天下之利不欲有所勞苦而遂致天下之安今夫欲人之成功必先捐兵以與人欲先捐兵以與人則先事於擇將擇將而得之茍誠知其忠雖捐天下以與之而無憂而况數萬之兵哉昔唐之亂其為變者非其所命之將也而皆其盜賊之人所不得已而以為將者故夫將帥豈必盡疑其為姦要以無畏其擇之之勞而遂以破天下之大利蓋天下之患夫豈必在此也臣事五蘇轍臣聞天下之勇士可使用兵而不可使主兵天下之智士可使主兵而不可使養兵養兵者君子之事也故用兵難而養兵為尤難何者士氣之難服也舉兵而征行三軍之士其心在號令而其氣在戰息兵而為營三軍之士其心在壘壁而其氣在禦陳兵而遇敵三軍之士其心在白刃而其氣在勝氣之所在者毒之所向也故兵在外士氣在敵而不在其上不在其上是故撫之而易恱豫之而易足誅之而易定動之而易使其上之人御之以勇而驅之以智則百萬之衆可以無足憂者及夫天下既安三軍之士各反其室家美衣甘食優遊無為投石超距不足以泄其怒而各求其上之所短當此之時軍中之士圜視四顧而始不可忍矣是故久於不用則其意不欲復戰久於不使則其意不欲復役夫惟不欲而強使之與之出戰則不樂而與之從役則為亂此必然之勢也夫古者兵出於農其欲動之尤難然當周之季諸侯之強天下之民日起而操兵齊晉秦楚以其兵車徜徉天下萬里而後反而天下之民不敢言病至於後世平居無事常竭天下以養士卒一旦有急當得其力乃反傲晲邀賞不肯即去夫其平時衣食其上有難而起起而鬬死有事而役役而盡力此其勢宜若愈於三代之農夫矣而當今方病其不然此豈非其養之之過歟臣觀天下之兵其數莫如京師之多而士卒之趦趄難制亦莫如京師之甚何者天子在位以仁御兵士不知戰而狃於賞令之稍急則瞋目攘臂而言不遜此甚可惡也且京師宗廟禁闈之所在而使不義之徒周環布列於其左右而尚何以為安臣聞養兵而兵驕戾其責在將方今京師之將所任者誰乎匹夫小人以次當遷而為之什百之長此其為名尚未離乎卒伍也而其上之所統獨有三太尉推而上之則至於樞密使此數四大臣者非在什伍部曲之間以日夕訓練之者也且夫卒未親附而罰之則不服不服則難用也今使大臣獨制其上恩意不交而德澤不洽上下不相信特以勢相從而無以義附者則是未可以法治也使朝廷大臣而曲躬傴僂親問疾苦如異時出兵行陳之間此則其勢有所不給矣古者南北軍有監軍御史有護軍諸校各有軍正正丞是以任安胡建之徒忠信守節之士得以出入軍中獲其歡心而後訓之以禮繩之以法有以誅滅而士卒皆服如此而後兵可用也今奈何獨使狼戾之人自相臨御而天子獨以貪暴無知之匹夫為左右之衛哉臣愚以為略如漢制設為諸校使常處軍中既以撫之且漸誅戮其豪橫而訓之知禮傳曰晉悼公知欒紏之能御以知于政也以為戎御使訓諸御知義知荀賓之有力而不暴也以為戎右使訓勇力之士時使故軍中之吏非其近之則不能得其歡心不得其心則雖有法而不能用有法不能用則士不可以勞苦而兵不可以應卒有兵不可以應卒而有將不能以使衆此最天下之大患也臣事六蘇轍臣聞聖人之治天下常使人有孜孜不已之意下自一介之民與凡百執事之人咸願竭其力以自附於上而上至公卿大夫雖其甚尊志得意滿無所求望而亦莫不勞苦其思慮日夜求進而不息至有一沐而三握一飯而三吐食不暇飽卧不暇暖汲汲於事常若有所未足者是以天下之事小大畢舉無所廢敗而上之人可以不勞力而萬事皆理昔者世之隆替臣嘗已略觀之矣當堯舜之時洚水橫流民不粒食事變繁多災害並興而堯舜之身至於垂拱而無為何者天下之人各為之用力而不辭也至於末世海內乂安四方無虞人生於其間其勢皆有荒怠之心各安其所而不願有所興作故天下漸以衰憊而不振詩曰周雖舊邦其命維新夫國之所以至於亡者惟其舊而無以新之歟天下舊而不復新則其事業有所斷而不復續當此之時而不知與之相期於長久不已之道而時作其怠惰之氣則天下之事幾乎息矣今夫道路之人使之趨十里而與之百錢則十里而止使之趨百里而與之千錢則百里而止何者所與期者止於十里與百里而其利亦止於此而已今世之士何以異此出於布衣者其志不過一命之祿既命則忘其布衣之學仕於州縣者其志不過於改官之寵既改則喪其州縣之節自是以上因循遞遷十有餘年之間則其勢自至於郡守此不待有所修飾而至者其志極矣幸而其間有欲特自奮厲之心然後其意稍廣而不肯自棄於貪汙之黨外自漕刑內自臺諌館閣而至於兩制亦又極矣又幸而有求為宰相者則其志又益廣至於宰相而極矣蓋天子之所以使天下慕恱而樂為吾用者下自一命之臣而上至宰相其節級相次者有四而已彼其一命者或無望於改官郡守者或無望於兩制兩制者或無望於宰相而為宰相者無所復望則各安於其所而誰肯為天子盡力者且夫世之士大夫如此其衆也仁人君子如此其不少也而臣何敢妄有以詆之哉蓋臣聞之方今之人其已改官者其廉隅節幹之效常不若其在州縣之時而為兩制者其慷慨徑挺之操常不若其為漕刑臺諌之日雖其奇才偉人卓然特立不為利變者固不在此而世之為此者亦已衆矣夫以爵祿而勸天下爵祿已極則人之怠心生以術使天下則天下之人終身奔走而不知止昔者漢之官吏自縣令而為刺史自刺史而為郡守自郡守而為九卿自九卿而為三公自下而上至於人臣之極者亦有四而已然當此之時吏久於官而不知厭方今朝廷郡縣之職列級分等不可勝數從其下而為之三歲而一遷至於終身可以無倦矣而人亦各自知其分之所止其清高顯榮者雖至老死而不可輒入是以在位者皆懈而不自奮何者彼能通其君臣之歡坦然其無高下峻絶不可扳援之勢而吾則不然今天下之小臣因其朝見而勞其勤苦丁寧訪問以開導其心志且時擇其尤勤勞者有以賜豫之使知朝廷之不甚逺而容有冀於其間上之大吏時召而賜之間燕與之講論政事而勉之於功名相邀於後世不朽之際與夫子孫皆享其福之利時亦有以督責其荒怠弛廢之愆使之有所愧恥於天子之恩意而不倦於事此豈非臣所謂奔走天下之術歟臣事七蘇轍臣聞聖人之於人不恃其必然而恃吾有以使之不恃其皆賢而恃吾有以驅之夫使天下之人皆有忠信正直之心則為天下安俟乎聖人唯其不然是以使之有方驅之有術不可一日而去也今夫天下之官莫不以為可任而後任之矣上自兩府之大臣而下至於九品之賤吏近自朝廷之中而逺至於千里之外上下相伺而左右相覺不為不密也然又內為之御史而外為之漕刑使督察天下之姦人而紏其不法如此則天下何恃其皆賢而期之以必然哉然尚有所未盡者蓋天下之事任人不若任勢而變吏不如變法法行而勢立則天下之吏雖其非賢而皆欲勉強以求成功故天子可以不勞而得忠良之臣今世之弊任弊法而用不便之勢勞苦於求賢而不知為法之弊是以天下幸而得賢則可以僥幸於治安不幸而無賢焉則遂靡靡而不振且御史漕刑天子之所恃以知百官之能否者也今不為之立法而望其皆賢故臣所謂有所未盡者謂此事也夫此二官雖其內外之不同而其於擊搏羣下權勢輕重本無以相逺也而自近歲以來為御史者莫不洗濯磨淬以自見其圭角慷慨論列不顧天下之怨是以朝廷之中上無容姦而下無宿詐正直之士莫不相慶以為庶幾可以大治然臣愚以謂方今內肅而外不振千里之外貪吏晝日取人之金而莫之或禁逺人咨嗟無所告訴莫不飲泣太息仰而呼天者深惟國家所以設漕刑之意正以天下有此等不平之故耳今海內幸無變而逺方之民戚然皆苦貪吏之禍則所謂漕刑者尚何以為然人之性不甚相逺豈其為御史則皆有嫉惡之心而至於漕刑則皆得鹵莽茍容之人蓋上之所以使之者未至也臣觀御史之職雖其屬吏之中茍有能出身盡命排擊天下之姦邪則數年之間可以至於兩制而無難而其不能者退斥罷免不免為碌碌之吏是以御史皆務為訐直之行而漕刑之官雖端坐默默無所發摘其終亦不失為兩制而其抗直不撓者亦不過如此而徒取天下之怨是以皆好為寬仁以收敦厚之名豈國家知用之御史而不知用之漕刑哉臣欲使兩府大臣詳察天下漕刑之官唯其有所舉按不畏強禦者而後使得至於兩制而其不然者不免為常吏變法而任勢與之更新使天下之官吏各從其勢之所便而為之而其上之人得賢而任之則固已大善如其不幸而無賢則亦不至於紛亂而不可治雖夫庸人亦可使之自力而為政如此則天下將內嚴而外明姦吏求以自伏而不得其處天下庶乎可以為治矣臣事八蘇轍臣聞天下惟其有權者可以使人有利者可以得衆權者天下之所為去就也利者天下之所為奔走也能是非可否者之謂權能貧富貴賤者之謂利天子者收天下之權而自執之斂天下之利而親用之者也故天下之人上自公卿大夫之尊而下至於閭閻匹夫之賤府史胥徒僮僕奴妾以次相屬而相役至於疲弊勞苦老死而不去緩急可以使之相救危難可以使之相死蹈白刃赴深谷可使用命而不敢辭何者彼利於人者固役於人也千金之家持其贏餘以丐貸鄰里之貧民薄息緩取而可以豪橫於鄉黨刺客武士為之效死而莫之能制此權利之所致也臣聞天子者執天下之權而擅四海九州之利爵祿慶賞金玉錢幣此其富非特千金之利也豫奪可否刑戮誅滅此其勢非特千金之權也古之人君得天下之權利而專之是故所為而成所欲而就謀臣猛將為之盡力有死而無二社稷之臣可使死宗廟郡縣之臣可使死封疆文吏可使死其職武吏可使死其兵天下之人其存心積慮皆以為當然是以寇至而不懼難生而無變方其平居無事之際天子衣食而養之以待天下之事故有事而死亦其勢然也然當今天下之人食天子之祿被天子之爵衣青紫佩印綬從吏卒縱橫赫奕者常遍天下一旦有急皆莫肯死者此甚可怪也往年廣南之亂大吏據城擁兵賊至而莫敢擊逃遁奔竄伏於草莽之間以避兵革之禍至使蠻夷之人得以橫行於中原人民流離方數千里幾為邱墟而無一死戰之吏國家每歲收天下之士士之發於飢寒取官而去者動以數百為輩六年之間考足而無過則又為之改爵而增其祿秩幸而有超羣拔類之才則公卿大臣又得薦之於天子而特寵貴之翺翔朝廷之間不出十年可以安坐談笑而為兩制此其為法尚何所負於天下而士大夫終莫肯奮而為之用何也夫明哲之君以其法邀天下今天下之人反以其法邀之故邀在我則奔走者人也邀在人則奔走者我也今世之法夫豈不欲以邀人哉涖官六七考求舉者五六人凡此皆備具而無所過失然後為之改爵而增其祿秩夫此豈誠足以邀人哉為法而不足以邀人則人將反以吾法而相邀今之官吏考足而無過且有舉者則天子寧有以却之耶是不得不從而豫之矣如此則是天子之爵祿非天子之惠而天子之勢也士大夫以勢取爵祿是以舉皆不聽其上凡今天子之權反而入於下而天子之利變而為輕取易得之物矣蓋臣聞天下有二弊有法亂之弊有法蔽之弊法亂則使人紛紛而無所執法蔽則使人牽制而不自得古之聖人法亂則以立法救之而法蔽則受之以無法夫無法者非縱橫放肆之謂也上之人投棄規矩而使天下無所執以邀其君是之謂無法今夫官吏之法其亦無自舉者與考而已使一二大臣得詳其才與不才舉者具而考足才者與之而不才者置之雖有考不足而舉者不具其可與者則亦與之也凡皆務與天下為所不可測使吏無所執吾法以邀我收天子之權利而歸之於上如此則議者將以為蕩然無法則大吏易以為姦臣聞人惟不為姦也而後任以為大吏茍天下之廣而無一二大臣可信者則國非其國矣且自唐季以來世之設法者始皆務以防其大臣蓋唐之盛時其所以試天下之士與調天下之選人者皆無一定之法而惟有司之為聽夫是以下不得邀其上而上有以役其下臣故曰惟有權者可以使人有利者可以得衆此不可不深察也臣事九蘇轍臣聞聖人之為天下不務逆人之心人心之所向因而順之人心之所去因而廢之故天下樂從其所為惟其一人之所欲不可以施於天下不得已而後有所矯拂而不用蓋非以為天下之人皆不可以順適其意也昔生民之初生而有飢寒牝牡之患飲食男女之際天下之所同欲也而聖人不求絶其情又從而為之節文教之炮燔烹飪嫁娶生養之道使皆得其志是以天下安其法而不怨後世有小丈夫不達其意之本末而以為禮義之教皆聖人之所作為以制天下之非僻徒見天下邪放之民皆不便於禮義之法乃欲務矯天下之情置其所好而施其所惡此何其不思之甚也且雖聖人不能有所特設以驅天下蓋因天下之所安而遂成其法如此而已如使聖人而不與天下同心違衆矯世以自立其説則天下幾何其不叛而去也今之説者則不然以為天下之私欲必有害於國之公事而國之公事亦必有所拂於天下之私欲分而異之使天下公私之際譬如胡越之不可以相通不恤人情之所不安而獨求見其所以為至公而無私者蓋事之不通莫不由此之故今夫人之情非其所樂而強使為之則皆有怏怏不快之心是故所為而無成所任而不稱其職臣聞方今之制吏之生於南者必置於北生於東者必投於西嶺南吳越之人而必使冒苦寒踐霜雪以治燕趙之事秦隴蜀漢之士而必使涉江湖衝霧露以守揚越之地雖其上之人逼而行之無所不從而行者望其所之怨歎咨嗟不能以自安吏卒送迎於道路逺者涉數千里財用殫竭困弊於外既至而好惡不相通風俗不相習耳目之所見飲食之所便皆不得其當譬如僑居於他鄉其心常屑屑而不舒數日求去而不肯慮長久之計民不喜其吏而吏不喜其俗二者相與齟齬而不合以不暇有所施設而吏之生於其地者莫不自以為天下之所不若而今之法為吏者不得還處其鄉里雖數百里之外亦輒不可而又以京師之所在而定天下逺近之次凡京師之人所謂近者皆四方之所謂至逺而京師之所謂逺者或四方之所謂近也今欲以近優纍勞之吏而不知其有不樂者為此之故也且夫人生於鄉閭之中其親戚墳墓不過百里之間至於千里之內則譬如道路之人亦何所施其私而又風俗相安上下相信知其利害而詳其好惡近者安處其近而逺者樂得其逺二者各獲其所求而無有求去之心耳目開明而心不亂可以各有所立凡此數者蓋亦無損於國矣而特守此區區無益之公此豈王者之意哉且三代之時九州之中建國千有八百大者不過百里而小者數十里數十里之間民之為士者有之為大夫者有之凡所以治其國人者亦其國人也安得異國之人而後用哉臣愚以謂如此之類可一切革去以順天下之欲今使天下之吏皆同為姦則雖非其鄉里而亦不可有所優容茍以為可任則雖其父母之國豈必多置節目以防其弊而况處之數百千里之間哉臣事十蘇轍臣聞大臣之道行之而可名名之而可言布之天下而無疑施之後世而無愧堂堂乎立於四海雖一介之士而無所不安此其所以為大人之道歟今夫天下之人天子誰不役其力者而天下皆不敢以為非此誠得其可役之名而役之是以天子安坐於上而士大夫為之奔走於下大者為之運籌畫䇿治百官以濟其大事而小者為之按米鹽視鞭箠以奉其小職文吏為之簿書會計詳其出內取豫之數而使天下不敢欺武吏為之擐金被革習其戰陳攻鬬之事而使天下不敢犯勞苦其筋力而罄竭其思慮甚者捐首領暴骨肉於原野而不知避何者食其祿也至於四野之民耕田而食或生而不至市井然及其有稅而可役趨步於縣吏之前恭謹有禮不教而自習而其尤難者至使之斬捕盜賊挽弓列戟疲弊而不敢求免此豈非食其地之故歟故夫天下之人凡天子之所得而使令者皆可得而名也而臣切怪府史胥徒古者皆有祿以食其家而其不足者皆得計口而受田以補其不給夫是以能使之盡力於公事而不恤其私計蓋周之所謂官田者府史胥徒之田也而今世之法收市人而補以為吏無祿以養其身而無田以畜其妻子又有鞭朴戮辱之患而天下之人皆喜為之其所以責之者甚煩且難而其所以使之者無名而可言而其甚者又使之反入錢而後補雖得復役而其所免不足以償其終身之勞此獨何也天子以無名使之而天下之人亦肯以無名而為之此豈可不求其情哉夫天子舉四海而寄之其臣郡縣之官又舉而寄之其郡縣之小吏刑法之輕重財用之多少無所不在是以掌倉庫者得以為盜而治獄訟者得以為姦為姦之利上足以養父母而下足以畜妻子其所以無故而安為之者為此之故也是以雖無爵祿之勸而可得而使雖有刑戮恥辱之患而不肯捨而去而其上之人驅其無祿之身而遇之以有祿之法恬不為怪此乃公使之為姦以當其所當得之祿而遂以為可得而使也如此則尚何以示天下臣愚以為凡人之在官不可以無故而用其力或使以其稅而或使以其祿故夫府史胥吏不可以無祿使也然臣觀之方今天下苦財用之不給而用度有所不足其勢必無以及此而古者周官之法民之為訟者入束矢為獄者入鈞金視其不直者而納其所入蓋自秦漢以來其法始廢而不用今臣亦欲使天下之至於獄者皆有所入於官以自見其直而其不直者亦皆沒其所入以為胥吏之俸祿辨其等差而别其多少以時給之以足其衣食之用其所以取之於民者不苛而其所以為利者甚博蓋上之於民常患其好訟而不直以身試法而無所畏忌刑之而又使之有入於官此所以深懲其心而又其所得止以厚吏此有以見乎非貪民之財也而為吏者可以無俟為姦而有以自養名正而言順雖其為姦從而戮之則亦無愧乎吾心嗚呼古之所謂正名者猶此類也夫文編卷四十三

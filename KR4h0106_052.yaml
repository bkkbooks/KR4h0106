body:
  text: 文編卷五十二明唐順之編帝王世次圖序歐陽修堯舜禹湯文武此六君子者可謂顯人矣而後世猶失其傳者豈非以其逺也哉是故君子之學不窮逺以為能而闕其不知慎所傳以惑世也方孔子時周衰學廢先王之道不明而異端之說並起孔子患之乃修正詩書史記以止紛亂之說而欲其傳之信也故略其逺而詳其近於書斷自唐虞以來著其大事可以為世法者而已至於三皇五帝君臣世次皆未嘗道者以其世逺而慎所不知也孔子既沒異端之說復興周室亦益衰亂接乎戰國秦遂焚書先王之道中絶漢興久之詩書稍出而不完當王道中絶之際竒書異說方充斥而盛行其言往往反自託於孔子之徒以取信於時學者既不備見詩書之詳而習傳盛行之異說世無聖人以為質而不自知其取捨真僞至有博學好竒之士務多聞以為勝者於是盡集諸說而論次初無所擇而惟恐遺之也如司馬遷之史記是矣以孔子之學上述前世止於堯舜著其大略而不道其前遷逺出孔子之後而乃上述黃帝以來又詳悉其世次其不量力而務勝宜其失之多也遷所作本紀出於大戴禮世本諸書今依其說圖而考之堯舜夏商周皆同出於黃帝堯之崩也下傳其四世孫舜舜之崩也復上傳其四世祖禹而舜禹皆夀百嵗稷契於髙辛為子乃同父異母之兄弟今以其世次而下之湯與王季同世湯下傳十六世而為紂王季下傳一世而為文王二世而為武王是文王以十五世祖臣事十五世孫紂而武王以十四世祖伐十四世孫而代之王何其繆哉嗚呼堯舜禹湯文武之道百王之取法也其盛德大業見於行事而後世所欲知者孔子皆已論著之矣其久逺難明之事後世不必知不知不害為君子者孔子皆不道也夫孔子所以為聖人者其智知所取捨皆如此後序歐陽修余既略論帝王世次而見本紀之失猶謂文武與紂相去十五六世其繆較然不疑而堯舜禹之世相去不逺尚兾其理有可通乃復以尚書孟子孔安國皇甫謐諸書參考其夀數長短而尤乖戾不能合也據書及諸說云堯夀一百一十六嵗舜夀一百一十二嵗禹夀百嵗堯年十六即位在位七十年年八十六始得舜而試之二年乃使攝政時舜年三十居試攝通三十年而堯崩舜服堯喪三年畢乃即位在位五十年而崩方舜在位三十三年命禹攝政凡十七年而舜崩禹服舜喪三年畢乃即位在位十年而崩由是言之當堯得舜之時堯年八十六舜年三十以此推而上之是堯年五十七已見四世之𤣥孫生一嵗矣舜居試攝及在位通八十二年而禹夀百嵗以禹百年之間推而上之禹即位及居舜喪通十二年又在舜朝八十二年通九十五年則當舜攝試之初年禹才六嵗是舜為𤣥孫年三十時見四世之髙祖方生六嵗矣至於舜娶堯二女據圖為曾祖姑雖古逺世異與今容有不同然人倫之理乃萬世之常道必不錯亂顛倒之如此然則諸家世次夀數長短之說聖經之所不著者皆不足信也决矣太祖皇帝總叙曽鞏蓋唐之敝自天寶以後紀綱寖壞不能自振以至於失天下五代興起五十餘年之間更八姓十有四君危亡之變數矣其尤甚也契丹遂入中國擅立名號當是時天地五行人事之理反易繆亂其所僅存者無幾耳太祖為天下所戴踐尊位以生民為任故勸農桑薄賦斂緩刑罰除舊政之不便民者詔令勉核相屬推其心無一日不在百姓也知方鎮之病民也故設通判之員使斂以繩墨憂吏之不良也故數使在位舉其所知患吏或受賕或不奉法也故罪至死徙一無所貸原其意蓋以謂遭世大衰不如是吏不知禁不能救民於焚溺之中也征伐既下諸國必先已逋缺滌煩苛賙乏絶雪寃滯惠農民拔人材申命郡邑反覆不倦或遇水旱輒蔬食請禱欲移災於已其於羣臣有恩舊有勞能待之各盡其分以位貴之以財富之有男使尚主有女使嫁宗室其豫人之周也如此即材可用雖讐不廢不可用雖光顯矣不處以勢其有罪多縱貸之或賜之使自愧及至堅明約束以整齊天下者亦使之不能踰也強僣之國皆接以恩禮商賈往來不禁有出境犯其令者乃為之置市邊邑使兩利有所乏少常振助之征伐所加必其罪暴者師出未嘗不以義也其君長已降及就俘執道路勞問迎致使者相望既至罪不數辱之優假秩祿及其宗親吏屬賜以田宅使子孫世守擁護保全皆得以夀考終自晉既覆滅契丹寖大中國惴畏不敢當太祖拔用材武護西北邊寵以非常之恩任屬專聽信明常遣戍卒戒之曰我猶赦汝郭進殺汝矣有訟進者謂曰進軍政嚴此必犯進法送進使殺之關市租賦諸將得恣用不問出入以其故士附鬭者盡力諜者盡情邊臣可諉者皆十餘年不易其任然位不過巡檢使衆不過三五千人蓋任專則勢便位不極則士勵兵少則用約御將亦多術矣總其所長能兼用之故能省費息民振新集之衆屈憑陵之敵也蓋太祖篤於孝友有天下之行聰明智勇有天下之材仁心愛人有天下之志包含遍覆有天下之量守之以勤儉恭慎虛心納諫鑒於越蜀以奢侈為戒思天下之重不復逰畋封拜諸子務自約損不盡循故典收納學士大夫用之不求其備或守難進之節亦不奪也晚喜讀書勸諸將以學曰欲使之知治道也兼覆夷夏從容以德江南平覽捷書而泣曰師征不義而顧令吾民死兵彼何負哉秦州已入尚波于之地却而不受錢俶來朝復歸之越契丹願聽盟約逡巡退抑不自矜伐天下大勢連數十城之鎮割其故地以小其力易動難畜之兵斂置懷服以消其難至於舉賢良崇孝悌綴禮樂明考課雖宇內初輯然庶政大體彌綸備具遺文故事施於後世皆可為法民於是時從死更生室家相保士農工賈各還其職鳥獸草木亦莫不遂前世舊臣備將相處腹心爪牙之任者一旦回心奉令北向如素委質天下廣都通邑兼地千里德懷二三之臣負衆自用令之不從召之不至者尚數十皆束衽來庭代易奔走如水凑下粵蜀吳楚甌閩之君分天下為八九曰帝與王傳子若孫更數十嵗者編名屬籍並聚闕下四海之內混齊為一海東之國髙麗極南交趾西戎吐蕃回紇北敵契丹皆請吏奉貢天地所養通途之屬莫不內附當是時更立天下與民為始天地五行人事之理亂而復正蓋太祖之於受命非如前世之君圖衆以智圖柄以力其處心積慮非一夕一日在於取天下也其在天者厯數在人者羣臣萬民三軍之士不歸周歸太祖未有知其所以然者所謂天也及其傳天下也舍子屬弟是則太祖之受天下與舜受之堯禹受之舜其揆一也其傳天下與堯傳之舜舜傳之禹其揆一也受天下及傳天下視天與人而已非其心未嘗有天下豈能如是哉世以為太祖不世出之主與漢髙祖同蓋太祖為人有大度意豁如也知人善任使與漢髙祖同固然也太祖承自天寶以後更五代二百餘年極敝之天下漢祖承全盛之秦二世之末天下始亂所因之勢既殊太祖開建帝業作則垂憲後常可行漢祖粗定海內而已不及一太祖立折杖法脫民榜笞死禍定著常刑一本寬大漢祖雖約法三章然肉刑三族之誅至孝文始去不及二太祖功臣皆故等夷及位定上下相安始終一意漢祖疑間諸將夷滅其家不及三太祖削大弱強藩臣遵職漢祖封國過制反者更起纍世乃定不及四太祖征伐必克漢祖數戰輒北不及五太祖文武自出羣臣莫及漢祖非得三傑之助不得無失不及六開寶之初南海先下趙他分越而帝漢祖不能禁不及七太祖不用兵革契丹自附漢祖折厄白登身僅免禍不及八太祖後宫二百問願歸者復去四之一漢祖溷於祍席女禍及宗不及九太祖明於大計以屬天下漢祖擇嗣不審幾墜厥世不及十也漢祖所不能及其大者如此是自三代以來撥亂之主未有及太祖也三代盛矣然禹之孫太康失國湯之孫太甲放廢文武之後世三四傳昭王不返於楚繇漢以下變故之密蓋不可勝道也太祖經始大基流風餘澤所被者逺五聖遵業至今百有二十餘年上下和樂無變容動色之慮接於耳目治安久長自三代以來所未有也維太祖創始傳後比迹堯舜綱理天下軼於漢祖太平之業施於無窮三代所不及成功盛德其至矣哉蓋唐天寶十四年天下户八百九十一萬太祖元年户九十六萬末年天下既定户三百九萬今上元豐二年户一千三百九十一萬六聖之德澤覆露生養斯其所以盛也本原事實其所繇致此有自也哉仁宗御集序歐陽修在昔君臣聖賢自相戒勑都俞吁咈於朝廷之上而天下治者二帝之言語也號令征伐丁寧約束而其辭彬彬篤厚純雅者三代之文章也堯舜夏商周之盛邈乎逺出千載之上而昭然著見百世之下者以其書存焉此典謨訓誥之文所以為歷代之寶也惟我仁考神文聖武明孝皇帝之作二帝之言語而三代之文章也是宜刋之六經而不朽示之萬世而取法矧余小子獲承統業其所以繼大而顯揚之者方思勉焉其敢失墜乃詔尚書刑部郎中知制誥邵必右諫議大夫天章閣待制吕公著悉發寶文之舊藏而類次之以為百卷而必公著勉朕以叙述之曰是不可闕也豫惟聖考在位四十有二載承三聖之鴻業享百年之盛隆而不敢暇逸慎重祭祀以事天而饗親齊莊潔精必以誠信故親郊而見上帝者九恭謝于天地大享于明堂者皆再耕于籍田祫于太廟者皆一而不為勞苦夫逰娛射獵前世賢王明主之所不能免者則皆非所欲嵗時臨幸燕飫臣下必問祖宗之故常閴然非時不聞輿馬之音後苑嵗春一賞亦故事也中廢者二十餘年而時畋於近郊曲宴於便坐者廑才一二而已故叙禋祀享升歌樂章藏於有司薦於郊廟者多矣而登臨逰賞之適割鮮獻獲之樂前世之所誇者未始一及焉至於萬幾之暇泊然凝神不見所好惟躬閲寶訓陳經邇英究鐘律之本元訓師兵之武略披圖以鑒古銘物以自戒其從事於清間宴息之餘者不過此類嗚呼大禹之勤儉也夫惟一人勞於上則天下安其逸約於已則天下享其豐此禹之所以聖勤儉之功也惟我聖考之在位也澤被生民恩加內外寬刑罰息兵革容納諫諍信任賢材措民逸於治安躋俗豐於富庶使海內䝉德受賜涵濡鼓舞而不知所以然者由勤與儉久而馴致之也是以功成業茂立廟建號為宋仁宗噫仁之為言堯舜之盛德而甚美之稱也固已巍乎與天地而亡極矣永惟聖作刻之玉版藏之金匱以耀後嗣而垂無窮庶俾知我聖考仁宗之所以為仁者自勤儉始嗚呼亦惟豫小子是訓古史序蘇轍古之帝王皆聖人也其道以無為為宗萬物莫能嬰之其於為善如水之必寒如火之必熱其於不為不善如騶虞之不殺如竊脂之不榖不學而成不勉而得其積之中者有餘故其推之以治天下者有不可得而知也孔氏之遺書曰喜怒哀樂之未發謂之中發而皆中節謂之和自三代之衰聖人不作世不知本而馳騁於喜怒哀樂之餘故其發於事業日以鄙陋不足以晞聖人之萬一雖春秋之際王澤未竭士生其間習於禮義而審於利病如管仲晏子子産叔向之流皆不足以知之至於孔子其知之者至矣而未嘗言孟子知其一二時以告人而天下亦莫能信也陵遲及於秦漢士益以功利為急言聖人者皆以其所知臆之儒者流於度數而知者溺於權利皆不知其非也太史公始易編年之法為本紀世家列傳記五帝三王以來後世莫能易之然其為人淺近而不學疏略而輕信漢景武之間尚書古文詩毛氏春秋左氏皆不列於學官世能讀之者少故其記堯舜三代之事皆不得聖人之意戰國之際諸子辨士各自著書或增損古事以自信一時之說遷一切信之甚者或採世俗相傳之語以易古文舊說及秦焚書戰國之史不傳於民間秦惡其議己也焚之略盡幸而野史一二存者遷亦未暇詳也故其記戰國有數年不書一事者余竊悲之故因遷之舊上觀詩書下考春秋及秦漢雜録始伏羲神農訖秦始皇帝為七本紀十六世家三十七列傳謂之古史追録聖賢之遺意以明示來世至於得失成敗之際亦備論其故嗚呼由數千嵗之後言數千嵗之前其詳不可得矣幸其猶有存者而或又失之此古史之所為作也張中丞傳後序韓愈元和二年四月十三日夜愈與吳郡張籍閲家中舊書得李翰所為張巡傳翰以文章自名為此傳頗詳密然尚恨有闕者不為許逺立傳又不載雷萬春事首尾逺雖材若不及巡者開門納巡位本在巡上授之柄而處其下無所疑忌竟與巡俱守死成功名城陷而虜與巡死先後異耳兩家子弟材智下不能通知二父志以為巡死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳而賊語以國亡主滅逺見救援不至而賊來益衆必以其言為信外無待而猶死守人相食且盡雖愚人亦能數日而知死處矣逺之不畏死亦明矣烏有城壞其徒俱死而獨䝉愧恥求活雖至愚者不忍為嗚呼謂逺之賢而為之邪說者又謂逺與巡分城而守城之陷自逺所分始以此詬逺此又與兒童之見無異人之將死其臟腑必有先受其病者引繩而絶之其絶必有處觀者見其然從而尤之其亦不達於理矣小人之好議論不樂成人之美如是哉如巡逺之所成就如此卓卓猶不得免其它則又何說當二公之初守也寧能知人之卒不救棄城而逆遁茍此不能守雖避之它處何益及其無救而且窮也將其創殘餓羸之餘雖欲去必不達二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也當是時棄城而圖存者不可一二數擅彊兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設淫辭而助之攻也愈嘗從事於汴徐二府屢道於兩府間親祭於其所謂雙廟者其老人往往說巡逺時事云南霽雲之乞救於賀蘭也賀蘭嫉巡逺之聲威功績出已上不肯出師救愛霽雲之勇且壯不聽其語彊留之具食與樂延霽雲坐霽雲慷慨語曰雲來時睢陽之人不食月餘日矣雲雖獨欲食義不忍雖食且不下咽因拔所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去將出城抽矢射佛寺浮圖矢著其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也愈貞元中過泗州船上人猶指以相語城陷賊以刃脅降巡巡不屈即牽去將斬之又降霽雲雲未應巡呼雲曰南八男兒死耳不可為不義屈雲笑曰欲將以有為也公有言雲敢不死即不屈張籍曰有于嵩者少依於巡及巡起事嵩常在圍中籍大厯中於和州烏江縣見嵩嵩時年六十餘矣以巡初嘗得臨涣縣尉好學無所不讀籍時尚小粗問巡逺事不能細也云巡長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為久讀此嵩曰未熟也巡曰吾於書讀不過三遍終身不忘也因誦嵩所讀書盡卷不錯一字嵩驚以為巡偶熟此卷因亂抽它帙以試無不盡然嵩又取架上諸書試以問巡巡應口誦無疑嵩從巡久亦不見巡常讀書也為文章操紙筆立書未嘗起草初守睢陽時士卒僅萬人城中居人户亦且數萬巡因一見問姓名其後無不識者巡怒鬚髯輒張及城陷賊縳巡等數十人坐且將戮巡起旋其衆見巡起或起或泣巡曰汝勿怖死命也衆泣不能仰視巡就戮時顔色不亂陽陽如平常逺寬厚長者貌如其心與巡同年生月日後於巡呼巡為兄死時年四十九嵩貞元初死於亳宋間或傳嵩有田在亳宋間武人奪而有之嵩將詣州訟理為所殺嵩無子張籍云刪正黃庭經序歐陽修無仙子者不知為何人也無姓名無爵里世莫得而名之其自號為無仙子者以警世人之學仙者也其為言曰自古有道無仙而後世之人知其道而不得其道不知無仙而妄學仙此我之所哀也道者自然之道也生而必死亦自然之理也以自然之道養自然之生不自戕賊夭閼而盡其天年此自古聖智之所同也禹走天下乘四載治百川可謂勞其形矣而夀百年顔子蕭然卧於陋巷簞食瓢飲外不誘於物內不動於心可謂至樂矣而年不及三十斯二人者皆古之仁人也勞其形者長年安其樂者短命蓋命有長短稟之於天非人力之所能為也惟不自戕賊而各盡其天年則二人之所同也此所謂以自然之道養自然之生後世貪生之徒為養生之術者無所不至至茹草木服金石吸日月之精光又有以謂此外物不足恃而反求諸內者於是息慮絶欲鍊精氣勤吐納專於內守以養其神其術雖本於貪生及其至也尚或可以全形而却疾猶愈於肆欲稱情以害其生者是謂養內之術故上智任之自然其次養內以却疾最下妄意而貪生世傳黃庭經者魏晉間道士養生之書也其說專於養內多竒怪故其傳之久則易為訛舛今家家異本莫可考正無仙子既甚好古家多集録古書文字以為玩好之娛有黃庭經石本者乃永和十三年晉人所書其文頗簡以較今世俗所傳者獨為有理疑得其真於是喟然歎曰吾欲曉世以無仙而止人之學者吾力顧未能也吾視世人執竒怪訛舛之書欲求生而反害其生者可不哀哉矧以我玩好之餘拯世人之謬惑何惜而不為乃為刪正諸家之異一以永和石本為定其難曉之言略為注解庶幾不為訛謬之說惑世以害生是亦不為無益若大雅君子則豈取於此孫子後序歐陽修世所傳孫武十三篇多用曹公杜牧陳皥注號三家孫子余頃與撰四庫書目所見孫子注者尤多武之書本於兵兵之術非一而以不窮為竒宜其說者之多也凡人之用智有短長其施設各異故或膠其說於偏見然無出所謂三家者三家之注皥最後其說時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳然前世言善用兵稱曹公曹公嘗與董吕諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將出兵千里每坐計勝敗授其成算諸將用之十不失一一有違者兵輒敗北故魏世用兵悉以新書從事其精於兵也如此牧謂曹公於注孫子尤略蓋借其所得自為一書是曹公悉得武之術也然武嘗以其書干吳王闔閭闔閭用之西破楚北服齊晉而霸諸侯夫使武自用其書止於彊伯及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽於己見是以注者雖多而少當獨吾友聖俞不然嘗評武之書曰此戰國相傾之說也三代王者之師司馬九伐之法武不及也然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次序而注者汨之或失其意乃自為注凡膠於偏見者皆抉去傳以已意而發之然後武之說不汨而明吾知此書當與三家並傳而後世取其說者往往於吾聖俞多焉聖俞為人謹質溫恭衣冠進趨眇然儒者也後世之視其書者與太史公疑張子房為壯夫何異古今家誡序蘇轍老子曰慈故能勇儉故能廣或曰慈則安能勇曰父母之於子也愛之深故其為之慮事也精以深愛而行精慮故其為之避害也速而就利也果此慈之所以能勇也非父母之賢於人勢有所必至矣轍少而讀書見父母之戒其子者諄諄乎惟恐其不盡也惻惻乎惟恐其不入也曰嗚呼此父母之心也哉師之於弟子也為之規矩以授之賢者引之不賢者不彊也君之於臣也為之號令以戒之能者豫之不能者不取也臣之於君也可則諫否則去子之於父也以幾諫不敢顯皆有禮存焉父母則不然子雖不肖豈有棄子者哉是以盡其有以告之無憾而後止詩曰泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母夫雖行潦之陋而無所棄猶父母之無棄子也故父母之於子人倫之極也雖其不賢及其為子言也必忠且盡而况其賢者乎太常少卿長沙孫公景修少孤而教於母母賢能就其業既老而念母之心不忘為賢母録以致其意既又集古今家誡得四十九人以示轍曰古有為是書者而其文不完吾病焉是以為此合衆父母之心以遺天下之人庶幾有益乎轍讀之而歎曰雖有悍子忿鬭於市莫之能止也聞父之聲則斂手而退市人之過之者亦莫不泣也慈孝之心人皆有之特患無以發之耳今是書也要將以發之歟雖廣之天下可也自周公以來至於今父戒四十五母戒四公又將益廣之未止也列女傳目録序曽鞏劉向所叙列女傳凡八篇事具漢書向列傳而隋書及崇文總目皆稱向列女傳十五篇曹大家注以頌義考之蓋大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰母及東漢以來凡十六事非向書本然也蓋向舊書之亡久矣嘉祐中集賢校理蘇頌始以頌義為篇次復定其書為八篇與十五篇者並藏於館閣而隋以頌義為劉歆作與向列傳不合今驗頌義之文蓋向之自叙又藝文志有向列女傳頌圖明非歆作也自唐之亂古書之在者少矣而唐志録列女傳凡十六家至大家注十五篇者亦無録然其書今在則古書之或有録而亡或無録而在者亦衆矣亦可惜哉今校讐其八篇及十五篇者已定可繕寫初漢承秦之敝風俗已大壞矣而成帝後宫趙衛之屬尤自放向以謂王政必自內始故列古女善惡所以致興亡者以戒天子此向述作之大意也其言大任之娠文王也目不視惡色耳不聽淫聲口不出敖言又以謂古之人胎教者皆如此夫能正其視聽言動者此大人之事而有道者之所畏也顧令天下之女子能之何其盛也以臣所聞蓋為之師傅保姆之助詩書圖史之戒珩璜琚瑀之節威儀動作之度其教之者雖有此具然古之君子未嘗不以身化也故家人之義歸於反身二南之業本於文王夫豈自外至哉世皆知文王之所以興能得內助而不知其所以然者蓋本於文王之躬化故內則后妃有關雎之行外則羣臣有二南之美與之相成其推而及逺則商辛之昏俗江漢之小國罝之野人莫不好善而不自知此所謂身修故家國天下治者也後世自學問之士多狥於外物而不安其守其室家既不見可法故競於邪侈豈獨無相成之道哉士之茍於自恕顧利冒恥而不知反已者往往以家自纍故也故曰身不行道不行於妻子信哉如此人者非素處顯也然去二南之風亦已逺矣况於南鄉天下之主哉向之所述勸戒之意可謂篤矣然向號博極羣書而此傳稱詩芣苡柏舟大車之類與今序詩者之說尤乖異蓋不可考至於式微之一篇又以謂二人之作豈其所取者博故不能無失歟其曰象計謀殺舜及舜所以自脫者頗合於孟子然此傳或有之而孟子所不道者蓋亦不足道也凡後世諸儒之言經傳者固多如此覽者采其有補而擇其是非可也故為之序論以發其端云禮閣新儀目録序曾鞏禮閣新儀三十篇韋公肅撰記開元以後至元和之變禮史館祕閣及臣書皆三十篇集賢院書二十篇以參相校讐史館祕閣及臣書多復重其篇少者八集賢院書獨具然臣書有目録一篇以考其次序蓋此書本三十篇則集賢院書雖具然其篇次亦亂既正其脫繆因定著從目録而禮閣新儀三十篇復完夫禮者其本在於養人之性而其用在於言動視聽之間使人之言動視聽一於禮則安有放其邪心而窮於外物哉不放其邪心不窮於外物則禍亂可息而財用可充其立意微其為法逺矣故設其器制其物為其數立其文以待其有事者皆人之起居出入吉凶哀樂之具所謂其用在乎言動視聽之間者也然而古今之變不同而俗之便習亦異則法制度數其久而不能無敝者勢固然也故為禮者其始莫不宜於當世而其後多失而難遵亦其理然也失則必改制以求其當故羲農以來至於三代禮未嘗同也後世去三代蓋千有餘嵗其所遭之變所習之便不同固已逺矣而議者不原聖人制作之方乃謂設其器制其物為其數立其文以待其有事而為其起居出入吉凶哀樂之具者當一一以追先王之迹然後禮可得而興也至其說之不可求其制之不可考或不宜於人不合於用則寧至於漠然而不敢為使人言動視聽之間蕩然莫之為節至患夫為罪者之不止則繁於為法以禦之故法至於不勝其繁而犯者亦至於不勝其衆豈不惑哉蓋上世聖人有為耒耜者或不為宫室為舟車者或不為棺槨豈其智不足為哉以謂人之所未病者不必改也至於後聖有為宫室者不以土處為不可變也為棺槨者不以葛溝為不可易也豈好為相反哉以謂人之所既病者不可因也又至於後聖則有設兩觀而更采椽之質攻文梓而易瓦棺之素豈不能從儉哉以謂人情之所好者能為之節而不能變也由是觀之古今之變不同而俗之便習亦異則亦屢變其法以宜之何必一一以追先王之迹哉其要在於養民之性防民之欲者本末先後能合乎先王之意而已此制作之方也故元樽之尚而薄酒之用太羮之先而庶羞之飽一以為貴本一以為親用則知有聖人作而為後世之禮者必貴俎豆而今之器用不廢也先辨冕而今之衣服不禁也其推之皆然然後其所改易更革不至乎拂天下之勢駭天下之情而固已合乎先王之意矣是以羲農以來至於三代禮未嘗同而制作之如此者亦未嘗異也後世不推其如此而或至於不敢為或為之者特出於其勢之不得已故茍簡而不能備希濶而不常行又不過用之於上而未有加之於民者也故其禮本在於養人之性而其用在於言動視聽之間者歷千餘嵗民未嘗得接於其耳目况於服習而安之者乎至其陷於罪戾則繁於為法以禦之其亦不仁也哉此書所紀雖其事已淺然凡世之記禮者亦皆有所本而一時之得失具焉昔孔子於告朔愛其禮之存况著於一代之典籍哉故其書不得不貴因為之定著以俟夫論禮者考而擇焉內制集序歐陽修昔錢思公嘗以謂朝廷之官雖宰相之重皆可雜以他才處之惟翰林學士非文章不可思公自言為此語頗取怒於達官然亦自負以為至論今學士所作文書多矣至於青詞齊文必用老子浮圖之說祈禳祕祝往往近於家人里巷之事而制詔誥取便於宣讀常拘以世俗所謂四六之文其類多如此然則果可謂之文章者歟豫在翰林六年中間進拜二三大臣皆適不當直而天下無事四方和好兵革不用凡朝廷之文所以指麾號令訓戒約束自非因事無以發明矧豫中年早衰意思零落以非工之作又無所遇以發焉其屑屑應用拘牽常格卑弱不振宜可羞也然今文士尤以翰林為榮選豫既罷職院吏取豫直草以日次之得四百餘篇因不忍棄况其上自朝廷內及宫禁下暨四方海外事無不載而時政記日厯與起居郎舍人有所略而不記未必不有取於斯焉嗚呼豫且老矣方買田淮潁之間若夫凉竹簟之暑風曝茅簷之冬日睡餘支枕念昔平生仕宦出處顧瞻玉堂如在天上因覽遺藁見其所載職官名氏以較其人盛衰先後孰在孰亡足以知榮寵為虛名而資笑談之一噱也亦因以誇於田夫野老而已外制集序歐陽修慶厯三年春丞相吕夷簡病不能朝上既更用大臣鋭意天下事始用諫官御史疏追還夏竦制書既而召韓琦范仲淹於陜西義除富弼樞密副使弼仲淹琦皆惶恐頓首辭讓至五六不已手詔趣琦等就道甚急而弼方且入求對以辭不得見遣中貴人趨送閣門使即受命嗚呼觀琦等之所以讓上之所以用琦等者可謂聖賢相遭萬世一遇而君臣之際何其盛也於是時天下之士孰不願為材邪顧豫何人亦與其選夏四月召自滑臺入諫院冬十二月拜右正言知制誥是時夏人雖數請命而西師尚未解嚴京東纍嵗盜賊最後王倫暴起沂州轉劫江淮之間而張海郭貌山等亦起商鄧以驚京西州縣之吏多不稱職而民弊矣天子方慨然勸農桑興學校破去前例以不次用人哀民之困而欲除其蠧吏知磨勘法久之弊而思别材不肖以進賢能患百職之不修而申行賞罰之信蓋欲修法度矣豫時雖掌誥命猶在諫職常得奏事殿中從容盡聞天子所以更張庶事憂閔元元而勞心求治之意退得載于制書以諷曉訓勑在位者然豫方與修祖宗故事又修起居注又修編勑日與同舍論議治文書所省不一而除目所下率不一二時已迫丞相出故不得專一思慮工文字以盡導天子難諭之意而復誥命於三代之文嗟夫學者文章見用于世鮮矣况得施於朝廷而又遭人主致治之盛若修之鄙使竭其材猶恐不稱而况不能專一其職此豫所以常遺恨於斯文也明年秋豫出為河北轉運使又明年春權知成德軍事事少間發嚮所作制草而閲之雖不能盡載明天子之意於其所述百得一二足以章示後世蓋王者之訓在焉豈以豫文之鄙而廢也於是録之為三卷豫自直閣下儤直八十始滿不數日奉使河東還即以來河北故其所作才一百五十餘篇云田表聖奏議序蘇軾故諫議大夫贈司徒田公表聖奏議十篇嗚呼田公古之遺直也其盡言不諱蓋自敵以下受之有不能堪者而况於人主乎吾是以知二宗之聖也自太平興國以來至于咸平可謂天下大治千載一時矣而田公之言常若有不測之憂近在朝夕者何哉古之君子必憂治世而危明主明主有絶人之資而治世無可畏之防夫有絶人之資必輕其臣無可畏之防必易其民此君子之所甚懼也方漢文時刑措不用兵革不試而賈誼之言曰天下有可長太息者有可流涕者有可痛哭者後世不以是少漢文亦不以是甚賈誼由此觀之君子之遇治世而事明主法當如是也誼雖不遇而其所言略已施行不幸早世功烈不著於時然誼常建言使諸侯王子孫各以次受分地文帝未及用歷孝景至武帝而主父偃舉行之漢室以安今公之言十未用五六也安知來世不有若偃者舉而行之歟願廣其書於世必有與公合者此亦忠臣孝子之志也范貫之奏議後序曾鞏尚書户部郎中直龍圖閣范公貫之之奏議凡若干篇其子世京集為十卷而屬余序之蓋自至和以後十餘年間公嘗以言事任職自天子大臣至於羣下自掖庭至於四方幽隱一有得失善惡關於政理公無不極意反復為上力言或矯拂情欲或切劘計慮或辨别忠佞而處其進退章有一再或至於十餘上事有隂爭獨陳或悉引諫官御史合議肆言仁宗嘗虛心采納為之變命令更廢舉近或立從逺或越月逾時或至於其後卒皆聽用蓋當是時仁宗在位嵗久熟於人事之情僞與羣臣之能否方以仁厚清淨休養元元至於是非豫奪則一歸之公議而不自用也其所引拔以言為職者如公皆一時之選而公與同時之士亦皆樂得其言不曲從茍止故天下之情因得畢聞於上而事之害理者常不果行至於竒袤恣睢有為之者亦輒敗悔故當此之時常委事七八大臣而朝政無大缺失羣臣奉法遵職海內乂安夫因人而不自用者天也仁宗之所以其仁如天至於享國四十餘年能承太平之業者繇是而已後世得公之遺文而論其世見其上下之際相成如此必將低回感慕有不可及之歎然後知其時之難得則公言之不沒豈獨見其志所以明先帝之盛德於無窮也公為人溫良慈恕其從政寬易愛人及在朝廷危言正色人有所不能及也凡同時與公有言責者後多至大官而公獨早卒公諱師道其世次州里歷官行事有今資政殿學士趙公抃為公之墓志云徐幹中論目録序曽鞏臣始見館閣及世所有徐幹中論二十篇以謂盡於此及觀貞觀政要怪太宗稱嘗見幹中論復三年喪篇而今書此篇缺因考之魏志見文帝稱幹著中論二十餘篇於是知館閣及世所有幹中論二十篇者非全書也幹字偉長北海人生於漢魏之間魏文帝稱幹懷文抱質恬淡寡欲有箕山之志而先賢行狀亦稱幹篤行體道不耽世榮魏太祖特旌命之辭疾不就後以為上艾長又以疾不行蓋漢承周衰及秦滅學之餘百氏雜家與聖人之道並傳學者罕能獨觀於道德之要而不牽於俗儒之說至於治心養性去就語默之際能不悖於理者固希矣况至於魏之濁世哉幹獨能考六藝推仲尼孟軻之㫖述而論之求其辭時若有小失者要其歸不合於道者少矣其所得於內者文能信而充之逡巡濁世有去就顯晦之大節臣始讀其書察其意而賢之因其書以求其為人又知其行之可賢也惜其有補於世而識之者少蓋迹其言行之所至而以世俗好惡觀之彼惡足以知其意哉顧臣之力豈足以重其書使學者尊而信之因校其脫謬而序其大略蓋所以致臣之意焉文編卷五十二

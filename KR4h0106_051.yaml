body:
  text: 文編卷五十一明唐順之編為河南令上留守鄭相公啓韓愈愈啓愈為相公官屬五年辱知辱愛伏念曽無絲毫事為報答效日夜思慮謀畫以為事大君子當以道不宜茍且求容恱故於事未嘗敢疑惑宜行則行宜止則止受容受察不復進謝自以為如此真得事大君子之道今雖䝉沙汰為縣固猶在相公治下未同去離門牆為故吏為形跡嫌疑改前所為以自疏外於大君子固當不待煩說於左右而後察也人有告人辱罵其妹與妻為其長者得不追而問之乎追而不至為其長者得不怒而杖之乎坐軍營操兵守禦為留守出入前後驅從者此真為軍人矣坐坊市賣餅又稱軍人則誰非軍人也愚以為此必姦人以錢財賂將吏盜相公文牒竊注名姓於軍籍中以陵駕府縣此固相公所欲去奉法吏所當嫉雖捕繫杖之未過也昨聞相公追捕所告受辱罵者愚以為大君子為政當有權變始似小異要歸於正耳軍吏紛紛入見告屈為其長者安得不小致為之之意乎未敢以此仰疑大君子及見諸從事說則與小人所望信者少似乖戾雖然豈敢生疑於萬一必諸從事與諸將吏未能去朋黨心蓋覆黤黮不以真情狀白露左右小人受私恩良久安敢閉蓄以為私恨不一二陳道伏惟相公憐察幸甚幸甚愈無適時才用漸不喜為吏得一事為名可自罷去不啻如棄涕唾無一分顧藉心顧失大君子纎芥意如丘山重守官去官惟今日指揮愈惶懼再拜為分司郎官上鄭尚書相公啓韓愈愈啓伏蒙仁恩猥賜示問感戴戰悚若無所容措然尚有厥誠須盡露於左右者敢避其煩黷懷不滿之意於受恩之地哉愈幸甚三得為屬吏朝夕不離門下出入五年竊自計較受與報不宜在門下諸從事後故事有當言未嘗敢不言有不便於已輒吐私情閣下所宜憐也分司郎官職事惟祠部為煩且重愈獨判二年日與宦者為敵相伺候罪過惡言詈辭狼籍公牒不敢為耻實慮陷禍故前者懷狀乞與諸郎官更判意雖甚專事似率爾言語精神不能自明不蒙察允遽以慙歸僶俯日日遂踰纍旬私圖其宜敢以病告鳴鳩平均歌於國風從事獨賢雅以怨刺伏惟俯加憐察幸甚幸甚愈再拜上上郭侍郎啓王安石伏䝉過采浮議使承乏官借寵則榮循涯而懼願留平聽得究下情頑疏之人滯固於事席先子之緒業玷太常之寺名備位於兹歷年無狀安全者幸廢去乃宜何言誤知欲觀小試審處私計追惟舊聞不越爼以代庖蓋言有守未操刀而使割可必無傷輒敢用是固辭誠願易而他使依違王事雖名理之未安妄冒人知亦生平之不欲髙明在上悃愊發中臨咎怔忪果於得請賀歐陽樞密啓蘇洵伏審光奉帝詔入持國樞士民歡譁朝野響動恭惟國家所以設樞密之任乃是天下未能忘威武之防雖號百嵗之承平未嘗一日而無事兵不可去職為最難任文教則損國威専武事則害民政伏自近嵗屢更大臣皆由省府而來以答勳勞之舊一歷二府遂超百官既無跂足之求僅若息肩之所自聞此命欣賀實深蓋因物議之所歸以慰民心之大望伏惟某官一時之傑舉代所推經世之文服膺已久致君之略至老不衰顧惟平昔起於小官曷嘗須臾忘於當世以為天下之未大治蓋自賢者之在風下自今而言夫復何難願因千載之遇一新四海之瞻洵受恩至深為喜宜倍嘗謂未死之際無由知王道之大行不意臨老之年猶及見君子之得位阻以在外闕於至門仰祈髙明俯賜亮察賀文太尉啓蘇軾伏審孚號揚庭臨軒遣使出節少府授鉞齊壇中外聳觀兵民交慶蓋功業盛大則極名器而後稱惟德度宏逺故處富貴而若無蔚為三世之宗臣豈獨一時之盛事恭惟留守太尉道本天合德為人師信及三川之豚魚威加兩河之草木身任休戚言為重輕始若留侯弱冠而遇髙祖晚同尚父黃髮而亮武王既奉冊書益新民聽方將威懷北敵係頸長纓約束河公軌流故道然後入調伊傅之鼎歸躡松喬之游輿論所期斯言可必軾謫官有限趨侍無緣踴躍之心宣寫難盡賀韓魏公啓王安石伏審判府司徒侍中寵辭上宰歸榮故鄉兼兩鎮之節麾備三公之典䇿貴極富溢而無亢滿之纍名遂身退而有褒加之崇在於觀瞻孰不慶羡伏惟某官受天秀氣為世元龜誠節表於當時德望冠乎近代典司密總命攬中權毁譽幾至於萬端夷險常持於一意故四海以公之用捨一時為國之安危越執鴻樞遂躋元輔以人才未用為大耻以國本不建為深憂言衆人之所未嘗任大臣之所不敢及臻變故果有成功英宗以哀疚荒迷兹聖以謙冲退託內揆百官之衆外當萬事之微國無危疑人以靜一周勃霍光之於漢能定䇿而終以致疑姚崇宋璟之於唐善致理而未嘗遭變記在舊史號為元功未有獨運廟堂再安社稷弼亮三世敉寧四方崛然在諸公之先煥乎如今日之懿若夫進退之當於義出處之適其時以彼相方又為特美安石久於庇賴實預甄收職在近臣欲致盡規之義世當大有更懷下比之嫌用自絶於髙閎非敢忘於舊德逖聞新命竊仰遐風賀吕副樞啓蘇軾伏審近膺告命入總樞機中外聳觀朝廷增重竊以古之為國權在用人德厚者輔其才而名益隆望重者無所為而人自服是以淮南叛國先寢謀於長孺汾陽元老尚改觀於公權樽爼可以折衝藜藿為之不採哀此風流之莫繼久矣寂寥而無聞天亦厭於凡才上復思於舊德恭惟樞密侍郎性資仁義世濟忠嘉豈惟清節以鎮浮固已直言而中病出領數郡若將終身小人謂之失時君子意其復用逮兹顯拜夫豈偶然然而荷三朝兩世之恩當春秋賢者之責推之不去凛乎其難進伯玉而退子瑕人皆望於門下烹桑羊而斬樊噲公無愧於古人莫若盡行疇昔之言庶幾大慰天下之望軾登門最舊稱慶無緣踴躍之懷實倍倫等賀楊龍圖啓蘇軾伏審新改直職擢司諫垣傳聞邇遐竦動觀聽咸謂國家之巨福乃用諫諍之真才必能深言以補大化方今朝廷之上號為無諱而太平之美終不能全臺諫之列嵗不乏人而衆弊之原猶或未去豈聽之者徒能容而不能用言之者但為名而不為功歷觀古人之效忠皆因當世而用智不務過直期於必行右尹子革因墳典而道祈招之詩左師觸龍語饘粥而及長安之質徒盡拳拳之意不求赫赫之名此仁人及物之休功忠臣愛君之至分伏自頃嵗所更幾人席未暖而輒遷踵相躡而繼去然一身之譏固足以免矣而積嵗之病當使誰去之恐習慣以為常遂因循而不振雖在僻陋顧常隱憂以為必得朴忠憂國之人而又加以辨智得君之術言茍獲用國其庶幾伏惟諫院龍圖才雄於世而常若不勝節過於人而未嘗自異素練邉事深知兵驕頃特銓衡實識官冗必將舉大體而不論小事務實效而不為虛名軾最蒙深知愧無少補方傾耳以聽願續書諫苑之篇若有待而言或能著爭臣之論阻以在外無由至門踴躍之懷實倍倫等賀歐陽少師致仕啓蘇軾伏審抗章得謝釋位言還天眷雖隆莫奪已行之志士流太息共髙難繼之風凡在庇庥共增慶慰伏以懷安天下之公患去就君子之所難世靡不知人更相笑而道不勝欲私於為身君臣之恩繫縻之於前妻子之計推荷之於後至於山林之士猶有降志於垂老而况廟堂之舊欲使辭祿於當年有其言而無其心有其心而無其决愚智共蔽古今一塗是以用捨行藏仲尼獨許於顔子存亡進退周易不及於賢人自非智足以周知仁足以自愛道足以忘物之得喪志足以一氣之盛衰則孰能見幾禍福之先脫屣塵垢之外常恐兹世不見其人伏惟致政觀文少師全德難名巨材不器事業三朝之望文章百世之師功存社稷而人不知躬履艱難而節乃見縱使耄期篤老猶當就見質疑而乃力辭於未及之年退託以不能而止大勇若怯大智如愚至貴無軒冕而榮至仁不導引而夀較其所得孰與昔多軾受知最深聞道有自雖外為天下惜老成之去而私喜明哲得保身之全伏暑向闌台候何似伏冀為時自重少慰輿情賀致政趙少保啓王安石竊審抗言辭寵得謝歸榮繇西省諫諍之官序東宫師保之位殿廷鳴玉尚仍前日之班里舍揮金甫遂髙年之樂伏惟資政少保懋昭賢業寅亮聖時伯夷之直惟清仲山之明且哲所居之名赫赫豈獨後思爾瞻之節巖巖方當上輔遂從雅志實激貪風未即披承徒深欽仰賀致政楊侍讀啓王安石伏審得謝中楹戒歸下國孔戣致仕議臣雖願其留疏廣乞身觀者固榮其去丁時翕赩取道阻長繄盛德之可師宜明神之實相茂惟興止休有福祥伏惟某官逢辰清明取位通顯義勇不挫忠精無疵登備諫工嘗已告嘉猷于后奉將使節則必下膏澤於民儀儀會朝凛凛侍從功名之美既耀於將來智略之閎猶嗟於不試引年去位循禮得中唯其養恬有以鎮薄安石望塵非數見器則深竊冒上官之大知唯所不欲推揚後進之美意云何敢忘備位於兹仰髙無止謝相府啓蘇洵朝廷之士進而不知休山林之人退而不知反二者交譏於世學者莫獲其中洵幼而讀書固有意於從宦壯而不仕豈為異以矯人上之則有制䇿誘之於前下之則有進士驅之於後常以措意晚而自慙蓋人未之知而自衒以求用世未之信而有望於效官仰而就之良亦難矣以為欲求於無辱莫若退聽之自然有田一㕓足以為養行年五十復將何為不意貧賤之姓名偶自徹聞於朝野向承再命以就試固以大異其本心且召試而審觀其才則上之人猶未信其可用未信而有求於上則洵之意以為近於强人遂以再辭亦既獲命以匹夫之賤而必行其私意豈王命之寵而敢望其曲加昨承詔恩被以休寵退而自顧愧其無勞此蓋伏遇昭文相公左右元君舒慘百辟德澤所暢威刑所加不暘而熙不寒而栗顧惟無似或謂可收不忍棄之於庶人亦使與列於一命上以慰夫天下賢侯之望下以解其終身饑寒之憂仰惟此恩孰可為報昔者孟子不願召見而孔子不辭小官夫欲正其所由得之之名是以謹其所以取之之故蓋孟子不為矯孔子為卑茍窮其心則各有說雖自知其不肖常願附其下風區區之心惟所裁擇謝南省主文與歐陽內翰啓蘇軾竊以天下之事難於改為自昔五代之餘文教衰落風俗靡靡日以塗地聖上慨然太息思有以澄其源疏其流明詔天下曉諭厥㫖於是招來雄俊魁偉敦厚朴直之士罷去浮巧輕媚叢錯繡采之文將以追兩漢之餘而漸復三代之故士大夫不深明天子之心用意過求深者或至於迂務竒者怪僻而不可讀餘風未殄新弊復作大者鏤之金石以傳久逺小者轉相模寫號稱古文紛紛肆行莫之或禁蓋唐之古文自韓愈始其後學韓而不至者為皇甫湜學皇甫湜而不至者為孫樵自樵以降無足觀矣伏惟內翰執事天之所付以收拾先王之遺文天下之所待以覺悟學者恭承王命親執文柄意其必得天下之竒士以塞明詔軾也逺方之鄙人家居碌碌無所稱道及來京師久不知名將治行西歸不意執事擢在第二惟其素所蓄積無以慰士大夫之心是以群嘲而聚罵者動滿千百亦惟恃有執事之知與衆君子之議論故恬然不以動其心猶幸御試不為有司之所排使得搢笏跪起謝恩於門下聞之古人士無賢愚惟其所遇蓋樂毅去燕不復一戰而范蠡去越亦終不能有所為軾願長在下風與賔客之末使區區之心長有所發夫豈惟軾之幸亦執事將有取一二焉謝應中制科啓蘇軾臨軒䇿士方搜絶異之才隨問獻言誤占久虛之等忽從佐縣擢與評刑內自顧於無堪凛不知其所措恭惟制治之要惟有取人之難用法者畏有司之不公故捨其平生而論其一日通變者恐人材之未盡故詳於採聽而略於臨時兹二者之相形顧兩全而未有一之於考試而奄之於倉卒所以為無私也然而才行之迹無由而深知委之於察舉而要之於久長所以為無失也然而請屬之風或因而滋長此隋唐進士之所以為有弊魏晉中正之所以為多姦惟是賢良茂異之科兼用考試察舉之法每中年輒下明詔使兩制各舉所聞在家者能孝而恭在官者能亷而慎臨之以患難而能不變邀之以寵利而能不回既已得其行已之大方然後責其當世之要用學博者又須守約而後取文麗者或以用寡而見尤特於萬人之中求其百全之美凡與中書之召命已為天下之選人而又有不可測知之論以觀其默識之能無所不問之䇿以考其博通之實至於此而不去則其人之可知然猶使御史得以求其疵諫官得以考其素一陷清議輒為廢人是以始由察舉而無請謁公行之私終用考試而無倉卒不審之患蓋其取人也如此之密則夫不肖者安得而容軾才不逮人少而自信治經獨傳於家學為文不願於世知特以饑寒之憂出求斗升之祿不謂諸公之過聽使與群豪而竝游始不自量欲行其志遂竊俊良之舉不知才力之微論事迂濶而不能動人讀書疏略而無以應敵取之甚愧得之益慚此蓋伏遇某官以堯舜之道輔吾君以伊周之業為己任恐一夫不獲自盡以為廟堂之憂思天下所以太平必用芻蕘之說亟收末學以輔大猷然志卑處髙德薄寵厚歷觀前輩由此為致君之資敢以微軀自今為許國之始登州謝兩府啓蘇軾迂愚之守沒齒不移廢逐之餘歸田已幸豈謂承宣之寄忽為枯朽之榮眷此東州下臨北徼俗近齊魯之厚迹皆秦漢之陳賔出日於麗譙山川炳耀傳夕烽於海嶠鼓角清閒顧靜樂之難名笑妄庸之濫據此蓋伏遇某官股肱元聖師保萬民才全而德不形任重而道愈逺謂使功不如使過而觀過足以知仁特借齒牙曲成羽翼軾敢不服勤簿領祗畏簡書䇿蹇磨鉛少答非常之遇息黥補劓漸收無用之材過此以還未知所措謝中書舍人啓蘇軾起於貶所未及期年擢置周行遽參法從省躬無有被寵若驚竊惟人材進退之間實為風俗隆替之漸必欲致治在於積賢雖一薛居州齊言不能移楚而用范武子晉盜可使奔秦崔琰進而亷儉成風楊綰用而淫侈改度誠國是之先定雖民散而可收拔茅茹者以彚而征附馬棧者必先其直用舍既見好惡自明人知所趨勢有必至今朝廷方講當世之務力追前代之隆雖改定法令足以便事而未足以安民寬弛賦役足以安民而未足以成俗是以登進耆老搜求雋良將使士知向方民亦有耻如軾者山林下士軒冕棄材少而學文本聲律雕蟲之技出而從仕有狂狷嬰鱗之愚溝中不顧於青黃爨下無心於宫徴誤蒙收拾已出優恩洊履禁嚴殊非素望此蓋伏遇某官德配前哲望隆本朝名重圭璋上助廟堂之用言為蓍蔡下同卿士之謀餘論所加虛名增重知丹心之尚在憐白首之無歸特借寵光以寬衰病任隆才下恩重報輕直道而行恐非所以安愚不肖之分充位而已又不足以解卿大夫之憂蚤夜以思進退惟谷恐懼戰越不知所裁謝賈朝奉啓蘇軾自蜀徂京幾四千里攜孥去國蓋二十年側聞松楸已中梁柱過而下馬空瞻董相之陵酹以隻雞誰副橋公之約宦遊嵗晚坐念涕流未報不資之恩敢懷盍歸之意常恐樵牧不禁行有雍門之悲雨露既濡空引太行之望豈謂通判某官政先慈孝義篤友朋首隆學校之師儒次訪里閭之耆舊自嗟來暮不聞拔薤之規尚意神交特致生芻之奠父老感歎桑梓光華深衣練冠莫克垂涕於墓道昔襦今袴尚能鼓舞於民謠仰佩之深力占難盡謝王司封啓王安石伏念安石孤窮之人少失所恃雖勉心竭力求以合於古人而固陋顓蒙動輒乖於時變以此而逰於世未嘗見恕於人而自趨走下風習聞餘教慰藉之禮稱揚之私忤嚴顔而不加犯上之誅拂盛指而更以首公為是書文報答騎從見臨不以先進略後生不以上官卑下吏以至其去重煩送將又賙其行使不留滯爰初就職甫爾踰旬乖離雖新感戀殊甚伏惟順節自夀副人所瞻答試館職人啓蘇軾伏承射䇿玉堂方觀筆陳校文天祿遂秀儒林黨友增華縉紳共慶國家求賢之道必於閒暇無事之時賢者報國之功乃在緩急有為之際養之無素則一旦欲用而何由待以非常則臨事欲辭而不可故納之於英俊相從之地觀之以世俗不見之書非獨使之業廣而材成抑將待其資深而望重某官學優而仕行浮於名辭令從容議論慷慨追還正始文章為之一新傳寫都城紙墨幾於驟貴得士之喜非我敢私軾衰病侵尋文思荒落職在翰苑當發䇿而莫辭識匪通儒懼品藻之不稱過煩臨貺寵以書詞永為巾笥之珍愧乏瓊瑤之報謹謝不宣賀徐州張僕射白兔狀韓愈伏聞今月五日營田巡官陳從政獻瑞兔毛質皎白天馴其心其始實得之符離安阜屯屯之役夫朝行遇之迫之弗逸人立而拱竊惟休咎之兆天所以啓覺于下依類託喻事之纎悉不可圖驗非睿智博通孰克究明愈雖不敏請試辨之兔隂類也又窟居狡而伏逆象也今白其色絶其群也馴其心化我德也人立而拱非禽獸之事革而從人且服罪也得之符離符離實戎國名又附麗也不在農夫之田而在軍田武德行也不戰而來之之道也有安阜之嘉名焉伏惟閣下股肱帝室藩垣天下四方其有逆亂之臣未血斧鑕之屬畏威崩析歸我乎哉其事兆矣是宜具跡表聞以承答天意小子不惠猥以文句微識䝉念睹兹盛美焉敢避不讓之責而默默耶愈再拜文編卷五十一
